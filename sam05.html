<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beijing ZhongKao Grade 9 English Grammar Practice</title>
    <!-- Confetti Library for enhanced correct answer effects -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', 'Comic Sans MS', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 10px;
            line-height: 1.4;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: calc(100vh - 20px);
        }
        .header {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .nav-buttons { display: flex; gap: 10px; flex-wrap: wrap; }
        .nav-btn {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white; border: none; padding: 10px 20px;
            border-radius: 8px; cursor: pointer; font-size: 16px;
            font-weight: 700; transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            font-family: inherit;
        }
        .nav-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.3);
        }
        .nav-btn:disabled {
            background: #95a5a6; cursor: not-allowed; transform: none;
        }
        
        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .dashboard-summary { 
            background: rgba(255, 255, 255, 0.15); 
            padding: 8px 15px; 
            border-radius: 8px; 
            font-weight: 900; 
            font-size: 1.1em; 
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .score-container { display: flex; align-items: center; gap: 15px; }
        .trophy-btn {
            background: linear-gradient(135deg, #f39c12, #e74c3c);
            color: white; border: none; padding: 8px 20px;
            border-radius: 50px; cursor: default; font-size: 18px;
            font-weight: 900; position: relative; overflow: hidden;
            box-shadow: 0 4px 15px rgba(243, 156, 18, 0.4);
            font-family: inherit;
            display: flex; flex-direction: column; align-items: center;
        }
        .rank-text { font-size: 12px; font-weight: 700; opacity: 0.9; text-transform: uppercase; letter-spacing: 1px;}
        
        .content { padding: 20px; flex-grow: 1; overflow-y: auto; }
        
        /* Smooth Page Transitions */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .home-page, .practice-page, .results-page, .review-page {
            animation: fadeIn 0.4s ease-out;
            display: block; height: 100%;
        }

        /* Mixed Practice Banner */
        .mixed-practice-banner {
            background: linear-gradient(135deg, #FF9A9E 0%, #FECFEF 99%, #FECFEF 100%);
            color: #d63031;
            padding: 25px;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 15px rgba(255, 154, 158, 0.4);
            margin-bottom: 20px;
            text-align: center;
            border: 3px solid #ff7675;
        }
        .mixed-practice-banner:hover {
            transform: translateY(-5px) scale(1.01);
            box-shadow: 0 10px 25px rgba(255, 154, 158, 0.6);
        }
        .mixed-practice-banner h3 { font-size: 1.8em; font-weight: 900; margin-bottom: 5px; color: #d63031;}
        .mixed-practice-banner p { font-size: 1.1em; font-weight: 700; color: #e17055;}

        .grammar-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px; margin-top: 5px;
        }
        .grammar-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; padding: 20px; border-radius: 16px;
            cursor: pointer; transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            position: relative; overflow: hidden;
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .grammar-card.mistakes-card { background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%); }
        .grammar-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .grammar-card h3 { font-size: 1.3em; margin-bottom: 5px; font-weight: 900; }
        .grammar-card p { font-size: 0.95em; opacity: 0.95; line-height: 1.4; margin-bottom: 10px; font-weight: 600;}
        .card-footer { display: flex; justify-content: flex-end; align-items: center; }
        .category-mastery {
            font-size: 0.9em; font-weight: 900;
            background: rgba(0,0,0,0.3); padding: 6px 10px; border-radius: 8px;
        }
        
        .study-content, .review-container {
            background: #f8f9fa; padding: 20px;
            border-radius: 16px; margin-bottom: 15px;
        }
        .study-content h2, .review-page h2 {
            color: #2c3e50; margin-bottom: 15px;
            padding-bottom: 8px; border-bottom: 3px solid #667eea;
            font-size: 1.5em; font-weight: 900;
        }
        
        .category-banner {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white; padding: 15px 20px; border-radius: 12px;
            margin-bottom: 15px; display: flex;
            justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 10px;
        }
        .category-banner h2 { font-size: 1.4em; margin: 0; border: none; padding: 0; color: white; font-weight: 900;}
        .progress-container { background: #e9ecef; border-radius: 12px; padding: 6px; margin-bottom: 20px; }
        .progress-bar {
            background: linear-gradient(135deg, #2ecc71, #27ae60); height: 24px; border-radius: 8px;
            transition: width 0.5s ease; display: flex; align-items: center; justify-content: flex-end; 
            padding-right: 10px; color: white; font-weight: 900; font-size: 14px;
        }
        
        .question-container { background: #f8f9fa; padding: 20px; border-radius: 16px; margin-bottom: 15px; }
        
        .question-display {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            background: white;
            padding: 35px 20px;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
            border: 4px solid #e9ecef;
        }
        .question-text {
            font-size: 2.8em;
            color: #2c3e50;
            font-weight: 900;
            line-height: 1.3;
            text-align: center;
            flex-grow: 1;
        }
        
        /* Visual blank styling */
        .blank-space {
            display: inline-block;
            width: 80px;
            border-bottom: 4px solid #ff9f43;
            margin: 0 8px;
            vertical-align: text-bottom;
        }
        
        .options-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .option-btn {
            background: white; border: 3px solid #54a0ff; border-bottom-width: 6px;
            padding: 20px; border-radius: 16px; font-family: inherit;
            font-size: 1.4em; font-weight: 800; cursor: pointer; transition: all 0.2s;
            color: #2c3e50; text-align: center;
        }
        .option-btn:hover:not(:disabled) { background: #e8f4f8; transform: translateY(-2px); }
        .option-btn:active:not(:disabled) { transform: translateY(4px); border-bottom-width: 2px; }
        .option-btn.correct { 
            background: #2ecc71 !important; 
            border-color: #27ae60 !important; 
            color: white !important; 
            transform: scale(1.02); /* Pop effect */
            box-shadow: 0 0 20px rgba(46, 204, 113, 0.5);
        }
        .option-btn.incorrect { background: #e74c3c !important; border-color: #c0392b !important; color: white !important; }
        .option-btn:disabled { cursor: not-allowed; opacity: 0.8; }
        
        .feedback-box {
            background: #fff3cd; border: 3px solid #ffc107; padding: 20px; border-radius: 16px;
            margin-top: 20px; display: none;
        }
        .feedback-box.show { display: block; animation: fadeIn 0.4s ease-out; }
        .feedback-box.correct-feedback { background: #d4edda; border-color: #28a745; }
        .feedback-box.incorrect-feedback { background: #f8d7da; border-color: #dc3545; }
        .feedback-title { font-weight: 900; margin-bottom: 5px; font-size: 1.4em; }
        .feedback-text { line-height: 1.5; color: #333; font-size: 1.1em; font-weight: 600; }
        
        .results-content { background: #f8f9fa; padding: 40px; border-radius: 20px; margin: 30px auto; max-width: 600px; text-align: center; border: 4px solid #e9ecef; }
        .final-score { font-size: 4em; color: #667eea; font-weight: 900; margin: 10px 0; }
        .score-message { font-size: 1.5em; color: #2c3e50; margin-bottom: 30px; font-weight: 700; }
        .action-btn {
            background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; padding: 15px 30px;
            border-radius: 50px; font-size: 18px; font-weight: 900; cursor: pointer; margin: 10px; transition: all 0.3s ease;
            font-family: inherit; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .action-btn.review { background: linear-gradient(135deg, #f39c12, #e67e22); }
        .action-btn:hover { transform: scale(1.05); }
        
        .review-item {
            background: white; padding: 20px; border-radius: 16px; margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-left: 8px solid #ccc;
        }
        .review-item.is-correct { border-left-color: #2ecc71; }
        .review-item.is-incorrect { border-left-color: #e74c3c; }
        .review-q { font-size: 1.4em; font-weight: 900; color: #2c3e50; margin-bottom: 15px; }
        .review-ans { display: flex; gap: 10px; margin-bottom: 15px; font-size: 1.1em; font-weight: 700; flex-wrap: wrap;}
        .review-ans span { padding: 6px 12px; border-radius: 8px; }
        .ans-your.wrong { background: #f8d7da; color: #c0392b; }
        .ans-your.right { background: #d4edda; color: #27ae60; }
        .ans-correct { background: #d4edda; color: #27ae60; }
        .review-feedback { background: #f8f9fa; padding: 15px; border-radius: 12px; margin-top: 10px; font-size: 1.05em; color: #555; font-weight: 600;}
        .student-context { background: #e8f4f8; border-left: 6px solid #3498db; padding: 15px; margin-top: 10px; border-radius: 0 12px 12px 0; font-size: 1em; color: #2980b9; font-weight: 700;}

        .hidden { display: none !important; }
        
        @media (max-width: 768px) {
            .options-grid { grid-template-columns: 1fr; }
            .header { flex-direction: column; align-items: stretch; text-align: center; }
            .nav-buttons, .header-right { justify-content: center; }
            .question-text { font-size: 2em; }
            .question-display { flex-direction: column; padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="nav-buttons">
                <button class="nav-btn" id="backBtn" onclick="goBack()">Back</button>
                <button class="nav-btn" id="homeBtn" onclick="goHome()">Dashboard</button>
                <button class="nav-btn" id="nextBtn" onclick="nextQuestion()" disabled>Next</button>
            </div>
            <div class="header-right">
                <div class="dashboard-summary" id="overallMastery">Overall Mastery: 0%</div>
                <div class="score-container">
                    <div class="trophy-btn" id="trophyBtn">
                        <span class="rank-text" id="rankDisplay">Junior Scholar</span>
                        <span id="scoreDisplay">0 pts</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="content">
            <!-- DASHBOARD -->
            <div class="home-page" id="homePage">
                <div class="mixed-practice-banner" onclick="selectCategory('mixed')">
                    <h3>🔀 Mixed Practice Challenge</h3>
                    <p>Test your skills with 10 random questions drawn from all grammar topics!</p>
                </div>
                <div class="grammar-grid" id="grammarGrid"></div>
            </div>

            <!-- PRACTICE PAGE -->
            <div class="practice-page hidden" id="practicePage">
                <div class="category-banner">
                    <h2 id="categoryTitle">Category</h2>
                </div>
                <div class="progress-container">
                    <div class="progress-bar" id="progressBar" style="width: 0%;">0/10</div>
                </div>
                <div class="question-container">
                    <div class="question-display">
                        <div class="question-text" id="questionText">Loading...</div>
                    </div>
                    <div class="options-grid" id="optionsGrid"></div>
                    <div class="feedback-box" id="feedbackBox">
                        <div class="feedback-title" id="feedbackTitle"></div>
                        <div class="feedback-text" id="feedbackText"></div>
                    </div>
                </div>
            </div>

            <!-- RESULTS PAGE -->
            <div class="results-page hidden" id="resultsPage">
                <div class="results-content">
                    <h2 style="color: #2c3e50; margin-bottom: 20px; font-weight: 900;">Complete!</h2>
                    <div class="final-score" id="finalScore">0/10</div>
                    <div class="score-message" id="scoreMessage">Great effort!</div>
                    <button class="action-btn review" onclick="showReview()">Detailed Review</button>
                    <button class="action-btn" onclick="restartPractice()">Try Again</button>
                    <button class="action-btn" onclick="goHome()">Dashboard</button>
                </div>
            </div>

            <!-- REVIEW PAGE -->
            <div class="review-page hidden" id="reviewPage">
                <div class="category-banner">
                    <h2>Answers Review</h2>
                    <div>Study these before your next try!</div>
                </div>
                <div class="review-container" id="reviewContainer"></div>
                <div style="text-align: center; margin-top: 20px;">
                    <button class="action-btn" onclick="goHome()">Back to Dashboard</button>
                </div>
            </div>
    </div>

<script>
// Question Banks (Consolidated to defaults as topics are merged into grammar types)
const verifiedQuestions = {
    who: {
        default: [
            { q: "___ is your favorite teacher?", options: ["who", "which", "whom", "whose"], correct: 0, feedback: "'Who' refers to people as the subject. 'Which' is for things.", context: "Think about homeroom! When asking about Mr. Li or Ms. Wang, always use 'who'." },
            { q: "___ can help you with your math homework?", options: ["who", "which", "whom", "whose"], correct: 0, feedback: "'Who' is used for people performing an action.", context: "When you're stuck on a geometry problem and need a classmate's help, use 'who' to ask for them." },
            { q: "___ is playing basketball on the court?", options: ["who", "which", "whom", "whose"], correct: 0, feedback: "'Who' asks about the person doing the action.", context: "During PE class or afternoon break, use 'who' to identify the players." },
            { q: "___ wrote this beautiful essay?", options: ["who", "which", "whom", "whose"], correct: 0, feedback: "'Who' is the subject of the verb 'wrote'.", context: "If you see a great essay pinned on the classroom bulletin board, you'd ask this!" },
            { q: "___ do you want to invite to your graduation party?", options: ["who", "which", "whom", "whose"], correct: 0, feedback: "'Who' is commonly used in questions about people.", context: "Planning for the end of Grade 9! 'Who' is perfect for asking about your guest list." },
            { q: "She is the student ___ won the speech competition.", options: ["who", "which", "whom", "whose"], correct: 0, feedback: "'Who' introduces a relative clause describing a person.", context: "In the Monday morning school assembly, we describe the winner using 'who'." },
            { q: "___ should we ask for directions to the new library?", options: ["who", "which", "whom", "whose"], correct: 0, feedback: "'Who' is the object of 'ask' in this question.", context: "When navigating a new high school campus, asking 'who' gets you the right guide." },
            { q: "___ is singing that English song so well?", options: ["who", "which", "whom", "whose"], correct: 0, feedback: "'Who' asks about the person performing the action.", context: "Perfect for the school talent show or an English Corner activity." },
            { q: "___ has the best ideas for our science project?", options: ["who", "which", "whom", "whose"], correct: 0, feedback: "'Who' is the subject of 'has'.", context: "Group work in science class requires finding out 'who' has the winning idea." },
            { q: "___ will represent our class in the sports meet?", options: ["who", "which", "whom", "whose"], correct: 0, feedback: "'Who' is the subject of 'will represent'.", context: "Every autumn sports meet starts with deciding 'who' runs the relay race!" }
        ]
    },
    there: {
        default: [
            { q: "___ a library near your middle school.", options: ["There is", "There are", "There has", "There have"], correct: 0, feedback: "'There is' is used with singular countable nouns.", context: "Schools don't 'have' a nearby library in English grammar; 'there is' states its existence." },
            { q: "___ many clubs you can join this semester.", options: ["There is", "There are", "There has", "There have"], correct: 1, feedback: "'There are' is used with plural countable nouns.", context: "When discussing extracurriculars like Drama or Robotics, use 'There are'." },
            { q: "___ enough time to finish the mock exam.", options: ["There is", "There are", "There has", "There have"], correct: 0, feedback: "'Time' is uncountable, so we use 'There is'.", context: "A classic ZhongKao worry! Since time can't be counted, use 'There is'." },
            { q: "___ many students in the school cafeteria.", options: ["There is", "There are", "There has", "There have"], correct: 1, feedback: "'Students' is plural countable, so 'There are' is correct.", context: "Lunch rush hour! You can count students, so it's 'There are'." },
            { q: "___ some chalk left on the blackboard.", options: ["There is", "There are", "There has", "There have"], correct: 0, feedback: "'Chalk' is usually treated as uncountable.", context: "When the class monitor needs to clean the board before the next lesson." },
            { q: "___ several ways to solve this math equation.", options: ["There is", "There are", "There has", "There have"], correct: 1, feedback: "'Ways' is plural countable.", context: "Math teachers love showing multiple methods. Use 'There are' for plural 'ways'." },
            { q: "___ a bus stop close to the campus gate.", options: ["There is", "There are", "There has", "There have"], correct: 0, feedback: "'A bus stop' is singular.", context: "Essential for students commuting home after evening self-study." },
            { q: "___ many questions about today's English grammar.", options: ["There is", "There are", "There has", "There have"], correct: 1, feedback: "'Questions' is plural countable.", context: "What your teacher expects right before the bell rings!" },
            { q: "___ something important on the exam syllabus.", options: ["There is", "There are", "There has", "There have"], correct: 0, feedback: "'Something' takes a singular verb.", context: "Reviewing for the ZhongKao requires focusing on the syllabus." },
            { q: "___ enough desks for the new classmates.", options: ["There is", "There are", "There has", "There have"], correct: 1, feedback: "'Desks' is plural countable.", context: "When a new semester starts and the classroom seating is rearranged." }
        ]
    },
    opinions: {
        default: [
            { q: "___, online learning is very helpful.", options: ["In my opinion", "I am opinion", "My opinion", "Opinion me"], correct: 0, feedback: "'In my opinion' is the correct phrase.", context: "Great for writing the ZhongKao English essay when stating your stance on technology." },
            { q: "Do you think morning reading is helpful? Yes, ___.", options: ["I think so", "I am think", "I thinking", "I thought"], correct: 0, feedback: "'I think so' is the natural response.", context: "Those 7:30 AM reading sessions actually help your pronunciation!" },
            { q: "Is memorizing vocabulary essential? ___.", options: ["I believe it is", "I believe it does", "I believe it has", "I believe it can"], correct: 0, feedback: "'I believe it is' completes the sentence correctly.", context: "Vocabulary is the building block of your Grade 9 exams." },
            { q: "What is your opinion about group study? ___.", options: ["I think it's useful", "I think it useful", "I think it's use", "I think it's used"], correct: 0, feedback: "'It's useful' provides the adjective after the 'be' verb.", context: "Explaining why you and your friends study together at the library." },
            { q: "Do you agree that practice makes perfect? Yes, ___.", options: ["I agree", "I am agree", "I agreeing", "I agreed"], correct: 0, feedback: "'I agree' is the simple present form.", context: "A classic proverb you can use in your speaking test!" },
            { q: "Is P.E. class important? I think ___.", options: ["it can be", "it can", "it is can", "it being"], correct: 0, feedback: "'it can be' is correct.", context: "Physical Education helps reduce ZhongKao stress. It's highly important!" },
            { q: "What do you think about the new uniforms? ___.", options: ["They're comfortable", "They comfortable", "They're comfort", "They're comfortably"], correct: 0, feedback: "'They're comfortable' uses the correct adjective form.", context: "A common topic among classmates when the seasons change." },
            { q: "Should everyone learn a second language? Yes, ___.", options: ["I do", "I am", "I have", "I will"], correct: 0, feedback: "'Yes, I do' matches the auxiliary 'do' in the question.", context: "Short, crisp answers get full points in listening/speaking tests." },
            { q: "Is it better to type or handwrite notes? ___.", options: ["I prefer handwriting", "I prefer handwrite", "I prefer handwrote", "I prefer to handwriting"], correct: 0, feedback: "'I prefer + verb-ing' is standard.", context: "Handwriting notes is proven to help students remember facts better." },
            { q: "What is your view on evening self-study classes? ___ focus.", options: ["I think they help", "I think they helps", "I think they helping", "I think they helped"], correct: 0, feedback: "'They help' maintains plural subject-verb agreement.", context: "Evening self-study is a staple of Chinese middle school life." }
        ]
    },
    comparatives: {
        default: [
            { q: "Physics is ___ than Chemistry.", options: ["more difficult", "difficulter", "most difficult", "the difficulter"], correct: 0, feedback: "Multi-syllable adjectives use 'more'.", context: "A very common debate among Grade 9 science students!" },
            { q: "Taking the subway is ___ than riding a bike.", options: ["faster", "more fast", "fastest", "fastlier"], correct: 0, feedback: "One-syllable adjectives just add '-er'.", context: "Calculating the best commute to avoid being late for first period." },
            { q: "History is ___ than Geography.", options: ["more interesting", "interestinger", "most interesting", "the more interesting"], correct: 0, feedback: "'More interesting' is the proper comparative.", context: "Both help you understand the world, but which textbook do you prefer?" },
            { q: "Are your grades ___ than last semester?", options: ["much better", "more better", "best", "gooder"], correct: 0, feedback: "'Better' is irregular. 'Much' can intensify it.", context: "Reflecting on your midterm report card!" },
            { q: "Multiple-choice is ___ than fill-in-the-blanks.", options: ["easier", "more easy", "easiest", "the easier"], correct: 0, feedback: "Change 'y' to 'i' and add '-er' for 'easy'.", context: "Exam strategies! Most students prefer having options to guess from." },
            { q: "This dictionary is ___ than that app.", options: ["more helpful", "helpfuler", "most helpful", "the more helpful"], correct: 0, feedback: "Use 'more' for adjectives ending in -ful.", context: "Comparing study tools on your desk." },
            { q: "Listening is ___ than speaking.", options: ["more important", "importanter", "most important", "the importanter"], correct: 0, feedback: "'More important' is correct.", context: "Both are tested in the ZhongKao English speaking/listening computer test!" },
            { q: "The final exam is ___ than the midterms.", options: ["much harder", "more hard", "hardest", "hardier"], correct: 0, feedback: "Add '-er' to one-syllable 'hard'.", context: "The final exam covers the whole year's knowledge, so it usually feels tougher." },
            { q: "Ping pong is ___ than badminton.", options: ["more popular", "popularer", "most popular", "the more popular"], correct: 0, feedback: "'More popular' is correct.", context: "Look at the school courtyard during recess—which tables are always full?" },
            { q: "Your reading speed is ___ than your friend's.", options: ["much faster", "more fast", "fastest", "fastlier"], correct: 0, feedback: "Add '-er' to 'fast'.", context: "Skimming and scanning reading comprehension passages is a race against the clock." }
        ]
    },
    frequency: {
        default: [

            { q: "Do you raise your hand to answer? Yes, ___.", options: ["I usually try to", "I try usually to", "I usually trying to", "I am usually try to"], correct: 0, feedback: "'Usually' + main verb.", context: "Participation shows the teacher you are actively learning." },

            { q: "I need to learn ___ vocabulary in this unit.", options: ["many", "much", "some", "any"], correct: 2, feedback: "'Some' works well in positive sentences with uncountable 'vocabulary'.", context: "Usually there's a list of 30+ words at the back of the module." },
            { q: "How ___ subjects do you study this year?", options: ["many", "much", "some", "any"], correct: 0, feedback: "'Subjects' is countable.", context: "Chinese, Math, English, Physics, Chemistry, PE, Politics, History..." },
            { q: "Would you like ___ paper for the essay?", options: ["some", "any", "many", "much"], correct: 0, feedback: "'Some' is used in polite offers, even in question form.", context: "When your desk-mate runs out of loose-leaf paper." },
            { q: "How ___ progress did you make this month?", options: ["many", "much", "some", "any"], correct: 1, feedback: "'Progress' is uncountable.", context: "Moving up 10 ranks in the class is great progress!" },
            { q: "Are there ___ notes on the whiteboard?", options: ["some", "any", "many", "much"], correct: 1, feedback: "'Any' for questions with countable plurals.", context: "Copying the teacher's board work before the monitor erases it." },
            { q: "How ___ classmates are absent today?", options: ["many", "much", "some", "any"], correct: 0, feedback: "'Classmates' are countable.", context: "The monitor has to report this to the homeroom teacher every morning." },
            { q: "I don't have ___ homework for the weekend.", options: ["some", "any", "many", "much"], correct: 1, feedback: "'Any' is used for negative sentences.", context: "The best feeling on a Friday afternoon!" }

            { q: "In primary school, I ___ play outside every day.", options: ["will", "would", "can", "could"], correct: 1, feedback: "'Would' + base verb expresses past habits.", context: "Nostalgia for the days before middle school homework piled up!" },
            { q: "If you scored 100%, ___ you celebrate?", options: ["will", "would", "can", "could"], correct: 1, feedback: "Second conditional uses 'would' for hypothetical situations.", context: "A perfect score in English deserves a hotpot dinner!" },
            { q: "___ you like to join our study group?", options: ["Will", "Would", "Do", "Did"], correct: 1, feedback: "'Would you like' is a standard polite offer/invitation.", context: "Collaborative learning helps everyone improve." },
            { q: "When I started English, I ___ find pronunciation hard.", options: ["will", "would", "can", "could"], correct: 1, feedback: "'Would' for past repeated feelings/states.", context: "Everyone struggles with 'th' sounds at first!" },
            { q: "If you could choose your seat, where ___ you sit?", options: ["will", "would", "can", "could"], correct: 1, feedback: "Hypothetical question requires 'would'.", context: "Front row for focus, or back row for relaxing? A classic student dilemma." },
            { q: "___ you mind closing the classroom window?", options: ["Will", "Would", "Do", "Did"], correct: 1, feedback: "'Would you mind' + gerund is highly polite.", context: "When the winter wind blows into the classroom during self-study." },
            { q: "When preparing for midterms, I ___ stay up late.", options: ["will", "would", "can", "could"], correct: 1, feedback: "'Would' for past habits.", context: "Midnight studying is common, but get some sleep!" },
            { q: "If there were no tests, ___ you still learn?", options: ["will", "would", "can", "could"], correct: 1, feedback: "Hypothetical condition.", context: "Learning for knowledge vs. learning for exams." },
            { q: "___ you recommend this tutor to others?", options: ["Will", "Would", "Do", "Did"], correct: 1, feedback: "'Would' for a polite opinion request.", context: "Sharing good educational resources with your peers." }

// Grammar category metadata
const grammarCategories = [
    { id: 'who', title: 'WHO', desc: 'People questions & relative clauses' },
    { id: 'there', title: 'THERE IS/ARE', desc: 'Existence & location statements' },
    { id: 'opinions', title: 'OPINIONS', desc: 'Expressing viewpoints naturally' },
    { id: 'comparatives', title: 'COMPARATIVES', desc: '-er / more + than structures' },
    { id: 'frequency', title: 'FREQUENCY', desc: 'always/usually/sometimes/never' },
    { id: 'countable', title: 'COUNTABLE / UNCOUNTABLE', desc: 'many/much, some/any usage' },
    { id: 'would', title: 'WOULD', desc: 'Polite requests & past habits' }
];

// Spaced Repetition Array
let mistakesBank = JSON.parse(localStorage.getItem('zhongkaoMistakes')) || [];
let categoryStats = JSON.parse(localStorage.getItem('zhongkaoStats')) || {};

grammarCategories.forEach(c => {
    if(!categoryStats[c.id]) categoryStats[c.id] = { attempts: 0, highscore: 0 };
});

// Game state
let state = {
    page: 'home',
    category: null,
    questions: [],
    current: 0,
    score: 0,
    points: parseInt(localStorage.getItem('zhongkaoPoints')) || 0,
    answered: false,
    history: ['home'],
    userAnswers: [],
    currentOptions: []
};

// Helper function to shuffle arrays
function shuffleArray(array) {
    let newArray = [...array];
    for (let i = newArray.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
    }
    return newArray;
}

// Gamification Rank system
function getRank(pts) {
    if (pts >= 500) return "ZhongKao Master";
    if (pts >= 100) return "Grammar Senior";
    return "Junior Scholar";
}

document.addEventListener('DOMContentLoaded', () => {
    updateScore();
    renderGrid();
    updateNav();
    if ('speechSynthesis' in window) {
        speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
    }
});

function saveStats() {
    localStorage.setItem('zhongkaoStats', JSON.stringify(categoryStats));
    localStorage.setItem('zhongkaoPoints', state.points);
    localStorage.setItem('zhongkaoMistakes', JSON.stringify(mistakesBank));
}

function renderGrid() {
    const grid = document.getElementById('grammarGrid');
    grid.innerHTML = '';
    let totalScore = 0;
    
    // Standard Categories
    grammarCategories.forEach(cat => {
        const stats = categoryStats[cat.id];
        totalScore += stats.highscore;
        const masteryPct = stats.attempts > 0 ? (stats.highscore * 10) : 0;
        
        const card = document.createElement('div');
        card.className = 'grammar-card';
        card.innerHTML = `
            <div>
                <h3>${cat.title}</h3>
                <p>${cat.desc}</p>
            </div>
            <div class="card-footer">
                <span class="category-mastery" style="color: ${masteryPct >= 80 ? '#2ecc71' : masteryPct > 0 ? '#f1c40f' : '#fff'}">
                    Mastery: ${masteryPct}%
                </span>
            </div>
        `;
        card.onclick = () => selectCategory(cat.id);
        grid.appendChild(card);
    });

    // Mistakes Bank Category
    const mistakesCard = document.createElement('div');
    mistakesCard.className = 'grammar-card mistakes-card';
    mistakesCard.innerHTML = `
        <div>
            <h3>REVIEW MISTAKES</h3>
            <p>Practice ${mistakesBank.length} questions you got wrong previously.</p>
        </div>
        <div class="card-footer">
            <span class="category-mastery">Targeted Review</span>
        </div>
    `;
    mistakesCard.onclick = () => {
        if (mistakesBank.length === 0) {
            alert("No mistakes yet! Great job!");
        } else {
            selectCategory('mistakes');
        }
    };
    grid.appendChild(mistakesCard);
    
    const overall = Math.round((totalScore / (grammarCategories.length * 10)) * 100);
    document.getElementById('overallMastery').textContent = `Overall Mastery: ${overall}%`;
}

function selectCategory(id) {
    if (id === 'mistakes') {
        state.category = { id: 'mistakes', title: 'Review Mistakes', desc: 'Questions to review' };
    } else if (id === 'mixed') {
        state.category = { id: 'mixed', title: 'Mixed Practice Challenge', desc: 'All Topics' };
    } else {
        state.category = grammarCategories.find(c => c.id === id);
    }
    startPractice();
}

function startPractice() {
    const catId = state.category.id;
    let pool = [];

    if (catId === 'mistakes') {
        pool = mistakesBank;
    } else if (catId === 'mixed') {
        // Pool together all default categories for mixed practice
        grammarCategories.forEach(cat => {
            pool = pool.concat(verifiedQuestions[cat.id].default);
        });
    } else {
        const bank = verifiedQuestions[catId];
        pool = bank.default;
    }
    
    // Shuffle questions and select up to 10
    const selectedQuestions = shuffleArray(pool).slice(0, 10);
    
    // Setup questions with shuffled options, keeping track of the correct answer
    state.questions = selectedQuestions.map(q => {
        const startsWithBlank = q.q.trim().startsWith("___");
        
        let optionsWithIndex = q.options.map((opt, index) => {
            let displayText = opt;
            // If the sentence starts with a blank, capitalize the option
            if (startsWithBlank && typeof displayText === 'string' && displayText.length > 0) {
                displayText = displayText.charAt(0).toUpperCase() + displayText.slice(1);
            }
            return { text: displayText, isCorrect: index === q.correct };
        });
        
        let shuffledOpts = shuffleArray(optionsWithIndex);
        return {
            ...q,
            shuffledOptions: shuffledOpts,
            correctIndex: shuffledOpts.findIndex(o => o.isCorrect)
        };
    });

    state.current = 0;
    state.answered = false;
    state.score = 0;
    state.userAnswers = new Array(state.questions.length).fill(null);
    
    state.history.push('practice');
    showPage('practice');
    renderQuestion();
    updateNav();
}

function renderQuestion() {
    const q = state.questions[state.current];
    const visualBlank = '<span class="blank-space"></span>';
    const formattedText = q.q.replace('___', visualBlank);
    
    document.getElementById('questionText').innerHTML = formattedText;
    document.getElementById('categoryTitle').textContent = state.category.title;
    document.getElementById('progressBar').style.width = `${((state.current + 1) / state.questions.length) * 100}%`;
    document.getElementById('progressBar').textContent = `${state.current + 1}/${state.questions.length}`;
    
    const grid = document.getElementById('optionsGrid');
    grid.innerHTML = '';
    
    q.shuffledOptions.forEach((optObj, i) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = optObj.text;
        btn.onclick = () => selectAnswer(i);
        grid.appendChild(btn);
    });
    
    document.getElementById('feedbackBox').classList.remove('show', 'correct-feedback', 'incorrect-feedback');
    state.answered = false;
    updateNav();
}

function playPraiseAudio() {
    if (!('speechSynthesis' in window)) return;
    
    const praises = ["Excellent!", "Great job!", "Perfect!", "Well done!", "You got it!", "Brilliant!", "Spot on!", "Fantastic!"];
    const targetVoiceNames = ["Giuseppe", "Remy", "Vivienne", "Emma", "Brian", "Ava", "Andrew", "William"];

    const text = praises[Math.floor(Math.random() * praises.length)];
    const utter = new SpeechSynthesisUtterance(text);
    
    // Explicit override to 100% per user instructions
    utter.rate = 1.0; 
    
    const voices = speechSynthesis.getVoices();
    const availableTargetVoices = voices.filter(v => targetVoiceNames.some(name => v.name.includes(name)));
    
    if (availableTargetVoices.length > 0) {
        utter.voice = availableTargetVoices[Math.floor(Math.random() * availableTargetVoices.length)];
    }
    
    speechSynthesis.speak(utter);
}

function fireConfetti() {
    if (typeof confetti === 'function') {
        confetti({
            particleCount: 100,
            spread: 70,
            origin: { y: 0.6 },
            colors: ['#2ecc71', '#3498db', '#f1c40f', '#e74c3c', '#9b59b6']
        });
    }
}

function selectAnswer(index) {
    if (state.answered) return;
    state.answered = true;
    state.userAnswers[state.current] = index;
    
    const q = state.questions[state.current];
    const buttons = document.querySelectorAll('.option-btn');
    
    let isCorrect = (index === q.correctIndex);

    buttons.forEach((btn, i) => {
        btn.disabled = true;
        if (i === q.correctIndex) btn.classList.add('correct');
        else if (i === index) btn.classList.add('incorrect');
    });
    
    const feedback = document.getElementById('feedbackBox');
    const title = document.getElementById('feedbackTitle');
    const text = document.getElementById('feedbackText');
    
    if (isCorrect) {
        state.score++;
        state.points += 10;
        feedback.classList.add('correct-feedback');
        title.textContent = 'Correct!';
        
        playPraiseAudio();
        fireConfetti();
        
        // If they got it right, remove it from mistakes bank if it exists there
        mistakesBank = mistakesBank.filter(m => m.q !== q.q);

    } else {
        feedback.classList.add('incorrect-feedback');
        title.textContent = 'Incorrect!';
        
        // Add to mistakes bank if it isn't already there
        if (!mistakesBank.some(m => m.q === q.q)) {
            // Revert shuffled options to raw format to store properly
            let baseQuestion = {
                q: q.q,
                options: q.options,
                correct: q.correct,
                feedback: q.feedback,
                context: q.context
            };
            mistakesBank.push(baseQuestion);
            // Cap at 50 to prevent overflow
            if (mistakesBank.length > 50) mistakesBank.shift();
        }
    }
    
    saveStats();
    text.textContent = q.feedback;
    feedback.classList.add('show');
    
    updateScore();
    updateNav();
}

function nextQuestion() {
    if (state.current < state.questions.length - 1) {
        state.current++;
        state.answered = false;
        renderQuestion();
    } else {
        showResults();
    }
    updateNav();
}

function showResults() {
    const catId = state.category.id;
    // Don't save stats to specific categories if it was a mixed practice or review
    if (catId !== 'mistakes' && catId !== 'mixed') {
        categoryStats[catId].attempts++;
        if(state.score > categoryStats[catId].highscore) {
            categoryStats[catId].highscore = state.score;
        }
        saveStats();
    }
    renderGrid(); 

    state.history.push('results');
    showPage('results');
    
    const totalQ = state.questions.length;
    const pct = totalQ === 0 ? 0 : (state.score / totalQ) * 100;
    document.getElementById('finalScore').textContent = `${state.score}/${totalQ}`;
    
    let msg = '';
    if (pct >= 90) msg = 'Outstanding! Excellent mastery!';
    else if (pct >= 75) msg = 'Great job! Very good understanding!';
    else if (pct >= 60) msg = 'Good effort! Keep practicing!';
    else msg = 'Keep studying! You can improve!';
    
    document.getElementById('scoreMessage').textContent = msg;
    updateNav();
}

function showReview() {
    state.history.push('review');
    showPage('review');
    
    const container = document.getElementById('reviewContainer');
    container.innerHTML = '';
    
    state.questions.forEach((q, i) => {
        const userAnsIndex = state.userAnswers[i];
        const isCorrect = userAnsIndex === q.correctIndex;
        
        const item = document.createElement('div');
        item.className = `review-item ${isCorrect ? 'is-correct' : 'is-incorrect'}`;
        
        const userAnsText = userAnsIndex !== null ? q.shuffledOptions[userAnsIndex].text : "Did not answer";
        const correctAnsText = q.shuffledOptions[q.correctIndex].text;
        
        const fullSentence = q.q.replace('___', `<u style="text-decoration-color: ${isCorrect ? '#27ae60' : '#e74c3c'}; font-weight: 900;">${correctAnsText}</u>`);
        
        item.innerHTML = `
            <div class="review-q">${i + 1}. ${fullSentence}</div>
            <div class="review-ans">
                <span class="ans-your ${isCorrect ? 'right' : 'wrong'}">Your Answer: ${userAnsText}</span>
                ${!isCorrect ? `<span class="ans-correct">Correct Answer: ${correctAnsText}</span>` : ''}
            </div>
            <div class="review-feedback">
                <strong>Rule:</strong> ${q.feedback}
            </div>
            <div class="student-context">
                <strong>Tip:</strong> ${q.context}
            </div>
        `;
        container.appendChild(item);
    });
    
    updateNav();
}

function restartPractice() {
    startPractice();
}

function goBack() {
    if (state.history.length > 1) {
        state.history.pop();
        showPage(state.history[state.history.length - 1]);
        updateNav();
    }
}

function goHome() {
    state.history = ['home'];
    state.category = null;
    renderGrid(); 
    showPage('home');
    updateNav();
}

function showPage(name) {
    ['homePage', 'practicePage', 'resultsPage', 'reviewPage'].forEach(id => {
        document.getElementById(id).classList.add('hidden');
    });
    document.getElementById(name + 'Page').classList.remove('hidden');
    state.page = name;
}

function updateNav() {
    document.getElementById('backBtn').disabled = state.history.length <= 1;
    const next = document.getElementById('nextBtn');
    if (state.page === 'practice') {
        next.disabled = !state.answered;
        next.textContent = state.current < state.questions.length - 1 ? 'Next' : 'Finish';
    } else {
        next.disabled = true;
    }
}

function updateScore() {
    document.getElementById('scoreDisplay').textContent = `${state.points} pts`;
    document.getElementById('rankDisplay').textContent = getRank(state.points);
}

</script>
