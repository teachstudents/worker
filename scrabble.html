<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4-Player Word Grid (Offline ESL)</title>
    
    <!-- Load Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Load React and ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Load Babel to compile JSX inside the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        .grid-cols-15 { grid-template-columns: repeat(15, minmax(0, 1fr)); }
        
        /* Custom scrollbar for our Word Bank drawer */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #52525b; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #71717a; }
    </style>
</head>
<body class="bg-neutral-900 text-white overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- GAME CONSTANTS & CONFIGURATION ---
        
        const BOARD_LAYOUT = [
          "T..d...T...d..T",
          ".D...t...t...D.",
          "..D...d.d...D..",
          "d..D...d...D..d",
          "....D.....D....",
          ".t...t...t...t.",
          "..d...d.d...d..",
          "T..d...*...d..T",
          "..d...d.d...d..",
          ".t...t...t...t.",
          "....D.....D....",
          "d..D...d...D..d",
          "..D...d.d...D..",
          ".D...t...t...D.",
          "T..d...T...d..T"
        ];

        const TILE_DATA = {
          E: { count: 12, value: 1 }, A: { count: 9, value: 1 }, I: { count: 9, value: 1 },
          O: { count: 8, value: 1 }, N: { count: 6, value: 1 }, R: { count: 6, value: 1 },
          T: { count: 6, value: 1 }, L: { count: 4, value: 1 }, S: { count: 4, value: 1 },
          U: { count: 4, value: 1 }, D: { count: 4, value: 2 }, G: { count: 3, value: 2 },
          B: { count: 2, value: 3 }, C: { count: 2, value: 3 }, M: { count: 2, value: 3 },
          P: { count: 2, value: 3 }, F: { count: 2, value: 4 }, H: { count: 2, value: 4 },
          V: { count: 2, value: 4 }, W: { count: 2, value: 4 }, Y: { count: 2, value: 4 },
          K: { count: 1, value: 5 }, J: { count: 1, value: 8 }, X: { count: 1, value: 8 },
          Q: { count: 1, value: 10 }, Z: { count: 1, value: 10 }, _: { count: 2, value: 0 }
        };

        // --- THE EMBEDDED TEACHER'S DICTIONARY ---
        // This is stapled directly into the code. It contains the most frequent, useful English words.
        // We have doubled the size to include all classic Scrabble 2-letter lifesavers and everyday ESL nouns/verbs!
        const EMBEDDED_DICTIONARY = "THE OF AND A TO IN IS YOU THAT IT HE WAS FOR ON ARE AS WITH HIS THEY I AT BE THIS HAVE FROM OR ONE HAD BY WORDS BUT NOT WHAT ALL WERE WE WHEN YOUR CAN SAID THERE USE AN EACH WHICH SHE DO HOW THEIR IF WILL UP OTHER ABOUT OUT MANY THEN THEM THESE SO SOME HER WOULD MAKE LIKE HIM INTO TIME HAS LOOK TWO MORE WRITE GO SEE NUMBER NO WAY COULD PEOPLE MY THAN FIRST WATER BEEN CALL WHO OIL ITS NOW FIND LONG DOWN DAY DID GET COME MADE MAY PART OVER NEW SOUND TAKE ONLY LITTLE WORK KNOW PLACE YEARS LIVE ME BACK GIVE MOST VERY AFTER THINGS OUR JUST NAME GOOD SENTENCE MAN THINK SAY GREAT WHERE HELP THROUGH MUCH BEFORE LINE RIGHT TOO MEANS OLD ANY SAME TELL BOY FOLLOW CAME WANT SHOW ALSO AROUND FARM THREE SMALL SET PUT END DOES ANOTHER WELL LARGE MUST BIG EVEN SUCH BECAUSE TURN HERE WHY ASK WENT MEN READ NEED LAND DIFFERENT HOME US MOVE TRY KIND HAND PICTURE AGAIN CHANGE OFF PLAY SPELL AIR AWAY ANIMAL HOUSE POINT PAGE LETTER MOTHER ANSWER FOUND STUDY STILL LEARN SHOULD AMERICA WORLD HIGH EVERY NEAR ADD FOOD BETWEEN OWN BELOW COUNTRY PLANT LAST SCHOOL FATHER KEEP TREE NEVER START CITY EARTH EYES LIGHT THOUGHT HEAD UNDER STORY SAW LEFT DONT FEW WHILE ALONG MIGHT CLOSE SOMETHING SEEM NEXT HARD OPEN EXAMPLE BEGIN LIFE ALWAYS THOSE BOTH PAPER TOGETHER GOT GROUP OFTEN RUN IMPORTANT UNTIL CHILDREN SIDE FEET CAR MILE NIGHT WALK WHITE SEA BEGAN GROW TOOK RIVER FOUR CARRY STATE ONCE BOOK HEAR STOP WITHOUT SECOND LATE MISS IDEA ENOUGH EAT FACE WATCH FAR REAL ALMOST LET ABOVE GIRL SOMETIMES MOUNTAINS CUT YOUNG TALK SOON LIST SONG BEING LEAVE FAMILY ITS BODY MUSIC COLOR STAND SUN QUESTIONS FISH AREA MARK DOG HORSE BIRDS PROBLEM COMPLETE ROOM KNEW SINCE EVER PIECE TOLD USUALLY DIDNT FRIENDS EASY HEARD ORDER RED DOOR SURE BECOME TOP SHIP ACROSS TODAY DURING SHORT BETTER BEST HOWEVER LOW HOURS BLACK PRODUCTS HAPPENED WHOLE MEASURE REMEMBER EARLY WAVES REACHED LISTEN WIND ROCK SPACE COVERED FAST SEVERAL HOLD HIMSELF TOWARD FIVE STEP MORNING PASSED VOWEL TRUE HUNDRED AGAINST PATTERN NUMERAL TABLE NORTH SLOWLY MONEY MAP BUSY PULLED DRAW VOICE SEEN COLD CRIED PLAN NOTICE SOUTH SING WAR GROUND FALL KING TOWN ILL UNIT FIGURE CERTAIN FIELD TRAVEL WOOD FIRE UPON DONE ENGLISH ROAD HALT TEN FLY GAVE BOX FINALLY WAIT CORRECT OH QUICKLY PERSON BECAME SHOWN MINUTES STRONG VERB STARS FRONT FEEL FACT INCHES STREET DECIDED CONTAIN COURSE SURFACE PRODUCE BUILDING OCEAN CLASS NOTE NOTHING REST CAREFULLY SCIENTISTS INSIDE WHEELS STAY GREEN KNOWN ISLAND WEEK LESS MACHINE BASE AGO STOOD PLANE SYSTEM BEHIND RAN ROUND BOAT GAME FORCE BROUGHT UNDERSTAND WARM COMMON BRING EXPLAIN DRY THOUGH LANGUAGE SHAPE DEEP THOUSANDS YES CLEAR EQUATION YET GOVERNMENT FILLED HEAT FULL HOT CHECK OBJECT AM RULE AMONG NOUN POWER CANNOT ABLE SIX SIZE DARK BALL MATERIAL SPECIAL HEAVY FINE PAIR CIRCLE INCLUDE BUILT QI ZA JO XI XU AX EX OX PI TI KI BO DO GO HO MO NO PO SO TO WO AB AD AE AG AH AI AL AM AN AR AS AT AW AX AY BA BE BI BO BY DA DE DO ED EF EH EL EM EN ER ES ET EX FA FE GO HA HE HI HM HO ID IF IN IS IT JO KA KI LA LI LO MA ME MI MO MU MY NA NE NO NU OD OE OF OH OI OM ON OP OR OS OW OX OY PA PE PI PO QI RE SH SI SO TA TE TI TO UH UM UN UP US UT WE WO XI XU YA YE YO ZA CAT DOG HAT RAT BAT MAT SIT FIT HIT BIT SUN MOM DAD BED RED BLUE PINK FAST SLOW CUP MUG POT PAN CAR BUS VAN JOB ART FUN JOY SAD MAD GLAD HAPPY CRY LAUGH JUMP SKIP HOP RUN WALK SWIM FLY DANCE SING TALK SPEAK HEAR DEAF BLIND RICH POOR HOT COLD WARM COOL ICE SNOW RAIN WIND STORM CLOUD SKY STAR MOON PLANET EARTH MARS VENUS PLUTO JUPITER SATURN URANUS NEPTUNE SUN BUG ANT BEE WASP FLY SPIDER WORM BIRD DUCK SWAN GOOSE BEAR LION TIGER WOLF FOX DEER COW PIG SHEEP GOAT HORSE PONY FROG TOAD SNAKE FISH SHARK WHALE CRAB CLAM SHELL SAND DIRT MUCK MUD GRASS LEAF ROOT STEM FLOWER ROSE LILY WEED BUSH WOOD BOARD NAIL HAMMER SAW TOOL WRENCH PLIER SCREW BOLT NUT WIRE PIPE TUBE HOSE CORD STRING ROPE KNOT TIE BOW LACE SHOE SOCK BOOT COAT PANT SHIRT DRESS SKIRT HAT GLOVE RING BAND WATCH CLOCK TIME HOUR MINUTE SECOND DAY WEEK MONTH YEAR DECADE CENTURY AGE ERA PAST FUTURE TODAY NOW LATER SOON SOONER LATEST FASTEST SLOWEST BIGGEST SMALLEST LONGEST SHORTEST WIDEST NARROWEST HIGHEST LOWEST DEEPEST SHALLOWEST HOTTEST COLDEST WARMEST COOLEST DRYEST WETTEST HARDEST SOFTEST ROUGHEST SMOOTHEST BEST WORST GREATEST LEAST MOST ALL SOME NONE FEW MANY SEVERAL COUPLE DOZEN SCORE HUNDRED MILLION BILLION".split(" ").filter(w => w.length >= 2 && w.length <= 7);

        // --- HELPER FUNCTIONS ---
        
        const createInitialBag = () => {
          let bag = [];
          Object.keys(TILE_DATA).forEach(letter => {
            for (let i = 0; i < TILE_DATA[letter].count; i++) {
              bag.push({ id: `${letter}-${Math.random()}`, letter, value: TILE_DATA[letter].value });
            }
          });
          for (let i = bag.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [bag[i], bag[j]] = [bag[j], bag[i]];
          }
          return bag;
        };

        const getTilesForESL = (neededCount, currentBag) => {
          let pulled = [];
          let tempBag = [...currentBag];

          // Use the top 50 most common words as the "Smart Dealer" seed so players always get good starting letters
          const SMART_DEALER_WORDS = EMBEDDED_DICTIONARY.slice(0, 50);

          if (neededCount >= 3 && tempBag.length > neededCount) {
            const possibleWords = SMART_DEALER_WORDS.filter(w => w.length >= 3 && w.length <= neededCount);
            if (possibleWords.length > 0) {
              const targetWord = possibleWords[Math.floor(Math.random() * possibleWords.length)];
              for (let i = 0; i < targetWord.length; i++) {
                const char = targetWord[i];
                const bagIndex = tempBag.findIndex(t => t.letter === char);
                if (bagIndex !== -1) pulled.push(tempBag.splice(bagIndex, 1)[0]);
              }
            }
          }

          while (pulled.length < neededCount && tempBag.length > 0) {
            pulled.push(tempBag.shift());
          }

          for (let i = pulled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [pulled[i], pulled[j]] = [pulled[j], pulled[i]];
          }

          return { newRackLetters: pulled, newBag: tempBag };
        };

        const getSquareColor = (type) => {
          switch (type) {
            case 'T': return 'bg-red-500 text-white'; 
            case 'D': return 'bg-pink-400 text-white'; 
            case 't': return 'bg-blue-600 text-white'; 
            case 'd': return 'bg-blue-300 text-blue-900'; 
            case '*': return 'bg-pink-500 text-white'; 
            default: return 'bg-[#E5E4E2] text-gray-400';
          }
        };

        const getSquareLabel = (type) => {
          switch (type) {
            case 'T': return 'TW';
            case 'D': return 'DW';
            case 't': return 'TL';
            case 'd': return 'DL';
            case '*': return '★';
            default: return '';
          }
        };

        function App() {
          const [bag, setBag] = useState([]);
          const [board, setBoard] = useState([]);
          const [players, setPlayers] = useState([
            { id: 0, name: "Red", score: 0, rack: [], color: "border-red-500", bg: "bg-red-950", accent: "text-red-400" },
            { id: 1, name: "Blue", score: 0, rack: [], color: "border-blue-500", bg: "bg-blue-950", accent: "text-blue-400" },
            { id: 2, name: "Green", score: 0, rack: [], color: "border-green-500", bg: "bg-green-950", accent: "text-green-400" },
            { id: 3, name: "Yellow", score: 0, rack: [], color: "border-yellow-500", bg: "bg-yellow-950", accent: "text-yellow-400" },
          ]);
          const [currentTurn, setCurrentTurn] = useState(0);
          
          const [selectedRackIndex, setSelectedRackIndex] = useState(null);
          const [placedThisTurn, setPlacedThisTurn] = useState([]); 
          const [showWordBank, setShowWordBank] = useState(false);

          useEffect(() => {
            let currentBag = createInitialBag();
            let initialPlayers = [...players];
            
            for (let p = 0; p < 4; p++) {
              const { newRackLetters, newBag } = getTilesForESL(7, currentBag);
              initialPlayers[p].rack = newRackLetters;
              currentBag = newBag;
            }
            
            let initialBoard = [];
            for (let r = 0; r < 15; r++) {
              let row = [];
              for (let c = 0; c < 15; c++) {
                row.push({ type: BOARD_LAYOUT[r][c], tile: null });
              }
              initialBoard.push(row);
            }

            setBag(currentBag);
            setPlayers(initialPlayers);
            setBoard(initialBoard);
          }, []);

          // --- AI HINT GENERATOR (Now Uses the Embedded Offline Dictionary!) ---
          const suggestedWords = useMemo(() => {
            if (players.length === 0) return [];
            
            // Pool ALL tiles currently held by ALL 4 teams
            const allRacks = players.flatMap(p => p.rack).filter(t => t !== null);
            const rackLetters = allRacks.map(t => t.letter);
            const blanksCount = rackLetters.filter(l => l === '_').length;
            const availableLetters = rackLetters.filter(l => l !== '_');

            let foundWords = [];
            
            // Search the embedded dictionary top to bottom (Most frequent to least frequent)
            for (let i = 0; i < EMBEDDED_DICTIONARY.length; i++) {
              const word = EMBEDDED_DICTIONARY[i];
              let tempAvailable = [...availableLetters];
              let tempBlanks = blanksCount;
              let canMake = true;
              
              for (let j = 0; j < word.length; j++) {
                const char = word[j];
                const index = tempAvailable.indexOf(char);
                if (index !== -1) {
                  tempAvailable.splice(index, 1); 
                } else if (tempBlanks > 0) {
                  tempBlanks--; 
                } else {
                  canMake = false;
                  break; 
                }
              }

              if (canMake) {
                foundWords.push(word);
              }

              // Stop after finding the 30 most common words so we don't overwhelm the student
              if (foundWords.length >= 30) break;
            }

            return foundWords;
          }, [players]);

          const handleRackClick = (playerIndex, tileIndex) => {
            if (playerIndex !== currentTurn) return; 
            if (selectedRackIndex === tileIndex) setSelectedRackIndex(null); 
            else setSelectedRackIndex(tileIndex);
          };

          const handleBoardClick = (row, col) => {
            const square = board[row][col];
            const player = players[currentTurn];

            if (selectedRackIndex !== null && square.tile === null) {
              const tileToPlace = player.rack[selectedRackIndex];
              const newBoard = [...board];
              newBoard[row][col] = { ...square, tile: tileToPlace };
              setBoard(newBoard);
              setPlacedThisTurn([...placedThisTurn, { row, col, tile: tileToPlace, originalRackIndex: selectedRackIndex }]);
              
              const newPlayers = [...players];
              newPlayers[currentTurn].rack[selectedRackIndex] = null; 
              setPlayers(newPlayers);
              setSelectedRackIndex(null);
            } 
            else if (square.tile !== null) {
              const placementIndex = placedThisTurn.findIndex(p => p.row === row && p.col === col);
              if (placementIndex !== -1) {
                const placementInfo = placedThisTurn[placementIndex];
                const newBoard = [...board];
                newBoard[row][col] = { ...square, tile: null };
                setBoard(newBoard);

                const newPlayers = [...players];
                newPlayers[currentTurn].rack[placementInfo.originalRackIndex] = placementInfo.tile;
                setPlayers(newPlayers);

                const newPlaced = [...placedThisTurn];
                newPlaced.splice(placementIndex, 1);
                setPlacedThisTurn(newPlaced);
              }
            }
          };

          const recallAll = () => {
            if (placedThisTurn.length === 0) return;
            const newBoard = [...board];
            const newPlayers = [...players];
            placedThisTurn.forEach(p => {
              newBoard[p.row][p.col].tile = null;
              newPlayers[currentTurn].rack[p.originalRackIndex] = p.tile;
            });
            setBoard(newBoard);
            setPlayers(newPlayers);
            setPlacedThisTurn([]);
            setSelectedRackIndex(null);
          };

          const calculateScoreAndPlay = () => {
            if (placedThisTurn.length === 0) return;
            let turnScore = 0;
            let wordMultiplier = 1;

            placedThisTurn.forEach(p => {
              let letterVal = p.tile.value;
              const sqType = board[p.row][p.col].type;
              if (sqType === 'd') letterVal *= 2;
              if (sqType === 't') letterVal *= 3;
              turnScore += letterVal;
              if (sqType === 'D' || sqType === '*') wordMultiplier *= 2;
              if (sqType === 'T') wordMultiplier *= 3;
            });

            turnScore *= wordMultiplier;
            if (placedThisTurn.length === 7) turnScore += 50;
            commitTurn(turnScore);
          };

          const passTurn = () => {
            recallAll(); 
            commitTurn(0);
          };

          const commitTurn = (scoreEarned) => {
            const newPlayers = [...players];
            let currentBag = [...bag];
            
            newPlayers[currentTurn].score += scoreEarned;

            let newRack = newPlayers[currentTurn].rack.filter(t => t !== null);
            const neededTilesCount = 7 - newRack.length;

            if (neededTilesCount > 0 && currentBag.length > 0) {
              const { newRackLetters, newBag } = getTilesForESL(neededTilesCount, currentBag);
              newRack = [...newRack, ...newRackLetters];
              currentBag = newBag;
            }
            
            newPlayers[currentTurn].rack = newRack;

            setPlayers(newPlayers);
            setBag(currentBag);
            setPlacedThisTurn([]);
            setSelectedRackIndex(null);
            setCurrentTurn((currentTurn + 1) % 4);
          };

          const PlayerZone = ({ player }) => {
            const isActive = currentTurn === player.id;
            return (
              <div className={`relative w-full md:w-full p-2 rounded-xl border-[3px] transition-all duration-300 shrink-0
                              ${isActive ? `${player.color} shadow-[0_0_15px_rgba(255,255,255,0.4)] bg-gray-800 z-10 scale-[1.02]` : `border-transparent ${player.bg} opacity-80`}
              `}>
                <div className="flex justify-between items-center mb-2">
                  <h2 className="text-[10px] sm:text-xs font-bold truncate pr-1">{player.name}</h2>
                  <span className="text-xs sm:text-sm font-mono bg-black px-1.5 py-0.5 rounded">{player.score}</span>
                </div>
                
                <div className="grid grid-cols-4 gap-1 place-items-center min-h-[3rem]">
                  {player.rack.map((tile, idx) => {
                    if (!tile) return <div key={idx} className="w-6 h-6 sm:w-8 sm:h-8 opacity-20 bg-black rounded" />;
                    const isSelected = selectedRackIndex === idx && isActive;
                    return (
                      <button
                        key={tile.id}
                        onClick={() => handleRackClick(player.id, idx)}
                        className={`relative w-6 h-6 sm:w-8 sm:h-8 rounded shadow-md flex items-center justify-center text-black font-bold transition-transform
                          ${isSelected ? 'bg-yellow-300 -translate-y-2 scale-110' : (isActive ? 'bg-[#f5e6c4] hover:bg-white' : 'bg-[#e3cda8] cursor-not-allowed')}
                        `}
                      >
                        <span className="text-xs sm:text-base leading-none -mt-1 -ml-1">{tile.letter === '_' ? '' : tile.letter}</span>
                        <span className="absolute bottom-0.5 right-[2px] text-[7px] sm:text-[9px] text-gray-700 leading-none">{tile.value}</span>
                      </button>
                    );
                  })}
                </div>

                {isActive && (
                  <div className="mt-2 flex flex-col xl:flex-row gap-1 justify-center">
                    {placedThisTurn.length > 0 ? (
                      <React.Fragment>
                        <button onClick={recallAll} className="bg-red-600 hover:bg-red-500 text-white text-[10px] sm:text-xs px-2 py-1 rounded w-full">Recall</button>
                        <button onClick={calculateScoreAndPlay} className="bg-green-600 hover:bg-green-500 text-white text-[10px] sm:text-xs px-2 py-1 rounded font-bold w-full">Play</button>
                      </React.Fragment>
                    ) : (
                      <button onClick={passTurn} className="bg-gray-600 hover:bg-gray-500 text-white text-[10px] sm:text-xs px-2 py-1 rounded w-full">Pass</button>
                    )}
                  </div>
                )}
              </div>
            );
          };

          if (board.length === 0) return <div className="text-white p-10">Loading Game Board...</div>;
          
          return (
            <div className="relative w-full h-screen bg-neutral-900 overflow-hidden font-sans text-white select-none flex flex-col md:flex-row">
              
              <div className="absolute inset-0 opacity-10 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-white to-transparent pointer-events-none" />

              {/* Player Side Panel + Word Bank */}
              <div className="w-full md:w-48 lg:w-56 h-auto md:h-full flex flex-row md:flex-col overflow-x-auto md:overflow-y-hidden bg-black/50 border-b md:border-b-0 md:border-r border-neutral-800 z-10 shrink-0 shadow-2xl relative">
                
                {/* Scrollable Players Area */}
                <div className="flex flex-row md:flex-col p-2 gap-2 overflow-auto">
                  <PlayerZone player={players[0]} />
                  <PlayerZone player={players[1]} />
                  <PlayerZone player={players[2]} />
                  <PlayerZone player={players[3]} />
                </div>

                {/* THE WORD BANK DRAWER */}
                <div className="md:mt-auto border-l md:border-l-0 md:border-t border-neutral-700 bg-neutral-900/90 flex flex-col shrink-0 min-w-[150px] md:min-w-full transition-all duration-300">
                  <button 
                    onClick={() => setShowWordBank(!showWordBank)}
                    className="w-full p-2 text-[10px] sm:text-xs font-bold text-gray-300 hover:text-white hover:bg-neutral-800 transition-colors flex items-center justify-center gap-2"
                  >
                    <span>{showWordBank ? '▼ Close Word Bank' : '▲ Open Word Bank'}</span>
                  </button>
                  
                  {/* Expanded Content */}
                  {showWordBank && (
                    <div className="p-3 text-xs overflow-y-auto max-h-32 md:max-h-64 flex flex-col gap-3 custom-scrollbar">
                      <div>
                        <h3 className="font-bold border-b border-gray-700 pb-1 mb-2 text-indigo-400">
                          Classroom ESL Dictionary
                        </h3>
                        
                        {suggestedWords.length > 0 ? (
                          <>
                            <p className="text-gray-400 text-[9px] mb-2">Showing the most common everyday words the class can spell right now:</p>
                            <div className="flex flex-wrap gap-1">
                              {suggestedWords.map((word, i) => (
                                <span key={i} className="bg-neutral-800 text-gray-200 px-1.5 py-0.5 rounded border border-neutral-700">
                                  {word}
                                </span>
                              ))}
                            </div>
                          </>
                        ) : (
                          <p className="text-gray-500 italic">No common words found.</p>
                        )}
                      </div>

                      {/* Mocked Future Words Logic */}
                      <div>
                        <h3 className="font-bold border-b border-gray-700 pb-1 mb-2 text-indigo-400">
                          Board Connections
                        </h3>
                        {suggestedWords.length > 0 ? (
                          <p className="text-gray-400 leading-tight">
                            Try connecting <strong className="text-white">{suggestedWords[0]}</strong> to an existing letter on the board to form a longer word!
                          </p>
                        ) : (
                          <p className="text-gray-500 italic">Place a word on the board first.</p>
                        )}
                      </div>
                    </div>
                  )}
                </div>
              </div>

              {/* Main Game Area */}
              <div className="flex-1 relative flex flex-col items-center justify-center p-2 sm:p-4 overflow-hidden h-full">
                
                <div className="text-center text-xs sm:text-sm font-semibold tracking-widest text-yellow-500 uppercase mb-2">
                  Letters left in main bag: {bag.length} / 100
                </div>

                <div 
                  className="relative bg-yellow-900 rounded-lg shadow-2xl border-[3px] border-yellow-800 aspect-square flex flex-col p-0.5 sm:p-1"
                  style={{ width: '100%', maxWidth: 'min(100%, calc(100vh - 4rem))', maxHeight: '100%' }}
                >
                  <div 
                    className="w-full h-full grid gap-[1px] bg-yellow-900" 
                    style={{ gridTemplateColumns: 'repeat(15, minmax(0, 1fr))', gridTemplateRows: 'repeat(15, minmax(0, 1fr))' }}
                  >
                    {board.map((row, rIndex) => (
                      <div key={rIndex} className="contents">
                        {row.map((square, cIndex) => {
                          const isPlacedThisTurn = placedThisTurn.some(p => p.row === rIndex && p.col === cIndex);
                          return (
                            <div 
                              key={`${rIndex}-${cIndex}`}
                              onClick={() => handleBoardClick(rIndex, cIndex)}
                              className={`
                                w-full h-full relative flex items-center justify-center font-bold rounded-[1px] cursor-pointer
                                ${square.tile ? '' : getSquareColor(square.type)}
                                ${selectedRackIndex !== null && !square.tile ? 'hover:bg-yellow-200' : ''}
                              `}
                            >
                              {!square.tile && (
                                <span className="text-[6px] sm:text-[8px] md:text-[10px] opacity-70 pointer-events-none leading-none">
                                  {getSquareLabel(square.type)}
                                </span>
                              )}
                              {square.tile && (
                                <div className={`
                                  absolute inset-0 bg-[#f5e6c4] text-black rounded-[1px] shadow-sm flex items-center justify-center
                                  ${isPlacedThisTurn ? 'border-[1.5px] border-green-500 shadow-[0_0_8px_#22c55e] z-10 animate-pulse' : 'border border-[#d1bfae]'}
                                `}>
                                  <span className="text-xs sm:text-sm md:text-lg leading-none -mt-1 -ml-1">{square.tile.letter === '_' ? '' : square.tile.letter}</span>
                                  <span className="absolute bottom-[1px] right-[2px] text-[5px] sm:text-[7px] text-gray-700 leading-none">{square.tile.value}</span>
                                </div>
                              )}
                            </div>
                          );
                        })}
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
