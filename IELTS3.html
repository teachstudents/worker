<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IELTS Learning Dashboard</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
        .animate-pop-in { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .animate-slide-up { animation: slideUp 0.4s ease-out; }
        
        @keyframes fadeIn { 
            from { opacity: 0; } 
            to { opacity: 1; } 
        }
        @keyframes popIn { 
            from { 
                opacity: 0; 
                transform: scale(0.9) rotateX(10deg); 
            } 
            to { 
                opacity: 1; 
                transform: scale(1) rotateX(0deg); 
            } 
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .unit-card {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: white;
            border-radius: 12px;
            position: relative;
            overflow: hidden;
        }

        .unit-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2);
        }

        .unit-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(102, 126, 234, 0.3);
        }

        .quiz-button {
            transition: all 0.2s ease;
        }

        .quiz-button:hover {
            transform: scale(1.05);
        }

        .quiz-button:active {
            transform: scale(0.98);
        }

        .vocab-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }

        .progress-bar {
            background: #e5e7eb;
            height: 8px;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, #667eea, #764ba2);
            height: 100%;
            border-radius: 10px;
            transition: width 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .score-display {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
        }

        .button-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .button-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .button-secondary {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
            border-radius: 8px;
            padding: 12px 24px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .button-secondary:hover {
            background: #667eea;
            color: white;
        }

        .stat-box {
            background: white;
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            margin-bottom: 24px;
        }

        .back-button:hover {
            transform: translateX(-4px);
            opacity: 0.8;
        }

        .mcq-option {
            background: white;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        .mcq-option:hover {
            border-color: #667eea;
            background: #f3f4f6;
        }

        .mcq-option.selected {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
        }

        .vocab-word-button {
            padding: 8px 16px;
            border-radius: 6px;
            border: 2px solid #e5e7eb;
            background: white;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        .vocab-word-button:hover {
            border-color: #667eea;
        }

        .vocab-word-button.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .header-title {
            font-size: 3.5rem;
            font-weight: 700;
            color: white;
            margin-bottom: 8px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .header-subtitle {
            font-size: 1.25rem;
            color: rgba(255, 255, 255, 0.9);
        }

        .unit-icon {
            width: 64px;
            height: 64px;
            border-radius: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: white;
        }

        .skill-badge {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-right: 8px;
            margin-bottom: 8px;
        }

        .correct-answer {
            background: #d1fae5 !important;
            border-color: #10b981 !important;
            color: #065f46 !important;
        }

        .wrong-answer {
            background: #fee2e2 !important;
            border-color: #ef4444 !important;
            color: #7f1d1d !important;
        }

        .container-main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Enhanced Unit Data
        const unitData = [
          {
            id: 1,
            title: "Family",
            icon: "fa-solid fa-heart",
            color: "from-red-400 to-red-600",
            skills: ["Listening", "Speaking", "Grammar", "Vocabulary"],
            content: "Learn family relationships, speaking about relatives, and develop vocabulary for describing family dynamics.",
            vocabulary: [
              { word: "Sibling", chinese: "兄弟姐妹", definition: "A brother or sister." },
              { word: "Extended family", chinese: "大家庭", definition: "A family that extends beyond the nuclear family." },
              { word: "Adolescent", chinese: "青少年", definition: "A young person developing from a child into an adult." },
              { word: "Supportive", chinese: "支持的", definition: "Providing encouragement or emotional help." },
              { word: "Nuclear family", chinese: "核心家庭", definition: "A couple and their dependent children." },
              { word: "Generation gap", chinese: "代沟", definition: "Differences of outlook between generations." }
            ],
            mcqs: [
              { q: "Which word means 'a brother or sister'?", options: ["Adolescent", "Relative", "Sibling", "In-law"], answer: 2 },
              { q: "A family with only parents and their dependent children is a...", options: ["Extended family", "Nuclear family", "Single-parent family", "Generation gap"], answer: 1 },
              { q: "What does 'supportive' mean?", options: ["Strict", "Friendly", "Providing encouragement", "Distant"], answer: 2 },
              { q: "The difference in views between old and young is called...", options: ["Family conflict", "Generation gap", "Age difference", "Cultural gap"], answer: 1 }
            ]
          },
          {
            id: 2,
            title: "Leisure",
            icon: "fa-regular fa-circle-play",
            color: "from-blue-400 to-blue-600",
            skills: ["Reading", "Writing", "Listening", "Vocabulary"],
            content: "Explore hobbies, sports, and recreational activities. Master vocabulary for pastimes and entertainment.",
            vocabulary: [
              { word: "Recreation", chinese: "娱乐", definition: "Activity done for enjoyment when one is not working." },
              { word: "Amateur", chinese: "业余爱好者", definition: "A person who engages in a pursuit on an unpaid basis." },
              { word: "Tournament", chinese: "锦标赛", definition: "A sporting competition in which contestants play a series of games." },
              { word: "Pastime", chinese: "消遣", definition: "An activity that someone does regularly for enjoyment." },
              { word: "Enthusiast", chinese: "爱好者", definition: "A person who is highly interested in an activity." },
              { word: "Unwind", chinese: "放松", definition: "Relax after a period of work or tension." }
            ],
            mcqs: [
              { q: "Which word means 'to relax after work'?", options: ["Participate", "Indulge", "Unwind", "Fascinate"], answer: 2 },
              { q: "An activity done regularly for enjoyment is a...", options: ["Pastime", "Tournament", "Amateur", "Recreation"], answer: 0 },
              { q: "A person who is highly interested in an activity is an...", options: ["Expert", "Enthusiast", "Professional", "Trainer"], answer: 1 },
              { q: "What is a tournament?", options: ["A hobby", "A sporting competition", "A club meeting", "A practice session"], answer: 1 }
            ]
          },
          {
            id: 3,
            title: "Different Cultures",
            icon: "fa-solid fa-globe",
            color: "from-green-400 to-green-600",
            skills: ["Speaking", "Reading", "Grammar", "Listening"],
            content: "Compare cultures, traditions, and customs. Understand cultural diversity and international perspectives.",
            vocabulary: [
              { word: "Custom", chinese: "风俗", definition: "A traditional and widely accepted way of behaving." },
              { word: "Diverse", chinese: "多样的", definition: "Showing a great deal of variety; very different." },
              { word: "Heritage", chinese: "遗产", definition: "Traditions passed down from generation to generation." },
              { word: "Tradition", chinese: "传统", definition: "The transmission of customs or beliefs." },
              { word: "Etiquette", chinese: "礼仪", definition: "The customary code of polite behavior in society." },
              { word: "Integration", chinese: "融合", definition: "The action or process of combining or uniting." }
            ],
            mcqs: [
              { q: "The customary code of polite behavior is called...", options: ["Heritage", "Stereotype", "Etiquette", "Integration"], answer: 2 },
              { q: "Showing a great deal of variety means being...", options: ["Custom", "Diverse", "Traditional", "Values"], answer: 1 },
              { q: "What is a cultural tradition?", options: ["A modern invention", "Customs passed down through generations", "A government law", "A business practice"], answer: 1 },
              { q: "Cultural heritage includes...", options: ["Money only", "Beliefs, customs, and traditions", "Technology", "Languages only"], answer: 1 }
            ]
          },
          {
            id: 4,
            title: "Places to Live",
            icon: "fa-solid fa-map",
            color: "from-yellow-400 to-yellow-600",
            skills: ["Listening", "Writing", "Speaking", "Reading"],
            content: "Learn about different living environments, campus life, and community features. Develop descriptive language.",
            vocabulary: [
              { word: "Accommodation", chinese: "住宿", definition: "A place where someone may live or stay." },
              { word: "Campus", chinese: "校园", definition: "The grounds and buildings of a university or college." },
              { word: "Urban", chinese: "城市的", definition: "Relating to or characteristic of a city or town." },
              { word: "Suburb", chinese: "郊区", definition: "An outlying district of a city, especially a residential one." },
              { word: "Amenities", chinese: "便利设施", definition: "Desirable features or facilities of a building or place." },
              { word: "Commute", chinese: "通勤", definition: "Travel some distance between one's home and place of work." }
            ],
            mcqs: [
              { q: "Which word describes a district outside the city center?", options: ["Urban", "Campus", "Suburb", "Amenities"], answer: 2 },
              { q: "Desirable features of a building are called...", options: ["Commutes", "Amenities", "Neighbourhoods", "Rural"], answer: 1 },
              { q: "What is a campus?", options: ["A city center", "University grounds and buildings", "A residential area", "A commercial district"], answer: 1 },
              { q: "To commute means to...", options: ["Live somewhere", "Travel regularly to work", "Build a home", "Plant seeds"], answer: 1 }
            ]
          }
        ];

        // Quiz Component
        function QuizComponent({ unit, onClose }) {
          const [currentQuestion, setCurrentQuestion] = useState(0);
          const [score, setScore] = useState(0);
          const [showResult, setShowResult] = useState(false);
          const [selectedAnswer, setSelectedAnswer] = useState(null);
          const [answered, setAnswered] = useState(false);

          const handleAnswer = (index) => {
            setSelectedAnswer(index);
            setAnswered(true);

            if (index === unit.mcqs[currentQuestion].answer) {
              setScore(score + 1);
            }
          };

          const nextQuestion = () => {
            if (currentQuestion + 1 < unit.mcqs.length) {
              setCurrentQuestion(currentQuestion + 1);
              setSelectedAnswer(null);
              setAnswered(false);
            } else {
              setShowResult(true);
            }
          };

          const restartQuiz = () => {
            setCurrentQuestion(0);
            setScore(0);
            setShowResult(false);
            setSelectedAnswer(null);
            setAnswered(false);
          };

          const progress = ((currentQuestion + 1) / unit.mcqs.length) * 100;

          if (showResult) {
            const percentage = Math.round((score / unit.mcqs.length) * 100);
            return (
              <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4 animate-fade-in">
                <div className="bg-white rounded-16 p-8 max-w-md w-full animate-pop-in">
                  <div className="score-display mb-6">
                    <div className="stat-number text-5xl mb-2">{score}/{unit.mcqs.length}</div>
                    <div className="text-lg font-semibold mb-2">Quiz Complete!</div>
                    <div className="text-base opacity-90">You scored {percentage}%</div>
                  </div>

                  <div className="text-center mb-6">
                    {percentage >= 80 && <p className="text-green-600 font-semibold">Excellent work! 🎉</p>}
                    {percentage >= 60 && percentage < 80 && <p className="text-blue-600 font-semibold">Good job! Keep practicing 💪</p>}
                    {percentage < 60 && <p className="text-orange-600 font-semibold">Review the material and try again 📚</p>}
                  </div>

                  <div className="flex gap-3">
                    <button
                      onClick={restartQuiz}
                      className="flex-1 button-primary"
                    >
                      Retry Quiz
                    </button>
                    <button
                      onClick={onClose}
                      className="flex-1 button-secondary"
                    >
                      Back
                    </button>
                  </div>
                </div>
              </div>
            );
          }

          return (
            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4 animate-fade-in">
              <div className="bg-white rounded-16 p-8 max-w-2xl w-full max-h-96 overflow-y-auto animate-pop-in">
                <div className="flex justify-between items-center mb-4">
                  <h2 className="text-2xl font-bold">Question {currentQuestion + 1}/{unit.mcqs.length}</h2>
                  <button
                    onClick={onClose}
                    className="text-2xl text-gray-500 hover:text-gray-700"
                  >
                    ×
                  </button>
                </div>

                <div className="progress-bar mb-6">
                  <div className="progress-fill" style={{ width: `${progress}%` }}></div>
                </div>

                <p className="text-lg font-semibold mb-6 text-gray-800">
                  {unit.mcqs[currentQuestion].q}
                </p>

                <div className="space-y-3 mb-6">
                  {unit.mcqs[currentQuestion].options.map((option, index) => (
                    <button
                      key={index}
                      onClick={() => !answered && handleAnswer(index)}
                      className={`mcq-option w-full text-left ${
                        selectedAnswer === index
                          ? index === unit.mcqs[currentQuestion].answer
                            ? 'correct-answer'
                            : 'wrong-answer'
                          : ''
                      } ${answered && index === unit.mcqs[currentQuestion].answer ? 'correct-answer' : ''}`}
                      disabled={answered}
                    >
                      <div className="flex items-center gap-3">
                        <div className="w-5 h-5 border-2 border-current rounded-full flex items-center justify-center">
                          {selectedAnswer === index && <div className="w-3 h-3 bg-current rounded-full"></div>}
                        </div>
                        <span>{option}</span>
                      </div>
                    </button>
                  ))}
                </div>

                {answered && (
                  <button
                    onClick={nextQuestion}
                    className="w-full button-primary"
                  >
                    {currentQuestion + 1 === unit.mcqs.length ? 'See Results' : 'Next Question'}
                  </button>
                )}
              </div>
            </div>
          );
        }

        // Vocabulary Component
        function VocabularyComponent({ unit }) {
          const [selected, setSelected] = useState(0);

          return (
            <div className="glass-effect p-8 animate-slide-up">
              <h3 className="text-2xl font-bold mb-6 text-gray-800">📚 Vocabulary</h3>

              <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-2 mb-8">
                {unit.vocabulary.map((item, idx) => (
                  <button
                    key={idx}
                    onClick={() => setSelected(idx)}
                    className={`vocab-word-button ${selected === idx ? 'active' : ''}`}
                  >
                    {item.word}
                  </button>
                ))}
              </div>

              <div className="vocab-card animate-fade-in">
                <div className="text-4xl font-bold mb-2">{unit.vocabulary[selected].word}</div>
                <div className="text-sm opacity-90 mb-4">Chinese: {unit.vocabulary[selected].chinese}</div>
                <div className="text-base leading-relaxed">{unit.vocabulary[selected].definition}</div>
              </div>
            </div>
          );
        }

        // Unit Detail View
        function UnitDetail({ unit, onBack }) {
          const [showQuiz, setShowQuiz] = useState(false);

          return (
            <div className="container-main animate-fade-in">
              <button onClick={onBack} className="back-button">
                <i className="fas fa-arrow-left"></i> Back to Units
              </button>

              <div className="glass-effect p-8 mb-8 animate-slide-up">
                <div className="flex items-start gap-6 mb-6">
                  <div className={`unit-icon bg-gradient-to-br ${unit.color}`}>
                    <i className={unit.icon}></i>
                  </div>
                  <div className="flex-1">
                    <h1 className="text-4xl font-bold text-gray-800 mb-2">{unit.title}</h1>
                    <p className="text-gray-600 text-lg mb-4">{unit.content}</p>
                    <div className="flex flex-wrap gap-2">
                      {unit.skills.map((skill, idx) => (
                        <span key={idx} className="skill-badge">{skill}</span>
                      ))}
                    </div>
                  </div>
                </div>

                <button
                  onClick={() => setShowQuiz(true)}
                  className="button-primary mt-4"
                >
                  <i className="fas fa-play mr-2"></i> Start Quiz
                </button>
              </div>

              <VocabularyComponent unit={unit} />

              {showQuiz && (
                <QuizComponent unit={unit} onClose={() => setShowQuiz(false)} />
              )}
            </div>
          );
        }

        // Main Dashboard
        function Dashboard() {
          const [selectedUnit, setSelectedUnit] = useState(null);

          if (selectedUnit) {
            return (
              <UnitDetail
                unit={unitData[selectedUnit - 1]}
                onBack={() => setSelectedUnit(null)}
              />
            );
          }

          return (
            <div className="min-h-screen">
              <div className="container-main">
                {/* Header */}
                <div className="mb-12 text-center animate-slide-up">
                  <h1 className="header-title">IELTS Mastery</h1>
                  <p className="header-subtitle">Master vocabulary and ace your IELTS exam</p>
                </div>

                {/* Units Grid */}
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-12">
                  {unitData.map((unit, idx) => (
                    <div
                      key={unit.id}
                      style={{ animationDelay: `${idx * 0.1}s` }}
                      className="unit-card p-6 cursor-pointer animate-slide-up"
                      onClick={() => setSelectedUnit(unit.id)}
                    >
                      <div className="flex items-start justify-between mb-4">
                        <div className={`unit-icon bg-gradient-to-br ${unit.color}`}>
                          <i className={unit.icon}></i>
                        </div>
                        <span className="text-3xl opacity-10">#{unit.id}</span>
                      </div>

                      <h3 className="text-2xl font-bold text-gray-800 mb-2">{unit.title}</h3>
                      <p className="text-gray-600 text-sm mb-4 line-clamp-2">{unit.content}</p>

                      <div className="mb-4">
                        <div className="flex flex-wrap gap-1">
                          {unit.skills.slice(0, 3).map((skill, idx) => (
                            <span key={idx} className="text-xs bg-gray-100 text-gray-700 px-2 py-1 rounded-full">
                              {skill}
                            </span>
                          ))}
                          {unit.skills.length > 3 && (
                            <span className="text-xs bg-gray-100 text-gray-700 px-2 py-1 rounded-full">
                              +{unit.skills.length - 3}
                            </span>
                          )}
                        </div>
                      </div>

                      <div className="flex items-center justify-between text-sm text-gray-500 mb-4 pt-4 border-t">
                        <span>📚 {unit.vocabulary.length} words</span>
                        <span>❓ {unit.mcqs.length} questions</span>
                      </div>

                      <button className={`w-full button-primary`}>
                        Start Learning <i className="fas fa-arrow-right ml-2"></i>
                      </button>
                    </div>
                  ))}
                </div>

                {/* Stats */}
                <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                  <div className="stat-box animate-slide-up" style={{ animationDelay: '0.1s' }}>
                    <div className="stat-number">{unitData.length}</div>
                    <p className="text-gray-600 mt-2">Learning Units</p>
                  </div>
                  <div className="stat-box animate-slide-up" style={{ animationDelay: '0.2s' }}>
                    <div className="stat-number">{unitData.reduce((sum, u) => sum + u.vocabulary.length, 0)}</div>
                    <p className="text-gray-600 mt-2">Vocabulary Words</p>
                  </div>
                  <div className="stat-box animate-slide-up" style={{ animationDelay: '0.3s' }}>
                    <div className="stat-number">{unitData.reduce((sum, u) => sum + u.mcqs.length, 0)}</div>
                    <p className="text-gray-600 mt-2">Practice Questions</p>
                  </div>
                </div>

                {/* Footer */}
                <div className="glass-effect p-8 text-center animate-slide-up">
                  <p className="text-gray-700 font-semibold">
                    <i className="fas fa-lightbulb text-yellow-500 mr-2"></i>
                    Start with any unit and track your progress as you master IELTS vocabulary!
                  </p>
                </div>
              </div>
            </div>
          );
        }

        // Render
        ReactDOM.render(<Dashboard />, document.getElementById('root'));
    </script>
</body>
</html>
