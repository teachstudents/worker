        // --- Vocabulary MCQ Component (Interactive 2x2 Grid) ---
        const UnitQuiz = ({ mcqs, handleSpeak }) => {
          const [selectedAnswers, setSelectedAnswers] = useState({});
          const [feedback, setFeedback] = useState({});
          const [showExtended, setShowExtended] = useState(false);

          const handleOptionClick = (questionIndex, optionIndex, correctAnswerIndex) => {
            setSelectedAnswers({ ...selectedAnswers, [questionIndex]: optionIndex });
            setFeedback({ ...feedback, [questionIndex]: optionIndex === correctAnswerIndex });
          };

          if (!mcqs || mcqs.length === 0) return null;

          const displayedMcqs = showExtended ? mcqs : mcqs.slice(0, 5);

          return (
            <div className="bg-slate-900 p-6 md:p-8 rounded-2xl shadow-md border border-slate-800 mt-8">
              <div className="flex items-center gap-3 mb-6">
                <div className="bg-teal-500/20 p-2 rounded-lg border border-teal-500/30">
                  <i className="fa-regular fa-circle-question text-teal-400 text-2xl"></i>
                </div>
                <h3 className="text-xl font-bold text-white">Unit Quiz: Vocabulary & Grammar</h3>
              </div>

                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                      {mcq.options.map((opt, optIdx) => {
                        const isSelected = selectedAnswers[qIdx] === optIdx;
                        const isCorrect = mcq.answer === optIdx;
                        const hasAnswered = selectedAnswers[qIdx] !== undefined;
                        
                        let btnStyle = "bg-slate-700 text-slate-300 hover:bg-slate-600 border-transparent";
                        if (hasAnswered) {
                          if (isCorrect) btnStyle = "bg-green-900/40 text-green-400 border-green-500/50";
                          else if (isSelected && !isCorrect) btnStyle = "bg-rose-900/40 text-rose-400 border-rose-500/50";
                          else btnStyle = "bg-slate-800 text-slate-500 border-transparent opacity-50";
                        }

                        return (
                          <button
                            key={optIdx}
                            disabled={hasAnswered}
                            onClick={() => {
                              handleSpeak(opt);
                              handleOptionClick(qIdx, optIdx, mcq.answer);
                            }}
                            className={`w-full text-left px-5 py-4 rounded-xl border-2 transition-all text-sm font-medium ${btnStyle}`}
                          >

        // --- FULL SCREEN PRACTICE GAME ---
        const PracticeGamePage = ({ vocabulary, unitTitle, onExit, handleSpeak }) => {
          const itemsPerRound = 5;
          const totalRounds = Math.ceil(vocabulary.length / itemsPerRound);
          
          const [round, setRound] = useState(0);
          const [selectedWord, setSelectedWord] = useState(null);
          const [matchedPairs, setMatchedPairs] = useState([]);
          const [definitions, setDefinitions] = useState([]);
          const [roundComplete, setRoundComplete] = useState(false);

          // Get the vocabulary for the current round
          const currentVocab = vocabulary.slice(round * itemsPerRound, (round + 1) * itemsPerRound);

          // Initialize and shuffle definitions whenever the round changes
          useEffect(() => {
            setDefinitions([...currentVocab].sort(() => Math.random() - 0.5));
            setMatchedPairs([]);
            setSelectedWord(null);
            setRoundComplete(false);
          }, [round, vocabulary]);

          const handleWordClick = (word) => {
            if (matchedPairs.includes(word)) return;
            handleSpeak(word);
            setSelectedWord(word);
          };

          const handleDefClick = (defObj) => {
            if (!selectedWord) return;
            handleSpeak(defObj.definition);
            if (defObj.word === selectedWord) {
              const newMatches = [...matchedPairs, selectedWord];
              setMatchedPairs(newMatches);
              if (newMatches.length === currentVocab.length) {
                  setTimeout(() => setRoundComplete(true), 500); // slight delay for visual effect
              }
            }
            setSelectedWord(null);
          };

          const handleNextRound = () => {
              if (round < totalRounds - 1) {
                  setRound(round + 1);
              }
          };

          const handlePlayAgain = () => {
              setRound(0);
          }

          return (
            <div className="fixed inset-0 z-[100] bg-slate-900 flex flex-col font-sans text-slate-800 overflow-hidden animate-fade-in">
                {/* Header Navbar */}
                <div className="bg-slate-800 text-white px-6 py-4 flex justify-between items-center shadow-md shrink-0">
                    <button onClick={onExit} className="flex items-center gap-2 hover:text-teal-400 transition-colors font-semibold bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-lg">
                        <i className="fa-solid fa-arrow-left"></i> Back to Dashboard
                    </button>
                    <h2 className="text-xl md:text-2xl font-bold text-teal-400 flex items-center gap-3">
                        <i className="fa-solid fa-gamepad"></i> {unitTitle} Match
                    </h2>
                    <div className="text-slate-300 font-bold bg-slate-900 px-4 py-2 rounded-lg border border-slate-700">
                        Round {round + 1} of {totalRounds}
                    </div>
                </div>

                {/* Game Area */}
                <div className="flex-1 flex flex-col items-center justify-center p-6 bg-slate-50 relative">
                    <div className="w-full max-w-6xl h-full flex flex-col">
                        
                        {!roundComplete ? (
                            <div className="flex gap-4 md:gap-8 h-full pb-4 pt-2">
                                {/* Left Column: Terms */}
                                <div className="flex-1 flex flex-col gap-4">
                                    <h4 className="font-bold text-slate-400 uppercase tracking-wider text-center shrink-0">Terms</h4>
                                    {currentVocab.map((v) => (
                                        <button
                                          key={v.word}
                                          onClick={() => handleWordClick(v.word)}
                                          disabled={matchedPairs.includes(v.word)}
                                          className={`flex-1 flex items-center justify-center px-4 py-3 rounded-2xl border-4 transition-all text-lg md:text-xl font-bold shadow-sm ${
                                            matchedPairs.includes(v.word) 
                                              ? 'bg-green-50 border-green-200 text-green-400 cursor-not-allowed opacity-50 shadow-none'
                                              : selectedWord === v.word 
                                                ? 'bg-indigo-50 border-indigo-500 text-indigo-800 scale-[1.02] shadow-lg'
                                                : 'bg-white border-slate-200 text-slate-700 hover:border-indigo-300'
                                          }`}
                                        >
                                          {v.word}
                                        </button>
                                      ))}
                                </div>

                                {/* Right Column: Definitions */}
                                <div className="flex-[2] flex flex-col gap-4">
                                    <h4 className="font-bold text-slate-400 uppercase tracking-wider text-center shrink-0">Definitions</h4>
                                    {definitions.map((v, i) => (
                                        <button
                                          key={i}
                                          onClick={() => handleDefClick(v)}
                                          disabled={matchedPairs.includes(v.word)}
                                          className={`flex-1 flex items-center justify-start px-6 py-3 rounded-2xl border-4 transition-all text-sm md:text-lg font-medium leading-relaxed shadow-sm ${
                                            matchedPairs.includes(v.word)
                                              ? 'bg-green-50 border-green-200 text-green-600 cursor-not-allowed opacity-50 shadow-none'
                                              : 'bg-white border-slate-200 text-slate-700 hover:border-indigo-300 hover:bg-slate-50'
                                          }`}
                                        >
                                          {v.definition}
                                        </button>
                                      ))}
                                </div>
                            </div>
                        ) : (
                            /* Success State Overlay / Message */
                            <div className="flex-1 flex flex-col items-center justify-center animate-pop-in">
                                <div className="bg-white p-12 rounded-3xl shadow-xl border border-slate-200 flex flex-col items-center max-w-lg text-center">
                                    <div className="w-24 h-24 bg-green-100 text-green-500 rounded-full flex items-center justify-center mb-6">
                                        <i className="fa-solid fa-check text-5xl"></i>
                                    </div>
                                    <h2 className="text-3xl font-extrabold text-slate-800 mb-4">
                                        {round < totalRounds - 1 ? 'Round Complete!' : 'Unit Complete!'}
                                    </h2>
                                    <p className="text-slate-500 text-lg mb-8">
                                        {round < totalRounds - 1 
                                            ? "Great job matching those terms. Ready for the next set?" 
                                            : "You've successfully matched all the vocabulary words for this unit."}
                                    </p>
                                    
                                    {round < totalRounds - 1 ? (
                                        <button 
                                            onClick={handleNextRound}
                                            className="bg-indigo-600 hover:bg-indigo-700 text-white text-xl font-bold py-4 px-10 rounded-xl shadow-lg transition-transform hover:scale-105"
                                        >
                                            Next Round <i className="fa-solid fa-arrow-right ml-2"></i>
                                        </button>
                                    ) : (
                                        <div className="flex gap-4 w-full">
                                            <button 
                                                onClick={handlePlayAgain}
                                                className="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 text-lg font-bold py-4 px-6 rounded-xl transition-colors"
                                            >
                                                Play Again
                                            </button>
                                            <button 
                                                onClick={onExit}
                                                className="flex-1 bg-teal-500 hover:bg-teal-600 text-white text-lg font-bold py-4 px-6 rounded-xl shadow-lg transition-transform hover:scale-105"
                                            >
                                                Dashboard
                                            </button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            </div>
          );
        };

        function App() {

              }
            };
          }, []);

            if (!('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel();
            
            const utterance = new SpeechSynthesisUtterance(text);
            
            // PERSONALIZATION CONSTRAINT: Set speech to 85% rate
            utterance.rate = 0.85; 
            
            const allowedVoices = ["Remy", "Giuseppe", "Vivienne", "Florian", "Seraphina", "Emma", "Brian", "Ava", "Andrew", "William"];
            const voices = window.speechSynthesis.getVoices();
            
            const preferredVoice = voices.find(v => 
              allowedVoices.some(name => v.name.includes(name)) && v.name.includes("Microsoft")
            ) || voices.find(v => 
              allowedVoices.some(name => v.name.includes(name))
            );

            if (preferredVoice) {
              utterance.voice = preferredVoice;
            }

            window.speechSynthesis.speak(utterance);

                                      <div className="mt-auto border-t border-slate-700 pt-4">
