                                    <div className="bg-slate-800 text-white p-3 rounded-xl mt-3 flex items-start gap-2">
                                        <i className="fa-solid fa-award text-yellow-400 text-lg mt-0.5"></i>

                                            <h5 className="text-[10px] text-slate-400 uppercase tracking-wider font-bold mb-0.5">IELTS Value</h5>

        const UnitQuiz = ({ mcqs, handleSpeak }) => {
          const [selectedAnswers, setSelectedAnswers] = useState({});
          const [feedback, setFeedback] = useState({});
          const [showExtended, setShowExtended] = useState(false);

          const handleOptionClick = (questionIndex, optionIndex, correctAnswerIndex) => {
            setSelectedAnswers({ ...selectedAnswers, [questionIndex]: optionIndex });
            setFeedback({ ...feedback, [questionIndex]: optionIndex === correctAnswerIndex });
          };

          if (!mcqs || mcqs.length === 0) return null;

          const displayedMcqs = showExtended ? mcqs : mcqs.slice(0, 5);

          return (
            <div className="bg-slate-900 p-4 md:p-6 rounded-2xl shadow-md border border-slate-800 mt-6">
              <div className="flex items-center gap-2 mb-4">
                <div className="bg-teal-500/20 p-1.5 rounded-lg border border-teal-500/30">
                  <i className="fa-regular fa-circle-question text-teal-400 text-xl"></i>
                </div>
                <h3 className="text-lg font-bold text-white">Unit Quiz: Vocabulary & Grammar</h3>
              </div>
              <p className="text-slate-400 text-xs mb-4">Test your knowledge of this unit's vocabulary and grammar rules.</p>
              
              <div className="space-y-4">
                {displayedMcqs.map((mcq, qIdx) => (
                  <div key={qIdx} className="bg-slate-800 p-4 rounded-xl border border-slate-700 animate-fade-in">
                    <h4 className="text-sm font-semibold text-slate-200 mb-3 leading-relaxed">{qIdx + 1}. {mcq.q}</h4>
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
                      {mcq.options.map((opt, optIdx) => {
                        const isSelected = selectedAnswers[qIdx] === optIdx;
                        const isCorrect = mcq.answer === optIdx;
                        const hasAnswered = selectedAnswers[qIdx] !== undefined;
                        
                        let btnStyle = "bg-slate-700 text-slate-300 hover:bg-slate-600 border-transparent";
                        if (hasAnswered) {
                          if (isCorrect) btnStyle = "bg-green-900/40 text-green-400 border-green-500/50";
                          else if (isSelected && !isCorrect) btnStyle = "bg-rose-900/40 text-rose-400 border-rose-500/50";
                          else btnStyle = "bg-slate-800 text-slate-500 border-transparent opacity-50";
                        }

                        return (
                          <button
                            key={optIdx}
                            disabled={hasAnswered}
                            onClick={() => {
                              handleSpeak(opt);
                              handleOptionClick(qIdx, optIdx, mcq.answer);
                            }}
                            className={`w-full text-left px-3 py-2.5 rounded-xl border-2 transition-all text-xs font-medium ${btnStyle}`}
                          >
                            {String.fromCharCode(65 + optIdx)}. {opt}
                          </button>
                        );
                      })}
                    </div>
                    {feedback[qIdx] !== undefined && (
                      <div className={`mt-3 p-2 rounded-lg text-xs font-bold flex items-center gap-1.5 ${feedback[qIdx] ? 'bg-green-900/20 text-green-400' : 'bg-rose-900/20 text-rose-400'}`}>
                        {feedback[qIdx] ? <i className="fa-regular fa-circle-check text-lg"></i> : <i className="fa-solid fa-times text-lg"></i>}
                        {feedback[qIdx] ? 'Correct!' : 'Incorrect'}
                      </div>
                    )}
                  </div>
                ))}
              </div>
              
              {mcqs.length > 5 && (
                <div className="mt-6 pt-4 border-t border-slate-800 text-center">
                  <button 
                    onClick={() => setShowExtended(!showExtended)}
                    className="bg-teal-600 hover:bg-teal-500 text-white font-bold py-2 px-4 rounded-lg transition-colors shadow-sm text-sm"
                  >
                    {showExtended ? "Show Fewer Questions" : "Load Extended MCQs (10 More)"}
                  </button>
                </div>
              )}
            </div>
          );
        };

        const PracticeGamePage = ({ vocabulary, unitTitle, onExit, handleSpeak }) => {
          const itemsPerRound = 5;
          const totalRounds = Math.ceil(vocabulary.length / itemsPerRound);
          
          const [round, setRound] = useState(0);
          const [selectedWord, setSelectedWord] = useState(null);
          const [matchedPairs, setMatchedPairs] = useState([]);
          const [definitions, setDefinitions] = useState([]);
          const [roundComplete, setRoundComplete] = useState(false);

          useEffect(() => {
            setDefinitions([...currentVocab].sort(() => Math.random() - 0.5));
            setMatchedPairs([]);
            setSelectedWord(null);
            setRoundComplete(false);
          }, [round, vocabulary]);

          const currentVocab = vocabulary.slice(round * itemsPerRound, (round + 1) * itemsPerRound);

          const handleWordClick = (word) => {
            if (matchedPairs.includes(word)) return;
            handleSpeak(word);
            setSelectedWord(word);
          };

          const handleDefClick = (defObj) => {
            if (!selectedWord) return;
            handleSpeak(defObj.definition);
            if (defObj.word === selectedWord) {
              const newMatches = [...matchedPairs, selectedWord];
              setMatchedPairs(newMatches);
              if (newMatches.length === currentVocab.length) {
                  setTimeout(() => setRoundComplete(true), 500); 
              }
            }
            setSelectedWord(null);
          };

          const handleNextRound = () => {
              if (round < totalRounds - 1) {
                  setRound(round + 1);
              }
          };

          const handlePlayAgain = () => {
              setRound(0);
          }

          return (
            <div className="fixed inset-0 z-[100] bg-slate-900 flex flex-col font-sans text-slate-800 overflow-hidden animate-fade-in">
                <div className="bg-slate-800 text-white px-4 py-3 flex justify-between items-center shadow-md shrink-0">
                    <button onClick={onExit} className="flex items-center gap-2 hover:text-teal-400 transition-colors font-semibold bg-slate-700 hover:bg-slate-600 px-3 py-1.5 rounded-lg text-sm">
                        <i className="fa-solid fa-arrow-left"></i> Back to Dashboard
                    </button>
                    <h2 className="text-lg md:text-xl font-bold text-teal-400 flex items-center gap-2">
                        <i className="fa-solid fa-gamepad"></i> {unitTitle} Match
                    </h2>
                    <div className="text-slate-300 font-bold bg-slate-900 px-3 py-1.5 rounded-lg border border-slate-700 text-sm">
                        Round {round + 1} of {totalRounds}
                    </div>
                </div>

                <div className="flex-1 flex flex-col items-center justify-center p-4 bg-slate-50 relative">
                    <div className="w-full max-w-5xl h-full flex flex-col">
                        {!roundComplete ? (
                            <div className="flex gap-3 md:gap-6 h-full pb-2 pt-1">
                                <div className="flex-1 flex flex-col gap-3">
                                    <h4 className="font-bold text-slate-400 uppercase tracking-wider text-center shrink-0 text-[10px]">Terms</h4>
                                    {currentVocab.map((v) => (
                                        <button
                                          key={v.word}
                                          onClick={() => handleWordClick(v.word)}
                                          disabled={matchedPairs.includes(v.word)}
                                          className={`flex-1 flex items-center justify-center px-3 py-2 rounded-xl border-2 transition-all text-sm md:text-base font-bold shadow-sm ${
                                            matchedPairs.includes(v.word) 
                                              ? 'bg-green-50 border-green-200 text-green-400 cursor-not-allowed opacity-50 shadow-none'
                                              : selectedWord === v.word 
                                                ? 'bg-indigo-50 border-indigo-500 text-indigo-800 scale-[1.02] shadow-md'
                                                : 'bg-white border-slate-200 text-slate-700 hover:border-indigo-300'
                                          }`}
                                        >
                                          {v.word}
                                        </button>
                                      ))}
                                </div>

                                <div className="flex-[2] flex flex-col gap-3">
                                    <h4 className="font-bold text-slate-400 uppercase tracking-wider text-center shrink-0 text-[10px]">Definitions</h4>
                                    {definitions.map((v, i) => (
                                        <button
                                          key={i}
                                          onClick={() => handleDefClick(v)}
                                          disabled={matchedPairs.includes(v.word)}
                                          className={`flex-1 flex items-center justify-start px-4 py-2 rounded-xl border-2 transition-all text-xs md:text-sm font-medium leading-relaxed shadow-sm ${
                                            matchedPairs.includes(v.word)
                                              ? 'bg-green-50 border-green-200 text-green-600 cursor-not-allowed opacity-50 shadow-none'
                                              : 'bg-white border-slate-200 text-slate-700 hover:border-indigo-300 hover:bg-slate-50'
                                          }`}
                                        >
                                          {v.definition}
                                        </button>
                                      ))}
                                </div>
                            </div>
                        ) : (
                            <div className="flex-1 flex flex-col items-center justify-center animate-pop-in">
                                <div className="bg-white p-8 rounded-3xl shadow-xl border border-slate-200 flex flex-col items-center max-w-sm text-center">
                                    <div className="w-20 h-20 bg-green-100 text-green-500 rounded-full flex items-center justify-center mb-4">
                                        <i className="fa-solid fa-check text-4xl"></i>
                                    </div>
                                    <h2 className="text-2xl font-extrabold text-slate-800 mb-3">
                                        {round < totalRounds - 1 ? 'Round Complete!' : 'Unit Complete!'}
                                    </h2>
                                    <p className="text-slate-500 text-sm mb-6">
                                        {round < totalRounds - 1 
                                            ? "Great job matching those terms. Ready for the next set?" 
                                            : "You've successfully matched all the vocabulary words for this unit."}
                                    </p>
                                    
                                    {round < totalRounds - 1 ? (
                                        <button 
                                            onClick={handleNextRound}
                                            className="bg-indigo-600 hover:bg-indigo-700 text-white text-base font-bold py-3 px-8 rounded-xl shadow-lg transition-transform hover:scale-105"
                                        >
                                            Next Round <i className="fa-solid fa-arrow-right ml-2"></i>
                                        </button>
                                    ) : (
                                        <div className="flex gap-3 w-full">
                                            <button 
                                                onClick={handlePlayAgain}
                                                className="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-bold py-3 px-4 rounded-xl transition-colors"
                                            >
                                                Play Again
                                            </button>
                                            <button 
                                                onClick={onExit}
                                                className="flex-1 bg-teal-500 hover:bg-teal-600 text-white text-sm font-bold py-3 px-4 rounded-xl shadow-lg transition-transform hover:scale-105"
                                            >
                                                Dashboard
                                            </button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            </div>
          );

        function App() {

          const [activeTab, setActiveTab] = useState("overview");
          const [showModelAnswer, setShowModelAnswer] = useState({});
          
          const voiceIndexRef = useRef(0);
          const allowedVoices = [
            "Remy", "Giuseppe", "Vivienne", "Florian",
            "Seraphina", "Emma", "Brian", "Ava",
            "Andrew", "William"
          ];

          useEffect(() => {
            return () => {
              if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
              }
            };
          }, []);

          const handleSpeak = (text) => {
            if (!('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel();
            
            const utter = new SpeechSynthesisUtterance(text);
            utter.rate = 0.85; 

            const loadVoices = () => {
              const voices = window.speechSynthesis.getVoices();
              
              const validVoices = voices.filter(v => 
                allowedVoices.some(name => v.name.includes(name)) &&
                v.name.includes("Microsoft") &&
                (v.name.includes("Online") || v.name.includes("Natural")) &&
                v.lang.startsWith("en")
              );

              if (validVoices.length === 0) {
                console.warn("Voice strict match failed: No allowed Microsoft Online English voices found.");
                return;
              }

              const selected = validVoices[voiceIndexRef.current % validVoices.length];
              voiceIndexRef.current += 1;

              utter.voice = selected;
              window.speechSynthesis.speak(utter);
            };

            if (window.speechSynthesis.getVoices().length === 0) {
              window.speechSynthesis.onvoiceschanged = loadVoices;
            } else {
              loadVoices();
            }
          };

            { id: "grammar", label: "Writing & Grammar", icon: "fa-solid fa-pen-to-square" },
            { id: "analysis", label: "Paragraph Analysis", icon: "fa-solid fa-magnifying-glass-chart" },
            { id: "testing", label: "Tutor & Test", icon: "fa-solid fa-clipboard-list" },
            { id: "game", label: "Game", icon: "fa-solid fa-gamepad" }

          if (activeTab === "game") {
            return (
                <PracticeGamePage 
                    vocabulary={activeUnit.vocabulary} 
                    unitTitle={activeUnit.title}
                    onExit={() => setActiveTab("overview")} 
                    handleSpeak={handleSpeak}

            );

                fixed inset-y-0 left-0 z-30 w-64 bg-slate-900 text-slate-300 transform transition-transform duration-300 ease-in-out flex flex-col

                          <i className={`${unit.icon} ${activeUnit.id === unit.id ? 'text-teal-400' : 'text-slate-500'} text-base`}></i>

                                key={i}
                                onClick={() => handleSpeak(v.word)}
                                className="bg-white p-3 rounded-xl shadow-sm border border-slate-200 text-left hover:border-teal-400 transition-all active:scale-95"
                              >
                                <div className="flex justify-between items-start mb-1">
                                  <h4 className="text-base font-bold text-slate-800 transition-colors">{v.word}</h4>
                                </div>
                                <span className="inline-block bg-slate-100 text-slate-600 px-2 py-0.5 rounded-md text-[10px] font-bold mb-1.5 border border-slate-200">
                                  {v.chinese}
                                </span>
                                <p className="text-slate-600 text-xs leading-snug">{v.definition}</p>
                              </button>
                            ))}
                          </div>

                          <UnitQuiz key={`quiz-${activeUnit.id}`} mcqs={activeUnit.mcqs} handleSpeak={handleSpeak} />
                        </div>
                      )}

                      {activeTab === "speaking" && (
                        <div className="space-y-4">
                          {activeUnit.speaking.map((section, idx) => (
                            <div key={idx} className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                              <div className="bg-indigo-50 border-b border-indigo-100 p-3 flex items-center justify-between">
                                <h3 className="text-sm font-bold text-indigo-900 flex items-center gap-2">
                                  <i className="fa-solid fa-microphone text-indigo-600"></i>
                                  {section.type}
                                </h3>
                              </div>
                              <div className="p-4">
                                <button 
                                  onClick={() => handleSpeak(section.questions.join(' '))}
                                  className="w-full text-left bg-white border border-slate-200 hover:border-teal-300 hover:bg-slate-50 p-3 rounded-lg transition-all shadow-sm mb-4 relative overflow-hidden"
                                >
                                  <div className="absolute top-0 left-0 w-1 h-full bg-indigo-500"></div>
                                  <h4 className="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2">Examiner Prompts</h4>
                                  <ul className="space-y-1.5 pl-2">
                                    {section.questions.map((q, qIdx) => (
                                      <li key={qIdx} className="text-xs md:text-sm leading-relaxed text-slate-800 font-medium list-disc ml-4">
                                        {q}
                                      </li>
                                    ))}
                                  </ul>
                                </button>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                  <div className="bg-slate-50 border border-slate-200 rounded-lg p-3">
                                    <h4 className="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2 flex items-center gap-1.5">
                                      <i className="fa-solid fa-pen-nib"></i> Useful Sentence Stems
                                    </h4>
                                    <ul className="space-y-1.5">
                                      {section.stems.map((stem, i) => (
                                        <li key={i}>
                                          <button 
                                            onClick={() => handleSpeak(stem)}
                                            className="text-left w-full bg-white border border-slate-200 p-2 rounded-md text-xs text-slate-700 hover:border-teal-400 hover:text-teal-700 transition-colors shadow-sm"
                                          >
                                            {stem}
                                          </button>
                                        </li>
                                      ))}
                                    </ul>
                                  </div>

                                  <button 
                                    onClick={() => handleSpeak(section.example)}
                                    className="text-left bg-indigo-50 border border-indigo-100 hover:border-indigo-300 rounded-lg p-3 transition-all"
                                  >
                                    <h4 className="text-[10px] font-bold text-indigo-400 uppercase tracking-wider mb-2 flex items-center gap-1.5">
                                      <i className="fa-regular fa-circle-check text-indigo-500"></i> Model High School Answer
                                    </h4>
                                    <p className="text-xs text-indigo-900 leading-relaxed font-medium italic">
                                      "{section.example}"
                                    </p>
                                  </button>
                                </div>
                              </div>
                            </div>
                          ))}
                        </div>
                      )}

                      {activeTab === "reading" && (
                        <div className="space-y-4">
                          <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                            <div className="bg-slate-50 border-b border-slate-200 p-3">
                              <h3 className="text-sm font-bold text-slate-800 flex items-center gap-2">
                                <i className="fa-solid fa-book text-teal-600"></i>
                                Reading Passage
                              </h3>
                            </div>
                            <div className="p-4">
                              <button 
                                onClick={() => handleSpeak(activeUnit.reading.text)}
                                className="w-full text-left bg-slate-50 hover:bg-teal-50 border border-slate-200 hover:border-teal-200 p-4 rounded-lg transition-all shadow-sm"
                              >
                                <p className="text-xs md:text-sm leading-relaxed text-slate-700 font-medium">
                                  {activeUnit.reading.text}
                                </p>
                              </button>
                            </div>
                            <div className="bg-slate-50 border-t border-slate-200 p-4">
                              <h4 className="text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-2 flex items-center gap-1.5">
                                <i className="fa-regular fa-circle-question text-base"></i> Comprehension Check
                              </h4>
                              <ul className="space-y-1.5">
                                {activeUnit.reading.questions.map((q, i) => (
                                   <li key={i}>
                                     <button
                                       onClick={() => handleSpeak(q)}
                                       className="w-full text-left bg-white hover:bg-slate-100 border border-slate-200 p-2.5 rounded-md text-xs font-medium text-slate-700 shadow-sm transition-colors"
                                     >
                                       {q}
                                     </button>
                                   </li>
                                ))}
                              </ul>
                            </div>
                          </div>
                        </div>
                      )}

                      {activeTab === "listening" && (
                        <div className="space-y-4">
                          <div className="bg-slate-900 rounded-xl shadow-sm border border-slate-800 overflow-hidden text-slate-300">
                            <div className="bg-slate-800 border-b border-slate-700 p-3">
                              <h3 className="text-sm font-bold text-white flex items-center gap-2">
                                <i className="fa-solid fa-headphones text-teal-400"></i>
                                Listening Transcript
                              </h3>
                            </div>
                            <div className="p-4">
                              <button 
                                onClick={() => handleSpeak(activeUnit.listening.text)}
                                className="w-full text-left bg-slate-800 hover:bg-slate-700 border border-slate-700 hover:border-teal-500 p-4 rounded-lg transition-all shadow-inner"
                              >
                                <p className="text-xs md:text-sm leading-relaxed font-medium italic text-slate-200">
                                  "{activeUnit.listening.text}"
                                </p>
                              </button>
                            </div>
                            <div className="bg-slate-800 border-t border-slate-700 p-4">
                              <h4 className="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2 flex items-center gap-1.5">
                                <i className="fa-regular fa-circle-question text-teal-400"></i> Comprehension Check
                              </h4>
                              <ul className="space-y-1.5">
                                {activeUnit.listening.questions.map((q, i) => (
                                   <li key={i}>
                                     <button
                                       onClick={() => handleSpeak(q)}
                                       className="w-full text-left bg-slate-900 hover:bg-slate-700 border border-slate-700 p-2.5 rounded-md text-xs font-medium text-slate-300 shadow-sm transition-colors"
                                     >
                                       {q}
                                     </button>
                                   </li>
                                ))}
                              </ul>
                            </div>
                          </div>
                        </div>
                      )}

                      {activeTab === "grammar" && (
                        <div className="space-y-4">
                          <div className="bg-white p-5 md:p-6 rounded-2xl shadow-sm border border-slate-200">
                            <h3 className="text-base md:text-lg font-bold text-indigo-900 mb-3 flex items-center gap-2">
                              <i className="fa-solid fa-pen-to-square text-indigo-500"></i>
                              Grammar Focus: {activeUnit.grammar.topic}
                            </h3>
                            
                            <div className="mb-4">
                              <button 
                                onClick={() => handleSpeak(activeUnit.grammar.focus)}
                                className="w-full text-left transition-colors rounded-lg pb-2"
                              >
                                <p className="text-xs md:text-sm font-semibold text-slate-800 bg-slate-100 p-3 rounded-lg border border-slate-200">
                                  {activeUnit.grammar.focus}
                                </p>
                              </button>
                              <div className="space-y-1 md:space-y-1.5 mt-2">
                                <h4 className="text-[10px] font-bold text-slate-400 uppercase tracking-wider ml-1 mb-1.5">Example Sentences</h4>
                                {activeUnit.grammar.examples.map((ex, idx) => (
                                   <button 
                                    key={idx}
                                    onClick={() => handleSpeak(ex)}
                                    className="w-full text-left bg-white hover:bg-indigo-50 border-2 border-slate-100 hover:border-indigo-200 py-1.5 px-3 rounded-lg transition-all text-xs md:text-sm font-medium text-slate-700 shadow-sm"
                                  >
                                    {ex}
                                  </button>
                                ))}
                              </div>
                            </div>

                            <button 
                              onClick={() => handleSpeak(activeUnit.grammar.model)}
                              className="w-full text-left bg-indigo-50 hover:bg-indigo-100 border border-indigo-200 p-3 md:p-4 rounded-lg transition-all shadow-sm relative overflow-hidden mt-4"
                            >
                              <div className="absolute top-0 left-0 w-1 h-full bg-indigo-500"></div>
                              <div className="text-[10px] font-bold text-indigo-600 uppercase tracking-wider mb-1.5">Grammar Usage Model</div>
                              <p className="text-xs md:text-sm leading-relaxed text-indigo-900 font-medium">
                                {activeUnit.grammar.model}
                              </p>
                            </button>
                          </div>
                        </div>
                      )}

                      {activeTab === "analysis" && (
                         <InteractiveParagraph data={activeUnit.paragraphAnalysis} handleSpeak={handleSpeak} />
                      )}

                      {activeTab === "testing" && (
                        <div className="space-y-4 md:space-y-6">
                          <div className="bg-white p-4 md:p-6 rounded-2xl shadow-sm border border-slate-200">
                            <div className="flex items-center gap-2 mb-3">
                              <div className="bg-teal-100 p-1.5 rounded-lg">
                                <i className="fa-solid fa-microphone text-teal-700 text-lg"></i>
                              </div>
                              <h3 className="text-base md:text-lg font-bold text-slate-800">Tutor Prompts</h3>
                            </div>
                            <p className="text-slate-500 text-[10px] md:text-xs mb-4">
                              Interactive coaching tasks. Click to read aloud.
                            </p>
                            
                            <div className="space-y-3">
                              {activeUnit.tutorPrompts && activeUnit.tutorPrompts.map((prompt, idx) => (
                                <div key={idx} className="bg-slate-50 border border-slate-200 rounded-lg overflow-hidden">
                                  <div className="bg-slate-100 px-3 py-2 border-b border-slate-200">
                                    <span className="font-bold text-slate-700 text-xs md:text-sm">{prompt.type}</span>
                                  </div>
                                  <div className="p-3">
                                    <p className="text-[10px] font-bold text-indigo-600 uppercase tracking-wider mb-2 bg-indigo-50 inline-block px-2 py-0.5 rounded-full">
                                      {prompt.focus}
                                    </p>
                                    <button 
                                      onClick={() => handleSpeak(prompt.text)}
                                      className="w-full text-left bg-white border border-slate-200 p-2.5 rounded-md shadow-sm hover:border-teal-300 transition-colors mb-2.5"
                                    >
                                      <p className="text-xs md:text-sm text-slate-800 font-medium leading-relaxed italic">"{prompt.text}"</p>
                                    </button>
                                    <div className="space-y-1.5 pl-2 border-l-2 border-slate-300">
                                      {prompt.questions.map((q, qIdx) => (
                                        <button
                                          key={qIdx}
                                          onClick={() => handleSpeak(q)}
                                          className="w-full text-left text-[10px] md:text-xs text-slate-600 hover:text-slate-900 transition-colors"
                                        >
                                          • {q}
                                        </button>
                                      ))}
                                    </div>
                                  </div>
                                </div>
                              ))}
                            </div>
                          </div>

                          <div className="bg-slate-900 p-4 md:p-6 rounded-2xl shadow-sm border border-slate-800 text-slate-300">
                            <div className="flex items-center gap-2 mb-3">
                              <div className="bg-rose-500/20 p-1.5 rounded-lg border border-rose-500/30">
                                <i className="fa-solid fa-bullseye text-rose-400 text-lg"></i>
                              </div>
                              <h3 className="text-base md:text-lg font-bold text-white">Practice for the Test</h3>
                            </div>
                            <p className="text-slate-400 text-[10px] md:text-xs mb-4">
                              Authentic IELTS Tasks. Click to read aloud.
                            </p>

                            <div className="grid grid-cols-1 gap-3">
                              {activeUnit.practiceTests && activeUnit.practiceTests.map((test, idx) => (
                                <div key={idx} className="bg-slate-800 border border-slate-700 rounded-lg overflow-hidden shadow-inner flex flex-col">
                                  <div className="bg-slate-900/50 px-3 py-2 border-b border-slate-700">
                                    <span className="font-bold text-teal-400 text-[10px] md:text-xs">{test.type}</span>
                                  </div>
                                  <div className="p-3 flex-1 flex flex-col">
                                    <button 
                                      onClick={() => handleSpeak(test.text)}
                                      className="w-full text-left text-[10px] md:text-xs text-slate-300 mb-3 hover:text-white transition-colors"
                                    >
                                      {test.text}
                                    </button>
                                    
                                    {test.questions && test.questions.length > 0 && (
                                      <div className="bg-slate-900/50 p-2.5 rounded-md mt-auto mb-3">
                                        <h4 className="text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1.5">Test Tasks:</h4>
                                        <div className="space-y-1.5">
                                          {test.questions.map((q, qIdx) => (
                                            <button
                                              key={qIdx}
                                              onClick={() => handleSpeak(q)}
                                              className="w-full text-left text-[10px] md:text-xs font-medium text-slate-200 hover:text-teal-300 transition-colors block whitespace-pre-line"
                                            >
                                              {q}
                                            </button>
                                          ))}
                                        </div>
                                      </div>
                                    )}

                                    {test.modelAnswer && (
                                      <div className="mt-auto border-t border-slate-700 pt-3">
                                        <button
                                          onClick={() => toggleModelAnswer(idx)}
                                          className="flex items-center gap-1.5 text-[10px] md:text-xs font-bold text-indigo-400 hover:text-indigo-300 transition-colors"
                                        >
                                          <i className="fa-solid fa-eye"></i> 
                                          {showModelAnswer[idx] ? "Hide Model Answer" : "Show Model Answer"}
                                        </button>
                                        
                                        {showModelAnswer[idx] && (
                                          <div className="mt-2 p-3 bg-indigo-900/20 border border-indigo-500/30 rounded-md animate-fade-in">
                                            <h5 className="text-[10px] uppercase tracking-wider font-bold text-indigo-300 mb-1.5">Model Response</h5>
                                            <button 
                                              onClick={() => handleSpeak(test.modelAnswer)}
                                              className="w-full text-left text-[10px] md:text-xs text-slate-200 leading-relaxed font-medium whitespace-pre-line hover:text-white"
                                            >
                                              {test.modelAnswer}
                                            </button>
                                          </div>
                                        )}
                                      </div>
                                    )}
                                  </div>
                                </div>
                              ))}
                            </div>
                          </div>
                        </div>
                      )}

                    </div>
                  </div>
                </main>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
