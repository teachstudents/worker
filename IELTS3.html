                        }

                        return (
                          <button

                            onClick={() => {

       const handleSpeak = (text) => {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.rate = 0.85; 
  
  const allowedVoices = ["Remy", "Giuseppe", "Vivienne", "Florian", "Seraphina", "Emma", "Brian", "Ava", "Andrew", "William"];
  const voices = window.speechSynthesis.getVoices();
  
  // Priority 1: Exact match with allowed voices
  let preferredVoice = voices.find(v => allowedVoices.some(name => v.name.includes(name)));
  
  // Priority 2: Any Microsoft Online English voice
  if (!preferredVoice) {
    preferredVoice = voices.find(v => v.name.includes('Microsoft') && v.name.includes('Online') && v.lang.startsWith('en'));
  }
  
  // Priority 3: Any English voice
  if (!preferredVoice) {
    preferredVoice = voices.find(v => v.lang.startsWith('en'));
  }
  
  // Priority 4: First available voice
  if (!preferredVoice && voices.length > 0) {
    preferredVoice = voices[0];
  }

  if (preferredVoice) {
    utterance.voice = preferredVoice;
  }
  
  window.speechSynthesis.speak(utterance);
};

                                    </h4>
                                    <ul className="space-y-1.5">
                                      {section.stems.map((stem, i) => (
                                        <li key={i}>
                                          <button 
                                            onClick={() => handleSpeak(stem)}
                                            className="text-left w-full bg-white border border-slate-200 p-2 rounded-md text-xs text-slate-700 hover:border-teal-400 hover:text-teal-700 transition-colors shadow-sm"
                                          >
                                            {stem}
                                          </button>
                                        </li>
                                      ))}
                                    </ul>
                                  </div>

                                  <button 
                                    onClick={() => handleSpeak(section.example)}
                                    className="text-left bg-indigo-50 border border-indigo-100 hover:border-indigo-300 rounded-lg p-3 transition-all"
                                  >
                                    <h4 className="text-[10px] font-bold text-indigo-400 uppercase tracking-wider mb-2 flex items-center gap-1.5">
                                      <i className="fa-regular fa-circle-check text-indigo-500"></i> Model High School Answer
                                    </h4>
                                    <p className="text-xs text-indigo-900 leading-relaxed font-medium italic">
                                      "{section.example}"
                                    </p>
                                  </button>
                                </div>
                              </div>
                            </div>
                          ))}
                        </div>
                      )}

                      {activeTab === "reading" && (
                        <div className="space-y-4">
                          <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                            <div className="bg-slate-50 border-b border-slate-200 p-3">
                              <h3 className="text-sm font-bold text-slate-800 flex items-center gap-2">
                                <i className="fa-solid fa-book text-teal-600"></i>
                                Reading Passage
                              </h3>
                            </div>
                            <div className="p-4">
                              <button 
                                onClick={() => handleSpeak(activeUnit.reading.text)}
                                className="w-full text-left bg-slate-50 hover:bg-teal-50 border border-slate-200 hover:border-teal-200 p-4 rounded-lg transition-all shadow-sm"
                              >
                                <p className="text-xs md:text-sm leading-relaxed text-slate-700 font-medium">
                                  {activeUnit.reading.text}
                                </p>
                              </button>
                            </div>
                            <div className="bg-slate-50 border-t border-slate-200 p-4">
                              <h4 className="text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-2 flex items-center gap-1.5">
                                <i className="fa-regular fa-circle-question text-base"></i> Comprehension Check
                              </h4>
                              <ul className="space-y-1.5">
                                {activeUnit.reading.questions.map((q, i) => (
                                   <li key={i}>
                                     <button
                                       onClick={() => handleSpeak(q)}
                                       className="w-full text-left bg-white hover:bg-slate-100 border border-slate-200 p-2.5 rounded-md text-xs font-medium text-slate-700 shadow-sm transition-colors"
                                     >
                                       {q}
                                     </button>
                                   </li>
                                ))}
                              </ul>
                            </div>
                          </div>
                        </div>
                      )}

                      {activeTab === "listening" && (
                        <div className="space-y-4">
                          <div className="bg-slate-900 rounded-xl shadow-sm border border-slate-800 overflow-hidden text-slate-300">
                            <div className="bg-slate-800 border-b border-slate-700 p-3">
                              <h3 className="text-sm font-bold text-white flex items-center gap-2">
                                <i className="fa-solid fa-headphones text-teal-400"></i>
                                Listening Transcript
                              </h3>
                            </div>
                            <div className="p-4">
                              <button 
                                onClick={() => handleSpeak(activeUnit.listening.text)}
                                className="w-full text-left bg-slate-800 hover:bg-slate-700 border border-slate-700 hover:border-teal-500 p-4 rounded-lg transition-all shadow-inner"
                              >
                                <p className="text-xs md:text-sm leading-relaxed font-medium italic text-slate-200">
                                  "{activeUnit.listening.text}"
                                </p>
                              </button>
                            </div>
                            <div className="bg-slate-800 border-t border-slate-700 p-4">
                              <h4 className="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2 flex items-center gap-1.5">
                                <i className="fa-regular fa-circle-question text-teal-400"></i> Comprehension Check
                              </h4>
                              <ul className="space-y-1.5">
                                {activeUnit.listening.questions.map((q, i) => (
                                   <li key={i}>
                                     <button
                                       onClick={() => handleSpeak(q)}
                                       className="w-full text-left bg-slate-900 hover:bg-slate-700 border border-slate-700 p-2.5 rounded-md text-xs font-medium text-slate-300 shadow-sm transition-colors"
                                     >
                                       {q}
                                     </button>
                                   </li>
                                ))}
                              </ul>
                            </div>
                          </div>
                        </div>
                      )}

                      {activeTab === "grammar" && (
                        <div className="space-y-4">
                          <div className="bg-white p-5 md:p-6 rounded-2xl shadow-sm border border-slate-200">
                            <h3 className="text-base md:text-lg font-bold text-indigo-900 mb-3 flex items-center gap-2">
                              <i className="fa-solid fa-pen-to-square text-indigo-500"></i>
                              Grammar Focus: {activeUnit.grammar.topic}
                            </h3>
                            
                            <div className="mb-4">
                              <button 
                                onClick={() => handleSpeak(activeUnit.grammar.focus)}
                                className="w-full text-left transition-colors rounded-lg pb-2"
                              >
                                <p className="text-xs md:text-sm font-semibold text-slate-800 bg-slate-100 p-3 rounded-lg border border-slate-200">
                                  {activeUnit.grammar.focus}
                                </p>
                              </button>
                              <div className="space-y-1 md:space-y-1.5 mt-2">
                                <h4 className="text-[10px] font-bold text-slate-400 uppercase tracking-wider ml-1 mb-1.5">Example Sentences</h4>
                                {activeUnit.grammar.examples.map((ex, idx) => (
                                   <button 
                                    key={idx}
                                    onClick={() => handleSpeak(ex)}
                                    className="w-full text-left bg-white hover:bg-indigo-50 border border-slate-100 hover:border-indigo-200 py-1.5 px-3 rounded-lg transition-all text-xs md:text-sm font-medium text-slate-700 shadow-sm"
                                  >
                                    {ex}
                                  </button>
                                ))}
                              </div>
                            </div>

                            <button 
                              onClick={() => handleSpeak(activeUnit.grammar.model)}
                              className="w-full text-left bg-indigo-50 hover:bg-indigo-100 border border-indigo-200 p-3 md:p-4 rounded-lg transition-all shadow-sm relative overflow-hidden mt-4"
                            >
                              <div className="absolute top-0 left-0 w-1 h-full bg-indigo-500"></div>
                              <div className="text-[10px] font-bold text-indigo-600 uppercase tracking-wider mb-1.5">Grammar Usage Model</div>
                              <p className="text-xs md:text-sm leading-relaxed text-indigo-900 font-medium">
                                {activeUnit.grammar.model}
                              </p>
                            </button>
                          </div>
                        </div>
                      )}

                      {activeTab === "analysis" && (
                         <InteractiveParagraph data={activeUnit.paragraphAnalysis} handleSpeak={handleSpeak} />
                      )}

                      {activeTab === "testing" && (
                        <div className="space-y-4 md:space-y-6">
                          <div className="bg-white p-4 md:p-6 rounded-2xl shadow-sm border border-slate-200">
                            <div className="flex items-center gap-2 mb-3">
                              <div className="bg-teal-100 p-1.5 rounded-lg">
                                <i className="fa-solid fa-microphone text-teal-700 text-lg"></i>
                              </div>
                              <h3 className="text-base md:text-lg font-bold text-slate-800">Tutor Prompts</h3>
                            </div>
                            <p className="text-slate-500 text-[10px] md:text-xs mb-4">
                              Interactive coaching tasks. Click to read aloud.
                            </p>
                            
                            <div className="space-y-3">
                              {activeUnit.tutorPrompts && activeUnit.tutorPrompts.map((prompt, idx) => (
                                <div key={idx} className="bg-slate-50 border border-slate-200 rounded-lg overflow-hidden">
                                  <div className="bg-slate-100 px-3 py-2 border-b border-slate-200">
                                    <span className="font-bold text-slate-700 text-xs md:text-sm">{prompt.type}</span>
                                  </div>
                                  <div className="p-3">
                                    <p className="text-[10px] font-bold text-indigo-600 uppercase tracking-wider mb-2 bg-indigo-50 inline-block px-2 py-0.5 rounded-full">
                                      {prompt.focus}
                                    </p>
                                    <button 
                                      onClick={() => handleSpeak(prompt.text)}
                                      className="w-full text-left bg-white border border-slate-200 p-2.5 rounded-md shadow-sm hover:border-teal-300 transition-colors mb-2.5"
                                    >
                                      <p className="text-xs md:text-sm text-slate-800 font-medium leading-relaxed italic">"{prompt.text}"</p>
                                    </button>
                                    <div className="space-y-1.5 pl-2 border-l-2 border-slate-300">
                                      {prompt.questions.map((q, qIdx) => (
                                        <button
                                          key={qIdx}
                                          onClick={() => handleSpeak(q)}
                                          className="w-full text-left text-[10px] md:text-xs text-slate-600 hover:text-slate-900 transition-colors"
                                        >
                                          • {q}
                                        </button>
                                      ))}
                                    </div>
                                  </div>
                                </div>
                              ))}
                            </div>
                          </div>

                          <div className="bg-slate-900 p-4 md:p-6 rounded-2xl shadow-sm border border-slate-800 text-slate-300">
                            <div className="flex items-center gap-2 mb-3">
                              <div className="bg-rose-500/20 p-1.5 rounded-lg border border-rose-500/30">
                                <i className="fa-solid fa-bullseye text-rose-400 text-lg"></i>
                              </div>
                              <h3 className="text-base md:text-lg font-bold text-white">Practice for the Test</h3>
                            </div>
                            <p className="text-slate-400 text-[10px] md:text-xs mb-4">
                              Authentic IELTS Tasks. Click to read aloud.
                            </p>

                            <div className="grid grid-cols-1 gap-3">
                              {activeUnit.practiceTests && activeUnit.practiceTests.map((test, idx) => (
                                <div key={idx} className="bg-slate-800 border border-slate-700 rounded-lg overflow-hidden shadow-inner flex flex-col">
                                  <div className="bg-slate-900/50 px-3 py-2 border-b border-slate-700">
                                    <span className="font-bold text-teal-400 text-[10px] md:text-xs">{test.type}</span>
                                  </div>
                                  <div className="p-3 flex-1 flex flex-col">
                                    <button 
                                      onClick={() => handleSpeak(test.text)}
                                      className="w-full text-left text-[10px] md:text-xs text-slate-300 mb-3 hover:text-white transition-colors"
                                    >
                                      {test.text}
                                    </button>
                                    
                                    {test.questions && test.questions.length > 0 && (
                                      <div className="bg-slate-900/50 p-2.5 rounded-md mt-auto mb-3">
                                        <h4 className="text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1.5">Test Tasks:</h4>
                                        <div className="space-y-1.5">
                                          {test.questions.map((q, qIdx) => (
                                            <button
                                              key={qIdx}
                                              onClick={() => handleSpeak(q)}
                                              className="w-full text-left text-[10px] md:text-xs font-medium text-slate-200 hover:text-teal-300 transition-colors block whitespace-pre-line"
                                            >
                                              {q}
                                            </button>
                                          ))}
                                        </div>
                                      </div>
                                    )}

                                    {test.modelAnswer && (
                                      <div className="mt-auto border-t border-slate-700 pt-3">
                                        <button
                                          onClick={() => toggleModelAnswer(idx)}
                                          className="flex items-center gap-1.5 text-[10px] md:text-xs font-bold text-indigo-400 hover:text-indigo-300 transition-colors"
                                        >
                                          <i className="fa-solid fa-eye"></i> 
                                          {showModelAnswer[idx] ? "Hide Model Answer" : "Show Model Answer"}
                                        </button>
                                        
                                        {showModelAnswer[idx] && (
                                          <div className="mt-2 p-3 bg-indigo-900/20 border border-indigo-500/30 rounded-md animate-fade-in">
                                            <h5 className="text-[10px] uppercase tracking-wider font-bold text-indigo-300 mb-1.5">Model Response</h5>
                                            <button 
                                              onClick={() => handleSpeak(test.modelAnswer)}
                                              className="w-full text-left text-[10px] md:text-xs text-slate-200 leading-relaxed font-medium whitespace-pre-line hover:text-white"
                                            >
                                              {test.modelAnswer}
                                            </button>
                                          </div>
                                        )}
                                      </div>
                                    )}
                                  </div>
                                </div>
                              ))}
                            </div>
                          </div>
                        </div>
                      )}

                    </div>
                  </div>
                </main>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
