<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family and Friends 4 - Conversation Practice</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@700;800;900&display=swap" rel="stylesheet">
<style>
* {
    font-weight: 700 !important; /* Force all fonts to be bold for visibility */
}
body { 
    font-family: 'Quicksand', 'Comic Sans MS', sans-serif; 
    touch-action: manipulation; 
    overflow: hidden; 
    background-color: #f1f5f9; 
}
.screen { display: none; height: 100vh; width: 100vw; }
.screen.active { display: flex; flex-direction: column; }
.unit-btn { transition: all 0.2s ease; border: 3px solid transparent; background-color: white; }
.unit-btn:hover { transform: translateY(-3px); border-color: #4f46e5; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
#convo-container {
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: flex-start;
    height: 100%;
    padding: 1rem;
    gap: 0.5rem;
    overflow-y: auto;
    scroll-behavior: smooth;
}
.chat-bubble {
    max-width: 80%;
    padding: 0.6rem 1.2rem;
    border-radius: 1.5rem;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    opacity: 1;
    transform: scale(1);
    font-size: 1.2rem;
    line-height: 1.3;
    border-width: 3px;
    flex-shrink: 0;
}
.chat-bubble.active {
    transform: scale(1.06);
    font-weight: 900 !important;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
    z-index: 10;
    font-size: 1.35rem;
}
.chat-left { 
    align-self: flex-start; 
    border-bottom-left-radius: 0.2rem; 
    margin-right: auto;
}
.chat-right { 
    align-self: flex-end; 
    border-bottom-right-radius: 0.2rem; 
    text-align: right;
    margin-left: auto;
}
.theme-blue { background-color: #eff6ff; color: #1e40af; border-color: #bfdbfe; }
.theme-black { background-color: #f8fafc; color: #000000; border-color: #e2e8f0; }
.theme-purple { background-color: #faf5ff; color: #6b21a8; border-color: #e9d5ff; }
.theme-emerald { background-color: #ecfdf5; color: #065f46; border-color: #a7f3d0; }
.speaker-name { 
    font-size: 0.96rem; /* Expanded by exactly 20% from 0.8rem */
    font-weight: 900 !important; 
    text-transform: uppercase; 
    margin-bottom: 2px; 
    letter-spacing: 0.05em; 
}
@keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.chat-bubble { animation: slideIn 0.4s ease forwards; }
::-webkit-scrollbar { display: none; }
.emoji-wrapper { display: inline-block; pointer-events: none; }
</style>
</head>
<body>
<!-- Main Menu -->
<div id="main-menu" class="screen active p-6 overflow-y-auto">
    <div class="max-w-6xl mx-auto w-full">
        <h1 class="text-3xl font-black text-center text-indigo-950 mb-2">Family and Friends 4</h1>
        <p class="text-center text-slate-600 mb-5 text-sm font-bold italic text-balance">English Dialogue Practice - 2nd Edition</p>
        <div id="unit-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-6 pb-12"></div>
    </div>
</div>

<!-- Objective Screen -->
<div id="objective-screen" class="screen p-4 items-center justify-center bg-slate-100">
    <div class="bg-white rounded-[3rem] shadow-2xl p-6 max-w-4xl w-full border-8 border-indigo-200">
        <h2 id="obj-unit-title" class="text-2xl font-black text-indigo-950 mb-4 border-b-4 border-indigo-100 pb-2 text-center"></h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="p-4 bg-blue-50 rounded-3xl border-2 border-blue-200">
                <h3 class="text-blue-700 font-black text-base uppercase mb-1">Vocabulary 🍎</h3>
                <p id="obj-vocab" class="text-slate-800 text-lg font-bold leading-snug"></p>
            </div>
            <div class="p-4 bg-purple-50 rounded-3xl border-2 border-purple-200">
                <h3 class="text-purple-700 font-black text-base uppercase mb-1">Grammar ✏️</h3>
                <p id="obj-grammar" class="text-slate-800 text-lg font-bold leading-snug"></p>
            </div>
            <div class="p-4 bg-emerald-50 rounded-3xl border-2 border-emerald-200">
                <h3 class="text-emerald-700 font-black text-base uppercase mb-1">Skills 💡</h3>
                <p id="obj-skills" class="text-slate-800 text-lg font-bold leading-snug"></p>
            </div>
        </div>
        <div class="mt-6 flex justify-center gap-3 flex-wrap">
            <button onclick="startConversationFlow(1)" class="bg-indigo-600 text-white font-black py-3 px-6 rounded-full shadow-2xl hover:bg-indigo-700 transform hover:scale-110 transition-all text-lg">
                CONVO 1 🗣️
            </button>
            <button onclick="startConversationFlow(2)" class="bg-purple-600 text-white font-black py-3 px-6 rounded-full shadow-2xl hover:bg-purple-700 transform hover:scale-110 transition-all text-lg">
                CONVO 2 🗣️
            </button>
            <button onclick="startConversationFlow(3)" class="bg-emerald-600 text-white font-black py-3 px-6 rounded-full shadow-2xl hover:bg-emerald-700 transform hover:scale-110 transition-all text-lg">
                CONVO 3 🗣️
            </button>
            <button onclick="startConversationFlow(4)" class="bg-pink-600 text-white font-black py-3 px-6 rounded-full shadow-2xl hover:bg-pink-700 transform hover:scale-110 transition-all text-lg">
                CONVO 4 🗣️
            </button>
        </div>
    </div>
</div>

<!-- Conversation Screen -->
<div id="conversation-screen" class="screen bg-white">
    <header class="p-3 border-b-2 flex justify-between items-center bg-slate-50 flex-shrink-0">
        <div class="flex gap-2">
            <button onclick="goToMenu()" class="bg-white border-2 border-slate-200 px-3 py-1 rounded-xl font-black text-slate-700 flex items-center gap-1 hover:bg-slate-100 text-sm shadow-sm">
                🏠 HOME
            </button>
            <button onclick="goToObjective()" class="bg-white border-2 border-slate-200 px-3 py-1 rounded-xl font-black text-slate-700 flex items-center gap-1 hover:bg-slate-100 text-sm shadow-sm">
                ⬅ BACK
            </button>
        </div>
        <h2 id="convo-unit-header" class="text-xl font-black text-indigo-900"></h2>
        <div class="flex gap-2">
            <button id="repeat-btn" onclick="repeatConversation()" class="bg-indigo-600 text-white font-black py-1 px-3 rounded-xl flex items-center gap-1 hover:bg-indigo-700 shadow-md text-sm">
                🔄 REPEAT
            </button>
            <button onclick="nextConversation()" class="bg-emerald-600 text-white font-black py-1 px-3 rounded-xl flex items-center gap-1 hover:bg-emerald-700 shadow-md text-sm">
                NEXT ⏭️
            </button>
        </div>
    </header>
    <div id="convo-container"></div>
</div>

<script>
const lessons = {

    conversation: [

        { name: "Max", gender: "m1", side: "left", theme: "theme-blue", text: "My birthday is in August. When is your birthday? 📅" },
        { name: "Amy", gender: "f2", side: "right", theme: "theme-black", text: "My birthday is in March. I am seven years old. 🎉" }
    ],
    conversation2: [

        { name: "Max", gender: "m1", side: "left", theme: "theme-blue", text: "Yes, I have a big family. Do you have a big family? 🏠" },
        { name: "Holly", gender: "f1", side: "right", theme: "theme-purple", text: "Yes, I have two brothers and one sister. 👦👧" },
        { name: "Max", gender: "m1", side: "left", theme: "theme-blue", text: "How old are your brothers, Holly? 🎂" },
        { name: "Holly", gender: "f1", side: "right", theme: "theme-purple", text: "Tommy is eight years old and Ben is six years old. 🎈" },
        { name: "Max", gender: "m1", side: "left", theme: "theme-blue", text: "Do your grandparents live in your house? 👴👵" },
        { name: "Holly", gender: "f1", side: "right", theme: "theme-purple", text: "No, they do not. They live in a different city. 🏙️" },
        { name: "Max", gender: "m1", side: "left", theme: "theme-blue", text: "That is very nice. I love my family. ❤️" }
    ],
    conversation3: [
        { name: "Amy", gender: "f2", side: "right", theme: "theme-black", text: "Do you have any cousins, Max? 👨‍👩‍👧‍👦" },
        { name: "Max", gender: "m1", side: "left", theme: "theme-blue", text: "Yes, I have three cousins. They live in Canada. 🍁" },
        { name: "Amy", gender: "f2", side: "right", theme: "theme-black", text: "Do you see your cousins often? 👀" },
        { name: "Max", gender: "m1", side: "left", theme: "theme-blue", text: "No, I do not. I see them in the summer. ☀️" },
        { name: "Amy", gender: "f2", side: "right", theme: "theme-black", text: "My cousins live near my house. We play every weekend. ⚽" },
        { name: "Max", gender: "m1", side: "left", theme: "theme-blue", text: "Does your aunt have many children? 👩‍🦱" },
        { name: "Amy", gender: "f2", side: "right", theme: "theme-black", text: "Yes, my aunt has four children. They are my cousins. 👦👧" },
        { name: "Max", gender: "m1", side: "left", theme: "theme-blue", text: "That is a very big family. You are lucky. 🍀" }
    ],
    conversation4: [
        { name: "Dad", gender: "m2", side: "right", theme: "theme-emerald", text: "Look at our family tree, Max. It is very big. 🌳" },
        { name: "Max", gender: "m1", side: "left", theme: "theme-blue", text: "How many people are in our family? 👨‍👩‍👧‍👦" },
        { name: "Dad", gender: "m2", side: "right", theme: "theme-emerald", text: "There are twenty people in our family. 🔢" },
        { name: "Max", gender: "m1", side: "left", theme: "theme-blue", text: "Who is the oldest person in the family? 👴" },
        { name: "Dad", gender: "m2", side: "right", theme: "theme-emerald", text: "Your Uncle John is the oldest person. He is sixty-five. 🎂" },
        { name: "Max", gender: "m1", side: "left", theme: "theme-blue", text: "Who is the youngest person in the family? 👶" },
        { name: "Dad", gender: "m2", side: "right", theme: "theme-emerald", text: "Your cousin Lily is the youngest person. She is two. 🎈" },
        { name: "Max", gender: "m1", side: "left", theme: "theme-blue", text: "I want to draw a picture of our family tree. ✏️" }
    ]
},
"Unit 1": {
    title: "Weekend 🚲", emoji: "🚲",
    vocab: "Skateboard 🛹, Gymnastics 🤸, Volleyball 🏐, Fishing 🎣, Basketball 🏀, Photos 📸, Guitar 🎸, Piano 🎹, Comics 📖",

    ],
    conversation2: [
        { name: "Leo", gender: "m1", side: "left", theme: "theme-blue", text: "What do you do on the weekend, Amy? 😊" },
        { name: "Amy", gender: "f2", side: "right", theme: "theme-black", text: "I play basketball and I listen to music. 🏀🎵" },
        { name: "Leo", gender: "m1", side: "left", theme: "theme-blue", text: "I ride my bike and I play video games. 🚲🎮" },
        { name: "Amy", gender: "f2", side: "right", theme: "theme-black", text: "Do you visit your grandparents on the weekend? 👴👵" },
        { name: "Leo", gender: "m1", side: "left", theme: "theme-blue", text: "Yes, I visit them every Saturday. 📅" },

    ],
    conversation3: [
        { name: "Holly", gender: "f1", side: "right", theme: "theme-purple", text: "What are your plans for the weekend, Max? 📅" },
        { name: "Max", gender: "m1", side: "left", theme: "theme-blue", text: "I will visit my grandma on Saturday. 👵" },
        { name: "Holly", gender: "f1", side: "right", theme: "theme-purple", text: "What will you do on Sunday? 🌞" },
        { name: "Max", gender: "m1", side: "left", theme: "theme-blue", text: "I will play football with my friends. ⚽" },
        { name: "Holly", gender: "f1", side: "right", theme: "theme-purple", text: "I will go to the park with my family. 🌳" },
        { name: "Max", gender: "m1", side: "left", theme: "theme-blue", text: "Do you like to play sports? 🏃" },
        { name: "Holly", gender: "f1", side: "right", theme: "theme-purple", text: "No, I do not. I prefer quiet activities. 📚" },
        { name: "Max", gender: "m1", side: "left", theme: "theme-blue", text: "I understand. I hope you have a great weekend! 😊" }
    ],
    conversation4: [
        { name: "Mom", gender: "f1", side: "right", theme: "theme-purple", text: "What do you want to do this weekend, Max? 🤔" },
        { name: "Max", gender: "m1", side: "left", theme: "theme-blue", text: "I want to go to the cinema, Mom. 🎬" },
        { name: "Mom", gender: "f1", side: "right", theme: "theme-purple", text: "We can go to the cinema on Saturday. 🎉" },
        { name: "Max", gender: "m1", side: "left", theme: "theme-blue", text: "Can we go swimming on Sunday? 🏊" },
        { name: "Mom", gender: "f1", side: "right", theme: "theme-purple", text: "Yes, we can go to the pool. 🌊" },
        { name: "Max", gender: "m1", side: "left", theme: "theme-blue", text: "Can I invite my cousins to come with us? 👦👧" },
        { name: "Mom", gender: "f1", side: "right", theme: "theme-purple", text: "Yes, you can invite your cousins. 📱" },
        { name: "Max", gender: "m1", side: "left", theme: "theme-blue", text: "Thank you, Mom! This is the best weekend! 🎊" }
    ]
},
"Unit 2": {
    title: "Things 🎮", emoji: "🎮",
    vocab: "Computer 💻, TV 📺, DVD 📀, CD 💿, MP3 🎵, Camera 📷, Stickers ✨, Posters 🖼️, Pins 📍, Shells 🐚",
    grammar: "Possessive adjectives, Can for permission, Questions with can",
    skills: "Talking about collections, asking permission, describing objects",
    conversation: [
        { name: "Holly", gender: "f1", side: "right", theme: "theme-purple", text: "Can I use your computer, Max? 💻" },
        { name: "Max", gender: "m1", side: "left", theme: "theme-blue", text: "No, you can not. I am using it now. 🙅" },

        { name: "Max", gender: "m1", side: "left", theme: "theme-blue", text: "No, they are not mine. They are your stickers. 📍" },
        { name: "Holly", gender: "f1", side: "right", theme: "theme-purple", text: "Where do you keep all your collections? 📦" },
        { name: "Max", gender: "m1", side: "left", theme: "theme-blue", text: "I keep them in a special box in my room. 📭" }

    conversation2: [
        { name: "Max", gender: "m1", side: "left", theme: "theme-blue", text: "Do you like my new MP3 player, Holly? 🎵" },
        { name: "Holly", gender: "f1", side: "right", theme: "theme-purple", text: "Yes, it is very cool. Can I listen to it? 🎧" },

"Unit 3": {

    conversation: [

const synth = window.speechSynthesis;
let brianVoice, andrewVoice, emmaVoice, avaVoice;
let currentLessonData = null;
let convoIndex = 0;
let isTtsActive = false;
let currentConvoType = 1;

// Emoji regex pattern - matches most emoji characters
const emojiRegex = /[\u{1F300}-\u{1F9FF}]|[\u{2600}-\u{26FF}]|[\u{2700}-\u{27BF}]|[\u{1F100}-\u{1F1FF}]|[\u{1F600}-\u{1F64F}]|[\u{1F680}-\u{1F6FF}]|[\u{1F700}-\u{1F77F}]|[\u{1F780}-\u{1F7FF}]|[\u{1F800}-\u{1F8FF}]|[\u{1F900}-\u{1F9FF}]|[\u{1FA00}-\u{1FA6F}]|[\u{1FA70}-\u{1FAFF}]|[\u{2300}-\u{23FF}]|[\u{25A0}-\u{25FF}]|[\u{2900}-\u{297F}]|[\u{2B00}-\u{2BFF}]|[\u{3030}]|[\u{303D}]|[\u{3297}]|[\u{3299}]/gu;

// Wrap emojis in span for display, strip for TTS
function wrapEmojis(text) {
    return text.replace(emojiRegex, (emoji) => `<span class="emoji-wrapper">${emoji}</span>`);
}

function stripEmojis(text) {
    return text.replace(emojiRegex, '').trim();
}

function getBestVoice(voices, preferredNames) {
    // 1. Try to find a preferred name that is Online or Multilingual
    for (let name of preferredNames) {
        let voice = voices.find(v => v.name.includes(name) && (v.name.includes("Online") || v.name.includes("Multilingual")));
        if (voice) return voice;
    }
    // 2. Try to find a preferred name regardless of Online/Multilingual
    for (let name of preferredNames) {
        let voice = voices.find(v => v.name.includes(name));
        if (voice) return voice;
    }
    return null;
}

function initVoices() {
    const voices = synth.getVoices();
    
    // Microsoft Online & Multilingual voices priority
    brianVoice = getBestVoice(voices, ["Florian", "Brian"]);
    andrewVoice = getBestVoice(voices, ["Remy", "Andrew"]);
    emmaVoice = getBestVoice(voices, ["Seraphina", "Emma"]);
    avaVoice = getBestVoice(voices, ["Vivienne", "Ava"]);
    
    // Strict Fallbacks to guarantee uniqueness where possible
    let enVoicesMale = voices.filter(v => (v.name.includes("Male") || v.name.includes("David") || v.name.includes("Mark") || v.name.includes("Andrew") || v.name.includes("Brian") || v.name.includes("Remy") || v.name.includes("Florian")) && v.lang.startsWith("en"));
    let enVoicesFemale = voices.filter(v => (v.name.includes("Female") || v.name.includes("Zira") || v.name.includes("Hazel") || v.name.includes("Emma") || v.name.includes("Ava") || v.name.includes("Seraphina") || v.name.includes("Vivienne")) && v.lang.startsWith("en"));

    if (!brianVoice) brianVoice = enVoicesMale[0] || voices[0];
    if (!andrewVoice) andrewVoice = enVoicesMale.length > 1 ? enVoicesMale.find(v => v !== brianVoice) : (enVoicesMale[0] || voices[0]);

    if (!emmaVoice) emmaVoice = enVoicesFemale[0] || voices[1] || voices[0];
    if (!avaVoice) avaVoice = enVoicesFemale.length > 1 ? enVoicesFemale.find(v => v !== emmaVoice) : (enVoicesFemale[0] || voices[1] || voices[0]);
}

if (synth.onvoiceschanged !== undefined) {
    synth.onvoiceschanged = initVoices;
}

function speak(text, voice, onEnd) {
    if (synth.speaking) synth.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.voice = voice;
    utter.rate = 0.85; // Slowed down speech rate per user request
    utter.onend = onEnd;
    synth.speak(utter);
}

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    // Scroll to top
    window.scrollTo(0, 0);
}

function goToMenu() {
    synth.cancel();
    isTtsActive = false;
    showScreen('main-menu');
}

function goToObjective() {
    synth.cancel();
    isTtsActive = false;
    showScreen('objective-screen');
}

function selectUnit(unitKey) {
    currentLessonData = lessons[unitKey];
    if(!currentLessonData) return;
    
    document.getElementById('obj-unit-title').textContent = `${unitKey}: ${currentLessonData.title}`;
    document.getElementById('obj-vocab').textContent = currentLessonData.vocab;
    document.getElementById('obj-grammar').textContent = currentLessonData.grammar;
    document.getElementById('obj-skills').textContent = currentLessonData.skills;
    
    showScreen('objective-screen');
    
    const cleanVocab = currentLessonData.vocab.replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, "");
    const text = `${unitKey}. ${currentLessonData.title}. Vocabulary includes: ${cleanVocab}. Grammar focus: ${currentLessonData.grammar}. Skills: ${currentLessonData.skills}.`;
    speak(text, brianVoice, null);
}

function startConversationFlow(convoType) {
    currentConvoType = convoType;
    synth.cancel();
    showScreen('conversation-screen');
    document.getElementById('convo-unit-header').textContent = currentLessonData.title + ` (Conversation ${convoType})`;
    const container = document.getElementById('convo-container');
    container.innerHTML = '';
    convoIndex = 0;
    isTtsActive = true;
    nextTurn();
}

function nextConversation() {
    let nextType = currentConvoType + 1;
    if (nextType > 4) nextType = 1;
    startConversationFlow(nextType);
}

function nextTurn() {
    if (!isTtsActive) return;
    
    let conversation;
    if (currentConvoType === 1) {
        conversation = currentLessonData.conversation;
    } else if (currentConvoType === 2) {
        conversation = currentLessonData.conversation2;
    } else if (currentConvoType === 3) {
        conversation = currentLessonData.conversation3;
    } else {
        conversation = currentLessonData.conversation4;
    }
    
    if (convoIndex >= conversation.length) return;
    
    const turn = conversation[convoIndex];
    const container = document.getElementById('convo-container');
    const bubble = document.createElement('div');
    
    // Use the explicit side property from the data
    const sideClass = turn.side === 'left' ? 'chat-left' : 'chat-right';
    bubble.className = `chat-bubble ${sideClass} ${turn.theme} active fade-in`;
    bubble.innerHTML = `<div class="speaker-name">${turn.name}</div>${wrapEmojis(turn.text)}`;
    
    container.appendChild(bubble);
    
    // Scroll to top of conversation when it starts
    if (convoIndex === 0) {
        container.scrollTop = 0;
    }
    
    // Keep all text visible, but de-activate previous lines for subtle focus
    const allBubbles = container.querySelectorAll('.chat-bubble');
    if (allBubbles.length > 1) {
        allBubbles[allBubbles.length - 2].classList.remove('active');
    }
    
    // Voice selection based on the new gender tags (m1/m2 and f1/f2)
    let voiceToUse;
    if (turn.gender === 'm' || turn.gender === 'm1') voiceToUse = andrewVoice;
    else if (turn.gender === 'm2') voiceToUse = brianVoice;
    else if (turn.gender === 'f1') voiceToUse = emmaVoice;
    else voiceToUse = avaVoice; // catches 'f2'
    
    // Remove emojis for speech
    const cleanText = stripEmojis(turn.text);
    
    speak(cleanText, voiceToUse, () => {
        convoIndex++;
        let conv;
        if (currentConvoType === 1) conv = currentLessonData.conversation;
        else if (currentConvoType === 2) conv = currentLessonData.conversation2;
        else if (currentConvoType === 3) conv = currentLessonData.conversation3;
        else conv = currentLessonData.conversation4;
        
        if (convoIndex < conv.length) {
            setTimeout(nextTurn, 500);
        }
    });
}

function repeatConversation() {
    startConversationFlow(currentConvoType);
}

function init() {
    const grid = document.getElementById('unit-grid');
    const sortedKeys = Object.keys(lessons).sort((a,b) => {
        if(a === "Starter") return -1;
        if(b === "Starter") return 1;
        return parseInt(a.split(' ')[1]) - parseInt(b.split(' ')[1]);
    });
    
    sortedKeys.forEach(key => {
        const btn = document.createElement('button');
        btn.className = 'unit-btn p-4 rounded-[2rem] shadow-lg text-center flex flex-col items-center justify-center';
        btn.innerHTML = `<div class="text-4xl mb-2">${lessons[key].emoji}</div><div class="font-black text-indigo-900 text-base">${key}</div><div class="text-slate-500 font-bold text-xs uppercase tracking-tighter">${lessons[key].title}</div>`;
        btn.onclick = () => selectUnit(key);
        grid.appendChild(btn);
    });
    
    initVoices();
}

window.onload = init;
</script>
</body>
</html>
