<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Grammar Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Comic Neue', cursive; overflow: hidden; }
        .tile-base { transition: transform 0.1s ease; cursor: pointer; user-select: none; }
        
        /* FONT SIZES & PADDING DOUBLED */
        .word-tile { background: white; border-bottom: 6px solid #a7f3d0; color: #134e4a; box-shadow: 0 6px 8px rgba(0,0,0,0.1); padding: 16px 28px; border-radius: 12px; font-weight: bold; font-size: 1.9rem; }
        .conj-tile { background: #3b82f6; border-bottom: 6px solid #1d4ed8; color: white; box-shadow: 0 6px 8px rgba(0,0,0,0.2); padding: 16px 28px; border-radius: 12px; font-weight: bold; font-size: 1.9rem; }
        .punct-tile { background: #e2e8f0; border-bottom: 6px solid #cbd5e1; color: #475569; padding: 16px 28px; border-radius: 12px; font-weight: bold; font-size: 1.9rem; }
        
        .drop-zone { min-height: 120px; background-image: radial-gradient(#cbd5e1 2px, transparent 2px); background-size: 40px 40px; border-radius: 16px; }
        .scrollable-y { overflow-y: auto; }
    </style>
</head>
<body class="bg-slate-50 h-screen flex flex-col">

    <!-- HEADER: SIZES DOUBLED -->
    <header class="bg-emerald-600 text-white p-4 shadow-lg flex justify-between items-center z-10 shrink-0">
        <div class="flex items-center gap-6">
            <button onclick="goToMenu()" id="home-btn" class="hidden hover:text-yellow-300"><i class="fas fa-home text-4xl"></i></button>
            <h1 class="text-3xl font-bold">Grammar Master</h1>
        </div>
        <div class="flex items-center gap-6 font-bold">
            <div id="count-display" class="bg-emerald-700 px-5 py-2 rounded-full text-xl hidden">1 / 60</div>
            <div id="score-display" class="bg-yellow-400 text-emerald-900 px-5 py-2 rounded-full text-xl">Score: 0</div>
        </div>
    </header>

    <main class="flex-grow relative w-full max-w-full mx-auto p-4 flex flex-col scrollable-y">
        
        <!-- MENU SCREEN: SIZES DOUBLED -->
        <div id="menu-screen" class="bg-white rounded-3xl shadow-2xl p-12 text-center border-4 border-emerald-200 m-auto max-w-4xl w-full">
            <h1 class="text-6xl font-bold text-emerald-600 mb-10">Choose Challenge</h1>
            <input type="text" id="username-input" class="border-4 border-emerald-300 rounded-2xl w-full py-6 px-8 mb-10 text-center text-4xl" placeholder="Enter Name">
            <div class="grid grid-cols-1 gap-6">
                <button onclick="startMode('compound')" class="bg-blue-500 hover:bg-blue-600 text-white py-6 rounded-3xl text-3xl font-bold shadow-lg">Compound Sentences</button>
                <button onclick="startMode('complex')" class="bg-purple-500 hover:bg-purple-600 text-white py-6 rounded-3xl text-3xl font-bold shadow-lg">Complex & Adverbial</button>
                <button onclick="startMode('mixed')" class="bg-emerald-500 hover:bg-emerald-600 text-white py-6 rounded-3xl text-3xl font-bold shadow-lg">Mixed Challenge</button>
            </div>
        </div>

        <!-- GAME SCREEN: SIZES DOUBLED -->
        <div id="game-screen" class="hidden flex flex-col h-full w-full">
            
            <!-- Question row at top -->
            <div class="bg-white rounded-2xl shadow-lg p-6 mb-4 border-l-8 border-emerald-500 shrink-0">
                <h2 class="text-3xl md:text-4xl font-bold text-slate-800" id="question-text">combine ideas!</h2>
            </div>
            
            <!-- 3 Columns on the same row -->
            <div class="flex flex-row gap-4 flex-grow min-h-0 overflow-hidden">
                <div class="w-1/4 bg-blue-100 rounded-2xl p-4 flex flex-col items-center overflow-y-auto shadow-inner">
                    <h3 class="font-bold text-blue-800 text-xl md:text-2xl mb-4 uppercase tracking-wide">Joining Words</h3>
                    <div id="conj-bank" class="flex flex-wrap gap-4 justify-center w-full"></div>
                </div>
                
                <div class="w-1/2 flex flex-col min-h-0 bg-white rounded-2xl shadow-inner border-4 border-dashed border-slate-300 p-4 relative">
                    <span class="text-xl md:text-2xl text-gray-400 font-bold uppercase mb-4 absolute top-4 left-4 pointer-events-none">Build Sentence Here</span>
                    <div id="answer-area" class="drop-zone flex flex-row flex-wrap gap-4 content-start w-full h-full overflow-y-auto pt-14"></div>
                </div>
                
                <div class="w-1/4 bg-emerald-100 rounded-2xl p-4 flex flex-col items-center overflow-y-auto shadow-inner">
                    <h3 class="font-bold text-emerald-800 text-xl md:text-2xl mb-4 uppercase tracking-wide">Words & Punctuation</h3>
                    <div id="word-bank" class="flex flex-wrap gap-4 justify-center w-full"></div>
                </div>
            </div>
        </div>
    </main>

<script>
    const allConjunctions = ['and', 'but', 'or', 'so', 'because', 'if', 'although', 'when', 'while', 'before', 'after', 'until', 'since', 'unless', 'who', 'which', 'where'];
    
    const masterDB = [
        // --- COMPOUND SENTENCES (30) ---
        { cat: 'compound', c1: 'I like soccer', c2: 'I do not like tennis', conj: 'but' },
        { cat: 'compound', c1: 'He runs fast', c2: 'he wins the race', conj: 'so' },
        { cat: 'compound', c1: 'We can swim', c2: 'we can play basketball', conj: 'or' },
        { cat: 'compound', c1: 'She trains hard', c2: 'she is strong', conj: 'and' },
        { cat: 'compound', c1: 'I have a dog', c2: 'I have a cat', conj: 'and' },
        { cat: 'compound', c1: 'It is raining', c2: 'we cannot play outside', conj: 'so' },
        { cat: 'compound', c1: 'The cat is cute', c2: 'it scratches the sofa', conj: 'but' },
        { cat: 'compound', c1: 'You can feed the fish', c2: 'you can walk the dog', conj: 'or' },
        { cat: 'compound', c1: 'My dog is hungry', c2: 'I give him food', conj: 'so' },
        { cat: 'compound', c1: 'Hamsters are small', c2: 'they run on wheels', conj: 'and' },
        { cat: 'compound', c1: 'I want pizza', c2: 'Mom cooked soup', conj: 'but' },
        { cat: 'compound', c1: 'The apple is red', c2: 'it is very sweet', conj: 'and' },
        { cat: 'compound', c1: 'I am thirsty', c2: 'I drink water', conj: 'so' },
        { cat: 'compound', c1: 'We can eat cake', c2: 'we can eat ice cream', conj: 'or' },
        { cat: 'compound', c1: 'He likes spicy food', c2: 'he adds chili oil', conj: 'so' },
        { cat: 'compound', c1: 'Tom is my friend', c2: 'he is very kind', conj: 'and' },
        { cat: 'compound', c1: 'I called him', c2: 'he did not answer', conj: 'but' },
        { cat: 'compound', c1: 'We can watch a movie', c2: 'we can play games', conj: 'or' },
        { cat: 'compound', c1: 'She told a joke', c2: 'everyone laughed', conj: 'so' },
        { cat: 'compound', c1: 'He is shy', c2: 'he is very smart', conj: 'but' },
        { cat: 'compound', c1: 'We went to Japan', c2: 'we ate sushi', conj: 'and' },
        { cat: 'compound', c1: 'The car broke down', c2: 'we were late', conj: 'so' },
        { cat: 'compound', c1: 'You can take a bus', c2: 'you can take a train', conj: 'or' },
        { cat: 'compound', c1: 'The beach is beautiful', c2: 'the water is cold', conj: 'but' },
        { cat: 'compound', c1: 'I packed my bag', c2: 'I forgot my camera', conj: 'but' },
        { cat: 'compound', c1: 'Dad is working', c2: 'he is tired', conj: 'and' },
        { cat: 'compound', c1: 'My sister is young', c2: 'she is tall', conj: 'but' },
        { cat: 'compound', c1: 'We can visit Grandma', c2: 'we can stay home', conj: 'or' },
        { cat: 'compound', c1: 'The baby cried', c2: 'Mom hugged him', conj: 'so' },
        { cat: 'compound', c1: 'I love my family', c2: 'they love me', conj: 'and' },

        // --- COMPLEX, ADVERBIAL & ADJECTIVE SENTENCES (30) ---
        { cat: 'complex', c1: 'I drink water', c2: 'I am thirsty', conj: 'because' },
        { cat: 'complex', c1: 'I fell down', c2: 'I was running', conj: 'while' },
        { cat: 'complex', c1: 'You will pass', c2: 'you study hard', conj: 'if' },
        { cat: 'complex', c1: 'The rain stops', c2: 'we cannot play', conj: 'until' },
        { cat: 'complex', c1: 'I thanked the man', c2: 'he helped me', conj: 'who' },
        { cat: 'complex', c1: 'I read the book', c2: 'it was exciting', conj: 'which' },
        { cat: 'complex', c1: 'This is the park', c2: 'we play baseball', conj: 'where' },
        { cat: 'complex', c1: 'We went inside', c2: 'it started to rain', conj: 'when' },
        { cat: 'complex', c1: 'He passed the test', c2: 'he did not study', conj: 'although' },
        { cat: 'complex', c1: 'Wash your hands', c2: 'you eat dinner', conj: 'before' },
        { cat: 'complex', c1: 'We will go home', c2: 'the movie finishes', conj: 'after' },
        { cat: 'complex', c1: 'He has played piano', c2: 'he was a child', conj: 'since' },
        { cat: 'complex', c1: 'You will miss the train', c2: 'you hurry up', conj: 'unless' },
        { cat: 'complex', c1: 'I eat apples', c2: 'they are healthy', conj: 'because' },
        { cat: 'complex', c1: 'We watched TV', c2: 'Dad was cooking', conj: 'while' },
        { cat: 'complex', c1: 'You feel energetic', c2: 'you eat vegetables', conj: 'if' },
        { cat: 'complex', c1: 'Wait here', c2: 'I come back', conj: 'until' },
        { cat: 'complex', c1: 'I know the teacher', c2: 'she teaches math', conj: 'who' },
        { cat: 'complex', c1: 'She lost the ring', c2: 'it belonged to her grandmother', conj: 'which' },
        { cat: 'complex', c1: 'I visited the hospital', c2: 'I was born', conj: 'where' },
        { cat: 'complex', c1: 'The dog barks', c2: 'it sees a cat', conj: 'when' },
        { cat: 'complex', c1: 'We went for a walk', c2: 'it was cold', conj: 'although' },
        { cat: 'complex', c1: 'Finish your homework', c2: 'you play games', conj: 'before' },
        { cat: 'complex', c1: 'I brush my teeth', c2: 'I wake up', conj: 'after' },
        { cat: 'complex', c1: 'She has learned French', c2: 'she moved to Paris', conj: 'since' },
        { cat: 'complex', c1: 'You will fail', c2: 'you study hard', conj: 'unless' },
        { cat: 'complex', c1: 'I help Mom', c2: 'she is busy', conj: 'because' },
        { cat: 'complex', c1: 'The phone rang', c2: 'he was reading', conj: 'while' },
        { cat: 'complex', c1: 'You can go to the party', c2: 'you finish your chores', conj: 'if' },
        { cat: 'complex', c1: 'The water boils', c2: 'do not add the pasta', conj: 'until' }
    ];

    let state = { score: 0, currentMode: 'compound', filteredDB: [], currentQ: 0, playerName: '', approvedVoices: [] };

    window.onload = loadVoices;

    function loadVoices() {
        const target = ["Remy", "Giuseppe", "Vivienne", "Florian", "Seraphina", "Emma", "Brian", "Andrew", "William", "Ava"];
        const all = window.speechSynthesis.getVoices();
        
        // Priority 1: Target natural voices
        state.approvedVoices = all.filter(v => target.some(name => v.name.includes(name)) && v.lang.startsWith('en'));
        
        // Priority 2: English Multilingual
        if(state.approvedVoices.length === 0) {
            state.approvedVoices = all.filter(v => v.name.toLowerCase().includes("multilingual") && v.lang.startsWith('en'));
        }
        
        // Priority 3: Fallback
        if(state.approvedVoices.length === 0) {
            state.approvedVoices = all.filter(v => v.lang.startsWith('en'));
        }
    }

    function startMode(mode) {
        state.currentMode = mode;
        state.playerName = document.getElementById('username-input').value || "Student";
        state.filteredDB = (mode === 'mixed') ? [...masterDB] : masterDB.filter(q => q.cat === mode);
        // Shuffle questions
        state.filteredDB.sort(() => Math.random() - 0.5);
        
        document.getElementById('menu-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        document.getElementById('home-btn').classList.remove('hidden');
        document.getElementById('count-display').classList.remove('hidden');
        state.currentQ = 0;
        loadQuestion();
    }

    function goToMenu() {
        document.getElementById('menu-screen').classList.remove('hidden');
        document.getElementById('game-screen').classList.add('hidden');
        document.getElementById('home-btn').classList.add('hidden');
        document.getElementById('count-display').classList.add('hidden');
    }

    function loadQuestion() {
        const q = state.filteredDB[state.currentQ];
        document.getElementById('count-display').innerText = `${state.currentQ + 1} / ${state.filteredDB.length}`;
        
        // Lowercase prompt to avoid giving away starting word, except 'I'
        const formatCombine = (text) => text.toLowerCase().replace(/\bi\b/g, 'I');
        document.getElementById('question-text').innerText = "combine: " + formatCombine(q.c1) + "  /  " + formatCombine(q.c2);
        
        const wb = document.getElementById('word-bank');
        const cb = document.getElementById('conj-bank');
        wb.innerHTML = '';
        cb.innerHTML = '';
        document.getElementById('answer-area').innerHTML = '';

        // Add sentence components to right bank (forced lowercase to start)
        [q.c1, q.c2, ".", ","].forEach(text => {
            const el = document.createElement('div');
            el.className = (text === '.' || text === ',') ? 'punct-tile tile-base' : 'word-tile tile-base';
            el.dataset.original = text; 
            el.innerText = text.toLowerCase();
            el.onclick = () => toggle(el);
            wb.appendChild(el);
        });

        // Add correct conjunction + 3 random distractors to left bank
        let options = new Set([q.conj]);
        while(options.size < 4) {
            let randomConj = allConjunctions[Math.floor(Math.random() * allConjunctions.length)];
            options.add(randomConj);
        }
        
        Array.from(options).sort(() => Math.random() - 0.5).forEach(word => {
            const conj = document.createElement('div');
            conj.className = 'conj-tile tile-base';
            conj.dataset.original = word;
            conj.innerText = word.toLowerCase();
            conj.onclick = () => toggle(conj);
            cb.appendChild(conj);
        });
        
        applyCapitalization();
    }

    function toggle(el) {
        const aa = document.getElementById('answer-area');
        const wb = document.getElementById('word-bank');
        const cb = document.getElementById('conj-bank');
        
        if(el.parentElement.id === 'answer-area') {
            if(el.classList.contains('conj-tile')) cb.appendChild(el);
            else wb.appendChild(el);
        } else {
            aa.appendChild(el);
        }
        applyCapitalization();
        check();
    }

    function applyCapitalization() {
        const aa = document.getElementById('answer-area');
        
        // Ensure tiles in banks are strictly lowercased
        const banks = [...document.getElementById('word-bank').children, ...document.getElementById('conj-bank').children];
        banks.forEach(el => {
            let txt = el.dataset.original.toLowerCase();
            txt = txt.replace(/\bi\b/g, "I"); // Keep solitary I capitalized
            el.innerText = txt;
        });

        // Handle Sentence Building Area Capitalization
        Array.from(aa.children).forEach((el, i) => {
            let txt = el.dataset.original.toLowerCase();
            
            // Protect proper nouns
            txt = txt.replace(/\bi\b/g, "I")
                     .replace(/\btom\b/g, "Tom")
                     .replace(/\bdad\b/g, "Dad")
                     .replace(/\bmom\b/g, "Mom")
                     .replace(/\bjapan\b/g, "Japan");
                     
            if (i === 0) {
                // Force Capitalize First Word of Sentence
                el.innerText = txt.charAt(0).toUpperCase() + txt.slice(1);
            } else {
                // Lowercase the first letter of this tile (unless it's a proper noun)
                let firstWord = txt.split(' ')[0].toLowerCase();
                const isProperStart = ["i", "tom", "dad", "mom", "japan"].includes(firstWord);
                
                if (!isProperStart) {
                    txt = txt.charAt(0).toLowerCase() + txt.slice(1);
                }
                el.innerText = txt;
            }
        });
    }

    function check() {
        const aa = document.getElementById('answer-area');
        const q = state.filteredDB[state.currentQ];
        const tiles = Array.from(aa.children);
        
        // Create standard normalized string for evaluation
        const norm = str => str.toLowerCase().replace(/\s+/g, ' ').replace(/\s+,/g, ',').replace(/\s+\./g, '.').trim();
        
        const userString = tiles.map(c => c.innerText).join(' ');
        const userNorm = norm(userString);
        
        const c1 = q.c1.toLowerCase();
        const c2 = q.c2.toLowerCase();
        const conj = q.conj.toLowerCase();
        
        const compoundConj = ['and', 'but', 'or', 'so'];
        const adverbialConj = ['because', 'if', 'although', 'when', 'while', 'before', 'after', 'until', 'since', 'unless'];
        const adjectiveConj = ['who', 'which', 'where'];
        
        let isCorrect = false;

        // Evaluate Structural Patterns
        if (compoundConj.includes(conj)) {
            // Standard: Clause 1, conj Clause 2.
            if (userNorm === norm(`${c1} , ${conj} ${c2} .`)) isCorrect = true;
            // Flexible OR/AND: Clause 2, conj Clause 1.
            if ((conj === 'or' || conj === 'and') && userNorm === norm(`${c2} , ${conj} ${c1} .`)) isCorrect = true;
            
        } else if (adverbialConj.includes(conj)) {
            // Pattern A: Clause 1 conj Clause 2. (No Comma)
            if (userNorm === norm(`${c1} ${conj} ${c2} .`)) isCorrect = true;
            // Pattern B: Conj Clause 2, Clause 1. (Comma Required)
            if (userNorm === norm(`${conj} ${c2} , ${c1} .`)) isCorrect = true;
            
        } else if (adjectiveConj.includes(conj)) {
            // Pattern: Main Clause conj Relative Body.
            // Note: Our DB has c1 as main, c2 as body.
            // Example: I read the book which it was exciting -> wait, "it" is removed in adjective clauses.
            // Let's ensure exact match for adjective:
            // "I thanked the man who he helped me" -> "he" must be omitted usually, but our DB has "he helped me".
            // If they match exact:
            if (userNorm === norm(`${c1} ${conj} ${c2} .`)) isCorrect = true;
        }

        if (isCorrect) {
            state.score += 10;
            document.getElementById('score-display').innerText = "Score: " + state.score;
            confetti();
            
            // Speak the success out loud using 85% rate
            speakText(userString.replace(/ ,/g, ',').replace(/ \./g, '.'));
            
            setTimeout(() => {
                state.currentQ++;
                if(state.currentQ >= state.filteredDB.length) {
                    alert("Challenge Complete! Score: " + state.score);
                    goToMenu();
                } else {
                    loadQuestion();
                }
            }, 2000);
        }
    }

    function speakText(text) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel(); 
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 0.85; 
            
            if (state.approvedVoices.length > 0) {
                const randomVoice = state.approvedVoices[Math.floor(Math.random() * state.approvedVoices.length)];
                utterance.voice = randomVoice;
            }
            window.speechSynthesis.speak(utterance);
        }
    }
</script>
</body>
</html>
