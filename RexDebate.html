<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Debate Arena</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Phosphor Icons for UI elements -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden; /* Force no scrolling on body to fit single screen */
            /* Default fallback background */
            background-color: #1a202c; 
        }

        /* Slowly changing animated background */
        .bg-animated {
            background: linear-gradient(-45deg, #1e3a8a, #312e81, #0f766e, #831843);
            background-size: 400% 400%;
            animation: gradientBG 20s ease infinite;
            min-height: 100vh;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glassmorphism utilities */
        .glass-panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .glass-panel-agree {
            background: rgba(16, 185, 129, 0.15); /* Emerald tint */
            backdrop-filter: blur(12px);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .glass-panel-disagree {
            background: rgba(225, 29, 72, 0.15); /* Rose tint */
            backdrop-filter: blur(12px);
            border: 1px solid rgba(225, 29, 72, 0.3);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.1);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.3);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255,255,255,0.5);
        }
    </style>
</head>

                agreeText: "You must argue using neuroscience. The prefrontal cortex is not fully developed, meaning teenagers naturally value peer approval more than risks. We need empathy and guidance, not harsh punishment.",
                disagreeText: "You must argue for personal responsibility. Even if the brain is developing, teenagers understand right and wrong. Blaming bad behavior purely on biology gives an excuse to avoid accountability.",
                vocab: ["Prefrontal cortex (前额叶皮层)", "Impulsive (冲动的)", "Consequence (后果)", "Empathy (共情)", "Accountability (责任心)", "Peer approval (同伴认同)", "Reckless (鲁莽的)", "Development (发育)", "Excuse (借口)", "Logic (逻辑)"]
            },
            {
                en: "Great art (like Van Gogh's paintings) comes directly from personal suffering and mental struggle; therefore, an artist must suffer to create a true masterpiece. Do you agree or disagree?",
                zh: "伟大的艺术（如梵高的画作）直接源于个人的痛苦和精神挣扎；因此，艺术家必须经历痛苦才能创作出真正的杰作。你同意还是不同意？",
                agreeText: "You must agree by using Van Gogh as evidence. His intense, chaotic brushstrokes reflect profound psychological turmoil. Classic art requires deep emotional trauma to connect with the human condition.",
                disagreeText: "You must disagree by pointing out that suffering is not a requirement for genius. Great artists also use joy, technical mastery, and optical science. Art is about creative innovation, not just being depressed.",
                vocab: ["Masterpiece (杰作)", "Psychological turmoil (心理动荡)", "Chaos (混乱)", "Innovation (创新)", "Mastery (精通)", "Emotion (情感)", "Struggle (挣扎)", "Creative (有创造力的)", "Stroke (笔触)", "Trauma (创伤)"]
            },
            {
                en: "Exploring the extreme, dangerous depths of our own oceans is more important for human survival than spending billions of dollars on space exploration and colonizing Mars. Do you agree or disagree?",
                zh: "探索我们自己海洋的极端危险深处，比花费数十亿美元进行太空探索和殖民火星对人类的生存更重要。你同意还是不同意？",
                agreeText: "You must argue an 'Earth-First' perspective. Earth's deep oceans are full of undiscovered biodiversity that could hold the cure for human diseases. We must protect our own fragile planet before trying to fly to a dead rock in space.",
                disagreeText: "You must argue that space exploration is humanity's ultimate insurance policy. As seen with dinosaurs, catastrophic asteroid impacts are a real threat. We must develop technologies to survive if Earth is ever destroyed.",
                vocab: ["Biodiversity (生物多样性)", "Cure (疗法/解药)", "Extinction (灭绝)", "Asteroid (小行星)", "Fragile (脆弱的)", "Zero gravity (失重)", "Survive (生存)", "Prioritize (优先考虑)", "Unknown (未知的)", "Deep sea (深海)"]
            }
        ];

        const { useState, useEffect, useRef } = React;

        const App = () => {
            // App State
            const [topicIndex, setTopicIndex] = useState(0);
            const [students, setStudents] = useState([]);
            const [newStudentName, setNewStudentName] = useState("");
            
            // Hint State
            const [showAgreeHint, setShowAgreeHint] = useState(false);
            const [showDisagreeHint, setShowDisagreeHint] = useState(false);
            
            // Timer State
            const [timerDuration, setTimerDuration] = useState(300); // Default 5 mins in seconds
            const [timeLeft, setTimeLeft] = useState(300);
            const [timerActive, setTimerActive] = useState(false);
            const timerRef = useRef(null);

            const currentTopic = DEBATE_TOPICS[topicIndex];

            // Handle Topic Navigation
            const nextTopic = () => {
                setTopicIndex((prev) => (prev + 1) % DEBATE_TOPICS.length);
                setShowAgreeHint(false);
                setShowDisagreeHint(false);
            };
            const prevTopic = () => {
                setTopicIndex((prev) => (prev - 1 + DEBATE_TOPICS.length) % DEBATE_TOPICS.length);
                setShowAgreeHint(false);
                setShowDisagreeHint(false);
            };

            // Timer Effects
            useEffect(() => {
                if (timerActive && timeLeft > 0) {
                    timerRef.current = setInterval(() => {
                        setTimeLeft((prev) => prev - 1);
                    }, 1000);
                } else if (timeLeft === 0) {
                    setTimerActive(false);
                    clearInterval(timerRef.current);
                }
                return () => clearInterval(timerRef.current);
            }, [timerActive, timeLeft]);

            const setTimer = (minutes) => {
                const seconds = minutes * 60;
                setTimerDuration(seconds);
                setTimeLeft(seconds);
                setTimerActive(false);
            };

            const toggleTimer = () => {
                if (timeLeft > 0) setTimerActive(!timerActive);
            };

            const resetTimer = () => {
                setTimeLeft(timerDuration);
                setTimerActive(false);
            };

            const formatTime = (seconds) => {
                const m = Math.floor(seconds / 60).toString().padStart(2, '0');
                const s = (seconds % 60).toString().padStart(2, '0');
                return `${m}:${s}`;
            };

            const timerProgress = ((timerDuration - timeLeft) / timerDuration) * 100;
            
            // Dynamic timer color based on time left
            let progressColor = 'bg-blue-400';
            if (timeLeft <= 60) progressColor = 'bg-red-500';
            else if (timeLeft <= 180) progressColor = 'bg-yellow-400';

            const addStudent = (e) => {
                e.preventDefault();
                if (newStudentName.trim() === "") return;
                
                const newStudent = {
                    id: Date.now().toString(),
                    name: newStudentName.trim(),
                    side: 'unassigned'
                };
                setStudents([...students, newStudent]);
                setNewStudentName("");
            };

            const assignSide = (id, side) => {
                setStudents(students.map(s => s.id === id ? { ...s, side } : s));
            };

            const removeStudent = (id) => {
                setStudents(students.filter(s => s.id !== id));
            };

            const agreeStudents = students.filter(s => s.side === 'agree');
            const disagreeStudents = students.filter(s => s.side === 'disagree');
            const unassignedStudents = students.filter(s => s.side === 'unassigned');

            const [showPhraseBank, setShowPhraseBank] = useState(false);

            const phraseBank = [
                { en: "I completely agree with this point because...", zh: "我完全同意这一观点，因为..." },
                { en: "That is a fair point, but we must also consider...", zh: "那是一个合理的观点，但我们还必须考虑到..." },
                { en: "According to the reading material, the evidence shows...", zh: "根据阅读材料，证据表明..." },
                { en: "On the other hand, my opponent fails to realize...", zh: "另一方面，我的对手没有意识到..." },
                { en: "My partner made an excellent point earlier...", zh: "我的队友早些时候提出了一个很好的观点..." },
                { en: "To sum up our main argument, it is clear that...", zh: "总结我们的主要论点，很明显..." }
            ];

            return (
                <div className="bg-animated text-white h-screen p-2 md:p-4 flex flex-col font-sans overflow-hidden">
                    
                    {/* Header: Topic Selection (Shrinks as needed) */}
                    <header className="glass-panel rounded-xl p-3 md:p-4 mb-3 relative z-10 text-center max-w-[1400px] mx-auto w-full flex-shrink-0 flex items-center justify-between">
                        <button onClick={prevTopic} className="p-2 hover:bg-white/20 rounded-full transition-colors flex-shrink-0">
                            <i className="ph ph-caret-left text-3xl md:text-4xl"></i>
                        </button>
                        
                        <div className="flex-1 px-4 max-h-[30vh] overflow-y-auto">
                            {}
                            <p className="text-[1.4rem] md:text-[1.8rem] lg:text-[2rem] font-bold leading-tight mb-3 text-white shadow-sm">"{currentTopic.en}"</p>
                            {}
                            <p className="text-[1.1rem] md:text-[1.2rem] lg:text-[1.4rem] text-gray-300 font-medium leading-snug">{currentTopic.zh}</p>
                        </div>
                        
                        <button onClick={nextTopic} className="p-2 hover:bg-white/20 rounded-full transition-colors flex-shrink-0">
                            <i className="ph ph-caret-right text-3xl md:text-4xl"></i>
                        </button>
                    </header>

                    {/* Main Arena Layout (Takes remaining space, flex-grow) */}
                    <main className="flex-grow flex flex-col md:flex-row gap-3 max-w-[1400px] mx-auto w-full min-h-0">
                        
                        {/* Left Side: Agree */}
                        <div className="flex-1 flex flex-col gap-2 min-h-0">
                            <div className="glass-panel-agree rounded-xl p-4 md:p-5 flex-grow flex flex-col shadow-lg shadow-emerald-900/20 min-h-0">
                                <div className="flex items-center justify-between mb-3 pb-3 border-b border-white/20 flex-shrink-0">
                                    <div className="flex items-center gap-3">
                                        <div className="bg-emerald-500 p-1.5 rounded-lg"><i className="ph ph-thumbs-up text-lg text-white"></i></div>
                                        <h2 className="text-xl font-bold text-emerald-300">Team Agree</h2>
                                    </div>
                                    <span className="bg-emerald-500/20 text-emerald-200 text-xs px-2 py-1 rounded-full">{agreeStudents.length} Debaters</span>
                                </div>
                                
                                {/* Hint Toggle & Phrase Bank Area */}
                                <div className="flex flex-col gap-2 mb-3 flex-shrink-0">
                                    <button 
                                        onClick={() => setShowAgreeHint(!showAgreeHint)} 
                                        className="w-full bg-emerald-600/40 hover:bg-emerald-500/50 text-emerald-100 text-sm py-2 rounded-lg border border-emerald-500/30 transition-colors flex justify-center items-center gap-2 font-semibold shadow-md"
                                    >
                                        <i className={`ph ${showAgreeHint ? 'ph-eye-slash' : 'ph-eye'} text-lg`}></i>
                                        {showAgreeHint ? 'Hide Argument (隐藏论点)' : 'Show Argument (显示论点)'}
                                    </button>

                                    {showAgreeHint && (
                                        <div className="bg-black/50 rounded-lg p-3 border border-emerald-500/50 max-h-[20vh] overflow-y-auto animate-fade-in shadow-inner">
                                            {}
                                            <p className="text-[20px] md:text-[22px] text-emerald-100 leading-relaxed font-medium">{currentTopic.agreeText}</p>
                                        </div>
                                    )}

                                    {}
                                    <div className="bg-emerald-900/30 rounded-lg p-3 border border-emerald-500/20 leading-relaxed">
                                        <ul className="text-emerald-100/90 list-disc pl-5 mb-2 space-y-1 text-[18px] md:text-[20px]">
                                            <li>I strongly agree because... (我强烈同意...)</li>
                                            <li>The evidence clearly shows... (证据清楚表明...)</li>
                                        </ul>
                                        <p className="text-emerald-200/80 mt-2 text-[18px] md:text-[20px] border-b border-emerald-500/30 pb-2">
                                            <span className="font-semibold text-emerald-300">Keywords:</span> Absolutely, Evidence, Essential, Benefit, Significant
                                        </p>
                                        
                                        {/* Topic specific Vocabulary */}
                                        <div className="mt-2">
                                            <p className="font-bold text-emerald-300 mb-1 text-[16px] md:text-[18px]">Topic Vocabulary (核心词汇):</p>
                                            <div className="flex flex-wrap gap-1.5">
                                                {currentTopic.vocab.map((v, i) => (
                                                    <span key={i} className="bg-emerald-800/60 text-emerald-100 px-2 py-1 rounded text-sm border border-emerald-500/30">
                                                        {v}
                                                    </span>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="flex-grow overflow-y-auto pr-1 space-y-2">
                                    {agreeStudents.map(student => (
                                        <div key={student.id} className="bg-emerald-500/20 rounded-lg p-2 flex justify-between items-center border border-emerald-500/30 transition-all hover:bg-emerald-500/30">
                                            <span className="font-medium text-sm text-emerald-50">{student.name}</span>
                                            <button onClick={() => assignSide(student.id, 'unassigned')} className="text-emerald-300 hover:text-white p-1">
                                                <i className="ph ph-x-circle text-lg"></i>
                                            </button>
                                        </div>
                                    ))}
                                    {agreeStudents.length === 0 && <p className="text-emerald-200/50 text-xs italic text-center py-2">Awaiting debaters...</p>}
                                </div>
                            </div>
                        </div>

                        {/* Center: Controls & Timers */}
                        <div className="w-full md:w-[320px] lg:w-[360px] flex flex-col gap-3 order-first md:order-none flex-shrink-0 min-h-0">
                            
                            {/* Timer Block (Removed "Debate Clock" title to save space) */}
                            <div className="glass-panel rounded-xl p-4 text-center flex flex-col items-center flex-shrink-0">
                                
                                {/* Progress Bar */}
                                <div className="w-full h-2 bg-black/40 rounded-full overflow-hidden mb-4 border border-white/10">
                                    <div 
                                        className={`h-full ${progressColor} transition-all duration-1000 ease-linear rounded-full`}
                                        style={{ width: `${timerProgress}%` }}
                                    ></div>
                                </div>

                                {/* Digital Clock Display */}
                                <div className={`text-5xl md:text-6xl font-mono font-bold mb-4 tracking-tighter tabular-nums ${timeLeft <= 60 ? 'text-red-400 animate-pulse' : 'text-white'}`}>
                                    {formatTime(timeLeft)}
                                </div>

                                {/* Time Presets */}
                                <div className="flex gap-2 mb-4 w-full justify-center">
                                    {[5, 10, 15].map(mins => (
                                        <button 
                                            key={mins}
                                            onClick={() => setTimer(mins)}
                                            className="flex-1 py-1.5 rounded-lg bg-white/10 hover:bg-white/20 border border-white/20 text-xs font-medium transition-colors"
                                        >
                                            {mins} Min
                                        </button>
                                    ))}
                                </div>

                                {/* Timer Controls */}
                                <div className="flex gap-2 w-full">
                                    <button 
                                        onClick={toggleTimer}
                                        className={`flex-1 py-1.5 rounded-lg font-bold flex items-center justify-center gap-1 transition-all text-xs ${timerActive ? 'bg-yellow-500 hover:bg-yellow-400 text-black' : 'bg-blue-600 hover:bg-blue-500 text-white'}`}
                                    >
                                        <i className={`ph-fill ${timerActive ? 'ph-pause' : 'ph-play'} text-base`}></i>
                                        {timerActive ? 'PAUSE' : 'START'}
                                    </button>
                                    <button 
                                        onClick={resetTimer}
                                        className="px-3 py-1.5 rounded-lg bg-white/10 hover:bg-red-500/50 border border-white/20 transition-all flex items-center justify-center"
                                        title="Reset Timer"
                                    >
                                        <i className="ph ph-arrow-counter-clockwise text-base"></i>
                                    </button>
                                </div>

                                {/* Phrase Bank Launch Button */}
                                <button 
                                    onClick={() => setShowPhraseBank(true)}
                                    className="mt-4 w-full py-2.5 rounded-lg bg-indigo-600/90 hover:bg-indigo-500 text-white font-semibold text-sm border border-indigo-400/50 transition-colors flex items-center justify-center gap-2 shadow-lg shadow-indigo-900/30"
                                >
                                    <i className="ph ph-chat-teardrop-text text-lg"></i>
                                    Debate Phrase Bank (辩论词库)
                                </button>
                            </div>

                            {/* Roster Management Block (Removed "Add Debaters" title) */}
                            <div className="glass-panel rounded-xl p-4 flex flex-col min-h-0 flex-grow">
                                <form onSubmit={addStudent} className="flex gap-2 mb-3 flex-shrink-0">
                                    <input 
                                        type="text" 
                                        value={newStudentName}
                                        onChange={(e) => setNewStudentName(e.target.value)}
                                        placeholder="Student Name..." 
                                        className="flex-1 bg-black/30 border border-white/20 rounded-lg px-3 py-1.5 text-sm text-white placeholder-gray-400 focus:outline-none focus:border-blue-400 transition-colors"
                                    />
                                    <button type="submit" className="bg-blue-600 hover:bg-blue-500 px-3 py-1.5 rounded-lg font-bold transition-colors">
                                        <i className="ph ph-plus text-base"></i>
                                    </button>
                                </form>

                                <div className="flex-grow overflow-y-auto pr-1 space-y-2">
                                    {unassignedStudents.map(student => (
                                        <div key={student.id} className="bg-white/10 rounded-lg p-2 border border-white/10 flex flex-col gap-2">
                                            <div className="flex justify-between items-center w-full px-1">
                                                <span className="font-semibold text-sm">{student.name}</span>
                                                <button onClick={() => removeStudent(student.id)} className="text-gray-400 hover:text-red-400 transition-colors p-0.5">
                                                    <i className="ph ph-trash text-base"></i>
                                                </button>
                                            </div>
                                            <div className="flex gap-1.5 w-full">
                                                <button 
                                                    onClick={() => assignSide(student.id, 'agree')}
                                                    className="flex-1 bg-emerald-500/20 hover:bg-emerald-500/40 text-emerald-300 border border-emerald-500/30 text-[10px] py-1.5 rounded transition-colors uppercase font-bold"
                                                >
                                                    Agree
                                                </button>
                                                <button 
                                                    onClick={() => assignSide(student.id, 'disagree')}
                                                    className="flex-1 bg-rose-500/20 hover:bg-rose-500/40 text-rose-300 border border-rose-500/30 text-[10px] py-1.5 rounded transition-colors uppercase font-bold"
                                                >
                                                    Disagree
                                                </button>
                                            </div>
                                        </div>
                                    ))}
                                    {unassignedStudents.length === 0 && <p className="text-gray-400 text-xs italic text-center py-2">No unassigned students.</p>}
                                </div>
                            </div>
                        </div>

                        {/* Right Side: Disagree */}
                        <div className="flex-1 flex flex-col gap-2 min-h-0">
                            <div className="glass-panel-disagree rounded-xl p-4 md:p-5 flex-grow flex flex-col shadow-lg shadow-rose-900/20 min-h-0">
                                <div className="flex items-center justify-between mb-3 pb-3 border-b border-white/20 flex-shrink-0">
                                    <div className="flex items-center gap-3">
                                        <div className="bg-rose-500 p-1.5 rounded-lg"><i className="ph ph-thumbs-down text-lg text-white"></i></div>
                                        <h2 className="text-xl font-bold text-rose-300">Team Disagree</h2>
                                    </div>
                                    <span className="bg-rose-500/20 text-rose-200 text-xs px-2 py-1 rounded-full">{disagreeStudents.length} Debaters</span>
                                </div>
                                
                                {/* Hint Toggle & Phrase Bank Area */}
                                <div className="flex flex-col gap-2 mb-3 flex-shrink-0">
                                    <button 
                                        onClick={() => setShowDisagreeHint(!showDisagreeHint)} 
                                        className="w-full bg-rose-600/40 hover:bg-rose-500/50 text-rose-100 text-sm py-2 rounded-lg border border-rose-500/30 transition-colors flex justify-center items-center gap-2 font-semibold shadow-md"
                                    >
                                        <i className={`ph ${showDisagreeHint ? 'ph-eye-slash' : 'ph-eye'} text-lg`}></i>
                                        {showDisagreeHint ? 'Hide Argument (隐藏论点)' : 'Show Argument (显示论点)'}
                                    </button>

                                    {showDisagreeHint && (
                                        <div className="bg-black/50 rounded-lg p-3 border border-rose-500/50 max-h-[20vh] overflow-y-auto animate-fade-in shadow-inner">
                                            {}
                                            <p className="text-[20px] md:text-[22px] text-rose-100 leading-relaxed font-medium">{currentTopic.disagreeText}</p>
                                        </div>
                                    )}

                                    {}
                                    <div className="bg-rose-900/30 rounded-lg p-3 border border-rose-500/20 leading-relaxed">
                                        <ul className="text-rose-100/90 list-disc pl-5 mb-2 space-y-1 text-[18px] md:text-[20px]">
                                            <li>I have to disagree because... (我不同意因为...)</li>
                                            <li>While that may be true, however... (虽然可能是真的，但是...)</li>
                                        </ul>
                                        <p className="text-rose-200/80 mt-2 text-[18px] md:text-[20px] border-b border-rose-500/30 pb-2">
                                            <span className="font-semibold text-rose-300">Keywords:</span> However, Alternative, Drawback, Instead, Unnecessary
                                        </p>
                                        
                                        {/* Topic specific Vocabulary */}
                                        <div className="mt-2">
                                            <p className="font-bold text-rose-300 mb-1 text-[16px] md:text-[18px]">Topic Vocabulary (核心词汇):</p>
                                            <div className="flex flex-wrap gap-1.5">
                                                {currentTopic.vocab.map((v, i) => (
                                                    <span key={i} className="bg-rose-800/60 text-rose-100 px-2 py-1 rounded text-sm border border-rose-500/30">
                                                        {v}
                                                    </span>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="flex-grow overflow-y-auto pr-1 space-y-2">
                                    {disagreeStudents.map(student => (
                                        <div key={student.id} className="bg-rose-500/20 rounded-lg p-2 flex justify-between items-center border border-rose-500/30 transition-all hover:bg-rose-500/30">
                                            <span className="font-medium text-sm text-rose-50">{student.name}</span>
                                            <button onClick={() => assignSide(student.id, 'unassigned')} className="text-rose-300 hover:text-white p-1">
                                                <i className="ph ph-x-circle text-lg"></i>
                                            </button>
                                        </div>
                                    ))}
                                    {disagreeStudents.length === 0 && <p className="text-rose-200/50 text-xs italic text-center py-2">Awaiting debaters...</p>}
                                </div>
                            </div>
                        </div>

                    </main>

                    {/* Phrase Bank Modal Overlay */}
                    {showPhraseBank && (
                        <div className="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-slate-800 border border-indigo-500/30 rounded-2xl p-6 max-w-2xl w-full shadow-2xl flex flex-col max-h-[85vh]">
                                <div className="flex justify-between items-center mb-4 flex-shrink-0 border-b border-white/10 pb-4">
                                    <div className="flex items-center gap-3">
                                        <div className="bg-indigo-500 p-2 rounded-lg"><i className="ph ph-translate text-xl text-white"></i></div>
                                        <h2 className="text-2xl font-bold text-white">Debate Phrase Bank</h2>
                                    </div>
                                    <button onClick={() => setShowPhraseBank(false)} className="text-gray-400 hover:text-white transition-colors bg-white/5 hover:bg-white/10 p-2 rounded-full">
                                        <i className="ph ph-x text-xl"></i>
                                    </button>
                                </div>
                                
                                <div className="overflow-y-auto flex-grow space-y-3 pr-2">
                                    {phraseBank.map((phrase, idx) => (
                                        <div key={idx} className="bg-white/5 border border-white/10 rounded-xl p-4 hover:bg-white/10 transition-colors">
                                            <p className="text-indigo-300 font-semibold text-lg mb-1">{phrase.en}</p>
                                            <p className="text-gray-400 text-sm">{phrase.zh}</p>
                                        </div>
                                    ))}
                                </div>
                                
                                <div className="mt-4 pt-4 border-t border-white/10 text-center flex-shrink-0">
                                    <button onClick={() => setShowPhraseBank(false)} className="px-8 py-2.5 bg-indigo-600 hover:bg-indigo-500 rounded-lg text-white font-medium transition-colors">
                                        Close (关闭)
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
