    <!-- React & ReactDOM -->

    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden; /* Force no scrolling on body to fit single screen */
            background-color: #1a202c; 
        }

        /* Slowly changing animated background */
        .bg-animated {
            background: linear-gradient(-45deg, #1e3a8a, #312e81, #0f766e, #831843);
            background-size: 400% 400%;
            animation: gradientBG 20s ease infinite;
            min-height: 100vh;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glassmorphism utilities */
        .glass-panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .glass-panel-agree {
            background: rgba(16, 185, 129, 0.12);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .glass-panel-disagree {
            background: rgba(225, 29, 72, 0.12);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(225, 29, 72, 0.3);
        }

        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }
        
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

                disagreeVocab: ["Isolate (孤立)", "Tactile (触觉的)", "Firsthand (第一手的)", "Dizziness (头晕)", "Detached (脱节的)", "Artificial (人造的)", "Screen-time (屏幕时间)", "Disconnected (脱节的)", "Authentic (真实的)", "Socialization (社交)"]

            {

                agreeText: "You must argue using neuroscience. The prefrontal cortex is not fully developed, meaning teenagers naturally value peer approval more than risks. We need empathy and guidance, not harsh punishment.",

                agreeVocab: ["Prefrontal cortex (前额叶)", "Impulsive (冲动的)", "Empathy (共情)", "Development (发育)", "Vulnerable (脆弱的)", "Biology (生物学)", "Forgiveness (宽恕)", "Guidance (引导)", "Maturation (成熟)", "Under construction (建设中)"],
                disagreeVocab: ["Accountability (责任心)", "Consequence (后果)", "Logic (逻辑)", "Responsibility (责任)", "Excuse (借口)", "Choice (选择)", "Morality (道德)", "Discipline (纪律)", "Independence (独立)", "Expectation (期望)"]
            },
            {
                en: "Great art (like Van Gogh's paintings) comes directly from personal suffering and mental struggle; therefore, an artist must suffer to create a true masterpiece. Do you agree or disagree?",

                agreeText: "You must agree by using Van Gogh as evidence. His intense, chaotic brushstrokes reflect profound psychological turmoil. Classic art requires deep emotional trauma to connect with the human condition.",
                disagreeText: "You must disagree by pointing out that suffering is not a requirement for genius. Great artists also use joy, technical mastery, and optical science. Art is about creative innovation, not just being depressed.",
                agreeVocab: ["Psychological turmoil (心理动荡)", "Trauma (创伤)", "Chaos (混乱)", "Emotion (情感)", "Profound (深刻的)", "Anguish (痛苦)", "Authenticity (真实性)", "Catharsis (宣泄)", "Torment (折磨)", "Masterpiece (杰作)"],
                disagreeVocab: ["Mastery (精通)", "Innovation (创新)", "Joy (喜悦)", "Technique (技巧)", "Visionary (有远见的)", "Practice (练习)", "Creativity (创造力)", "Inspiration (灵感)", "Skill (技能)", "Imagination (想象力)"]
            },
            {
                en: "Exploring the extreme, dangerous depths of our own oceans is more important for human survival than spending billions of dollars on space exploration and colonizing Mars. Do you agree or disagree?",
                zh: "探索我们自己海洋的极端危险深处，比花费数十亿美元进行太空探索和殖民火星对人类的生存更重要。你同意还是不同意？",
                agreeText: "You must argue an 'Earth-First' perspective. Earth's deep oceans are full of undiscovered biodiversity that could hold the cure for human diseases. We must protect our own fragile planet before flying to a dead rock in space.",
                disagreeText: "You must argue that space exploration is humanity's ultimate insurance policy. As seen with dinosaurs, catastrophic asteroid impacts are a real threat. We must develop technologies to survive if Earth is ever destroyed.",
                agreeVocab: ["Biodiversity (生物多样性)", "Cure (疗法)", "Fragile (脆弱的)", "Deep sea (深海)", "Pragmatic (务实的)", "Unexplored (未探索的)", "Ecosystem (生态系统)", "Conservation (保护)", "Tangible (切实的)", "Immediate (眼前的)"],
                disagreeVocab: ["Asteroid (小行星)", "Extinction (灭绝)", "Survive (生存)", "Zero gravity (失重)", "Frontier (前沿)", "Destiny (命运)", "Insurance (保险)", "Limitless (无极限的)", "Expansion (扩张)", "Interstellar (星际的)"]
            }
        ];

        const AGREE_PHRASES = [
            { en: "We firmly believe that...", zh: "我们坚信..." },
            { en: "The evidence clearly indicates...", zh: "证据清楚地表明..." },
            { en: "From a scientific/historical perspective...", zh: "从科学/历史角度来看..." },
            { en: "A prime example of this is...", zh: "一个典型的例子是..." },
            { en: "Ultimately, the benefits far outweigh the drawbacks.", zh: "归根结底，利大于弊。" }
        ];

        const DISAGREE_PHRASES = [
            { en: "The opposing team fails to consider...", zh: "对方未能考虑到..." },
            { en: "While that may be true in theory, in reality...", zh: "理论上可能如此，但在现实中..." },
            { en: "The fundamental flaw in this argument is...", zh: "这个论点的根本缺陷在于..." },
            { en: "We cannot ignore the human/economic cost of...", zh: "我们不能忽视...成本" },
            { en: "A more realistic and practical solution would be...", zh: "更现实的解决方案是..." }
        ];

        const { useState, useEffect, useRef } = React;

        const App = () => {
            // App State
            const [topicIndex, setTopicIndex] = useState(0);
            const [students, setStudents] = useState([]);
            const [newStudentName, setNewStudentName] = useState("");
            
            // UI Toggle State
            const [showAgreeHint, setShowAgreeHint] = useState(false);
            const [showDisagreeHint, setShowDisagreeHint] = useState(false);
            const [showAgreePhrases, setShowAgreePhrases] = useState(false);
            const [showDisagreePhrases, setShowDisagreePhrases] = useState(false);
            
            // Timer State
            const [timerDuration, setTimerDuration] = useState(300);
            const [timeLeft, setTimeLeft] = useState(300);
            const [timerActive, setTimerActive] = useState(false);
            const timerRef = useRef(null);

            const currentTopic = DEBATE_TOPICS[topicIndex];

            // Handle Topic Navigation
            const nextTopic = () => {
                setTopicIndex((prev) => (prev + 1) % DEBATE_TOPICS.length);
                resetToggles();
            };
            const prevTopic = () => {
                setTopicIndex((prev) => (prev - 1 + DEBATE_TOPICS.length) % DEBATE_TOPICS.length);
                resetToggles();
            };

            const resetToggles = () => {
                setShowAgreeHint(false); setShowDisagreeHint(false);
                setShowAgreePhrases(false); setShowDisagreePhrases(false);
            };

            // Timer Effects
            useEffect(() => {
                if (timerActive && timeLeft > 0) {
                    timerRef.current = setInterval(() => setTimeLeft(prev => prev - 1), 1000);
                } else if (timeLeft === 0) {
                    setTimerActive(false);
                    clearInterval(timerRef.current);
                }
                return () => clearInterval(timerRef.current);
            }, [timerActive, timeLeft]);

            const setTimer = (minutes) => {
                const seconds = minutes * 60;
                setTimerDuration(seconds);
                setTimeLeft(seconds);
                setTimerActive(false);
            };

            const formatTime = (seconds) => {
                const m = Math.floor(seconds / 60).toString().padStart(2, '0');
                const s = (seconds % 60).toString().padStart(2, '0');
                return `${m}:${s}`;
            };

            const timerProgress = ((timerDuration - timeLeft) / timerDuration) * 100;
            let progressColor = 'bg-blue-400';
            if (timeLeft <= 60) progressColor = 'bg-red-500';
            else if (timeLeft <= 180) progressColor = 'bg-yellow-400';

            // Student Roster Logic
            const addStudent = (e) => {
                e.preventDefault();
                if (newStudentName.trim() === "") return;
                setStudents([...students, { id: Date.now().toString(), name: newStudentName.trim(), side: 'unassigned' }]);
                setNewStudentName("");
            };

            const assignSide = (id, side) => {
                setStudents(students.map(s => s.id === id ? { ...s, side } : s));
            };

            const agreeStudents = students.filter(s => s.side === 'agree');
            const disagreeStudents = students.filter(s => s.side === 'disagree');
            const unassignedStudents = students.filter(s => s.side === 'unassigned');

            return (
                <div className="bg-animated text-white h-screen p-2 flex flex-col font-sans overflow-hidden">
                    
                    {/* TOP HEADER: Prompts (Fixed Height to prevent jumping) */}
                    <header className="glass-panel rounded-xl px-4 py-2 mb-2 relative z-10 w-full flex-shrink-0 flex items-center justify-between mx-auto h-[130px] md:h-[150px] lg:h-[180px]">
                        <button onClick={prevTopic} className="p-2 hover:bg-white/20 rounded-full transition-colors flex-shrink-0">
                            <i className="ph ph-caret-left text-3xl"></i>
                        </button>
                        
                        <div className="flex-1 px-4 flex flex-col justify-center h-full overflow-y-auto custom-scrollbar text-center">
                            {/* Adjusted Font Size: -20% from the previous +50% increase */}
                            <p className="text-[1.1rem] md:text-[1.4rem] lg:text-[1.6rem] font-bold leading-tight mb-2 text-white shadow-sm">
                                "{currentTopic.en}"
                            </p>
                            <p className="text-[0.95rem] md:text-[1.1rem] lg:text-[1.2rem] text-gray-300 font-medium leading-snug">
                                {currentTopic.zh}
                            </p>
                        </div>
                        
                        <button onClick={nextTopic} className="p-2 hover:bg-white/20 rounded-full transition-colors flex-shrink-0">
                            <i className="ph ph-caret-right text-3xl"></i>
                        </button>
                    </header>

                    {/* MAIN ARENA COLUMNS */}
                    <main className="flex-grow flex gap-2 w-full min-h-0 mx-auto">
                        
                        {/* LEFT COLUMN: Team Agree */}
                        <div className="flex-1 flex flex-col min-h-0">
                            <div className="glass-panel-agree rounded-xl p-3 flex-grow flex flex-col shadow-lg min-h-0 overflow-y-auto custom-scrollbar">
                                
                                {/* Title and Student List at the Top */}
                                <div className="flex flex-col mb-3 pb-2 border-b border-white/20 flex-shrink-0">
                                    <div className="flex items-center gap-2 mb-2">
                                        <div className="bg-emerald-500 p-1.5 rounded-lg"><i className="ph ph-thumbs-up text-xl text-white"></i></div>
                                        <h2 className="text-xl md:text-2xl font-bold text-emerald-300">Team Agree</h2>
                                        <span className="ml-auto bg-emerald-500/20 text-emerald-200 text-xs px-2 py-0.5 rounded-full">{agreeStudents.length}</span>
                                    </div>
                                    
                                    {/* Assigned Team Members directly under title */}
                                    <div className="flex flex-wrap gap-1.5">
                                        {agreeStudents.length === 0 && <span className="text-emerald-200/50 text-xs italic">No debaters assigned</span>}
                                        {agreeStudents.map(student => (
                                            <span key={student.id} className="bg-emerald-500/30 border border-emerald-500/40 text-emerald-100 px-2 py-1 rounded text-xs font-medium flex items-center gap-1">
                                                <i className="ph ph-user text-emerald-300"></i> {student.name}
                                            </span>
                                        ))}
                                    </div>
                                </div>

                                {/* Actions: Side-by-Side Buttons */}
                                <div className="flex gap-2 mb-3 flex-shrink-0">
                                    <button 
                                        onClick={() => {setShowAgreeHint(!showAgreeHint); setShowAgreePhrases(false);}} 
                                        className="flex-1 bg-emerald-600/40 hover:bg-emerald-500/50 text-emerald-100 text-[13px] py-1.5 rounded border border-emerald-500/30 transition-colors flex justify-center items-center gap-1 font-semibold"
                                    >
                                        <i className={`ph ${showAgreeHint ? 'ph-eye-slash' : 'ph-eye'}`}></i>
                                        {showAgreeHint ? 'Hide Argument' : 'Show Argument'}
                                    </button>
                                    <button 
                                        onClick={() => {setShowAgreePhrases(!showAgreePhrases); setShowAgreeHint(false);}} 
                                        className="flex-1 bg-teal-600/40 hover:bg-teal-500/50 text-teal-100 text-[13px] py-1.5 rounded border border-teal-500/30 transition-colors flex justify-center items-center gap-1 font-semibold"
                                    >
                                        <i className={`ph ${showAgreePhrases ? 'ph-chat-teardrop-slash' : 'ph-chat-teardrop-text'}`}></i>
                                        {showAgreePhrases ? 'Hide Phrases' : 'Agree Phrases'}
                                    </button>
                                </div>

                                {/* Hidden Display Area */}
                                {showAgreeHint && (
                                    <div className="bg-black/50 rounded-lg p-3 border border-emerald-500/50 mb-3 animate-fade-in shadow-inner text-emerald-100 text-[15px] leading-relaxed flex-shrink-0">
                                        {currentTopic.agreeText}
                                    </div>
                                )}
                                {showAgreePhrases && (
                                    <div className="bg-black/50 rounded-lg p-2.5 border border-teal-500/50 mb-3 animate-fade-in shadow-inner flex flex-col gap-1.5 flex-shrink-0">
                                        {AGREE_PHRASES.map((phrase, idx) => (
                                            <div key={idx} className="text-[13px] leading-tight">
                                                <span className="text-teal-300 font-bold mr-1">▶</span>
                                                <span className="text-teal-100">{phrase.en}</span> <span className="text-teal-200/70 text-[11px]">({phrase.zh})</span>
                                            </div>
                                        ))}
                                    </div>
                                )}

                                {/* Topic Vocabulary Tags (10 words) */}
                                <div className="mt-auto border-t border-white/10 pt-2 flex-shrink-0">
                                    <span className="text-emerald-400 text-xs font-bold uppercase tracking-wider mb-2 block">Pro Vocabulary (10)</span>
                                    <div className="flex flex-wrap gap-1.5">
                                        {currentTopic.agreeVocab.map((word, idx) => (
                                            <span key={idx} className="bg-black/30 border border-emerald-500/20 text-emerald-100/90 text-[11px] px-2 py-1 rounded-md shadow-sm">
                                                {word}
                                            </span>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* CENTER COLUMN: Timer & Split Roster */}
                        <div className="w-full md:w-[280px] lg:w-[350px] flex-shrink-0 flex flex-col gap-2 min-h-0">
                            
                            {/* Compact Timer Module */}
                            <div className="glass-panel p-3 rounded-xl flex flex-col items-center flex-shrink-0">
                                <div className="w-full bg-gray-800 rounded-full h-2 mb-2 overflow-hidden shadow-inner">
                                    <div 
                                        className={`h-full ${progressColor} transition-all duration-1000 ease-linear rounded-full`}
                                        style={{ width: `${timerProgress}%` }}
                                    ></div>
                                </div>

                                <div className={`text-4xl md:text-5xl font-mono font-bold mb-2 tracking-tighter tabular-nums ${timeLeft <= 60 ? 'text-red-400 animate-pulse' : 'text-white'}`}>
                                    {formatTime(timeLeft)}
                                </div>

                                <div className="flex gap-1 w-full justify-center mb-2">
                                    {[5, 10, 15].map(mins => (
                                        <button 
                                            key={mins} onClick={() => setTimer(mins)}
                                            className="flex-1 py-1 rounded bg-white/10 hover:bg-white/20 border border-white/20 text-[10px] font-medium transition-colors"
                                        >
                                            {mins} Min
                                        </button>
                                    ))}
                                </div>

                                <div className="flex gap-1 w-full">
                                    <button 
                                        onClick={() => timeLeft > 0 && setTimerActive(!timerActive)}
                                        className={`flex-1 py-1.5 rounded font-bold flex items-center justify-center gap-1 transition-all text-xs ${timerActive ? 'bg-yellow-500 hover:bg-yellow-400 text-black' : 'bg-blue-600 hover:bg-blue-500 text-white'}`}
                                    >
                                        <i className={`ph-fill ${timerActive ? 'ph-pause' : 'ph-play'} text-sm`}></i> {timerActive ? 'PAUSE' : 'START'}
                                    </button>
                                    <button 
                                        onClick={() => {setTimeLeft(timerDuration); setTimerActive(false);}}
                                        className="px-2 py-1.5 rounded bg-white/10 hover:bg-red-500/50 border border-white/20 transition-all flex justify-center items-center"
                                    >
                                        <i className="ph ph-arrow-counter-clockwise text-sm"></i>
                                    </button>
                                </div>
                            </div>

                            {/* Center Split Roster View */}

                                <form onSubmit={addStudent} className="flex gap-1 mb-2 flex-shrink-0">
                                    <input 
                                        type="text" value={newStudentName} onChange={(e) => setNewStudentName(e.target.value)}
                                        placeholder="Add Student..." 
                                        className="flex-1 bg-black/30 border border-white/20 rounded px-2 py-1 text-xs text-white placeholder-gray-400 focus:outline-none focus:border-blue-400"
                                    />
                                    <button type="submit" className="bg-blue-600 hover:bg-blue-500 px-2 py-1 rounded text-white"><i className="ph ph-plus"></i></button>
                                </form>

                                <div className="flex-grow flex flex-col min-h-0">
                                    {/* Unassigned Area */}
                                    {unassignedStudents.length > 0 && (
                                        <div className="mb-2 max-h-[80px] overflow-y-auto custom-scrollbar space-y-1 pr-1 flex-shrink-0">
                                            {unassignedStudents.map(student => (
                                                <div key={student.id} className="bg-white/10 rounded p-1 border border-white/10 flex justify-between items-center">
                                                    <span className="font-semibold text-[10px] truncate max-w-[70px]">{student.name}</span>
                                                    <div className="flex gap-0.5">
                                                        <button onClick={() => assignSide(student.id, 'agree')} className="bg-emerald-500/30 text-emerald-200 text-[9px] px-1.5 py-0.5 rounded">Ag</button>
                                                        <button onClick={() => assignSide(student.id, 'disagree')} className="bg-rose-500/30 text-rose-200 text-[9px] px-1.5 py-0.5 rounded">Dis</button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}

                                    {/* Split Columns in Center panel */}
                                    <div className="flex-grow flex border-t border-white/10 pt-2 overflow-y-auto custom-scrollbar">
                                        <div className="flex-1 border-r border-white/10 pr-1 flex flex-col gap-1">
                                            <span className="text-[9px] text-emerald-400/80 font-bold text-center uppercase tracking-wider mb-0.5">Agree List</span>
                                            {agreeStudents.map(s => (
                                                <div key={s.id} className="bg-emerald-500/10 rounded p-1 flex justify-between items-center group cursor-pointer" onClick={() => assignSide(s.id, 'unassigned')} title="Remove">
                                                    <span className="text-[10px] text-emerald-100 truncate">{s.name}</span>
                                                    <i className="ph ph-x text-[10px] text-white/30 group-hover:text-white"></i>
                                                </div>
                                            ))}
                                        </div>
                                        <div className="flex-1 pl-1 flex flex-col gap-1">
                                            <span className="text-[9px] text-rose-400/80 font-bold text-center uppercase tracking-wider mb-0.5">Disagree List</span>
                                            {disagreeStudents.map(s => (
                                                <div key={s.id} className="bg-rose-500/10 rounded p-1 flex justify-between items-center group cursor-pointer" onClick={() => assignSide(s.id, 'unassigned')} title="Remove">
                                                    <span className="text-[10px] text-rose-100 truncate">{s.name}</span>
                                                    <i className="ph ph-x text-[10px] text-white/30 group-hover:text-white"></i>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* RIGHT COLUMN: Team Disagree */}
                        <div className="flex-1 flex flex-col min-h-0">
                            <div className="glass-panel-disagree rounded-xl p-3 flex-grow flex flex-col shadow-lg min-h-0 overflow-y-auto custom-scrollbar">
                                
                                {/* Title and Student List at the Top */}
                                <div className="flex flex-col mb-3 pb-2 border-b border-white/20 flex-shrink-0">
                                    <div className="flex items-center gap-2 mb-2">
                                        <div className="bg-rose-500 p-1.5 rounded-lg"><i className="ph ph-thumbs-down text-xl text-white"></i></div>
                                        <h2 className="text-xl md:text-2xl font-bold text-rose-300">Team Disagree</h2>
                                        <span className="ml-auto bg-rose-500/20 text-rose-200 text-xs px-2 py-0.5 rounded-full">{disagreeStudents.length}</span>
                                    </div>
                                    
                                    {/* Assigned Team Members directly under title */}
                                    <div className="flex flex-wrap gap-1.5">
                                        {disagreeStudents.length === 0 && <span className="text-rose-200/50 text-xs italic">No debaters assigned</span>}
                                        {disagreeStudents.map(student => (
                                            <span key={student.id} className="bg-rose-500/30 border border-rose-500/40 text-rose-100 px-2 py-1 rounded text-xs font-medium flex items-center gap-1">
                                                <i className="ph ph-user text-rose-300"></i> {student.name}
                                            </span>
                                        ))}
                                    </div>
                                </div>

                                {/* Actions: Side-by-Side Buttons */}
                                <div className="flex gap-2 mb-3 flex-shrink-0">
                                    <button 
                                        onClick={() => {setShowDisagreeHint(!showDisagreeHint); setShowDisagreePhrases(false);}} 
                                        className="flex-1 bg-rose-600/40 hover:bg-rose-500/50 text-rose-100 text-[13px] py-1.5 rounded border border-rose-500/30 transition-colors flex justify-center items-center gap-1 font-semibold"
                                    >
                                        <i className={`ph ${showDisagreeHint ? 'ph-eye-slash' : 'ph-eye'}`}></i>
                                        {showDisagreeHint ? 'Hide Argument' : 'Show Argument'}
                                    </button>
                                    <button 
                                        onClick={() => {setShowDisagreePhrases(!showDisagreePhrases); setShowDisagreeHint(false);}} 
                                        className="flex-1 bg-pink-600/40 hover:bg-pink-500/50 text-pink-100 text-[13px] py-1.5 rounded border border-pink-500/30 transition-colors flex justify-center items-center gap-1 font-semibold"
                                    >
                                        <i className={`ph ${showDisagreePhrases ? 'ph-chat-teardrop-slash' : 'ph-chat-teardrop-text'}`}></i>
                                        {showDisagreePhrases ? 'Hide Phrases' : 'Disagree Phrases'}
                                    </button>
                                </div>

                                {/* Hidden Display Area */}
                                {showDisagreeHint && (
                                    <div className="bg-black/50 rounded-lg p-3 border border-rose-500/50 mb-3 animate-fade-in shadow-inner text-rose-100 text-[15px] leading-relaxed flex-shrink-0">
                                        {currentTopic.disagreeText}
                                    </div>
                                )}
                                {showDisagreePhrases && (
                                    <div className="bg-black/50 rounded-lg p-2.5 border border-pink-500/50 mb-3 animate-fade-in shadow-inner flex flex-col gap-1.5 flex-shrink-0">
                                        {DISAGREE_PHRASES.map((phrase, idx) => (
                                            <div key={idx} className="text-[13px] leading-tight">
                                                <span className="text-pink-300 font-bold mr-1">▶</span>
                                                <span className="text-pink-100">{phrase.en}</span> <span className="text-pink-200/70 text-[11px]">({phrase.zh})</span>
                                            </div>
                                        ))}
                                    </div>
                                )}

                                {/* Topic Vocabulary Tags (10 words) */}
                                <div className="mt-auto border-t border-white/10 pt-2 flex-shrink-0">
                                    <span className="text-rose-400 text-xs font-bold uppercase tracking-wider mb-2 block">Con Vocabulary (10)</span>
                                    <div className="flex flex-wrap gap-1.5">
                                        {currentTopic.disagreeVocab.map((word, idx) => (
                                            <span key={idx} className="bg-black/30 border border-rose-500/20 text-rose-100/90 text-[11px] px-2 py-1 rounded-md shadow-sm">
                                                {word}
                                            </span>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>

                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
