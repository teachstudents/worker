                                    <div className="w-full bg-slate-700 rounded-full h-2 mb-4 overflow-hidden">
                                        <div 
                                            className={`h-2 rounded-full transition-all duration-1000 ${timeLeft / totalTime < 0.2 ? 'bg-red-500' : timeLeft / totalTime < 0.5 ? 'bg-amber-500' : 'bg-blue-500'}`}
                                            style={{ width: `${totalTime > 0 ? (timeLeft / totalTime) * 100 : 0}%` }}
                                        ></div>
                                    </div>

                                    <div className="flex justify-center gap-2 mb-3">
                                        <button onClick={() => setTimer(5)} className="px-3 py-1 bg-slate-700 hover:bg-slate-600 rounded text-xs font-semibold transition-colors">5 Min</button>
                                        <button onClick={() => setTimer(10)} className="px-3 py-1 bg-slate-700 hover:bg-slate-600 rounded text-xs font-semibold transition-colors">10 Min</button>
                                        <button onClick={() => setTimer(15)} className="px-3 py-1 bg-slate-700 hover:bg-slate-600 rounded text-xs font-semibold transition-colors">15 Min</button>
                                    </div>

                                    <div className="flex justify-center gap-3">
                                        <button 
                                            onClick={toggleTimer}
                                            className={`px-6 py-2 rounded-lg text-sm font-bold shadow-lg transition-all ${timerActive ? 'bg-amber-500 hover:bg-amber-400 text-amber-900' : 'bg-emerald-500 hover:bg-emerald-400 text-emerald-900'}`}
                                        >
                                            <i className={`fas ${timerActive ? 'fa-pause' : 'fa-play'} mr-2`}></i>
                                            {timerActive ? 'PAUSE' : 'START'}
                                        </button>
                                    </div>
                                </div>

                                {/* Roster/Scoreboard Section */}
                                <div className="flex-1 flex flex-col min-h-0 bg-slate-900/60 rounded-xl border border-slate-700/50 overflow-hidden">
                                    <div className="p-3 border-b border-slate-700">
                                        <input 
                                            type="text" 
                                            value={newStudentName}
                                            onChange={(e) => setNewStudentName(e.target.value)}
                                            onKeyDown={addStudent}
                                            placeholder="Type student name & press Enter..." 
                                            className="w-full bg-slate-800 text-white rounded px-3 py-2 text-sm border border-slate-600 focus:outline-none focus:border-blue-500 placeholder-slate-400"
                                        />
                                    </div>
                                    
                                    {/* Unassigned Students */}
                                    {students.filter(s => s.team === 'unassigned').length > 0 && (
                                        <div className="p-2 border-b border-slate-700 bg-slate-800/30 flex flex-wrap gap-2">
                                            {students.filter(s => s.team === 'unassigned').map(s => (
                                                <div key={s.id} className="bg-slate-700 px-2 py-1 rounded text-sm flex items-center gap-2">
                                                    <span>{s.name}</span>
                                                    <button onClick={() => assignTeam(s.id, 'agree')} className="text-emerald-400 hover:text-emerald-300 ml-1"><i className="fas fa-arrow-left"></i></button>
                                                    <button onClick={() => assignTeam(s.id, 'disagree')} className="text-rose-400 hover:text-rose-300"><i className="fas fa-arrow-right"></i></button>
                                                </div>
                                            ))}
                                        </div>
                                    )}

                                    {/* Vertical Split Scoreboard */}
                                    <div className="flex-1 grid grid-cols-2 divide-x divide-slate-700 overflow-hidden">
                                        <div className="p-3 overflow-y-auto custom-scrollbar">
                                            <h3 className="text-xs font-bold text-emerald-400 uppercase mb-2 text-center border-b border-slate-700 pb-1">Agree Team</h3>
                                            <div className="flex flex-col gap-1">
                                                {students.filter(s => s.team === 'agree').map(s => (
                                                    <div key={s.id} className="bg-emerald-900/30 text-emerald-100 px-2 py-1 rounded text-sm flex justify-between items-center border border-emerald-800/50">
                                                        <span className="truncate">{s.name}</span>
                                                        <button onClick={() => assignTeam(s.id, 'unassigned')} className="text-slate-400 hover:text-white"><i className="fas fa-times"></i></button>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="p-3 overflow-y-auto custom-scrollbar">
                                            <h3 className="text-xs font-bold text-rose-400 uppercase mb-2 text-center border-b border-slate-700 pb-1">Disagree Team</h3>
                                            <div className="flex flex-col gap-1">
                                                {students.filter(s => s.team === 'disagree').map(s => (
                                                    <div key={s.id} className="bg-rose-900/30 text-rose-100 px-2 py-1 rounded text-sm flex justify-between items-center border border-rose-800/50">
                                                        <span className="truncate">{s.name}</span>
                                                        <button onClick={() => assignTeam(s.id, 'unassigned')} className="text-slate-400 hover:text-white"><i className="fas fa-times"></i></button>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* RIGHT COLUMN: DISAGREE */}
                            <TeamColumn 
                                side="disagree" 
                                title="Team Disagree" 
                                color="rose" 
                                topic={topic} 
                                students={students.filter(s => s.team === 'disagree')} 
                                onShowPhrases={() => setShowDisagreePhrases(true)}
                            />

                        </div>
                    </div>

                    {/* Modals */}
                    {showAgreePhrases && <PhraseModal title="Agree Phrases (同意短语)" color="emerald" phrases={agreePhrases} onClose={() => setShowAgreePhrases(false)} />}
                    {showDisagreePhrases && <PhraseModal title="Disagree Phrases (不同意短语)" color="rose" phrases={disagreePhrases} onClose={() => setShowDisagreePhrases(false)} />}
                </div>
            );
        };

        const TeamColumn = ({ side, title, color, topic, students, onShowPhrases }) => {
            const [showArg, setShowArg] = useState(false);
            
            const isAgree = side === 'agree';
            const colorClasses = {
                emerald: {
                    bg: 'bg-emerald-900/20',
                    border: 'border-emerald-700/50',
                    text: 'text-emerald-400',
                    buttonBg: 'bg-emerald-600 hover:bg-emerald-500 text-white',
                    icon: 'fa-thumbs-up'
                },
                rose: {
                    bg: 'bg-rose-900/20',
                    border: 'border-rose-700/50',
                    text: 'text-rose-400',
                    buttonBg: 'bg-rose-600 hover:bg-rose-500 text-white',
                    icon: 'fa-thumbs-down'
                }
            };
            const c = colorClasses[color];
            
            const vocabList = isAgree ? topic.agreeVocab : topic.disagreeVocab;

            return (
                <div className={`h-full flex flex-col ${c.bg} rounded-2xl border ${c.border} overflow-hidden shadow-xl`}>
                    
                    {/* Team Header & Roster */}
                    <div className={`p-4 border-b ${c.border} bg-slate-900/40 shrink-0`}>
                        <h2 className={`text-2xl font-bold ${c.text} flex items-center justify-center gap-2 uppercase tracking-wide`}>
                            <i className={`fas ${c.icon}`}></i> {title}
                        </h2>
                        
                        {/* Teammates quick list at top */}
                        <div className="mt-3 flex flex-wrap justify-center gap-2 min-h-[28px]">
                            {students.map(s => (
                                <span key={s.id} className={`px-2 py-1 text-xs font-bold rounded bg-slate-800 text-white border ${c.border}`}>
                                    {s.name}
                                </span>
                            ))}
                            {students.length === 0 && <span className="text-slate-500 text-xs italic">No assigned debaters</span>}
                        </div>
                    </div>

                    {/* Scrollable Content Area */}
                    <div className="p-5 overflow-y-auto custom-scrollbar flex-1 flex flex-col">
                        
                        {/* Side-by-side Buttons */}
                        <div className="flex gap-2 mb-4 shrink-0">
                            <button 
                                onClick={() => setShowArg(!showArg)} 
                                className={`flex-1 py-2 rounded-lg font-bold text-sm shadow-md transition-colors border border-transparent hover:border-slate-400 ${c.buttonBg}`}
                            >
                                <i className={`fas ${showArg ? 'fa-eye-slash' : 'fa-eye'} mr-2`}></i>
                                {showArg ? "Hide Argument" : "Show Argument"}
                            </button>
                            <button 
                                onClick={onShowPhrases} 
                                className={`flex-1 py-2 rounded-lg font-bold text-sm shadow-md transition-colors bg-slate-700 hover:bg-slate-600 text-white border border-slate-500 hover:border-white`}
                            >
                                <i className="fas fa-comment-dots mr-2"></i>
                                Phrase Bank
                            </button>
                        </div>

                        {/* Hidden Argument */}
                        {showArg && (
                            <div className="mb-5 bg-slate-900/80 p-4 rounded-xl border border-slate-600 shadow-inner shrink-0">
                                <p className="text-slate-200 leading-relaxed text-[15px]">
                                    {isAgree ? topic.agreeArgument : topic.disagreeArgument}
                                </p>
                            </div>
                        )}

                        {/* High Visibility Topic Vocabulary */}
                        <div className="flex-1 flex flex-col mt-0">
                            <h3 className={`text-sm font-bold uppercase mb-3 ${c.text} flex items-center gap-2 shrink-0 border-b ${c.border} pb-2`}>
                                <i className="fas fa-book-open"></i> Topic Vocabulary
                            </h3>
                            <div className="flex flex-col gap-2 overflow-y-auto custom-scrollbar pr-1 pb-2">
                                {vocabList.map((v, i) => (
                                    <div key={i} className="flex justify-between items-center bg-slate-800/80 p-3 rounded-lg border border-slate-700 hover:border-slate-500 transition-colors">
                                        <span className="font-bold text-lg text-amber-200">{v.en}</span>
                                        <span className="font-medium text-lg text-white">{v.zh}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                        
                    </div>
                </div>
            );
        };

        const PhraseModal = ({ title, color, phrases, onClose }) => {
            const textColor = color === 'emerald' ? 'text-emerald-400' : 'text-rose-400';
            
            return (
                <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                    <div className="bg-slate-800 border border-slate-600 rounded-2xl shadow-2xl w-full max-w-2xl overflow-hidden flex flex-col max-h-full">
                        <div className="p-4 border-b border-slate-700 flex justify-between items-center bg-slate-900/50">
                            <h2 className={`text-xl font-bold ${textColor}`}><i className="fas fa-comments mr-2"></i>{title}</h2>
                            <button onClick={onClose} className="text-slate-400 hover:text-white transition-colors">
                                <i className="fas fa-times text-xl"></i>
                            </button>
                        </div>
                        <div className="p-6 overflow-y-auto custom-scrollbar flex flex-col gap-3">
                            {phrases.map((p, i) => (
                                <div key={i} className="bg-slate-700/50 p-4 rounded-xl border border-slate-600">
                                    <p className="font-bold text-amber-200 text-lg mb-1">{p.en}</p>
                                    <p className="text-white text-md">{p.zh}</p>
                                </div>
                            ))}
                        </div>
                        <div className="p-4 border-t border-slate-700 bg-slate-900/50 text-center">
                            <button onClick={onClose} className="px-6 py-2 bg-slate-600 hover:bg-slate-500 text-white font-bold rounded-lg transition-colors">
                                Close
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<DebateApp />, document.getElementById('root'));
    </script>
</body>
</html>
