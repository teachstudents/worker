        const { useState, useEffect } = React;

        const DebateApp = () => {
            const [currentTopicIndex, setCurrentTopicIndex] = useState(0);
            const [timerActive, setTimerActive] = useState(false);
            const [timeLeft, setTimeLeft] = useState(0);
            const [totalTime, setTotalTime] = useState(1);
            const [students, setStudents] = useState([]);
            const [newStudentName, setNewStudentName] = useState("");

            const topic = topicsData[currentTopicIndex];

            useEffect(() => {
                let interval = null;
                if (timerActive && timeLeft > 0) {
                    interval = setInterval(() => {
                        setTimeLeft((prev) => prev - 1);
                    }, 1000);
                } else if (timeLeft === 0) {
                    setTimerActive(false);
                    clearInterval(interval);
                }
                
                const body = document.body;
                if (timeLeft > 0 && totalTime > 0) {
                    const ratio = timeLeft / totalTime;
                    if (ratio < 0.2) {
                        body.className = "text-slate-100 h-screen overflow-hidden flex flex-col timer-bg-danger";
                    } else if (ratio < 0.5) {
                        body.className = "text-slate-100 h-screen overflow-hidden flex flex-col timer-bg-warning";
                    } else {
                        body.className = "text-slate-100 h-screen overflow-hidden flex flex-col timer-bg-normal";

                return () => clearInterval(interval);

                const seconds = minutes * 60;
                setTimeLeft(seconds);
                setTotalTime(seconds);
                setTimerActive(false);

                    setTimerActive(!timerActive);

                const m = Math.floor(seconds / 60);
                const s = seconds % 60;
                return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;

            const nextTopic = () => {
                setCurrentTopicIndex((prev) => (prev + 1) % topicsData.length);

                setCurrentTopicIndex((prev) => (prev - 1 + topicsData.length) % topicsData.length);

                        id: Date.now() + idx,
                        name: name,
                        team: 'unassigned'
                    }));
                    setStudents([...students, ...newStudents]);
                    setNewStudentName("");
                }
            };

            const assignTeam = (id, team) => {
                setStudents(students.map(s => s.id === id ? { ...s, team } : s));
            };

            const autoAssign = () => {
                const unassigned = students.filter(s => s.team === 'unassigned');
                if (unassigned.length === 0) return;

                let agreeCount = students.filter(s => s.team === 'agree').length;
                let disagreeCount = students.filter(s => s.team === 'disagree').length;

                const shuffled = [...unassigned].sort(() => Math.random() - 0.5);
                const newAssignments = {};
                
                shuffled.forEach(student => {
                    if (agreeCount <= disagreeCount) {
                        newAssignments[student.id] = 'agree';
                        agreeCount++;
                    } else {
                        newAssignments[student.id] = 'disagree';
                        disagreeCount++;
                    }
                });

                setStudents(students.map(s => 
                    newAssignments[s.id] ? { ...s, team: newAssignments[s.id] } : s
                ));
            };

            return (

                                    <div className="text-5xl font-bold text-white mb-3 font-mono tracking-wider tabular-nums">
                                        {formatTime(timeLeft)}
                                    </div>
                                    <div className="w-full bg-slate-700 rounded-full h-2 mb-4 overflow-hidden">
                                        <div 
                                            className={`h-2 rounded-full transition-all duration-1000 ${timeLeft / totalTime < 0.2 ? 'bg-red-500' : timeLeft / totalTime < 0.5 ? 'bg-amber-500' : 'bg-blue-500'}`}
                                            style={{ width: `${totalTime > 0 ? (timeLeft / totalTime) * 100 : 0}%` }}
                                        ></div>
                                    </div>

                                    <div className="flex justify-center gap-2 mb-3">
                                        <button onClick={() => setTimer(5)} className="px-3 py-1 bg-slate-700 hover:bg-slate-600 rounded text-xs font-semibold transition-colors">5 Min</button>
                                        <button onClick={() => setTimer(10)} className="px-3 py-1 bg-slate-700 hover:bg-slate-600 rounded text-xs font-semibold transition-colors">10 Min</button>
                                        <button onClick={() => setTimer(15)} className="px-3 py-1 bg-slate-700 hover:bg-slate-600 rounded text-xs font-semibold transition-colors">15 Min</button>
                                    </div>

                                    <div className="flex justify-center gap-3">
                                        <button 
                                            onClick={toggleTimer}
                                            className={`px-6 py-2 rounded-lg text-sm font-bold shadow-lg transition-all ${timerActive ? 'bg-amber-500 hover:bg-amber-400 text-amber-900' : 'bg-emerald-500 hover:bg-emerald-400 text-emerald-900'}`}
                                        >
                                            <i className={`fas ${timerActive ? 'fa-pause' : 'fa-play'} mr-2`}></i>
                                            {timerActive ? 'PAUSE' : 'START'}
                                        </button>
                                    </div>
                                </div>

                                <div className="flex-1 flex flex-col min-h-0 bg-slate-900/60 rounded-xl border border-slate-700/50 overflow-hidden">
                                    <div className="p-3 border-b border-slate-700 flex gap-2">
                                        <input 
                                            type="text" 
                                            value={newStudentName}
                                            onChange={(e) => setNewStudentName(e.target.value)}
                                            onKeyDown={addStudent}
                                            placeholder="Names (e.g. Jim, John) & Enter..." 
                                            className="w-full bg-slate-800 text-white rounded px-3 py-2 text-sm border border-slate-600 focus:outline-none focus:border-blue-500 placeholder-slate-400"
                                        />
                                        <button 
                                            onClick={autoAssign}
                                            className="px-4 py-2 bg-blue-600 hover:bg-blue-500 text-white rounded text-sm font-bold transition-colors whitespace-nowrap flex items-center gap-2"
                                            title="Randomly assign unassigned students to teams"
                                        >
                                            <i className="fas fa-random"></i> Auto
                                        </button>
                                    </div>
                                    
                                    {students.filter(s => s.team === 'unassigned').length > 0 && (
                                        <div className="p-2 border-b border-slate-700 bg-slate-800/30 flex flex-wrap gap-2">
                                            {students.filter(s => s.team === 'unassigned').map(s => (
                                                <div key={s.id} className="bg-slate-700 px-2 py-1 rounded text-sm flex items-center gap-2">
                                                    <span>{s.name}</span>
                                                    <button onClick={() => assignTeam(s.id, 'agree')} className="text-emerald-400 hover:text-emerald-300 ml-1"><i className="fas fa-arrow-left"></i></button>
                                                    <button onClick={() => assignTeam(s.id, 'disagree')} className="text-rose-400 hover:text-rose-300"><i className="fas fa-arrow-right"></i></button>
                                                </div>
                                            ))}
                                        </div>
                                    )}

                                    <div className="flex-1 grid grid-cols-2 divide-x divide-slate-700 overflow-hidden">
                                        <div className="p-3 overflow-y-auto custom-scrollbar">
                                            <h3 className="text-xs font-bold text-emerald-400 uppercase mb-2 text-center border-b border-slate-700 pb-1">Agree Team</h3>
                                            <div className="flex flex-col gap-1">
                                                {students.filter(s => s.team === 'agree').map(s => (
                                                    <div key={s.id} className="bg-emerald-900/30 text-emerald-100 px-2 py-1 rounded text-sm flex justify-between items-center border border-emerald-800/50">
                                                        <span className="truncate">{s.name}</span>
                                                        <button onClick={() => assignTeam(s.id, 'unassigned')} className="text-slate-400 hover:text-white"><i className="fas fa-times"></i></button>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="p-3 overflow-y-auto custom-scrollbar">
                                            <h3 className="text-xs font-bold text-rose-400 uppercase mb-2 text-center border-b border-slate-700 pb-1">Disagree Team</h3>
                                            <div className="flex flex-col gap-1">
                                                {students.filter(s => s.team === 'disagree').map(s => (
                                                    <div key={s.id} className="bg-rose-900/30 text-rose-100 px-2 py-1 rounded text-sm flex justify-between items-center border border-rose-800/50">
                                                        <span className="truncate">{s.name}</span>
                                                        <button onClick={() => assignTeam(s.id, 'unassigned')} className="text-slate-400 hover:text-white"><i className="fas fa-times"></i></button>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* RIGHT COLUMN: DISAGREE */}
                            <TeamColumn 
                                side="disagree" 
                                title="Team Disagree" 
                                color="rose" 
                                topic={topic} 
                                students={students.filter(s => s.team === 'disagree')} 
                            />

                        </div>
                    </div>
                </div>
            );
        };

        const TeamColumn = ({ side, title, color, topic, students }) => {
            const [showArg, setShowArg] = useState(false);
            const [showPhrases, setShowPhrases] = useState(false);
            
            const isAgree = side === 'agree';
            const colorClasses = {
                emerald: {
                    bg: 'bg-emerald-900/20',
                    border: 'border-emerald-700/50',
                    text: 'text-emerald-400',
                    buttonBg: 'bg-emerald-600 hover:bg-emerald-500 text-white',
                    icon: 'fa-thumbs-up'
                },
                rose: {
                    bg: 'bg-rose-900/20',
                    border: 'border-rose-700/50',
                    text: 'text-rose-400',
                    buttonBg: 'bg-rose-600 hover:bg-rose-500 text-white',
                    icon: 'fa-thumbs-down'
                }
            };
            const c = colorClasses[color];
            
            const vocabList = isAgree ? topic.agreeVocab : topic.disagreeVocab;
            const phrasesList = isAgree ? agreePhrases : disagreePhrases;

            return (
                <div className={`h-full flex flex-col ${c.bg} rounded-2xl border ${c.border} overflow-hidden shadow-xl`}>
                    
                    <div className={`p-4 border-b ${c.border} bg-slate-900/40 shrink-0`}>
                        <h2 className={`text-lg font-bold ${c.text} flex items-center justify-center gap-2 uppercase tracking-wide`}>
                            <i className={`fas ${c.icon}`}></i> {title}
                        </h2>
                        <div className="mt-2 flex flex-wrap justify-center gap-2 min-h-[28px]">
                            {students.map(s => (
                                <span key={s.id} className={`px-2 py-1 text-xs font-bold rounded bg-slate-800 text-white border ${c.border}`}>
                                    {s.name}
                                </span>
                            ))}
                            {students.length === 0 && <span className="text-slate-500 text-xs italic">No assigned debaters</span>}
                        </div>
                    </div>

                    <div className="p-4 overflow-y-auto custom-scrollbar flex-1 flex flex-col">
                        
                        <div className="flex gap-2 mb-3 shrink-0">
                            <button 
                                onClick={() => setShowArg(!showArg)} 
                                className={`flex-1 py-2 rounded-lg font-bold text-sm shadow-md transition-colors border border-transparent hover:border-slate-400 ${c.buttonBg}`}
                            >
                                <i className={`fas ${showArg ? 'fa-eye-slash' : 'fa-eye'} mr-2`}></i>
                                Argument
                            </button>
                            <button 
                                onClick={() => setShowPhrases(!showPhrases)} 
                                className={`flex-1 py-2 rounded-lg font-bold text-sm shadow-md transition-colors bg-slate-700 hover:bg-slate-600 text-white border border-slate-500 hover:border-white`}
                            >
                                <i className="fas fa-comment-dots mr-2"></i>
                                Phrases
                            </button>
                        </div>

                        {showArg && (
                            <div className="mb-3 bg-slate-900/80 p-3 rounded-xl border border-slate-600 shadow-inner shrink-0">
                                <p className="text-slate-200 leading-relaxed text-[14px]">
                                    {isAgree ? topic.agreeArgument : topic.disagreeArgument}
                                </p>
                            </div>
                        )}

                        {showPhrases && (
                            <div className="mb-3 bg-slate-800/80 p-3 rounded-xl border border-slate-600 shrink-0">
                                <h3 className={`text-xs font-bold uppercase mb-2 ${c.text} border-b border-slate-600 pb-1`}>Phrase Bank</h3>
                                <ul className="text-xs text-slate-200 space-y-1.5 pl-3 list-disc">
                                    {phrasesList.map((p, i) => (
                                        <li key={i}><span className="font-semibold text-white">{p.en}</span> <span className="text-slate-400">({p.zh})</span></li>
                                    ))}
                                </ul>
                            </div>
                        )}

                        <div className="flex-1 flex flex-col mt-0">
                            <h3 className={`text-sm font-bold uppercase mb-2 ${c.text} flex items-center gap-2 shrink-0 border-b ${c.border} pb-1.5`}>
                                <i className="fas fa-book-open"></i> Topic Vocabulary
                            </h3>
                            <div className="flex flex-col gap-1 overflow-y-auto custom-scrollbar pr-1 pb-1">
                                {vocabList.map((v, i) => (
                                    <div key={i} className="flex justify-between items-center bg-slate-800/80 px-3 py-1.5 rounded border border-slate-700 hover:border-slate-500 transition-colors">
                                        <span className="font-bold text-sm text-amber-200">{v.en}</span>
                                        <span className="font-medium text-sm text-white">{v.zh}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                        
                    </div>
                </div>
            );
        };

        ReactDOM.render(<DebateApp />, document.getElementById('root'));
    </script>
</body>
</html>
