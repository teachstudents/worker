<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Produce Market: Master Edition</title>
    <!-- Canvas Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #4CAF50;
            --secondary: #FF9800;
            --bg: #f4f7f6;
            --text: #333;
            --panel-bg: #ffffff;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        
        /* Header & Time */
        #datetime-header {
            background-color: #2c3e50;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            display: inline-block;
            font-size: 1.2em;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .season-badge {
            background-color: #FFC107;
            color: #333;
            padding: 5px 10px;
            border-radius: 5px;
            font-weight: bold;
            margin-left: 10px;
        }
        h1 { color: #2c3e50; font-size: 2.2em; margin-top: 0; }

        #main-menu {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-top: 30px;
        }
        .input-group { margin-bottom: 20px; }
        input[type="text"] {
            font-size: 1.5em;
            padding: 10px;
            border-radius: 10px;
            border: 2px solid #ccc;
            text-align: center;
            width: 300px;
            max-width: 90%;
        }
        .btn-group { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; max-width: 650px;}
        .menu-btn {
            font-size: 1.5em;
            padding: 15px 30px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: transform 0.2s;
            color: white;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            flex: 1;
            min-width: 250px;
        }
        .menu-btn:hover { transform: scale(1.05); }
        #btn-fruit { background-color: #E91E63; }
        #btn-veg { background-color: #4CAF50; }
        #btn-model { background-color: #9C27B0; width: 100%; }
        #btn-quiz { background-color: #00BCD4; width: 100%; }

        #selection-area { display: none; max-width: 1200px; margin: 0 auto; }
        .produce-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
            gap: 15px; 
            margin-top: 20px; 
        }
        .produce-card { 
            cursor: pointer; 
            padding: 20px 10px; 
            border-radius: 15px; 
            background: #fff; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); 
            font-size: 1.2em; 
            transition: 0.2s; 
            border: 2px solid transparent; 
        }
        .produce-card:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .produce-card .emoji { font-size: 3.5em; display: block; margin-bottom: 10px; }
        
        #quantity-selection { 
            display: none; 
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            margin-top: 20px; 
        }
        .quant-btn { 
            background: #E3F2FD; 
            color: #1565C0; 
            font-size: 1.1em; 
            padding: 12px 20px; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            margin: 5px; 
            font-weight: bold; 
            transition: 0.2s; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .quant-btn:hover { background: #2196F3; color: white; transform: scale(1.05); }

        #game-area { display: none; max-width: 1200px; margin: 0 auto; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        .back-btn { padding: 10px 20px; background: #607D8B; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        /* Chat Log (Keeps history, positioned at the top) */
        .chat-log {
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: var(--panel-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            max-height: 600px;
            overflow-y: auto;
            width: 100%;
            box-sizing: border-box;
        }
        .chat-message {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            width: 100%;
        }
        .seller-message { justify-content: flex-start; }
        .buyer-message { justify-content: flex-end; }
        .chat-avatar { font-size: 3em; }
        .chat-bubble {
            padding: 15px 20px;
            background: #e0f7fa;
            border-radius: 15px;
            font-size: 1.25em; 
            text-align: left;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            max-width: 60%;
            line-height: 1.5;
        }
        .buyer-message .chat-bubble { background: #fff9c4; text-align: right; }
        
        .vocab { font-weight: bold; color: #D32F2F; text-decoration: underline; }
        .vocab-good { font-weight: bold; color: #388E3C; text-decoration: underline; }

        .produce-display {
            font-size: 4.5em;
            margin: 20px 0;
            padding: 20px;
            background: #fff;
            border-radius: 15px;
            min-height: 80px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 5px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.05);
        }

        .controls { display: flex; justify-content: center; gap: 15px; margin-top: 20px; flex-wrap: wrap; }
        .action-btn {
            font-size: 1.1em;
            padding: 15px 25px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            transition: 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .action-btn:hover { opacity: 0.9; transform: translateY(-2px); }
        .btn-agree { background-color: #4CAF50; }
        .btn-complain { background-color: #F44336; }
        .btn-ask { background-color: #2196F3; }
        .btn-leave { background-color: #607D8B; }
        .btn-pay { background-color: #FF9800; }
        .btn-next { background-color: #9C27B0; }

        /* Model Menu Styles */
        #model-menu-area { display: none; max-width: 800px; margin: 0 auto; }
        .scenario-list { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        .scenario-btn {
            background: white; padding: 20px; border-radius: 15px; border: 2px solid #2196F3;
            font-size: 1.3em; cursor: pointer; transition: 0.2s; font-weight: bold; color: #2c3e50;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: left;
        }
        .scenario-btn:hover { background: #E3F2FD; transform: translateX(10px); }

        /* Quiz Styles */
        #quiz-area { display: none; max-width: 800px; margin: 0 auto; }
        #quiz-container {
            background: white; padding: 40px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: left;
        }
        #quiz-options { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        .quiz-option-btn {
            background: #f8f9fa; color: #2c3e50; font-size: 1.2em; padding: 15px 20px;
            border: 2px solid #dee2e6; border-radius: 12px; cursor: pointer;
            text-align: left; font-weight: bold; transition: 0.2s;
        }
        .quiz-option-btn:hover:not(:disabled) { background: #e2e6ea; border-color: #adb5bd; }
        .quiz-option-btn:disabled { cursor: not-allowed; opacity: 0.9; }
        
        #quiz-header-controls { display: flex; align-items: center; gap: 15px; flex-grow: 1; justify-content: center; }

        /* Flashing Praise Animation (Ensures it vanishes) */
        #praise-text {
            font-size: 3.5em;
            font-weight: bold;
            color: #FFEB3B;
            text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            z-index: 1000; pointer-events: none; opacity: 0;
        }
        @keyframes flashPraise {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            10% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            20% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            80% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(0); opacity: 0; } /* Forces it to vanish completely */
        }
        .animate-praise { animation: flashPraise 3.5s forwards; }

        @media (max-width: 768px) {
            .conversation-board { flex-direction: column; align-items: center; }
            .character { width: 100%; align-items: center !important; margin-bottom: 20px; }
            .buyer-side .bubble { text-align: left; }
        }
    </style>
</head>
<body>

    <div id="datetime-header">
        <span id="current-date">Loading date...</span> | <span id="current-time">Loading time...</span>
        <span class="season-badge" id="current-season">Season</span>
    </div>

    <!-- MAIN MENU -->
    <div id="main-menu">
        <div class="input-group">
            <label for="player-name" style="font-size: 1.5em; display: block; margin-bottom: 10px;">What is your name?</label>
            <input type="text" id="player-name" placeholder="Enter your name here..." />
        </div>
        <div class="btn-group">
            <button class="menu-btn" id="btn-fruit" onclick="startGame('fruit')">🍎 Shop for Fruit</button>
            <button class="menu-btn" id="btn-veg" onclick="startGame('veg')">🥕 Shop for Vegetables</button>
            <button class="menu-btn" id="btn-model" onclick="showModelMenu()">🗣️ Model Conversations</button>
            <button class="menu-btn" id="btn-quiz" onclick="startQuiz()">📝 50-Question Market Quiz</button>
        </div>
    </div>

    <!-- SELECTION AREA (Shopping Cart UI) -->
    <div id="selection-area">
        <div class="top-bar">
            <button class="back-btn" onclick="showMenu()">← Back to Menu</button>
            <h2>Choose Your <span id="selection-type-title"></span></h2>
            <div style="font-weight: bold; color: #2c3e50; font-size: 1.2em;">Buyer: <span id="display-name-selection"></span></div>
        </div>
        <div id="produce-grid" class="produce-grid"></div>
        
        <div id="quantity-selection">
            <h2 id="quantity-item-name"></h2>
            <div class="produce-display" id="quantity-item-emoji" style="margin: 10px 0; font-size: 4em; padding: 10px; background: transparent; box-shadow: none;"></div>
            <p style="font-size: 1.3em;">How much would you like to buy?</p>
            <div id="quantity-buttons" style="display: flex; flex-wrap: wrap; justify-content: center; gap: 10px;"></div>
            <button class="back-btn" style="margin-top: 20px;" onclick="renderSelection()">Cancel</button>
        </div>
    </div>

    <!-- EXTENDED CONVERSATION MENU -->
    <div id="model-menu-area">
        <div class="top-bar">
            <button class="back-btn" onclick="showMenu()">← Back to Main Menu</button>
            <h2>Choose a Conversation to Model</h2>
            <div></div>
        </div>
        <div class="scenario-list" id="scenario-list"></div>
    </div>

    <!-- GAME AREA (Conversation UI) -->
    <div id="game-area">
        <div class="top-bar">
            <button class="back-btn" onclick="returnToSelection()">← Back to Basket</button>
            <h2 id="market-title">Market</h2>
            <div style="font-weight: bold; color: #2c3e50; font-size: 1.2em;">Buyer: <span id="display-name-game"></span></div>
        </div>

        <!-- Chat History Log (Now at the top) -->
        <div id="chat-log" class="chat-log"></div>

        <!-- Produce Display (Now below conversation) -->
        <div class="produce-display" id="emoji-display"></div>

        <div class="controls" id="control-panel"></div>
    </div>

    <!-- QUIZ AREA -->
    <div id="quiz-area">
        <div class="top-bar">
            <button class="back-btn" onclick="showMenu()">← Main Menu</button>
            <h2 style="margin:0;">Market Knowledge Quiz</h2>
            
            <!-- Feedback and Next Button moved to Header -->
            <div id="quiz-header-controls">
                <span id="quiz-feedback-text" style="font-size: 1.4em; font-weight: bold;"></span>
                <button id="btn-next-question" class="action-btn btn-next" style="display: none; padding: 8px 15px; font-size: 1em; margin: 0;" onclick="nextQuestion()">Next ➡️</button>
            </div>

            <div style="font-weight: bold; color: #2c3e50; font-size: 1.4em; background: white; padding: 5px 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
                Score: <span id="quiz-score" style="color: #4CAF50;">0</span> / 50
            </div>
        </div>
        <div id="quiz-container">
            <h2 id="quiz-question-text" style="font-size: 1.6em; margin-top: 0;">Loading Question...</h2>
            <div id="quiz-options"></div>
        </div>
    </div>

    <div id="praise-text"></div>

    <script>
        let currentSeasonStr = "Summer";

        function updateDateTime() {
            const now = new Date();
            const optionsDate = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const optionsTime = { hour: '2-digit', minute: '2-digit', second: '2-digit' };
            
            document.getElementById('current-date').innerText = now.toLocaleDateString('en-US', optionsDate);
            document.getElementById('current-time').innerText = now.toLocaleTimeString('en-US', optionsTime);

            const month = now.getMonth();
            if (month >= 2 && month <= 4) currentSeasonStr = "Spring";
            else if (month >= 5 && month <= 7) currentSeasonStr = "Summer";
            else if (month >= 8 && month <= 10) currentSeasonStr = "Fall";
            else currentSeasonStr = "Winter";

            document.getElementById('current-season').innerText = currentSeasonStr;

        // STRICT PREMIUM VOICES & GENDER ROLES
        const maleVoiceNames = ["Remy", "Giuseppe", "Florian", "Brian", "Andrew", "William"];
        const femaleVoiceNames = ["Vivienne", "Seraphina", "Emma"];
        let sellerVoice = null;
        let buyerVoice = null;

        function assignVoices() {
            const voices = window.speechSynthesis.getVoices();
            
            // Prioritize specific premium names
            let maleVoices = voices.filter(v => maleVoiceNames.some(name => v.name.includes(name)));
            let femaleVoices = voices.filter(v => femaleVoiceNames.some(name => v.name.includes(name)));

            // Ensure Microsoft Multilingual Online Emma is preferred explicitly
            let emmaVoice = voices.find(v => v.name.includes("Emma") && v.name.includes("Microsoft") && v.name.includes("Online"));
            if (emmaVoice && !femaleVoices.includes(emmaVoice)) {
                femaleVoices.unshift(emmaVoice); 
            }

            // Fallback rules if exact names are missing
            if (maleVoices.length === 0) maleVoices = voices.filter(v => v.lang.startsWith('en') && (v.name.includes('Male') || v.name.includes('David') || v.name.includes('Guy')));
            if (femaleVoices.length === 0) femaleVoices = voices.filter(v => v.lang.startsWith('en') && (v.name.includes('Female') || v.name.includes('Zira') || v.name.includes('Girl')));
            
            // Absolute fallback
            if (maleVoices.length === 0) maleVoices = voices.filter(v => v.lang.startsWith('en'));
            if (femaleVoices.length === 0) femaleVoices = voices.filter(v => v.lang.startsWith('en'));

            // Select one distinct male and one distinct female
            const selectedMale = maleVoices[Math.floor(Math.random() * maleVoices.length)] || voices[0];
            const selectedFemale = femaleVoices[Math.floor(Math.random() * femaleVoices.length)] || voices[0];

            // Randomly assign roles to ensure we always have one male and one female interacting
            if (Math.random() > 0.5) {
                sellerVoice = selectedMale;
                buyerVoice = selectedFemale;
            } else {
                sellerVoice = selectedFemale;
                buyerVoice = selectedMale;
            }
        }
        
        if ('speechSynthesis' in window) {
            window.speechSynthesis.getVoices();
            window.speechSynthesis.onvoiceschanged = () => { assignVoices(); };
        }

        // Conversational Queuing Engine (Keeps Chat History)
        function playConversation(dialogueArray, append = false, onCompleteCallback = null) {
            window.speechSynthesis.cancel();
            
            const chatLog = document.getElementById('chat-log');
            if (!append) chatLog.innerHTML = ''; // Clear only if it's a brand new conversation
            
            let i = 0;

            function speakNext() {
                if (i >= dialogueArray.length) {
                    if (onCompleteCallback) onCompleteCallback();
                    return;
                }

                const line = dialogueArray[i];
                const cleanText = line.text.replace(/<[^>]*>?/gm, ''); 
                const utterance = new SpeechSynthesisUtterance(cleanText);
                
                if (line.isSeller && sellerVoice) utterance.voice = sellerVoice;
                if (!line.isSeller && buyerVoice) utterance.voice = buyerVoice;
                
                utterance.rate = 0.85; // Strict 85% processing speed

                utterance.onstart = () => {
                    // Create and append the message bubble dynamically
                    const msgDiv = document.createElement('div');
                    msgDiv.className = `chat-message ${line.isSeller ? 'seller-message' : 'buyer-message'}`;
                    
                    const avatar = document.createElement('div');
                    avatar.className = 'chat-avatar';
                    avatar.innerText = line.isSeller ? '🧑‍🌾' : '🙋🏽';

                    const bubble = document.createElement('div');
                    bubble.className = 'chat-bubble';
                    bubble.innerHTML = `<strong>${line.isSeller ? 'Seller' : playerName}:</strong> ${line.text}`;

                    if (line.isSeller) {
                        msgDiv.appendChild(avatar);
                        msgDiv.appendChild(bubble);
                    } else {
                        msgDiv.appendChild(bubble);
                        msgDiv.appendChild(avatar);
                    }

                    chatLog.appendChild(msgDiv);
                    chatLog.scrollTop = chatLog.scrollHeight; // Auto-scroll to the newest message
                };

                utterance.onend = () => {
                    i++;
                    speakNext();
                };
                
                // Fallback in case onend drops out
                utterance.onerror = () => { i++; speakNext(); };

                window.speechSynthesis.speak(utterance);
            }

            speakNext();
        }

        function startConversation(amountValue, amountLabel, unitName, displayCount) {

            let priceBase = state.item.basePrice;
            state.isInSeason = (state.item.season === currentSeasonStr);
            if (!state.isInSeason) priceBase = priceBase * 1.3;

            if (state.item.type === 'uncountable' && unitName.includes('kilo')) {
                priceBase = priceBase * 2.204;
            }

            state.unitPrice = priceBase * state.currency.rate; 
            state.totalPrice = state.unitPrice * state.amountValue;

            const displayContainer = document.getElementById('emoji-display');
            displayContainer.innerHTML = '';
            for(let i=0; i<state.displayCount; i++) {

                span.innerText = state.item.emoji;

            let itemText = "";

                const isPlural = (state.amountValue > 1 || state.amountValue === 6 || state.amountValue === 12);
                itemText = `${state.amountLabel} ${isPlural ? state.item.plur : state.item.name}`;

        function triggerFireworks() {
            const duration = 2500;
            const animationEnd = Date.now() + duration;
            const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };
            const interval = setInterval(function() {
                const timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);
                const particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: Math.random() * 0.3, y: Math.random() - 0.2 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: Math.random() * 0.3 + 0.7, y: Math.random() - 0.2 } }));
            }, 250);
        }

            { q: "Buyer: 'Are these fresh?' \nSeller: 'Yes, they were picked _________'", options: ["next week.", "this morning.", "last year.", "tomorrow."], ans: 1 },
            { q: "Buyer: 'Can I have a receipt?' \nSeller: 'Of course, here is your _________'", options: ["paper.", "plastic bag.", "money.", "fruit."], ans: 0 },
            { q: "If a dozen lemons cost $4.00, how much does half a dozen cost?", options: ["$4.00", "$8.00", "$2.00", "$1.00"], ans: 2 },
            { q: "Buyer: 'I want to return these, they are spoiled.' \nWhat does 'spoiled' mean?", options: ["Very delicious", "Too expensive", "Rotten or bad", "Very fresh"], ans: 2 },
            { q: "Buyer: 'Do you sell organic vegetables?' \nWhat does 'organic' mean?", options: ["Grown on a computer", "Grown without artificial chemicals", "Made of plastic", "Imported from far away"], ans: 1 },
            { q: "Seller: 'We are sold out.' \nWhat does this mean?", options: ["We have too many.", "They are on sale.", "We are giving them away.", "We have no more left to sell."], ans: 3 },
            { q: "Buyer: 'I'll take it!' \nWhat does this mean?", options: ["I am stealing it.", "I agree to buy it.", "I do not want it.", "It is too expensive."], ans: 1 },
            { q: "Seller: 'You drive a hard bargain.' \nWhat does this mean?", options: ["You are bad at driving.", "You pay too much money.", "You are very good at negotiating prices.", "You are angry."], ans: 2 },
            { q: "Buyer: 'What is the total?' \nWhat is the buyer asking for?", options: ["The final price to pay.", "The time of day.", "The name of the fruit.", "The weight of the bag."], ans: 0 },
            { q: "If oranges are 3 for $2.00, how much will 6 oranges cost?", options: ["$3.00", "$4.00", "$6.00", "$8.00"], ans: 1 },
            { q: "What is the correct plural spelling for strawberry?", options: ["Strawberrys", "Strawberries", "Strawberryes", "Strawberys"], ans: 1 },
            { q: "Which vegetable is known for making people cry when cutting it?", options: ["Carrot", "Potato", "Onion", "Corn"], ans: 2 },
            { q: "Seller: 'Would you like a bag?' \nBuyer: '__________'", options: ["No, it is too expensive.", "Yes, please. I have too much to carry.", "I want an apple.", "It is a dollar."], ans: 1 },
            { q: "What does it mean to buy 'in bulk'?", options: ["Buying a very small amount", "Buying a large quantity at once", "Buying bad fruit", "Buying one piece"], ans: 1 }
        ];

        let currentQuestionIndex = 0;
        let quizScore = 0;

        function startQuiz() {
            assignVoices();
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('model-menu-area').style.display = 'none';
            document.getElementById('game-area').style.display = 'none';
            document.getElementById('selection-area').style.display = 'none';
            document.getElementById('quiz-area').style.display = 'block';
            
            currentQuestionIndex = 0;
            quizScore = 0;
            document.getElementById('quiz-score').innerText = quizScore;
            loadQuestion();
        }

        function loadQuestion() {
            const q = quizData[currentQuestionIndex];
            document.getElementById('quiz-question-text').innerText = `Q${currentQuestionIndex + 1}: ${q.q}`;
            const optionsDiv = document.getElementById('quiz-options');
            optionsDiv.innerHTML = '';
            
            document.getElementById('quiz-feedback-text').innerText = '';
            document.getElementById('btn-next-question').style.display = 'none';

            q.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'quiz-option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(index, btn);
                optionsDiv.appendChild(btn);
            });

            // Read Question Aloud (Replaces underscores with "blank")
            if ('speechSynthesis' in window) {
                let speakText = q.q.replace(/_+/g, "blank");
                const utterance = new SpeechSynthesisUtterance(speakText);
                if(sellerVoice) utterance.voice = sellerVoice;
                utterance.rate = 0.85; 
                window.speechSynthesis.speak(utterance);
            }
        }

        function checkAnswer(selectedIndex, btnElement) {
            window.speechSynthesis.cancel();
            const q = quizData[currentQuestionIndex];
            const optionsDiv = document.getElementById('quiz-options');
            const buttons = optionsDiv.querySelectorAll('.quiz-option-btn');

            buttons.forEach(b => b.disabled = true); // Lock choices

            if (selectedIndex === q.ans) {
                btnElement.style.backgroundColor = '#4CAF50';
                btnElement.style.color = 'white';
                document.getElementById('quiz-feedback-text').innerText = '✅ Correct!';
                document.getElementById('quiz-feedback-text').style.color = '#4CAF50';
                quizScore++;
                document.getElementById('quiz-score').innerText = quizScore;
                speakSound("Correct!");
            } else {
                btnElement.style.backgroundColor = '#F44336';
                btnElement.style.color = 'white';
                document.getElementById('quiz-feedback-text').innerText = '❌ Incorrect!';
                document.getElementById('quiz-feedback-text').style.color = '#F44336';
                // Highlight the correct answer
                buttons[q.ans].style.backgroundColor = '#4CAF50';
                buttons[q.ans].style.color = 'white';
                speakSound("Incorrect.");
            }

            document.getElementById('btn-next-question').style.display = 'inline-block';
        }

        function speakSound(text) {
             if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                if(sellerVoice) utterance.voice = sellerVoice;
                window.speechSynthesis.speak(utterance);
            }
        }

        function nextQuestion() {
            window.speechSynthesis.cancel();
            currentQuestionIndex++;
            if (currentQuestionIndex < quizData.length) {
                loadQuestion();
            } else {
                document.getElementById('quiz-question-text').innerText = `Quiz Complete! You scored ${quizScore} out of ${quizData.length}.`;
                document.getElementById('quiz-options').innerHTML = '';
                document.getElementById('quiz-feedback-text').innerText = '';
                document.getElementById('btn-next-question').style.display = 'none';
                
                triggerFireworks();
                const praiseEl = document.getElementById('praise-text');
                praiseEl.innerText = 'Quiz Master!';
                praiseEl.classList.remove('animate-praise');
                void praiseEl.offsetWidth; 
                praiseEl.classList.add('animate-praise');
                speakSound(`Congratulations! You scored ${quizScore} points!`);
            }
        }
    </script>
