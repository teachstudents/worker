<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fun Produce Market!</title>
    <!-- Canvas Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #4CAF50;
            --secondary: #FF9800;
            --bg: #f0f8ff; /* Friendly light blue background for kids */
            --text: #333;
            --panel-bg: #ffffff;
        }
        body {
            font-family: 'Comic Sans MS', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; /* Softer, kid-friendly font */
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        
        /* Header & Time */
        #datetime-header {
            background-color: #2c3e50;
            color: white;
            padding: 10px 20px;
            border-radius: 15px;
            display: inline-block;
            font-size: 1.2em;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .season-badge {
            background-color: #FFC107;
            color: #333;
            padding: 5px 15px;
            border-radius: 10px;
            font-weight: bold;
            margin-left: 10px;
            border: 2px solid #FFA000;
        }
        h1 { color: #2c3e50; font-size: 2.5em; margin-top: 0; text-shadow: 2px 2px 0px white; }

        /* MAIN MENU */
        #main-menu {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
        }
        .input-group { margin-bottom: 20px; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        input[type="text"] {
            font-size: 1.5em;
            padding: 15px;
            border-radius: 15px;
            border: 3px solid #64B5F6;
            text-align: center;
            width: 300px;
            max-width: 90%;
            font-family: inherit;
        }
        .btn-group { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; max-width: 700px;}
        .menu-btn {
            font-size: 1.4em;
            padding: 20px 30px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            color: white;
            font-weight: bold;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
            flex: 1;
            min-width: 280px;
            font-family: inherit;
        }
        .menu-btn:hover { transform: translateY(-5px) scale(1.02); box-shadow: 0 12px 20px rgba(0,0,0,0.3); }
        #btn-fruit { background-color: #E91E63; border-bottom: 5px solid #C2185B; }
        #btn-veg { background-color: #4CAF50; border-bottom: 5px solid #388E3C; }
        #btn-model { background-color: #9C27B0; width: 100%; border-bottom: 5px solid #7B1FA2; }
        #btn-quiz { background-color: #00BCD4; width: 100%; border-bottom: 5px solid #0097A7; }
        #btn-grammar { background-color: #FF5722; width: 100%; border-bottom: 5px solid #E64A19; }

        /* SELECTION AREA */
        #selection-area { display: none; max-width: 1200px; margin: 0 auto; }
        .produce-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); 
            gap: 20px; 
            margin-top: 20px; 
        }
        .produce-card { 
            cursor: pointer; 
            padding: 25px 10px; 
            border-radius: 20px; 
            background: #fff; 
            box-shadow: 0 8px 15px rgba(0,0,0,0.1); 
            font-size: 1.3em; 
            transition: 0.2s; 
            border: 3px solid transparent; 
        }
        .produce-card:hover { transform: translateY(-8px); border-color: var(--primary); }
        .produce-card .emoji { font-size: 4em; display: block; margin-bottom: 10px; }
        
        #quantity-selection { 
            display: none; 
            background: white; 
            padding: 40px; 
            border-radius: 25px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
            margin-top: 20px; 
        }
        .quant-btn { 
            background: #E3F2FD; 
            color: #1565C0; 
            font-size: 1.3em; 
            padding: 15px 25px; 
            border: 3px solid #90CAF9; 
            border-radius: 15px; 
            cursor: pointer; 
            margin: 8px; 
            font-weight: bold; 
            transition: 0.2s; 
        }
        .quant-btn:hover { background: #2196F3; color: white; border-color: #1976D2; transform: scale(1.05); }

        /* GAME / CHAT AREA */
        #game-area { display: none; max-width: 1000px; margin: 0 auto; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        .back-btn { padding: 12px 25px; background: #607D8B; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 1.1em; border-bottom: 4px solid #455A64;}
        .back-btn:hover { transform: translateY(-2px); }
        
        .chat-log {
            display: flex;
            flex-direction: column;
            gap: 20px;
            background: var(--panel-bg);
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            max-height: 500px;
            overflow-y: auto;
            width: 100%;
            box-sizing: border-box;
            border: 4px solid #E0F7FA;
        }
        .chat-message { display: flex; align-items: flex-end; gap: 15px; width: 100%; }
        .seller-message { justify-content: flex-start; }
        .buyer-message { justify-content: flex-end; }
        .chat-avatar { font-size: 3.5em; background: #f0f0f0; border-radius: 50%; padding: 5px; }
        .chat-bubble {
            padding: 20px 25px;
            background: #e0f7fa;
            border-radius: 20px;
            font-size: 1.4em; 
            text-align: left;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            max-width: 65%;
            line-height: 1.5;
            border: 2px solid #B2EBF2;
        }
        .buyer-message .chat-bubble { background: #fff9c4; text-align: right; border-color: #FFF59D; }
        
        .vocab { font-weight: bold; color: #D32F2F; text-decoration: underline; }
        .vocab-good { font-weight: bold; color: #388E3C; text-decoration: underline; }

        .produce-display {
            font-size: 5em;
            margin: 20px 0;
            padding: 20px;
            background: #fff;
            border-radius: 20px;
            min-height: 100px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.1);
            border: 3px dashed #ccc;
        }

        .controls { display: flex; justify-content: center; gap: 15px; margin-top: 20px; flex-wrap: wrap; }
        .action-btn {
            font-size: 1.3em;
            padding: 15px 30px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            transition: 0.2s;
            box-shadow: 0 5px 0px rgba(0,0,0,0.2);
            font-family: inherit;
        }
        .action-btn:hover { transform: translateY(-2px); }
        .action-btn:active { transform: translateY(3px); box-shadow: 0 2px 0px rgba(0,0,0,0.2); }
        .btn-agree { background-color: #4CAF50; border-bottom-color: #388E3C; }
        .btn-complain { background-color: #F44336; border-bottom-color: #D32F2F; }
        .btn-ask { background-color: #2196F3; border-bottom-color: #1976D2; }
        .btn-leave { background-color: #607D8B; border-bottom-color: #455A64; }
        .btn-pay { background-color: #FF9800; border-bottom-color: #F57C00; }
        .btn-next { background-color: #9C27B0; border-bottom-color: #7B1FA2; }

        /* Model Menu */
        #model-menu-area { display: none; max-width: 900px; margin: 0 auto; }
        .scenario-list { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        .scenario-btn {
            background: white; padding: 20px; border-radius: 15px; border: 3px solid #2196F3;
            font-size: 1.3em; cursor: pointer; transition: 0.2s; font-weight: bold; color: #2c3e50;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: left; font-family: inherit;
        }
        .scenario-btn:hover { background: #E3F2FD; transform: translateX(10px); }
        .challenge-badge { background: #E91E63; color: white; padding: 4px 10px; border-radius: 8px; font-size: 0.8em; margin-left: 10px; }

        /* Quiz */
        #quiz-area { display: none; max-width: 900px; margin: 0 auto; }
        #quiz-container { background: white; padding: 40px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: left; }
        #quiz-options { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        .quiz-option-btn {
            background: #f8f9fa; color: #2c3e50; font-size: 1.3em; padding: 15px 25px;
            border: 3px solid #dee2e6; border-radius: 15px; cursor: pointer;
            text-align: left; font-weight: bold; transition: 0.2s; font-family: inherit;
        }
        .quiz-option-btn:hover:not(:disabled) { background: #e2e6ea; border-color: #adb5bd; transform: translateX(5px); }
        .quiz-option-btn:disabled { cursor: not-allowed; opacity: 0.9; }
        #quiz-header-controls { display: flex; align-items: center; gap: 15px; flex-grow: 1; justify-content: center; }

        /* Grammar Challenge */
        #grammar-area { display: none; max-width: 900px; margin: 0 auto; }
        .grammar-card { background: white; padding: 40px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-top: 20px; }
        .grammar-options { display: flex; gap: 15px; justify-content: center; margin-top: 30px; flex-wrap: wrap; }
        .grammar-btn {
            background: #E3F2FD; color: #1565C0; font-size: 1.4em; padding: 20px 40px;
            border: 4px solid #2196F3; border-radius: 20px; cursor: pointer;
            font-weight: bold; transition: 0.2s; flex: 1; min-width: 200px; font-family: inherit;
        }
        .grammar-btn:hover:not(:disabled) { background: #2196F3; color: white; transform: translateY(-5px); box-shadow: 0 8px 15px rgba(33,150,243,0.3); }
        .grammar-rule-box {
            display: none; background: #FFF9C4; color: #F57F17; padding: 25px;
            border-radius: 20px; margin-top: 25px; font-size: 1.3em; font-weight: bold; border: 3px dashed #FBC02D;
        }

        /* Praise Animation */
        #praise-text {
            font-size: 4.5em;
            font-weight: bold;
            color: #FFEB3B;
            text-shadow: 3px 3px 0 #FF5722, -2px -2px 0 #FF5722, 2px -2px 0 #FF5722, -2px 2px 0 #FF5722, 2px 2px 0 #FF5722;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            z-index: 1000; pointer-events: none; opacity: 0;
        }
        @keyframes flashPraise {
            0% { transform: translate(-50%, -50%) scale(0) rotate(-10deg); opacity: 0; }
            15% { transform: translate(-50%, -50%) scale(1.3) rotate(5deg); opacity: 1; }
            30% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
            80% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
        }
        .animate-praise { animation: flashPraise 3s forwards; }
    </style>
</head>
<body>

    <div id="datetime-header">
        <span id="current-date">Loading date...</span> | <span id="current-time">Loading time...</span>
        <span class="season-badge" id="current-season">Season</span>
    </div>

    <div id="main-menu">
        <h1 style="font-size: 3em;">🍎 Fun Produce Market! 🥕</h1>
        <div class="input-group">
            <label for="player-name" style="font-size: 1.5em; display: block; margin-bottom: 10px; font-weight: bold; color: #1976D2;">Hello! What is your name?</label>
            <input type="text" id="player-name" placeholder="Type your name..." />
        </div>
        <div class="btn-group">
            <button class="menu-btn" id="btn-fruit" onclick="startGame('fruit')">🍎 Shop for Fruit</button>
            <button class="menu-btn" id="btn-veg" onclick="startGame('veg')">🥕 Shop for Veggies</button>
            <button class="menu-btn" id="btn-model" onclick="showModelMenu()">🗣️ Listen to Conversations</button>
            <button class="menu-btn" id="btn-quiz" onclick="startQuiz()">📝 Fun Market Quiz (10 Q's)</button>
            <button class="menu-btn" id="btn-grammar" onclick="startGrammarGame()">🧩 Grammar Game</button>
        </div>
    </div>

    <div id="selection-area">
        <div class="top-bar">
            <button class="back-btn" onclick="showMenu()">← Back to Menu</button>
            <h2 style="font-size: 2em;">Choose Your <span id="selection-type-title"></span></h2>
            <div style="font-weight: bold; color: #2c3e50; font-size: 1.3em; background: white; padding: 5px 15px; border-radius: 10px;">Shopper: <span id="display-name-selection"></span></div>
        </div>
        <div id="produce-grid" class="produce-grid"></div>
        
        <div id="quantity-selection">
            <h2 id="quantity-item-name" style="font-size: 2em; color: #1976D2;"></h2>
            <div class="produce-display" id="quantity-item-emoji" style="margin: 10px 0; font-size: 4em; padding: 10px; background: transparent; box-shadow: none; border: none;"></div>
            <p style="font-size: 1.5em; font-weight: bold;">How much do you want?</p>
            <div id="quantity-buttons" style="display: flex; flex-wrap: wrap; justify-content: center; gap: 10px;"></div>
            <button class="back-btn" style="margin-top: 30px; background: #F44336; border-bottom-color: #D32F2F;" onclick="renderSelection()">Cancel</button>
        </div>
    </div>

    <div id="model-menu-area">
        <div class="top-bar">
            <button class="back-btn" onclick="showMenu()">← Back to Main Menu</button>
            <h2 style="font-size: 2em;">Listen & Learn</h2>
            <div></div>
        </div>
        <div class="scenario-list" id="scenario-list"></div>
    </div>

    <div id="game-area">
        <div class="top-bar">
            <button class="back-btn" onclick="returnToSelection()">← Back to Basket</button>
            <h2 id="market-title" style="font-size: 2em;">Market</h2>
            <div style="font-weight: bold; color: #2c3e50; font-size: 1.3em; background: white; padding: 5px 15px; border-radius: 10px;">Shopper: <span id="display-name-game"></span></div>
        </div>

        <div id="chat-log" class="chat-log"></div>
        <div class="produce-display" id="emoji-display"></div>
        <div class="controls" id="control-panel"></div>
    </div>

    <div id="quiz-area">
        <div class="top-bar">
            <button class="back-btn" onclick="showMenu()">← Main Menu</button>
            <h2 style="margin:0; font-size: 1.8em;">Market Quiz</h2>
            
            <div id="quiz-header-controls">
                <span id="quiz-feedback-text" style="font-size: 1.5em; font-weight: bold;"></span>
                <button id="btn-next-question" class="action-btn btn-next" style="display: none; padding: 10px 20px; font-size: 1.1em; margin: 0;" onclick="nextQuestion()">Next ➡️</button>
            </div>

            <div style="font-weight: bold; color: #2c3e50; font-size: 1.5em; background: white; padding: 5px 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
                Score: <span id="quiz-score" style="color: #4CAF50;">0</span> / 10
            </div>
        </div>
        <div id="quiz-container">
            <h2 id="quiz-question-text" style="font-size: 1.8em; margin-top: 0; color: #1976D2;">Loading Question...</h2>
            <div id="quiz-options"></div>
        </div>
    </div>

    <div id="grammar-area">
        <div class="top-bar">
            <button class="back-btn" onclick="showMenu()">← Main Menu</button>
            <h2 style="margin:0; font-size: 1.8em;">Grammar Game 🧩</h2>
            <div style="font-weight: bold; color: #2c3e50; font-size: 1.5em; background: white; padding: 5px 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
                Score: <span id="grammar-score" style="color: #FF5722;">0</span>
            </div>
        </div>
        <div class="grammar-card">
            <h2 id="grammar-question-text" style="font-size: 2.2em; margin-top: 0; color: #2c3e50;">Loading...</h2>
            <div class="grammar-options" id="grammar-options"></div>
            <div class="grammar-rule-box" id="grammar-rule-box"></div>
            <button id="btn-grammar-next" class="action-btn btn-next" style="display: none; margin: 30px auto 0 auto; font-size: 1.3em;" onclick="nextGrammarQuestion()">Next Challenge ➡️</button>
        </div>
    </div>

    <div id="praise-text"></div>

    <script>
        // Set up the Live Clock & Season logic
        let currentSeasonStr = "Summer";

        function updateDateTime() {
            const now = new Date();
            const optionsDate = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const optionsTime = { hour: '2-digit', minute: '2-digit', second: '2-digit' };
            
            document.getElementById('current-date').innerText = now.toLocaleDateString('en-US', optionsDate);
            document.getElementById('current-time').innerText = now.toLocaleTimeString('en-US', optionsTime);

            const month = now.getMonth();
            if (month >= 2 && month <= 4) currentSeasonStr = "Spring";
            else if (month >= 5 && month <= 7) currentSeasonStr = "Summer";
            else if (month >= 8 && month <= 10) currentSeasonStr = "Fall";
            else currentSeasonStr = "Winter";

            document.getElementById('current-season').innerText = currentSeasonStr;
        }
        setInterval(updateDateTime, 1000);
        updateDateTime();

        // Product Databases
        const fruits = [
            { emoji: '🍎', name: 'apple', plur: 'apples', type: 'countable', season: 'Fall', basePrice: 0.75 },
            { emoji: '🍌', name: 'banana', plur: 'bananas', type: 'countable', season: 'Summer', basePrice: 0.35 },
            { emoji: '🍍', name: 'pineapple', plur: 'pineapples', type: 'countable', season: 'Spring', basePrice: 3.50 },
            { emoji: '🥭', name: 'mango', plur: 'mangoes', type: 'countable', season: 'Summer', basePrice: 1.80 },
            { emoji: '🥑', name: 'avocado', plur: 'avocados', type: 'countable', season: 'Spring', basePrice: 2.20 },
            { emoji: '🍉', name: 'watermelon', plur: 'watermelons', type: 'countable', season: 'Summer', basePrice: 0.60 },
            { emoji: '🍊', name: 'orange', plur: 'oranges', type: 'countable', season: 'Winter', basePrice: 1.45 },
            { emoji: '🍋', name: 'lemon', plur: 'lemons', type: 'countable', season: 'Winter', basePrice: 1.20 },
            { emoji: '🍓', name: 'strawberry', plur: 'strawberries', type: 'countable', season: 'Spring', basePrice: 2.50 },
            { emoji: '🍑', name: 'peach', plur: 'peaches', type: 'countable', season: 'Summer', basePrice: 1.90 },
            { emoji: '🍐', name: 'pear', plur: 'pears', type: 'countable', season: 'Fall', basePrice: 1.60 },
            { emoji: '🥥', name: 'coconut', plur: 'coconuts', type: 'countable', season: 'Summer', basePrice: 3.00 },
            { emoji: '🥝', name: 'kiwi', plur: 'kiwis', type: 'countable', season: 'Winter', basePrice: 2.10 },
            { emoji: '🍇', name: 'grapes', plur: 'grapes', type: 'uncountable', season: 'Summer', basePrice: 2.10 },
            { emoji: '🍒', name: 'cherries', plur: 'cherries', type: 'uncountable', season: 'Summer', basePrice: 3.50 }
        ];

        const vegetables = [
            { emoji: '🍅', name: 'tomato', plur: 'tomatoes', type: 'countable', season: 'Summer', basePrice: 0.60 },
            { emoji: '🍆', name: 'eggplant', plur: 'eggplants', type: 'countable', season: 'Summer', basePrice: 1.40 },
            { emoji: '🧅', name: 'onion', plur: 'onions', type: 'countable', season: 'Fall', basePrice: 0.50 },
            { emoji: '🥒', name: 'cucumber', plur: 'cucumbers', type: 'countable', season: 'Summer', basePrice: 1.20 },
            { emoji: '🫑', name: 'bell pepper', plur: 'bell peppers', type: 'countable', season: 'Summer', basePrice: 1.60 },
            { emoji: '🌶️', name: 'hot pepper', plur: 'hot peppers', type: 'countable', season: 'Summer', basePrice: 1.30 },
            { emoji: '🍠', name: 'sweet potato', plur: 'sweet potatoes', type: 'countable', season: 'Fall', basePrice: 1.00 },
            { emoji: '🥔', name: 'potato', plur: 'potatoes', type: 'uncountable', season: 'Fall', basePrice: 0.89 },
            { emoji: '🥦', name: 'broccoli', plur: 'broccoli', type: 'uncountable', season: 'Winter', basePrice: 2.48 },
            { emoji: '🥬', name: 'spinach', plur: 'spinach', type: 'uncountable', season: 'Spring', basePrice: 2.20 },
            { emoji: '🧄', name: 'garlic', plur: 'garlic', type: 'uncountable', season: 'Spring', basePrice: 3.50 },
            { emoji: '🥕', name: 'carrot', plur: 'carrots', type: 'countable', season: 'Spring', basePrice: 0.98 },
            { emoji: '🌽', name: 'corn', plur: 'corn', type: 'uncountable', season: 'Summer', basePrice: 1.10 },
            { emoji: '🥗', name: 'lettuce', plur: 'lettuce', type: 'uncountable', season: 'Spring', basePrice: 1.80 }
        ];

        const currencies = [
            { symbol: '$', name: 'dollars', rate: 1.0 },
            { symbol: '€', name: 'euros', rate: 0.90 },
            { symbol: '£', name: 'pounds', rate: 0.75 }
        ];

        // State tracking
        let currentMode = 'fruit';
        let playerName = 'Student';
        let state = {};

        // Extended 10 Scenarios
        const extendedScenarios = [
            {
                title: "🍅 Scenario 1: Recipe Advice (Basic)", emoji: "🍅", isChallenge: false,
                dialogue: [
                    { isSeller: true, text: "Hello there! Are you looking for anything special today?" },
                    { isSeller: false, text: "Yes, I want to make fresh salsa, but I don't know which tomatoes to use." },
                    { isSeller: true, text: "For salsa, Roma tomatoes are the best. They have a great flavor." },
                    { isSeller: false, text: "That sounds perfect! I will take one kilo, please." },
                    { isSeller: true, text: "Excellent choice! That will be $3.50." }
                ]
            },
            {
                title: "🍎 Scenario 2: Asking for a Discount (Basic)", emoji: "🍎🍎", isChallenge: false,
                dialogue: [
                    { isSeller: false, text: "Excuse me, how much are these apples?" },
                    { isSeller: true, text: "They are $2.00 a pound. They are very sweet!" },

        const targetVoiceNames = ["Remy", "Giuseppe", "Vivienne", "Florian", "Seraphina", "Emma", "Brian", "Ava", "Andrew", "William"];
        const explicitMale = ["Remy", "Giuseppe", "Florian", "Brian", "Andrew", "William", "Guy", "David"];
        const explicitFemale = ["Vivienne", "Seraphina", "Emma", "Ava", "Jenny", "Aria", "Zira", "Girl"];
        
        let sellerVoice = null;
        let buyerVoice = null;

        function assignVoices() {
            const voices = window.speechSynthesis.getVoices();
            if(voices.length === 0) return;

            // Prioritize target names or Microsoft Online voices
            let premiumVoices = voices.filter(v => v.lang.startsWith('en') && (
                targetVoiceNames.some(name => v.name.includes(name)) || 
                (v.name.includes("Microsoft") && v.name.includes("Online"))
            ));
            
            // Fallback if no premium online voices found
            if(premiumVoices.length < 2) premiumVoices = voices.filter(v => v.lang.startsWith('en'));

            // Sort into Male/Female pools
            let maleVoices = premiumVoices.filter(v => explicitMale.some(m => v.name.includes(m)));
            let femaleVoices = premiumVoices.filter(v => explicitFemale.some(f => v.name.includes(f)));

            // Absolute fallback to any English voice
            if(maleVoices.length === 0) maleVoices = premiumVoices;
            if(femaleVoices.length === 0) femaleVoices = premiumVoices;

            // Randomly pick one male and one female
            const mVoice = maleVoices[Math.floor(Math.random() * maleVoices.length)];
            const fVoice = femaleVoices[Math.floor(Math.random() * femaleVoices.length)];

            // Randomly assign roles
            if (Math.random() > 0.5) {
                sellerVoice = mVoice;
                buyerVoice = fVoice;
            } else {
                sellerVoice = fVoice;
                buyerVoice = mVoice;
            }
        }
        
        if ('speechSynthesis' in window) {
            window.speechSynthesis.onvoiceschanged = () => { assignVoices(); };
            assignVoices(); // Try once immediately
        }

        // This handles the back-and-forth chat log
        function playConversation(dialogueArray, append = false, onCompleteCallback = null) {
            window.speechSynthesis.cancel();
            
            const chatLog = document.getElementById('chat-log');
            if (!append) chatLog.innerHTML = '';
            
            let i = 0;

            function speakNext() {
                if (i >= dialogueArray.length) {
                    if (onCompleteCallback) onCompleteCallback();
                    return;
                }

                const line = dialogueArray[i];
                // Handle "blank" for quizzes instead of underscores
                let speakText = line.text.replace(/_+/g, "blank"); 
                const cleanText = speakText.replace(/<[^>]*>?/gm, ''); 
                
                const utterance = new SpeechSynthesisUtterance(cleanText);
                
                if (line.isSeller && sellerVoice) utterance.voice = sellerVoice;
                if (!line.isSeller && buyerVoice) utterance.voice = buyerVoice;
                
                utterance.rate = 0.85;

                utterance.onstart = () => {
                    const msgDiv = document.createElement('div');
                    msgDiv.className = `chat-message ${line.isSeller ? 'seller-message' : 'buyer-message'}`;
                    
                    const avatar = document.createElement('div');
                    avatar.className = 'chat-avatar';
                    avatar.innerText = line.isSeller ? '🧑‍🌾' : '🙋🏽';

                    const bubble = document.createElement('div');
                    bubble.className = 'chat-bubble';
                    bubble.innerHTML = `<strong>${line.isSeller ? 'Seller' : playerName}:</strong> ${line.text}`;

                    if (line.isSeller) {
                        msgDiv.appendChild(avatar);
                        msgDiv.appendChild(bubble);
                    } else {
                        msgDiv.appendChild(bubble);
                        msgDiv.appendChild(avatar);
                    }

                    chatLog.appendChild(msgDiv);
                    chatLog.scrollTop = chatLog.scrollHeight;
                };

                utterance.onend = () => {
                    i++;
                    speakNext();
                };
                
                // CRITICAL FIX: Ensure the conversation continues even if a voice error occurs
                utterance.onerror = (e) => { 
                    console.log("Speech error:", e);
                    i++; 
                    speakNext(); 
                };

                window.speechSynthesis.speak(utterance);
            }
            
            // Initiate the loop
            speakNext();
        }

        function startConversation(amountValue, amountLabel, unitName, displayCount) {

            state.amountValue = amountValue;

            state.unitName = unitName;
            state.displayCount = displayCount;

            let priceBase = state.item.basePrice;
            state.isInSeason = (state.item.season === currentSeasonStr);
            if (!state.isInSeason) priceBase = priceBase * 1.3;

            if (state.item.type === 'uncountable' && unitName.includes('kilo')) {
                priceBase = priceBase * 2.204;
            }

            state.unitPrice = priceBase * state.currency.rate; 
            state.totalPrice = state.unitPrice * state.amountValue;

            const displayContainer = document.getElementById('emoji-display');
            displayContainer.innerHTML = '';
            for(let i=0; i<state.displayCount; i++) {

                span.innerText = state.item.emoji;

        function triggerFireworks() {
            const duration = 2500;
            const animationEnd = Date.now() + duration;
            const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };
            const interval = setInterval(function() {
                const timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);
                const particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: Math.random() * 0.3, y: Math.random() - 0.2 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: Math.random() * 0.3 + 0.7, y: Math.random() - 0.2 } }));
            }, 250);
        }

        let activeQuizQuestions = [];
        let currentQuestionIndex = 0;
        let quizScore = 0;

        function startQuiz() {
            assignVoices();
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('quiz-area').style.display = 'block';
            
            // Randomly select 10 questions for this round (chunking for Grade 3)
            activeQuizQuestions = quizData.sort(() => 0.5 - Math.random()).slice(0, 10);
            
            currentQuestionIndex = 0;
            quizScore = 0;
            document.getElementById('quiz-score').innerText = quizScore;
            loadQuestion();
        }

        function loadQuestion() {
            const q = activeQuizQuestions[currentQuestionIndex];
            document.getElementById('quiz-question-text').innerText = `Q${currentQuestionIndex + 1}: ${q.q}`;
            const optionsDiv = document.getElementById('quiz-options');
            optionsDiv.innerHTML = '';
            
            document.getElementById('quiz-feedback-text').innerText = '';
            document.getElementById('btn-next-question').style.display = 'none';

            q.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'quiz-option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(index, btn);
                optionsDiv.appendChild(btn);
            });

            if ('speechSynthesis' in window) {
                let speakText = q.q.replace(/_+/g, "blank");
                const utterance = new SpeechSynthesisUtterance(speakText);
                if(sellerVoice) utterance.voice = sellerVoice;
                utterance.rate = 0.85; 
                window.speechSynthesis.speak(utterance);
            }
        }

        function checkAnswer(selectedIndex, btnElement) {
            window.speechSynthesis.cancel();
            const q = activeQuizQuestions[currentQuestionIndex];
            const optionsDiv = document.getElementById('quiz-options');
            const buttons = optionsDiv.querySelectorAll('.quiz-option-btn');

            buttons.forEach(b => b.disabled = true); 

            if (selectedIndex === q.ans) {
                btnElement.style.backgroundColor = '#4CAF50';
                btnElement.style.color = 'white';
                document.getElementById('quiz-feedback-text').innerText = '✅ Correct!';
                document.getElementById('quiz-feedback-text').style.color = '#4CAF50';
                quizScore++;
                document.getElementById('quiz-score').innerText = quizScore;
                speakSound("Correct!");
            } else {
                btnElement.style.backgroundColor = '#F44336';
                btnElement.style.color = 'white';
                document.getElementById('quiz-feedback-text').innerText = '❌ Incorrect!';
                document.getElementById('quiz-feedback-text').style.color = '#F44336';
                buttons[q.ans].style.backgroundColor = '#4CAF50';
                buttons[q.ans].style.color = 'white';
                speakSound("Incorrect.");
            }

            document.getElementById('btn-next-question').style.display = 'inline-block';
        }

        function speakSound(text) {
             if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                if(sellerVoice) utterance.voice = sellerVoice;
                window.speechSynthesis.speak(utterance);
            }
        }

        function nextQuestion() {
            window.speechSynthesis.cancel();
            currentQuestionIndex++;
            if (currentQuestionIndex < activeQuizQuestions.length) {
                loadQuestion();
            } else {
                document.getElementById('quiz-question-text').innerText = `Quiz Complete! You scored ${quizScore} out of 10.`;
                document.getElementById('quiz-options').innerHTML = '';
                document.getElementById('quiz-feedback-text').innerText = '';
                document.getElementById('btn-next-question').style.display = 'none';
                
                triggerFireworks();
                const praiseEl = document.getElementById('praise-text');

                praiseEl.classList.add('animate-praise');
                speakSound(`Congratulations! You scored ${quizScore} points!`);

                }, 1000);

        function checkGrammarAnswer(selectedIndex, btnElement) {
            window.speechSynthesis.cancel();

            buttons.forEach(b => b.disabled = true);

            const ruleBox = document.getElementById('grammar-rule-box');

                ruleBox.style.borderColor = '#F44336';

            document.getElementById('btn-grammar-next').style.display = 'block';
