    @keyframes floatUpToHeader {
      0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
      20% { transform: translate(-50%, -100%) scale(1.5); opacity: 1; }
      100% { transform: translate(-50%, -400px) scale(0.5); opacity: 0; }
    }

    .point-animation {
      position: fixed;
      top: 50%;
      left: 50%;
      animation: floatUpToHeader 1.2s ease-in-out forwards;
      pointer-events: none;
      z-index: 50;
    }

    @keyframes glitterParticle {
      0% { transform: translate(0, 0) scale(0.5) rotate(0deg); opacity: 1; }
      100% { transform: translate(var(--tx), var(--ty)) scale(1.5) rotate(360deg); opacity: 0; }
    }

    .glitter {
      position: absolute;
      width: 20px;
      height: 20px;
      background-color: var(--color);
      clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
      animation: glitterParticle 0.8s ease-out forwards;
      pointer-events: none;
    }

    @keyframes shrink { 
      from { width: 0%; } 
      to { width: 100%; } 
    }

          { emoji: "👖", word: "jeans", dialogues: [{ s: "Vivienne", t: "Do you wear comfortable jeans on the weekend?" }, { s: "Remy", t: "Where are my favorite faded blue jeans?" }] },
          { emoji: "🕶️", word: "sunglasses", dialogues: [{ s: "Seraphina", t: "When do you usually wear your dark sunglasses?" }, { s: "Giuseppe", t: "Where did you leave your expensive sunglasses?" }] },
          { emoji: "⌚", word: "watch", dialogues: [{ s: "Vivienne", t: "Do you look at your digital watch often during class?" }, { s: "Remy", t: "Where did you find that nice silver watch?" }] },
          { emoji: "👔", word: "suit", dialogues: [{ s: "Seraphina", t: "Where did your older brother rent his tuxedo suit?" }, { s: "Giuseppe", t: "When is he going to wear the suit for the dance?" }] },
          { emoji: "🎽", word: "jersey", dialogues: [{ s: "Vivienne", t: "When do you wear your lucky soccer jersey?" }, { s: "Remy", t: "Do you know where my team jersey is hanging?" }] },
          { emoji: "🩳", word: "shorts", dialogues: [{ s: "Seraphina", t: "Do you wear athletic shorts when it is hot outside?" }, { s: "Giuseppe", t: "Where did you pack your swimming shorts for the trip?" }] },
        ],
        B1: [
          { emoji: "🥋", word: "uniform", dialogues: [{ s: "Vivienne", t: "Do you know when we are strictly required to wear the full dress uniform?" }, { s: "Remy", t: "Where can I purchase the updated student uniform policy handbook?" }] },
          { emoji: "👟", word: "sneaker", dialogues: [{ s: "Seraphina", t: "Where did you manage to buy those high-quality running sneakers?" }, { s: "Giuseppe", t: "Do you know exactly when the brand will release the new athletic design?" }] },
          { emoji: "🧶", word: "sweater", dialogues: [{ s: "Vivienne", t: "When you washed the delicate sweater, do you remember if the water was hot?" }, { s: "Remy", t: "Where should I carefully store my woolen clothes during the humid summer?" }] },
          { emoji: "🧛", word: "costume", dialogues: [{ s: "Seraphina", t: "Do you know where the theater department safely keeps the historical costumes?" }, { s: "Giuseppe", t: "When will the lead actors have their first official costume fitting?" }] },
          { emoji: "👗", word: "outfit", dialogues: [{ s: "Vivienne", t: "When you attend the formal graduation ceremony, what elegant outfit will you wear?" }, { s: "Remy", t: "Do you know where she bought that incredibly stylish outfit for the banquet?" }] },
          { emoji: "🪡", word: "zipper", dialogues: [{ s: "Seraphina", t: "Where can I take my expensive winter coat when the metal zipper breaks?" }, { s: "Giuseppe", t: "Do you know how to safely fix a zipper when it suddenly gets stuck?" }] },
          { emoji: "🔘", word: "button", dialogues: [{ s: "Vivienne", t: "Do you actually know how to sew a loose button back onto a dress shirt?" }, { s: "Remy", t: "Where did you accidentally drop the missing button from your jacket?" }] },
          { emoji: "👔", word: "collar", dialogues: [{ s: "Seraphina", t: "When you work at the upscale restaurant, do you have to wear a shirt with a collar?" }, { s: "Giuseppe", t: "Where can I buy a comfortable collar that isn't so uncomfortably stiff?" }] },
          { emoji: "👖", word: "pocket", dialogues: [{ s: "Vivienne", t: "Do you remember where you put the car keys before frantically checking your pocket?" }, { s: "Remy", t: "When did you first realize there was a massive hole in your front pocket?" }] },
          { emoji: "💅", word: "fashion", dialogues: [{ s: "Seraphina", t: "Do you closely follow the latest evolving trends in the competitive fashion industry?" }, { s: "Giuseppe", t: "When looking for sustainable clothing materials, where do you usually choose to shop?" }] },
        ]
      }
    };

    // Strict fallback map and preferences
    const VOICE_MAP = {
      "Vivienne": { lang: "en-GB", gender: "female" },
      "Remy": { lang: "en-US", gender: "male" },
      "Seraphina": { lang: "en-US", gender: "female" },
      "Giuseppe": { lang: "en-GB", gender: "male" }
    };

    // Helper: Get random items from array
    const getRandomItems = (arr, n, exclude) => {
      let result = new Array(n);
      let len = arr.length;
      let taken = new Array(len);
      let count = 0;
      
      while (count < n) {
        let x = Math.floor(Math.random() * len);
        if (!taken[x] && arr[x].word !== exclude.word) {
          result[count] = arr[x];
          taken[x] = true;
          count++;
        }
      }
      return result;
    }

    function App() {
      const [view, setView] = useState('HOME'); // HOME, LEVELS, MENU_MODE, TEACHING, QUIZ, CONVERSATIONS
      const [selectedTopic, setSelectedTopic] = useState(null);
      const [selectedLevel, setSelectedLevel] = useState(null);
      const [currentIndex, setCurrentIndex] = useState(0);
      const [points, setPoints] = useState(0);
      
      // Quiz State
      const [quizOptions, setQuizOptions] = useState([]);
      const [showGlitter, setShowGlitter] = useState(false);
      const [glitterClickPos, setGlitterClickPos] = useState({x: 0, y: 0});
      const [correctAnim, setCorrectAnim] = useState(false);

      // Auto-Advance & Audio tracking
      const [repeatToggle, setRepeatToggle] = useState(false);
      
      const synth = window.speechSynthesis;

      // Promisified specific TTS function
      const speakText = (text, personaName) => {
        return new Promise((resolve) => {
          if (!synth) { resolve(); return; }
          
          const utterance = new SpeechSynthesisUtterance(text);
          // Personalization constraint: always slow down to 85%
          utterance.rate = 0.85; 
          
          const voices = synth.getVoices();
          
          // 1. Explicitly search for the Microsoft Online Multilingual voices requested
          let selectedVoice = voices.find(v => v.name.includes(`Microsoft ${personaName} Online`));
          
          // 2. Strict Fallback based on name or gender/lang map to guarantee 4 distinct voices
          if (!selectedVoice) {
             const prefs = VOICE_MAP[personaName];
             selectedVoice = voices.find(v => v.name.includes(personaName)) || 
                             voices.find(v => v.lang.includes(prefs.lang) && v.name.toLowerCase().includes(prefs.gender)) ||
                             voices.find(v => v.lang.includes(prefs.lang));
          }
          
          if (selectedVoice) utterance.voice = selectedVoice;
          
          utterance.onend = resolve;
          utterance.onerror = resolve; // Resolve anyway to not block the sequence
          
          synth.speak(utterance);
        });
      };

      const handleNextTeaching = () => {
        if (currentIndex < VOCABULARY[selectedTopic][selectedLevel].length - 1) {
          setCurrentIndex(c => c + 1);
        } else {
          setView('MENU_MODE');
        }
      };

      // Automatic Audio Sequence and 10-second Advance
      useEffect(() => {
        if (view === 'TEACHING') {
          let isCancelled = false;
          let timer;
          
          const runSequence = async () => {
            synth.cancel();
            await new Promise(r => setTimeout(r, 50)); // Tiny pause to ensure cancellation
            if (isCancelled) return;

            const currentData = VOCABULARY[selectedTopic][selectedLevel][currentIndex];
            
            // Step 1: Say the word
            await speakText(currentData.word, "Vivienne");
            if (isCancelled) return;
            
            await new Promise(r => setTimeout(r, 400)); 
            if (isCancelled) return;

            // Step 2: Read Dialogue 1
            await speakText(currentData.dialogues[0].t, currentData.dialogues[0].s);
            if (isCancelled) return;
            
            await new Promise(r => setTimeout(r, 200));
            if (isCancelled) return;

            // Step 3: Read Dialogue 2
            await speakText(currentData.dialogues[1].t, currentData.dialogues[1].s);
            
            // After sequence finishes, set a timer to guarantee 10 seconds total interaction before advance
            // If the audio took longer than 10s, advance quickly. 
          };

          runSequence();

          // Independent 60s timer for auto-scrolling
          timer = setTimeout(() => {
            if (!isCancelled) {
              handleNextTeaching();
            }
          }, 60000);

          return () => {
            isCancelled = true;
            clearTimeout(timer);
            synth.cancel();
          };
        }
      // eslint-disable-next-line react-hooks/exhaustive-deps
      }, [currentIndex, view, repeatToggle]);


      // Isolated play for Conversations view
      const playIsolatedSequence = async (itemData) => {
          synth.cancel();
          await speakText(itemData.word, "Vivienne");
          await new Promise(r => setTimeout(r, 300));
          await speakText(itemData.dialogues[0].t, itemData.dialogues[0].s);
          await new Promise(r => setTimeout(r, 200));
          await speakText(itemData.dialogues[1].t, itemData.dialogues[1].s);
      };


      const handleBack = () => {
        synth.cancel();
        if (view === 'LEVELS') setView('HOME');
        else if (view === 'MENU_MODE') setView('LEVELS');
        else if (view === 'TEACHING' || view === 'QUIZ' || view === 'CONVERSATIONS') setView('MENU_MODE');
      };

      const handleHome = () => {
        synth.cancel();
        setView('HOME');
        setSelectedTopic(null);
        setSelectedLevel(null);
      };

      const loadQuizForCurrentIndex = () => {
        const list = VOCABULARY[selectedTopic][selectedLevel];
        const currentWord = list[currentIndex];
        
        const allWords = Object.values(VOCABULARY).flatMap(topic => 
            Object.values(topic).flatMap(levelList => levelList)
        );
        
        const incorrectOptions = getRandomItems(allWords, 3, currentWord);
        const options = [currentWord, ...incorrectOptions].sort(() => Math.random() - 0.5);
        setQuizOptions(options);
      };

      useEffect(() => {
        if (view === 'QUIZ') {
            loadQuizForCurrentIndex();
        }
      // eslint-disable-next-line react-hooks/exhaustive-deps
      }, [view, currentIndex]);


      const handleQuizAnswer = (option, e) => {
        const isCorrect = option.word === VOCABULARY[selectedTopic][selectedLevel][currentIndex].word;
        
        if (isCorrect) {
          setGlitterClickPos({ x: e.clientX, y: e.clientY });
          setShowGlitter(true);
          setCorrectAnim(true);
          synth.cancel();
          speakText("Correct! " + option.word, "Vivienne");
          
          setTimeout(() => {
            setPoints(p => p + 10);
            setShowGlitter(false);
            setCorrectAnim(false);
            if (currentIndex < VOCABULARY[selectedTopic][selectedLevel].length - 1) {
              setCurrentIndex(currentIndex + 1);
            } else {
              setView('MENU_MODE');
            }
          }, 1500);
        } else {
          speakText("Try again", "Remy");
        }
      };

      const renderHeader = () => {
        let progressText = null;
        if ((view === 'TEACHING' || view === 'QUIZ') && selectedTopic && selectedLevel) {
          const total = VOCABULARY[selectedTopic][selectedLevel].length;
          const type = view === 'TEACHING' ? 'Word' : 'Question';
          progressText = `${type} ${currentIndex + 1} of ${total}`;
        }

        return (
        <div className="bg-white shadow-md p-4 flex justify-between items-center sticky top-0 z-40">
          <div className="flex gap-2 items-center flex-wrap">
            {view !== 'HOME' && (
              <button onClick={handleBack} className="bg-blue-100 hover:bg-blue-200 text-blue-700 px-4 py-2 rounded-full font-bold transition">
                ⬅ Back
              </button>
            )}
            <button onClick={handleHome} className="bg-indigo-100 hover:bg-indigo-200 text-indigo-700 px-4 py-2 rounded-full font-bold transition">
              🏠 Home
            </button>
            
            {/* Dynamic Header Controls for Teaching Mode */}
            {view === 'TEACHING' && (
               <>
                  <button onClick={() => setRepeatToggle(r => !r)} className="bg-amber-100 hover:bg-amber-200 text-amber-700 px-4 py-2 rounded-full font-bold transition">
                    🔄 Repeat
                  </button>
                  <button onClick={handleNextTeaching} className="bg-green-100 hover:bg-green-200 text-green-700 px-4 py-2 rounded-full font-bold transition">
                    Next ➡
                  </button>
               </>
            )}

            {/* Progress Tracker in Header */}
            {progressText && (
              <div className="bg-indigo-50 border-2 border-indigo-100 text-indigo-500 px-4 py-1.5 rounded-full font-black text-sm uppercase tracking-widest ml-2 shadow-sm">
                {progressText}
              </div>
            )}
          </div>
          <div className="bg-yellow-100 border-2 border-yellow-400 text-yellow-800 px-6 py-2 rounded-full font-black text-xl flex items-center gap-2 shadow-sm">
            <span>⭐</span> {points}
          </div>
        </div>
      )};

      return (
        <div className="min-h-screen flex flex-col relative overflow-hidden">
          
          {showGlitter && (
            <>
                {Array.from({ length: 20 }).map((_, i) => {
                    const angle = (i * 360) / 20;
                    const distance = 80 + Math.random() * 50;
                    const tx = `${Math.cos((angle * Math.PI) / 180) * distance}px`;
                    const ty = `${Math.sin((angle * Math.PI) / 180) * distance}px`;
                    const colors = ['#fde047', '#f472b6', '#60a5fa', '#34d399', '#a78bfa'];
                    return (
                        <div 
                            key={i} 
                            className="glitter" 
                            style={{
                                left: glitterClickPos.x,
                                top: glitterClickPos.y,
                                '--tx': tx,
                                '--ty': ty,
                                '--color': colors[i % colors.length]
                            }} 
                        />
                    );
                })}
                {correctAnim && (
                   <div className="point-animation text-4xl font-black text-yellow-500 drop-shadow-lg">
                      +10
                   </div>
                )}
            </>
          )}

          {renderHeader()}

          <div className="flex-grow flex flex-col items-center p-6 w-full max-w-4xl mx-auto">
            
            {view === 'HOME' && (
              <div className="w-full text-center fade-in">
                <h1 className="text-4xl font-black text-indigo-900 mb-8">Choose a Topic!</h1>
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">
                  {Object.keys(VOCABULARY).map(topic => (
                    <button 
                      key={topic}
                      onClick={() => { setSelectedTopic(topic); setView('LEVELS'); }}
                      className="bg-white border-4 border-indigo-100 hover:border-indigo-400 p-8 rounded-3xl shadow-xl hover:shadow-2xl transition transform hover:-translate-y-2 flex flex-col items-center gap-4"
                    >
                      <span className="text-8xl">
                         {topic === 'Animals' ? '🦒' : topic === 'Food' ? '🍔' : topic === 'School' ? '🏫' : '👕'}
                      </span>
                      <span className="text-3xl font-black text-indigo-800">{topic}</span>
                    </button>
                  ))}
                </div>
              </div>
            )}

            {view === 'LEVELS' && (
              <div className="w-full text-center">
                <h1 className="text-4xl font-black text-indigo-900 mb-8">{selectedTopic} - Select Level</h1>
                <div className="grid grid-cols-1 sm:grid-cols-3 gap-6">
                  {Object.keys(VOCABULARY[selectedTopic]).map(level => (
                    <button 
                      key={level}
                      onClick={() => { setSelectedLevel(level); setView('MENU_MODE'); }}
                      className="bg-white border-4 border-green-100 hover:border-green-400 p-8 rounded-3xl shadow-xl hover:shadow-2xl transition transform hover:-translate-y-2 flex flex-col items-center gap-4"
                    >
                      <span className="text-4xl font-black text-green-600">{level}</span>
                      <span className="text-lg text-gray-500 font-bold">10 Words</span>
                    </button>
                  ))}
                </div>
              </div>
            )}

            {view === 'MENU_MODE' && (
              <div className="w-full text-center">
                 <h1 className="text-4xl font-black text-indigo-900 mb-8">{selectedTopic} ({selectedLevel})</h1>
                 <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <button 
                      onClick={() => { setCurrentIndex(0); setView('TEACHING'); }}
                      className="bg-gradient-to-br from-blue-400 to-indigo-500 text-white p-6 rounded-3xl shadow-xl hover:shadow-2xl transition transform hover:-translate-y-2 flex flex-col items-center gap-4"
                    >
                      <span className="text-6xl">👩‍🏫</span>
                      <span className="text-2xl font-black">Learn Words</span>
                    </button>

                    <button 
                      onClick={() => { setCurrentIndex(0); setView('CONVERSATIONS'); }}
                      className="bg-gradient-to-br from-purple-400 to-fuchsia-500 text-white p-6 rounded-3xl shadow-xl hover:shadow-2xl transition transform hover:-translate-y-2 flex flex-col items-center gap-4"
                    >
                      <span className="text-6xl">💬</span>
                      <span className="text-2xl font-black">Conversations</span>
                    </button>

                    <button 
                      onClick={() => { setCurrentIndex(0); setView('QUIZ'); }}
                      className="bg-gradient-to-br from-pink-400 to-rose-500 text-white p-6 rounded-3xl shadow-xl hover:shadow-2xl transition transform hover:-translate-y-2 flex flex-col items-center gap-4"
                    >
                      <span className="text-6xl">🎮</span>
                      <span className="text-2xl font-black">Play Quiz</span>
                    </button>
                 </div>
              </div>
            )}

            {/* VIEW: TEACHING MODE (Auto Advancing) */}
            {view === 'TEACHING' && (
              <div className="w-full max-w-2xl text-center flex flex-col items-center relative">
                
                {/* Visual Progress Bar for the 60 seconds */}
                <div className="w-full h-2 bg-gray-200 rounded-full mb-6 overflow-hidden mt-4">
                   <div className="h-full bg-blue-500 transition-all duration-[60000ms] ease-linear w-full" style={{ animation: `shrink 60s linear ${repeatToggle ? 'reverse' : 'forwards'}` }}></div>
                </div>

                <div className="bg-white w-full rounded-3xl shadow-2xl p-8 mb-6 border-4 border-blue-50">
                    <div className="text-[120px] leading-none mb-4 animate-bounce">
                        {VOCABULARY[selectedTopic][selectedLevel][currentIndex].emoji}
                    </div>
                    <h2 className="text-6xl font-black text-gray-800 tracking-tight">
                        {VOCABULARY[selectedTopic][selectedLevel][currentIndex].word}
                    </h2>
                </div>

                <div className="bg-gray-50 w-full rounded-3xl shadow-md p-6 text-left">
                    <div className="space-y-4 w-full">
                        {VOCABULARY[selectedTopic][selectedLevel][currentIndex].dialogues.map((dlg, idx) => (
                            <div key={idx} className={`flex w-full ${idx % 2 === 1 ? 'justify-end' : 'justify-start'}`}>
                                <div className={`p-5 rounded-2xl shadow-sm max-w-[85%] ${idx % 2 === 1 ? 'bg-rose-100 text-rose-900 rounded-br-none' : 'bg-emerald-100 text-emerald-900 rounded-bl-none'}`}>
                                    <div className="text-2xl font-bold leading-snug">"{dlg.t}"</div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
              </div>
            )}

            {/* NEW VIEW: CONVERSATIONS (WhatsApp Style Layout) */}
            {view === 'CONVERSATIONS' && (
              <div className="w-full max-w-2xl mx-auto flex flex-col gap-6 pb-10">
                 <div className="text-center mb-2">
                   <h2 className="text-3xl font-black text-indigo-900">Model Conversations</h2>
                   <p className="text-gray-500 font-bold">Tap any conversation to listen and practice your speaking!</p>
                 </div>
                 {VOCABULARY[selectedTopic][selectedLevel].map((item, idx) => (
                    <div 
                      key={idx} 
                      onClick={() => playIsolatedSequence(item)}
                      className="bg-white rounded-3xl shadow-md p-6 border-2 border-gray-100 cursor-pointer hover:bg-gray-50 hover:shadow-lg transition duration-200"
                    >
                       <div className="flex flex-col gap-4 w-full">
                           {item.dialogues.map((dlg, dIdx) => (
                              <div key={dIdx} className={`flex w-full ${dIdx % 2 === 1 ? 'justify-end' : 'justify-start'}`}>
                                 <div className={`p-5 rounded-2xl max-w-[85%] shadow-sm ${dIdx % 2 === 1 ? 'bg-rose-100 text-rose-900 rounded-br-none' : 'bg-emerald-100 text-emerald-900 rounded-bl-none'}`}>
                                    <div className="text-2xl font-bold leading-relaxed">"{dlg.t}"</div>
                                 </div>
                              </div>
                           ))}
                       </div>
                    </div>
                 ))}
              </div>
            )}

            {/* VIEW: QUIZ MODE (Optimized to fit on screen without scrolling) */}
            {view === 'QUIZ' && (
              <div className="w-full max-w-3xl flex flex-col items-center justify-center flex-1 h-[calc(100vh-120px)] pb-8 mt-4">
                <div className="bg-white w-full rounded-3xl shadow-lg p-6 mb-4 border-4 border-pink-50 relative overflow-hidden flex flex-col items-center">
                    <div className="text-[100px] leading-none z-10 relative">
                        {VOCABULARY[selectedTopic][selectedLevel][currentIndex].emoji}
                    </div>
                </div>

                <div className="grid grid-cols-2 gap-3 w-full">
                    {quizOptions.map((option, i) => (
                        <button
                            key={i}
                            disabled={correctAnim}
                            onClick={(e) => handleQuizAnswer(option, e)}
                            className="bg-white border-4 border-indigo-100 hover:border-indigo-400 hover:bg-indigo-50 text-indigo-900 text-2xl font-black py-4 rounded-2xl shadow-md hover:shadow-xl transition transform hover:scale-105"
                        >
                            {option.word}
                        </button>
                    ))}
                </div>
              </div>
            )}

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
