<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drone Delivery Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-900 text-slate-100 p-4 font-sans flex items-center">

    <div class="max-w-5xl mx-auto w-full">
        <div class="flex flex-col lg:flex-row gap-8">
            
            <!-- Map Section -->
            <div class="lg:w-2/3 w-full bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-2xl">
                <div id="map-grid" class="grid grid-cols-5 gap-2 aspect-square max-w-md mx-auto relative">
                    <!-- Grid cells generated by JS -->
                </div>
            </div>

            <!-- Control Panel -->
            <div class="lg:w-1/3 w-full bg-slate-800 p-4 rounded-xl border border-slate-700 flex flex-col justify-between">
                <div>
                    <!-- Status Monitor -->
                    <div id="status-monitor" class="bg-slate-900 border border-slate-700 p-3 rounded-lg mb-4 font-mono text-xs h-16 flex items-center text-cyan-400">
                        &gt; Select a Start Point (Point A) to begin drone calibration.
                    </div>

                    <!-- Mission Details -->
                    <div class="grid grid-cols-2 gap-2 mb-4">
                        <div class="bg-slate-700 p-2 rounded text-xs">
                            <span class="text-slate-400 block mb-1">Point A (Start)</span>
                            <span id="start-point-display" class="font-bold text-green-400">Pending...</span>
                        </div>
                        <div class="bg-slate-700 p-2 rounded text-xs">
                            <span class="text-slate-400 block mb-1">Point B (End)</span>
                            <span id="end-point-display" class="font-bold text-red-400">Pending...</span>
                        </div>
                    </div>

                    <!-- D-Pad Controls -->
                    <div class="flex flex-col items-center mb-6 gap-3">
                        <!-- Absolute Compass Controls -->
                        <div class="grid grid-cols-3 gap-1.5">
                            <button id="btn-nw" onclick="moveDrone('NW')" disabled class="w-10 h-10 bg-slate-600 hover:bg-cyan-600 disabled:opacity-50 disabled:hover:bg-slate-600 rounded-lg flex items-center justify-center text-[10px] font-bold border-b-2 border-slate-800 active:border-b-0 active:translate-y-0.5 transition-all">NW</button>
                            <button id="btn-n" onclick="moveDrone('N')" disabled class="w-10 h-10 bg-slate-600 hover:bg-cyan-600 disabled:opacity-50 disabled:hover:bg-slate-600 rounded-lg flex items-center justify-center text-sm font-bold border-b-2 border-slate-800 active:border-b-0 active:translate-y-0.5 transition-all">N</button>
                            <button id="btn-ne" onclick="moveDrone('NE')" disabled class="w-10 h-10 bg-slate-600 hover:bg-cyan-600 disabled:opacity-50 disabled:hover:bg-slate-600 rounded-lg flex items-center justify-center text-[10px] font-bold border-b-2 border-slate-800 active:border-b-0 active:translate-y-0.5 transition-all">NE</button>
                            
                            <button id="btn-w" onclick="moveDrone('W')" disabled class="w-10 h-10 bg-slate-600 hover:bg-cyan-600 disabled:opacity-50 disabled:hover:bg-slate-600 rounded-lg flex items-center justify-center text-sm font-bold border-b-2 border-slate-800 active:border-b-0 active:translate-y-0.5 transition-all">W</button>
                            <div class="w-10 h-10 flex items-center justify-center text-xl">🧭</div>
                            <button id="btn-e" onclick="moveDrone('E')" disabled class="w-10 h-10 bg-slate-600 hover:bg-cyan-600 disabled:opacity-50 disabled:hover:bg-slate-600 rounded-lg flex items-center justify-center text-sm font-bold border-b-2 border-slate-800 active:border-b-0 active:translate-y-0.5 transition-all">E</button>
                            
                            <button id="btn-sw" onclick="moveDrone('SW')" disabled class="w-10 h-10 bg-slate-600 hover:bg-cyan-600 disabled:opacity-50 disabled:hover:bg-slate-600 rounded-lg flex items-center justify-center text-[10px] font-bold border-b-2 border-slate-800 active:border-b-0 active:translate-y-0.5 transition-all">SW</button>
                            <button id="btn-s" onclick="moveDrone('S')" disabled class="w-10 h-10 bg-slate-600 hover:bg-cyan-600 disabled:opacity-50 disabled:hover:bg-slate-600 rounded-lg flex items-center justify-center text-sm font-bold border-b-2 border-slate-800 active:border-b-0 active:translate-y-0.5 transition-all">S</button>
                            <button id="btn-se" onclick="moveDrone('SE')" disabled class="w-10 h-10 bg-slate-600 hover:bg-cyan-600 disabled:opacity-50 disabled:hover:bg-slate-600 rounded-lg flex items-center justify-center text-[10px] font-bold border-b-2 border-slate-800 active:border-b-0 active:translate-y-0.5 transition-all">SE</button>
                        </div>
                        
                        <!-- Relative Robot Controls -->
                        <div class="grid grid-cols-3 gap-1.5 w-full max-w-[200px]">
                            <button id="btn-l" onclick="moveDrone('L')" disabled class="bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 disabled:hover:bg-indigo-600 rounded py-1.5 text-[10px] font-bold transition-all border-b-2 border-indigo-800 active:border-b-0 active:translate-y-0.5">Turn Left</button>
                            <button id="btn-f" onclick="moveDrone('F')" disabled class="bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 disabled:hover:bg-indigo-600 rounded py-1.5 text-[10px] font-bold transition-all border-b-2 border-indigo-800 active:border-b-0 active:translate-y-0.5">Straight</button>
                            <button id="btn-r" onclick="moveDrone('R')" disabled class="bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 disabled:hover:bg-indigo-600 rounded py-1.5 text-[10px] font-bold transition-all border-b-2 border-indigo-800 active:border-b-0 active:translate-y-0.5">Turn Right</button>
                        </div>
                    </div>
                </div>

                <!-- Programmed Sequence & Actions -->
                <div>
                    <div class="mb-3">
                        <span class="text-slate-400 text-xs block mb-1">Programmed Algorithm:</span>
                        <div id="path-display" class="bg-slate-900 p-2 rounded min-h-[2.5rem] font-mono flex flex-wrap gap-1 items-center">
                            <span class="text-slate-600 text-xs italic">No instructions yet...</span>
                        </div>
                    </div>

                    <div class="flex gap-2">
                        <button id="btn-play" onclick="speakDirections()" disabled class="flex-1 bg-purple-600 hover:bg-purple-500 disabled:bg-slate-700 disabled:text-slate-500 text-white py-2 rounded text-[11px] font-bold flex items-center justify-center transition-colors">
                            Play Dir (85% Spd)
                        </button>
                        <button onclick="resetSimulation()" class="flex-1 bg-slate-600 hover:bg-slate-500 text-white py-2 rounded text-[11px] font-bold transition-colors">
                            Reset Map
                        </button>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Custom Modal for Alerts -->
    <div id="alert-modal" class="fixed inset-0 bg-black/80 hidden items-center justify-center z-50">
        <div class="bg-slate-800 p-6 rounded-lg border border-slate-600 max-w-sm w-full text-center">
            <h3 class="text-xl font-bold text-yellow-400 mb-2">Action Required</h3>
            <p id="alert-modal-text" class="text-slate-200 mb-6"></p>
            <button onclick="closeModal()" class="bg-cyan-600 hover:bg-cyan-500 text-white py-2 px-6 rounded font-bold">Acknowledge</button>
        </div>
    </div>

    <script>
        // Constants and State Variables
        const GRID_SIZE = 5;
        // Expanded list of buildings relatable to secondary students
        const TOWN_DATA = [
            { id: 'hospital', icon: '🏥', label: 'Hospital', x: 0, y: 0 },
            { id: 'library', icon: '📚', label: 'Library', x: 1, y: 0 },
            { id: 'pizza', icon: '🍕', label: 'Pizza Shop', x: 2, y: 0 },
            { id: 'bank', icon: '🏦', label: 'Bank', x: 3, y: 0 },
            { id: 'school', icon: '🏫', label: 'High School', x: 4, y: 0 },
            
            { id: 'gym', icon: '🏋️', label: 'Sports Gym', x: 0, y: 1 },
            { id: 'mall', icon: '🛍️', label: 'Shopping Mall', x: 2, y: 1 },
            { id: 'arcade', icon: '👾', label: 'Arcade', x: 4, y: 1 },
            
            { id: 'cafe', icon: '☕', label: 'Tech Cafe', x: 0, y: 2 },
            { id: 'museum', icon: '🦖', label: 'Museum', x: 1, y: 2 },
            { id: 'compass', icon: '🧭', label: 'Compass Base', x: 2, y: 2 },
            { id: 'theater', icon: '🎭', label: 'Theater', x: 3, y: 2 },
            { id: 'park', icon: '🌳', label: 'City Park', x: 4, y: 2 },
            
            { id: 'bus', icon: '🚌', label: 'Bus Station', x: 0, y: 3 },
            { id: 'skatepark', icon: '🛹', label: 'Skate Park', x: 2, y: 3 },
            { id: 'cinema', icon: '🍿', label: 'Cinema', x: 4, y: 3 },
            
            { id: 'home', icon: '🏠', label: 'Student Home', x: 0, y: 4 },
            { id: 'clinic', icon: '🦷', label: 'Dentist', x: 1, y: 4 },
            { id: 'stadium', icon: '🏟️', label: 'Stadium', x: 2, y: 4 },
            { id: 'grocery', icon: '🛒', label: 'Grocery Store', x: 3, y: 4 },
            { id: 'firestation', icon: '🚒', label: 'Fire Station', x: 4, y: 4 },
        ];

        let startPoint = null;
        let endPoint = null;
        let path = [];
        let dronePos = null;
        let droneFacing = 0; // 0=N, 90=E, 180=S, 270=W

        // Helper to get landmark at specific coords
        function getLandmark(x, y) {
            return TOWN_DATA.find(l => l.x === x && l.y === y);
        }

        // Initialize and render the grid
        function renderGrid() {
            const mapContainer = document.getElementById('map-grid');
            mapContainer.innerHTML = ''; // Clear existing

            for (let i = 0; i < GRID_SIZE * GRID_SIZE; i++) {
                const x = i % GRID_SIZE;
                const y = Math.floor(i / GRID_SIZE);
                const landmark = getLandmark(x, y);
                
                const isStart = startPoint?.x === x && startPoint?.y === y;
                const isEnd = endPoint?.x === x && endPoint?.y === y;
                const hasDrone = dronePos?.x === x && dronePos?.y === y;
                const isCompass = landmark?.id === 'compass';

                const cell = document.createElement('div');
                cell.onclick = () => handleCellClick(x, y);

                // Build base classes
                let classes = 'relative flex flex-col items-center justify-center rounded-lg border-2 transition-all cursor-pointer h-full w-full aspect-square ';
                
                if (isCompass) {
                    classes += 'bg-slate-900 border-yellow-500 cursor-default ';
                } else {
                    classes += 'bg-slate-700 hover:bg-slate-600 border-slate-600 ';
                }

                if (isStart) classes += 'ring-4 ring-green-500 border-green-400 bg-green-900/30 ';
                if (isEnd) classes += 'ring-4 ring-red-500 border-red-400 bg-red-900/30 ';
                if (!landmark) classes += 'opacity-50 hover:opacity-100 ';

                cell.className = classes;

                // Build internal content
                if (isCompass) {
                    cell.innerHTML = `
                        <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                            <span class="text-yellow-500 absolute top-1 text-xs font-bold">N</span>
                            <span class="text-yellow-500 absolute bottom-1 text-xs font-bold">S</span>
                            <span class="text-yellow-500 absolute right-1 text-xs font-bold">E</span>
                            <span class="text-yellow-500 absolute left-1 text-xs font-bold">W</span>
                            <span class="text-4xl">🧭</span>
                        </div>
                    `;
                } else if (landmark) {
                    cell.innerHTML = `
                        <span class="text-3xl mb-1">${landmark.icon}</span>
                        <span class="text-[10px] text-center px-1 font-bold leading-tight">${landmark.label}</span>
                    `;
                }

                if (hasDrone) {
                    cell.innerHTML += `
                        <div class="absolute inset-0 flex items-center justify-center bg-cyan-500/20 rounded-lg animate-pulse z-10" style="transform: rotate(${droneFacing}deg); transition: transform 0.3s ease;">
                            <span class="text-4xl drop-shadow-[0_0_8px_rgba(34,211,238,1)]">🚁</span>
                        </div>
                    `;
                }

                mapContainer.appendChild(cell);
            }
        }

        // Handle cell clicks for setting A and B
        function handleCellClick(x, y) {
            const landmark = getLandmark(x, y);
            
            if (!landmark || landmark.id === 'compass') return;

            if (!startPoint) {
                startPoint = landmark;
                dronePos = { x: landmark.x, y: landmark.y };
                droneFacing = 0; // Reset facing to North
                updateStatus(`Start Point: ${landmark.label}. Now select a Destination (Point B).`);
            } else if (!endPoint && landmark.id !== startPoint.id) {
                endPoint = landmark;
                updateStatus(`Destination: ${landmark.label}. Program the drone's flight path using N, S, E, W.`);
            }

            updateUI();
        }

        // Move the drone
        function moveDrone(direction) {
            if (!startPoint || !endPoint) {
                showModal("Please select both a Start and Destination first!");
                return;
            }

            let newX = dronePos.x;
            let newY = dronePos.y;
            let actionTaken = false;

            // Absolute movements
            if (direction === 'N' && dronePos.y > 0) { newY -= 1; actionTaken = true; }
            if (direction === 'S' && dronePos.y < GRID_SIZE - 1) { newY += 1; actionTaken = true; }
            if (direction === 'E' && dronePos.x < GRID_SIZE - 1) { newX += 1; actionTaken = true; }
            if (direction === 'W' && dronePos.x > 0) { newX -= 1; actionTaken = true; }
            
            if (direction === 'NW' && dronePos.x > 0 && dronePos.y > 0) { newX -= 1; newY -= 1; actionTaken = true; }
            if (direction === 'NE' && dronePos.x < GRID_SIZE - 1 && dronePos.y > 0) { newX += 1; newY -= 1; actionTaken = true; }
            if (direction === 'SW' && dronePos.x > 0 && dronePos.y < GRID_SIZE - 1) { newX -= 1; newY += 1; actionTaken = true; }
            if (direction === 'SE' && dronePos.x < GRID_SIZE - 1 && dronePos.y < GRID_SIZE - 1) { newX += 1; newY += 1; actionTaken = true; }

            // Relative movements (Turning)
            if (direction === 'L') { droneFacing = (droneFacing - 90 + 360) % 360; actionTaken = true; }
            if (direction === 'R') { droneFacing = (droneFacing + 90) % 360; actionTaken = true; }
            
            // Relative movement (Going Straight based on current facing)
            if (direction === 'F') {
                if (droneFacing === 0 && dronePos.y > 0) { newY -= 1; actionTaken = true; } // North
                else if (droneFacing === 90 && dronePos.x < GRID_SIZE - 1) { newX += 1; actionTaken = true; } // East
                else if (droneFacing === 180 && dronePos.y < GRID_SIZE - 1) { newY += 1; actionTaken = true; } // South
                else if (droneFacing === 270 && dronePos.x > 0) { newX -= 1; actionTaken = true; } // West
            }

            // Only register the step if they actually moved or turned (didn't hit a wall)
            if (actionTaken) {
                dronePos = { x: newX, y: newY };
                path.push(direction);
                checkWinCondition(newX, newY);
                updateUI();
            }
        }

        function checkWinCondition(currentX, currentY) {
            if (currentX === endPoint.x && currentY === endPoint.y) {
                updateStatus(`✅ Delivery Successful! The drone reached the ${endPoint.label}.`);
            } else {
                updateStatus(`Navigating... Keep going to the ${endPoint.label}.`);
            }
        }

        function resetSimulation() {
            startPoint = null;
            endPoint = null;
            path = [];
            dronePos = null;
            droneFacing = 0;
            updateStatus("Select a Start Point (Point A) to begin drone calibration.");
            updateUI();
        }

        // Text to Speech Function
        function speakDirections() {
            if (path.length === 0) return;
            
            let directionText = "Drone flight path sequence: ";
            const dirMap = { 
                'N': 'North', 'S': 'South', 'E': 'East', 'W': 'West',
                'NW': 'Northwest', 'NE': 'Northeast', 'SW': 'Southwest', 'SE': 'Southeast',
                'L': 'Turn Left', 'R': 'Turn Right', 'F': 'Go Straight'
            };
            
            path.forEach(step => {
                directionText += `${dirMap[step]}, `;
            });

            if (dronePos && endPoint && dronePos.x === endPoint.x && dronePos.y === endPoint.y) {
                directionText += "You have arrived at your destination.";
            }

            const utterance = new SpeechSynthesisUtterance(directionText);
            utterance.rate = 0.85; // Fixed 85% speed requested
            
            // Strict filter for Microsoft multilingual voices
            const allowedVoices = ["Giuseppe", "Remy", "Vivienne", "Emma", "Brian", "Ava", "Andrew", "William"];
            const voices = window.speechSynthesis.getVoices();
            const matchingVoices = voices.filter(v => allowedVoices.some(name => v.name.includes(name)));
            
            // Apply the first matching requested voice if available
            if (matchingVoices.length > 0) {
                utterance.voice = matchingVoices[0];
            }

            window.speechSynthesis.speak(utterance);
        }

        // UI Updaters
        function updateStatus(message) {
            document.getElementById('status-monitor').innerHTML = `&gt; ${message}`;
        }

        function updateUI() {
            // Update labels
            document.getElementById('start-point-display').innerText = startPoint ? `${startPoint.icon} ${startPoint.label}` : 'Pending...';
            document.getElementById('end-point-display').innerText = endPoint ? `${endPoint.icon} ${endPoint.label}` : 'Pending...';

            // Toggle all direction buttons
            const dpadButtons = ['btn-n', 'btn-s', 'btn-e', 'btn-w', 'btn-nw', 'btn-ne', 'btn-sw', 'btn-se', 'btn-l', 'btn-r', 'btn-f'];
            dpadButtons.forEach(btn => {
                const el = document.getElementById(btn);
                if(el) el.disabled = !endPoint;
            });

            // Toggle play button
            document.getElementById('btn-play').disabled = path.length === 0;

            // Render Path
            const pathContainer = document.getElementById('path-display');
            if (path.length === 0) {
                pathContainer.innerHTML = '<span class="text-slate-600 text-xs italic">No instructions yet...</span>';
            } else {
                pathContainer.innerHTML = '';
                path.forEach(dir => {
                    const span = document.createElement('span');
                    span.className = 'bg-cyan-900 text-cyan-300 px-1.5 py-0.5 rounded text-[10px] font-bold';
                    span.innerText = dir;
                    pathContainer.appendChild(span);
                });
            }

            renderGrid();
        }

        // Custom Modal Logic
        function showModal(text) {
            document.getElementById('alert-modal-text').innerText = text;
            document.getElementById('alert-modal').classList.remove('hidden');
            document.getElementById('alert-modal').classList.add('flex');
        }

        function closeModal() {
            document.getElementById('alert-modal').classList.add('hidden');
            document.getElementById('alert-modal').classList.remove('flex');
        }

        // Force browser to fetch voices early
        window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();

        // Initial render
        updateUI();

    </script>
</body>
</html>
