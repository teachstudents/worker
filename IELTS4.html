        // --- Custom Chart Component (No External Libraries) ---
        const SimpleChart = ({ chart }) => {
          if (!chart) return null;

          if (chart.type === 'bar') {
            // Find max value to scale the bars correctly
            const allValues = chart.datasets.flatMap(d => d.data);
            const maxVal = Math.max(...allValues);

            return (
              <div className="w-full mt-6 bg-white border border-slate-200 rounded-xl p-6 shadow-sm">
                <h4 className="text-center font-bold text-slate-700 mb-6 uppercase tracking-wider text-xs">Modes of Transport Comparison</h4>
                <div className="flex h-48 items-end justify-around w-full gap-4 pb-2 border-b-2 border-slate-300">
                  {chart.labels.map((label, lIdx) => (
                    <div key={lIdx} className="flex flex-col items-center flex-1">
                      <div className="flex items-end justify-center w-full gap-2 h-40">
                        {chart.datasets.map((dataset, dIdx) => {
                          const val = dataset.data[lIdx];
                          const heightPct = (val / maxVal) * 100;
                          return (
                            <div 
                              key={dIdx} 
                              style={{ height: `${heightPct}%` }} 
                              className={`w-6 sm:w-10 ${dataset.color} rounded-t-sm relative group cursor-pointer transition-all hover:opacity-80`}
                            >
                              {/* Tooltip */}
                              <div className="opacity-0 group-hover:opacity-100 absolute -top-8 left-1/2 -translate-x-1/2 bg-slate-800 text-white text-xs px-2 py-1 rounded shadow pointer-events-none whitespace-nowrap transition-opacity">
                                {dataset.name}: {val}%
                              </div>
                            </div>
                          );
                        })}
                      </div>
                      <span className="text-xs font-bold text-slate-500 mt-3">{label}</span>
                    </div>
                  ))}
                </div>
                {/* Legend */}
                <div className="flex justify-center gap-6 mt-6">
                  {chart.datasets.map((ds, idx) => (
                    <div key={idx} className="flex items-center gap-2">
                      <div className={`w-3 h-3 rounded-sm ${ds.color}`}></div>
                      <span className="text-xs font-semibold text-slate-600">{ds.name}</span>
                    </div>
                  ))}
                </div>
              </div>
            );
          }

          if (chart.type === 'line') {
            const width = 400;
            const height = 180;
            const allValues = chart.datasets.flatMap(d => d.data);
            const maxVal = 100; // Hardcoded max for percentages/spending out of 100
            const stepX = width / (chart.labels.length - 1);

            return (
              <div className="w-full mt-6 bg-white border border-slate-200 rounded-xl p-6 shadow-sm overflow-x-auto">
                 <h4 className="text-center font-bold text-slate-700 mb-4 uppercase tracking-wider text-xs">Ad Spending by Medium (Millions $)</h4>
                 <div className="relative min-w-[300px]">
                    <svg viewBox={`0 -10 ${width} ${height + 20}`} className="w-full h-48 overflow-visible">
                       {/* Grid lines */}
                       <line x1="0" y1="0" x2={width} y2="0" stroke="#e2e8f0" strokeWidth="1" />
                       <line x1="0" y1={height/2} x2={width} y2={height/2} stroke="#e2e8f0" strokeWidth="1" strokeDasharray="4" />
                       <line x1="0" y1={height} x2={width} y2={height} stroke="#94a3b8" strokeWidth="2" />
                       
                       {/* Lines */}
                       {chart.datasets.map((ds, dIdx) => {
                          const points = ds.data.map((val, i) => `${i * stepX},${height - (val / maxVal) * height}`).join(' ');
                          return (
                            <g key={dIdx}>
                              <polyline points={points} fill="none" className={ds.color} strokeWidth="3" strokeLinejoin="round" />
                              {ds.data.map((val, i) => (
                                <circle 
                                  key={i} 
                                  cx={i * stepX} 
                                  cy={height - (val / maxVal) * height} 
                                  r="4" 
                                  className={`fill-white ${ds.color.replace('stroke-', 'border-')} stroke-2`} 
                                />
                              ))}
                            </g>
                          );
                       })}
                    </svg>
                    {/* X-axis labels */}
                    <div className="flex justify-between w-full mt-2 absolute left-0 text-xs font-bold text-slate-500 px-1">
                      {chart.labels.map((label, idx) => (
                        <span key={idx} style={{ transform: 'translateX(-50%)' }}>{label}</span>
                      ))}
                    </div>
                 </div>
                 {/* Legend */}
                 <div className="flex justify-center gap-6 mt-8">
                  {chart.datasets.map((ds, idx) => (
                    <div key={idx} className="flex items-center gap-2">
                      <div className={`w-4 h-1 rounded-sm bg-transparent border-t-4 ${ds.color.replace('stroke-', 'border-')}`}></div>
                      <span className="text-xs font-semibold text-slate-600">{ds.name}</span>
                    </div>
                  ))}
                </div>
              </div>
            );
          }

          if (chart.type === 'pie') {
            // Using a simple CSS conic gradient for the pie chart
            let cumulativePercent = 0;
            const gradientString = chart.datasets.map(ds => {
              const start = cumulativePercent;
              cumulativePercent += ds.value;
              return `${ds.color} ${start}% ${cumulativePercent}%`;
            }).join(', ');

            return (
              <div className="w-full mt-6 bg-white border border-slate-200 rounded-xl p-6 shadow-sm flex flex-col md:flex-row items-center gap-8 justify-center">
                 <div className="flex flex-col items-center">
                    <h4 className="font-bold text-slate-700 mb-6 uppercase tracking-wider text-xs text-center">Teen Gaming Preferences</h4>
                    <div 
                      className="w-48 h-48 rounded-full shadow-inner border-2 border-slate-100"
                      style={{ background: `conic-gradient(${gradientString})` }}
                    ></div>
                 </div>
                 
                 {/* Legend */}
                 <div className="flex flex-col justify-center gap-4">
                  {chart.datasets.map((ds, idx) => (
                    <div key={idx} className="flex items-center gap-3">
                      <div className="w-4 h-4 rounded-sm shadow-sm" style={{ backgroundColor: ds.color }}></div>
                      <span className="text-sm font-semibold text-slate-700 w-20">{ds.name}</span>
                      <span className="text-sm font-bold text-slate-500">{ds.value}%</span>
                    </div>
                  ))}
                </div>
              </div>
            );
          }

          return null;
        };

        // --- Vocabulary MCQ Component (Interactive 2x2 Grid) ---
        const UnitQuiz = ({ mcqs, handleSpeak }) => {
          const [selectedAnswers, setSelectedAnswers] = useState({});
          const [feedback, setFeedback] = useState({});
          const [showExtended, setShowExtended] = useState(false);

          // Reset when unit changes
          useEffect(() => {
             setSelectedAnswers({});
             setFeedback({});
             setShowExtended(false);
          }, [mcqs]);

          const handleOptionClick = (questionIndex, optionIndex, correctAnswerIndex) => {
            setSelectedAnswers({ ...selectedAnswers, [questionIndex]: optionIndex });
            setFeedback({ ...feedback, [questionIndex]: optionIndex === correctAnswerIndex });
          };

          if (!mcqs || mcqs.length === 0) return null;

          const displayedMcqs = showExtended ? mcqs : mcqs.slice(0, 5);

          return (
            <div className="bg-slate-900 p-6 md:p-8 rounded-2xl shadow-md border border-slate-800 mt-8">
              <div className="flex items-center gap-3 mb-6">
                <div className="bg-teal-500/20 p-2 rounded-lg border border-teal-500/30">
                  <i className="fa-regular fa-circle-question text-teal-400 text-2xl"></i>
                </div>
                <h3 className="text-xl font-bold text-white">Unit Quiz: Vocabulary & Grammar</h3>
              </div>
              <p className="text-slate-400 text-sm mb-6">Test your knowledge of this unit's vocabulary and grammar rules.</p>
              
              <div className="space-y-8">
                {displayedMcqs.map((mcq, qIdx) => (
                  <div key={qIdx} className="bg-slate-800 p-5 md:p-6 rounded-xl border border-slate-700 animate-fade-in">
                    <h4 className="text-base font-semibold text-slate-200 mb-5 leading-relaxed">{qIdx + 1}. {mcq.q}</h4>
                    {/* 2x2 Grid for the choices */}
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                      {mcq.options.map((opt, optIdx) => {
                        const isSelected = selectedAnswers[qIdx] === optIdx;
                        const isCorrect = mcq.answer === optIdx;
                        const hasAnswered = selectedAnswers[qIdx] !== undefined;
                        
                        let btnStyle = "bg-slate-700 text-slate-300 hover:bg-slate-600 border-transparent";
                        if (hasAnswered) {
                          if (isCorrect) btnStyle = "bg-green-900/40 text-green-400 border-green-500/50";
                          else if (isSelected && !isCorrect) btnStyle = "bg-rose-900/40 text-rose-400 border-rose-500/50";
                          else btnStyle = "bg-slate-800 text-slate-500 border-transparent opacity-50";
                        }

                        return (
                          <button
                            key={optIdx}
                            disabled={hasAnswered}
                            onClick={() => {
                              handleSpeak(opt);
                              handleOptionClick(qIdx, optIdx, mcq.answer);
                            }}
                            className={`w-full text-left px-5 py-4 rounded-xl border-2 transition-all text-sm font-medium ${btnStyle}`}
                          >
                            {String.fromCharCode(65 + optIdx)}. {opt}
                          </button>
                        );
                      })}
                    </div>
                    {feedback[qIdx] !== undefined && (
                      <div className={`mt-4 p-3 rounded-lg text-sm font-bold flex items-center gap-2 ${feedback[qIdx] ? 'bg-green-900/20 text-green-400' : 'bg-rose-900/20 text-rose-400'}`}>
                        {feedback[qIdx] ? <i className="fa-regular fa-circle-check text-xl"></i> : <i className="fa-solid fa-times text-xl"></i>}
                        {feedback[qIdx] ? 'Correct!' : 'Incorrect'}
                      </div>
                    )}
                  </div>
                ))}
              </div>
              
              {mcqs.length > 5 && (
                <div className="mt-8 pt-6 border-t border-slate-800 text-center">
                  <button 
                    onClick={() => setShowExtended(!showExtended)}
                    className="bg-teal-600 hover:bg-teal-500 text-white font-bold py-3 px-6 rounded-lg transition-colors shadow-sm"
                  >
                    {showExtended ? "Show Fewer Questions" : "Load Extended MCQs (10 More)"}
                  </button>
                </div>
              )}
            </div>
          );
        };

        const PracticeGame = ({ vocabulary }) => {
          const [selectedWord, setSelectedWord] = useState(null);
          const [matchedPairs, setMatchedPairs] = useState([]);

          const [definitions, setDefinitions] = useState([]);
          useEffect(() => {
            setDefinitions([...vocabulary].sort(() => Math.random() - 0.5));
            setMatchedPairs([]);
            setSelectedWord(null);
          }, [vocabulary]);

          const handleWordClick = (word) => {
            if (matchedPairs.includes(word)) return;
            setSelectedWord(word);
          };

          const handleDefClick = (defObj) => {
            if (!selectedWord) return;
            if (defObj.word === selectedWord) {
              setMatchedPairs([...matchedPairs, selectedWord]);
            }
            setSelectedWord(null);
          };

          return (
            <div className="bg-white p-4 md:p-6 rounded-xl shadow-sm border border-slate-200">
              <div className="flex justify-between items-center mb-6">
                <h3 className="text-lg font-bold text-slate-800 flex items-center gap-2">
                  <i className="fa-solid fa-gamepad text-teal-500 text-xl"></i>
                  Vocabulary Match
                </h3>
              </div>
              
              <div className="grid grid-cols-2 gap-4 md:gap-6">
                <div className="space-y-2">
                  <h4 className="font-bold text-slate-400 uppercase text-[10px] md:text-xs tracking-wider mb-2">Terms</h4>
                  {vocabulary.map((v) => (
                    <button
                      key={v.word}
                      onClick={() => handleWordClick(v.word)}
                      disabled={matchedPairs.includes(v.word)}
                      className={`w-full text-left px-3 py-2 md:py-3 rounded-lg border-2 transition-all text-sm font-semibold ${
                        matchedPairs.includes(v.word) 
                          ? 'bg-green-50 border-green-200 text-green-400 cursor-not-allowed opacity-50'
                          : selectedWord === v.word 
                            ? 'bg-teal-50 border-teal-500 text-teal-700 shadow-sm'
                            : 'bg-white border-slate-200 text-slate-700 hover:border-teal-300'
                      }`}
                    >
                      {v.word}
                    </button>
                  ))}
                </div>

                <div className="space-y-2">
                  <h4 className="font-bold text-slate-400 uppercase text-[10px] md:text-xs tracking-wider mb-2">Definitions</h4>
                  {definitions.map((v, i) => (
                    <button
                      key={i}
                      onClick={() => handleDefClick(v)}
                      disabled={matchedPairs.includes(v.word)}
                      className={`w-full text-left px-3 py-2 md:py-3 rounded-lg border-2 transition-all text-xs md:text-sm leading-tight md:leading-relaxed ${
                        matchedPairs.includes(v.word)
                          ? 'bg-green-50 border-green-200 text-green-600 cursor-not-allowed opacity-50'
                          : 'bg-slate-50 border-slate-200 text-slate-700 hover:border-indigo-300 hover:bg-white'
                      }`}
                    >
                      {v.definition}
                    </button>
                  ))}
                </div>
              </div>

              {matchedPairs.length === vocabulary.length && (
                <div className="mt-6 bg-green-100 text-green-800 p-4 rounded-xl text-center font-bold text-lg animate-bounce">
                  Excellent job! All matched!
                </div>
              )}
            </div>
          );
        };

        function App() {

          useEffect(() => {
            return () => {
              if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
              }
            };
          }, []);

          const handleSpeak = (text) => {
            if (!('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel();
            
            const utterance = new SpeechSynthesisUtterance(text);
            
            // PERSONALIZATION CONSTRAINT: Set speech to 85% rate
            utterance.rate = 0.85; 
            
            const allowedVoices = ["Remy", "Giuseppe", "Vivienne", "Florian", "Seraphina", "Emma", "Brian", "Ava", "Andrew", "William"];
            const voices = window.speechSynthesis.getVoices();
            
            const preferredVoice = voices.find(v => 
              allowedVoices.some(name => v.name.includes(name)) && v.name.includes("Microsoft")
            ) || voices.find(v => 
              allowedVoices.some(name => v.name.includes(name))
            );

            if (preferredVoice) {
              utterance.voice = preferredVoice;
            }

            window.speechSynthesis.speak(utterance);

                <div className="p-5 bg-slate-900 border-b border-slate-800 flex justify-between items-center shrink-0">

                      IELTS Prep
                    </h1>
                    <p className="text-xs text-slate-400 mt-1">Bands 3.5 - 4.5</p>
                  </div>
                  <button className="text-slate-400 hover:text-white" onClick={() => setIsSidebarOpen(false)}>
                    <i className="fa-solid fa-times text-2xl"></i>
                  </button>
                </div>

                <div className="p-3 overflow-y-auto flex-1">
                  <ul className="space-y-1 pb-10">
                    {unitData.map((unit) => (

                        <button

                          </button>

                      {/* TAB 2: VOCABULARY */}

                              <button

                                <div className="flex justify-between items-start mb-2">
                                  <h4 className="text-lg font-bold text-slate-800 group-hover:text-teal-600 transition-colors">{v.word}</h4>

                        </div>
                      )}

                      {/* TAB 3: SPEAKING */}
                      {activeTab === "speaking" && (
                        <div className="space-y-6">

                            <div key={idx} className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">

                                </h3>
                              </div>
                              <div className="p-4 md:p-6">
                                <button 
                                  onClick={() => handleSpeak(section.questions.join(' '))}

                                  <ul className="space-y-2 md:space-y-3 pl-2">
                                    {section.questions.map((q, qIdx) => (

                                    ))}
                                  </ul>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6">

                                      <i className="fa-solid fa-pen-nib text-sm md:text-base"></i> Useful Sentence Stems
                                    </h4>
                                    <ul className="space-y-2 md:space-y-3">
                                      {section.stems.map((stem, i) => (
                                        <li key={i}>
                                          <button 
                                            onClick={() => handleSpeak(stem)}
                                            className="text-left w-full bg-white border border-slate-200 p-2.5 md:p-3 rounded-lg text-xs md:text-sm text-slate-700 hover:border-teal-400 hover:text-teal-700 transition-colors shadow-sm"
                                          >
                                            {stem}
                                          </button>
                                        </li>
                                      ))}
                                    </ul>
                                  </div>

                                  <button 
                                    onClick={() => handleSpeak(section.example)}
                                    className="text-left bg-indigo-50 border border-indigo-100 hover:border-indigo-300 rounded-xl p-4 md:p-5 transition-all group"
                                  >
                                    <h4 className="text-[10px] md:text-xs font-bold text-indigo-400 uppercase tracking-wider mb-3 md:mb-4 flex items-center gap-2">
                                      <i className="fa-regular fa-circle-check text-indigo-500 text-sm md:text-base"></i> Model Answer
                                    </h4>
                                    <p className="text-xs md:text-sm text-indigo-900 leading-relaxed font-medium italic">
                                      "{section.example}"
                                    </p>
                                  </button>
                                </div>
                              </div>
                            </div>
                          ))}
                        </div>
                      )}

                      {/* TAB 4: READING */}
                      {activeTab === "reading" && (
                        <div className="space-y-6">
                          <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                            <div className="bg-slate-50 border-b border-slate-200 p-4 md:p-6">
                              <h3 className="text-base font-bold text-slate-800 flex items-center gap-2">
                                <i className="fa-solid fa-book text-teal-600 text-lg"></i>
                                Reading Passage
                              </h3>
                            </div>
                            <div className="p-4 md:p-6">
                              <button 
                                onClick={() => handleSpeak(activeUnit.reading.text)}
                                className="w-full text-left bg-slate-50 hover:bg-teal-50 border border-slate-200 hover:border-teal-200 p-4 md:p-6 rounded-xl transition-all shadow-sm group"
                              >
                                <p className="text-sm md:text-base leading-relaxed text-slate-700 font-medium">
                                  {activeUnit.reading.text}
                                </p>
                              </button>
                            </div>
                            <div className="bg-slate-50 border-t border-slate-200 p-4 md:p-6">
                              <h4 className="text-[10px] md:text-xs font-bold text-slate-500 uppercase tracking-wider mb-3 md:mb-4 flex items-center gap-2">
                                <i className="fa-regular fa-circle-question text-lg"></i> Comprehension Check
                              </h4>
                              <ul className="space-y-2 md:space-y-3">
                                {activeUnit.reading.questions.map((q, i) => (

                                       {q}
                                     </button>
                                   </li>
                                ))}
                              </ul>
                            </div>
                          </div>
                        </div>
                      )}

                            <div className="bg-slate-800 border-b border-slate-700 p-4 md:p-6">
                              <h3 className="text-base font-bold text-white flex items-center gap-2">
                                <i className="fa-solid fa-headphones text-teal-400 text-lg"></i>
                                Listening Transcript
                              </h3>
                            </div>
                            <div className="p-4 md:p-6">
                              <button 
                                onClick={() => handleSpeak(activeUnit.listening.text)}
                                className="w-full text-left bg-slate-800 hover:bg-slate-700 border border-slate-700 hover:border-teal-500 p-4 md:p-6 rounded-xl transition-all shadow-inner group"

                                <p className="text-sm md:text-base leading-relaxed font-medium italic text-slate-200 group-hover:text-white">

                                <i className="fa-solid fa-microphone text-teal-700 text-xl"></i>
                              </div>
                              <h3 className="text-lg font-bold text-slate-800">Tutor Prompts</h3>
                            </div>

                              Interactive coaching tasks. Click any block to hear it read aloud.
                            </p>
                            
                            <div className="space-y-4 md:space-y-6">
                              {activeUnit.tutorPrompts && activeUnit.tutorPrompts.map((prompt, idx) => (
                                <div key={idx} className="bg-slate-50 border border-slate-200 rounded-xl overflow-hidden">

                                  </div>
                                  <div className="p-4 md:p-5">
                                    <p className="text-[10px] font-bold text-indigo-600 uppercase tracking-wider mb-2 md:mb-3 bg-indigo-50 inline-block px-2.5 py-1 rounded-full">

                                      onClick={() => handleSpeak(prompt.text)}

                                      <p className="text-sm md:text-base text-slate-800 font-medium leading-relaxed italic">"{prompt.text}"</p>

                                    <div className="space-y-2 md:space-y-3 pl-2 border-l-2 border-slate-300">
                                      {prompt.questions.map((q, qIdx) => (
                                        <button
                                          key={qIdx}
                                          onClick={() => handleSpeak(q)}
                                          className="w-full text-left text-xs md:text-sm text-slate-600 hover:text-slate-900 transition-colors"
                                        >
                                          • {q}
                                        </button>
                                      ))}
                                    </div>
                                    
                                    {/* Scaffolding added here */}
                                    {prompt.scaffolding && (
                                      <div className="mt-4 bg-yellow-50 border border-yellow-200 p-3 rounded-lg">
                                        <p className="text-[10px] uppercase font-bold text-yellow-700 tracking-wider mb-2">Helpful Starters:</p>
                                        <ul className="space-y-1">
                                          {prompt.scaffolding.map((scaff, sIdx) => (
                                            <li key={sIdx} className="text-xs text-yellow-900 font-medium">"{scaff}"</li>
                                          ))}
                                        </ul>
                                      </div>
                                    )}

                                  </div>
                                </div>
                              ))}
                            </div>
                          </div>

                          {/* Practice for the test Section */}
                          <div className="bg-slate-900 p-5 md:p-8 rounded-2xl shadow-sm border border-slate-800 text-slate-300">
                            <div className="flex items-center gap-2 md:gap-3 mb-4 md:mb-6">
                              <div className="bg-rose-500/20 p-1.5 md:p-2 rounded-lg border border-rose-500/30">
                                <i className="fa-solid fa-bullseye text-rose-400 text-xl"></i>
                              </div>
                              <h3 className="text-lg font-bold text-white">Practice for the Test</h3>
                            </div>
                            <p className="text-slate-400 text-xs md:text-sm mb-4 md:mb-6">
                              Authentic IELTS Tasks (Bands 3.5 - 4.5). Click to read aloud.
                            </p>

                            <div className="grid grid-cols-1 gap-4 md:gap-6">
                              {activeUnit.practiceTests && activeUnit.practiceTests.map((test, idx) => (
                                <div key={idx} className="bg-slate-800 border border-slate-700 rounded-xl overflow-hidden shadow-inner flex flex-col">
                                  <div className="bg-slate-900/50 px-4 py-2.5 md:px-5 md:py-3 border-b border-slate-700">
                                    <span className="font-bold text-teal-400 text-xs md:text-sm">{test.type}</span>
                                  </div>
                                  <div className="p-4 md:p-5 flex-1 flex flex-col">
                                    <button 
                                      onClick={() => handleSpeak(test.text)}
                                      className="w-full text-left text-xs md:text-sm text-slate-300 mb-4 hover:text-white transition-colors leading-relaxed"
                                    >
                                      {test.text}
                                    </button>

                                    {/* Render Dynamic Chart if data exists */}
                                    {test.chart && <SimpleChart chart={test.chart} />}
                                    
                                    {test.questions && test.questions.length > 0 && (
                                      <div className="bg-slate-900/50 p-3 md:p-4 rounded-lg mt-4 mb-4">
                                        <h4 className="text-[10px] md:text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Test Tasks:</h4>
                                        <div className="space-y-2">
                                          {test.questions.map((q, qIdx) => (
                                            <button
                                              key={qIdx}
                                              onClick={() => handleSpeak(q)}
                                              className="w-full text-left text-xs md:text-sm font-medium text-slate-200 hover:text-teal-300 transition-colors block whitespace-pre-line"
                                            >
                                              {q}
                                            </button>
                                          ))}
                                        </div>
                                      </div>
                                    )}

                                    {/* Scaffolding for Test */}
                                    {test.scaffolding && (
                                      <div className="mt-4 mb-4 bg-indigo-900/40 border border-indigo-500/30 p-4 rounded-lg">
                                        <p className="text-[10px] uppercase font-bold text-indigo-300 tracking-wider mb-2">Structure & Starters:</p>
                                        <ul className="space-y-2">
                                          {test.scaffolding.map((scaff, sIdx) => (
                                            <li key={sIdx} className="text-xs text-indigo-200 font-medium">"{scaff}"</li>
                                          ))}
                                        </ul>
                                      </div>
                                    )}

                                    {/* Show Model Answer Button for Writing Tasks */}
                                    {test.modelAnswer && (
                                      <div className="mt-auto border-t border-slate-700 pt-4">
                                        <button
                                          onClick={() => toggleModelAnswer(idx)}
                                          className="flex items-center gap-2 text-xs md:text-sm font-bold text-teal-400 hover:text-teal-300 transition-colors"
                                        >
                                          <i className="fa-solid fa-eye text-sm"></i> 
                                          {showModelAnswer[idx] ? "Hide Model Answer" : "Show Model Answer"}
                                        </button>
                                        
                                        {showModelAnswer[idx] && (
                                          <div className="mt-4 p-4 bg-slate-900 border border-teal-500/30 rounded-lg animate-fade-in">
                                            <h5 className="text-[10px] uppercase tracking-wider font-bold text-teal-300 mb-2">Band 4.0 - 4.5 Model Response</h5>
                                            <button 
                                              onClick={() => handleSpeak(test.modelAnswer)}
                                              className="w-full text-left text-xs md:text-sm text-slate-300 leading-relaxed font-medium whitespace-pre-line hover:text-white"
                                            >
                                              {test.modelAnswer}
                                            </button>
                                          </div>
                                        )}
                                      </div>
                                    )}

                                  </div>
                                </div>
                              ))}
                            </div>
                          </div>
                        </div>
                      )}

                      {/* TAB 8: GAME */}
                      {activeTab === "game" && (
                        <div className="space-y-6">
                           <PracticeGame key={`game-${activeUnit.id}`} vocabulary={activeUnit.vocabulary} />
                        </div>
                      )}

                    </div>
                  </div>
                </main>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
