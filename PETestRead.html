    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

        :root {
            --app-bg: #f8fafc;
            --panel-bg: #ffffff;
            --text-main: #0f172a;
            --primary: #3b82f6;
            --success: #10b981;
            --error: #ef4444;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--app-bg);
            color: var(--text-main);
            overflow: hidden;
            touch-action: manipulation;
            user-select: none;
        }

        #app-container {
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        /* Scaled up 25% */
        .dynamic-text {
            font-size: clamp(1.25rem, 2.75vh, 2.18rem);
            line-height: 1.8;
            color: #1e293b;
        }

        .test-title {
            font-size: clamp(1.56rem, 3.75vh, 3.12rem);
        }

        /* Interactive Blanks */
        .blank-slot {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 6em;
            height: 1.5em;
            margin: 0 0.25em;
            border-bottom: 2px solid #cbd5e1;
            background-color: #f1f5f9;
            border-radius: 0.25rem;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #2563eb; 
            font-weight: 600;
            vertical-align: bottom;
        }

        .blank-slot.focused {
            border-color: var(--primary);
            background-color: #dbeafe;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
            animation: pulseFocus 1.5s infinite;
        }

        .blank-slot.correct {
            border-color: var(--success);
            background-color: #d1fae5;
            color: #047857;
            pointer-events: none;
        }

        .blank-slot.incorrect {
            border-color: var(--error);
            background-color: #fee2e2;
            color: #b91c1c;
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }

        /* Option Bank Buttons - Scaled up */
        .option-btn {
            background-color: var(--panel-bg);
            border: 2px solid #cbd5e1;
            border-radius: 0.5rem;
            padding: 0.75rem 1.25rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            color: #334155;
            font-size: clamp(1.1rem, 2.25vh, 1.56rem);
        }

        .option-btn:hover {
            border-color: var(--primary);
            background-color: #f8fafc;
        }

        .option-btn:active {
            transform: scale(0.95);
        }

        /* Animations */
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        @keyframes pulseFocus {
            0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); }
            70% { box-shadow: 0 0 0 6px rgba(59, 130, 246, 0); }
            100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>

        let htmlParts = test.text.split(/\{(\d+)\}/g);
        
        htmlParts.forEach(part => {
            if (/^\d+$/.test(part)) {
                const blankIdx = parseInt(part) - 1; 
                const span = document.createElement('span');
                span.className = 'blank-slot';
                span.dataset.blankIndex = blankIdx;
                span.innerHTML = `(${part})`;
                span.onclick = () => {
                    if (appState.currentAnswers[blankIdx] === null) selectBlank(blankIdx);
                };
                textContainer.appendChild(span);
            } else {
                const span = document.createElement('span');
                span.innerText = part;
                textContainer.appendChild(span);
            }
        });

        selectBlank(0);
    }

    function handleOptionTap(word, blankIdx) {
        const test = rawData.find(t => t.id === appState.currentTestId);
        const slot = document.querySelector(`.blank-slot[data-blank-index="${blankIdx}"]`);
        const correctIndex = test.answers[blankIdx];
        const correctWord = test.options[blankIdx][correctIndex];

        slot.classList.remove('incorrect');
        void slot.offsetWidth;

        if (word === correctWord) {
            playSound('correct');
            slot.innerHTML = word;
            slot.classList.remove('focused');
            slot.classList.add('correct');
            appState.currentAnswers[blankIdx] = word;
            appState.completedBlanks++;
            
            document.getElementById('options-grid').innerHTML = '';

            if (!checkTestComplete()) {
                const firstEmpty = appState.currentAnswers.findIndex(ans => ans === null);
                if (firstEmpty !== -1) selectBlank(firstEmpty);
            }
        } else {
            playSound('wrong');
            slot.innerHTML = word;
            slot.classList.add('incorrect');
            logMistake(blankIdx, word, correctWord, test.grammar[blankIdx]);
            
            setTimeout(() => {
                slot.classList.remove('incorrect');
                slot.innerHTML = `(${blankIdx + 1})`;
            }, 800);
        }
    }

    function checkTestComplete() {
        if (appState.completedBlanks === 6) {
            setTimeout(showReviewScreen, 600);
            return true;
        }
        return false;
    }

    function showReviewScreen() {
        document.getElementById('test-screen').classList.add('hidden');
        document.getElementById('review-screen').classList.remove('hidden');

        const test = rawData.find(t => t.id === appState.currentTestId);
        const mistakesContainer = document.getElementById('mistakes-container');
        const list = document.getElementById('mistakes-list');
        const perfectContainer = document.getElementById('perfect-container');
        
        list.innerHTML = '';
        
        const finalScore = 6 - appState.currentMistakes.length;
        appState.scores[test.id] = Math.max(appState.scores[test.id] || 0, finalScore);
        localStorage.setItem('b1_scores', JSON.stringify(appState.scores));

        if (appState.currentMistakes.length === 0) {
            mistakesContainer.classList.add('hidden');
            perfectContainer.classList.remove('hidden');
        } else {
            perfectContainer.classList.add('hidden');
            mistakesContainer.classList.remove('hidden');
            
            appState.currentMistakes.sort((a,b) => a.blankIdx - b.blankIdx).forEach(m => {
                const div = document.createElement('div');
                div.className = 'p-5 bg-gray-50 border border-gray-200 rounded-xl';
                div.innerHTML = `
                    <div class="flex items-center gap-3 mb-3 text-base sm:text-lg">
                        <span class="font-bold text-gray-700">Blank (${m.blankIdx + 1}):</span>
                        <span class="line-through text-red-500">${m.userWord}</span>
                        <span class="text-gray-400">&rarr;</span>
                        <span class="font-black text-emerald-600">${m.correctWord}</span>
                    </div>
                    <p class="text-base sm:text-lg text-gray-700 font-medium bg-blue-50 border-l-4 border-blue-400 p-3 rounded">${m.grammar}</p>
                `;
                list.appendChild(div);
            });
        }
    }

    function returnToMenu() {
        if ('speechSynthesis' in window) speechSynthesis.cancel();
        document.getElementById('test-screen').classList.add('hidden');
        document.getElementById('review-screen').classList.add('hidden');
        document.getElementById('menu-screen').classList.remove('hidden');
        initMenu();
    }

    function showModal(message) {
        document.getElementById('modal-body').innerText = message;
        const modal = document.getElementById('message-modal');
        const content = document.getElementById('modal-content');
        modal.classList.remove('hidden');
        setTimeout(() => content.classList.replace('scale-95', 'scale-100'), 10);
    }

    function closeModal() {
        const modal = document.getElementById('message-modal');
        const content = document.getElementById('modal-content');
        content.classList.replace('scale-100', 'scale-95');
        setTimeout(() => modal.classList.add('hidden'), 200);
    }

    window.onload = () => {
        initMenu();
    };
</script>
</body>
</html>
