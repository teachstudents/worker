<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listening Practice</title>
    <style>
        :root { 
            --primary: #2c3e50; 
            --accent: #3498db; 
            --success: #27ae60; 
            --error: #e74c3c; 
            --light: #ecf0f1; 
            --dark: #1a252f; 
            --highlight: #f1c40f;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            line-height: 1.4; 
            margin: 0; 
            padding: 0; 
            background: #f4f7f6; 
            color: #333; 
        }
        .container { 
            max-width: 1300px; 
            margin: 0 auto; 
            padding: 15px; 
        }
        
        #main-menu { 
            text-align: center; 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); 
        }
        .student-input-group { margin-bottom: 25px; }
        .student-input-group input { padding: 10px; font-size: 16px; width: 350px; border: 2px solid #bdc3c7; border-radius: 8px; transition: 0.3s; text-align: center;}
        .student-input-group input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 8px rgba(52, 152, 219, 0.3); }
        
        .test-grid { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 12px; 
            margin-top: 15px; 
        }
        @media (max-width: 1100px) { .test-grid { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 850px) { .test-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 600px) { .test-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 400px) { .test-grid { grid-template-columns: 1fr; } }
        
        .test-btn { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 15px 10px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 14px; 
            font-weight: bold;
            transition: 0.3s; 
            display: block;
            box-shadow: 0 3px 5px rgba(0,0,0,0.1);
        }
        .test-btn:hover { background: var(--accent); transform: translateY(-2px); box-shadow: 0 5px 10px rgba(0,0,0,0.15); }

        #test-view { display: none; }
        
        .unified-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--dark);
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            position: sticky;
            top: 10px;
            z-index: 100;
        }
        .header-info {
            display: flex;
            gap: 20px;
            font-size: 15px;
        }
        .header-info span { font-weight: bold; color: #ecf0f1; }
        .header-controls {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .action-btn { padding: 8px 14px; border: none; border-radius: 6px; cursor: pointer; color: white; font-size: 13px; font-weight: bold; transition: 0.2s; display: flex; align-items: center; gap: 5px; }
        .btn-play { background: var(--accent); }
        .btn-play.playing { background: #e67e22; }
        .btn-back { background: #7f8c8d; } 
        .btn-transcript { background: #9b59b6; } 
        .btn-answers { background: #e74c3c; } 
        .btn-check { background: var(--success); font-size: 15px; padding: 10px 25px; margin-top: 10px; width: 100%; box-shadow: 0 4px 8px rgba(39, 174, 96, 0.3); }
        .action-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }

        .test-content-wrapper {
            background: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 3px 15px rgba(0,0,0,0.05);
        }
        .test-title-display {
            font-size: 22px;
            color: var(--primary);
            border-bottom: 2px solid var(--light);
            padding-bottom: 5px;
            margin-bottom: 10px;
            margin-top: 0;
        }

        .question-block { margin-bottom: 4px; padding-bottom: 6px; border-bottom: 1px dashed #e0e0e0; }
        .question-block:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .question-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 2px; }
        .question-label { font-weight: 600; color: var(--primary); font-size: 13.5px; margin: 0; flex: 1; }
        
        .mcq-options { display: flex; flex-wrap: wrap; gap: 10px; margin: 2px 0 4px 10px; font-size: 12.5px; color: #555; background: #f9f9f9; padding: 6px 10px; border-radius: 4px; border-left: 3px solid var(--accent); }
        .mcq-options div { margin-bottom: 0; }
        .matching-legend { display: flex; flex-wrap: wrap; gap: 10px; margin: 2px 0 4px 10px; font-size: 12.5px; font-weight: bold; color: var(--primary); background: #e8f4f8; padding: 6px 10px; border-radius: 4px; border: 1px solid #bce0ee; }
        
        .answer-input { padding: 2px 8px; border: 2px solid #ccc; border-radius: 4px; width: 160px; font-size: 13px; height: 22px; transition: 0.2s; flex-shrink: 0; }
        .answer-input:focus { border-color: var(--accent); outline: none; }
        .answer-input.correct { border-color: var(--success); background-color: #eafaf1; color: #1e8449; font-weight: bold; }
        .answer-input.incorrect { border-color: var(--error); background-color: #fadbd8; color: #c0392b; font-weight: bold; }
        
        .hidden-section { 
            display: none; 
            margin-top: 20px; 
            background: #fafafa; 
            border-radius: 8px; 
            border: 1px solid #ddd;
            overflow: hidden;
        }
        .panel-header {
            background: #eee;
            padding: 10px 15px;
            font-weight: bold;
            color: var(--primary);
            border-bottom: 1px solid #ddd;
        }
        .panel-content {
            padding: 15px;
            max-height: 400px;
            overflow-y: auto;
        }
        .transcript-text { white-space: pre-wrap; font-family: 'Segoe UI', Tahoma, sans-serif; font-size: 15px; line-height: 1.6; }
        .transcript-line { padding: 3px 6px; border-radius: 4px; transition: background-color 0.3s; margin-bottom: 3px; }
        .transcript-line.active { background-color: var(--highlight); font-weight: bold; }
        .speaker-name { font-weight: bold; color: var(--accent); }
        
        .answer-key-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .answer-key-item { font-size: 14px; background: white; padding: 8px; border-radius: 4px; border: 1px solid #eee; }
        .answer-key-item span { font-weight: bold; color: var(--success); float: right; }
        #feedback-area { margin-top: 10px; font-weight: bold; font-size: 18px; text-align: center; }

        @media (max-width: 600px) {
            .question-row { flex-direction: column; align-items: flex-start; }
            .answer-input { width: 100%; box-sizing: border-box; }
        }
    </style>
</head>
<body>
<div class="container">
    <div id="main-menu">
        <div class="student-input-group">
            <input type="text" id="student-name" placeholder="Enter Student Name (e.g. John Doe)">
        </div>
        <div class="test-grid" id="test-grid"></div>
    </div>

    <div id="test-view">
        <div class="unified-header">
            <div class="header-info">
                <div id="display-student">Student: <span>-</span></div>
                <div id="display-test">Test: <span>-</span></div>
                <div id="display-score">Score: <span id="score-val">0/10</span></div>
            </div>
            
            <div class="header-controls">
                <button class="action-btn btn-back" onclick="showMenu()">← Back to Menu</button>
                <button class="action-btn btn-play" id="btn-play" onclick="toggleTTS()">▶ Play Audio</button>
                <button class="action-btn btn-play" onclick="stopTTS(); setTimeout(toggleTTS, 100);">↺ Repeat</button>
                <button class="action-btn btn-transcript" id="btn-transcript" onclick="toggleSection('transcript-box', 'btn-transcript', 'Transcript')">▼ Show Transcript</button>
                <button class="action-btn btn-answers" id="btn-answers" onclick="toggleSection('answer-key-box', 'btn-answers', 'Answer Key')">▶ Show Answer Key</button>
            </div>
        </div>

        <div class="test-content-wrapper">
            <h2 id="test-title" class="test-title-display">Title</h2>
            
            <div id="questions-container"></div>
            
            <button class="action-btn btn-check" onclick="checkAnswers()">Submit Answers</button>
            <div id="feedback-area"></div>

            <div id="transcript-box" class="hidden-section">
                <div class="panel-header">Interactive Transcript</div>
                <div class="panel-content">
                    <div class="transcript-text" id="transcript-content"></div>
                </div>
            </div>

            <div id="answer-key-box" class="hidden-section">
                <div class="panel-header">Correct Answers</div>
                <div class="panel-content">
                    <div id="answer-key-content" class="answer-key-grid"></div>
                </div>
            </div>
        </div>
    </div>
</div>

ing it into the branch. \nAGENT: Fantastic. Finally, for our records, how did you hear about us? Normally people see our website, but did a friend recommend us? \nCUSTOMER: Normally you'd expect me to say I saw it on the internet, but actually, I heard an advert on the radio.`,

        id: 2, title: "2. Rapid Moves",
        transcript: `AGENT: Good afternoon, Rapid Moves. This is Sarah speaking. How can I help you? \nCUSTOMER: Hi there. I'd like to get a quote for a house removal, please. We are currently living in London and moving out to the suburbs. \nAGENT: Certainly, I can help you with that. Can I take your name first, please? \nCUSTOMER: Yes, it's Darren Keeley. \nAGENT: Is that spelt K-E-L-E-Y? \nCUSTOMER: Actually, it's K, double E, L, E, Y. \nAGENT: Great, I've got that. And a contact telephone number? \nCUSTOMER: Sure. It's 079 432... wait a minute, I've just been given a work phone and I keep forgetting it. Sorry, it's 079 433 118. \nAGENT: 079 433 118. Perfect. Now, what date were you looking to move? \nCUSTOMER: Well, I originally wanted to move on the 15th of April, but unfortunately our landlord needs the keys back earlier, so we will have to do it on the 12th. \nAGENT: The 12th of April. Let me just check the system... Yes, we have a van available. And what is the address of the new property? \nCUSTOMER: It's 42 Bramble Street. \nAGENT: Bramble... is that B-R-A-M-B-L-E? \nCUSTOMER: Yes, that's correct. \nAGENT: Now, do you have any particularly fragile items that will need special care during the move? We often transport pianos and large mirrors. \nCUSTOMER: We do have a large mirror, but I'll be taking that in my own car. However, I am really worried about my computer, so I'd need you to handle that with extra padding. \nAGENT: Not a problem. And will you need us to provide packing boxes? \nCUSTOMER: Yes, please. \nAGENT: We have heavy-duty plastic ones available to rent... \nCUSTOMER: Right. Well, if you've got strong cardboard boxes, that's best. I've found that plastic ones sometimes crack if they get dropped. \nAGENT: Cardboard it is. We will drop those off on Friday. Do you require any extra services? One helpful thing is that we also do end-of-tenancy cleaning for customers. \nCUSTOMER: Oh, I see. I probably won't need that as my wife is doing it. But we definitely don't want to build all the beds again, so we'd like to add unpacking to the service. \nAGENT: Excellent. Let me just calculate your total. Normally, a full house move on a weekend is around £500. But since you are moving on a Tuesday, the final quote comes down to £420. \nCUSTOMER: £420. That sounds reasonable. How do I go about paying? Can I write you a cheque? \nAGENT: We do accept them, but if you've got a credit card, that's best. We've found that cheques take a bit too long to clear with our bank. \nCUSTOMER: Credit card is fine. I'll read you the numbers in a moment. \nAGENT: Fantastic. Just for our marketing records, how did you hear about us? Normally people expect to find movers on the internet these days... \nCUSTOMER: Yes, normally you'd expect me to say the internet, but actually, I was waiting at the dentist and saw your advert in a magazine.`,

        transcript: `MANAGER: Good afternoon, Riverside Community Centre. This is Diana speaking. How can I help you? \nCUSTOMER: Oh, hello Diana. I'm ringing to enquire about hiring a room for an upcoming event. We are hosting a birthday party for my daughter. \nMANAGER: Fantastic. We host a lot of parties here. Let me just open a booking form. Can I take your full name first, please? \nCUSTOMER: Yes, it's Michael Bennett. \nMANAGER: Is that spelt B-E-N-E-T? \nCUSTOMER: Actually, it's B-E, double N, E, double T. \nMANAGER: Thank you, I've got that. And a contact telephone number? \nCUSTOMER: Sure. It's 076 544... wait a minute, I've just been given a new mobile by my company and I haven't memorized it yet. Sorry, it's 076 544 890. \nMANAGER: 076 544 890. Excellent. Now, what date were you looking to hold the party? \nCUSTOMER: Well, her actual birthday is on the 7th of November, and I originally wanted to have it then, but unfortunately my wife is travelling for work that week, so we will have to move it to the 14th. \nMANAGER: The 14th of November. Let me just check the diary... Yes, we have availability. Now, we have two spaces. There's our Main Hall, which seats 200 people, or we have the Charlton Room, which is a bit smaller. \nCUSTOMER: The Main Hall will be far too big for us, so the Charlton Room sounds perfect. \nMANAGER: Excellent. Do you need any special facilities in the room? We can set up a digital projector if you want to show photos. \nCUSTOMER: I probably won't need that. But we are planning to prepare some of the snacks ourselves, so what I really need is a kitchen. \nMANAGER: No problem, that room has one attached. Let's discuss the cost. Normally, the evening rate for that room is £50 an hour. However, because you are a local resident, the final quote comes down to £45. \nCUSTOMER: £45 an hour is great. Now, you mentioned snacks. Do you also provide catering? \nMANAGER: We do. We can provide a sit-down hot meal, or a cold buffet. \nCUSTOMER: Right. Well, if you've got a cold buffet, that's best. We've found that hot meals are a bit too formal for children's parties. \nMANAGER: I completely agree. We will supply the tables, chairs, and all the plates for that. Are you bringing anything yourselves? \nCUSTOMER: We will bring the birthday cake, of course, and I'll be bringing my own decorations to put up on the walls. \nMANAGER: That's absolutely fine, just please use sticky tape and not pins. Oh, one other thing. Will you be playing music? \nCUSTOMER: Yes, we have a playlist ready. \nMANAGER: In that case, according to local council rules, you'll need to purchase a music license. It's a small standard fee. \nCUSTOMER: Oh, I didn't realize that, but I'll add it to the budget. \nMANAGER: Brilliant. Finally, just for our records, how did you find out about the centre? Normally people see our flyer in the local library... \nCUSTOMER: Yes, normally you'd expect people to find local things that way, but actually, it was a neighbour who recommended you. They had a party there last year.`,

        id: 5, title: "5. Highfield Community",
        transcript: `RECEPTIONIST: Good morning, Highfield Community Centre. How can I help you? \nCUSTOMER: Hello there. I'm calling because I wanted to book a tennis court for this weekend... Oh, wait a minute, sorry, I'm looking at my wife's notes and she already did that this morning! What I actually need is to ask about your evening classes. \nRECEPTIONIST: Certainly, I can help you with that. We have a new schedule starting next month. \nCUSTOMER: Great. Before we look at the classes, do you offer any discounts? I have my university student ID. \nRECEPTIONIST: No, I'm afraid we don't offer student rates anymore. But if you have a resident's permit for the local council area, we can give you 10% off. \nCUSTOMER: Oh, I do have one of those. I'll bring it with me. Can I pay by credit card over the phone to secure my place? \nRECEPTIONIST: Normally you'd expect to be able to do that, but our machine is currently broken, so if you've got cash, that's best. You can drop it off at reception when you show your permit. \nCUSTOMER: Cash it is. I'll come by tomorrow. \nRECEPTIONIST: Excellent. Just for our records, how did you find out about our centre? Did you see our flyer in the library? \nCUSTOMER: I did see one there yesterday, but it was actually a neighbour who recommended you first. They took a class last year. \nRECEPTIONIST: Word of mouth is always our best advertisement! Now, let's look at the classes. On Tuesdays at 6:30 pm, we have Pottery. \nCUSTOMER: How much is that? I see £30 listed on the website. \nRECEPTIONIST: It used to be £30, but it recently went up to £32 to cover the rising cost of running the kiln. \nCUSTOMER: £32 is fine. Do I need to buy my own clay? \nRECEPTIONIST: No, all materials are included in the price. However, it gets very messy in the studio, so you must bring an apron to protect your clothes. \nCUSTOMER: Good to know. What about Wednesdays? Is there a cooking class? \nRECEPTIONIST: We used to run a cooking class, but the kitchen is being renovated. So instead, on Wednesdays at 7:00 pm, we are offering Woodwork. \nCUSTOMER: Woodwork. I've never tried that. Do I need to bring my own tools? \nRECEPTIONIST: No, we supply the hammers and saws. But for safety, you must wear strong boots. Trainers or sandals simply aren't allowed in the workshop. \nCUSTOMER: That makes sense. What is the last option? \nRECEPTIONIST: We have Photography. That one costs £40. \nCUSTOMER: And is that on Thursday evenings? \nRECEPTIONIST: Let me check the schedule... Ah, no, sorry, my screen just updated. It has been moved to Friday evenings due to a room clash. \nCUSTOMER: Friday works for me. Will the course teach us how to use digital editing software? \nRECEPTIONIST: I'm afraid that's one thing we can't do, as we don't have a computer lab. The tutor will mainly focus on landscapes, taking you out into the local parks to shoot.`,

        id: 6, title: "6. Riverside Market",
        transcript: `MANAGER: Good morning, Riverside Market Office. \nWOMAN: Hello. I was calling because I wanted to volunteer to help with the set-up this weekend... oh, wait a minute, sorry, I'm looking at the wrong notes! I actually need to ask about renting a stall to sell my crafts. \nMANAGER: No problem, I can help you with that. Are you planning to sell hot food? \nWOMAN: No, just some homemade jams and perhaps some baked goods. \nMANAGER: Alright. Well, if you were selling meat, you'd need to use our special fridges. But for baked goods, that's not necessary. You will, however, be strictly required to show us a valid hygiene certificate before you can open. \nWOMAN: I have one of those from my cafe. Just for your records, I know you advertise a lot in the local newspaper... \nMANAGER: Yes, most people see our ads there. \nWOMAN: Normally you'd expect me to say that's where I saw it, but I actually saw a poster up at my local gym. \nMANAGER: Great. Now, for the day itself, we do provide the main wooden tables for everyone. \nWOMAN: Oh, that's helpful. Should I bring a rubbish bag? \nMANAGER: We actually collect the rubbish for you. But we don't have enough seating, so bringing a folding chair is absolutely essential if you want to sit down. \nWOMAN: Got it. Now, can you tell me about the different types of stalls? \nMANAGER: Certainly. We have three tiers. The first is the Standard Stall. It costs £25. \nWOMAN: And where is that located? Is it in the community hall? \nMANAGER: It used to be, but the hall is under repair. So now it is located inside the tent. \nWOMAN: Okay. And does the £25 include a table cover? \nMANAGER: I'm afraid not. You must provide your own cloth to protect the wood. \nWOMAN: Fine. What is the next tier? \nMANAGER: That's the Produce stall. That's P-R-O-D-U-C-E. \nWOMAN: And where are those? \nMANAGER: They are positioned right near the main entrance, so they get a lot of foot traffic. They cost £35. \nWOMAN: That sounds good. Do they have any extras? \nMANAGER: Yes, because they are outside, the price includes a protective canopy in case it rains. \nWOMAN: A canopy, excellent. And the last option? \nMANAGER: The Premium Stall. Those are situated next to the stage where the live music plays. \nWOMAN: Sounds noisy, but fun. How much is that one? \nMANAGER: Well, normally a premium spot would be £50, but because we are trying to encourage more local artists this month, it's currently £40. \nWOMAN: £40. And I see on your website it says I get access to electricity? \nMANAGER: Yes, that's correct.`,

        id: 7, title: "7. Summer Arts Festival",
        transcript: `COORDINATOR: Good morning, everyone, and welcome to the Summer Arts Festival volunteer orientation. My name is Seraphina, and I am the volunteer coordinator. Before we assign you to your stations, I need to go over a few important details. \nFirst, let's talk about the format of the event. In the past, we've always held the festival over a single weekend. We initially planned to expand it to a full week this year. However, due to funding cuts, we've actually decided to keep it to three days, but move it entirely indoors to the civic centre, so we don't have to worry about the rain. \nRegarding your uniform. Normally, at festivals like this, you'd expect to be given a souvenir festival t-shirt to wear, but our supplier let us down at the last minute. You don't need to wear formal suits, of course, but it is strictly required that you wear a high-visibility yellow vest at all times while on duty, which we will provide at the desk. \nYou'll also want to know your shifts. We used to just pin a master list on the noticeboard in the staff room. We thought about emailing the times to you every morning, but we found that emails often get missed or sent to the spam folder. So instead, you'll need to pick up a printed card from my desk when you arrive each day, which will have your exact hours on it. \nNow, health and safety. If there is a medical emergency with a visitor, please don't call an ambulance yourself, as having multiple people call can cause confusion for the hospital. And while your first instinct might be to find a police officer, you must actually contact the site manager on your two-way radio first, and they will coordinate the official medical team. \nFinally, I want to thank you all for giving up your time. Many people volunteer just to get free concert tickets. While that's a nice perk, the primary advantage of doing this work is that it helps you build your confidence when communicating with the public, which is something that looks fantastic on any CV. \nAlright, now let's look at where you will all be stationed today. \nSusan, your group is up first. Normally you look after the Children's Area, but unfortunately, that's closed for repairs this year. So instead, we've moved you to the Food Court to help clear tables and assist the vendors. \nNext is Mark's group. I know you requested to be at the Main Stage. Unfortunately, that's fully staffed by professionals. However, we really need your help directing vehicles, so please head over to the Car Park. \nFor the local scout troop, we usually put them in the Car Park, but they are so great at answering public questions that this year they will be stationed at the Information Tent. \nNow, the university students. Because they are studying medicine, it would make sense to put them in the First Aid Tent, right? Well, actually, the festival director specifically requested them to handle the guest lists and cater to the artists in the VIP Lounge. \nFinally, the drama club members. They originally wanted to perform, but they'll be helping out at the Main Stage setting up the microphones and helping the bands.`,

        id: 8, title: "8. Riverside Reopening",
        transcript: `MANAGER: Good morning, everyone, and welcome to the grand reopening of the Riverside Community Arts Centre. We are absolutely thrilled to welcome the public back through our doors. \nBefore you explore, I want to give you a bit of background and run through some basic information. You know we've been closed for the last six months. We originally planned the closure because we desperately wanted to increase the overall size of the building by adding an extension. However, the town planners denied our building permit. So instead, the real driving force behind the six-month closure was the urgent need to upgrade the heating and lighting systems, which were completely outdated. Luckily, while the electricians were working, we also managed to repair some old storm damage to the roof. \nYou might be wondering how we keep this beautiful place running. We used to rely entirely on your annual membership fees to cover our costs. But as expenses rose, we had to look elsewhere. Normally, places like ours receive annual grants from the local council, but unfortunately, they cut our budget to zero last year. So now, the only way we keep our doors open is actually through generous private donations from the public. We are incredibly grateful for that support. \nNow, let's talk about the facilities. The computer room is open on the first floor. In the past, sessions were limited to one hour to ensure everyone got a turn, but we've purchased ten more machines, so that rule has been abolished. You might expect that you need to book a computer a day in advance now, but actually, it's just a simple drop-in system. We do, however, have one strict condition: because of previous accidents ruining the keyboards, food and drink are completely forbidden in that room. \nRegarding your membership cards, please keep them safe. However, if you do lose your card, don't panic. You don't need to go to the police and report it. And while some libraries charge a £5 replacement fee, we've decided to waive that cost. All you actually need to do is bring a photo ID to the reception desk, and we'll print you a new one on the spot. \nFinally, getting here can be tricky. We do have a car park, but there are massive roadworks on the High Street right now, so I'd avoid driving if you can. We've found that the local bus service is very unreliable on weekends. So, if you've got a bicycle, that's best. We have plenty of secure racks right outside the front door. \nRight, let's look at the schedule of upcoming events. \nFirst is the Photography Workshop. We had originally planned to run this on Tuesday evenings. But unfortunately, the tutor had a sudden scheduling clash, so it has been moved to Thursday evenings instead. \nNext is Children's Storytime. This is always incredibly popular. We were hoping to hold it in the main hall as usual, but because the weather is so beautiful this week, we've decided it will be held in the outdoor pavilion to give the kids some fresh air. \nYou might be interested in the Local History Talk. I know several of you were asking about this. Sadly, the guest speaker has caught a very bad flu, so I'm afraid that event has been completely cancelled for this month. \nWe also have the new Yoga Class. Just a quick note on this one: normally we provide all the mats, but our supplier hasn't delivered them yet. So for the first three weeks, it requires you to bring your own extra equipment. \nFinally, the Pottery Course. Many people think this is only for advanced levels, but beginners are completely welcome. However, if you haven't put your name down yet, I'm afraid it's too late. There are absolutely no spots left.`,

        id: 9, title: "9. Furniture Rental",
        transcript: `AGENT: Good morning, City Relocations. How can I help you? \nSHELLY: Hi, this is Shelly Meyer. I'm renting your house on Archwood Avenue for 12 months. \nAGENT: Ah yes, Shelly. Is your surname spelt M-E-Y-E-R? \nSHELLY: Yes, that's right. \nAGENT: Great. And just to confirm the property, that was 14 Archwood Avenue? \nSHELLY: Correct. That's spelt A-R-C-H-W-O-O-D. \nAGENT: Thank you. How can I help you today? \nSHELLY: Well, when I viewed the house I told you I'll most probably need to rent some furniture. I'm not bringing much with me. \nAGENT: Yes, of course. Well, the biggest company is called Peak Rentals. Oh, and their brochure says that there's a special offer at the moment. If you rent living room furniture, I believe that's a set of chairs and a TV table, you'll also get a lamp at no extra cost. \nSHELLY: Okay, but you know that price range you gave me earlier is more than I was hoping to pay. \nAGENT: Then you could try Aaron and Oliver. \nSHELLY: Sorry, what? And Oliver? \nAGENT: Aaron. A-R-O-N. \nSHELLY: Okay. Are they... er... \nAGENT: I'd say they're a mid-price company, but if you chose them, you need to be aware that they charge an extra 12% every month in case of damage. \nSHELLY: Oh, I see. I'd have to do the math carefully then, right? \nAGENT: But one helpful thing is that they also do cleaning for customers. For the house. \nSHELLY: Oh, I see. I probably won't need that. \nAGENT: There's another company called Larch Furniture. It's quite new and it has the lowest prices in town. \nSHELLY: Well, that would be good. I won't have much time to go shopping after I start my job. \nAGENT: There are two things you need to know about Larch Furniture. First of all, you have to take out insurance on the furniture and you need to organize that yourself. \nSHELLY: That wouldn't be too hard. \nAGENT: Also, you can't take out a contract for less than 6 months. \nSHELLY: I figure that might not be a problem for me. I'm renting the house for 12 months after all. \nAGENT: Yes. Okay. Well, sorry to interrupt. I just thought of another furniture rental company. It's called Space Rentals, and it's located very near to the house. \nSHELLY: Okay. \nAGENT: I don't have any information about their charges. So, it's best to use their app to find out what it would cost you to use them.`,

        id: 10, title: "10. Elite Catering",
        transcript: `MALE: Good morning, Elite Catering. Mark speaking. How can I help you? \nFEMALE: Oh, hello Mark. I'm calling to enquire about the temporary jobs you advertised. \nMALE: Fantastic. We are always looking for new staff. I can take your details right now. What is your full name, please? \nFEMALE: It's Sarah Woodhouse. \nMALE: Is that spelt W-O-D-H-O-U-S-E? \nFEMALE: Actually, it's W-O, double O, D-H-O-U-S-E. \nMALE: Thank you. And your address? \nFEMALE: I live at 42 Brampton Road. \nMALE: Got it. And could I have a contact phone number? \nFEMALE: Sure. It's 077 452 998... oh, wait a minute, I just got a new mobile plan yesterday. Sorry, it's 077 452 995. \nMALE: 077 452 995. Excellent. Now, we have a few different vacancies. We are looking for cooks, and we also need waiters. \nFEMALE: Well, I've never cooked professionally before, so I'll apply for the waiter position, if that's okay. \nMALE: That's absolutely fine. Now, let's talk about the pay. Normally, we pay £9.00 an hour for staff who work on the weekends. However, for this beginner role, the starting rate is £8.50 an hour. \nFEMALE: £8.50 is fine with me. Do I need to buy a uniform? \nMALE: You need to wear black trousers. We will provide you with a company apron, but you must bring your own white shirt. \nFEMALE: I have one of those in my wardrobe. Are there any specific days I need to be available? \nMALE: We ideally need people for Thursdays and Fridays. \nFEMALE: Oh, I have college classes on Thursdays, so I couldn't do that. \nMALE: That's a pity, but Fridays are our absolute busiest day, so as long as you can do Fridays, we can still take you on. \nFEMALE: Perfect. \nMALE: Let's arrange an interview. Can you come into the office on the 14th of October? \nFEMALE: I'm actually away visiting my parents on the 14th. How about the 16th? \nMALE: Let me check the diary... yes, the 16th works well. I'll put you down for 10:00 AM. \nFEMALE: Great. Is there anything I need to bring? \nMALE: Yes. Some people just bring their driving licence, but our head office strictly needs a copy of your passport for our records. \nFEMALE: No problem, I'll make a copy tonight. Is there parking at your office? \nMALE: There is, but it's very expensive. And I wouldn't take the bus as the roadworks cause huge delays. If you've got a bicycle, that's best. We have secure racks outside. \nFEMALE: I'll do that. Oh, by the way, I know you asked earlier about where I saw the advert. I didn't actually see it online; it was a friend who told me about the job.`,

        id: 11, title: "11. Research Project",
        transcript: `MALE: Right. Anyway, let's think about our assignment. Last time I had problems with the final stage where we had to describe and justify how successful we thought we'd been. I struggled a bit with the action plan, too. \nFEMALE: I was okay with the planning, but I got marked down for the self-assessment as well. And I had big problems with the statistical stuff. That's where I really lost marks. \nMALE: Right... So shall we plan what we have to do for this assignment? \nFEMALE: Okay. First we have to decide on our research question. So how about: 'is there a relationship between hours of sleep and number of dreams'? \nMALE: Okay, then we need to think about who we'll do the study on. About 12 people, right? And shall we use other psychology students? \nFEMALE: Let's use people from a different department. What about history? \nMALE: Yes, they might have interesting dreams. Or literature students? \nFEMALE: I don't really know any. \nMALE: Okay, forget that idea. Then we have to think about our methodology. So, we could use observation, but that doesn't seem appropriate. \nFEMALE: No, it needs to be self-reporting, I think. And we could ask them to answer questions online. \nMALE: But in this case, paper might be better as they'll be doing it straight after they wake up. In fact, while they're still half asleep, right? \nFEMALE: Yes, exactly. And we'll have to check the ethical guidelines for this sort of research because our experiment involves humans, so there are special regulations. \nMALE: Yes, I had a look at those for another assignment I did. There's a whole section on risk assessment and another section on making sure they aren't put under any unnecessary stress. \nFEMALE: Right. So, for the paper diary itself, what do they need to record? Obviously, the time they went to bed and the time they woke up. \nMALE: Yes. And they should write down a brief description of the dream. But we also need to know if they consumed any caffeine before bed, as that definitely affects sleep. \nFEMALE: Good point. We should also ask about the temperature of their room, as being too hot or cold can cause nightmares. \nMALE: I think that's getting too complicated. Let's stick to their diet. What about alcohol? \nFEMALE: No, let's keep it simple. Caffeine is enough. Then, after we collect the diaries in two weeks, we'll need to analyze the data. \nMALE: I'm a bit worried about the software we have to use for that. I've never used it before. \nFEMALE: Don't worry, the university provides a free tutorial online. I'll send you the link. \nMALE: Thanks. Once we have the results, we have to prepare the presentation. We need to create some visual aids. I can make some charts to show the correlation. \nFEMALE: That would be great. And we must remember to include a section on the limitations of our study. The tutor is always very strict about acknowledging what we couldn't control. \nMALE: Yes, like the fact that self-reporting isn't one hundred percent reliable. Finally, we need to submit the written report by the 25th. \nFEMALE: Wait, I originally thought the deadline was the 25th, but the syllabus says it has been extended to the 28th because of the library closure. \nMALE: Oh, what a relief! We should still aim to finish the first draft early so we have time to proofread it. \nFEMALE: Agreed. Oh, one last thing: we have to attach the completed consent forms to the back of the report, otherwise they won't mark it.`,

        id: 12, title: "12. Self-Access Centre",
        transcript: `JUDY: Hi Alan, have you managed to collate the results from our research into the Self-Access Centre? \nALAN: Yes, I have. Before we look at the data, we need to write the introduction. We should state why we chose the centre as our topic. I originally thought about choosing it just because our course tutor recommended it, but actually, the main reason we went with it is that it is highly relevant to our own studies. \nJUDY: Right, I'll write that down. Now, for the methodology. We need to explain why we didn't use a questionnaire. \nALAN: Well, we thought about it, but designing one just takes too much time. \nJUDY: No, that wasn't the main issue, remember? We realized that students just throw them away, so we were worried about a low response rate. \nALAN: Ah, yes, exactly. So instead, we conducted face-to-face interviews with the students. And we also needed the staff's perspective. \nJUDY: I originally tried to speak to the university librarian, but she was away at a conference, so I managed to get a 30-minute interview with the centre manager instead. That gave us some great insights. \nALAN: Excellent. Now, looking at the student feedback, what did they want changed about the opening times? I know some students wanted it to stay open later in the evenings. \nJUDY: Yes, but looking at the charts, the biggest request by far was for weekend opening hours. At the moment it's closed on Saturday and Sunday, which is really frustrating for people doing assignments. \nALAN: That seems like a valid point. So, how are we going to present all this to the class? A formal written report? \nJUDY: I think a written report is a bit boring. Why don't we do a PowerPoint presentation? \nALAN: We could, but the projector in our classroom is currently broken. I've decided we should create a poster display. It's much more visual and people can walk around and look at our charts. \nJUDY: Okay, a poster it is. Let's list our recommendations for the resources. First, the CD collection. It's a complete mess. \nALAN: It really is. It's impossible to find anything. We should just get rid of them. \nJUDY: I don't think we can throw them away. They just need re-organising completely so students can actually browse them properly. \nALAN: Fine. What about the reference books? \nJUDY: Well, the encyclopedias are in good condition, but the dictionaries are absolutely ancient. We need to replace them with brand new editions. \nALAN: Agreed. And the headphones in the listening lab? I checked them yesterday. \nJUDY: Do we need to buy new ones? \nALAN: No, they're very high quality, but half of them don't work because of loose wires. They definitely need repairing. \nJUDY: I'll note that down. The newspapers are also very popular, but there are never enough copies for everyone in the morning. \nALAN: So our recommendation is clearly to buy more copies of the daily news. \nJUDY: Finally, the seating. Those old wooden study chairs... \nALAN: Oh, they are terrible. Uncomfortable and squeaky. We should definitely just get rid of them. The modern plastic ones are much better.`,

        id: 13, title: "13. Inclusive Design",
        transcript: `LECTURER: Good morning. Today we are looking at the fascinating field of Inclusive Design. It's only relatively recently that designers have become aware of the need to truly be inclusive. What does this mean? Well, it simply means designing products that span economic, social, and cultural barriers. It means making sure products are completely accessible to everyone right out of the box, without any type of adaptation having to be made. \nUnfortunately, historically, design has heavily favoured one demographic. For decades, everything from tools to office spaces was designed around the dimensions of an average male. A classic example is the automotive industry. For years, cars were crash-tested using a dummy based on males, which had severe safety implications for all women. \nLet's look at the modern workplace. In construction and manufacturing, workers require personal protective equipment, or PPE. But a recent study found that most PPE is designed to fit men. Giving women protective gear that is simply scaled down from male proportions is not just uncomfortable; it can actively put women at risk. In fact, in a recent survey, many female workers stated that their PPE often hampered their work, making it difficult to operate heavy machinery safely. \nThis bias isn't just found in physical labor. Think about your typical office. Have you ever wondered why offices always feel so cold to some people? Well, standard air conditioning systems are calibrated using a formula devised in the 1960s, setting the ideal temperature of 21 degrees. But this calculation was based on the resting metabolic rate of a 40-year-old man. It completely ignores the fact that women have different metabolic rates, meaning they typically require a slightly warmer environment. \nSo, how do we fix this? The first step is for designers to collect far more comprehensive data before they even begin the sketching phase. If we only study a narrow segment of society, our products will only serve that segment. Furthermore, corporations must stop making blind assumptions about their target audience. True inclusive design means acknowledging the vast diversity of the human population from the very beginning of the creative process.`,

        transcript: `LECTURER: Today, we will discuss the history of secondary education. In the 19th century, education was very different. Schools were primarily for the wealthy. The main subjects taught were Latin and mathematics. \nHowever, a major reform occurred in 1902. Many textbooks highlight the 1900 discussions, but the act formally passed in 1902. This allowed local councils to build new secondary schools. \nDuring World War II, many schools were evacuated. Children were sent to the countryside for safety. After the war, the 1944 Act made secondary education free for all students. \nThis introduced a test taken at age eleven. Some politicians proposed age twelve, but eleven was eventually chosen. It divided students into grammar schools and technical schools. \nIn modern times, most students attend comprehensive schools. The focus has shifted to technology and inclusive learning. We now rely heavily on digital resources rather than just textbooks.`,

let currentTest = null;
let voices = [];
let speechQueue = [];
let isPlaying = false;
window.currentUtterance = null; 

const menuDiv = document.getElementById('test-grid');
const testView = document.getElementById('test-view');
const menuView = document.getElementById('main-menu');
const studentNameInput = document.getElementById('student-name');
const playBtn = document.getElementById('btn-play');

function init() {
    testsData.forEach((test, index) => {
        const btn = document.createElement('button');
        btn.className = 'test-btn';
        btn.innerText = test.title;
        btn.onclick = () => loadTest(index);
        menuDiv.appendChild(btn);
    });

    const populateVoices = () => {
        voices = window.speechSynthesis.getVoices();
    };
    populateVoices();
    if (speechSynthesis.onvoiceschanged !== undefined) {
        speechSynthesis.onvoiceschanged = populateVoices;
    }
    setTimeout(populateVoices, 500);
}

function showMenu() {
    stopTTS();
    testView.style.display = 'none';
    menuView.style.display = 'block';
}

function loadTest(index) {
    currentTest = testsData[index];
    const studentName = studentNameInput.value.trim() || "Guest Student";
    
    document.getElementById('display-student').innerHTML = `Student: <span>${studentName}</span>`;
    document.getElementById('display-test').innerHTML = `Test: <span>${currentTest.title}</span>`;
    document.getElementById('display-score').innerHTML = `Score: <span id="score-val">0/10</span>`;

    menuView.style.display = 'none';
    testView.style.display = 'block';
    document.getElementById('feedback-area').innerText = '';
    
    document.getElementById('transcript-box').style.display = 'none';
    document.getElementById('answer-key-box').style.display = 'none';
    document.getElementById('btn-transcript').innerText = '▼ Show Transcript';
    document.getElementById('btn-answers').innerText = '▶ Show Answer Key';

    document.getElementById('test-title').innerText = currentTest.title;

    const qContainer = document.getElementById('questions-container');
    qContainer.innerHTML = '';
    currentTest.questions.forEach(q => {
        const div = document.createElement('div');
        div.className = 'question-block';
        
        let html = `<div class="question-row">
            <label class="question-label">${q.label}</label>
            <input type="text" class="answer-input" data-id="${q.id}" placeholder="Type answer here">
        </div>`;
        
        if (q.options) {
            const listClass = q.isMatching ? "matching-legend" : "mcq-options";
            html += `<div class="${listClass}">`;
            q.options.forEach(opt => html += `<div>${opt}</div>`);
            html += `</div>`;
        }

        div.innerHTML = html;
        qContainer.appendChild(div);
    });

    const keyContainer = document.getElementById('answer-key-content');
    keyContainer.innerHTML = '';
    for (const [key, value] of Object.entries(currentTest.answers)) {
        const item = document.createElement('div');
        item.className = 'answer-key-item';
        item.innerHTML = `Question ${key}: <span>${value}</span>`;
        keyContainer.appendChild(item);
    }

    prepareTTS();
}

function toggleSection(sectionId, btnId, labelName) {
    const section = document.getElementById(sectionId);
    const btn = document.getElementById(btnId);
    
    if (section.style.display === 'none' || section.style.display === '') {
        section.style.display = 'block';
        btn.innerHTML = `▼ Hide ${labelName}`;
    } else {
        section.style.display = 'none';
        btn.innerHTML = `▶ Show ${labelName}`;
    }
}

function prepareTTS() {
    stopTTS();
    speechQueue = [];
    
    const lines = currentTest.transcript.trim().split('\n');
    const container = document.getElementById('transcript-content');
    container.innerHTML = '';

    // Map to strictly translate numbers into English words
    const numToWord = {'0': 'zero', '1': 'one', '2': 'two', '3': 'three', '4': 'four', '5': 'five', '6': 'six', '7': 'seven', '8': 'eight', '9': 'nine'};

    lines.forEach((line, index) => {
        if (!line.trim()) return;

        let speaker = "NARRATOR";
        let text = line;

        if (line.includes(':')) {
            const parts = line.split(':');
            speaker = parts[0].trim();
            text = parts.slice(1).join(':').trim();
        }

        const lineDiv = document.createElement('div');
        lineDiv.className = 'transcript-line';
        lineDiv.id = `trans-line-${index}`;
        lineDiv.innerHTML = `<span class="speaker-name">${speaker}:</span> ${text}`;
        container.appendChild(lineDiv);

        // Parse currency to explicitly say 'pounds'
        let modifiedText = text.replace(/£([0-9.,]+)/g, "$1 pounds");

        // Explicitly convert phone numbers to English words so multilingual voices don't use their native language
        modifiedText = modifiedText.replace(/\b(0\d{2}\s\d{3}\s\d{3})\b/g, match => {
            return match.split('').map(char => /\d/.test(char) ? numToWord[char] + ',' : char).join(' ');
        });

        // Parse hyphenated spelled words (e.g. B-R-A-M-B-L-E). Using periods forces them to be read as English initials.
        modifiedText = modifiedText.replace(/\b([A-Z](-[A-Z])+)\b/g, match => {
            return match.split('-').join('. ') + '.';
        });

        speechQueue.push({
            speaker: speaker,
            text: modifiedText,
            lineId: `trans-line-${index}`
        });
    });
}

function getVoiceForSpeaker(speakerName, testId) {
    const config = TEST_VOICE_CONFIG[testId];
    let requestedVoiceName = config ? config[speakerName] : null;

    if (!requestedVoiceName) {
        if (speakerName === 'MALE' || speakerName === 'MANAGER' || speakerName === 'ALAN') requestedVoiceName = 'Brian';
        else requestedVoiceName = 'Emma';
    }

    if (!voices || voices.length === 0) return null;

    let exactMatch = voices.find(v => v.name.includes(requestedVoiceName) && (v.name.includes("Online") || v.name.includes("Multilingual")));
    if (!exactMatch) exactMatch = voices.find(v => v.name.includes(requestedVoiceName));

    if (!exactMatch) {
        const allowedMales = ["Brian", "Andrew", "William", "Remy", "Florian", "Giuseppe"];
        const allowedFemales = ["Ava", "Emma", "Vivienne", "Seraphina"];
        const isMale = allowedMales.includes(requestedVoiceName);
        
        const listToSearch = isMale ? allowedMales : allowedFemales;
        
        for (let name of listToSearch) {
             exactMatch = voices.find(v => v.name.includes(name) && (v.name.includes("Online") || v.name.includes("Multilingual")));
             if(exactMatch) break;
        }
        
        if (!exactMatch) {
            for (let name of listToSearch) {
                 exactMatch = voices.find(v => v.name.includes(name));
                 if(exactMatch) break;
            }
        }
    }
    
    return exactMatch || voices[0];
}

function toggleTTS() {
    if (isPlaying) {
        stopTTS();
    } else {
        isPlaying = false;
        window.speechSynthesis.cancel();
        setTimeout(() => {
            playTTSQueue(0);
        }, 100);
    }
}

function stopTTS() {
    isPlaying = false; 
    window.speechSynthesis.cancel();
    playBtn.innerText = '▶ Play Audio';
    playBtn.classList.remove('playing');
    document.querySelectorAll('.transcript-line').forEach(el => el.classList.remove('active'));
}

function playTTSQueue(index) {
    if (index >= speechQueue.length) {
        stopTTS();
        return;
    }

    isPlaying = true;
    playBtn.innerText = '■ Stop Audio';
    playBtn.classList.add('playing');

    const item = speechQueue[index];
    
    document.querySelectorAll('.transcript-line').forEach(el => el.classList.remove('active'));
    const activeLine = document.getElementById(item.lineId);
    if (activeLine) {
        activeLine.classList.add('active');
        activeLine.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    window.currentUtterance = new SpeechSynthesisUtterance(item.text);
    window.currentUtterance.lang = 'en-US'; // Force strict English language tag
    
    const selectedVoice = getVoiceForSpeaker(item.speaker, currentTest.id);
    if (selectedVoice) {
        window.currentUtterance.voice = selectedVoice;
    }
    
    window.currentUtterance.rate = 0.85; 

    window.currentUtterance.onend = () => {
        if (isPlaying) {
            playTTSQueue(index + 1);
        }
    };

    window.currentUtterance.onerror = (e) => {
        console.warn("Speech Synthesis skipped a line or errored:", e);
        if (isPlaying) {
            setTimeout(() => playTTSQueue(index + 1), 100);
        }
    };

    window.speechSynthesis.speak(window.currentUtterance);
}

function checkAnswers() {
    const inputs = document.querySelectorAll('.answer-input');
    let score = 0;
    let total = inputs.length;

    inputs.forEach(input => {
        const qId = input.getAttribute('data-id');
        const userAnswer = input.value.trim().toLowerCase().replace(/\.$/, '');
        const correctAnswer = currentTest.answers[qId] ? currentTest.answers[qId].toLowerCase().replace(/\.$/, '') : "";

        if (userAnswer === correctAnswer) {
            input.classList.remove('incorrect');
            input.classList.add('correct');
            score++;
        } else {
            input.classList.remove('correct');
            input.classList.add('incorrect');
        }
    });

    const scoreDisplay = document.getElementById('score-val');
    scoreDisplay.innerText = `${score}/${total}`;
    if(score === total) scoreDisplay.style.color = 'var(--success)';
    else scoreDisplay.style.color = '#fff';

    const feedback = document.getElementById('feedback-area');
    feedback.innerText = `You scored ${score} out of ${total}`;
    feedback.style.color = score === total ? 'var(--success)' : 'var(--error)';
    
    const answersSection = document.getElementById('answer-key-box');
    if (answersSection.style.display === 'none' || answersSection.style.display === '') {
        toggleSection('answer-key-box', 'btn-answers', 'Answer Key');
    }
    
    window.scrollTo(0, 0);
}
