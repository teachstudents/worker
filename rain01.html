<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zhongkao Grammar Mastery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: #000000;
            -webkit-font-smoothing: antialiased;
        }

        .selection-blue::selection {
            background: #dbeafe;
            color: #1e3a8a;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }

        .animate-pop {
            animation: pop 0.3s cubic-bezier(0.26, 0.53, 0.74, 1.48);
        }

        @keyframes pop {
            0% { transform: scale(0.95); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .option-btn:focus {
            outline: 3px solid #3b82f6;
            outline-offset: 2px;
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #facc15;
            animation: fall 3s linear forwards;
            pointer-events: none;
            z-index: 100;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        .completion-screen {
            background: linear-gradient(135deg, #1e3a8a 0%, #172554 100%);
        }

        .sparkle {
            position: absolute;
            pointer-events: none;
            background: #60a5fa;
            border-radius: 50%;
            mix-blend-mode: screen;
            animation: sparkle-anim 0.8s ease-out forwards;
            z-index: 20;
        }

        @keyframes sparkle-anim {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(2); opacity: 0; }
        }
    </style>
</head>

    <script>
        const apiKey = "";
        
        const topics = [
            { id: 'tenses', name: 'Tenses', icon: 'History', color: 'bg-blue-600', desc: 'Present, Past, Future & Continuous.' },
            { id: 'state_action', name: 'State vs Action', icon: 'Sparkles', color: 'bg-rose-600', desc: 'Meaning shifts in -ing form.' },
            { id: 'mental_states', name: 'Mental States', icon: 'Brain', color: 'bg-emerald-600', desc: 'Cognition: simple vs continuous nuance.' },
            { id: 'performative', name: 'Performative', icon: 'MessageSquare', color: 'bg-violet-600', desc: 'Speech acts (Promise, Suggest).' },
            { id: 'passive', name: 'Passive Voice', icon: 'Target', color: 'bg-purple-600', desc: 'Receiver focus & agent traps.' },
            { id: 'modals', name: 'Modals', icon: 'Zap', color: 'bg-red-600', desc: 'Ability, permission, deduction.' }
        ];

        const grammarRules = {
            'tenses': {
                title: "Mastering Tenses",
                content: "For secondary school students, the key is identifying keywords like 'since', 'for', and 'just now'. Watch out for actions interrupted in the past!",
                examples: [
                    { t: "Past Continuous", e: "I was doing my homework when the bell rang.", d: "Long action interrupted by a short event." },
                    { t: "Present Perfect", e: "I have known my best friend since primary school.", d: "State starting in the past and continuing." }
                ]
            },
            'state_action': {
                title: "State vs Action Verbs",
                content: "State verbs describe thoughts or ownership (like *own, believe*). They usually avoid -ing forms unless they become physical actions.",
                examples: [
                    { t: "Taste (State)", e: "The school lunch tastes delicious.", d: "Describing a fact about quality." },
                    { t: "Taste (Action)", e: "The chef is tasting the soup.", d: "A physical act of sampling." }
                ]
            },
            'mental_states': {
                title: "Mental Awareness",
                content: "Verbs like *realize* and *find* shift meaning. Simple tense shows a firm fact; Continuous shows a growing realization.",
                examples: [
                    { t: "Growing thought", e: "I'm realizing that the exam is tomorrow!", d: "Thought entering your mind right now." },
                    { t: "Firm knowledge", e: "I realize that I made a mistake.", d: "A settled, established fact." }
                ]
            },
            'performative': {
                title: "The Power of Words",
                content: "Performative verbs act as the action they name. In exams, use Present Simple for affirmative acts like *Promise* or *Apologise*.",
                examples: [
                    { t: "Promise", e: "I promise to return the library book.", d: "The act is done by saying the word." },
                    { t: "Negative exception", e: "I don't deny / I'm not denying the truth.", d: "Both forms work in negative sentences." }
                ]
            },
            'passive': {
                title: "The Receiver Focus",
                content: "Formula: *be + past participle*. Watch out for intransitive verbs like *happen* or *take place*—they can NEVER be passive!",
                examples: [
                    { t: "Classroom", e: "The blackboard is cleaned after every lesson.", d: "Receiver is more important than the doer." },
                    { t: "Trap Word", e: "The fire took place at night.", d: "Incorrect: 'was taken place'. No passive allowed." }
                ]
            },
            'modals': {
                title: "Modal Logic",
                content: "Modals show attitude. The biggest Zhongkao trap is *mustn't* (forbidden) vs *needn't* (optional).",
                examples: [
                    { t: "Forbidden", e: "You mustn't talk in the exam hall.", d: "It is strictly against the rules." },
                    { t: "Optional", e: "You needn't bring a pen; I have extra.", d: "You don't have to; it's not required." }
                ]
            }
        };

        const questionBank = [
            { q: "I _____ my homework when the phone suddenly rang.", options: ["did", "was doing", "have done", "am doing"], correct: 1, exp: "Past Continuous (-ing) for the long action happening when the phone rang." },
            { q: "Our school _____ a sports meeting every autumn since 2010.", options: ["holds", "held", "has held", "is holding"], correct: 2, exp: "'Since' + time point indicates Present Perfect (has/have + p.p.)." },
            { q: "By the time he arrived, the train _____ already left.", options: ["has", "was", "had", "is"], correct: 2, exp: "Past Perfect (had + p.p.) for action completed before another past event." },
            { q: "Look! The bus _____.", options: ["comes", "is coming", "came", "has come"], correct: 1, exp: "'Look!' indicates an action happening right now." },
            { q: "He _____ to Beijing twice so far.", options: ["has been", "has gone", "went", "goes"], correct: 0, exp: "'Has been to' means visited and returned." },
            { q: "Water _____ at 100 degrees Celsius.", options: ["boil", "boils", "is boiling", "boiled"], correct: 1, exp: "Scientific facts always use Present Simple." },
            { q: "I _____ breakfast when you called me this morning.", options: ["have", "had", "was having", "have had"], correct: 2, exp: "Action in progress at a specific past time." },
            { q: "A: What are you doing? B: I _____ the table size.", options: ["measure", "am measuring", "measured", "have measured"], correct: 1, exp: "This is an active physical action happening now." },
            { q: "The garden _____ 10 meters long.", options: ["measures", "is measuring", "measure", "measured"], correct: 0, exp: "Describing a fact/state about size." },
            { q: "I _____ my decision to sell my school computer.", options: ["regret", "am regretting", "was regretted", "have regretted"], correct: 1, exp: "Continuous shows a growing or temporary emotional awareness." },
            { q: "The soup _____ delicious.", options: ["tastes", "is tasting", "tasted", "tasting"], correct: 0, exp: "State verb describing quality." },
            { q: "He _____ the doctor tomorrow morning.", options: ["sees", "is seeing", "saw", "has seen"], correct: 1, exp: "'See' as an action (to meet) for future arrangements." },
            { q: "I _____ what you mean, but I don't agree.", options: ["understand", "am understanding", "understood", "understands"], correct: 0, exp: "Mental state verb." },
            { q: "I _____ taking the money. It wasn't me!", options: ["deny", "am denying", "denied", "was denying"], correct: 0, exp: "Performative verbs take Present Simple in affirmative." },
            { q: "The letter _____ already.", options: ["has sent", "has been sent", "was sent", "is sent"], correct: 1, exp: "Present Perfect Passive: has/have been + p.p." },
            { q: "Who was this book _____ by?", options: ["write", "wrote", "written", "writing"], correct: 2, exp: "Passive structure: be + subject + p.p." },
            { q: "Can this problem _____ easily?", options: ["solve", "be solved", "is solved", "solved"], correct: 1, exp: "Modal passive: modal + be + p.p." },
            { q: "Knives _____ for cutting things.", options: ["use", "are used", "used", "are using"], correct: 1, exp: "Passive use of an object." },
            { q: "You _____ smoke in the hospital.", options: ["mustn't", "needn't", "couldn't", "shouldn't"], correct: 0, exp: "Prohibition: forbidden by rules." },
            { q: "Need I finish it now? No, you _____.", options: ["mustn't", "needn't", "can't", "don't"], correct: 1, exp: "Answer 'Need I...?' with 'No, you needn't'." },
            { q: "I _____ run fast when I was a child.", options: ["can", "could", "must", "should"], correct: 1, exp: "Past ability." },
            { q: "The lights are on. He _____ be home.", options: ["must", "can", "should", "need"], correct: 0, exp: "Strong logical deduction." },
            { q: "You _____ finish homework before you go out.", options: ["can", "must", "might", "may"], correct: 1, exp: "Requirement." },
            { q: "Look! A new library _____ over there.", options: ["is built", "is being built", "will be built", "was built"], correct: 1, exp: "Action in progress right now in passive." },
            { q: "Great changes _____ in ten years.", options: ["have taken place", "have been taken place", "took place", "were taken place"], correct: 0, exp: "'Take place' is intransitive; NO passive." }
        ];

        const allQuestions = {
            'tenses': [...questionBank],
            'state_action': [...questionBank],
            'mental_states': [...questionBank],
            'performative': [...questionBank],
            'passive': [...questionBank],
            'modals': [...questionBank]
        };

        const praises = ["Spot on!", "You nailed it!", "Excellent precision!", "Clear reasoning!", "Great attention to detail!", "Incredible clarity!", "Right choice!", "Solid logic!", "Perfect execution!", "Excellent accuracy!", "Nice job!", "Very confident!", "Right answer!", "Well done!", "Precise answer!", "Great clarity!", "Excellent reasoning!", "Perfect understanding!", "You got it!", "Great execution!"];

        const icons = {
            'History': '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>',
            'Sparkles': '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>',
            'Brain': '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 4.44-2.54Z"/><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-4.44-2.54Z"/></svg>',
            'MessageSquare': '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>',
            'Target': '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>',
            'Zap': '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>'
        };

        const state = { view: 'dashboard', selectedTopic: null, currentIndex: 0, score: 0, userAnswer: null, expOpen: false, wrongAnswers: [] };

        const els = {
            viewDashboard: document.getElementById('view-dashboard'),
            viewPractice: document.getElementById('view-practice'),
            viewRules: document.getElementById('view-rules'),
            topicGrid: document.getElementById('topic-grid'),
            rulesContent: document.getElementById('rules-content'),
            headerTitle: document.getElementById('header-title'),
            scoreDisplay: document.getElementById('score-display'),
            scorePill: document.getElementById('score-pill'),
            btnHome: document.getElementById('btn-home'),
            btnBack: document.getElementById('btn-back'),
            btnNext: document.getElementById('btn-next'),
            navBackContainer: document.getElementById('nav-back-container'),
            navNextContainer: document.getElementById('nav-next-container'),
            btnToggleExp: document.getElementById('btn-toggle-exp'),
            expContent: document.getElementById('exp-content'),
            expText: document.getElementById('exp-text'),
            expArrow: document.getElementById('exp-arrow'),
            questionCounter: document.getElementById('question-counter'),
            questionText: document.getElementById('question-text'),
            optionsContainer: document.getElementById('options-container'),
            feedbackArea: document.getElementById('feedback-area'),
            completionModal: document.getElementById('completion-modal'),
            wrongAnswersReview: document.getElementById('wrong-answers-review'),
            btnRulesToPractice: document.getElementById('btn-rules-to-practice'),
            btnNewTopic: document.getElementById('btn-new-topic'),
            btnCloseModal: document.getElementById('btn-close-modal'),
            questionCard: document.getElementById('question-card'),
            topicBadge: document.getElementById('topic-badge')
        };

        async function speakPraise(text) {
            const prompt = `Say cheerfully and slowly at 85% speed: ${text}`;
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        generationConfig: {
                            responseModalities: ["AUDIO"],
                            speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Puck" } } }
                        }
                    })
                });
                const result = await response.json();
                const pcmData = result.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
                if (pcmData) {
                    const audioBuffer = pcmToWav(pcmData, 24000);
                    const audio = new Audio(URL.createObjectURL(new Blob([audioBuffer], { type: 'audio/wav' })));
                    audio.play();
                }
            } catch (e) {}
        }

        function pcmToWav(base64Pcm, sampleRate) {
            const buffer = Uint8Array.from(atob(base64Pcm), c => c.charCodeAt(0)).buffer;
            const wavHeader = new ArrayBuffer(44);
            const view = new DataView(wavHeader);
            view.setUint32(0, 0x52494646, false); view.setUint32(4, 36 + buffer.byteLength, true); view.setUint32(8, 0x57415645, false); view.setUint32(12, 0x666d7420, false); view.setUint32(16, 16, true); view.setUint16(20, 1, true); view.setUint16(22, 1, true); view.setUint32(24, sampleRate, true); view.setUint32(28, sampleRate * 2, true); view.setUint16(32, 2, true); view.setUint16(34, 16, true); view.setUint32(36, 0x64617461, false); view.setUint32(40, buffer.byteLength, true);
            const combined = new Uint8Array(wavHeader.byteLength + buffer.byteLength);
            combined.set(new Uint8Array(wavHeader), 0); combined.set(new Uint8Array(buffer), wavHeader.byteLength);
            return combined.buffer;
        }

        function createSparkles() {
            for (let i = 0; i < 15; i++) {
                const s = document.createElement('div');
                s.className = 'sparkle';
                s.style.width = s.style.height = (Math.random() * 15 + 5) + 'px';
                s.style.left = (Math.random() * 100) + '%';
                s.style.top = (Math.random() * 100) + '%';
                els.questionCard.appendChild(s);
                setTimeout(() => s.remove(), 800);
            }
        }

        function renderDashboard() {
            els.topicGrid.innerHTML = '';
            topics.forEach(topic => {
                const card = document.createElement('div');
                card.className = "group bg-white p-6 rounded-[2rem] border-2 border-slate-100 transition-all duration-300 text-left relative overflow-hidden flex flex-col justify-between animate-pop h-full";
                card.innerHTML = `
                    <div class="mb-4">
                        <div class="${topic.color} text-white p-3 rounded-2xl w-fit shadow-lg mb-4 group-hover:scale-110 transition-transform">
                            ${icons[topic.icon]}
                        </div>
                        <h4 class="text-xl font-black text-black mb-1">${topic.name}</h4>
                        <p class="text-black text-sm font-medium leading-tight opacity-70 mb-6">${topic.desc}</p>
                    </div>
                    <div class="flex flex-col gap-2">
                        <button onclick="startRules('${topic.id}')" class="w-full bg-slate-50 text-black py-3 rounded-2xl font-black text-xs hover:bg-black hover:text-white transition-all uppercase tracking-widest">Review Rules</button>
                        <button onclick="startPractice('${topic.id}')" class="w-full bg-blue-600 text-white py-3 rounded-2xl font-black text-xs hover:bg-blue-700 shadow-lg shadow-blue-100 transition-all uppercase tracking-widest">Start Practice</button>
                    </div>
                `;
                els.topicGrid.appendChild(card);
            });
        }

        function startRules(topicId) {
            const rule = grammarRules[topicId];
            els.headerTitle.textContent = "Rules: " + topics.find(t=>t.id===topicId).name;
            els.rulesContent.innerHTML = `
                <div class="space-y-4 text-center md:text-left">
                    <h3 class="text-4xl font-black text-black uppercase tracking-tighter">${rule.title}</h3>
                    <p class="text-xl text-slate-600 font-medium leading-relaxed">${rule.content}</p>
                </div>
                <div class="grid grid-cols-1 gap-4 mt-8">
                    ${rule.examples.map(ex => `
                        <div class="p-6 bg-slate-50 border-l-8 border-blue-600 rounded-r-2xl">
                            <h5 class="font-black text-blue-600 uppercase text-xs mb-1 tracking-widest">${ex.t}</h5>
                            <p class="text-lg font-black text-black mb-2">"${ex.e}"</p>
                            <p class="text-sm font-medium text-slate-500 italic">${ex.d}</p>
                        </div>
                    `).join('')}
                </div>
            `;
            els.btnRulesToPractice.onclick = () => startPractice(topicId);
            els.viewDashboard.classList.add('hidden');
            els.viewRules.classList.remove('hidden');
        }

        function startPractice(topicId) {
            state.selectedTopic = topicId;
            state.currentIndex = 0; state.score = 0; state.userAnswer = null; state.wrongAnswers = [];
            els.viewDashboard.classList.add('hidden'); els.viewRules.classList.add('hidden');
            els.viewPractice.classList.remove('hidden'); els.navBackContainer.classList.remove('hidden'); els.navNextContainer.classList.remove('hidden');
            const topic = topics.find(t => t.id === topicId);
            els.headerTitle.textContent = topic.name; 
            els.topicBadge.textContent = topic.name;
            updateScore(); 
            updatePracticeView();
        }

        function handleAnswer(index) {
            if (state.userAnswer !== null) return;
            const questions = allQuestions[state.selectedTopic];
            const q = questions[state.currentIndex];
            state.userAnswer = index;
            if (index === q.correct) {
                state.score += 10; updateScore(); createSparkles(); createConfetti();
                const p = praises[Math.floor(Math.random()*praises.length)]; speakPraise(p);
            } else {
                state.wrongAnswers.push({...q, userPick: index});
            }
            if (!state.expOpen) toggleExplanation(true);
            updatePracticeView();
        }

        function updatePracticeView() {
            const questions = allQuestions[state.selectedTopic];
            const q = questions[state.currentIndex];
            els.questionCounter.textContent = `Q ${state.currentIndex + 1}/${questions.length}`;
            els.questionText.textContent = q.q;
            els.btnBack.disabled = state.currentIndex === 0;
            els.btnBack.classList.toggle('opacity-30', state.currentIndex === 0);
            
            const answered = state.userAnswer !== null;
            els.btnNext.disabled = !answered;
            els.btnNext.onclick = (state.currentIndex === questions.length - 1) ? showCompletion : goNext;

            els.optionsContainer.innerHTML = '';
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = "option-btn p-4 md:p-6 rounded-3xl text-left border-4 transition-all font-black text-sm md:text-lg flex justify-between items-center";
                if (answered) {
                    if (i === q.correct) btn.classList.add('border-emerald-500', 'bg-emerald-50', 'text-emerald-700');
                    else if (i === state.userAnswer) btn.classList.add('border-red-500', 'bg-red-50', 'text-red-700');
                    else btn.classList.add('border-slate-100', 'bg-white', 'opacity-40');
                    btn.disabled = true;
                } else {
                    btn.classList.add('border-slate-100', 'bg-white', 'hover:border-black', 'hover:bg-slate-50', 'text-black');
                    btn.onclick = () => handleAnswer(i);
                }
                btn.innerHTML = `<span>${String.fromCharCode(65 + i)}. ${opt}</span>`;
                els.optionsContainer.appendChild(btn);
            });

            els.feedbackArea.innerHTML = answered ? `<div class="p-4 rounded-2xl font-black text-center animate-pop ${state.userAnswer === q.correct ? 'bg-emerald-100 text-emerald-800' : 'bg-red-100 text-red-800'}">${state.userAnswer === q.correct ? '✓ WELL DONE' : '✗ NOT QUITE'}</div>` : '';
            toggleExplanation(state.expOpen);
        }

        function toggleExplanation(force) {
            state.expOpen = typeof force === 'boolean' ? force : !state.expOpen;
            if (state.expOpen) {
                els.expContent.classList.remove('hidden');
                els.expArrow.style.transform = 'rotate(0deg)';
                const q = allQuestions[state.selectedTopic][state.currentIndex];
                els.expText.innerHTML = state.userAnswer !== null ? `<span class="block mb-2 font-black text-blue-800 uppercase text-xs tracking-tighter">Teacher's Note:</span> <span class="text-slate-800 font-bold italic">${q.exp}</span>` : "Select an answer to see why!";
            } else {
                els.expContent.classList.add('hidden');
                els.expArrow.style.transform = 'rotate(180deg)';
            }
        }

        function goNext() { state.currentIndex++; state.userAnswer = null; state.expOpen = false; updatePracticeView(); }
        function goBack() { state.currentIndex--; state.userAnswer = null; state.expOpen = false; updatePracticeView(); }

        function showCompletion() {
            document.getElementById('final-score').textContent = state.score;
            els.wrongAnswersReview.innerHTML = state.wrongAnswers.length > 0 ? `<h4 class="font-black text-yellow-300 text-sm mb-4 uppercase tracking-widest">Recap of Mistakes:</h4>` : `<h4 class="font-black text-emerald-300 text-sm mb-4 uppercase tracking-widest text-center">Perfect Performance! 🌟</h4>`;
            state.wrongAnswers.forEach(w => {
                const box = document.createElement('div');
                box.className = "bg-white/10 p-5 rounded-2xl border border-white/10 text-sm mb-4";
                box.innerHTML = `<p class="font-black mb-1">Q: ${w.q}</p>
                                <p class="text-red-400 font-bold mb-1">Picked: ${w.options[w.userPick]}</p>
                                <p class="text-emerald-400 font-bold">Correct: ${w.options[w.correct]}</p>
                                <p class="mt-3 text-white/60 italic text-xs leading-relaxed border-t border-white/10 pt-2">${w.exp}</p>`;
                els.wrongAnswersReview.appendChild(box);
            });
            els.completionModal.classList.remove('hidden');
        }

        function updateScore() { 
            els.scoreDisplay.textContent = state.score; 
            els.scorePill.classList.add('scale-110');
            setTimeout(()=>els.scorePill.classList.remove('scale-110'), 200);
        }

        function createConfetti() {
            const c = document.createElement('div');
            c.className = 'confetti';
            c.style.left = Math.random()*100 + 'vw';
            c.style.backgroundColor = ['#facc15','#3b82f6','#10b981','#f43f5e','#8b5cf6'][Math.floor(Math.random()*5)];
            c.style.animationDuration = (2 + Math.random()*2) + 's';
            document.body.appendChild(c);
            setTimeout(() => c.remove(), 3000);
        }

        els.btnHome.onclick = () => {
            state.view = 'dashboard'; els.viewPractice.classList.add('hidden'); els.viewRules.classList.add('hidden'); 
            els.viewDashboard.classList.remove('hidden'); els.navBackContainer.classList.add('hidden'); 
            els.navNextContainer.classList.add('hidden'); els.headerTitle.textContent = "Grammar Mastery"; 
            els.completionModal.classList.add('hidden'); renderDashboard();
        };
        els.btnBack.onclick = goBack;
        els.btnNext.onclick = goNext;
        els.btnToggleExp.onclick = () => toggleExplanation();
        els.btnNewTopic.onclick = () => els.btnHome.click();
        els.btnCloseModal.onclick = () => els.completionModal.classList.add('hidden');

        renderDashboard();
    </script>
</body>
</html>
