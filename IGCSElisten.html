<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Listening Database</title>
    
    <!-- Microsoft Azure Speech SDK -->
    <script src="https://cdn.jsdelivr.net/npm/microsoft-cognitiveservices-speech-sdk@latest/dist/microsoft.cognitiveservices.speech.sdk.bundle.js"></script>

    <style>
        :root {
            --primary: #005a9e;
            --bg: #f3f2f1;
            --paper: #ffffff;
            --text: #201f1e;
            --active-tab: #004578;
            --border: #edebe9;
            --correct-bg: #dff6dd;
            --correct-border: #107c10;
            --incorrect-bg: #fde7e9;
            --incorrect-border: #a80000;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 5px;
            font-size: 14px;
            line-height: 1.3;
        }

        .container {
            max-width: 980px; 
            margin: 0 auto;
            background: var(--paper);
            padding: 15px;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            min-height: 95vh;
        }

        /* Header & Controls */
        .header-controls {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
            background: #fff;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 2px solid var(--border);
            align-items: center;
            padding-bottom: 10px;
        }

        .header-title {
            margin-right: auto;
        }

        button, select {
            padding: 6px 10px;
            border: 1px solid #8a8886;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            background: #fff;
            color: var(--text);
            transition: background-color 0.2s;
        }

        button.primary-btn {
            background: var(--primary);
            color: #fff;
            border: none;
            font-weight: 600;
        }

        button.primary-btn:hover {
            background: var(--active-tab);
        }

        button.check-btn {
            background: #107c10;
            color: #fff;
            border: none;
            font-weight: bold;
        }

        button.check-btn:hover {
            background: #0b5a0b;
        }

        /* Main Layout Grid */
        .layout-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            transition: all 0.3s ease;
        }

        .layout-grid.show-transcript {
            grid-template-columns: 1fr 1fr;
        }

        @media (max-width: 768px) {
            .layout-grid.show-transcript {
                grid-template-columns: 1fr; 
            }
        }

        /* Questions Panel */
        .questions-panel {
            padding-right: 5px;
        }

        .question-block {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }

        .question-text {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--text);
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 6px;
        }

        .option-label {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
            font-size: 14px;
        }

        .option-label:hover {
            background: #e1dfdd;
        }

        .option-label input[type="radio"] {
            margin-right: 10px;
            transform: scale(1.1);
            cursor: pointer;
        }

        .option-label.correct {
            background-color: var(--correct-bg) !important;
            border-color: var(--correct-border) !important;
            color: #054b05;
            font-weight: bold;
        }

        .option-label.incorrect {
            background-color: var(--incorrect-bg) !important;
            border-color: var(--incorrect-border) !important;
            color: #790000;
        }

        .feedback-box {
            display: none;
            margin-top: 10px;
            padding: 10px 12px;
            background: #e1f0fe;
            border-left: 4px solid var(--primary);
            font-size: 13px;
            border-radius: 0 4px 4px 0;
            color: var(--text);
        }

        .feedback-box.show {
            display: block;
        }

        /* Transcript Panel */
        .transcript-panel {
            display: none;
            background: #faf9f8;
            padding: 15px;
            border-radius: 4px;
            border: 1px solid var(--border);
            height: fit-content;
            position: sticky;
            top: 60px;
            max-height: 85vh;
            overflow-y: auto;
        }

        .script-line {
            margin-bottom: 12px;
            font-size: 14px;
        }

        .audio-status {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .playing-indicator {
            display: none;
            width: 8px;
            height: 8px;
            background-color: #d13438;
            border-radius: 50%;
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            0% { opacity: 0.4; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }
    </style>
</head>

    let currentTestIndex = 0;
    let audioPlaying = false;
    let audioQueue = [];

    const allowedVoices = ["Emma", "Brian", "Ava", "Andrew", "William", "Remy", "Giuseppe", "Vivienne", "Florian", "Seraphina"];
    let voiceMap = {};

    function init() {
        loadVoices();
        window.speechSynthesis.onvoiceschanged = loadVoices;
        loadTest(0);
    }

    function loadVoices() {
        const voices = window.speechSynthesis.getVoices();
        if (voices.length === 0) return;

        allowedVoices.forEach(name => {
            let foundVoice = voices.find(v => v.name.includes(name) && v.name.includes("Online"));
            if (!foundVoice) foundVoice = voices.find(v => v.name.includes(name));
            if (!foundVoice) foundVoice = voices.find(v => (v.lang === 'en-US' || v.lang === 'en-GB'));
            voiceMap[name] = foundVoice;
        });
    }

    function loadTest(index) {
        currentTestIndex = parseInt(index);
        const questionsContainer = document.getElementById('questionsContainer');
        const transcriptContent = document.getElementById('transcriptContent');
        
        questionsContainer.innerHTML = '';
        transcriptContent.innerHTML = '';

        const testData = listeningBank[currentTestIndex];

        testData.forEach((q, idx) => {
            const block = document.createElement('div');
            block.className = 'question-block';
            
            let optionsHtml = '';
            q.options.forEach((opt, i) => {
                optionsHtml += `
                    <label class="option-label" data-q="${idx}" data-index="${i}">
                        <input type="radio" name="q${idx}" value="${i}">
                        ${String.fromCharCode(65 + i)}) ${opt}
                    </label>
                `;
            });

            block.innerHTML = `
                <div class="question-text">${q.stem}</div>
                <div class="options-grid">
                    ${optionsHtml}
                </div>
                <div class="feedback-box" id="feedback-${idx}">
                    ${q.explanation}
                </div>
            `;
            questionsContainer.appendChild(block);

            const scriptDiv = document.createElement('div');
            scriptDiv.className = 'script-line';
            let dialogueHtml = ``;
            
            q.dialogue.forEach(line => {
                dialogueHtml += `<div>${line.text}</div><br>`;
            });
            
            scriptDiv.innerHTML = dialogueHtml;
            transcriptContent.appendChild(scriptDiv);
        });

        document.getElementById('transcriptContainer').style.display = 'none';
        document.getElementById('layoutGrid').classList.remove('show-transcript');
        stopAudio();
    }

    function toggleTranscript() {
        const grid = document.getElementById('layoutGrid');
        const panel = document.getElementById('transcriptContainer');
        
        if (panel.style.display === 'block') {
            panel.style.display = 'none';
            grid.classList.remove('show-transcript');
        } else {
            panel.style.display = 'block';
            grid.classList.add('show-transcript');
        }
    }

    function checkAnswers() {
        const testData = listeningBank[currentTestIndex];
        let allAnswered = true;

        testData.forEach((q, idx) => {
            const selected = document.querySelector(`input[name="q${idx}"]:checked`);
            if (!selected) allAnswered = false;
        });

        if (!allAnswered) {
            alert("Please select an answer for all questions in this test before checking.");
            return;
        }

        let score = 0;

        testData.forEach((q, idx) => {
            const options = document.querySelectorAll(`label[data-q="${idx}"]`);
            const selectedVal = parseInt(document.querySelector(`input[name="q${idx}"]:checked`).value);
            const feedbackBox = document.getElementById(`feedback-${idx}`);

            options.forEach(lbl => {
                lbl.classList.remove('correct', 'incorrect'); 
                const optIdx = parseInt(lbl.getAttribute('data-index'));
                
                if (optIdx === q.correctIndex) {
                    lbl.classList.add('correct');
                } else if (optIdx === selectedVal && selectedVal !== q.correctIndex) {
                    lbl.classList.add('incorrect');
                }
            });

            if (selectedVal === q.correctIndex) score++;
            feedbackBox.classList.add('show'); 
        });

        alert(`You scored ${score} out of ${testData.length} on this test!`);
    }

    function toggleAudio() {
        if (audioPlaying) {
            stopAudio();
        } else {
            playAudio();
        }
    }

    function stopAudio() {
        audioPlaying = false;
        audioQueue = [];
        window.speechSynthesis.cancel();
        updateAudioUI();
    }

    function playAudio() {
        if (!('speechSynthesis' in window)) {
            alert("Your browser does not support the Web Speech API required for audio.");
            return;
        }

        window.speechSynthesis.cancel(); 
        audioQueue = [];
        
        const testData = listeningBank[currentTestIndex];

        testData.forEach((q, idx) => {
            audioQueue.push({ speaker: "System", text: `${q.stem}` });
            
            q.dialogue.forEach(line => {
                audioQueue.push({ speaker: line.speaker, text: line.text });
            });
            
            audioQueue.push({ speaker: "System", text: `Pause.` }); 
        });

        audioPlaying = true;
        updateAudioUI();
        processQueue();
    }

    function processQueue() {
        if (!audioPlaying) return;
        
        if (audioQueue.length === 0) {
            stopAudio();
            return;
        }

        const currentLine = audioQueue.shift();
        const utterance = new SpeechSynthesisUtterance(currentLine.text);
        
        utterance.rate = 0.85; 
        
        if (currentLine.speaker !== "System" && voiceMap[currentLine.speaker]) {
            utterance.voice = voiceMap[currentLine.speaker];
        } else {
            if (voiceMap["William"]) {
                utterance.voice = voiceMap["William"];
            } else {
                const fallbackVoice = window.speechSynthesis.getVoices().find(v => v.lang.startsWith('en'));
                if(fallbackVoice) utterance.voice = fallbackVoice;
            }
        }

        utterance.onstart = () => {
            document.getElementById('audioStatusText').innerText = "";
        };

        utterance.onend = () => {
            setTimeout(() => {
                processQueue();
            }, 500); 
        };

        utterance.onerror = (e) => {
            console.warn("TTS Error:", e);
            processQueue(); 
        };

        window.speechSynthesis.speak(utterance);
    }

    function updateAudioUI() {
        const btn = document.getElementById('playBtn');
        const indicator = document.getElementById('playingIndicator');
        const statusText = document.getElementById('audioStatusText');
        
        if (audioPlaying) {
            btn.innerHTML = '⏸';
            indicator.style.display = 'block';
        } else {
            btn.innerHTML = '▶';
            indicator.style.display = 'none';
            statusText.innerText = "";
        }
    }

    window.addEventListener('load', init);
