<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Gerund vs. Infinitive | Beijing ZhongKao Grade 9</title>
    <style>

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);

        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);

        .score-container { display: flex; align-items: center; gap: 15px; }
        .trophy-btn {

            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);

        }
        .trophy-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(246, 211, 101, 0.6);
        }
        .trophy-icon { font-size: 24px; margin-right: 10px; }
        .shimmer-container {
            position: absolute; top: 100%; left: 50%;
            transform: translateX(-50%); width: 100px; height: 150px;
            pointer-events: none;
        }
        .shimmer {
            position: absolute; width: 10px; height: 10px;
            background: radial-gradient(circle, #fff, transparent);
            border-radius: 50%; animation: shimmerFloat 2s ease-in-out infinite;
            opacity: 0;
        }
        @keyframes shimmerFloat {
            0% { transform: translateY(0) scale(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-100px) scale(1.5); opacity: 0; }
        }
        .content { padding: 40px; }
        
        .welcome-title {

        .pattern-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));

        }
        .pattern-card {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            color: white; padding: 25px; border-radius: 15px;
            cursor: pointer; transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);

        }
        .pattern-card:hover {

            box-shadow: 0 12px 30px rgba(37, 117, 252, 0.3);
        }
        .pattern-card h3 { font-size: 1.25em; margin-bottom: 10px; }

        .pattern-card .question-count {
            background: rgba(255,255,255,0.25); padding: 5px 12px;
            border-radius: 20px; font-size: 0.8em;
            display: inline-block; margin-top: 12px;
            font-weight: 600;
        }
        .pattern-card::before {
            content: ''; position: absolute; top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: rotate 10s linear infinite;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .study-content {
            background: #f0f4f8; padding: 30px;
            border-radius: 15px; margin-bottom: 30px;
        }
        .study-content h2 {
            color: #1e3c72; margin-bottom: 20px;

        }
        .rule-box {
            background: white; padding: 20px; border-radius: 10px;
            margin: 15px 0; border-left: 5px solid #2575fc;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .rule-box h4 { color: #2575fc; margin-bottom: 10px; }
        .pattern-box {
            background: #e1f5fe; padding: 15px; border-radius: 8px;
            margin: 10px 0; border: 2px dashed #4facfe;
            font-family: 'Courier New', monospace; font-size: 0.95em;
            color: #03396c;
        }
        .example-row {
            display: flex; gap: 15px; margin: 10px 0; flex-wrap: wrap;
        }
        .example-box {
            flex: 1; min-width: 200px; padding: 12px;
            border-radius: 8px; font-size: 0.95em;
        }
        .example-box.correct {
            background: #d4edda; border: 2px solid #28a745; color: #155724;
        }
        .example-box.incorrect {
            background: #f8d7da; border: 2px solid #dc3545; color: #721c24;
        }
        .verb-list {
            display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0;
        }
        .verb-tag {
            background: #2575fc; color: white; padding: 5px 12px;
            border-radius: 20px; font-size: 0.85em; font-weight: 500;
        }
        .start-practice-btn {
            background: linear-gradient(135deg, #00b09b, #96c93d);

            border-radius: 50px; font-size: 18px; font-weight: 700;

            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(0, 176, 155, 0.4);
        }
        .start-practice-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(0, 176, 155, 0.6);
        }
        
        .progress-container {
            background: #e0e0e0; border-radius: 10px;
            padding: 5px; margin-bottom: 20px;
        }
        .progress-bar {
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            height: 25px; border-radius: 8px;

        }
        .question-container {
            background: #f8f9fa; padding: 30px;
            border-radius: 15px; margin-bottom: 20px;
            border: 1px solid #e1e8ed;

        .question-number {

            border-left: 4px solid #4facfe;
        }
        .options-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px; margin-bottom: 20px;
        }
        .option-btn {
            background: white; border: 3px solid #2575fc;
            padding: 24px 30px; border-radius: 12px;
            font-size: 1.6em; cursor: pointer; color: #333;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            position: relative; overflow: hidden;
            text-align: left; font-weight: 500;
        }
        .option-btn:hover:not(:disabled) {
            background: #2575fc; color: white;
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(37, 117, 252, 0.3);
        }
        .option-btn.correct {
            background: #28a745 !important; border-color: #28a745 !important;
            color: white !important; animation: pulse 0.5s ease;
        }
        .option-btn.incorrect {
            background: #dc3545 !important; border-color: #dc3545 !important;
            color: white !important; animation: shake 0.5s ease;
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .option-btn:disabled { cursor: not-allowed; opacity: 0.7; }
        .feedback-box {
            background: #fff3cd; border: 2px solid #ffc107;
            padding: 20px; border-radius: 10px;
            margin-top: 20px; display: none;
            animation: slideIn 0.5s ease;
        }
        .feedback-box.show { display: block; }
        .feedback-box.correct-feedback { background: #d4edda; border-color: #28a745; }
        .feedback-box.incorrect-feedback { background: #f8d7da; border-color: #dc3545; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        .feedback-title { font-weight: 700; margin-bottom: 10px; font-size: 1.15em; }
        .feedback-text { line-height: 1.6; color: #333; }
        
        .results-content {
            background: #f8f9fa; padding: 40px;
            border-radius: 15px; margin: 30px auto;
            max-width: 600px;
            text-align: center;
            border: 1px solid #e1e8ed;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .final-score {
            font-size: 3.5em; color: #2575fc;
            font-weight: 700; margin: 20px 0;
        }
        .score-message {
            font-size: 1.4em; color: #1e3c72;
            margin-bottom: 30px; font-weight: 600;
        }
        .restart-btn {
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            color: white; border: none; padding: 15px 40px;
            border-radius: 50px; font-size: 18px;
            font-weight: 700; cursor: pointer;
            margin: 10px; transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(37, 117, 252, 0.4);
        }
        .restart-btn:hover { transform: scale(1.05); }
        
        /* Fixed CSS class logic to properly hide pages */
        .hidden { display: none !important; }
        
        @media (max-width: 768px) {
            .options-grid { grid-template-columns: 1fr; }
            .header { padding: 10px; gap: 10px; }
            .content { padding: 20px; }
            .welcome-title { font-size: 1.5em; }
            .question-text { font-size: 1.5em; padding: 20px; }
            .option-btn { font-size: 1.2em; padding: 15px 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="nav-buttons">
                <button class="nav-btn" id="backBtn" onclick="goBack()">← Back</button>
                <button class="nav-btn" id="homeBtn" onclick="goHome()">🏠 Home</button>
                <button class="nav-btn" id="nextBtn" onclick="nextQuestion()" disabled>Next →</button>
            </div>
            <div class="score-container">
                <button class="trophy-btn" id="trophyBtn" onclick="addManualPoints()">
                    <span class="trophy-icon">🏆</span><span id="scoreDisplay">0</span> pts
                </button>
                <div class="shimmer-container" id="shimmerContainer"></div>
            </div>
        </div>

        <div class="content">
            <!-- Home Page starts visible (no hidden class) -->
            <div class="home-page" id="homePage">
                <h1 class="welcome-title">🎓 Gerund vs. Infinitive Mastery</h1>
                <div class="pattern-grid" id="patternGrid"></div>
            </div>

            <!-- Other pages start with 'hidden' class to prevent overlapping -->
            <div class="study-page hidden" id="studyPage">
                <div class="study-content" id="studyContent"></div>
                <button class="start-practice-btn" onclick="startPractice()">🚀 Start Practice (10 Questions)</button>
            </div>

            <div class="practice-page hidden" id="practicePage">
                <div class="progress-container">
                    <div class="progress-bar" id="progressBar" style="width: 0%;">0/10</div>
                </div>
                <div class="question-container">
                    <div class="question-number" id="questionNumber">Question 1 of 10</div>
                    <div class="question-text" id="questionText">Loading...</div>
                    <div class="options-grid" id="optionsGrid"></div>
                    <div class="feedback-box" id="feedbackBox">
                        <div class="feedback-title" id="feedbackTitle"></div>
                        <div class="feedback-text" id="feedbackText"></div>
                    </div>
                </div>
            </div>

            <div class="results-page hidden" id="resultsPage">
                <div class="results-content">
                    <h2 style="color: #2c3e50; margin-bottom: 20px;">🎉 Complete!</h2>
                    <div class="final-score" id="finalScore">0/10</div>
                    <div class="score-message" id="scoreMessage">Great effort!</div>
                    <button class="restart-btn" onclick="restartPractice()">🔄 Try Again</button>
                    <button class="restart-btn" onclick="goHome()">🏠 Menu</button>
                </div>
            </div>
        </div>
    </div>

<script>
// === VERIFIED GERUND/INFINITIVE QUESTION BANKS ===
// All questions pre-verified for natural collocations and accurate grammar patterns

const verifiedQuestions = {
    // Pattern 1: Verbs + Gerund Only
    gerundOnly: {
        default: [
            { q: "I enjoy _____ books in my free time.", options: ["read", "to read", "reading", "reads"], correct: 2, feedback: "'Enjoy' is always followed by a gerund (-ing form). 'I enjoy reading' is the natural collocation." },
            { q: "She avoids _____ late for class.", options: ["be", "to be", "being", "been"], correct: 2, feedback: "'Avoid' requires a gerund. 'Being late' is the correct phrase; 'to be late' is incorrect after 'avoid'." },
            { q: "Have you finished _____ your homework?", options: ["do", "to do", "doing", "does"], correct: 2, feedback: "'Finish' is followed by a gerund. 'Finished doing' is the standard pattern in English." },
            { q: "Do you mind _____ the window?", options: ["open", "to open", "opening", "opens"], correct: 2, feedback: "'Mind' + gerund is used for polite requests. 'Do you mind opening...?' is the natural question form." },
            { q: "He suggested _____ a break.", options: ["take", "to take", "taking", "took"], correct: 2, feedback: "'Suggest' is followed by a gerund. 'Suggested taking' is correct; 'suggested to take' is a common error." },
            { q: "They practice _____ English every day.", options: ["speak", "to speak", "speaking", "speaks"], correct: 2, feedback: "'Practice' requires a gerund. 'Practice speaking' is the natural verb pattern for skill development." },
            { q: "We considered _____ to a new school.", options: ["move", "to move", "moving", "moved"], correct: 2, feedback: "'Consider' + gerund means 'think about doing'. 'Considered moving' is correct." },
            { q: "She keeps _____ the same mistake.", options: ["make", "to make", "making", "makes"], correct: 2, feedback: "'Keep' + gerund means 'continue doing'. 'Keeps making' shows repeated action." },
            { q: "I miss _____ with my old classmates.", options: ["study", "to study", "studying", "studied"], correct: 2, feedback: "'Miss' + gerund expresses longing for a past activity. 'Miss studying' is the natural pattern." },
            { q: "He denied _____ the rules.", options: ["break", "to break", "breaking", "broke"], correct: 2, feedback: "'Deny' is followed by a gerund. 'Denied breaking' is the correct grammatical structure." }
        ],
        school: [
            { q: "I enjoy _____ notes during English class.", options: ["take", "to take", "taking", "takes"], correct: 2, feedback: "'Enjoy' + gerund. 'Taking notes' is a natural school activity collocation." },
            { q: "She avoids _____ questions in front of the class.", options: ["ask", "to ask", "asking", "asked"], correct: 2, feedback: "'Avoid' + gerund. 'Asking questions' is the natural phrase; context shows shyness." },
            { q: "Have you finished _____ the grammar exercises?", options: ["do", "to do", "doing", "does"], correct: 2, feedback: "'Finish' + gerund. 'Finished doing exercises' is standard academic language." },
            { q: "Do you mind _____ your textbook to page 20?", options: ["open", "to open", "opening", "opens"], correct: 2, feedback: "'Mind' + gerund for polite classroom requests. Natural teacher-student interaction." },
            { q: "The teacher suggested _____ in study groups.", options: ["work", "to work", "working", "worked"], correct: 2, feedback: "'Suggest' + gerund. 'Suggested working' is the correct pattern for recommendations." },
            { q: "We practice _____ pronunciation every morning.", options: ["improve", "to improve", "improving", "improves"], correct: 2, feedback: "'Practice' + gerund. 'Practice improving' shows skill development focus." },
            { q: "They considered _____ their study schedule.", options: ["change", "to change", "changing", "changed"], correct: 2, feedback: "'Consider' + gerund for thinking about options. 'Considered changing' is natural." },
            { q: "He keeps _____ the same grammar mistake.", options: ["make", "to make", "making", "makes"], correct: 2, feedback: "'Keep' + gerund for repeated actions. Common error pattern in language learning." },
            { q: "I miss _____ with my study group last year.", options: ["meet", "to meet", "meeting", "met"], correct: 2, feedback: "'Miss' + gerund for past activities. 'Miss meeting' expresses nostalgia appropriately." },
            { q: "She denied _____ the homework late.", options: ["submit", "to submit", "submitting", "submitted"], correct: 2, feedback: "'Deny' + gerund. 'Denied submitting' is the correct grammatical structure for accusations." }
        ]
    },
    
    // Pattern 2: Verbs + Infinitive Only
    infinitiveOnly: {
        default: [
            { q: "I want _____ a better student.", options: ["be", "to be", "being", "been"], correct: 1, feedback: "'Want' is followed by an infinitive. 'Want to be' expresses desire for future state." },
            { q: "She hopes _____ to university next year.", options: ["go", "to go", "going", "goes"], correct: 1, feedback: "'Hope' + infinitive expresses future aspiration. 'Hopes to go' is the natural pattern." },
            { q: "They decided _____ harder for the exam.", options: ["study", "to study", "studying", "studies"], correct: 1, feedback: "'Decide' requires an infinitive. 'Decided to study' shows a firm choice." },
            { q: "He plans _____ abroad after graduation.", options: ["travel", "to travel", "traveling", "traveled"], correct: 1, feedback: "'Plan' + infinitive for future intentions. 'Plans to travel' is the standard collocation." },
            { q: "She promised _____ her best.", options: ["do", "to do", "doing", "does"], correct: 1, feedback: "'Promise' is followed by an infinitive. 'Promised to do' expresses commitment." },
            { q: "They offered _____ us with the project.", options: ["help", "to help", "helping", "helps"], correct: 1, feedback: "'Offer' + infinitive for voluntary assistance. 'Offered to help' is polite and natural." },
            { q: "We agreed _____ the rules.", options: ["follow", "to follow", "following", "follows"], correct: 1, feedback: "'Agree' requires an infinitive. 'Agreed to follow' shows mutual decision." },
            { q: "He refused _____ the answer.", options: ["give", "to give", "giving", "gives"], correct: 1, feedback: "'Refuse' + infinitive expresses denial of action. 'Refused to give' is correct." },
            { q: "She learned _____ English when she was young.", options: ["speak", "to speak", "speaking", "speaks"], correct: 1, feedback: "'Learn' + infinitive for acquiring skills. 'Learned to speak' is the natural pattern." },
            { q: "You need _____ more practice.", options: ["get", "to get", "getting", "gets"], correct: 1, feedback: "'Need' + infinitive expresses necessity. 'Need to get' is the standard advice pattern." }
        ],
        school: [
            { q: "I want _____ my English grade this semester.", options: ["improve", "to improve", "improving", "improves"], correct: 1, feedback: "'Want' + infinitive for academic goals. 'Want to improve' is natural student language." },
            { q: "She hopes _____ into a good high school.", options: ["get", "to get", "getting", "gets"], correct: 1, feedback: "'Hope' + infinitive for educational aspirations. 'Hopes to get' is common ZhongKao context." },
            { q: "They decided _____ extra English classes.", options: ["take", "to take", "taking", "takes"], correct: 1, feedback: "'Decide' + infinitive for study choices. 'Decided to take' shows intentional planning." },
            { q: "He plans _____ for the ZhongKao exam all summer.", options: ["study", "to study", "studying", "studies"], correct: 1, feedback: "'Plan' + infinitive for exam preparation. 'Plans to study' is relevant academic language." },
            { q: "She promised _____ her homework on time.", options: ["finish", "to finish", "finishing", "finishes"], correct: 1, feedback: "'Promise' + infinitive for commitments. 'Promised to finish' is natural student-teacher context." },
            { q: "The teacher offered _____ us after class.", options: ["help", "to help", "helping", "helps"], correct: 1, feedback: "'Offer' + infinitive for academic support. 'Offered to help' is polite classroom interaction." },
            { q: "We agreed _____ the study schedule.", options: ["follow", "to follow", "following", "follows"], correct: 1, feedback: "'Agree' + infinitive for group decisions. 'Agreed to follow' shows cooperation." },
            { q: "He refused _____ the test answers.", options: ["share", "to share", "sharing", "shares"], correct: 1, feedback: "'Refuse' + infinitive for ethical choices. 'Refused to share' is appropriate academic integrity context." },
            { q: "She learned _____ effectively for exams.", options: ["study", "to study", "studying", "studies"], correct: 1, feedback: "'Learn' + infinitive for skill acquisition. 'Learned to study' is natural educational language." },
            { q: "You need _____ more vocabulary for the exam.", options: ["learn", "to learn", "learning", "learns"], correct: 1, feedback: "'Need' + infinitive for academic advice. 'Need to learn' is practical study guidance." }
        ]
    },
    
    // Pattern 3: Both with Meaning Change
    bothMeaningChange: {
        default: [
            { q: "I stopped _____ coffee because it kept me awake.", options: ["drink", "to drink", "drinking", "drank"], correct: 2, feedback: "'Stop + -ing' means quit an activity. 'Stopped drinking' = no longer drink coffee." },
            { q: "She stopped _____ a rest during her long walk.", options: ["have", "to have", "having", "had"], correct: 1, feedback: "'Stop + to + verb' means pause to do something. 'Stopped to have' = paused walking in order to rest." },
            { q: "I remember _____ my first English teacher.", options: ["meet", "to meet", "meeting", "met"], correct: 2, feedback: "'Remember + -ing' recalls a past memory. 'Remember meeting' = I have a memory of that event." },
            { q: "Remember _____ your homework tomorrow.", options: ["bring", "to bring", "bringing", "brought"], correct: 1, feedback: "'Remember + to + verb' means don't forget to do. 'Remember to bring' = future obligation." },
            { q: "I forgot _____ the door when I left.", options: ["lock", "to lock", "locking", "locked"], correct: 1, feedback: "'Forget + to + verb' means didn't do it. 'Forgot to lock' = the door is still unlocked." },
            { q: "I'll never forget _____ the Great Wall for the first time.", options: ["see", "to see", "seeing", "saw"], correct: 2, feedback: "'Forget + -ing' means lose a memory. 'Forget seeing' = the memory would be lost (but I won't lose it!)." },
            { q: "He tried _____ the problem, but it was too hard.", options: ["solve", "to solve", "solving", "solved"], correct: 1, feedback: "'Try + to + verb' means make an effort. 'Tried to solve' = attempted but may have failed." },
            { q: "She tried _____ a new study method last week.", options: ["use", "to use", "using", "used"], correct: 2, feedback: "'Try + -ing' means experiment with. 'Tried using' = tested a method to see if it works." },
            { q: "I regret _____ you bad news.", options: ["tell", "to tell", "telling", "told"], correct: 1, feedback: "'Regret + to + verb' is formal for announcing bad news. 'Regret to tell' is polite formal usage." },
            { q: "She regrets _____ so much time on social media.", options: ["spend", "to spend", "spending", "spent"], correct: 2, feedback: "'Regret + -ing' means feel sorry about a past action. 'Regrets spending' = wishes she hadn't done it." }
        ],
        school: [
            { q: "I stopped _____ late because I need more sleep for class.", options: ["stay up", "to stay up", "staying up", "stayed up"], correct: 2, feedback: "'Stop + -ing' = quit the habit. 'Stopped staying up' = no longer stay up late." },

// Pattern category metadata
const patternCategories = [
    { id: 'gerundOnly', title: '🔹 Verbs + Gerund Only', desc: 'enjoy, avoid, finish, mind, suggest...' },
    { id: 'infinitiveOnly', title: '🔹 Verbs + Infinitive Only', desc: 'want, hope, decide, plan, promise...' },

    { id: 'adjectiveInfinitive', title: '🔹 Adjectives + Infinitive', desc: 'happy to, easy to, important to...' },
    { id: 'gerundAsSubject', title: '🔹 Gerund as Subject', desc: 'Learning English takes time...' }

// Game state
let state = {
    page: 'home',
    category: null,
    questions: [],
    current: 0,
    score: 0,
    points: 0,
    answered: false,
    history: ['home']
};

// Initialize
document.addEventListener('DOMContentLoaded', () => {
    renderGrid();
    updateNav();
});

function renderGrid() {
    const grid = document.getElementById('patternGrid');
    grid.innerHTML = '';
    patternCategories.forEach(cat => {
        const card = document.createElement('div');
        card.className = 'pattern-card';
        card.innerHTML = `<h3>${cat.title}</h3><p>${cat.desc}</p>`;
        card.onclick = () => selectCategory(cat.id);
        grid.appendChild(card);
    });
}

function selectCategory(id) {
    state.category = patternCategories.find(c => c.id === id);
    state.history.push('study');
    showPage('study');
    renderStudy();
    updateNav();
}

function renderStudy() {
    const cat = state.category;
    const content = document.getElementById('studyContent');
    
    let html = `<h2>📖 ${cat.title}</h2>`;
    
    // Rules based on category
    const rules = {
        gerundOnly: [
            { title: 'Gerund-Only Verbs', content: 'These verbs are ALWAYS followed by -ing form.', pattern: 'verb + -ing', verbs: ['enjoy', 'avoid', 'finish', 'mind', 'suggest', 'practice', 'consider', 'keep', 'miss', 'deny'] },
            { title: 'Why Gerund?', content: 'These verbs describe experiences, habits, or completed actions.', pattern: 'I enjoy [activity]. | She avoids [situation].', example: 'I enjoy reading. (NOT: I enjoy to read.)' },
            { title: 'Common Errors', content: 'Never use infinitive after these verbs.', pattern: '✗ I enjoy to read. ✓ I enjoy reading.', tip: 'Memorize the verb list; practice with topic vocabulary.' }
        ],
        infinitiveOnly: [
            { title: 'Infinitive-Only Verbs', content: 'These verbs are ALWAYS followed by to + base verb.', pattern: 'verb + to + base verb', verbs: ['want', 'hope', 'decide', 'plan', 'promise', 'offer', 'agree', 'refuse', 'learn', 'need'] },
            { title: 'Why Infinitive?', content: 'These verbs express intentions, decisions, or future-oriented actions.', pattern: 'I want [to achieve something]. | She decided [to do something].', example: 'She wants to study. (NOT: She wants studying.)' },
            { title: 'Common Errors', content: 'Never use gerund after these verbs.', pattern: '✗ I want studying. ✓ I want to study.', tip: 'Think: Is it about a future goal? → Use infinitive.' }
        ],
        bothMeaningChange: [
            { title: 'Verbs with Two Patterns', content: 'These verbs can take gerund OR infinitive, but meaning changes.', pattern: 'verb + -ing ≠ verb + to + verb', verbs: ['stop', 'remember', 'forget', 'try', 'regret'] },
            { title: 'Stop: Quit vs. Pause', content: 'stop + -ing = quit the activity | stop + to + verb = pause in order to do', pattern: 'I stopped smoking. (quit) | I stopped to smoke. (paused)', example: 'She stopped eating. (no longer eats) | She stopped to eat. (paused to have a meal)' },
            { title: 'Remember/Forget: Past vs. Future', content: 'remember/forget + -ing = memory of past | remember/forget + to + verb = future obligation', pattern: 'I remember locking the door. (past memory) | Remember to lock the door. (future task)', tip: '-ing = looking back | to + verb = looking forward' }
        ],
        prepositionGerund: [
            { title: 'Preposition Rule', content: 'After ANY preposition, use gerund (-ing form).', pattern: 'preposition + -ing', examples: ['interested in learning', 'good at playing', 'afraid of making', 'think about changing'] },

            </div>

    });
    
    html += `
        <div class="example-row">
            <div class="example-box correct"><strong>✓ Natural:</strong> ${getExample(cat.id, true)}</div>

        </div>

    content.innerHTML = html;
}

function getExample(catId, correct) {
    const examples = {
        gerundOnly: correct ? "I enjoy studying English." : "I enjoy to study English.",
        infinitiveOnly: correct ? "She wants to improve her speaking." : "She wants improving her speaking.",
        bothMeaningChange: correct ? "I stopped smoking. (quit)" : "I stopped to smoking. (incorrect)",
        prepositionGerund: correct ? "She is good at playing piano." : "She is good at play piano.",
        adjectiveInfinitive: correct ? "It's important to practice daily." : "It's important practicing daily.",
        gerundAsSubject: correct ? "Learning vocabulary takes time." : "To learning vocabulary takes time."
    };
    return examples[catId];
}

function startPractice() {
    const catId = state.category.id;
    const bank = verifiedQuestions[catId];
    
    // Combine general and school-specific questions, shuffle for variety
    const source = [...bank.default, ...(bank.school || [])].sort(() => 0.5 - Math.random());
    state.questions = source.slice(0, 10);
    
    state.current = 0;
    state.answered = false;
    state.score = 0;
    state.history.push('practice');
    showPage('practice');
    renderQuestion();
    updateNav();
}

function renderQuestion() {
    const q = state.questions[state.current];
    document.getElementById('questionNumber').textContent = `Question ${state.current + 1} of 10`;
    document.getElementById('questionText').textContent = q.q;
    document.getElementById('progressBar').style.width = `${((state.current + 1) / 10) * 100}%`;
    document.getElementById('progressBar').textContent = `${state.current + 1}/10`;
    
    const grid = document.getElementById('optionsGrid');
    grid.innerHTML = '';
    q.options.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = opt;
        btn.onclick = () => selectAnswer(i);
        grid.appendChild(btn);
    });
    
    document.getElementById('feedbackBox').classList.remove('show', 'correct-feedback', 'incorrect-feedback');
    state.answered = false;
    updateNav();
}

function selectAnswer(index) {
    if (state.answered) return;
    state.answered = true;
    
    const q = state.questions[state.current];
    const buttons = document.querySelectorAll('.option-btn');
    
    buttons.forEach((btn, i) => {
        btn.disabled = true;
        if (i === q.correct) btn.classList.add('correct');
        else if (i === index) btn.classList.add('incorrect');
    });
    
    const feedback = document.getElementById('feedbackBox');
    const title = document.getElementById('feedbackTitle');
    const text = document.getElementById('feedbackText');
    
    if (index === q.correct) {
        state.score++;
        state.points += 10;
        feedback.classList.add('correct-feedback');
        title.textContent = '✓ Correct!';
        createShimmer();
    } else {
        feedback.classList.add('incorrect-feedback');
        title.textContent = '✗ Incorrect';
    }
    
    text.textContent = q.feedback;
    feedback.classList.add('show');
    
    updateScore();
    updateNav();
}

function nextQuestion() {
    if (state.current < 9) {
        state.current++;
        state.answered = false;
        renderQuestion();
    } else {
        showResults();
    }
    updateNav();
}

function showResults() {
    state.history.push('results');
    showPage('results');
    const pct = (state.score / 10) * 100;
    document.getElementById('finalScore').textContent = `${state.score}/10`;
    
    let msg = '';
    if (pct >= 90) msg = '🌟 Outstanding! Excellent mastery!';
    else if (pct >= 75) msg = '👏 Great job! Very good understanding!';
    else if (pct >= 60) msg = '💪 Good effort! Keep practicing!';
    else msg = '📚 Keep studying! You can improve!';
    
    document.getElementById('scoreMessage').textContent = msg;
    updateNav();
}

function restartPractice() {
    state.current = 0;
    state.answered = false;
    state.score = 0;
    const catId = state.category.id;
    const bank = verifiedQuestions[catId];
    
    // Combine general and school-specific questions, shuffle for variety
    const source = [...bank.default, ...(bank.school || [])].sort(() => 0.5 - Math.random());
    state.questions = source.slice(0, 10);
    
    state.history.push('practice');
    showPage('practice');
    renderQuestion();
    updateNav();
}

function goBack() {
    if (state.history.length > 1) {
        state.history.pop();
        showPage(state.history[state.history.length - 1]);
        updateNav();
    }
}

function goHome() {
    state.history = ['home'];
    state.category = null;
    showPage('home');
    updateNav();
}

function showPage(name) {
    ['homePage', 'studyPage', 'practicePage', 'resultsPage'].forEach(id => {
        document.getElementById(id).classList.add('hidden');
    });
    document.getElementById(name + 'Page').classList.remove('hidden');
    state.page = name;
}

function updateNav() {
    document.getElementById('backBtn').disabled = state.history.length <= 1;
    const next = document.getElementById('nextBtn');
    if (state.page === 'practice') {
        next.disabled = !state.answered;
        next.textContent = state.current < 9 ? 'Next →' : 'Finish 🏁';
    } else {
        next.disabled = true;
    }
}

function updateScore() {
    document.getElementById('scoreDisplay').textContent = state.points;
}

function addManualPoints() {
    state.points += 10;
    updateScore();
    createShimmer();
}

function createShimmer() {
    const container = document.getElementById('shimmerContainer');
    for (let i = 0; i < 5; i++) {
        const s = document.createElement('div');
        s.className = 'shimmer';
        s.style.left = `${Math.random() * 80 + 10}%`;
        s.style.animationDelay = `${Math.random() * 0.5}s`;
        container.appendChild(s);
        setTimeout(() => s.remove(), 2000);
    }
}
</script>
</body>
</html>
