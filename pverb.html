<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate English Grammar Challenge</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tone.js for sound effects -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>

    <style>
        html, body {
            height: 100%;
            overflow: hidden; 
            background-color: #f8fafc; /* slate-50 */
        }
        body {
            font-family: 'Inter', sans-serif;
            background-image: radial-gradient(circle at top right, #e0f2fe, #f8fafc);
        }
        .hidden { display: none !important; }
        .view-container { 
            transition: opacity 0.4s ease-in-out, transform 0.4s ease-in-out; 
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .view-container.hidden { opacity: 0; transform: scale(0.98); pointer-events: none; position: absolute; top: 0; left: 0; width: 100%; }

        @keyframes flash-correct {
            0%, 100% { box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.5); border-color: #22c55e; background-color: #f0fdf4; }
            50% { box-shadow: 0 0 0 0px rgba(34, 197, 94, 0); }
        }
        .flash-correct { animation: flash-correct 0.7s ease-out; }

        @keyframes flash-incorrect {
            0%, 100% { box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.5); border-color: #ef4444; background-color: #fef2f2; }
            50% { box-shadow: 0 0 0 0px rgba(239, 68, 68, 0); }
        }
        .flash-incorrect { animation: flash-incorrect 0.7s ease-out; }

        /* Custom Scrollbar for review section */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="flex items-center justify-center p-2 sm:p-4 text-slate-800 relative">

    <div id="app-container" class="w-full max-w-7xl h-full max-h-[98vh] p-4 sm:p-8 bg-white/95 backdrop-blur-md rounded-2xl shadow-2xl flex flex-col relative overflow-hidden">
        
        <!-- View: Main Menu (Mode Selection) -->
        <div id="main-menu-view" class="view-container text-center w-full relative z-10 overflow-y-auto min-h-0">
            <div class="py-4">
                <div class="inline-block bg-sky-100 text-sky-800 px-4 py-2 rounded-full text-sm sm:text-base font-bold mb-4 tracking-wide uppercase">Secondary English Hub</div>
                <h1 class="text-3xl sm:text-5xl font-extrabold mb-4 text-slate-800">Ultimate Grammar Challenge</h1>
                <p id="main-prompt" class="mb-6 sm:mb-8 text-slate-500 text-base sm:text-xl font-medium">Please load your audio resources and enter your name.</p>
                
                <div class="flex justify-center mb-8 sm:mb-10">
                    <input type="text" id="username" placeholder="Enter Your Student Name" class="w-full max-w-md px-6 py-3 sm:py-4 text-lg sm:text-xl border-2 border-slate-200 rounded-xl focus:ring-4 focus:ring-sky-100 focus:border-sky-500 transition-all outline-none text-center shadow-sm font-semibold">
                </div>

                <h3 class="text-xl sm:text-2xl font-bold text-slate-700 mb-4 sm:mb-6">Select a Learning Module:</h3>
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 sm:gap-6">
                    <!-- Story Mode -->
                    <button data-mode="story" class="mode-button group relative flex flex-col items-center p-6 sm:p-8 bg-white border-2 border-slate-200 rounded-2xl hover:border-emerald-500 hover:shadow-lg transition-all duration-300 disabled:opacity-50 disabled:cursor-not-allowed">
                        <div class="w-14 h-14 sm:w-16 sm:h-16 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mb-3 sm:mb-4 group-hover:scale-110 transition-transform">
                            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
                        </div>
                        <h4 class="font-bold text-slate-800 text-xl sm:text-2xl">Story Mode</h4>
                        <p class="text-sm sm:text-base text-slate-500 mt-1 sm:mt-2 font-medium">Leo & Elsa's Hike</p>
                    </button>

                    <!-- Phrasal Verbs -->
                    <button data-mode="phrasal" class="mode-button group relative flex flex-col items-center p-6 sm:p-8 bg-white border-2 border-slate-200 rounded-2xl hover:border-amber-500 hover:shadow-lg transition-all duration-300 disabled:opacity-50 disabled:cursor-not-allowed">
                        <div class="w-14 h-14 sm:w-16 sm:h-16 bg-amber-100 text-amber-600 rounded-full flex items-center justify-center mb-3 sm:mb-4 group-hover:scale-110 transition-transform">
                            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                        </div>
                        <h4 class="font-bold text-slate-800 text-xl sm:text-2xl">Phrasal Verbs</h4>
                        <p class="text-sm sm:text-base text-slate-500 mt-1 sm:mt-2 font-medium">Everyday Expressions</p>
                    </button>

                    <!-- General Past Tense -->
                    <button data-mode="general" class="mode-button group relative flex flex-col items-center p-6 sm:p-8 bg-white border-2 border-slate-200 rounded-2xl hover:border-sky-500 hover:shadow-lg transition-all duration-300 disabled:opacity-50 disabled:cursor-not-allowed">
                        <div class="w-14 h-14 sm:w-16 sm:h-16 bg-sky-100 text-sky-600 rounded-full flex items-center justify-center mb-3 sm:mb-4 group-hover:scale-110 transition-transform">
                            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12h4l2-9 5 18 2-9h5"/></svg>
                        </div>
                        <h4 class="font-bold text-slate-800 text-xl sm:text-2xl">Past Tense</h4>
                        <p class="text-sm sm:text-base text-slate-500 mt-1 sm:mt-2 font-medium">General Listening</p>
                    </button>
                </div>
            </div>
        </div>

        <!-- View: Level Selection -->
        <div id="level-selection-view" class="view-container hidden text-center w-full relative z-10 overflow-y-auto min-h-0">
            <div class="py-4">
                <button id="back-to-main-btn" class="absolute top-0 left-0 text-slate-600 hover:text-slate-900 bg-slate-100 hover:bg-slate-200 px-4 py-2 rounded-xl flex items-center gap-2 font-bold text-base sm:text-lg transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg> Back
                </button>
                <h2 id="level-select-title" class="text-3xl sm:text-5xl font-extrabold mb-4 text-slate-800 mt-12 sm:mt-10">Select CEFR Level</h2>
                <p class="mb-8 sm:mb-10 text-slate-500 text-lg sm:text-xl font-medium">Choose the appropriate difficulty for your studies.</p>
                
                <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 sm:gap-6">
                    <button data-level="A1" class="level-btn text-white font-bold py-6 sm:py-8 rounded-2xl shadow-md hover:shadow-2xl transform hover:-translate-y-2 transition-all duration-300 bg-emerald-500 hover:bg-emerald-600">
                        <span class="text-4xl sm:text-5xl block mb-1 sm:mb-2">A1</span><span class="block text-lg sm:text-xl font-medium opacity-90">Beginner</span>
                    </button>
                    <button data-level="A2" class="level-btn text-white font-bold py-6 sm:py-8 rounded-2xl shadow-md hover:shadow-2xl transform hover:-translate-y-2 transition-all duration-300 bg-sky-500 hover:bg-sky-600">
                        <span class="text-4xl sm:text-5xl block mb-1 sm:mb-2">A2</span><span class="block text-lg sm:text-xl font-medium opacity-90">Elementary</span>
                    </button>
                    <button data-level="B1" class="level-btn text-white font-bold py-6 sm:py-8 rounded-2xl shadow-md hover:shadow-2xl transform hover:-translate-y-2 transition-all duration-300 bg-amber-500 hover:bg-amber-600">
                        <span class="text-4xl sm:text-5xl block mb-1 sm:mb-2">B1</span><span class="block text-lg sm:text-xl font-medium opacity-90">Intermediate</span>
                    </button>
                    <button data-level="B2" class="level-btn text-white font-bold py-6 sm:py-8 rounded-2xl shadow-md hover:shadow-2xl transform hover:-translate-y-2 transition-all duration-300 bg-rose-500 hover:bg-rose-600">
                        <span class="text-4xl sm:text-5xl block mb-1 sm:mb-2">B2</span><span class="block text-lg sm:text-xl font-medium opacity-90">Upper-Int.</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- View: Game -->
        <div id="game-view" class="view-container hidden w-full relative z-10 flex flex-col h-full min-h-0">
            <div class="flex-shrink-0">
                
                <!-- DEDICATED ALWAYS-VISIBLE HEADER BAR WITH STATS & ACTIONS -->
                <div class="flex flex-col lg:flex-row justify-between items-center bg-slate-100 p-3 sm:p-4 rounded-2xl mb-6 shadow-sm border border-slate-200 w-full gap-3">
                    
                    <!-- Left: Navigation (Back/Home) -->
                    <div class="flex gap-2 w-full lg:w-auto justify-center lg:justify-start">
                        <button id="back-btn" class="px-4 py-2 sm:px-5 sm:py-3 bg-white hover:bg-slate-50 text-slate-700 font-bold rounded-xl shadow-sm border border-slate-200 transition-all flex items-center gap-1.5 sm:gap-2 text-sm sm:text-base">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg> <span class="hidden sm:inline">Back</span>
                        </button>
                        <button id="home-btn" class="px-4 py-2 sm:px-5 sm:py-3 bg-white hover:bg-slate-50 text-slate-700 font-bold rounded-xl shadow-sm border border-slate-200 transition-all flex items-center gap-1.5 sm:gap-2 text-sm sm:text-base">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg> <span class="hidden sm:inline">Home</span>
                        </button>
                    </div>

                    <!-- Center: Stats (Timer, Score, Progress, Streak) -->
                    <div class="flex flex-wrap items-center justify-center gap-4 sm:gap-6 bg-white px-4 sm:px-8 py-3 rounded-xl shadow-sm border border-slate-200 w-full lg:w-auto">
                        <!-- Timer -->
                        <div class="flex items-center gap-2 text-sky-600 font-bold text-base sm:text-lg" title="Time Remaining">
                            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                            <span id="game-countdown-display">05:00</span>
                        </div>
                        
                        <div class="w-px h-6 bg-slate-200 hidden sm:block"></div>
                        
                        <!-- Score -->
                        <div class="flex items-center gap-2 text-emerald-600 font-bold text-base sm:text-lg" title="Score">
                            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                            <span id="score">0</span>
                        </div>

                        <div class="w-px h-6 bg-slate-200 hidden sm:block"></div>
                        
                        <!-- Progress -->
                        <div class="flex items-center gap-2 text-slate-600 font-bold text-base sm:text-lg" title="Question Progress">
                            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                            <span><span id="question-count">0</span><span class="text-slate-400">/<span id="total-questions">20</span></span></span>
                        </div>

                        <div class="w-px h-6 bg-slate-200 hidden sm:block"></div>

                        <!-- Streak -->
                        <div id="streak-wrapper" class="flex items-center gap-2 text-amber-600 font-bold text-base sm:text-lg transition-colors" title="Current Streak">
                            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
                            <span id="streak-display">Streak: 0</span>
                        </div>
                    </div>
                    
                    <!-- Right: Actions (Repeat, Next) -->
                    <div class="flex gap-2 w-full lg:w-auto justify-center lg:justify-end">
                        <button id="repeat-button" class="px-4 py-2 sm:px-5 sm:py-3 bg-white hover:bg-slate-50 text-sky-600 font-bold rounded-xl shadow-sm border border-slate-200 transition-all flex items-center gap-1.5 sm:gap-2 text-sm sm:text-base disabled:opacity-50" disabled>
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                            <span class="hidden sm:inline">Repeat</span>
                        </button>
                        <button id="header-next-btn" class="px-6 py-2 sm:px-8 sm:py-3 bg-sky-500 text-white font-bold rounded-xl shadow-md transition-all flex items-center gap-1.5 sm:gap-2 opacity-50 cursor-not-allowed text-sm sm:text-base" disabled>
                            <span class="hidden sm:inline">Next Question</span><span class="sm:hidden">Next</span> <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
                        </button>
                    </div>
                </div>
            </div>
            
            <div id="question-area" class="w-full flex-grow flex flex-col items-center relative bg-white border-2 border-slate-200 rounded-2xl shadow-sm p-6 sm:p-10 min-h-0 overflow-y-auto">
                
                <p id="question-text" class="w-full mb-8 text-2xl sm:text-4xl font-extrabold text-center text-slate-800 min-h-[80px] flex items-center justify-center leading-relaxed flex-shrink-0 mt-4"></p>
                
                <div id="answer-options" class="grid grid-cols-1 sm:grid-cols-2 gap-4 sm:gap-6 w-full max-w-4xl flex-shrink-0"></div>
                
                <div id="feedback" aria-live="polite" class="mt-8 font-extrabold text-center min-h-[36px] text-xl sm:text-2xl transition-colors flex-shrink-0 w-full"></div>
                
                <!-- Displayed securely below everything else as a block -->
                <div id="example-sentence-feedback" class="hidden mt-6 w-full max-w-4xl p-5 sm:p-8 bg-sky-50 border-2 border-sky-100 rounded-2xl text-center shadow-sm flex-shrink-0"></div>
            </div>
        </div>

        <!-- View: Game Over -->
        <div id="game-over-view" class="view-container hidden text-center w-full relative z-10 overflow-y-auto min-h-0">
            <div class="flex flex-col h-full py-4">
                <div class="flex-shrink-0 mb-4 sm:mb-6">
                    <h2 class="text-3xl sm:text-5xl font-extrabold text-slate-800 mb-2 sm:mb-3">Module Complete!</h2>
                    <p id="game-over-message" class="text-slate-500 text-lg sm:text-xl font-medium mb-6 sm:mb-8"></p>
                    
                    <div class="grid grid-cols-2 gap-4 sm:gap-6 mb-6 sm:mb-8">
                        <div class="bg-sky-50 border-2 border-sky-100 p-4 sm:p-6 rounded-2xl shadow-md">
                            <div class="text-sm sm:text-lg text-sky-600 font-bold uppercase tracking-widest mb-1 sm:mb-2">Final Score</div>
                            <span id="final-score" class="font-black text-4xl sm:text-6xl text-sky-900">0</span>
                        </div>
                        <div class="bg-emerald-50 border-2 border-emerald-100 p-4 sm:p-6 rounded-2xl shadow-md">
                            <div class="text-sm sm:text-lg text-emerald-600 font-bold uppercase tracking-widest mb-1 sm:mb-2">Accuracy</div>
                            <span id="final-accuracy" class="font-black text-4xl sm:text-6xl text-emerald-900">0%</span>
                        </div>
                    </div>
                </div>

                <div id="review-section" class="text-left flex-grow min-h-[150px] sm:min-h-[200px] flex flex-col bg-white border-2 border-slate-200 rounded-2xl p-4 sm:p-6 shadow-sm">
                    <h4 class="text-xl sm:text-2xl font-extrabold text-slate-700 mb-3 sm:mb-4 flex items-center gap-2 sm:gap-3">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12h4l2-9 5 18 2-9h5"/></svg>
                        Performance Review
                    </h4>
                    <div id="incorrect-answers-list" class="space-y-3 sm:space-y-4 flex-grow overflow-y-auto pr-2 max-h-[250px] sm:max-h-[300px]"></div>
                </div>

                <div class="mt-6 sm:mt-8 flex-shrink-0">
                    <button id="play-again-button" class="w-full bg-slate-800 hover:bg-slate-700 text-white font-extrabold py-4 sm:py-5 px-8 rounded-xl shadow-xl hover:shadow-2xl transform hover:-translate-y-1 transition-all duration-300 text-xl sm:text-2xl">Return to Main Menu</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- DATA BANKS ---
        // 1. Story Mode Data (Leo & Elsa - Sequential)
        const storyData = [
            { verb: "woke", sentence: "It is morning. Leo and Elsa woke up. A new day!", distractors: ["waked", "woken"] },
            { verb: "found", sentence: "Elsa found a map. The map is for the woods.", distractors: ["finded", "finding"] },
            { verb: "packed", sentence: "Leo packed a bag. He puts food in the bag.", distractors: ["packt", "packing"] },
            { verb: "waved", sentence: "They waved 'goodbye' to their dog.", distractors: ["wove", "waving"] },
            { verb: "went", sentence: "They went to the woods. The sun is nice.", distractors: ["gone", "goed"] },
            { verb: "saw", sentence: "Oh look! They saw a big, red mushroom.", distractors: ["seen", "seeing"] },
            { verb: "bent", sentence: "Leo bent down. He looks at the mushroom.", distractors: ["bended", "bending"] },
            { verb: "took", sentence: "Elsa took a photo with her camera.", distractors: ["taked", "taken"] },
            { verb: "reached", sentence: "Then, they reached a blue river.", distractors: ["reacht", "reaching"] },
            { verb: "walked", sentence: "They walked on an old bridge.", distractors: ["walken", "walking"] },
            { verb: "discovered", sentence: "They discovered old stones and old walls.", distractors: ["discoverd", "discovering"]},
            { verb: "gave", sentence: "A paper gave them a question.", distractors: ["given", "giving"]},
            { verb: "thought", sentence: "They thought for a long time. Then, an idea!", distractors: ["thinked", "thinking"]},
            { verb: "showed", sentence: "The idea showed a new path to a waterfall.", distractors: ["shown", "showing"]},
            { verb: "came", sentence: "It is night. They came home. Good job!", distractors: ["comed", "coming"]}
        ];

        // 2. Phrasal Verbs Data (20 per level for Secondary Students)
        const phrasalData = {
            A1: [
                { verb: "wake up", sentence: "Please wake up, it's 8 AM.", distractors: ["stand by", "come in"] },
                { verb: "turn on", sentence: "Can you turn on the light?", distractors: ["put down", "take off"] },
                { verb: "turn off", sentence: "Don't forget to turn off the TV.", distractors: ["get up", "go out"] },
                { verb: "sit down", sentence: "Please sit down.", distractors: ["stand up", "go out"] },
                { verb: "put on", sentence: "I need to put on my coat.", distractors: ["take off", "clean up"] },
                { verb: "take off", sentence: "She will take off her shoes.", distractors: ["put on", "write down"] },
                { verb: "go out", sentence: "Let's go out tonight.", distractors: ["come in", "lie down"] },
                { verb: "come back", sentence: "He came back from his trip.", distractors: ["went out", "woke up"] },
                { verb: "pick up", sentence: "Can you pick up that book?", distractors: ["put down", "throw away"] },
                { verb: "look for", sentence: "I am looking for my keys.", distractors: ["looking at", "cleaning up"] },
                { verb: "wash up", sentence: "I need to wash up before dinner.", distractors: ["get up", "sit down"] },
                { verb: "write down", sentence: "Please write down your name.", distractors: ["stand up", "go out"] },
                { verb: "stand up", sentence: "Please stand up when the teacher enters.", distractors: ["lie down", "sit down"] },
                { verb: "lie down", sentence: "I am tired, I will lie down.", distractors: ["stand up", "go out"] },
                { verb: "put down", sentence: "Put down the heavy box.", distractors: ["pick up", "turn on"] },
                { verb: "throw away", sentence: "Don't throw away that paper.", distractors: ["keep on", "put on"] },
                { verb: "fill in", sentence: "You need to fill in this form.", distractors: ["take off", "clean up"] },
                { verb: "clean up", sentence: "Let's clean up the room.", distractors: ["make up", "go out"] },
                { verb: "get on", sentence: "I need to get on the bus.", distractors: ["get off", "take off"] },
                { verb: "get off", sentence: "We get off the train here.", distractors: ["get on", "put on"] }
            ],
            A2: [
                { verb: "find out", sentence: "Can you find out what time the movie starts?", distractors: ["give up", "hold on"] },
                { verb: "give up", sentence: "Don't give up! You can do it.", distractors: ["find out", "hold on"] },
                { verb: "grow up", sentence: "They grew up in a small town.", distractors: ["broke up", "set up"] },
                { verb: "hold on", sentence: "Hold on, I'm coming.", distractors: ["Give up", "Go on"] },
                { verb: "look after", sentence: "He is looking after the children.", distractors: ["looking for", "looking forward to"] },
                { verb: "look forward to", sentence: "She is looking forward to the vacation.", distractors: ["looking after", "looking up"] },
                { verb: "make up", sentence: "He made up a funny story.", distractors: ["grew up", "broke up"] },
                { verb: "run into", sentence: "I ran into an old friend yesterday.", distractors: ["ran out of", "set up"] },

        function switchView(viewToShow) {

        // --- AUDIO SYSTEM ---
        function initAudio() {
            if (typeof Tone !== 'undefined') {
                state.audio.synth = new Tone.Synth({
                    oscillator: { type: 'sine' },
                    envelope: { attack: 0.01, decay: 0.2, sustain: 0.1, release: 0.2 }
                }).toDestination();
            }
        }

        function populateVoiceList() {
            if (state.audio.voicesPopulated) return;
            state.audio.voices = speechSynthesis.getVoices();
            
            if (state.audio.voices.length > 0) {
                // EXCLUSIVE target voices for Microsoft Multilingual Online
                const targetNames = [
                    "giuseppe", "vivienne", "florian", "seraphina", 
                    "emma", "brian", "ava", "andrew", "william", "remy"
                ];
                
                // STRICT FILTERING: Must be Microsoft Online/Multilingual AND match one of the target names
                state.audio.preferredVoices = state.audio.voices.filter(v => {
                    const voiceName = v.name.toLowerCase();
                    const isMicrosoftMultilingual = voiceName.includes('microsoft') && 
                                                    (voiceName.includes('online') || voiceName.includes('multilingual'));
                    const matchesTargetName = targetNames.some(target => voiceName.includes(target));
                    
                    return isMicrosoftMultilingual && matchesTargetName;
                });

                state.audio.voicesPopulated = true;

                if (state.audio.preferredVoices.length === 0) {
                    console.warn("STRICT TTS MODE: Target Microsoft Multilingual Online voices not found. Using fallback text-only mode.");
                    console.log("Available voices on this device:", state.audio.voices.map(v => v.name));
                    dom.mainPrompt.innerHTML = '<span class="text-rose-500 font-bold">Audio unavailable:</span> Target Microsoft voices not found. Game will play in text-only mode.';
                    state.audio.fallbackMode = true;
                } else {
                    state.audio.isReady = true;
                    state.audio.fallbackMode = false;
                    dom.mainPrompt.textContent = 'Ready! Enter your name and select a module.';
                }
                
                dom.modeButtons.forEach(btn => btn.disabled = false);
            }
        }

        function initSpeechSynthesis() {
            if ('speechSynthesis' in window) {
                populateVoiceList();
                if (speechSynthesis.onvoiceschanged !== undefined) {
                    speechSynthesis.onvoiceschanged = populateVoiceList;
                }
                // Hard-fallback timeout in case voices fail to trigger the changed event or no voices exist
                setTimeout(() => {
                    if (!state.audio.voicesPopulated) {
                        state.audio.fallbackMode = true;
                        dom.mainPrompt.innerHTML = '<span class="text-rose-500 font-bold">Audio unavailable</span> - running in text-only mode.';
                        dom.modeButtons.forEach(btn => btn.disabled = false);
                    }
                }, 1500);
            } else {
                state.audio.fallbackMode = true;
                dom.mainPrompt.innerHTML = '<span class="text-rose-500 font-bold">Error:</span> Text-to-speech not supported. Game will run in text-only mode.';
                dom.modeButtons.forEach(btn => btn.disabled = false);
            }
        }

        function speak(text, voice, callback) {
            // Cancel any ongoing speech
            if ('speechSynthesis' in window && speechSynthesis.speaking) {
                speechSynthesis.cancel();
            }

            if (!('speechSynthesis' in window) || !text || state.audio.fallbackMode) {
                if (callback) setTimeout(callback, 0);
                return;
            }

            const onceCallback = callback ? (() => { let c=false; return () => { if (!c) { c=true; callback(); } }; })() : () => {};
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.voice = voice;
            
            // USER CONSTRAINT: Always slow down speech strictly to 85%
            utterance.rate = 0.85; 

            utterance.onend = onceCallback;
            utterance.onerror = () => onceCallback();
            
            dom.repeatButton.disabled = true;
            
            setTimeout(() => speechSynthesis.speak(utterance), 100); 
        }

        // --- GAME LOGIC ---
        function shuffleArray(array) {
            let arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        async function handleModeSelection(mode) {
            const nameInput = dom.usernameInput.value.trim().slice(0, 20); // Limit length
            if (!nameInput || nameInput.length < 2) {
                dom.usernameInput.classList.add('border-rose-500', 'ring-rose-200');
                dom.usernameInput.focus();
                return;
            }
            dom.usernameInput.classList.remove('border-rose-500', 'ring-rose-200');
            state.username = nameInput;
            state.mode = mode;

            // Unlock AudioContext on first interaction
            if(typeof Tone !== 'undefined' && Tone.context.state !== 'running') {
                await Tone.start();
            }

            if (mode === 'story') {
                startRound(null); // Story mode doesn't need CEFR levels
            } else {
                switchView(dom.levelSelectionView);
            }
        }

        function startRound(level) {
            clearInterval(state.timers.game); 
            
            state.level = level;
            state.score = 0;
            state.questionsAnswered = 0;
            state.correctAnswers = 0;
            state.correctStreak = 0;
            state.incorrectAnswers = [];
            
            // Build question pool
            let pool = [];
            if (state.mode === 'story') {
                pool = [...storyData];
            } else if (state.mode === 'phrasal') {
                pool = shuffleArray(phrasalData[level]).slice(0, config.QUESTIONS_PER_ROUND);
            } else if (state.mode === 'general') {
                pool = shuffleArray(generalData[level]).slice(0, config.QUESTIONS_PER_ROUND);
            }

            state.shuffledQuestions = pool;
            dom.totalQuestionsDisplay.textContent = pool.length;

            updateGameStats();
            startOverallTimer();
            switchView(dom.gameView);
            loadNextQuestion();
        }

        function startOverallTimer() {
            clearInterval(state.timers.game);
            let timeLeft = config.GAME_DURATION_SECONDS;
            state.timers.game = setInterval(() => {
                timeLeft--;
                const minutes = String(Math.floor(timeLeft / 60)).padStart(2, '0');
                const seconds = String(timeLeft % 60).padStart(2, '0');
                dom.gameCountdownDisplay.textContent = `${minutes}:${seconds}`;
                if (timeLeft <= 0) {
                    endRound("Time's up!");
                }
            }, 1000);
        }

        function generateDistractors(correctVerb) {
            const allVerbs = state.shuffledQuestions.map(q => q.verb);
            const distractors = new Set();
            while (distractors.size < 3 && distractors.size < allVerbs.length - 1) {
                const randomVerb = allVerbs[Math.floor(Math.random() * allVerbs.length)];
                if (randomVerb !== correctVerb) distractors.add(randomVerb);
            }
            
            if (distractors.size < 3) {
                if(state.mode === 'phrasal') distractors.add("get up").add("look for").add("go out");
                else distractors.add("was").add("did").add("went");
                distractors.delete(correctVerb); 
            }
            return Array.from(distractors).slice(0, 3);
        }

        function loadNextQuestion() {
            if (state.questionsAnswered >= state.shuffledQuestions.length) {
                endRound("Module Complete!");
                return;
            }

            state.currentQuestion = state.shuffledQuestions[state.questionsAnswered];
            
            const verbRegex = new RegExp('\\b' + state.currentQuestion.verb + '\\b', 'i');
            let gappedSentence = state.currentQuestion.sentence.replace(verbRegex, "__________");
            if (gappedSentence === state.currentQuestion.sentence) {
                gappedSentence = state.currentQuestion.sentence.replace(new RegExp(state.currentQuestion.verb, 'i'), "__________");
            }
            dom.questionTextDisplay.innerHTML = gappedSentence;
            
            // Assign a voice strictly from the allowed preferred voices
            const voiceIndex = state.questionsAnswered % (state.audio.preferredVoices.length || 1);
            state.currentQuestion.voice = state.audio.preferredVoices.length > 0 ? state.audio.preferredVoices[voiceIndex] : null;

            // Hide repeat button entirely if in fallback mode
            dom.repeatButton.style.display = state.audio.fallbackMode ? 'none' : 'flex';

            // Reset UI
            dom.feedbackDisplay.textContent = '';
            dom.exampleSentenceFeedback.classList.add('hidden');
            dom.answerOptionsContainer.innerHTML = '';
            
            dom.headerNextBtn.disabled = true;
            dom.headerNextBtn.classList.add('opacity-50', 'cursor-not-allowed');
            dom.headerNextBtn.classList.remove('hover:bg-sky-600', 'animate-pulse', 'ring-4', 'ring-sky-200');

            if (!state.audio.fallbackMode && state.currentQuestion.voice) {
                speak(state.currentQuestion.sentence, state.currentQuestion.voice, () => {
                    dom.repeatButton.disabled = false;
                    renderOptions();
                });
            } else {
                renderOptions();
            }
        }

        function renderOptions() {
            const { verb, distractors } = state.currentQuestion;
            let optionsPool = (distractors && distractors.length > 0) ? [...distractors] : generateDistractors(verb);
            let options = shuffleArray([verb, ...optionsPool.slice(0,3)]); // Ensure 4 options max

            dom.answerOptionsContainer.innerHTML = '';
            options.forEach(optionText => {
                const btn = document.createElement('button');
                btn.className = 'w-full p-3 sm:p-4 text-lg sm:text-xl font-extrabold text-slate-700 bg-white border-4 border-slate-200 rounded-2xl hover:border-sky-400 hover:bg-sky-50 transition-all duration-200 transform hover:-translate-y-1 shadow-sm disabled:opacity-60 disabled:transform-none disabled:cursor-not-allowed';
                btn.textContent = optionText;
                btn.onclick = () => submitAnswer(optionText, verb, btn);
                dom.answerOptionsContainer.appendChild(btn);
            });
        }
        
        function submitAnswer(selected, correct, button) {
            const isCorrect = selected === correct;

            // Disable all buttons, highlight correct
            Array.from(dom.answerOptionsContainer.children).forEach(btn => {
                btn.disabled = true;
                if (btn.textContent === correct) {
                    btn.classList.add('!bg-emerald-500', '!text-white', '!border-emerald-600');
                }
            });

            let feedbackMsg = '';
            if (isCorrect) {
                try { if (state.audio.synth && Tone.context.state === 'running') state.audio.synth.triggerAttackRelease("C5", "8n"); } catch(e) { console.warn("Audio block", e); }
                state.score += 10;
                state.correctAnswers++;
                state.correctStreak++;
                button.classList.add('flash-correct');
                feedbackMsg = "Spot on!";
                dom.feedbackDisplay.className = 'mt-8 font-extrabold text-center min-h-[36px] text-xl sm:text-2xl text-emerald-600 flex-shrink-0 w-full';
            } else {
                try { if (state.audio.synth && Tone.context.state === 'running') state.audio.synth.triggerAttackRelease("C3", "8n"); } catch(e) { console.warn("Audio block", e); }
                state.correctStreak = 0;
                button.classList.add('flash-incorrect', '!bg-rose-500', '!text-white', '!border-rose-600');
                feedbackMsg = `Not quite. The correct verb was "${correct}".`;
                dom.feedbackDisplay.className = 'mt-8 font-extrabold text-center min-h-[36px] text-xl sm:text-2xl text-rose-600 flex-shrink-0 w-full';
                state.incorrectAnswers.push({ ...state.currentQuestion, selectedAnswer: selected });
            }
            
            dom.feedbackDisplay.textContent = feedbackMsg;
            state.questionsAnswered++;
            
            // Show full sentence for secondary students to read, forced to be on its own block below
            dom.exampleSentenceFeedback.innerHTML = `<span class="block text-sm sm:text-base text-sky-600 font-bold uppercase tracking-wider mb-2">Full Sentence:</span><strong class="text-xl sm:text-2xl text-slate-800 block w-full">${state.currentQuestion.sentence}</strong>`;
            dom.exampleSentenceFeedback.classList.remove('hidden');
            
            updateGameStats();

            // Enable and highlight the Header Next button 
            dom.headerNextBtn.disabled = false;
            dom.headerNextBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            dom.headerNextBtn.classList.add('hover:bg-sky-600', 'animate-pulse', 'ring-4', 'ring-sky-200');
        }

        function updateGameStats() {
            dom.scoreDisplay.textContent = state.score;
            dom.questionCountDisplay.textContent = state.questionsAnswered;
            dom.streakDisplay.textContent = `Streak: ${state.correctStreak}`;
            
            const streakContainer = document.getElementById('streak-wrapper');
            if (streakContainer) {
                if(state.correctStreak >= 3) {
                    streakContainer.classList.add('text-orange-600');
                    streakContainer.classList.remove('text-amber-600');
                } else {
                    streakContainer.classList.add('text-amber-600');
                    streakContainer.classList.remove('text-orange-600');
                }
            }
        }

        function endRound(message) {
            clearInterval(state.timers.game);
            
            const accuracy = state.questionsAnswered > 0 
                ? Math.round((state.correctAnswers / state.questionsAnswered) * 100) : 0;

            dom.gameOverMessage.textContent = message;
            dom.finalScore.textContent = state.score;
            dom.finalAccuracy.textContent = `${accuracy}%`;
            
            if (state.incorrectAnswers.length > 0) {
                dom.reviewSection.classList.remove('hidden');
                dom.incorrectAnswersList.innerHTML = state.incorrectAnswers.map(item => `
                    <div class="p-3 sm:p-4 bg-white border-2 border-slate-200 rounded-xl shadow-sm mb-3">
                        <p class="text-slate-600 text-sm sm:text-base font-medium mb-2">${item.sentence.replace(item.verb, '______')}</p>
                        <div class="flex justify-between text-xs sm:text-sm font-extrabold">
                            <span class="text-rose-500">You: ${item.selectedAnswer}</span>
                            <span class="text-emerald-600">Correct: ${item.verb}</span>
                        </div>
                    </div>
                `).join('');
            } else {
                dom.reviewSection.classList.remove('hidden');
                dom.incorrectAnswersList.innerHTML = `
                    <div class="p-6 sm:p-8 bg-emerald-50 border-2 border-emerald-200 rounded-xl text-center mt-4">
                        <span class="text-4xl sm:text-5xl mb-4 block">🏆</span>
                        <p class="text-emerald-800 font-extrabold text-lg sm:text-xl">Flawless execution! No errors to review.</p>
                    </div>`;
            }

            switchView(dom.gameOverView);
        }

        // --- EVENT LISTENERS ---
        function setupEventListeners() {
            // Main Menu Modes
            dom.modeButtons.forEach(button => {
                button.addEventListener('click', () => handleModeSelection(button.dataset.mode));
            });
            
            // Level Selection
            dom.levelButtons.forEach(button => {
                button.addEventListener('click', () => startRound(button.dataset.level));
            });

            // Back button
            dom.backToMainBtn.addEventListener('click', () => switchView(dom.mainMenuView));

            // Back button from Game
            dom.backBtn.addEventListener('click', () => {
                clearInterval(state.timers.game);
                if ('speechSynthesis' in window) speechSynthesis.cancel();
                if (state.mode === 'story') {
                    switchView(dom.mainMenuView);
                } else {
                    switchView(dom.levelSelectionView);
                }
            });

            // Home button from Game
            dom.homeBtn.addEventListener('click', () => {
                clearInterval(state.timers.game);
                if ('speechSynthesis' in window) speechSynthesis.cancel();
                switchView(dom.mainMenuView);
            });

            // Next button
            dom.headerNextBtn.addEventListener('click', loadNextQuestion);

            // End Screen
            dom.playAgainButton.addEventListener('click', () => {
                switchView(dom.mainMenuView);
                // In fallback mode, the resources are technically "loaded" as unavailable
                if (!state.audio.isReady && !state.audio.fallbackMode) {
                    dom.modeButtons.forEach(btn => btn.disabled = true);
                    dom.mainPrompt.textContent = 'Loading audio resources...';
                    initSpeechSynthesis();
                }
            });

            // Audio Repeat
            dom.repeatButton.addEventListener('click', () => {
                if (!state.audio.fallbackMode && state.currentQuestion?.sentence && state.currentQuestion?.voice) {
                    speak(state.currentQuestion.sentence, state.currentQuestion.voice, () => {
                        dom.repeatButton.disabled = false;
                    });
                }
            });
        }

        // --- INITIALIZATION ---
        function init() {
            setupEventListeners();
            initAudio();
            initSpeechSynthesis();
            
            // Disable mode buttons until TTS is ready or fallback starts
            dom.modeButtons.forEach(btn => btn.disabled = true);
        }

        init();
    </script>
</body>
</html>
