<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Nunito', sans-serif; 
            touch-action: manipulation; 
            background-color: #f8fafc; 
            overflow-x: hidden;
            color: #1e293b;
            padding-top: 5rem; /* Space for fixed header */
        }
        
        .screen { display: none; min-height: calc(100vh - 5rem); width: 100vw; flex-direction: column; align-items: center; padding: 2rem 1rem; }
        .screen.active { display: flex; animation: fadeIn 0.4s ease-out forwards; }

        /* Fixed Navigation Header */
        #nav-header {
            position: fixed; top: 0; left: 0; width: 100%; height: 5rem;
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(8px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            z-index: 50; display: flex; align-items: center; justify-content: space-between;
            padding: 0 1rem;
        }

        /* Clean 3D Buttons */
        .btn-3d { 
            transition: all 0.1s ease;
            box-shadow: 0 6px 0 rgba(0,0,0,0.15);
            cursor: pointer;
        }
        .btn-3d:hover { transform: translateY(-2px); box-shadow: 0 8px 0 rgba(0,0,0,0.15); filter: brightness(1.05); }
        .btn-3d:active { transform: translateY(6px); box-shadow: 0 0px 0 rgba(0,0,0,0.15); }
        
        .btn-white { background-color: #ffffff; border: 2px solid #e2e8f0; color: #334155; }
        .btn-blue { background-color: #3b82f6; border: 2px solid #2563eb; color: #ffffff; }
        .btn-green { background-color: #10b981; border: 2px solid #059669; color: #ffffff; }
        .btn-purple { background-color: #8b5cf6; border: 2px solid #7c3aed; color: #ffffff; }
        .btn-orange { background-color: #f97316; border: 2px solid #ea580c; color: #ffffff; }
        
        .nav-btn {
            background-color: #f1f5f9; border: 2px solid #cbd5e1; color: #475569;
            font-weight: 800; padding: 0.5rem 1rem; border-radius: 1rem;
            transition: all 0.2s;
        }
        .nav-btn:hover { background-color: #e2e8f0; transform: translateY(-2px); }
        .nav-btn:active { transform: translateY(2px); }

        .points-btn {
            background-color: #fbbf24; border: 2px solid #f59e0b; color: #92400e;
            font-weight: 900; padding: 0.5rem 1.2rem; border-radius: 1rem;
            box-shadow: 0 4px 0 #d97706; transition: all 0.1s; cursor: pointer;
        }
        .points-btn:hover { filter: brightness(1.1); transform: translateY(-2px); box-shadow: 0 6px 0 #d97706; }
        .points-btn:active { transform: translateY(4px); box-shadow: 0 0 0 #d97706; }

        /* Chat Bubbles */
        #convo-container {
            display: flex; flex-direction: column; gap: 0.8rem;
            width: 100%; max-width: 800px;
            height: 60vh; overflow-y: auto; padding: 1rem;
            scroll-behavior: smooth;
        }
        .chat-bubble {
            max-width: 80%; padding: 1rem 1.5rem;
            border-radius: 2rem; font-size: 1.25rem;
            line-height: 1.4; transition: all 0.3s ease;
            opacity: 0; transform: translateY(10px);
            border: 2px solid transparent;
        }
        .chat-bubble.active {
            opacity: 1; transform: translateY(0) scale(1.02);
            font-weight: 800; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            z-index: 10;
        }
        .chat-bubble.inactive { opacity: 0.7; transform: scale(0.98); font-weight: 700; }
        
        .chat-left { align-self: flex-start; border-bottom-left-radius: 0.5rem; background-color: #f1f5f9; color: #0f172a; border-color: #cbd5e1; }
        .chat-right { align-self: flex-end; border-bottom-right-radius: 0.5rem; background-color: #eff6ff; color: #1e3a8a; border-color: #bfdbfe; text-align: right; }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        
        .pop-in { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .shake { animation: shake 0.3s ease-in-out; }
        
        .correct-bg { background-color: #dcfce7 !important; border-color: #22c55e !important; color: #166534 !important; }
        .incorrect-bg { background-color: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b !important; }

        #glitter-canvas { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 100; }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .emoji { font-style: normal; }
    </style>
</head>

        // --- TTS & VOICE SYSTEM ---
        const synth = window.speechSynthesis;

        // Prevent Garbage Collection of utterances which causes {"isTrusted":true} error

        function initVoices() {
            const voices = synth.getVoices();
            if (voices.length === 0) return;
            const names = ["Giuseppe", "Remy", "Vivienne", "Emma", "Brian", "Ava", "Andrew", "William"];
            names.forEach(n => {
                const found = voices.find(v => v.name.includes(n) && v.name.includes("Online")) ||
                              voices.find(v => v.name.includes(n)) ||
                              voices.find(v => v.lang.startsWith("en"));
                voicesMap[n.toLowerCase()] = found;
            });
        }
        if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = initVoices;
        setTimeout(initVoices, 200);

        function speak(text, voiceName, onEnd) {
            synth.cancel();
            
            // Remove emojis and blanks for cleaner speech using robust regex
            const cleanText = text.replace(/[\p{Emoji_Presentation}\p{Extended_Pictographic}\uFE0F]/gu, "").replace(/___/g, "blank").trim();
            
            if (!cleanText) {
                if (onEnd) onEnd();
                return;
            }

            setTimeout(() => {
                const utter = new SpeechSynthesisUtterance(cleanText);
                window.utteranceBank.push(utter); // Prevent GC
                
                let selectedVoice = voicesMap[voiceName?.toLowerCase()] || voicesMap['emma'];
                
                if (!selectedVoice) {
                    const availableVoices = synth.getVoices();
                    selectedVoice = availableVoices.find(v => v.lang.startsWith('en')) || availableVoices[0];
                }
                
                if (selectedVoice) {
                    utter.voice = selectedVoice;
                }
                
                utter.rate = 0.85; // Persona Requirement: 85% speed
                
                utter.onend = () => {
                    const idx = window.utteranceBank.indexOf(utter);
                    if (idx > -1) window.utteranceBank.splice(idx, 1);
                    if (onEnd) onEnd();
                };
                
                utter.onerror = (e) => {
                    const idx = window.utteranceBank.indexOf(utter);
                    if (idx > -1) window.utteranceBank.splice(idx, 1);
                    if (e.error !== 'interrupted' && e.error !== 'canceled') {
                        console.warn("TTS Error avoided: ", e.error);
                    }
                    if (onEnd) onEnd(); 
                };

                synth.speak(utter);
            }, 50);
        }

        window.onresize();
        
        function addBonusPoints() { 
            updateXP(5);

        function triggerFireworks() {
            for(let i=0; i<80; i++) particles.push({ 
                x: window.innerWidth/2, 
                y: window.innerHeight/2, 
                sx: (Math.random()-0.5)*15, 
                sy: (Math.random()-0.5)*15, 
                a: 1, 
                c: `hsl(${Math.random()*60 + 40}, 100%, 50%)`, // Gold/Yellow spectrum
                size: Math.random() * 8 + 4
            });
        }
        
        function animate() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            particles.forEach((p, i) => {
                p.x += p.sx; p.y += p.sy; p.a -= 0.02;
                ctx.globalAlpha = Math.max(0, p.a); ctx.fillStyle = p.c;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
                if (p.a <= 0) particles.splice(i, 1);
            });
            requestAnimationFrame(animate);
        }
        animate();
        
        window.onload = renderMenu;
    </script>
</body>
</html>
