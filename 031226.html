<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Quest: Secondary Mastery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Nunito', sans-serif; 
            touch-action: manipulation; 
            background-color: #f8fafc; 
            overflow-x: hidden;
            color: #1e293b;
            padding-top: 5rem; /* Space for fixed header */
        }
        
        .screen { display: none; min-height: calc(100vh - 5rem); width: 100vw; flex-direction: column; align-items: center; padding: 2rem 1rem; }
        .screen.active { display: flex; animation: fadeIn 0.4s ease-out forwards; }

        /* Custom Full-Height Lock for Convo Screen to prevent page scroll */
        #convo-screen.active {
            height: calc(100vh - 5rem);
            min-height: auto;
            overflow: hidden;
            padding-top: 1rem;
            padding-bottom: 1rem;
        }

        /* Fixed Navigation Header */
        #nav-header {
            position: fixed; top: 0; left: 0; width: 100%; height: 5rem;
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(8px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            z-index: 50; display: flex; align-items: center; justify-content: space-between;
            padding: 0 1rem;
        }

        /* Clean 3D Buttons */
        .btn-3d { 
            transition: all 0.1s ease;
            box-shadow: 0 6px 0 rgba(0,0,0,0.15);
            cursor: pointer;
        }
        .btn-3d:hover { transform: translateY(-2px); box-shadow: 0 8px 0 rgba(0,0,0,0.15); filter: brightness(1.05); }
        .btn-3d:active { transform: translateY(6px); box-shadow: 0 0px 0 rgba(0,0,0,0.15); }
        
        .btn-white { background-color: #ffffff; border: 2px solid #e2e8f0; color: #334155; }
        .btn-blue { background-color: #3b82f6; border: 2px solid #2563eb; color: #ffffff; }
        .btn-green { background-color: #10b981; border: 2px solid #059669; color: #ffffff; }
        .btn-purple { background-color: #8b5cf6; border: 2px solid #7c3aed; color: #ffffff; }
        .btn-orange { background-color: #f97316; border: 2px solid #ea580c; color: #ffffff; }
        
        .nav-btn {
            background-color: #f1f5f9; border: 2px solid #cbd5e1; color: #475569;
            font-weight: 800; padding: 0.5rem 1rem; border-radius: 1rem;
            transition: all 0.2s;
        }
        .nav-btn:hover { background-color: #e2e8f0; transform: translateY(-2px); }
        .nav-btn:active { transform: translateY(2px); }

        .points-btn {
            background-color: #fbbf24; border: 2px solid #f59e0b; color: #92400e;
            font-weight: 900; padding: 0.5rem 1.2rem; border-radius: 1rem;
            box-shadow: 0 4px 0 #d97706; transition: all 0.1s; cursor: pointer;
        }
        .points-btn:hover { filter: brightness(1.1); transform: translateY(-2px); box-shadow: 0 6px 0 #d97706; }
        .points-btn:active { transform: translateY(4px); box-shadow: 0 0 0 #d97706; }

        /* Chat Bubbles (30% Wider Container) */
        #convo-container {
            display: flex; flex-direction: column; gap: 0.8rem;
            width: 100%; 
            max-width: 1040px; /* Expanded by 30% from 800px */
            flex-grow: 1;
            height: 0; /* Forces internal scroll */
            overflow-y: auto; padding: 1rem;
            scroll-behavior: smooth;
        }
        .chat-bubble {
            max-width: 75%; /* Reduced from 80% to keep bubbles distinctly left/right in wider container */
            padding: 1rem 1.5rem;
            border-radius: 2rem; font-size: 1.25rem;
            line-height: 1.4; transition: all 0.3s ease;
            opacity: 0; transform: translateY(10px);
            border: 2px solid transparent;
        }
        .chat-bubble.active {
            opacity: 1; transform: translateY(0) scale(1.02);
            font-weight: 800; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            z-index: 10;
        }
        .chat-bubble.inactive { opacity: 0.7; transform: scale(0.98); font-weight: 700; }
        
        .chat-left { align-self: flex-start; border-bottom-left-radius: 0.5rem; background-color: #f1f5f9; color: #0f172a; border-color: #cbd5e1; }
        .chat-right { align-self: flex-end; border-bottom-right-radius: 0.5rem; background-color: #eff6ff; color: #1e3a8a; border-color: #bfdbfe; text-align: right; }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        
        .pop-in { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .shake { animation: shake 0.3s ease-in-out; }
        
        .correct-bg { background-color: #dcfce7 !important; border-color: #22c55e !important; color: #166534 !important; }
        .incorrect-bg { background-color: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b !important; }

        #glitter-canvas { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 100; }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .emoji { font-style: normal; }
    </style>
</head>

                        { q: "I ___ my overloaded bag across the campus now.", options: ["am lugging", "lugging", "lug", "lugged"], a: "am lugging" }
                    ],
                    "Simple Past": [
                        { q: "I ___ my digital access card yesterday.", options: ["misplaced", "misplace", "misplacing", "misplaces"], a: "misplaced" },
                        { q: "He ___ a premium smartwatch online last year.", options: ["purchased", "purchase", "purchasing", "purchases"], a: "purchased" },
                        { q: "She ___ her expensive glasses during PE class yesterday.", options: ["shattered", "shatter", "shattering", "shatters"], a: "shattered" },
                        { q: "I ___ my stainless steel thermos in the auditorium.", options: ["abandoned", "abandon", "abandoning", "abandons"], a: "abandoned" },
                        { q: "He ___ the encrypted lockbox yesterday morning.", options: ["unlocked", "unlock", "unlocking", "unlocks"], a: "unlocked" },
                        { q: "We ___ our rain gear in the classroom last Friday.", options: ["forgot", "forget", "forgetting", "forgets"], a: "forgot" },
                        { q: "She ___ a high-quality drafting pen yesterday.", options: ["discovered", "discover", "discovering", "discovers"], a: "discovered" },
                        { q: "I ___ the final essay on the official document.", options: ["composed", "compose", "composing", "composes"], a: "composed" },
                        { q: "He ___ a significant portion of his allowance on peripherals.", options: ["expended", "expend", "expending", "expends"], a: "expended" },
                        { q: "I ___ my laptop bag to the study session yesterday.", options: ["transported", "transport", "transporting", "transports"], a: "transported" }
                    ],
                    "Adjectives": [
                        { q: "My reinforced school bag is incredibly ___.", options: ["durable", "durably", "durability", "durables"], a: "durable" },
                        { q: "The security key is easily ___ if you aren't careful.", options: ["losable", "lose", "loss", "losing"], a: "losable" },
                        { q: "His advanced smartwatch is prohibitively ___.", options: ["expensive", "expensively", "expense", "expend"], a: "expensive" },
                        { q: "Her specialized glasses are completely ___.", options: ["transparent", "transparently", "transparency", "transparents"], a: "transparent" },
                        { q: "The insulated thermos was entirely ___.", options: ["vacant", "vacantly", "vacancy", "vacate"], a: "vacant" },
                        { q: "The heavy-duty container is surprisingly ___.", options: ["lightweight", "light", "lightly", "lightness"], a: "lightweight" },
                        { q: "My automatic umbrella is exceptionally ___ today.", options: ["practical", "practically", "practicality", "practice"], a: "practical" },
                        { q: "This fountain pen is exceptionally ___ to utilize.", options: ["fluid", "fluidly", "fluidity", "fluids"], a: "fluid" },
                        { q: "The parchment paper is deliberately ___.", options: ["textured", "texture", "texturally", "textures"], a: "textured" },
                        { q: "The antique lockbox was visibly ___.", options: ["tarnished", "tarnish", "tarnishing", "tarnishes"], a: "tarnished" }
                    ]
                },
                convos: {
                    "Everyday Chat": [
                        { text: "I misplaced my locker combination key yesterday. 🔑", side: "left", voice: "emma" },
                        { text: "Is it securely stored in your backpack? 🎒", side: "right", voice: "william" },
                        { text: "No, my bag's compartments are entirely empty. 📦", side: "left", voice: "emma" },
                        { text: "Did you investigate near your insulated thermos? ☕", side: "right", voice: "william" },
                        { text: "Yes, I eventually located it underneath my documents! 📄", side: "left", voice: "emma" },
                        { text: "That is highly irregular, but I am glad you found it. 🤔", side: "right", voice: "william" }
                    ],
                    "Detailed Discussion": [
                        { text: "Are you considering purchasing that new smartwatch? ⌚", side: "left", voice: "brian" },
                        { text: "I am, but the price point is prohibitively expensive for a student. 💵", side: "right", voice: "remy" },
                        { text: "However, its biometric tracking features are highly sophisticated. 🏃", side: "left", voice: "brian" },
                        { text: "True, it monitors cardiovascular health with incredible accuracy. ❤️", side: "right", voice: "remy" },
                        { text: "You should evaluate if the utility justifies the financial investment. 📊", side: "left", voice: "brian" },
                        { text: "I will read more technical reviews before expending my savings. 💻", side: "right", voice: "remy" }
                    ],
                    "Advanced Debate": [
                        { text: "Is the transition from physical textbooks to digital tablets truly beneficial? 📱", side: "left", voice: "ava" },
                        { text: "Absolutely. Carrying heavy physical volumes causes chronic back strain. 🎒", side: "right", voice: "giuseppe" },
                        { text: "But excessive screen time exacerbates optical fatigue for many students. 👓", side: "left", voice: "ava" },
                        { text: "They can mitigate that by utilizing blue-light filtering spectacles. 🛡️", side: "right", voice: "giuseppe" },
                        { text: "Furthermore, the tactile sensation of annotating paper is superior for retention. 🖊️", side: "left", voice: "ava" },
                        { text: "Modern styluses replicate that friction perfectly on digital displays. ✨", side: "right", voice: "giuseppe" }
                    ]
                }
            }
        };

        // --- TTS & VOICE SYSTEM ---
        const synth = window.speechSynthesis;
        let voicesMap = {};
        let isTtsActive = false;
        
        // Prevent Garbage Collection of utterances which causes {"isTrusted":true} error
        window.utteranceBank = []; 
        
        function initVoices() {
            const voices = synth.getVoices();
            if (voices.length === 0) return;
            const names = ["Giuseppe", "Remy", "Vivienne", "Emma", "Brian", "Ava", "Andrew", "William"];
            names.forEach(n => {
                const found = voices.find(v => v.name.includes(n) && v.name.includes("Online")) ||
                              voices.find(v => v.name.includes(n)) ||
                              voices.find(v => v.lang.startsWith("en"));
                voicesMap[n.toLowerCase()] = found;
            });
        }
        if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = initVoices;
        setTimeout(initVoices, 200);

        function speak(text, voiceName, onEnd) {
            synth.cancel();
            
            // Remove emojis and blanks for cleaner speech using robust regex
            const cleanText = text.replace(/[\p{Emoji_Presentation}\p{Extended_Pictographic}\uFE0F]/gu, "").replace(/___/g, "blank").trim();
            
            if (!cleanText) {
                if (onEnd) onEnd();
                return;
            }

            setTimeout(() => {
                const utter = new SpeechSynthesisUtterance(cleanText);
                window.utteranceBank.push(utter); // Prevent GC
                
                let selectedVoice = voicesMap[voiceName?.toLowerCase()] || voicesMap['emma'];
                
                if (!selectedVoice) {
                    const availableVoices = synth.getVoices();
                    selectedVoice = availableVoices.find(v => v.lang.startsWith('en')) || availableVoices[0];
                }
                
                if (selectedVoice) {
                    utter.voice = selectedVoice;
                }
                
                utter.rate = 0.85; // Persona Requirement: 85% speed
                
                utter.onend = () => {
                    const idx = window.utteranceBank.indexOf(utter);
                    if (idx > -1) window.utteranceBank.splice(idx, 1);
                    if (onEnd) onEnd();
                };
                
                utter.onerror = (e) => {
                    const idx = window.utteranceBank.indexOf(utter);
                    if (idx > -1) window.utteranceBank.splice(idx, 1);
                    if (e.error !== 'interrupted' && e.error !== 'canceled') {
                        console.warn("TTS Error avoided: ", e.error);
                    }
                    if (onEnd) onEnd(); 
                };

                synth.speak(utter);
            }, 50);
        }

        function wrapEmojis(text) {
            return text.replace(/([\p{Emoji_Presentation}\p{Extended_Pictographic}\uFE0F])/gu, '<span class="emoji">$1</span>');
        }

        // --- CORE STATE ---
        let totalXP = parseInt(localStorage.getItem('gq_xp')) || 0;
        let earnedBadges = JSON.parse(localStorage.getItem('gq_badges')) || [];
        let screenHistory = ['menu-screen'];
        let currentTopic = null;
        let currentQuizData = null;
        let currentConvoData = null;
        let currentQuizType = '';
        let currentConvoType = '';
        let qIndex = 0; let cIndex = 0; let quizScore = 0;
        let isLocked = false;
        let convoTimeout = null;

        function updateXP(amt) {
            totalXP += amt;
            localStorage.setItem('gq_xp', totalXP);
            document.getElementById('nav-xp').textContent = totalXP;
            let rank = "Novice";
            if (totalXP > 100) rank = "Apprentice";
            if (totalXP > 250) rank = "Scholar";
            if (totalXP > 500) rank = "Master";
            const playerLvl = document.getElementById('player-level');
            if (playerLvl) playerLvl.textContent = rank;
        }

        function showScreenOnly(id) {
            synth.cancel();
            clearTimeout(convoTimeout);
            isTtsActive = false; 
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if (id === 'menu-screen') renderMenu();
        }

        function navHome() { screenHistory = ['menu-screen']; showScreenOnly('menu-screen'); }
        function navBack() { if (screenHistory.length > 1) { screenHistory.pop(); showScreenOnly(screenHistory[screenHistory.length-1]); } }

        function navNext() {
            const currentScreen = screenHistory[screenHistory.length - 1];
            if (currentScreen === 'quiz-screen' && !isLocked) {
                checkAnswer(null, null, true); // Skip Question
            } else if (currentScreen === 'convo-screen') {
                if (isTtsActive) {
                    clearTimeout(convoTimeout);
                    synth.cancel(); // This instantly triggers utter.onend -> progresses dialogue
                } else if (cIndex >= currentConvoData.length) {
                    // Next convo
                    const keys = Object.keys(lessons[currentTopic].convos);
                    let idx = keys.indexOf(currentConvoType);
                    if (idx >= 0 && idx < keys.length - 1) {
                        startConvo(keys[idx + 1]);
                    } else {
                        navBack();
                    }
                } else {
                    playTurn();
                }
            } else if (currentScreen === 'hub-screen') {
                const keys = Object.keys(lessons);
                let idx = keys.indexOf(currentTopic);
                if (idx >= 0 && idx < keys.length - 1) openTopic(keys[idx + 1]);
                else navHome();
            } else if (currentScreen === 'menu-screen') {
                openTopic(Object.keys(lessons)[0]);
            } else if (currentScreen === 'results-screen') {
                navBack();
            }
        }

        function renderMenu() {
            const grid = document.getElementById('topic-grid');
            grid.innerHTML = '';
            Object.keys(lessons).forEach(key => {
                const item = lessons[key];
                const btn = document.createElement('button');
                btn.className = 'btn-3d btn-white p-6 rounded-[2rem] flex flex-col items-center justify-center';
                btn.innerHTML = `<span class="text-5xl mb-3">${item.emoji}</span><span class="font-black text-slate-700 text-lg">${item.title}</span>`;
                btn.onclick = () => openTopic(key);
                grid.appendChild(btn);
            });
            updateXP(0); // refresh display
        }

        function openTopic(key) {
            currentTopic = key; 
            const data = lessons[key];
            if(screenHistory[screenHistory.length-1] !== 'hub-screen') screenHistory.push('hub-screen');
            
            document.getElementById('hub-emoji').textContent = data.emoji;
            document.getElementById('hub-title').textContent = data.title;
            document.getElementById('hub-vocab').innerHTML = wrapEmojis(data.vocab);
            
            const gBtns = document.getElementById('grammar-btns');
            gBtns.innerHTML = '';
            Object.keys(data.grammar).forEach(gType => {
                const b = document.createElement('button');
                b.className = 'btn-3d btn-white py-3 px-4 rounded-xl font-bold text-left flex justify-between w-full';
                b.innerHTML = `${gType} <span>▶</span>`;
                b.onclick = () => startQuiz(gType);
                gBtns.appendChild(b);
            });

            const cBtns = document.getElementById('convo-btns');
            cBtns.innerHTML = '';
            Object.keys(data.convos).forEach(cType => {
                const b = document.createElement('button');
                b.className = 'btn-3d btn-blue py-3 px-4 rounded-xl font-bold text-left flex justify-between w-full';
                b.innerHTML = `${cType} <span>▶</span>`;
                b.onclick = () => startConvo(cType);
                cBtns.appendChild(b);
            });
            
            showScreenOnly('hub-screen');
        }

        // --- QUIZ LOGIC ---
        function startQuiz(type) {
            currentQuizType = type;
            currentQuizData = lessons[currentTopic].grammar[type];
            qIndex = 0; quizScore = 0; isLocked = false;
            screenHistory.push('quiz-screen');
            document.getElementById('quiz-type-title').textContent = `${lessons[currentTopic].title} - ${type}`;
            showScreenOnly('quiz-screen');
            renderQuestion();
        }

        function renderQuestion() {
            const q = currentQuizData[qIndex];
            document.getElementById('question-counter').textContent = `Drill ${qIndex+1} / ${currentQuizData.length}`;
            document.getElementById('question-text').innerHTML = wrapEmojis(q.q);
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            const shuffledOptions = [...q.options].sort(() => Math.random() - 0.5);
            shuffledOptions.forEach(opt => {
                const b = document.createElement('button');
                b.className = 'btn-3d btn-white py-6 px-4 rounded-2xl font-black text-2xl text-slate-700 w-full';
                b.textContent = opt;
                b.onclick = () => checkAnswer(opt, b, false);
                container.appendChild(b);
            });
            
            document.getElementById('feedback-area').textContent = '';
            speak(q.q, 'emma');
        }

        function checkAnswer(ans, btn, skipped = false) {
            if (isLocked) return; 
            isLocked = true;
            
            const correct = currentQuizData[qIndex].a;
            const f = document.getElementById('feedback-area');
            
            if (skipped) {
                f.textContent = "Skipped ⏭️";
                f.className = "h-16 mt-6 flex items-center justify-center text-3xl font-black text-slate-500 pop-in";
                speak("Skipped.", 'emma');
            } else if (ans === correct) {
                quizScore++; 
                btn.classList.add('correct-bg'); 
                f.textContent = "Perfect! ✨"; 
                f.className = "h-16 mt-6 flex items-center justify-center text-3xl font-black text-green-600 pop-in";
                updateXP(5);
                speak("Perfect!", 'emma');
            } else {
                btn.classList.add('incorrect-bg', 'shake'); 
                f.textContent = "Not quite! 💡";
                f.className = "h-16 mt-6 flex items-center justify-center text-3xl font-black text-red-500 pop-in";
                speak("Try again next time.", 'emma');
            }
            
            setTimeout(() => {
                qIndex++;
                if (qIndex < currentQuizData.length) { isLocked = false; renderQuestion(); }
                else showResults();
            }, 1500);
        }

        function showResults() {
            screenHistory.push('results-screen');
            showScreenOnly('results-screen');
            document.getElementById('res-subtitle').textContent = currentQuizType;
            document.getElementById('res-score').textContent = `${quizScore} / ${currentQuizData.length}`;
            
            const badgeBox = document.getElementById('badge-celebration');
            if (quizScore === currentQuizData.length && !earnedBadges.includes(currentTopic)) {
                earnedBadges.push(currentTopic);
                localStorage.setItem('gq_badges', JSON.stringify(earnedBadges));
                document.getElementById('earned-badge-icon').innerHTML = wrapEmojis(lessons[currentTopic].emoji);
                badgeBox.classList.remove('hidden');
                document.getElementById('results-header').textContent = "RANK UP! 🏅";
                triggerFireworks();
                speak(`Fantastic! You earned the ${lessons[currentTopic].title} badge!`, 'william');
            } else {
                badgeBox.classList.add('hidden');
                document.getElementById('results-header').textContent = "Drill Complete! 🎯";
                speak(`Well done! You got ${quizScore} out of ${currentQuizData.length}.`, 'william');
            }
        }

        // --- CONVO ENGINE ---
        function startConvo(type) {
            currentConvoType = type;
            currentConvoData = lessons[currentTopic].convos[type];
            cIndex = 0;
            screenHistory.push('convo-screen');
            document.getElementById('convo-container').innerHTML = '';
            showScreenOnly('convo-screen');
            
            isTtsActive = true; 
            convoTimeout = setTimeout(playTurn, 500); 
        }

        function playTurn() {
            clearTimeout(convoTimeout);
            if (!isTtsActive || !currentConvoData) return;
            
            if (cIndex >= currentConvoData.length) {
                isTtsActive = false;
                updateXP(10); 
                return;
            }
            
            const turn = currentConvoData[cIndex];
            const container = document.getElementById('convo-container');
            const b = document.createElement('div');
            b.className = `chat-bubble ${turn.side === 'left' ? 'chat-left' : 'chat-right'} active`;
            b.innerHTML = wrapEmojis(turn.text);
            container.appendChild(b);
            container.scrollTop = container.scrollHeight;
            
            const all = container.querySelectorAll('.chat-bubble');
            if (all.length > 1) {
                all[all.length-2].classList.remove('active');
                all[all.length-2].classList.add('inactive');
            }

            speak(turn.text, turn.voice, () => {
                if (isTtsActive) {
                    cIndex++;
                    if (cIndex < currentConvoData.length) {
                        convoTimeout = setTimeout(playTurn, 600); // Auto-advance 
                    } else {
                        isTtsActive = false;
                        updateXP(10); 
                    }
                }
            });
        }

        function repeatConvo() { 
            synth.cancel();
            clearTimeout(convoTimeout);
            document.getElementById('convo-container').innerHTML = ''; 
            cIndex = 0; 
            isTtsActive = true; 
            playTurn(); 
        }

        // --- PARTICLES ---
        const canvas = document.getElementById('glitter-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
        window.onresize();
        
        function addBonusPoints() { 
            updateXP(5); 
            triggerFireworks(); 
            speak("Bonus points!", "william"); 
        }
        
        function triggerFireworks() {
            for(let i=0; i<80; i++) particles.push({ 
                x: window.innerWidth/2, 
                y: window.innerHeight/2, 
                sx: (Math.random()-0.5)*15, 
                sy: (Math.random()-0.5)*15, 
                a: 1, 
                c: `hsl(${Math.random()*60 + 40}, 100%, 50%)`, // Gold/Yellow spectrum
                size: Math.random() * 8 + 4
            });
        }
        
        function animate() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            particles.forEach((p, i) => {
                p.x += p.sx; p.y += p.sy; p.a -= 0.02;
                ctx.globalAlpha = Math.max(0, p.a); ctx.fillStyle = p.c;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
                if (p.a <= 0) particles.splice(i, 1);
            });
            requestAnimationFrame(animate);
        }
        animate();
        
        window.onload = renderMenu;
    </script>
</body>
</html>
