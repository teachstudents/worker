<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grammar & Convo Quest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Nunito', sans-serif; 
            touch-action: manipulation; 
            background-color: #f8fafc; 
            overflow-x: hidden;
            color: #1e293b;
            padding-top: 5rem; /* Space for fixed header */
        }
        
        .screen { display: none; min-height: calc(100vh - 5rem); width: 100vw; flex-direction: column; align-items: center; padding: 2rem 1rem; }
        .screen.active { display: flex; animation: fadeIn 0.4s ease-out forwards; }

        /* Fixed Navigation Header */
        #nav-header {
            position: fixed; top: 0; left: 0; width: 100%; height: 5rem;
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(8px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            z-index: 50; display: flex; align-items: center; justify-content: space-between;
            padding: 0 1rem;
        }

        /* Clean 3D Buttons */
        .btn-3d { 
            transition: all 0.1s ease;
            box-shadow: 0 6px 0 rgba(0,0,0,0.15);
            cursor: pointer;
        }
        .btn-3d:hover { transform: translateY(-2px); box-shadow: 0 8px 0 rgba(0,0,0,0.15); filter: brightness(1.05); }
        .btn-3d:active { transform: translateY(6px); box-shadow: 0 0px 0 rgba(0,0,0,0.15); }
        
        .btn-white { background-color: #ffffff; border: 2px solid #e2e8f0; color: #334155; }
        .btn-blue { background-color: #3b82f6; border: 2px solid #2563eb; color: #ffffff; }
        .btn-green { background-color: #10b981; border: 2px solid #059669; color: #ffffff; }
        .btn-purple { background-color: #8b5cf6; border: 2px solid #7c3aed; color: #ffffff; }
        .btn-orange { background-color: #f97316; border: 2px solid #ea580c; color: #ffffff; }
        
        .nav-btn {
            background-color: #f1f5f9; border: 2px solid #cbd5e1; color: #475569;
            font-weight: 800; padding: 0.5rem 1rem; border-radius: 1rem;
            transition: all 0.2s;
        }
        .nav-btn:hover { background-color: #e2e8f0; transform: translateY(-2px); }
        .nav-btn:active { transform: translateY(2px); }

        .points-btn {
            background-color: #fbbf24; border: 2px solid #f59e0b; color: #92400e;
            font-weight: 900; padding: 0.5rem 1.2rem; border-radius: 1rem;
            box-shadow: 0 4px 0 #d97706; transition: all 0.1s; cursor: pointer;
        }
        .points-btn:hover { filter: brightness(1.1); transform: translateY(-2px); box-shadow: 0 6px 0 #d97706; }
        .points-btn:active { transform: translateY(4px); box-shadow: 0 0 0 #d97706; }

        /* Chat Bubbles (No Names) */
        #convo-container {
            display: flex; flex-direction: column; gap: 0.8rem;
            width: 100%; max-width: 800px;
            height: 60vh; overflow-y: auto; padding: 1rem;
            scroll-behavior: smooth;
        }
        .chat-bubble {
            max-width: 80%; padding: 1rem 1.5rem;
            border-radius: 2rem; font-size: 1.25rem;
            line-height: 1.4; transition: all 0.3s ease;
            opacity: 0; transform: translateY(10px);
            border: 2px solid transparent;
        }
        .chat-bubble.active {
            opacity: 1; transform: translateY(0) scale(1.02);
            font-weight: 800; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            z-index: 10;
        }
        .chat-bubble.inactive { opacity: 0.7; transform: scale(0.98); font-weight: 700; }
        
        .chat-left { align-self: flex-start; border-bottom-left-radius: 0.5rem; background-color: #f1f5f9; color: #0f172a; border-color: #cbd5e1; }
        .chat-right { align-self: flex-end; border-bottom-right-radius: 0.5rem; background-color: #eff6ff; color: #1e3a8a; border-color: #bfdbfe; text-align: right; }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        
        .pop-in { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .shake { animation: shake 0.3s ease-in-out; }
        
        .correct-bg { background-color: #dcfce7 !important; border-color: #22c55e !important; color: #166534 !important; }
        .incorrect-bg { background-color: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b !important; }

        #glitter-canvas { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 100; }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* Hide Emojis from screen readers if needed, handled by JS primarily */
        .emoji { font-style: normal; }
    </style>
</head>
<body>

    <canvas id="glitter-canvas"></canvas>

    <!-- FIXED NAVIGATION HEADER -->
    <nav id="nav-header">
        <div class="flex gap-2 sm:gap-4">
            <button onclick="navBack()" class="nav-btn">⬅ Back</button>
            <button onclick="navHome()" class="nav-btn">🏠 Home</button>
        </div>
        <div class="flex gap-2 sm:gap-4 items-center">
            <button onclick="navNext()" class="nav-btn">Next ➡</button>
            <button onclick="addBonusPoints()" class="points-btn" title="Click for Bonus Points!">
                🌟 XP: <span id="nav-xp">0</span>
            </button>
        </div>
    </nav>

    <!-- MAIN MENU -->
    <div id="menu-screen" class="screen active">

            <div>
                <h1 class="text-3xl sm:text-4xl font-black text-slate-800 tracking-tight">English Quest 🎓</h1>
                <p class="text-slate-500 font-bold text-lg">Grade 6 Mastery</p>
            </div>
            <div class="text-right hidden sm:block">
                <div class="text-xs font-bold text-slate-400 uppercase tracking-widest">Player Level</div>
                <div id="player-level" class="text-2xl font-black text-indigo-600">Novice</div>
            </div>
        </header>

        <div class="w-full max-w-4xl mb-12">
            <h2 class="text-2xl font-black text-slate-700 mb-6 text-center">Select a Topic 📚</h2>
            <div id="topic-grid" class="grid grid-cols-2 md:grid-cols-3 gap-6">
                <!-- Topics injected here -->
            </div>
        </div>
    </div>

    <!-- TOPIC HUB SCREEN -->
    <div id="hub-screen" class="screen">
        <div class="w-full max-w-4xl">
            <div class="bg-white rounded-[2rem] shadow-md border-2 border-slate-100 p-8 pop-in">

                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">

                    <div class="bg-slate-50 p-6 rounded-3xl border-2 border-slate-100">
                        <h3 class="text-xl font-black text-slate-700 mb-4 flex items-center gap-2">Grammar Drills 📝</h3>
                        <div class="flex flex-col gap-3">
                            <button onclick="startQuiz('Simple Present')" class="btn-3d btn-white py-4 rounded-2xl font-bold text-lg text-left px-6 w-full flex justify-between items-center">
                                Simple Present <span>▶</span>
                            </button>
                            <button onclick="startQuiz('Present Continuous')" class="btn-3d btn-white py-4 rounded-2xl font-bold text-lg text-left px-6 w-full flex justify-between items-center">
                                Present Continuous <span>▶</span>
                            </button>
                            <button onclick="startQuiz('Simple Past')" class="btn-3d btn-white py-4 rounded-2xl font-bold text-lg text-left px-6 w-full flex justify-between items-center">
                                Simple Past Verbs <span>▶</span>
                            </button>
                            <button onclick="startQuiz('Adjectives')" class="btn-3d btn-white py-4 rounded-2xl font-bold text-lg text-left px-6 w-full flex justify-between items-center">
                                Adjective Focus <span>▶</span>
                            </button>
                        </div>
                    </div>

                    <!-- Conversation Section -->
                    <div class="bg-indigo-50 p-6 rounded-3xl border-2 border-indigo-100">
                        <h3 class="text-xl font-black text-indigo-900 mb-4 flex items-center gap-2">Conversation Practice 🗣️</h3>
                        <p class="text-sm font-bold text-indigo-400 mb-6">Listen and read along to build fluency.</p>
                        <div class="flex flex-col gap-4">
                            <button onclick="startConvo('Basic')" class="btn-3d btn-blue py-5 rounded-2xl font-black text-xl w-full tracking-wide">
                                BASIC CONVO
                            </button>
                            <button onclick="startConvo('Compound')" class="btn-3d btn-purple py-5 rounded-2xl font-black text-xl w-full tracking-wide">
                                ADVANCED (COMPOUND)
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- QUIZ SCREEN -->
    <div id="quiz-screen" class="screen">
        <div class="w-full max-w-3xl bg-white rounded-[2rem] shadow-lg p-8 border-2 border-slate-100 flex flex-col items-center pop-in relative">

                <span id="question-counter" class="text-lg font-bold text-slate-500 bg-slate-100 px-4 py-1 rounded-full"></span>
            </header>

            <div id="question-text" class="text-3xl font-black text-slate-800 text-center mb-10 leading-snug min-h-[100px] flex items-center"></div>

            <div id="options-container" class="grid grid-cols-1 md:grid-cols-2 gap-4 w-full"></div>

            <div id="feedback-area" class="h-16 mt-6 flex items-center justify-center text-2xl font-black transition-all"></div>
        </div>
    </div>

    <!-- CONVERSATION SCREEN -->
    <div id="convo-screen" class="screen bg-white">
        <div class="w-full max-w-4xl flex flex-col items-center h-full pop-in">
            <header class="w-full flex justify-between items-center mb-4 pb-4 border-b-2 border-slate-100">
                <h2 id="convo-header" class="text-xl font-black text-slate-800"></h2>
                <button onclick="repeatConvo()" class="bg-slate-100 text-slate-600 font-bold py-2 px-4 rounded-xl hover:bg-slate-200 transition-colors">
                    🔄 Repeat
                </button>
            </header>
            
            <div id="convo-container" class="flex-grow w-full"></div>
        </div>
    </div>

    <!-- RESULTS SCREEN -->
    <div id="results-screen" class="screen">
        <div class="w-full max-w-2xl bg-white rounded-[2rem] shadow-xl p-10 border-2 border-slate-100 text-center pop-in">

            <div id="badge-celebration" class="hidden flex flex-col items-center mb-8">

                    <span id="earned-badge-icon"></span>
                </div>
                <p class="text-xl font-black text-yellow-600 uppercase tracking-widest">New Badge Unlocked!</p>
            </div>

            <p class="text-lg font-bold text-slate-500 mb-4 uppercase tracking-widest" id="res-subtitle"></p>
            <div class="text-7xl font-black mb-8 text-indigo-600">
                <span id="res-score"></span>
            </div>
            
            <button onclick="navBack()" class="btn-3d btn-green py-4 px-12 rounded-2xl font-black text-2xl w-full max-w-sm mx-auto">
                CONTINUE
            </button>
        </div>
    </div>

    <script>
        // --- DATA DESIGNED FOR A2 CHINESE GRADE 6 STUDENTS ---
        const lessons = {

                        { q: "She ___ to her favorite music currently.", options: ["is listening", "are listening", "listens", "listened"], a: "is listening" },
                        { q: "They ___ delicious food now.", options: ["are eating", "is eating", "eat", "ate"], a: "are eating" },
                        { q: "He ___ a new book right now.", options: ["is reading", "are reading", "reads", "read"], a: "is reading" },
                        { q: "I ___ a picture for my mom at the moment.", options: ["am drawing", "drawing", "draw", "drew"], a: "am drawing" },
                        { q: "She ___ a song right now.", options: ["is singing", "are singing", "sings", "sang"], a: "is singing" },
                        { q: "They ___ a fun game currently.", options: ["are playing", "is playing", "play", "played"], a: "are playing" },
                        { q: "He ___ dinner for the family now.", options: ["is making", "are making", "makes", "made"], a: "is making" },
                        { q: "I ___ on the sofa right now.", options: ["am relaxing", "relaxing", "relax", "relaxed"], a: "am relaxing" }
                    ],
                    "Simple Past": [
                        { q: "We ___ hot pot last weekend.", options: ["ate", "eat", "eating", "eats"], a: "ate" },
                        { q: "I ___ a great movie yesterday.", options: ["watched", "watch", "watching", "watches"], a: "watched" },
                        { q: "She ___ her bike to the shop yesterday morning.", options: ["rode", "ride", "riding", "rides"], a: "rode" },
                        { q: "They ___ to the park on Saturday.", options: ["went", "go", "going", "goes"], a: "went" },
                        { q: "He ___ a good book last night.", options: ["read", "readed", "reading", "reads"], a: "read" },
                        { q: "We ___ games last Sunday.", options: ["played", "play", "playing", "plays"], a: "played" },
                        { q: "She ___ a beautiful picture yesterday.", options: ["drew", "draw", "drawing", "draws"], a: "drew" },
                        { q: "He ___ a song at the party last night.", options: ["sang", "sing", "singing", "sings"], a: "sang" },
                        { q: "They ___ the wall last weekend.", options: ["painted", "paint", "painting", "paints"], a: "painted" },
                        { q: "My mom ___ fish for dinner yesterday.", options: ["cooked", "cook", "cooking", "cooks"], a: "cooked" }
                    ],
                    "Adjectives": [
                        { q: "The weekend trip was very ___.", options: ["fun", "funny", "funnily", "funs"], a: "fun" },
                        { q: "The food at the shop was ___.", options: ["delicious", "deliciously", "delight", "deliciousness"], a: "delicious" },
                        { q: "Riding a bike is very ___.", options: ["exciting", "excite", "excitedly", "excitement"], a: "exciting" },
                        { q: "The new movie was ___.", options: ["great", "greatly", "greatness", "greater"], a: "great" },
                        { q: "My family is very ___.", options: ["happy", "happily", "happiness", "happier"], a: "happy" },
                        { q: "The movie last night was very ___.", options: ["boring", "boringly", "boredom", "bored"], a: "boring" },
                        { q: "She is a very ___ girl.", options: ["creative", "creatively", "create", "creation"], a: "creative" },
                        { q: "The book I read yesterday was ___.", options: ["interesting", "interestingly", "interest", "interested"], a: "interesting" },
                        { q: "Sunday is a very ___ day.", options: ["relaxing", "relax", "relaxingly", "relaxed"], a: "relaxing" },
                        { q: "The music at the party was very ___.", options: ["loud", "loudly", "loudness", "louder"], a: "loud" }
                    ]
                },
                convos: {
                    "Basic": [
                        { text: "What did you do last weekend? 📅", side: "left", gender: "m", voice: "william" },
                        { text: "I went to the park yesterday. 🏞️", side: "right", gender: "f", voice: "emma" },
                        { text: "Did you ride your bike last Sunday? 🚲", side: "left", gender: "m", voice: "william" },
                        { text: "Yes, I rode it with my family. 👨‍👩‍👧", side: "right", gender: "f", voice: "emma" },
                        { text: "Did you eat good food last night? 🍜", side: "left", gender: "m", voice: "william" },
                        { text: "Yes, we ate hot pot yesterday. It was delicious! 🍲", side: "right", gender: "f", voice: "emma" }
                    ],
                    "Compound": [
                        { text: "What did you do last weekend, or did you stay home? 📅🏠", side: "left", gender: "m", voice: "william" },
                        { text: "I went to the park on Saturday, and I ate hot pot on Sunday. 🏞️🍲", side: "right", gender: "f", voice: "emma" },
                        { text: "Did you ride your bike last Sunday, or did you watch a movie? 🚲🍿", side: "left", gender: "m", voice: "william" },
                        { text: "I rode my bike with my family yesterday, but we did not watch a movie. 👨‍👩‍👧🚫", side: "right", gender: "f", voice: "emma" },
                        { text: "Was the hot pot spicy last night, or was it regular? 🌶️🍲", side: "left", gender: "m", voice: "william" },
                        { text: "It was very spicy, so I drank a lot of water yesterday! 💧🔥", side: "right", gender: "f", voice: "emma" }
                    ]
                }
            }
        };

        // --- GLOBAL STATE & NAVIGATION ---
        let totalXP = parseInt(localStorage.getItem('gq_xp')) || 0;
        let earnedBadges = JSON.parse(localStorage.getItem('gq_badges')) || [];
        
        let screenHistory = ['menu-screen'];
        let currentTopic = null;
        let currentQuizData = null;
        let currentConvoData = null;
        let qIndex = 0;
        let cIndex = 0;
        let quizScore = 0;
        let lockUI = false;
        let isTtsActive = false;

        function navBack() {
            if (screenHistory.length > 1) {
                screenHistory.pop(); // Remove current
                let prev = screenHistory[screenHistory.length - 1];
                showScreenOnly(prev);
            }
        }

        function navHome() {
            screenHistory = ['menu-screen'];
            showScreenOnly('menu-screen');
        }

        function navNext() {
            const currentScreen = screenHistory[screenHistory.length - 1];
            if (currentScreen === 'quiz-screen' && !lockUI) {
                // Skip question in quiz
                handleAnswer(null, null, true); 
            } else if (currentScreen === 'convo-screen' && isTtsActive) {
                // Skip convo line
                synth.cancel();
            } else if (currentScreen === 'hub-screen') {
                // Go to next topic in list
                const topicKeys = Object.keys(lessons);
                let idx = topicKeys.indexOf(currentTopic);
                if (idx >= 0 && idx < topicKeys.length - 1) {
                    openTopicHub(topicKeys[idx + 1]);
                } else {
                    navHome();
                }
            } else if (currentScreen === 'menu-screen') {
                // Open first topic
                openTopicHub(Object.keys(lessons)[0]);
            } else if (currentScreen === 'results-screen') {
                navBack(); // Go back to hub
            }
        }

        // --- TTS ENGINE ---
        const synth = window.speechSynthesis;
        let voicesMap = {};
        
        function initVoices() {
            const voices = synth.getVoices();
            if (voices.length === 0) { setTimeout(initVoices, 500); return; }
            
            // Priority: Microsoft Online > Exact Name > Gender > Fallback
            const findV = (name, gender) => 
                voices.find(v => v.name.includes(name) && v.name.includes("Online")) || 
                voices.find(v => v.name.includes(name)) || 
                voices.find(v => v.name.includes(gender) && v.lang.startsWith("en")) || 
                voices[0];

            voicesMap['brian'] = findV("Brian", "Male");
            voicesMap['andrew'] = findV("Andrew", "Male");
            voicesMap['william'] = findV("William", "Male");
            voicesMap['emma'] = findV("Emma", "Female");
            voicesMap['ava'] = findV("Ava", "Female");
        }
        if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = initVoices;
        setTimeout(initVoices, 100);

        // Emoji regex to strip out emojis before reading
        const emojiRegex = /[\u{1F300}-\u{1F9FF}]|[\u{2600}-\u{26FF}]|[\u{2700}-\u{27BF}]|[\u{1F100}-\u{1F1FF}]|[\u{1F600}-\u{1F64F}]|[\u{1F680}-\u{1F6FF}]|[\u{1F700}-\u{1F77F}]|[\u{1F780}-\u{1F7FF}]|[\u{1F800}-\u{1F8FF}]|[\u{1F900}-\u{1F9FF}]|[\u{1FA00}-\u{1FA6F}]|[\u{1FA70}-\u{1FAFF}]|[\u{2300}-\u{23FF}]|[\u{25A0}-\u{25FF}]|[\u{2900}-\u{297F}]|[\u{2B00}-\u{2BFF}]|[\u{3030}]|[\u{303D}]|[\u{3297}]|[\u{3299}]/gu;

        function wrapEmojis(text) {
            if (!text) return text;
            return text.replace(emojiRegex, (match) => `<span class="emoji">${match}</span>`);
        }

        function stripEmojis(text) { return text.replace(emojiRegex, '').trim(); }
        
        function speak(text, voiceName, onEnd = null) {
            if (!text || text.trim() === '') { if (onEnd) onEnd(); return; }
            synth.cancel();
            
            // Clean text specifically for TTS
            let cleanText = stripEmojis(text);
            cleanText = cleanText.replace(/___/g, "blank");
            
            const utter = new SpeechSynthesisUtterance(cleanText);
            utter.voice = voicesMap[voiceName] || voicesMap['emma'];
            utter.rate = 0.85; // Persona Requirement: 85% speed
            
            if (onEnd) {
                utter.onend = onEnd;
                utter.onerror = (e) => { console.error('TTS Error', e); onEnd(); };
            }
            synth.speak(utter);
        }

        // --- PARTICLE SYSTEM ---
        const canvas = document.getElementById('glitter-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.size = Math.random() * 8 + 4;
                this.speedX = (Math.random() - 0.5) * 15;
                this.speedY = (Math.random() - 0.5) * 15;
                this.color = `hsl(${Math.random() * 60 + 40}, 100%, 50%)`; // Gold/Yellow spectrum
                this.opacity = 1;
            }
            update() { this.x += this.speedX; this.y += this.speedY; this.opacity -= 0.02; }
            draw() { 
                ctx.globalAlpha = this.opacity; ctx.fillStyle = this.color; 
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); 
            }
        }

        function triggerFireworks() {
            for (let i = 0; i < 80; i++) particles.push(new Particle(window.innerWidth / 2, window.innerHeight / 2));
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update(); particles[i].draw();
                if (particles[i].opacity <= 0) { particles.splice(i, 1); i--; }
            }
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        // --- CORE LOGIC ---
        function updateXP(amount) {
            totalXP += amount;
            localStorage.setItem('gq_xp', totalXP);
            document.getElementById('nav-xp').textContent = totalXP;
            
            let level = "Novice";
            if (totalXP >= 50) level = "Apprentice";
            if (totalXP >= 100) level = "Scholar";
            if (totalXP >= 200) level = "Master";
            document.getElementById('player-level').textContent = level;
        }

        function addBonusPoints() {
            updateXP(5);
            triggerFireworks();
            speak("Bonus points!", 'william');
        }

        function renderMenu() {
            const topicGrid = document.getElementById('topic-grid');
            topicGrid.innerHTML = '';
            
            Object.keys(lessons).forEach(key => {
                const data = lessons[key];
                
                // Build Topic Buttons
                const btn = document.createElement('button');
                btn.className = 'btn-3d btn-white p-6 rounded-[2rem] text-center flex flex-col items-center justify-center';
                btn.innerHTML = `<span class="text-5xl mb-3">${data.emoji}</span><span class="font-black text-slate-700 text-lg">${data.title}</span>`;
                btn.onclick = () => openTopicHub(key);
                topicGrid.appendChild(btn);
            });
            updateXP(0); // init display
        }

        function openTopicHub(key) {
            currentTopic = key;
            const data = lessons[key];
            document.getElementById('hub-emoji').textContent = data.emoji;
            document.getElementById('hub-title').textContent = data.title;
            document.getElementById('hub-vocab').innerHTML = wrapEmojis(data.vocab);
            showScreen('hub-screen');
        }

        function showScreen(id) {
            if (screenHistory[screenHistory.length - 1] !== id) {
                screenHistory.push(id);
            }
            showScreenOnly(id);
        }

        function showScreenOnly(id) {
            synth.cancel();
            isTtsActive = false;
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'menu-screen') renderMenu();
        }

        // --- QUIZ LOGIC ---
        let currentQuizType = '';
        function startQuiz(grammarType) {
            currentQuizType = grammarType;
            currentQuizData = lessons[currentTopic].grammar[grammarType];
            qIndex = 0;
            quizScore = 0;
            lockUI = false;
            document.getElementById('quiz-type-title').textContent = `${lessons[currentTopic].title} - ${grammarType}`;
            showScreen('quiz-screen');
            renderQuestion();
        }

        function renderQuestion() {
            const data = currentQuizData[qIndex];
            document.getElementById('question-counter').textContent = `Drill ${qIndex + 1} / ${currentQuizData.length}`;
            document.getElementById('question-text').innerHTML = wrapEmojis(data.q);
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            // Randomize options
            const shuffledOptions = [...data.options].sort(() => Math.random() - 0.5);
            
            shuffledOptions.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'btn-3d btn-white rounded-2xl py-6 px-4 text-2xl font-black text-slate-700 w-full';
                btn.textContent = opt;
                btn.onclick = () => handleAnswer(opt, btn, false);
                container.appendChild(btn);
            });
            
            document.getElementById('feedback-area').innerHTML = '';
            speak(data.q, 'emma');
        }

        function handleAnswer(selected, btn, skipped = false) {
            if (lockUI) return;
            lockUI = true;
            const data = currentQuizData[qIndex];
            const feedback = document.getElementById('feedback-area');

            if (skipped) {
                feedback.innerHTML = "Skipped ⏭️";
                feedback.className = "h-16 mt-6 flex items-center justify-center text-3xl font-black text-slate-500 pop-in";
                speak("Skipped.", 'emma');
            } else if (selected === data.a) {
                quizScore++;
                updateXP(5);
                btn.classList.add('correct-bg');
                feedback.innerHTML = "Perfect! ✨";
                feedback.className = "h-16 mt-6 flex items-center justify-center text-3xl font-black text-green-600 pop-in";
                speak("Perfect!", 'emma');
            } else {
                btn.classList.add('incorrect-bg', 'shake');
                feedback.innerHTML = "Not quite! 💡";
                feedback.className = "h-16 mt-6 flex items-center justify-center text-3xl font-black text-red-500 pop-in";
                speak("Try again next time.", 'emma');
            }

            setTimeout(() => {
                qIndex++;
                if (qIndex < currentQuizData.length) { lockUI = false; renderQuestion(); } 
                else finishQuiz();
            }, 1500);
        }

        function finishQuiz() {
            showScreen('results-screen');
            document.getElementById('res-subtitle').textContent = currentQuizType;
            document.getElementById('res-score').textContent = `${quizScore} / ${currentQuizData.length}`;
            
            const badgeBox = document.getElementById('badge-celebration');
            // If perfect score and badge not earned
            if (quizScore === currentQuizData.length && !earnedBadges.includes(currentTopic)) {
                earnedBadges.push(currentTopic);
                localStorage.setItem('gq_badges', JSON.stringify(earnedBadges));
                
                // Wrapping the badge in the emoji wrapper
                document.getElementById('earned-badge-icon').innerHTML = wrapEmojis(lessons[currentTopic].emoji);
                
                badgeBox.classList.remove('hidden');
                document.getElementById('results-header').textContent = "RANK UP! 🏅";
                triggerFireworks();
                speak(`Fantastic! You earned the ${lessons[currentTopic].title} badge!`, 'william');
            } else {
                badgeBox.classList.add('hidden');
                document.getElementById('results-header').textContent = "Drill Complete! 🎯";
                speak(`Well done! You got ${quizScore} out of ${currentQuizData.length}.`, 'william');
            }
        }

        // --- CONVERSATION LOGIC ---
        function startConvo(type) {
            currentConvoData = lessons[currentTopic].convos[type];
            cIndex = 0;
            isTtsActive = true;
            document.getElementById('convo-header').textContent = `${lessons[currentTopic].title} - ${type}`;
            document.getElementById('convo-container').innerHTML = '';
            showScreen('convo-screen');
            playNextTurn();
        }

        function playNextTurn() {
            if (!isTtsActive || !currentConvoData) return;
            if (cIndex >= currentConvoData.length) {
                isTtsActive = false;
                updateXP(10); // Reward for finishing convo
                return;
            }
            
            const turn = currentConvoData[cIndex];
            const container = document.getElementById('convo-container');
            const bubble = document.createElement('div');
            
            const sideClass = turn.side === 'left' ? 'chat-left' : 'chat-right';
            bubble.className = `chat-bubble ${sideClass} active`;
            bubble.innerHTML = wrapEmojis(turn.text);
            
            container.appendChild(bubble);
            container.scrollTop = container.scrollHeight;
            
            // Dim previous bubbles
            const allBubbles = container.querySelectorAll('.chat-bubble');
            if (allBubbles.length > 1) {
                allBubbles[allBubbles.length - 2].classList.remove('active');
                allBubbles[allBubbles.length - 2].classList.add('inactive');
            }
            
            speak(turn.text, turn.voice, () => {
                cIndex++;
                if (cIndex < currentConvoData.length) {
                    setTimeout(playNextTurn, 600);
                } else {
                    isTtsActive = false;
                    updateXP(10);
                }
            });
        }

        function repeatConvo() { 
            synth.cancel(); 
            cIndex = 0; 
            document.getElementById('convo-container').innerHTML = ''; 
            isTtsActive = true; 
            playNextTurn(); 
        }

        // Initialize App
        window.onload = () => {
            renderMenu();
        };
    </script>
</body>
