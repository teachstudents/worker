                          else btnStyle = "bg-slate-800 text-slate-500 border-transparent opacity-50";

                        return (
                          <button key={optIdx} disabled={hasAnswered} onClick={() => { handleSpeak(opt); handleOptionClick(qIdx, optIdx, mcq.answer); }} className={`w-full text-left px-3 py-2 rounded-md border transition-all text-xs font-medium ${btnStyle}`}>

                                    <h2 className="text-xl font-extrabold text-slate-800 mb-2">
                                        {round < totalRounds - 1 ? 'Round Complete!' : 'Unit Complete!'}
                                    </h2>
                                    <p className="text-slate-500 text-xs mb-5">
                                        {round < totalRounds - 1 ? "Great job. Ready for the next set?" : "You've matched all vocabulary for this unit."}
                                    </p>
                                    {round < totalRounds - 1 ? (
                                        <button onClick={() => setRound(round + 1)} className="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-bold py-2.5 px-6 rounded-lg shadow-sm transition-transform hover:scale-105">
                                            Next Round <i className="fa-solid fa-arrow-right ml-1"></i>
                                        </button>
                                    ) : (
                                        <div className="flex gap-2 w-full">
                                            <button onClick={() => setRound(0)} className="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs font-bold py-2.5 px-3 rounded-lg transition-colors">Play Again</button>
                                            <button onClick={onExit} className="flex-1 bg-teal-500 hover:bg-teal-600 text-white text-xs font-bold py-2.5 px-3 rounded-lg shadow-sm transition-transform hover:scale-105">Dashboard</button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            </div>
          );
        };

        function App() {
          const [activeUnit, setActiveUnit] = useState(unitData[0]);
          const [isSidebarOpen, setIsSidebarOpen] = useState(false);
          const [activeTab, setActiveTab] = useState("overview");
          const [showModelAnswer, setShowModelAnswer] = useState({});
          const voiceIndexRef = useRef(0);

          const allowedVoices = ["Remy", "Giuseppe", "Vivienne", "Florian", "Seraphina", "Emma", "Brian", "Ava", "Andrew", "William"];

          useEffect(() => {
            return () => {
              if ('speechSynthesis' in window) window.speechSynthesis.cancel();
            };
          }, []);

          const handleSpeak = (text) => {
            if (!('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel();
            
            const utter = new SpeechSynthesisUtterance(text);
            utter.rate = 0.85; 

            const loadVoices = () => {
              const voices = window.speechSynthesis.getVoices();
              
              const validVoices = voices.filter(v => 
                allowedVoices.some(name => v.name.includes(name)) &&
                v.name.includes("Microsoft") &&
                v.name.includes("Online") &&
                v.lang.startsWith("en")
              );

              if (validVoices.length === 0) {
                console.warn("Strict TTS enforcement: No permitted Microsoft Online English voices found. Speech cancelled.");
                return;
              }

              const selected = validVoices[voiceIndexRef.current % validVoices.length];
              voiceIndexRef.current += 1;

              utter.voice = selected;
              window.speechSynthesis.speak(utter);
            };

            if (window.speechSynthesis.getVoices().length === 0) {
              window.speechSynthesis.onvoiceschanged = loadVoices;
            } else {
              loadVoices();
            }
          };

          const selectUnit = (unit) => {
            setActiveUnit(unit);
            setIsSidebarOpen(false);
            setActiveTab("overview");
            setShowModelAnswer({});
            if ('speechSynthesis' in window) window.speechSynthesis.cancel();
          };

          const toggleModelAnswer = (idx) => setShowModelAnswer(prev => ({ ...prev, [idx]: !prev[idx] }));

          const tabs = [
            { id: "overview", label: "Overview", icon: "fa-solid fa-book-open" },
            { id: "vocab", label: "Vocabulary", icon: "fa-solid fa-book" },
            { id: "speaking", label: "Speaking", icon: "fa-solid fa-microphone" },
            { id: "reading", label: "Reading", icon: "fa-solid fa-book" },
            { id: "listening", label: "Listening", icon: "fa-solid fa-headphones" },
            { id: "grammar", label: "Writing & Grammar", icon: "fa-solid fa-pen-to-square" },
            { id: "analysis", label: "Paragraph Analysis", icon: "fa-solid fa-magnifying-glass-chart" },
            { id: "testing", label: "Tutor & Test", icon: "fa-solid fa-clipboard-list" },
            { id: "game", label: "Game", icon: "fa-solid fa-gamepad" }
          ];

          if (activeTab === "game") {
            return <PracticeGamePage vocabulary={activeUnit.vocabulary} unitTitle={activeUnit.title} onExit={() => setActiveTab("overview")} handleSpeak={handleSpeak} />;
          }

          return (
            <div className="flex h-screen bg-slate-50 font-sans text-slate-800 overflow-hidden">
              
              {isSidebarOpen && <div className="fixed inset-0 bg-slate-900/50 z-20" onClick={() => setIsSidebarOpen(false)} />}

              <div className={`fixed inset-y-0 left-0 z-30 w-64 bg-slate-900 text-slate-300 transform transition-transform duration-300 ease-in-out flex flex-col ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                <div className="p-4 bg-slate-900 border-b border-slate-800 flex justify-between items-center shrink-0">
                  <div>
                    <h1 className="text-base font-bold text-white flex items-center gap-2">
                      <i className="fa-solid fa-book-open text-teal-400"></i> IELTS Prep Pt. 2
                    </h1>
                    <p className="text-[10px] text-slate-400 mt-0.5">Units 13 - 24</p>
                  </div>
                  <button className="text-slate-400 hover:text-white" onClick={() => setIsSidebarOpen(false)}>
                    <i className="fa-solid fa-times text-lg"></i>
                  </button>
                </div>
                <div className="p-2 overflow-y-auto flex-1">
                  <ul className="space-y-1 pb-10">
                    {unitData.map((unit) => (
                      <li key={unit.id}>
                        <button onClick={() => selectUnit(unit)} className={`w-full flex items-center gap-2 px-3 py-2 rounded-md text-xs transition-colors ${activeUnit.id === unit.id ? 'bg-teal-500/10 text-teal-400 font-medium border border-teal-500/20' : 'hover:bg-slate-800 hover:text-white border border-transparent'}`}>
                          <i className={`${unit.icon} ${activeUnit.id === unit.id ? 'text-teal-400' : 'text-slate-500'} w-4 text-center`}></i>
                          Unit {unit.id}: {unit.title}
                        </button>
                      </li>
                    ))}
                  </ul>
                </div>
              </div>

              <div className="flex-1 flex flex-col h-full relative w-full">
                
                <header className="bg-white border-b border-slate-200 px-3 md:px-4 py-2 flex items-center justify-between shadow-sm shrink-0">
                  <div className="flex items-center gap-2">
                    <button className="text-slate-500 hover:text-indigo-600 bg-slate-100 p-1.5 rounded-lg transition-colors flex items-center gap-1.5" onClick={() => setIsSidebarOpen(true)}>
                      <i className="fa-solid fa-list text-sm"></i><span className="font-semibold text-[11px] hidden sm:inline">Units</span>
                    </button>
                    <div className="h-4 w-px bg-slate-200 hidden md:block"></div>
                    <div className="flex flex-col md:flex-row md:items-center gap-1 md:gap-2">
                      <span className="bg-teal-100 text-teal-800 px-1.5 py-0.5 rounded text-[9px] uppercase tracking-wider w-fit">Unit {activeUnit.id}</span>
                      <h2 className="text-sm md:text-base font-extrabold text-slate-800">{activeUnit.title}</h2>
                    </div>
                  </div>
                  <div className="flex items-center gap-1.5 bg-indigo-50 text-indigo-700 px-2 py-1 rounded-md text-[9px] font-bold border border-indigo-100 uppercase tracking-wide shadow-sm">
                    <i className="fa-solid fa-graduation-cap text-xs shrink-0"></i><span className="hidden sm:inline">Secondary Student Mode</span>
                  </div>
                </header>

                <main className="flex-1 overflow-y-auto bg-slate-50 p-2 md:p-4 scroll-smooth">
                  <div className="max-w-6xl mx-auto flex flex-col h-full">
                    
                    <div className="flex flex-wrap gap-1.5 pb-2 mb-3 border-b border-slate-200">
                      {tabs.map(tab => (
                        <button key={tab.id} onClick={() => setActiveTab(tab.id)}
                          className={`flex-grow sm:flex-grow-0 flex items-center justify-center gap-1.5 px-2.5 py-1.5 rounded-md font-semibold text-[11px] transition-all border ${activeTab === tab.id ? 'border-indigo-600 text-indigo-700 bg-indigo-50 shadow-sm' : 'border-transparent text-slate-600 hover:text-slate-900 hover:bg-slate-100'}`}>
                          <i className={`${tab.icon} text-xs`}></i> <span className="whitespace-nowrap">{tab.label}</span>
                        </button>
                      ))}
                    </div>

                    <div className="flex-1 animate-fade-in pb-8">
                      
                      {/* OVERVIEW */}
                      {activeTab === "overview" && (
                        <div className="space-y-3">
                          <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                            <button onClick={() => handleSpeak(activeUnit.content)} className="bg-white p-3 md:p-4 rounded-xl shadow-sm border border-slate-200 text-left hover:border-teal-300 transition-all">
                              <h3 className="text-xs md:text-sm font-bold text-slate-800 mb-1.5 flex items-center gap-1.5"><i className="fa-solid fa-book-open text-indigo-500"></i> Academic Focus</h3>
                              <p className="text-slate-600 text-[11px] md:text-xs leading-relaxed">{activeUnit.content}</p>
                            </button>
                            <button onClick={() => handleSpeak(activeUnit.secondaryExample)} className="bg-indigo-50 p-3 md:p-4 rounded-xl border border-indigo-200 shadow-sm text-left hover:border-indigo-400 transition-all">
                              <h3 className="text-xs md:text-sm font-bold text-indigo-900 mb-1.5 flex items-center gap-1.5"><i className="fa-solid fa-graduation-cap text-indigo-600"></i> High School Scenario</h3>
                              <p className="text-indigo-800 text-[11px] md:text-xs font-medium leading-relaxed">{activeUnit.secondaryExample}</p>
                            </button>
                          </div>
                          <button onClick={() => handleSpeak(`Learning Outcomes: Listening: ${activeUnit.outcomes.listening} Reading: ${activeUnit.outcomes.reading} Writing: ${activeUnit.outcomes.writing} Speaking: ${activeUnit.outcomes.speaking} Grammar and Vocabulary: ${activeUnit.outcomes.grammarVocab}`)} className="w-full bg-white p-3 md:p-4 rounded-xl shadow-sm border border-slate-200 mt-2 text-left hover:border-teal-300 transition-all">
                            <h3 className="text-xs md:text-sm font-bold text-slate-800 mb-2.5 flex items-center gap-1.5"><i className="fa-solid fa-bullseye text-rose-500"></i> Learning Outcomes</h3>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                              {Object.entries(activeUnit.outcomes).map(([key, val]) => (
                                <div key={key} className={`flex items-start gap-2 ${key === 'grammarVocab' ? 'md:col-span-2 pt-1 border-t border-slate-100' : ''}`}>
                                   <i className={`fa-solid ${key==='listening'?'fa-headphones':key==='reading'?'fa-book':key==='writing'?'fa-pen-to-square':key==='speaking'?'fa-microphone':'fa-check-circle'} text-slate-400 text-sm mt-0.5 shrink-0`}></i>
                                   <div>
                                     <span className="text-[9px] font-bold text-slate-500 uppercase tracking-wider">{key}</span>
                                     <p className="text-[11px] text-slate-700 leading-snug mt-0.5">{val}</p>
                                   </div>
                                </div>
                              ))}
                            </div>
                          </button>
                        </div>
                      )}

                      {/* VOCABULARY */}
                      {activeTab === "vocab" && (
                        <div className="space-y-4">
                          <div className="bg-slate-900 p-3 md:p-4 rounded-xl text-slate-300 border border-slate-800 shadow-sm flex items-start gap-3">
                            <i className="fa-solid fa-book text-teal-400 text-lg shrink-0 mt-0.5"></i>
                            <div>
                              <h4 className="text-xs font-bold text-white mb-0.5">Key Vocabulary Groups</h4>
                              <p className="text-[11px] leading-relaxed">{activeUnit.keyVocabSummary}</p>
                            </div>
                          </div>
                          <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-2">
                            {activeUnit.vocabulary.map((v, i) => (
                              <button key={i} onClick={() => handleSpeak(v.word)} className="bg-white p-2.5 rounded-lg shadow-sm border border-slate-200 text-left hover:border-teal-400 transition-all active:scale-95">
                                <h4 className="text-xs font-bold text-slate-800 mb-1">{v.word}</h4>
                                <span className="inline-block bg-slate-100 text-slate-600 px-1.5 py-0.5 rounded text-[9px] font-bold mb-1.5 border border-slate-200">{v.chinese}</span>
                                <p className="text-slate-600 text-[10px] leading-tight">{v.definition}</p>
                              </button>
                            ))}
                          </div>
                          <UnitQuiz key={`quiz-${activeUnit.id}`} mcqs={activeUnit.mcqs} handleSpeak={handleSpeak} />
                        </div>
                      )}

                      {/* SPEAKING */}
                      {activeTab === "speaking" && (
                        <div className="space-y-4">
                          {activeUnit.speaking.map((section, idx) => (
                            <div key={idx} className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                              <div className="bg-indigo-50 border-b border-indigo-100 p-2.5 flex items-center">
                                <h3 className="text-xs font-bold text-indigo-900 flex items-center gap-1.5"><i className="fa-solid fa-microphone text-indigo-600"></i> {section.type}</h3>
                              </div>
                              <div className="p-3">
                                <button onClick={() => handleSpeak(section.questions.join(' '))} className="w-full text-left bg-white border border-slate-200 hover:border-teal-300 hover:bg-slate-50 p-2.5 rounded-lg transition-all shadow-sm mb-3 relative overflow-hidden">
                                  <div className="absolute top-0 left-0 w-1 h-full bg-indigo-500"></div>
                                  <h4 className="text-[9px] font-bold text-slate-400 uppercase tracking-wider mb-1.5">Examiner Prompts</h4>
                                  <ul className="space-y-1 pl-2">
                                    {section.questions.map((q, qIdx) => <li key={qIdx} className="text-xs leading-snug text-slate-800 font-medium list-disc ml-3">{q}</li>)}
                                  </ul>
                                </button>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                  <div className="bg-slate-50 border border-slate-200 rounded-lg p-2.5">
                                    <h4 className="text-[9px] font-bold text-slate-400 uppercase tracking-wider mb-2 flex items-center gap-1"><i className="fa-solid fa-pen-nib"></i> Useful Stems</h4>
                                    <ul className="space-y-1.5">
                                      {section.stems.map((stem, i) => (
                                        <li key={i}><button onClick={() => handleSpeak(stem)} className="text-left w-full bg-white border border-slate-200 p-1.5 rounded text-[11px] text-slate-700 hover:border-teal-400 transition-colors shadow-sm">{stem}</button></li>
                                      ))}
                                    </ul>
                                  </div>
                                  <button onClick={() => handleSpeak(section.example)} className="text-left bg-indigo-50 border border-indigo-100 hover:border-indigo-300 rounded-lg p-2.5 transition-all">
                                    <h4 className="text-[9px] font-bold text-indigo-400 uppercase tracking-wider mb-2 flex items-center gap-1"><i className="fa-regular fa-circle-check text-indigo-500"></i> Model Answer</h4>
                                    <p className="text-[11px] text-indigo-900 leading-relaxed font-medium italic">"{section.example}"</p>
                                  </button>
                                </div>
                              </div>
                            </div>
                          ))}
                        </div>
                      )}

                      {/* READING & LISTENING */}
                      {(activeTab === "reading" || activeTab === "listening") && (() => {
                        const tabData = activeTab === "reading" ? activeUnit.reading : activeUnit.listening;
                        const icon = activeTab === "reading" ? "fa-book" : "fa-headphones";
                        const title = activeTab === "reading" ? "Reading Passage" : "Listening Transcript";
                        const bgClass = activeTab === "reading" ? "bg-white border-slate-200 text-slate-800" : "bg-slate-900 border-slate-800 text-white";
                        const innerBg = activeTab === "reading" ? "bg-slate-50 hover:bg-teal-50 border-slate-200" : "bg-slate-800 hover:bg-slate-700 border-slate-700";
                        const headClass = activeTab === "reading" ? "bg-slate-50 border-slate-200 text-slate-800" : "bg-slate-800 border-slate-700 text-white";
                        
                        return (
                          <div className={`rounded-xl shadow-sm border overflow-hidden ${bgClass}`}>
                            <div className={`p-3 border-b ${headClass}`}>
                              <h3 className="text-sm font-bold flex items-center gap-2"><i className={`fa-solid ${icon} text-teal-500`}></i> {title}</h3>
                            </div>
                            <div className="p-3">
                              <button onClick={() => handleSpeak(tabData.text)} className={`w-full text-left p-3 rounded-lg transition-all shadow-sm border ${innerBg}`}>
                                <p className={`text-xs leading-relaxed font-medium ${activeTab === 'listening' ? 'italic text-slate-300' : 'text-slate-700'}`}>{tabData.text}</p>
                              </button>
                            </div>
                            <div className={`p-3 border-t ${headClass}`}>
                              <h4 className={`text-[10px] font-bold uppercase tracking-wider mb-2 flex items-center gap-1.5 ${activeTab==='listening'?'text-slate-400':'text-slate-500'}`}>
                                <i className="fa-regular fa-circle-question"></i> Comprehension Check
                              </h4>
                              <ul className="space-y-1.5">
                                {tabData.questions.map((q, i) => (
                                   <li key={i}>
                                     <button onClick={() => handleSpeak(q)} className={`w-full text-left p-2 rounded-md text-[11px] font-medium shadow-sm transition-colors border ${activeTab==='reading'?'bg-white hover:bg-slate-100 border-slate-200 text-slate-700':'bg-slate-900 hover:bg-slate-700 border-slate-700 text-slate-300'}`}>
                                       {q}
                                     </button>
                                   </li>
                                ))}
                              </ul>
                            </div>
                          </div>
                        );
                      })()}

                      {/* GRAMMAR */}
                      {activeTab === "grammar" && (
                        <div className="bg-white p-4 md:p-5 rounded-xl shadow-sm border border-slate-200">
                          <h3 className="text-sm font-bold text-indigo-900 mb-3 flex items-center gap-1.5"><i className="fa-solid fa-pen-to-square text-indigo-500"></i> Grammar Focus: {activeUnit.grammar.topic}</h3>
                          <div className="mb-4">
                            <button onClick={() => handleSpeak(activeUnit.grammar.focus)} className="w-full text-left transition-colors rounded-lg mb-2">
                              <p className="text-[11px] font-semibold text-slate-800 bg-slate-100 p-2.5 rounded-lg border border-slate-200">{activeUnit.grammar.focus}</p>
                            </button>
                            <h4 className="text-[9px] font-bold text-slate-400 uppercase tracking-wider ml-1 mb-1.5">10 Example Sentences</h4>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-1.5">
                              {activeUnit.grammar.examples.map((ex, idx) => (
                                 <button key={idx} onClick={() => handleSpeak(ex)} className="text-left bg-white hover:bg-indigo-50 border border-slate-100 hover:border-indigo-200 p-2 rounded-lg transition-all text-[10px] font-medium text-slate-700 shadow-sm">
                                  "{ex}"
                                </button>
                              ))}
                            </div>
                          </div>
                          <button onClick={() => handleSpeak(activeUnit.grammar.model)} className="w-full text-left bg-indigo-50 border border-indigo-200 p-3 rounded-lg transition-all shadow-sm relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-1 h-full bg-indigo-500"></div>
                            <div className="text-[9px] font-bold text-indigo-600 uppercase tracking-wider mb-1">Usage Model</div>
                            <p className="text-[11px] text-indigo-900 font-medium">"{activeUnit.grammar.model}"</p>
                          </button>
                        </div>
                      )}

                      {/* ANALYSIS */}
                      {activeTab === "analysis" && (
                         <InteractiveParagraph data={activeUnit.paragraphAnalysis} handleSpeak={handleSpeak} />
                      )}

                      {/* TESTING */}
                      {activeTab === "testing" && (
                        <div className="space-y-4">
                          <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                            <h3 className="text-sm font-bold text-slate-800 mb-1 flex items-center gap-1.5"><i className="fa-solid fa-microphone text-teal-600"></i> Tutor Prompts</h3>
                            <p className="text-slate-500 text-[10px] mb-3">Interactive coaching. Click to read aloud.</p>
                            <div className="space-y-3">
                              {activeUnit.tutorPrompts.map((prompt, idx) => (
                                <div key={idx} className="bg-slate-50 border border-slate-200 rounded-lg overflow-hidden">
                                  <div className="bg-slate-100 px-3 py-1.5 border-b border-slate-200 flex justify-between items-center">
                                    <span className="font-bold text-slate-700 text-[11px]">{prompt.type}</span>
                                    <span className="text-[9px] font-bold text-indigo-600 uppercase tracking-wider bg-indigo-50 px-1.5 py-0.5 rounded">{prompt.focus}</span>
                                  </div>
                                  <div className="p-3">
                                    <button onClick={() => handleSpeak(prompt.text)} className="w-full text-left bg-white border border-slate-200 p-2 rounded shadow-sm hover:border-teal-300 transition-colors mb-2">
                                      <p className="text-[11px] text-slate-800 font-medium italic">"{prompt.text}"</p>
                                    </button>
                                    <div className="space-y-1 pl-2 border-l-2 border-slate-300">
                                      {prompt.questions.map((q, qIdx) => (
                                        <button key={qIdx} onClick={() => handleSpeak(q)} className="w-full text-left text-[10px] text-slate-600 hover:text-slate-900 transition-colors">• {q}</button>
                                      ))}
                                    </div>
                                  </div>
                                </div>
                              ))}
                            </div>
                          </div>

                          <div className="bg-slate-900 p-4 rounded-xl shadow-sm border border-slate-800 text-slate-300">
                            <h3 className="text-sm font-bold text-white mb-1 flex items-center gap-1.5"><i className="fa-solid fa-bullseye text-rose-400"></i> Practice for the Test</h3>
                            <div className="grid grid-cols-1 gap-3 mt-3">
                              {activeUnit.practiceTests.map((test, idx) => (
                                <div key={idx} className="bg-slate-800 border border-slate-700 rounded-lg shadow-inner flex flex-col p-3">
                                  <span className="font-bold text-teal-400 text-[10px] mb-2 block border-b border-slate-700 pb-1">{test.type}</span>
                                  <button onClick={() => handleSpeak(test.text)} className="text-left text-[11px] text-slate-300 mb-2 hover:text-white transition-colors">{test.text}</button>
                                  {test.modelAnswer && (
                                    <div className="mt-2 border-t border-slate-700 pt-2">
                                      <button onClick={() => toggleModelAnswer(idx)} className="flex items-center gap-1 text-[10px] font-bold text-indigo-400 hover:text-indigo-300 transition-colors">
                                        <i className="fa-solid fa-eye"></i> {showModelAnswer[idx] ? "Hide Answer" : "Show Answer"}
                                      </button>
                                      {showModelAnswer[idx] && (
                                        <button onClick={() => handleSpeak(test.modelAnswer)} className="w-full text-left mt-2 p-2 bg-indigo-900/20 border border-indigo-500/30 rounded text-[10px] text-slate-200 leading-relaxed italic animate-fade-in">{test.modelAnswer}</button>
                                      )}
                                    </div>
                                  )}
                                </div>
                              ))}
                            </div>
                          </div>
                        </div>
                      )}

                    </div>
                  </div>
                </main>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
