<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IELTS Listening Arcade - Trap Master</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Canvas Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <!-- Tone.js for Sound Effects -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f1f5f9; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        .bg-pattern { background-image: radial-gradient(#1e293b 1px, transparent 1px); background-size: 24px 24px; }
        
        .btn-hover { transition: all 0.2s ease; }
        .btn-hover:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.4); }
        
        /* Compact Trap Card Styling */
        .trap-card { border: 1px solid #334155; transition: all 0.3s ease; }
        .trap-card:hover { border-color: #38bdf8; transform: translateY(-5px); box-shadow: 0 10px 20px rgba(56, 189, 248, 0.15); cursor: pointer; }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-5px); }
            40% { transform: translateX(5px); }
            60% { transform: translateX(-5px); }
            80% { transform: translateX(5px); }
        }
        
        .shake-correct {
            animation: shake 0.4s ease-in-out;
            background-color: #16a34a !important;
            border-color: #4ade80 !important;
            color: white !important;
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.5);
        }
        
        .option-btn.wrong { background-color: #dc2626 !important; color: white !important; border-color: #f87171 !important; }
        .mode-btn { padding: 0.75rem 1rem; border-radius: 8px; font-weight: 600; cursor: pointer; border: 2px solid #cbd5e1; background: white; color: #64748b; flex: 1; transition: all 0.2s; }
        .mode-btn.selected { border-color: #e11d48; background: #ffe4e6; color: #be123c; }
        
        .fade-in { animation: fadeIn 0.3s ease-out; will-change: opacity; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .option-btn { will-change: transform; }
        .audio-playing { animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    </style>
</head>
<body class="bg-pattern min-h-screen flex flex-col pb-24">

    <!-- Main Navigation Bar -->
    <nav id="main-nav" class="fixed top-0 left-0 w-full bg-slate-900/95 backdrop-blur-sm border-b border-slate-700 z-40 hidden shadow-md">
        <div class="max-w-[95%] xl:max-w-7xl mx-auto px-4 py-2 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <i class="fas fa-crosshairs text-sky-400 text-xl"></i>
                <span class="font-bold text-white text-lg">Trap Master</span>
            </div>
            <div class="flex items-center gap-4">
                <!-- Persistent Header Score -->
                <div class="bg-slate-800 border border-slate-600 px-4 py-1.5 rounded-lg flex items-center gap-2 shadow-inner">
                    <i class="fas fa-star text-yellow-400"></i>
                    <span class="text-slate-300 text-sm font-semibold">Total Points:</span>
                    <span id="header-total-score" class="text-sky-400 font-bold text-lg transition-transform duration-200">0</span>
                </div>
                <button onclick="showMenu()" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm font-semibold transition flex items-center">
                    <i class="fas fa-home mr-2"></i>Menu
                </button>
            </div>
        </div>
    </nav>

    <!-- Startup Config Overlay -->
    <div id="start-overlay" class="fixed inset-0 bg-slate-900/95 flex flex-col items-center justify-center z-50 overflow-y-auto py-10">
      <div class="bg-white p-8 rounded-3xl text-center w-[90%] max-w-lg shadow-2xl">
        <div class="inline-block mb-4 text-sky-500 text-5xl"><i class="fas fa-users-cog"></i></div>
        <h1 class="text-3xl font-extrabold text-slate-800 mb-6 tracking-tight">Player Configuration</h1>
        
        <div class="flex gap-2 mb-6">
          <button type="button" id="btn-1p" class="mode-btn selected">1 Student</button>
          <button type="button" id="btn-2p" class="mode-btn">2 Students</button>
          <button type="button" id="btn-roster" class="mode-btn">Class Roster</button>
        </div>
        
        <input type="text" id="p1-name-input" class="w-full p-3 mb-4 text-lg border-2 border-slate-200 rounded-xl text-slate-800 focus:outline-none focus:border-sky-500 transition-colors" placeholder="Student 1 Name" value="">
        <input type="text" id="p2-name-input" class="hidden w-full p-3 mb-4 text-lg border-2 border-slate-200 rounded-xl text-slate-800 focus:outline-none focus:border-sky-500 transition-colors" placeholder="Student 2 Name" value="">
        <textarea id="roster-input" class="hidden w-full p-3 mb-4 text-lg border-2 border-slate-200 rounded-xl text-slate-800 focus:outline-none focus:border-sky-500 resize-y transition-colors" placeholder="Paste class list here (comma separated or new lines)&#10;e.g. John, Sarah, Mike, Lisa" rows="4"></textarea>

        <button id="start-game-btn" class="w-full py-4 mt-2 bg-sky-500 hover:bg-sky-400 text-white font-bold text-xl rounded-xl shadow-lg transition-all transform hover:-translate-y-1">Start Training <i class="fas fa-rocket ml-2"></i></button>
      </div>
    </div>

    <!-- Main Content -->
    <main class="flex-1 w-full max-w-[95%] xl:max-w-7xl mx-auto p-4 md:p-6 relative mt-16">
        
        <!-- Dashboard / 18 Trap Buttons (COMPACT DESIGN) -->
        <div id="dashboard-view" class="hidden pb-6">
            <div class="text-center mb-6 mt-4">
                <h2 class="text-3xl md:text-4xl font-extrabold mb-2 text-transparent bg-clip-text bg-gradient-to-r from-sky-400 to-indigo-500">Master the 18 Core Traps</h2>
                <p class="text-slate-400 text-sm md:text-base max-w-2xl mx-auto">Select a trap category. <span id="active-players-label" class="font-bold text-white bg-slate-800 px-2 py-1 rounded ml-1 text-xs"></span></p>
            </div>
            
            <!-- Grid is configured to be dense so it fits on screen -->
            <div id="trap-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-3">
                <!-- Trap buttons injected via JS -->
            </div>
        </div>

        <!-- Exercise View -->
        <div id="exercise-view" class="hidden w-full mx-auto mt-2">
            <div class="bg-slate-800 border border-slate-700 rounded-3xl p-6 md:p-8 shadow-2xl relative overflow-hidden flex flex-col min-h-[65vh]">
                <div class="absolute top-0 right-0 w-64 h-64 bg-sky-500/10 rounded-bl-full -z-10"></div>
                
                <div class="flex flex-col md:flex-row justify-between items-center gap-4 mb-8 border-b border-slate-700 pb-6 shrink-0">
                    <div class="flex items-center gap-3">
                        <span id="ex-trap-id" class="bg-indigo-500 text-white text-xs md:text-sm font-bold px-3 py-1 rounded uppercase tracking-widest shadow-md">Trap 1</span>
                        <span id="ex-progress" class="text-slate-400 font-bold text-sm bg-slate-900/50 px-3 py-1 rounded"></span>
                    </div>

                    <div class="flex justify-center items-center gap-3 md:gap-4">
                        <button id="play-audio-btn" class="w-14 h-14 rounded-full bg-sky-500 hover:bg-sky-400 flex items-center justify-center transition text-white shadow-[0_0_15px_rgba(56,189,248,0.5)] transform hover:scale-105" title="Play Audio">
                            <i class="fas fa-play text-2xl ml-1"></i>
                        </button>
                        <button id="prev-ex-btn" class="w-12 h-12 rounded-full bg-slate-700 hover:bg-slate-600 flex items-center justify-center transition text-slate-300 hover:text-white disabled:opacity-30 disabled:cursor-not-allowed shadow-md" title="Previous Question">
                            <i class="fas fa-step-backward text-xl"></i>
                        </button>
                        <button id="next-ex-btn" class="w-12 h-12 rounded-full bg-slate-700 hover:bg-slate-600 flex items-center justify-center transition text-slate-300 hover:text-white disabled:opacity-30 disabled:cursor-not-allowed shadow-md" title="Next Question">
                            <i class="fas fa-step-forward text-xl"></i>
                        </button>
                    </div>
                </div>

                <h4 id="ex-question" class="text-2xl md:text-4xl font-extrabold text-white mb-8 text-center leading-tight tracking-tight shrink-0 drop-shadow-md"></h4>

                <div id="options-container" class="w-full flex-1 flex flex-col justify-center">
                    <!-- Injected via JS -->
                </div>

                <div id="ex-feedback-area" class="hidden mt-6 p-4 rounded-xl text-center font-bold text-xl border shrink-0 transition-all"></div>
            </div>
        </div>

    </main>

    <!-- Trap Rule Accordion Footer -->
    <div id="trap-rule-footer" class="fixed bottom-0 left-0 w-full z-50 hidden">
        <div class="max-w-[95%] xl:max-w-7xl mx-auto bg-slate-900 border-t-2 border-x-2 border-sky-500/50 rounded-t-2xl shadow-[0_-15px_40px_rgba(0,0,0,0.6)] overflow-hidden transition-all duration-300">
            <button onclick="toggleTrapRule()" class="w-full py-3 px-6 text-sky-400 hover:text-sky-300 font-bold flex justify-between items-center hover:bg-slate-800 transition text-sm md:text-lg tracking-wide">
                <span class="flex items-center gap-3"><i class="fas fa-lightbulb text-xl text-yellow-400"></i> Trap Rule: <span id="footer-trap-name" class="text-white ml-1 font-semibold"></span></span>
                <i id="trap-rule-icon" class="fas fa-chevron-up text-xl"></i>
            </button>
            <div id="trap-rule-content" class="hidden px-8 pb-6 pt-2 text-slate-300 text-base md:text-lg leading-relaxed border-t border-slate-700/50 bg-slate-800/50">
                <p id="ex-trap-desc"></p>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // TRAP DATABASE: 18 Categories × 15 Exercises
        // ============================================
        const trapLibrary = [
            { 
                id: 1, name: "Double-Letter Spelling", desc: "The speaker uses 'double' instead of repeating a letter (e.g., 'double N' means N-N).",
                exercises: [
                    { audio: "My surname is Bennett. Put it down as B, E, double N, E, double T.", question: "How do you spell the student's surname?", options: ["BENET", "BENNETT", "BENNET"], correctIndex: 1 },
                    { audio: "The field trip is to the Woodlock Museum. That's W, double O, D, L, O, C, K.", question: "How do you spell the museum's name?", options: ["WODLOCK", "WOODLOK", "WOODLOCK"], correctIndex: 2 },
                    { audio: "The new principal is Mr. Harrison. H, A, double R, I, S, O, N.", question: "How do you spell the principal's name?", options: ["HARISON", "HARRISON", "HARISSON"], correctIndex: 1 },
                    { audio: "Our librarian is Mrs. Carroll. C, A, double R, O, double L.", question: "How do you spell the librarian's name?", options: ["CARROLL", "CAROL", "CAROLL"], correctIndex: 0 },
                    { audio: "The science award goes to Jamie Farrell. F, A, double R, E, double L.", question: "How do you spell the student's name?", options: ["FAREEL", "FARELL", "FARRELL"], correctIndex: 2 },
                    { audio: "Send your forms to Mr. Bassett. B, A, double S, E, double T.", question: "How do you spell the teacher's name?", options: ["BASSET", "BASETT", "BASSETT"], correctIndex: 2 },
                    { audio: "The guest speaker is Dr. Abbott. A, double B, O, double T.", question: "How do you spell the guest speaker's name?", options: ["ABBOTT", "ABOT", "ABOTT"], correctIndex: 0 },
                    { audio: "You need to find the Maxwell building. M, A, X, W, E, double L.", question: "How do you spell the building's name?", options: ["MAXWELL", "MAXWEL", "MAXWEEL"], correctIndex: 0 },
                    { audio: "The coach is Mr. Russell. R, U, double S, E, double L.", question: "How do you spell the coach's name?", options: ["RUSELL", "RUSSELL", "RUSSEL"], correctIndex: 1 },
                    { audio: "The scholarship goes to David Llewellyn. Double L, E, W, E, double L, Y, N.", question: "How do you spell the student's surname?", options: ["LLEWELLYN", "LEWELYN", "LEWELLYN"], correctIndex: 0 },
                    { audio: "The applicant's surname is McCormack—C, double C, O, R, M, A, C, K. Wait, actually, it's McCormick with an I, not an A.", question: "What is the correct spelling?", options: ["MCCORMACK", "MCCORMICK", "MCCORMAC"], correctIndex: 1 },
                    { audio: "Please note the spelling: F, I, T, Z, G, E, R, A, L, D. That's Fitzgerald with a G, not a J.", question: "How is the name spelled?", options: ["FITZJERALD", "FITZGERALD", "FITZJEROLD"], correctIndex: 1 },
                    { audio: "The research was conducted by Dr. Pettigrew—P, E, double T, I, G, R, E, W. No, sorry, it's Pettigrove with an O, not a U.", question: "What is the correct spelling?", options: ["PETTIGREW", "PETTIGROVE", "PETIGREW"], correctIndex: 1 },
                    { audio: "The conference venue is the Grand Ballroom at the Marriott Hotel. M, A, double R, I, O, double T. Actually, it's Marriot with one R, not two.", question: "How is the hotel name spelled?", options: ["MARRIOTT", "MARIOT", "MARRIOT"], correctIndex: 2 },
                    { audio: "The keynote speaker is Professor Wainwright. W, A, I, N, W, R, I, G, H, T. Wait, let me confirm: it's Wainright with an I, not a G.", question: "What is the correct spelling?", options: ["WAINWRIGHT", "WAINRIGHT", "WAINWRIHT"], correctIndex: 1 }
                ]
            },
            { 
                id: 2, name: "Self-Correction", desc: "The speaker gives incorrect information first, then corrects themselves using a pivot phrase.",
                exercises: [
                    { audio: "The assembly starts at 8:15... oh, wait a minute, looking at the new timetable, it actually starts at 8:45.", question: "What time does the assembly start?", options: ["8:15", "8:45", "8:30"], correctIndex: 1 },
                    { audio: "Please go to room 203 for the biology exam. Sorry, my mistake, they moved it to room 302.", question: "Which room is the exam in?", options: ["Room 203", "Room 302", "Room 230"], correctIndex: 1 },
                    { audio: "The club fee is 20 dollars. Oh, hold on, it was reduced this year to 15 dollars.", question: "How much is the club fee?", options: ["20 dollars", "15 dollars", "25 dollars"], correctIndex: 1 },
                    { audio: "Your homework is chapter 4. Let me rephrase that, just read chapter 5.", question: "Which chapter is the homework?", options: ["Chapter 4", "Chapter 5", "Both 4 and 5"], correctIndex: 1 },
                    { audio: "The sports day is on Thursday. Wait, rain is forecast, so we pushed it to Friday.", question: "When is sports day?", options: ["Thursday", "Friday", "Wednesday"], correctIndex: 1 },
                    { audio: "You need 50 credits to graduate. Actually, the new policy states you need 55 credits.", question: "How many credits are needed?", options: ["50", "55", "60"], correctIndex: 1 },
                    { audio: "The bus leaves from the East gate. My apologies, the East gate is closed. It leaves from the West gate.", question: "Where does the bus leave from?", options: ["East gate", "West gate", "North gate"], correctIndex: 1 },
                    { audio: "Bring a pencil to the exam. Actually, you must use a blue pen only.", question: "What should you bring to the exam?", options: ["A pencil", "A blue pen", "A black pen"], correctIndex: 1 },
                    { audio: "The library closes at 4 PM today. Oh, correction, today is Friday so it closes at 5 PM.", question: "What time does the library close?", options: ["4 PM", "5 PM", "6 PM"], correctIndex: 1 },
                    { audio: "Contact Mr. Smith for permission. Sorry, Mr. Smith is away, so email Mrs. Jones instead.", question: "Who should you contact?", options: ["Mr. Smith", "Mrs. Jones", "The Principal"], correctIndex: 1 },
                    { audio: "The deadline is next Friday... actually, let me check the syllabus... no, it's the Friday after that, so two weeks from now.", question: "When is the deadline?", options: ["Next Friday", "Two weeks from now", "This Friday"], correctIndex: 1 },
                    { audio: "The meeting is in Conference Room B... wait, I just got an email... it's actually in the Innovation Hub, not Conference Room B.", question: "Where is the meeting?", options: ["Conference Room B", "Innovation Hub", "Main Hall"], correctIndex: 1 },
                    { audio: "The exam covers chapters 1-5... actually, Professor Davis just announced it also includes chapter 6, so chapters 1 through 6.", question: "Which chapters are on the exam?", options: ["Chapters 1-5", "Chapters 1-6", "Chapters 2-6"], correctIndex: 1 },
                    { audio: "You need to submit the form online... actually, the system is down, so you must submit a hard copy to the office by 3 PM.", question: "How should the form be submitted?", options: ["Online", "Hard copy to office", "By email"], correctIndex: 1 },
                    { audio: "The workshop is free for students... actually, there's a 10 dollar materials fee, so it's not completely free, just discounted.", question: "What is the cost of the workshop?", options: ["Free", "10 dollars", "20 dollars"], correctIndex: 1 }
                ]
            },
            { 
                id: 3, name: "Unfulfilled Wish", desc: "An initial desire or plan is mentioned, but it is contrasted with reality.",
                exercises: [
                    { audio: "I originally wanted to take Art for my elective, but it was completely full, so I'll have to take Drama instead.", question: "Which elective is the student taking?", options: ["Art", "Drama", "Music"], correctIndex: 1 },
                    { audio: "We hoped to launch the student newspaper in May, but due to funding issues, we won't print the first issue until July.", question: "When will the newspaper launch?", options: ["May", "June", "July"], correctIndex: 2 },
                    { audio: "I really wanted to do my presentation on volcanoes, but Sarah took it first. So I'm doing earthquakes.", question: "What is the student's presentation topic?", options: ["Volcanoes", "Earthquakes", "Tsunamis"], correctIndex: 1 },
                    { audio: "The school wanted to build a swimming pool, but they didn't get the permit, so they built a tennis court.", question: "What did the school build?", options: ["A swimming pool", "A tennis court", "A gym"], correctIndex: 1 },
                    { audio: "I was hoping to buy the hardcover textbook, but it was too expensive. I settled for the digital version.", question: "Which version of the textbook did they buy?", options: ["Hardcover", "Digital", "Paperback"], correctIndex: 1 },
                    { audio: "We aimed to raise 500 dollars for charity. We fell short and only managed to collect 350 dollars.", question: "How much did they raise?", options: ["500 dollars", "350 dollars", "150 dollars"], correctIndex: 1 },
                    { audio: "I planned to study abroad in Spain, but my visa was delayed, so I'm staying here this semester.", question: "Where is the student studying this semester?", options: ["In Spain", "Here", "In France"], correctIndex: 1 },
                    { audio: "We wanted the school dance to be a Masquerade theme, but the voting results chose a Hawaiian theme.", question: "What is the theme of the school dance?", options: ["Masquerade", "Hawaiian", "Winter Wonderland"], correctIndex: 1 },
                    { audio: "I wished to get the morning lab schedule, but only the afternoon slots were left when I registered.", question: "When is the student's lab?", options: ["Morning", "Afternoon", "Evening"], correctIndex: 1 },
                    { audio: "The headmaster wanted to invite the mayor to speak, but he was busy, so a local author is coming instead.", question: "Who is the guest speaker?", options: ["The Mayor", "A local author", "The Headmaster"], correctIndex: 1 },
                    { audio: "I had hoped to complete my thesis by December, but the data collection took longer than expected, so the new submission date is March.", question: "When will the thesis be submitted?", options: ["December", "March", "January"], correctIndex: 1 },
                    { audio: "We intended to hold the conference in person, but travel restrictions forced us to make it a virtual event instead.", question: "How will the conference be held?", options: ["In person", "Virtual", "Hybrid"], correctIndex: 1 },
                    { audio: "I wanted to major in Psychology, but the program is at capacity, so I'm pursuing Sociology as my primary focus.", question: "What is the student's major?", options: ["Psychology", "Sociology", "Anthropology"], correctIndex: 1 },
                    { audio: "The team planned to travel by train, but the strike canceled all services, so we're taking the bus instead.", question: "How will the team travel?", options: ["By train", "By bus", "By car"], correctIndex: 1 },
                    { audio: "I aimed to score above 90% on the exam, but I made several careless errors, so my final grade was 78%.", question: "What was the student's final grade?", options: ["Above 90%", "78%", "85%"], correctIndex: 1 }
                ]
            },
            { 
                id: 4, name: "Red Herring", desc: "Multiple numbers or options are dropped to distract from the actual, final answer.",
                exercises: [
                    { audio: "The school trip costs £40 total. However, the student council subsidizes £15, meaning we only need to pay £25 out of pocket.", question: "How much does the student need to pay?", options: ["£40", "£15", "£25"], correctIndex: 2 },
                    { audio: "We need 50 chairs for the graduation. The supplier has 40 in blue and 60 in black. We'll take the 60 black ones just to be safe.", question: "How many chairs are they ordering?", options: ["50", "40", "60"], correctIndex: 2 },
                    { audio: "I have 3 history classes a week, and 2 science classes. But I spend a total of 8 hours studying at home.", question: "How many hours does the student study at home?", options: ["3", "2", "8"], correctIndex: 2 },
                    { audio: "The stadium holds 500 people. Last year we had 300 attend, but this year we expect exactly 450 guests.", question: "How many guests are expected this year?", options: ["500", "300", "450"], correctIndex: 2 },
                    { audio: "To pass, you need a score of 60. John got 55 last time, but today he finally achieved a 75.", question: "What score did John achieve today?", options: ["60", "55", "75"], correctIndex: 2 },
                    { audio: "The library has 10 computers on the first floor and 5 on the second, but the new lab has exactly 20 computers available.", question: "How many computers are in the new lab?", options: ["10", "5", "20"], correctIndex: 2 },
                    { audio: "My essay was supposed to be 1000 words. I originally wrote 800, but the final draft I submitted was 1200 words.", question: "How many words was the submitted draft?", options: ["1000", "800", "1200"], correctIndex: 2 },
                    { audio: "The biology field trip takes 4 teachers, 2 parents, and exactly 35 students.", question: "How many students are going on the trip?", options: ["4", "2", "35"], correctIndex: 2 },
                    { audio: "There are 12 lockers in the hallway. I asked for locker 8, but I was assigned locker 15.", question: "Which locker was the student assigned?", options: ["12", "8", "15"], correctIndex: 2 },
                    { audio: "The fundraiser requires us to sell 20 tickets. I sold 15 yesterday and 10 today, making a total of 25 tickets sold.", question: "How many tickets were sold in total?", options: ["20", "15", "25"], correctIndex: 2 },
                    { audio: "The conference registration is 150 dollars for early bird, 200 dollars for regular, but as a student with a valid ID, you only pay 75 dollars.", question: "How much does a student pay?", options: ["150 dollars", "200 dollars", "75 dollars"], correctIndex: 2 },
                    { audio: "The project timeline was originally 6 weeks, then extended to 8 weeks, but due to additional requirements, the final deadline is 10 weeks from start.", question: "What is the final project timeline?", options: ["6 weeks", "8 weeks", "10 weeks"], correctIndex: 2 },
                    { audio: "The scholarship offers 5000 dollars for first year, 7500 for second year, but the full four-year package totals 35000 dollars.", question: "What is the total four-year scholarship value?", options: ["5000 dollars", "7500 dollars", "35000 dollars"], correctIndex: 2 },
                    { audio: "The bus departs at 9:00, arrives at the first stop at 9:30, but the final destination arrival time is 11:15.", question: "When does the bus reach the final destination?", options: ["9:00", "9:30", "11:15"], correctIndex: 2 },
                    { audio: "The exam has 50 questions total: 20 multiple choice, 15 short answer, and 15 essay questions.", question: "How many essay questions are on the exam?", options: ["20", "15", "50"], correctIndex: 1 }
                ]
            },
            { 
                id: 5, name: "Negative Rejection", desc: "A tempting option is baited, but the speaker explicitly rejects it.",
                exercises: [
                    { audio: "We could buy new laptops for the lab. Actually, we don't need those yet. But we really do need a new projector.", question: "What will they buy for the lab?", options: ["Laptops", "A projector", "Textbooks"], correctIndex: 1 },
                    { audio: "You can add a lunch package for the trip. No thanks, I'll bring sandwiches. But I'll definitely take the guided tour ticket.", question: "What is the student purchasing?", options: ["Lunch package", "Guided tour ticket", "Sandwiches"], correctIndex: 1 },
                    { audio: "Should we rent a bus for the team? No, it's too expensive. We'll just have parents drive the players.", question: "How will the team travel?", options: ["Rent a bus", "Parents drive", "Walk"], correctIndex: 1 },
                    { audio: "I thought about joining the choir. I can't sing, though. I'll join the stage crew instead.", question: "Which group will the student join?", options: ["Choir", "Stage crew", "Orchestra"], correctIndex: 1 },
                    { audio: "We could use the textbook for research. No, the data is outdated. Let's use academic journals online.", question: "What will they use for research?", options: ["The textbook", "Academic journals", "Wikipedia"], correctIndex: 1 },
                    { audio: "Do you want to study in the library? No, it's too crowded right now. Let's head to the empty classroom.", question: "Where will they study?", options: ["The library", "The empty classroom", "The cafeteria"], correctIndex: 1 },

        // ============================================
        // MICROSOFT VOICE SYSTEM (Edge Optimized)
        // ============================================
        function initSpeechSynthesis() {
            const loadVoices = () => {
                let voices = window.speechSynthesis.getVoices();
                
                // STRICT Microsoft online multilingual voices only (No fallbacks)
                const allowedNames = ["remy", "giuseppe", "vivienne", "emma", "brian", "andrew", "william", "florian", "seraphina"];
                const maleNames = ["remy", "giuseppe", "brian", "andrew", "william"];
                const femaleNames = ["vivienne", "emma", "florian", "seraphina"]; 
                
                preferredVoices = voices.filter(v => {
                    const n = v.name.toLowerCase();
                    // Only load the explicitly requested voices
                    return allowedNames.some(a => n.includes(a));
                }).sort((a, b) => a.name.localeCompare(b.name));
                
                maleVoices.length = 0;
                femaleVoices.length = 0;
                
                preferredVoices.forEach(v => {
                    const n = v.name.toLowerCase();
                    if (maleNames.some(m => n.includes(m))) maleVoices.push(v);
                    if (femaleNames.some(f => n.includes(f))) femaleVoices.push(v);
                });

                // Prioritize Emma and Brian for consistency if available
                if (femaleVoices.length > 0) {
                    const emmaIndex = femaleVoices.findIndex(v => v.name.toLowerCase().includes('emma'));
                    if (emmaIndex > 0) {
                        const emma = femaleVoices.splice(emmaIndex, 1)[0];
                        femaleVoices.unshift(emma);
                    }
                }
                if (maleVoices.length > 0) {
                    const brianIndex = maleVoices.findIndex(v => v.name.toLowerCase().includes('brian'));
                    if (brianIndex > 0) {
                        const brian = maleVoices.splice(brianIndex, 1)[0];
                        maleVoices.unshift(brian);
                    }
                }
            };
            
            if ('speechSynthesis' in window) {
                if (window.speechSynthesis.getVoices().length > 0) loadVoices();
                else window.speechSynthesis.onvoiceschanged = loadVoices;
            }
        }

        // Play TTS with support for Male/Female dialogue tags
        async function playTTS(text) {
            window.speechSynthesis.cancel();
            
            if (!('speechSynthesis' in window) || preferredVoices.length === 0) {
                // STRICT NO FALLBACK: If the required Microsoft voices aren't found, fail silently
                console.error('STRICT MODE: Required Microsoft voices not available. No audio will play.');
                return;
            }

            // Parse text for "Male:" and "Female:" dialogue tags
            const parts = text.split(/(Male:|Female:)/gi).filter(p => p.trim() !== '');
            let currentGender = 'any';

            for (const part of parts) {
                if (part.toLowerCase() === 'male:') { currentGender = 'male'; continue; }
                if (part.toLowerCase() === 'female:') { currentGender = 'female'; continue; }

                await new Promise(resolve => {
                    let voicePool = preferredVoices;
                    if (currentGender === 'male' && maleVoices.length > 0) voicePool = maleVoices;
                    if (currentGender === 'female' && femaleVoices.length > 0) voicePool = femaleVoices;

                    // Ensure we ONLY pull from the strict Microsoft voice pool
                    const voice = voicePool[0]; 
                    
                    if (!voice) {
                        console.error('STRICT MODE: Mapped gender voice unavailable.');
                        resolve();
                        return;
                    }
                    
                    const utterance = new SpeechSynthesisUtterance(part.trim());
                    utterance.voice = voice; 
                    utterance.rate = audioRate;
                    utterance.volume = 1.0;
                    
                    if (navigator.userAgent.includes('Edge')) utterance.pitch = 1.0;
                    
                    utterance.onend = resolve;
                    utterance.onerror = resolve; // Continue on error
                    
                    window.speechSynthesis.speak(utterance);
                });
            }
        }

                const card = document.createElement('div');
                // COMPACT STYLING APPLIED HERE (h-20, p-3)
                card.className = "trap-card bg-slate-800 rounded-xl p-3 md:p-4 flex flex-col items-start relative overflow-hidden group h-20 md:h-24 justify-center";
                card.onclick = () => openTrap(trap.id);
                card.innerHTML = `
                    <div class="absolute -right-2 -bottom-2 text-slate-700 opacity-20 text-5xl md:text-6xl font-extrabold group-hover:text-sky-500 group-hover:opacity-10 transition-all z-0">${trap.id}</div>
                    <span class="bg-indigo-500/20 text-indigo-400 text-[10px] md:text-xs font-bold px-2 py-0.5 rounded uppercase tracking-widest border border-indigo-500/30 shadow-sm mb-1 z-10">Trap ${trap.id}</span>
                    <h3 class="text-sm md:text-base font-bold text-white leading-tight z-10 truncate w-full" title="${trap.name}">${trap.name}</h3>
                `;
                fragment.appendChild(card);
            });
            grid.appendChild(fragment);
        }

        function rotateRoster() {
            if (gameMode !== 'roster') return;
            rosterQueue.push(rosterQueue.shift());
            rosterQueue.push(rosterQueue.shift());
            activePlayers = [
                { name: rosterQueue[0], score: 0 },
                { name: rosterQueue[1], score: 0 }
            ];
            document.getElementById('active-players-label').textContent = `Active: ${activePlayers[0].name} vs ${activePlayers[1].name}`;
        }

        function openTrap(id) {
            currentTrapId = id;
            currentExerciseIndex = 0;
            
            document.getElementById('dashboard-view').classList.add('hidden');
            document.getElementById('exercise-view').classList.remove('hidden');
            document.getElementById('trap-rule-footer').classList.remove('hidden');
            window.scrollTo({top: 0, behavior: 'smooth'});
            
            renderExercise();
        }

        function showMenu() {
            window.speechSynthesis.cancel();
            if (gameMode === 'roster') rotateRoster();

            document.getElementById('dashboard-view').classList.remove('hidden');
            document.getElementById('exercise-view').classList.add('hidden');
            document.getElementById('trap-rule-footer').classList.add('hidden');
            
            if (!document.getElementById('trap-rule-content').classList.contains('hidden')) toggleTrapRule();
        }

        function toggleTrapRule() {
            const content = document.getElementById('trap-rule-content');
            const icon = document.getElementById('trap-rule-icon');
            content.classList.toggle('hidden');
            icon.classList.toggle('fa-chevron-up');
            icon.classList.toggle('fa-chevron-down');
        }

        function scrambleOptions(optionsArray, correctIdx) {
            let mapped = optionsArray.map((text, idx) => ({ text, isCorrect: idx === correctIdx }));
            for (let i = mapped.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [mapped[i], mapped[j]] = [mapped[j], mapped[i]];
            }
            return mapped;
        }

        function renderExercise() {
            isAnswered = false;
            const trap = trapLibrary.find(t => t.id === currentTrapId);
            const exercise = trap.exercises[currentExerciseIndex];
            
            document.getElementById('ex-trap-id').textContent = `Trap ${trap.id}`;
            document.getElementById('ex-progress').textContent = `${currentExerciseIndex + 1} / ${trap.exercises.length}`;
            document.getElementById('footer-trap-name').textContent = trap.name;
            document.getElementById('ex-trap-desc').textContent = trap.desc;
            document.getElementById('ex-question').textContent = exercise.question;
            
            const feedbackArea = document.getElementById('ex-feedback-area');
            feedbackArea.className = "hidden mt-6 p-4 rounded-xl text-center font-bold text-xl border shrink-0 transition-all";
            
            const audioBtn = document.getElementById('play-audio-btn');
            audioBtn.onclick = () => {
                audioBtn.classList.add('audio-playing');
                playTTS(exercise.audio).then(() => {
                    audioBtn.classList.remove('audio-playing');
                });
            };

            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            
            if (gameMode === '1p') {
                optionsContainer.className = "w-full flex-1 flex flex-col justify-center";
                const col = document.createElement('div');
                col.className = "flex flex-col gap-4 max-w-4xl mx-auto w-full";
                
                const opts = scrambleOptions(exercise.options, exercise.correctIndex);
                opts.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = "option-btn w-full text-center bg-slate-700 hover:bg-slate-600 border-2 border-slate-600 text-white font-bold p-5 md:p-6 rounded-2xl transition-all btn-hover text-lg md:text-2xl shadow-md";
                    btn.textContent = opt.text;
                    btn.onclick = () => handleAnswer(opt.isCorrect, 0, btn);
                    col.appendChild(btn);
                });
                
                const scoreLabel = document.createElement('div');
                scoreLabel.className = "mt-4 text-center text-2xl font-bold text-sky-400";
                scoreLabel.innerHTML = `${activePlayers[0].name}: <span id="p1-score">${activePlayers[0].score}</span>`;
                col.appendChild(scoreLabel);
                optionsContainer.appendChild(col);
                
            } else {
                // 2-PLAYER SPLIT SCREEN
                optionsContainer.className = "w-full flex-1 flex flex-col md:flex-row justify-center gap-4 md:gap-6";
                
                // P1 (Left)
                const leftCol = document.createElement('div');
                leftCol.className = "flex-1 flex flex-col gap-3 md:gap-4";
                const p1Opts = scrambleOptions(exercise.options, exercise.correctIndex);
                p1Opts.forEach((opt, idx) => {
                    const btn = document.createElement('button');
                    btn.className = "option-btn w-full text-center bg-slate-700 hover:bg-slate-600 border-2 border-slate-600 text-white font-bold p-4 md:p-6 rounded-2xl transition-all btn-hover text-base md:text-xl shadow-md relative";
                    btn.innerHTML = `<span class="hidden md:inline-block bg-slate-800 text-slate-400 text-xs px-2 py-1 rounded mr-3 align-middle absolute left-4">${['A','S','D'][idx]}</span> ${opt.text}`;
                    btn.onclick = () => handleAnswer(opt.isCorrect, 0, btn);
                    leftCol.appendChild(btn);
                });
                const scoreLabel1 = document.createElement('div');
                scoreLabel1.className = "mt-2 text-center text-xl md:text-2xl font-extrabold text-sky-400 uppercase tracking-wide";
                scoreLabel1.innerHTML = `${activePlayers[0].name}: <span id="p1-score">${activePlayers[0].score}</span>`;
                leftCol.appendChild(scoreLabel1);
                
                // Divider
                const divider = document.createElement('div');
                divider.className = "hidden md:block w-1 bg-slate-700 rounded-full mx-1";

                // P2 (Right)
                const rightCol = document.createElement('div');
                rightCol.className = "flex-1 flex flex-col gap-3 md:gap-4 relative";
                const p2Opts = scrambleOptions(exercise.options, exercise.correctIndex);
                p2Opts.forEach((opt, idx) => {
                    const btn = document.createElement('button');
                    btn.className = "option-btn w-full text-center bg-slate-700 hover:bg-slate-600 border-2 border-slate-600 text-white font-bold p-4 md:p-6 rounded-2xl transition-all btn-hover text-base md:text-xl shadow-md relative";
                    btn.innerHTML = `<span class="hidden md:inline-block bg-slate-800 text-slate-400 text-xs px-2 py-1 rounded mr-3 align-middle absolute left-4">${['J','K','L'][idx]}</span> ${opt.text}`;
                    btn.onclick = () => handleAnswer(opt.isCorrect, 1, btn);
                    rightCol.appendChild(btn);
                });
                const scoreLabel2 = document.createElement('div');
                scoreLabel2.className = "mt-2 text-center text-xl md:text-2xl font-extrabold text-rose-400 uppercase tracking-wide";
                scoreLabel2.innerHTML = `${activePlayers[1].name}: <span id="p2-score">${activePlayers[1].score}</span>`;
                rightCol.appendChild(scoreLabel2);

                optionsContainer.appendChild(leftCol);
                optionsContainer.appendChild(divider);
                optionsContainer.appendChild(rightCol);
                
                window.currentP1Btns = leftCol.querySelectorAll('.option-btn');
                window.currentP2Btns = rightCol.querySelectorAll('.option-btn');
            }

            const prevBtn = document.getElementById('prev-ex-btn');
            const nextBtn = document.getElementById('next-ex-btn');
            
            prevBtn.disabled = currentExerciseIndex === 0;
            prevBtn.onclick = () => { currentExerciseIndex--; renderExercise(); };

            nextBtn.disabled = true;
            nextBtn.onclick = null;
        }

        let lastKeyTime = 0;
        document.addEventListener('keydown', (e) => {
            if(gameMode === '1p' || isAnswered || document.getElementById('exercise-view').classList.contains('hidden')) return;
            
            const now = Date.now();
            if (now - lastKeyTime < 100) return; // Prevent spam
            lastKeyTime = now;
            
            const k = e.key.toLowerCase();
            if(k === 'a') window.currentP1Btns[0]?.click();
            if(k === 's') window.currentP1Btns[1]?.click();
            if(k === 'd') window.currentP1Btns[2]?.click();
            if(k === 'j') window.currentP2Btns[0]?.click();
            if(k === 'k') window.currentP2Btns[1]?.click();
            if(k === 'l') window.currentP2Btns[2]?.click();
        });

        function handleAnswer(isCorrect, playerIndex, clickedBtn) {
            if (isAnswered) return;
            isAnswered = true;

            // Trigger Tone.js Audio Feedback
            playFeedbackSound(isCorrect);

            const allBtns = document.querySelectorAll('.option-btn');
            allBtns.forEach(b => {
                b.disabled = true;
                b.classList.remove('btn-hover', 'hover:bg-slate-600');
                b.classList.add('opacity-50');
            });
            clickedBtn.classList.remove('opacity-50');

            const feedbackArea = document.getElementById('ex-feedback-area');
            feedbackArea.classList.remove('hidden');
            
            const nextBtn = document.getElementById('next-ex-btn');
            nextBtn.disabled = false;
            const trap = trapLibrary.find(t => t.id === currentTrapId);
            
            if (currentExerciseIndex < trap.exercises.length - 1) {
                nextBtn.onclick = () => { currentExerciseIndex++; renderExercise(); };
            } else {
                nextBtn.onclick = showMenu;
            }

            const pName = activePlayers[playerIndex].name;
            
            if (isCorrect) {
                activePlayers[playerIndex].score++;
                clickedBtn.classList.add('shake-correct');
                fireConfetti();
                
                feedbackArea.className = "mt-6 p-4 rounded-xl text-center font-bold text-xl border shrink-0 transition-all bg-green-900/40 border-green-500/50 text-green-400";
                feedbackArea.innerHTML = `<i class="fas fa-bolt mr-3"></i> Correct! Point for ${pName}!`;
            } else {
                clickedBtn.classList.add('wrong');
                
                if (gameMode !== '1p') {
                    const otherPlayerIdx = playerIndex === 0 ? 1 : 0;
                    activePlayers[otherPlayerIdx].score++; // Give point to opponent
                    feedbackArea.className = "mt-6 p-4 rounded-xl text-center font-bold text-xl border shrink-0 transition-all bg-red-900/40 border-red-500/50 text-red-400";
                    feedbackArea.innerHTML = `<i class="fas fa-times-circle mr-3"></i> Incorrect! Point goes to ${activePlayers[otherPlayerIdx].name}.`;
                } else {
                    feedbackArea.className = "mt-6 p-4 rounded-xl text-center font-bold text-xl border shrink-0 transition-all bg-red-900/40 border-red-500/50 text-red-400";
                    feedbackArea.innerHTML = `<i class="fas fa-times-circle mr-3"></i> Incorrect! Try to catch the trap next time.`;
                }
            }

            // Update visible scores
            if(document.getElementById('p1-score')) document.getElementById('p1-score').textContent = activePlayers[0].score;
            if(gameMode !== '1p' && document.getElementById('p2-score')) document.getElementById('p2-score').textContent = activePlayers[1].score;
            
            // Update global persistent score
            updateHeaderScore();
        }

        document.addEventListener('DOMContentLoaded', () => {
            initSpeechSynthesis();
            if (navigator.userAgent.includes('Edge') && 'speechSynthesis' in window) {
                window.speechSynthesis.getVoices();
            }
        });
    </script>
</body>
</html>
