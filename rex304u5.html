        /* Feedback Message & Badge Notification */
        .feedback-toast, .badge-toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            padding: 12px 24px; border-radius: 9999px; color: white;
            font-weight: bold; z-index: 200;
            animation: slideUpFadeIn 0.5s ease-out, slideDownFadeOut 0.5s ease-in 3.5s forwards;
        }
        .feedback-toast.correct { background-color: #22c55e; }

        .badge-toast { background: linear-gradient(45deg, #fde047, #f97316); animation-duration: 4.5s; }
        @keyframes slideUpFadeIn { from { opacity: 0; bottom: 0; } to { opacity: 1; bottom: 20px; } }
        @keyframes slideDownFadeOut { from { opacity: 1; bottom: 20px; } to { opacity: 0; bottom: 0; } }

        /* Certificate Canvas */
        #completion-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        
        /* Progress Bar */
        #progress-container { background-color: #e5e7eb; border-radius: 9999px; overflow: hidden; height: 8px; width: 100%; margin-top: 8px; }
        #progress-bar { height: 100%; width: 0%; background-color: #f59e0b; transition: width 0.5s ease-out; }
        
        /* Vocab Game Timer */
        #vocab-game-timer-bar { height: 6px; background-color: #f59e0b; transition: width 0.1s linear; }
        
        /* Shake Animation for incorrect answers */
        @keyframes shake {
          10%, 90% { transform: translate3d(-1px, 0, 0); }
          20%, 80% { transform: translate3d(2px, 0, 0); }
          30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
          40%, 60% { transform: translate3d(4px, 0, 0); }

        .shake { animation: shake 0.82s cubic-bezier(.36,.07,.19,.97) both; }

        .word-bank-pills span { background-color: #ffffff; border: 1px solid #fcd34d; padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.875rem; font-weight: 500; color: #92400e; }

        #emoji-floating-container { position: fixed; inset: 0; pointer-events: none; z-index: 40; }
        .floating-emoji { position: absolute; font-size: 28px; will-change: transform, opacity; white-space: nowrap; user-select: none; opacity: 0; display: inline-block; text-shadow: 0 2px 6px rgba(0,0,0,0.2); }
        @keyframes floatAcross { 0% { transform: translateX(-10vw); opacity: 0; } 10% { opacity: 1; } 100% { transform: translateX(110vw); opacity: 0; } }
        @keyframes bob { 0% { transform: translateY(0); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0); } }
        .floating-emoji.canoe { font-size: 38px; animation-name: floatAcross; animation-timing-function: linear; animation-iteration-count: 1; }
        .floating-emoji.canoe .inner { animation: bob 3s ease-in-out infinite; display:inline-block; }
        .floating-emoji.scenic { font-size: 30px; animation-name: floatAcross; animation-timing-function: linear; animation-iteration-count: 1; }

        .particle.glitter.alt { background: #ffffff; box-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 15px #38bdf8; }

                // 0. Think Pair Share
                { id: 'tps-start', type: 'simple', content: { title: 'Activity: Think-Pair-Share <span aria-hidden="true">🧠</span>', text: 'Let\'s explore the push and pull factors of migration.' } },
                { id: 'tps-think', type: 'timer', content: { title: '1. Think <span aria-hidden="true">🤔</span>', text: 'Imagine moving to a brand new high school in a different city next year. What are the "push" factors (reasons you want to leave your old school) and "pull" factors (things attracting you to the new city)? You have 60 seconds.', duration: 60, timerId: 'tps-timer-1' } },
                { id: 'tps-pair', type: 'timer', content: { title: '2. Pair <span aria-hidden="true">👥</span>', text: 'With a partner, compare your high school move to early humans crossing a frozen land bridge or sailing the Pacific. What \"push\" or \"pull\" factors did our ancient ancestors have? You have 2 minutes.', duration: 120, timerId: 'tps-timer-2' } },
                { id: 'tps-share', type: 'timer', content: { title: '3. Share <span aria-hidden="true">🗣️</span>', text: 'As a class, discuss: Is the drive to explore and migrate hardwired into our DNA? Why do humans push into unknown territory?', duration: 180, timerId: 'tps-timer-3' } },

                        <p><strong class="text-amber-600">Learning Intention:</strong> We are learning to analyze how modern DNA tracks ancient human migration out of Africa, and how early Polynesians navigated the immense Pacific Ocean.</p>
                        <hr class="my-4 border-gray-300">
                        <h3 class="text-2xl font-bold text-amber-600 mb-3">Success Criteria</h3>
                        <ul class="list-disc list-inside space-y-2 text-xl">
                            <li>I can explain the <strong>Out of Africa</strong> theory using DNA evidence.</li>
                            <li>I can describe how the Lapita people used natural <strong>navigation</strong> techniques.</li>
                            <li>I can evaluate the ethical implications of commercial DNA testing.</li>
                        </ul>
                    </div>` } },
                
                // 2. Warm-Up & Vocab
                { id: 'warm-up', type: 'html-content', content: { title: 'Pre-Reading: Tracing Our Steps <span aria-hidden="true">📚</span>', html: `
                    <ol class="list-decimal list-inside space-y-4 text-xl text-left">
                        <li>If you wanted to prove where your ancestors came from 10,000 years ago, what physical proof could you possibly find?</li>
                        <li>How do you think sailors crossed the Pacific Ocean thousands of years before compasses and GPS were invented?</li>
                        <li>What makes a journey a "fantastic voyage" rather than just a trip?</li>

                { id: 'vocab-start', type: 'simple', content: { title: 'Unit Vocabulary <span aria-hidden="true">📚</span>', text: 'Let\'s learn the key terms for this unit. Click "Next" to see each word.' } },
                { id: 'vocab-game', type: 'vocab-game', content: { title: 'Vocabulary Review Game <span aria-hidden="true">🎮</span>'} },
                
                // 3. Reading & Comprehension
                { id: 'reading-main', type: 'html-content', content: { title: 'Reading: The Human Journey <span aria-hidden="true">📖</span>', html: `
                    <div class="space-y-6 text-left">
                        <div class="bg-orange-50 p-5 rounded-lg border border-orange-200">
                            <h4 class="font-bold text-xl text-orange-800">The DNA Trail</h4>
                            <p>It may be the greatest story ever told. It begins in Africa with a group of people, perhaps just a few hundred, surviving by hunting and gathering. It ends about 200,000 years later with their seven billion <strong>descendants</strong> spread across the Earth. For decades, the only proof was found in <strong>scattered</strong> bones and artifacts. In the past 20 years, however, DNA technologies have allowed scientists to <strong>trace</strong> ancient human migrations by looking at the genetic code of living people. Probably between 50,000 and 70,000 years ago, one small group left Africa for western Asia, eventually reaching the Americas via the Bering Land Bridge.</p>
                        </div>
                        <div class="bg-blue-50 p-5 rounded-lg border border-blue-200">
                            <h4 class="font-bold text-xl text-blue-800">Fantastic Voyage</h4>
                            <p>Thousands of years ago, another incredible journey began. The ancestors of the Polynesians, known as the Lapita, sailed into the <strong>immense</strong> Pacific Ocean. Without modern instruments, they relied on natural <strong>navigation</strong>. They looked at the <strong>horizon</strong> for clues like cloud formations, the flight paths of birds, and the patterns of ocean swells. They successfully navigated huge distances, ensuring their culture remained <strong>intact</strong> as they settled islands from Hawaii to New Zealand.</p>
                        </div>
                        <div class="bg-emerald-50 p-5 rounded-lg border border-emerald-200">
                            <h4 class="font-bold text-xl text-emerald-800">The Ultimate Drive</h4>
                            <p>What drove early humans to venture into the unknown? "We jump borders," says geneticist Svante Pääbo. "We push into new territory even when we have resources where we are." Whether it was walking into Ice Age Europe or sailing toward an endless horizon, human migration is a unique <strong>phenomenon</strong>. We are a <strong>stubborn</strong> and endlessly curious species, and our shared DNA proves that we are all deeply connected.</p>
                        </div>
                    </div>` } },

                { id: 'reading-quiz-mcq', type: 'quiz-mcq', content: { title: 'Comprehension: Multiple Choice', questions: [] } },
                
                // 4. Conversation Practice
                { id: 'conversation-practice', type: 'dialogue', content: { title: 'Conversation Practice <span aria-hidden="true">🗣️</span>', dialogue: `Mei: Hey Leo, did you get the results back from that DNA ancestry kit you took for biology class?

Leo: I did! It was actually pretty surprising. I always thought my family just came from Northern Europe, but my DNA shows I have ancestors from Central Asia too. 

Mei: That's wild. It's crazy how scientists can trace our bloodlines back tens of thousands of years just from a little saliva swab. 

Leo: Yeah, the report explained that my ancestors probably migrated eastward out of Africa, and some eventually scattered across the Asian steppes before moving into Europe.

Mei: It makes you think differently about borders and countries, doesn't it? If you go back far enough, we're all descendants of the exact same small group of people.

Leo: Exactly. The report even showed the rate of genetic mutations. It's like a biological clock ticking inside us. It kind of makes me want to travel and see the immense landscapes they crossed.` } },

Professor Wang: Every drop of your blood contains a record of your ancestors' journeys. How do we read it? We look for genetic markers. A marker is a rare mutation—a tiny spelling mistake in the DNA code. When a mutation occurs, it is passed down to all the descendants of that person.

Professor Wang: By comparing the DNA of living people around the world, geneticists can trace these markers backwards in time. They use specific parts of our DNA that don't get mixed up from generation to generation: mitochondrial DNA from the mother, and the Y chromosome from the father. 

Professor Wang: Through this method, we have proven that every single non-African person alive today is a descendant of one small group of humans who crossed out of Africa, likely over the Red Sea, roughly 60,000 years ago. It’s an immense, incredible realization. We are all family.` } },

                { id: 'lecture-uni-quiz-gap-fill', type: 'quiz-gap-fill', content: { title: 'Lecture Quiz (Gap Fill)', sentences: [], wordBank: [] } },
                
                // 6. Listening: Expert Talk
                { id: 'lecture-expert', type: 'dialogue', content: { title: 'Listening: Expert Talk <span aria-hidden="true">🎙️</span>', dialogue: `Host 1: Welcome back. Today we're speaking with Dr. Elena Cruz, a maritime anthropologist, about the greatest ocean explorers in history: the Polynesians. Dr. Cruz, they didn't have compasses, so how did they find tiny islands in the immense Pacific?

Dr. Elena Cruz: It’s a pleasure to be here. The ancestors of the Polynesians, the Lapita people, used what we call 'wayfinding' or natural navigation. They didn't need metal instruments because they used the environment itself as a compass.

Host 1: Can you give us an example?

Dr. Elena Cruz: The most crucial tool was the star compass. Navigators memorized the rising and setting points of dozens of stars. But during the day, or when it was cloudy, they read the ocean. They could feel the direction of the ocean swells bouncing back from distant islands, even if the land was far beyond the horizon.

Host 1: I read they also used birds?

Dr. Elena Cruz: Exactly. Certain seabirds fly out to fish in the morning and return to land at night. If a navigator saw a bird with fish in its mouth flying in a specific direction at dusk, they knew land was that way. It was an incredibly complex system passed down orally, and it allowed them to cross thousands of miles of open water.` } },

        class SpeechService {
             constructor() { 
                 this.synth = window.speechSynthesis; 
                 this.isInitialized = false; 
                 this.isTtsEnabled = true; 
                 this.voices = {}; 
                 
                 // Forced speed at 1x as explicitly requested
                 this.speechRate = 1; 
                 
                 this.isDialoguePlaying = false; 
             }
             
             async _setupVoices() {
                 const voicesPromise = new Promise(resolve => { 
                     if (this.synth.getVoices().length) return resolve(this.synth.getVoices()); 
                     this.synth.onvoiceschanged = () => resolve(this.synth.getVoices()); 
                 });
                 
                 const availableVoices = await voicesPromise;
                 if (!availableVoices.length) { console.warn("No speech synthesis voices available."); return; }
                 
                 // Expanded list of requested voices mapped out intelligently
                 const speakerToVoiceMap = {
                     'mei': ['Emma', 'Ava', 'Vivienne', 'Seraphina'],
                     'leo': ['Brian', 'Andrew', 'William', 'Florian'],
                     'professor wang': ['Florian', 'Giuseppe', 'William', 'Andrew'],
                     'dr. elena cruz': ['Seraphina', 'Vivienne', 'Emma', 'Ava'],
                     'host 1': ['Remy', 'Ava', 'Emma', 'Vivienne'],
                     'host 2': ['Andrew', 'Brian', 'Florian', 'Giuseppe'],
                     'narrator': ['William', 'Florian', 'Brian', 'Remy'],
                     'moderator': ['Giuseppe', 'Remy', 'Andrew', 'William'],
                     'maria': ['Ava', 'Emma', 'Seraphina', 'Vivienne'],
                     'carlos': ['Brian', 'Andrew', 'Giuseppe', 'Florian'],
                     'guide': ['William', 'Florian', 'Remy', 'Andrew'],
                     'student 1': ['Seraphina', 'Emma', 'Vivienne', 'Ava'],
                     'student 2': ['Remy', 'Brian', 'Andrew', 'William']
                 };
                 
                 for (const speaker in speakerToVoiceMap) {
                     const voicePriorityList = speakerToVoiceMap[speaker];
                     let chosenVoice = null;
                     
                     for (const voiceName of voicePriorityList) {
                         const foundVoice = availableVoices.find(v => v.name.includes(voiceName));
                         if (foundVoice) { chosenVoice = foundVoice; break; }
                     }
                     if (chosenVoice) { 
                         this.voices[speaker] = chosenVoice; 
                     } else { 
                         console.warn(`Could not find specified voices for speaker: "${speaker}"`); 
                     }
                 }
                 
                 this.voices['default'] = availableVoices.find(v => v.name.includes('Ava')) || 
                                          availableVoices.find(v => v.name.includes('Emma')) || 
                                          availableVoices.find(v => v.lang === 'en-US') || 
                                          availableVoices[0];
             }
             
             async init() { 
                 if (this.isInitialized) return; 
                 try { 
                     const warmUp = new SpeechSynthesisUtterance(' '); 
                     warmUp.volume = 0; 
                     this.synth.speak(warmUp); 
                     this.synth.cancel(); 
                     await this._setupVoices(); 
                     this.isInitialized = true; 
                 } catch (e) { 
                     console.error("Speech init failed", e); 
                 } 
             }
             
             _cleanTextForSpeech(text) { 
                 const tempDiv = document.createElement('div'); 
                 const textWithoutSpans = text.replace(/<span aria-hidden="true">.*?<\/span>/g, ' '); 
                 tempDiv.innerHTML = textWithoutSpans; 
                 return tempDiv.innerText || tempDiv.textContent || ''; 
             }
             
             async speak(text, { onEndCallback = null } = {}) { 
                 if (!this.isInitialized || !this.isTtsEnabled || !text) { 
                     if (onEndCallback) onEndCallback(); 
                     return; 
                 } 
                 if (this.synth.speaking) { this.cancel(); } 
                 
                 const utterance = new SpeechSynthesisUtterance(this._cleanTextForSpeech(text)); 
                 utterance.voice = this.voices['default']; 
                 utterance.rate = this.speechRate; 
                 
                 if (onEndCallback) utterance.onend = onEndCallback; 
                 this.synth.speak(utterance); 
             }
             
             async speakDialogue(text) { 
                 if (!this.isInitialized || !this.isTtsEnabled || !text || this.isDialoguePlaying) return; 
                 this.cancel(); 
                 this.isDialoguePlaying = true; 
                 
                 const lines = text.split('\n\n'); 
                 
                 const speakLine = (index) => { 
                     if (index >= lines.length || !this.isDialoguePlaying) { 
                         this.isDialoguePlaying = false; 
                         return; 
                     } 
                     
                     const line = lines[index]; 
                     const [speaker, ...rest] = line.split(': '); 
                     const lineText = rest.join(': '); 
                     const utterance = new SpeechSynthesisUtterance(this._cleanTextForSpeech(lineText || speaker)); 
                     
                     utterance.voice = this.voices[speaker.trim().toLowerCase()] || this.voices['default']; 
                     utterance.rate = this.speechRate; 
                     utterance.onend = () => speakLine(index + 1); 
                     
                     this.synth.speak(utterance); 
                 }; 
                 
                 speakLine(0); 
             }
             
             cancel() { 
                 if (this.synth) { 
                     this.isDialoguePlaying = false; 
                     this.synth.cancel(); 
                 } 
             }
             
             toggleTTS(forceState) { 
                 this.isTtsEnabled = forceState === undefined ? !this.isTtsEnabled : forceState; 
                 if (!this.isTtsEnabled) { this.cancel(); } 
                 return this.isTtsEnabled; 
             }
         }

        function spawnRewardAnimation(x, y) {
            const numParticles = 40; 
            const container = document.getElementById('reward-animation-container');
            if (!container) return;
            
            for (let i = 0; i < numParticles; i++) {
                const el = document.createElement('div');
                el.classList.add('particle');
                
                let type;
                if (Math.random() < 0.15) { 
                    type = 'dna';
                    el.classList.add('dna');
                    el.textContent = '🧬';
                } else {
                    type = 'glitter';
                    el.classList.add('glitter');
                    if (Math.random() < 0.5) el.classList.add('alt'); 
                }

                const particle = {
                    el: el,
                    x: x, 
                    y: y, 
                    vx: (Math.random() - 0.5) * 12, 
                    vy: (Math.random() * -10) - 5, 
                    life: 60 + Math.random() * 60, 
                    gravity: 0.2,
                    friction: 0.98,
                    type: type
                };

                particles.push(particle);
                container.appendChild(el);
            }

            if (!rewardAfHandle) {
                rewardAfHandle = requestAnimationFrame(animateParticles);
            }
        }

        function animateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                
                p.vx *= p.friction; 
                p.vy += p.gravity; 
                p.x += p.vx;
                p.y += p.vy;
                p.life--;

                if (p.life <= 0) {
                    p.el.remove();
                    particles.splice(i, 1);
                } else {
                    if (p.life < 20) {
                        p.el.style.opacity = p.life / 20;
                    }
                    
                    if (p.type === 'dna') {
                        p.el.style.transform = `translate(${p.x}px, ${p.y}px) rotate(${p.x}deg)`;
                    } else {
                        p.el.style.transform = `translate(${p.x}px, ${p.y}px)`;
                    }
                }
            }

            if (particles.length > 0) {
                rewardAfHandle = requestAnimationFrame(animateParticles);
            } else {
                rewardAfHandle = null; 
            }
        }

        function initGapFill(pageId) {
            const page = document.getElementById(pageId);
            if (!page) return;
            
            let selectedWord = { element: null, text: '' }; 

            const gaps = page.querySelectorAll('.gap');
            const words = page.querySelectorAll('.word-bank-word');
            const wordBank = page.querySelector('.word-bank-container');

            words.forEach(word => {
                word.addEventListener('dragstart', e => { e.dataTransfer.setData('text/plain', word.dataset.word); });
                word.addEventListener('click', handleWordClick);
            });
            gaps.forEach(gap => {
                gap.addEventListener('dragover', e => e.preventDefault());
                gap.addEventListener('drop', e => handleDrop(e, gap));
                gap.addEventListener('click', handleGapClick);
            });

            function handleWordClick(e) {
                const clickedWord = e.currentTarget;
                if (clickedWord.parentElement.classList.contains('gap')) { wordBank.appendChild(clickedWord); return; }
                if (selectedWord.element) selectedWord.element.classList.remove('selected');
                if (selectedWord.element === clickedWord) { selectedWord = { element: null, text: '' }; } 
                else { selectedWord = { element: clickedWord, text: clickedWord.dataset.word }; clickedWord.classList.add('selected'); }
            }
            function handleGapClick(e) {
                const clickedGap = e.currentTarget;
                if (!selectedWord.element || clickedGap.children.length > 0) return;
                clickedGap.appendChild(selectedWord.element);
                checkGap(clickedGap);
                selectedWord.element.classList.remove('selected');
                selectedWord = { element: null, text: '' };
            }
            function handleDrop(e, gap) {
                e.preventDefault();
                if (gap.children.length > 0) return;
                const wordText = e.dataTransfer.getData('text/plain');
                const wordElement = page.querySelector(`.word-bank-word[data-word="${wordText}"]`);
                if (wordElement) { gap.appendChild(wordElement); checkGap(gap); }
            }
            function checkGap(gap) {
                const word = gap.querySelector('.word-bank-word');
                const isCorrect = word && word.dataset.word.toLowerCase() === gap.dataset.answer.toLowerCase();
                gap.classList.toggle('correct', isCorrect);
                gap.classList.toggle('incorrect', !isCorrect);
                if (isCorrect) { 
                    playCorrectSound();
                    updateScore(10); 
                    showFeedbackMessage(true); 
                    const rect = gap.getBoundingClientRect();
                    spawnRewardAnimation(rect.left + rect.width / 2, rect.top + rect.height / 2);
                } else { 
                    playIncorrectSound();
                    showFeedbackMessage(false); 
                }
                setTimeout(checkCompletionAndMark, 100);
            }
        }

        let vocabGameQuestions = [];

        let vocabGameScore = 0;
        const ROUND_TIME = 10000; 

        function startVocabGame() {
            vocabGameQuestions = [...lessonData.vocabulary].sort(() => 0.5 - Math.random());
            vocabGameCurrentIndex = 0;
            vocabGameScore = 0;
            document.getElementById('vocab-game-score').textContent = '0';
            nextVocabGameRound();
        }

        function nextVocabGameRound() {
            if (vocabGameCurrentIndex >= vocabGameQuestions.length) {
                endVocabGame();
                return;
            }
            
            const question = vocabGameQuestions[vocabGameCurrentIndex];
            document.getElementById('vocab-game-definition').textContent = question.def;
            
            const options = [question.word];
            const wrongAnswers = lessonData.vocabulary.filter(v => v.word !== question.word);
            while (options.length < 4 && wrongAnswers.length > 0) {
                const randomWrong = wrongAnswers.splice(Math.floor(Math.random() * wrongAnswers.length), 1)[0];
                options.push(randomWrong.word);
            }
            
            const optionsContainer = document.getElementById('vocab-game-options');
            optionsContainer.innerHTML = '';
            options.sort(() => 0.5 - Math.random()).forEach(opt => {
                const button = document.createElement('button');
                button.className = 'quiz-option p-3 rounded-lg text-left bg-gray-100 hover:bg-gray-200 border border-gray-200';
                button.textContent = opt;
                button.onclick = () => checkVocabGameAnswer(button, opt === question.word);
                optionsContainer.appendChild(button);
            });

            startRoundTimer();
        }
        
        function startRoundTimer() {
            clearTimeout(vocabGameTimer);
            const timerBar = document.getElementById('vocab-game-timer-bar');
            timerBar.style.transition = 'none';
            timerBar.style.width = '100%';
            
            setTimeout(() => {
                timerBar.style.transition = `width ${ROUND_TIME / 1000}s linear`;
                timerBar.style.width = '0%';
            }, 100);

            vocabGameTimer = setTimeout(() => {
                showFeedbackMessage(false);
                vocabGameCurrentIndex++;
                nextVocabGameRound();
            }, ROUND_TIME);
        }

        function checkVocabGameAnswer(button, isCorrect) {
            clearTimeout(vocabGameTimer);
            showFeedbackMessage(isCorrect);
            if (isCorrect) {
                playCorrectSound();
                vocabGameScore++;
                updateScore(5);
                document.getElementById('vocab-game-score').textContent = vocabGameScore;
                button.classList.remove('bg-gray-100', 'hover:bg-gray-200');
                button.classList.add('bg-green-500', 'text-white');
                const rect = button.getBoundingClientRect();
                spawnRewardAnimation(rect.left + rect.width / 2, rect.top + rect.height / 2);
            } else {
                playIncorrectSound();
                button.classList.remove('bg-gray-100', 'hover:bg-gray-200');
                button.classList.add('bg-red-500', 'text-white', 'shake');
            }
            
            const optionsContainer = document.getElementById('vocab-game-options');
            optionsContainer.querySelectorAll('button').forEach(btn => btn.disabled = true);

        function startConfetti() {
            const canvas = document.getElementById('completion-canvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            
            if (canvas.parentElement) {
                canvas.width = canvas.parentElement.offsetWidth;
                canvas.height = canvas.parentElement.offsetHeight;
            } else {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }

            let confetti = [];
            const colors = ['#fde047', '#f97316', '#38bdf8', '#22c55e', '#6366f1'];
            
            for (let i = 0; i < 100; i++) {
                confetti.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height, 
                    size: Math.random() * 10 + 5,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    speed: Math.random() * 3 + 2,
                    angle: Math.random() * 2 * Math.PI,
                    tilt: Math.random() * 10 - 5
                });
            }
            
            let animationFrameId;
            function drawConfetti() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                confetti.forEach((p, i) => {
                    p.y += p.speed;
                    p.x += Math.sin(p.angle);
                    p.angle += 0.05;
                    
                    if (p.y > canvas.height) {
                        confetti.splice(i, 1);
                    }
                    
                    ctx.save();
                    ctx.fillStyle = p.color;
                    ctx.translate(p.x + p.size / 2, p.y + p.size / 2);
                    ctx.rotate(p.angle);
                    ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
                    ctx.restore();
                });
                
                if (confetti.length > 0) {
                    animationFrameId = requestAnimationFrame(drawConfetti);
                } else {
                    ctx.clearRect(0, 0, canvas.width, canvas.height); 
                    cancelAnimationFrame(animationFrameId);
                }
            }
            drawConfetti();
        }

                debateGap.content.sentences = [

                    { text: ['Maria calls it a massive corporate profit', 'disguised as science.'], answer: 'scheme' }
                ];
                debateGap.content.wordBank = ['immense', 'journey', 'scheme'];
            }

            const dilemmaMcq = lessonData.pages.find(p => p.id === 'dilemma-ethics-quiz-mcq');
            if(dilemmaMcq) dilemmaMcq.content.questions = [ { question: 'What is the ethical dilemma presented in this scenario?', options: ['Cheating on a biology project.', 'Finding a secret half-sibling through a DNA test.', 'Losing the results of a DNA test.', 'Taking a DNA test without paying.'], correctAnswer: 'Finding a secret half-sibling through a DNA test.' }, { question: "Why does Student 1 choose to confront the father privately?", options: ['They want to blackmail him.', 'They believe it\'s his secret to explain and they don\'t want to instantly ruin the family.', 'They are afraid of their mother.', 'They don\'t believe the DNA test.'], correctAnswer: 'They believe it\'s his secret to explain and they don\'t want to instantly ruin the family.' } ];
            const dilemmaTfng = lessonData.pages.find(p => p.id === 'dilemma-ethics-quiz-tfng');

            const dilemmaGap = lessonData.pages.find(p => p.id === 'dilemma-ethics-quiz-gap-fill');

                dilemmaGap.content.sentences = [ { text: ['Student 1 wants to confront the father', 'to avoid an immediate family explosion.'], answer: 'privately' }, { text: ['Student 2 believes the', 'is in the DNA and shouldn\'t be ignored.'], answer: 'truth' }, { text: ['Student 1 believes they deserve to know about their own', '.'], answer: 'bloodlines' } ];
                dilemmaGap.content.wordBank = ['privately', 'truth', 'bloodlines'];
            }
        }

        function initializeLesson() {
            document.getElementById('main-title').innerHTML = lessonData.title;
            document.getElementById('main-subtitle').innerHTML = lessonData.subtitle;
            document.getElementById('main-svg-container').innerHTML = `<svg viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">

                    </linearGradient>
                    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" />

                <line x1="400" y1="115" x2="400" y2="185" stroke="#94a3b8" stroke-width="4" opacity="0.5" />
                <line x1="500" y1="115" x2="500" y2="185" stroke="#94a3b8" stroke-width="4" opacity="0.5" />

            populateAllQuizzes();

            const menuButtons = lessonData.mainMenu.map(item => {

                return `<button id="menu-btn-${item.id}" onclick="navigateTo('${item.target}')" class="btn-animated-3d ${colors[item.color] || colors['green']} text-white font-bold text-xl p-4 rounded-lg w-full text-left">${item.text}</button>`;

            createPageElement(lessonData.homePageId, `<div class="bg-white/95 backdrop-blur-md rounded-2xl shadow-xl p-8"><h2 class="text-4xl font-bold text-center text-slate-800 mb-8">Main Menu</h2><div class="grid grid-cols-1 md:grid-cols-2 gap-4">${menuButtons}</div></div>`);

            let flatPageList = [lessonData.startPageId];
            lessonData.mainMenu.forEach(item => {

                let visited = new Set();
                while(queue.length > 0) {
                    let current = queue.shift();
                    if (visited.has(current)) continue;
                    
                    const pageExists = lessonData.pages.find(p => p.id === current) || 
                                     lessonData.vocabulary.find((v,i) => `vocab-${i}` === current) || 
                                     current === 'vocab-game';
                    
                    if (!pageExists || flatPageList.includes(current)) {
                        continue;
                    }
                    
                    visited.add(current);

                    if (pageOrderMap[current]) {
                        queue.push(...pageOrderMap[current]);
                    }
                }

                createPageElement(`vocab-${i}`, `<div class="bg-white/95 backdrop-blur-md rounded-2xl shadow-xl p-8 text-center pt-16"><div class="readable-content"><h3 class="text-2xl font-bold text-amber-600 mb-2">Vocabulary</h3><h2 class="text-5xl font-bold text-gray-800 mb-4">${v.word}</h2><p class="text-2xl text-gray-600 mb-6">${v.def}</p><p class="text-xl text-gray-500 italic">e.g. "${v.sentence}"</p></div></div>`);

                    case 'timer': pageHTML = `<div class="bg-white/95 backdrop-blur-md rounded-2xl shadow-xl p-8 text-left pt-16"><div class="w-full flex justify-between items-center mb-4"><h2 class="text-2xl md:text-3xl font-bold text-gray-800">${page.content.title}</h2><span id="${page.content.timerId}" class="text-3xl font-bold text-amber-600 bg-amber-100 px-4 py-2 rounded-lg border border-amber-300">00:00</span></div><div class="readable-content"><p class="text-xl text-gray-600">${page.content.text}</p></div></div>`; break;
                    case 'dialogue':
                    case 'html-content':
                        const contentHTML = page.type === 'html-content' ? page.content.html :

                                if (line.startsWith('Professor Wang: ') || line.startsWith('Narrator: ') || line.startsWith('Guide: ')) {
                                    return `<p class="mb-4 text-slate-700 leading-relaxed">${line.substring(line.indexOf(': ') + 2)}</p>`;
                                }
                                return `<p class="mb-4 text-slate-700 leading-relaxed">${line.replace(/([^:]+):/, '<strong class="font-bold text-blue-700">$1:</strong>')}</p>`;
                            }).join('');
                        
                        pageHTML = `<div class="bg-white/95 backdrop-blur-md rounded-2xl shadow-xl p-8 pt-16"><h2 class="text-4xl font-bold text-center text-slate-800 mb-6">${page.content.title}</h2><div class="readable-content text-xl max-w-2xl mx-auto">${contentHTML}</div></div>`;
                        break;
                    case 'vocab-game':
                        pageHTML = `<div class="bg-white/95 backdrop-blur-md rounded-2xl shadow-xl p-8 pt-16"><h2 class="text-4xl font-bold text-center text-amber-600 mb-4">${page.content.title}</h2><div class="text-center mb-4 text-2xl font-bold">Score: <span id="vocab-game-score" class="text-amber-600">0</span></div><div class="w-full bg-gray-200 rounded-full h-2.5 mb-4"><div id="vocab-game-timer-bar" class="bg-amber-600 h-2.5 rounded-full"></div></div><div class="bg-amber-50 border border-amber-200 p-6 rounded-lg min-h-[120px] flex items-center justify-center mb-6"><p id="vocab-game-definition" class="text-2xl text-center font-medium text-amber-900"></p></div><div id="vocab-game-options" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div></div>`;
                        break;
                    case 'writing-task':
                        const startersHTML = page.content.starters.map(s => `<li class="text-gray-500">${s}</li>`).join('');
                        const wordBankHTML = page.content.wordBank ? `<div class="word-bank"><h4 class="text-blue-700">Word Bank:</h4><div class="word-bank-pills">${page.content.wordBank.map(w => `<span>${w}</span>`).join('')}</div></div>` : '';
                        
                        pageHTML = `<div class="bg-white/95 backdrop-blur-md rounded-2xl shadow-xl p-8 pt-16"><div class="readable-content"><h2 class="text-4xl font-bold text-center text-blue-700 mb-6">${page.content.title}</h2><div class="text-left max-w-2xl mx-auto"><p class="text-xl text-gray-700 mb-4">${page.content.prompt}</p><ul class="list-disc list-inside mb-4 text-lg space-y-1">${startersHTML}</ul>${wordBankHTML}</div></div></div>`;
                        break;
                    case 'certificate':
                        pageHTML = `<div class="bg-white/95 backdrop-blur-md rounded-2xl shadow-xl p-8 text-center pt-16 relative overflow-hidden"><canvas id="completion-canvas"></canvas><div class="relative z-10"><div class="readable-content"><h2 class="text-5xl font-bold text-amber-500 mb-4">${page.content.title}</h2><p class="text-2xl text-gray-600 mb-8">${page.content.text}</p></div><div id="certificate-to-print" class="max-w-xl mx-auto bg-white p-8 rounded-lg border-4 border-dashed border-amber-600 text-left"><h3 class="text-3xl font-bold text-amber-800 text-center mb-4">Certificate of Completion</h3><p class="text-xl mb-4 text-slate-700">This certifies that</p><div class="w-full bg-slate-200 h-px mb-4"></div><p class="text-xl mb-4 text-slate-700">has successfully completed the module</p><p class="text-2xl font-bold text-blue-700 text-center mb-6">The Human Journey: Tracing Our Ancestors</p><p class="text-lg text-slate-600">Congratulations on your hard work exploring migration, navigation, and our shared DNA! <span aria-hidden="true">👣</span></p></div><div class="flex justify-center gap-4 mt-8"><button onclick="downloadCertificate()" class="action-button bg-amber-600 text-white font-bold py-2 px-6 rounded-full text-lg hover:bg-amber-700">Download</button><button onclick="printCertificate()" class="action-button bg-gray-600 text-white font-bold py-2 px-6 rounded-full text-lg hover:bg-gray-700">Print</button></div></div></div>`;
                        break;
                    case 'quiz-tfng':
                    case 'quiz-mcq':
                    case 'quiz-gap-fill':
                        let questionsHTML = '';
                        if (page.type === 'quiz-tfng' && page.content.questions) {
                            questionsHTML = page.content.questions.map((q, i) => `<div class="question-group flex flex-col sm:flex-row items-center gap-4 p-4 rounded-lg bg-slate-50 border border-slate-200"><p class="font-semibold flex-1 text-left text-slate-700">${i + 1}. ${q.statement}</p><div class="flex-shrink-0 flex gap-2">${['True', 'False', 'Not Given'].map(a => `<button onclick="checkTfngAnswer(this, '${a}', '${q.correctAnswer}')" class="tfng-button bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-5 rounded-full">${a.charAt(0)}</button>`).join('')}</div></div>`).join('');

                            fieldNotes.addEventListener('input', (e) => {
                                localStorage.setItem('humanJourneyFieldNotes', e.target.value);

                        }

                }
            });
            updateNavButtons();
        }

        // ----------------------------
        // Floating emoji logic
        // ----------------------------
        function spawnFloatingEmoji() {
            const container = emojiContainer;
            if (!container) return;
            const palette = ['🌍','🛶','🧬','👣','🧭','🌊','⛰️','🌌','🦴','⛺'];
            const maxOnScreen = 18;

            if (container.children.length >= maxOnScreen) return;
            const emoji = palette[Math.floor(Math.random() * palette.length)];
            const el = document.createElement('div');
            el.className = 'floating-emoji ' + (emoji === '🛶' ? 'canoe' : 'scenic');
            el.innerHTML = `<span class="inner">${emoji}</span>`;
            
            const top = Math.random() * 75 + 5; 
            el.style.top = `${top}%`;
            el.style.left = `-8vw`;
            
            const base = (emoji === '🛶') ? 14000 : (8000 + Math.random() * 12000);
            const jitter = Math.random() * 4000 - 2000;
            const duration = Math.max(6000, base + jitter);
            el.style.animationDuration = `${duration}ms`;
            
            const scale = 0.85 + Math.random() * 0.6;
            el.style.transform = `scale(${scale})`;
            
            el.addEventListener('animationend', () => {
                if (container.contains(el)) container.removeChild(el);
            });
            container.appendChild(el);
        }

        function startFloatingEmojis() {
            if (!emojiSpawnerInterval && emojiContainer) {
                emojiSpawnerInterval = setInterval(spawnFloatingEmoji, spawnIntervalMs);
            }
        }

        function stopFloatingEmojis() {
            if (emojiSpawnerInterval) {
                clearInterval(emojiSpawnerInterval);
                emojiSpawnerInterval = null;
            }
            if (emojiContainer) {
                emojiContainer.innerHTML = ''; 
            }
        }

        (function setupFloatingEmojis() {
            window.spawnEmojiBurst = function(count = 6) {
                for (let i = 0; i < count; i++) {
                    setTimeout(spawnFloatingEmoji, i * 120);
                }
            }
        })();

        // ----------------------------
        // Initialization and background particle animation
        // ----------------------------
        document.addEventListener('DOMContentLoaded', () => {
            initializeLesson();
            const bgCanvas = document.getElementById('background-canvas');
            const bgCtx = bgCanvas.getContext('2d');
            bgCanvas.width = window.innerWidth; bgCanvas.height = window.innerHeight;
            let bgParticles = [];
            function animateBackground() {
                bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
                bgParticles.forEach((p, i) => {
                    p.y -= p.speed;
                    // Horizontal drift
                    p.x += Math.sin(p.y * 0.01) * 0.5; 
                    if (p.y < -p.radius) bgParticles.splice(i, 1);
                    bgCtx.beginPath();
                    bgCtx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    bgCtx.fillStyle = p.color;
                    bgCtx.fill();
                });
                if (Math.random() > 0.95 && bgParticles.length < 50) {
                    bgParticles.push({ 
                        x: Math.random() * bgCanvas.width, 
                        y: bgCanvas.height + 20, 
                        radius: Math.random() * 8 + 2, 
                        speed: Math.random() * 1 + 0.5, 
                        color: `rgba(255, 255, 255, ${Math.random() * 0.2 + 0.1})`
                    });
                }
                requestAnimationFrame(animateBackground);
            }
            window.addEventListener('resize', () => { bgCanvas.width = window.innerWidth; bgCanvas.height = window.innerHeight; });
            animateBackground();
        });
    </script>
