        @keyframes journeyColors {
            0% { background-color: #0f172a; } /* Night sky / slate-900 */
            25% { background-color: #451a03; } /* Desert / amber-900 */
            50% { background-color: #0c4a6e; } /* Ocean / sky-900 */
            75% { background-color: #1e3a8a; } /* Deep sea / blue-900 */
            100% { background-color: #0f172a; } /* Night sky */
        }
        body {
            font-family: 'Inter', sans-serif;
            overscroll-behavior: none;
            animation: journeyColors 240s linear infinite;
            padding-top: 85px; 
        }
        #background-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none;
        }
        .page { display: none; position: relative; }
        .page.active { display: block; animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .action-button, .nav-button, .quiz-option, .tf-button, .word-bank-word, .btn-animated-3d, .timeline-node {
            transition: all 0.15s ease-out;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.2), 0 2px 4px -2px rgba(0,0,0,0.1), inset 0 -4px 0 0 rgba(0,0,0,0.2);
            border: none;
        }
        .action-button:hover, .nav-button:hover, .quiz-option:hover:not(:disabled), .tf-button:hover:not(:disabled), .word-bank-word:hover, .btn-animated-3d:hover, .timeline-node:hover {
            transform: translateY(-2px);

        }

            transform: translateY(2px);

        }
        .word-bank-word {
            cursor: grab; padding: 8px 16px; border-radius: 8px;

        }

        .gap .word-bank-word { cursor: pointer; }
        .gap.correct .word-bank-word { background-color: #dcfce7; border-color: #22c55e; color: #15803d; }
        .gap.incorrect .word-bank-word { background-color: #fee2e2; border-color: #ef4444; color: #b91c1c; }

        /* Feedback Message & Badge Notification */
        .feedback-toast, .badge-toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            padding: 12px 24px; border-radius: 9999px; color: white;
            font-weight: bold; z-index: 200;
            animation: slideUpFadeIn 0.5s ease-out, slideDownFadeOut 0.5s ease-in 3.5s forwards;
        }
        .feedback-toast.correct { background-color: #22c55e; }
        .feedback-toast.encouraging { background-color: #f59e0b; }
        .badge-toast { background: linear-gradient(45deg, #fde047, #f97316); animation-duration: 4.5s; }
        @keyframes slideUpFadeIn { from { opacity: 0; bottom: 0; } to { opacity: 1; bottom: 20px; } }
        @keyframes slideDownFadeOut { from { opacity: 1; bottom: 20px; } to { opacity: 0; bottom: 0; } }

        /* Certificate Canvas */
        #completion-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        
        /* Progress Bar */
        #progress-container { background-color: #e5e7eb; border-radius: 9999px; overflow: hidden; height: 8px; width: 100%; margin-top: 8px; }
        #progress-bar { height: 100%; width: 0%; background-color: #f59e0b; transition: width 0.5s ease-out; }
        
        /* Vocab Game Timer */
        #vocab-game-timer-bar { height: 6px; background-color: #f59e0b; transition: width 0.1s linear; }
        
        /* Shake Animation for incorrect answers */
        @keyframes shake {
          10%, 90% { transform: translate3d(-1px, 0, 0); }
          20%, 80% { transform: translate3d(2px, 0, 0); }
          30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
          40%, 60% { transform: translate3d(4px, 0, 0); }
        }
        .shake { animation: shake 0.82s cubic-bezier(.36,.07,.19,.97) both; }

        .word-bank { margin-top: 1.5rem; }
        .word-bank h4 { font-weight: 700; font-size: 1.125rem; color: #b45309; }
        .word-bank-pills { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.5rem; padding: 1rem; background-color: #fffbeb; border-radius: 0.5rem; border: 1px solid #fde68a; }
        .word-bank-pills span { background-color: #ffffff; border: 1px solid #fcd34d; padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.875rem; font-weight: 500; color: #92400e; }

        /* SDG Badges */
        .sdg-badge { display: inline-flex; align-items: center; padding: 0.5rem 1rem; border-radius: 0.5rem; font-weight: 700; color: white; margin-right: 0.5rem; margin-bottom: 0.5rem; }
        .sdg-10 { background-color: #dd1367; } /* Reduced Inequalities */
        .sdg-11 { background-color: #fd6925; } /* Sustainable Cities/Communities */
        .sdg-4 { background-color: #c5192d; } /* Quality Education */

        /* Print Styles */
        @media print {
            body * { visibility: hidden; }
            #certificate-to-print, #certificate-to-print * { visibility: visible; }
            #certificate-to-print { position: absolute; left: 0; top: 0; width: 100%; padding: 40px; border: 10px solid #451a03; background: #fff; }
        }
    
        /* Reward Animation Styles */
        .particle { position: fixed; pointer-events: none; z-index: 9999; will-change: transform, opacity; opacity: 1; transition: opacity 0.5s ease-out; }
        .particle.glitter { width: 10px; height: 10px; border-radius: 50%; background: #fde047; box-shadow: 0 0 5px #fde047, 0 0 10px #fde047, 0 0 15px #fff; }
        .particle.glitter.alt { background: #ffffff; box-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 15px #38bdf8; }
        .particle.dna { font-size: 32px; }
    </style>

    <script>
        // --- Helper for true shuffling ---
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // ===================================================================================
        // --- LESSON CONTENT CONFIGURATION (UNIT 5: THE HUMAN JOURNEY) ---
        // ===================================================================================

        const reflectionQuestions = [
            "Homo sapiens have lived in the Great Rift Valley, a geological fault stretching 3,000 miles, for about 200,000 years. If you were designing an educational video game for Chinese students about this 3,000-mile “crucible,” what specific environmental challenges would you include to show how early humans were tested to survive?",
            "In 1997, scientists found the “Idaltu” skull in Ethiopia, proving modern humans walked the Earth 160,000 years ago. How does realizing that Africa is the true cradle of humanity change the way you personally understand global history compared to the stories you learned as a child?",
            "The documentary states that the false historical myth of Africans being a “subhuman” species actually began during the Enlightenment in the 18th century. Why do you think highly educated societies in the 18th century invented these myths, and how can we recognize similar false scientific claims on social media today?",
            "DNA evidence traces all humans back to one “Mitochondrial Eve” who lived 200,000 years ago, meaning all 8 billion humans alive today share the same Black ancestors. Based on this genetic data, how would you argue against the concept of deep racial divisions in a modern, globalized world?",
            "Between 80,000 and 50,000 years ago, early humans began migrating out of Africa, possibly aided by a huge 80,000-year-old adaptation: the invention of speech. In your opinion, how did the ability to speak give these small human communities the specific power to survive in dangerous, unknown lands?",
            "Discovered in 1991, the Blombos Cave contains evidence of human life for over 140,000 years, including a decorated ochre block with purposeful markings from 77,000 years ago. Compare this ancient 77,000-year-old desire to stamp symbols on stones with how modern youth in China use digital avatars or emojis to express their identities today.",
            "Scientists used to think art started in France 35,000 years ago, but African art in the south dates back 90,000 to 100,000 years. Why is it important for our historical timelines to be updated with new data, and how does this shift the traditional focus away from Europe?",
            "Cave paintings from 7,000 years ago in Wadi Sura show people swimming in what is now a dry desert, proving the Sahara was actually a green savanna 10,000 years ago. What can this 10,000-year-old rock art teach modern societies about the realities of surviving extreme climate change today?",
            "Between 4,800 and 4,200 B.C. (over 1,000 years before ancient Egypt), cattle herders formed the first complex African society west of the Nile. Why do you think the responsibility of managing large herds of livestock required early humans to create a more organized and complex society?",
            "By 4,000 B.C., vast areas of the lush Sahara savanna turned into a harsh desert, forcing people to migrate to the fertile Nile Valley. How do you think forced migration due to a dying environment impacts a culture's resilience and forces them to innovate?",
            "Burial pits dating back to 3,600 B.C. (over 6,000 years ago) contain elaborate Afro combs used by elites. What does a 6,000-year-old society's focus on complex hairstyles and beauty tell us about its economic stability and wealth?",
            "In 1988, archaeologists found 150 ivory tags in a tomb at Abydos dating back to 3,250 B.C.E., proving writing developed independently in Africa. If you were an ancient ruler, how would using these 150 tags to track your property and labor help you strictly dominate your society?",
            "The Great Pyramid of Giza was built for Pharaoh Khufu, who took the throne in 2,600 B.C. and ruled for 27 years. It was built by Egyptian farmers paying their taxes with labor during the Nile floods. How does this change the common Hollywood myth that the pyramids were built by slaves?",
            "Taking 27 years and 2,300,000 stone blocks (each weighing 2.5 tons), the Great Pyramid remained the tallest building on Earth for 4,000 years. What kind of cultural mindset is required for a society to spend massive national resources on a single 2.5-ton block building for one leader?",
            "Between 1913 and 1916, archaeologists digging in Kerma found 322 human remains in a single elite burial pit. Knowing these 322 people were retainers meant to serve the king in the afterlife, what does this say about ancient African belief systems compared to ancient Chinese emperor burials?",
            "The earliest Kerma settlement was in 4,000 B.C., and by 2,500 B.C. it had over 10,000 residents and a massive mud-brick building known as the Deffufa. Why is it significant for modern students to learn that massive, independent cities of 10,000 people thrived in Africa outside of Egypt?",
            "By 1,500 B.C., Egypt was a world power relying heavily on the 18th Dynasty's trade with Kush for luxury gold. When two powerful neighboring countries rely on each other for vital resources, what psychological factors usually lead them to war instead of peace?",
            "Between 1,800 B.C. and 1,500 B.C., African craftsmen accidentally discovered iron while making ceramics. How does the independent invention of iron 3,000 years ago in Central Africa challenge the old, biased idea that advanced technology only came from places outside of Africa?",
            "In 1943, a farmer found the Nok terracottas in Nigeria, which date back to 900 B.C. If you had to guess the social structure of a 900 B.C. African society based only on these highly detailed, heavy-jewelry sculptures, what would you deduce?",
            "By 500 B.C., Meroe became the new capital of Kush, featuring over 100 pyramids and enormous iron slagheaps for making weapons. Why is becoming an industrial center for iron weapons a better long-term survival strategy for a nation than just trading raw gold?"

                            <li>I can evaluate the ethical implications and privacy risks of commercial DNA testing.</li>
                        </ul>
                    </div>` } },
                
                // 2. TBL Activity
                { id: 'tbl-start', type: 'simple', content: { title: 'Task-Based Learning <span aria-hidden="true">🗺️</span>', text: 'Let\'s step into the shoes of our ancestors before we read their history.' } },
                { id: 'tbl-pre', type: 'html-content', content: { title: 'Pre-Task: The Push and Pull', html: `<div class="text-left text-xl space-y-4"><p>Imagine moving to a brand new high school in a different city next year.</p><p>What are the <strong>"push" factors</strong> (reasons you want to leave your old school) and <strong>"pull" factors</strong> (things attracting you to the new city)?</p><p class="text-slate-500 italic mt-4">Discuss with a partner for 2 minutes. Write down 2 Push and 2 Pull factors.</p></div>` } },
                { id: 'tbl-task', type: 'html-content', content: { title: 'The Task: Survival Blueprint', html: `<div class="text-left text-xl space-y-4"><p>Your group is a band of early humans living 60,000 years ago. A massive drought has hit your homeland (a massive Push factor!). You must migrate 1,000 miles to an unknown land across the sea.</p><div class="bg-amber-50 p-6 border border-amber-200 rounded-xl mt-6"><h4 class="font-bold text-amber-800 mb-2">Group Assignment:</h4><ul class="list-disc list-inside space-y-2"><li>Identify <strong>3 major environmental challenges</strong> you will face on the journey.</li><li>Invent <strong>3 tools or adaptations</strong> your group will use to survive and navigate without modern technology.</li></ul></div></div>` } },

                    <div class="space-y-8 text-left text-xl leading-relaxed">
                        <div class="bg-orange-50 p-6 rounded-xl border border-orange-200">
                            <h4 class="font-bold text-2xl text-orange-800 mb-3">The DNA Trail</h4>
                            <p>It may be the greatest story ever told. It begins in Africa with a group of people, perhaps just a few hundred, surviving by hunting and gathering. It ends about 200,000 years later with their seven billion <strong>descendants</strong> spread across the Earth. For decades, the only proof was found in <strong>scattered</strong> bones and artifacts. In the past 20 years, however, DNA technologies have allowed scientists to <strong>trace</strong> ancient human migrations by looking at the genetic code of living people. Probably between 50,000 and 70,000 years ago, one small group left Africa for western Asia, eventually reaching the Americas via the Bering Land Bridge.</p>

             async _setupVoices() {
                 const voicesPromise = new Promise(resolve => { 
                     if (this.synth.getVoices().length) return resolve(this.synth.getVoices()); 
                     this.synth.onvoiceschanged = () => resolve(this.synth.getVoices());

                 };
                 
                 for (const speaker in speakerToVoiceMap) {
                     const voicePriorityList = speakerToVoiceMap[speaker];
                     let chosenVoice = null;
                     
                     for (const voiceName of voicePriorityList) {
                         const foundVoice = availableVoices.find(v => v.name.includes(voiceName));
                         if (foundVoice) { chosenVoice = foundVoice; break; }
                     }
                     if (chosenVoice) {

                     }

                 this.voices['default'] = availableVoices.find(v => v.name.includes('Florian')) || 
                                          availableVoices.find(v => v.name.includes('William')) || 
                                          availableVoices.find(v => v.name.includes('Brian')) || 
                                          availableVoices[0];
             }
             
             async init() { 
                 if (this.isInitialized) return; 
                 try { 
                     const warmUp = new SpeechSynthesisUtterance(' '); 
                     warmUp.volume = 0; 
                     this.synth.speak(warmUp); 
                     this.synth.cancel(); 
                     await this._setupVoices(); 
                     this.isInitialized = true; 
                 } catch (e) { 
                     console.error("Speech init failed", e); 
                 } 
             }
             
             _cleanTextForSpeech(text) { 
                 const tempDiv = document.createElement('div'); 
                 const textWithoutSpans = text.replace(/<span aria-hidden="true">.*?<\/span>/g, ' '); 
                 tempDiv.innerHTML = textWithoutSpans; 
                 return tempDiv.innerText || tempDiv.textContent || ''; 
             }
             
             async speak(text, { onEndCallback = null } = {}) { 
                 if (!this.isInitialized || !this.isTtsEnabled || !text) { 
                     if (onEndCallback) onEndCallback(); 
                     return; 
                 } 
                 if (this.synth.speaking) { this.cancel(); } 
                 
                 const utterance = new SpeechSynthesisUtterance(this._cleanTextForSpeech(text)); 
                 utterance.voice = this.voices['default']; 
                 utterance.rate = this.speechRate; 
                 
                 if (onEndCallback) utterance.onend = onEndCallback; 
                 this.synth.speak(utterance); 
             }
             
             async speakDialogue(text) { 
                 if (!this.isInitialized || !this.isTtsEnabled || !text || this.isDialoguePlaying) return; 
                 this.cancel(); 
                 this.isDialoguePlaying = true; 
                 
                 const lines = text.split('\n\n'); 
                 
                 const speakLine = (index) => { 
                     if (index >= lines.length || !this.isDialoguePlaying) { 
                         this.isDialoguePlaying = false; 
                         return; 
                     } 
                     
                     const line = lines[index]; 
                     const [speaker, ...rest] = line.split(': '); 
                     const lineText = rest.join(': '); 
                     const utterance = new SpeechSynthesisUtterance(this._cleanTextForSpeech(lineText || speaker)); 
                     
                     utterance.voice = this.voices[speaker.trim().toLowerCase()] || this.voices['default']; 
                     utterance.rate = this.speechRate; 
                     utterance.onend = () => speakLine(index + 1); 
                     
                     this.synth.speak(utterance); 
                 }; 
                 
                 speakLine(0); 
             }
             
             cancel() { 
                 if (this.synth) { 
                     this.isDialoguePlaying = false; 
                     this.synth.cancel(); 
                 } 
             }
             
             toggleTTS(forceState) { 
                 this.isTtsEnabled = forceState === undefined ? !this.isTtsEnabled : forceState; 
                 if (!this.isTtsEnabled) { this.cancel(); } 
                 return this.isTtsEnabled;

        function spawnRewardAnimation(x, y) {
            const numParticles = 40; 
            const container = document.getElementById('reward-animation-container');
            if (!container) return;
            
            for (let i = 0; i < numParticles; i++) {
                const el = document.createElement('div');
                el.classList.add('particle');
                
                let type;
                if (Math.random() < 0.15) { 
                    type = 'dna';
                    el.classList.add('dna');
                    el.textContent = '🧬';
                } else {
                    type = 'glitter';
                    el.classList.add('glitter');
                    if (Math.random() < 0.5) el.classList.add('alt'); 
                }

                const particle = {
                    el: el,
                    x: x, 
                    y: y, 
                    vx: (Math.random() - 0.5) * 12, 
                    vy: (Math.random() * -10) - 5, 
                    life: 60 + Math.random() * 60, 
                    gravity: 0.2,
                    friction: 0.98,
                    type: type
                };

                particles.push(particle);
                container.appendChild(el);
            }

            if (!rewardAfHandle) {
                rewardAfHandle = requestAnimationFrame(animateParticles);
            }
        }

        function animateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                
                p.vx *= p.friction; 
                p.vy += p.gravity; 
                p.x += p.vx;
                p.y += p.vy;
                p.life--;

                if (p.life <= 0) {
                    p.el.remove();
                    particles.splice(i, 1);
                } else {
                    if (p.life < 20) {
                        p.el.style.opacity = p.life / 20;
                    }
                    
                    if (p.type === 'dna') {
                        p.el.style.transform = `translate(${p.x}px, ${p.y}px) rotate(${p.x}deg)`;
                    } else {
                        p.el.style.transform = `translate(${p.x}px, ${p.y}px)`;
                    }
                }
            }

            if (particles.length > 0) {
                rewardAfHandle = requestAnimationFrame(animateParticles);
            } else {
                rewardAfHandle = null; 
            }
        }

        function initGapFill(pageId) {
            const page = document.getElementById(pageId);
            if (!page) return;
            
            let selectedWord = { element: null, text: '' }; 

            const gaps = page.querySelectorAll('.gap');
            const words = page.querySelectorAll('.word-bank-word');
            const wordBank = page.querySelector('.word-bank-container');

            words.forEach(word => {
                word.addEventListener('dragstart', e => { e.dataTransfer.setData('text/plain', word.dataset.word); });
                word.addEventListener('click', handleWordClick);
            });
            gaps.forEach(gap => {
                gap.addEventListener('dragover', e => e.preventDefault());
                gap.addEventListener('drop', e => handleDrop(e, gap));
                gap.addEventListener('click', handleGapClick);
            });

            function handleWordClick(e) {
                const clickedWord = e.currentTarget;
                if (clickedWord.parentElement.classList.contains('gap')) { wordBank.appendChild(clickedWord); return; }
                if (selectedWord.element) selectedWord.element.classList.remove('selected');
                if (selectedWord.element === clickedWord) { selectedWord = { element: null, text: '' }; } 
                else { selectedWord = { element: clickedWord, text: clickedWord.dataset.word }; clickedWord.classList.add('selected'); }
            }
            function handleGapClick(e) {
                const clickedGap = e.currentTarget;
                if (!selectedWord.element || clickedGap.children.length > 0) return;
                clickedGap.appendChild(selectedWord.element);
                checkGap(clickedGap);
                selectedWord.element.classList.remove('selected');
                selectedWord = { element: null, text: '' };
            }
            function handleDrop(e, gap) {
                e.preventDefault();
                if (gap.children.length > 0) return;
                const wordText = e.dataTransfer.getData('text/plain');
                const wordElement = page.querySelector(`.word-bank-word[data-word="${wordText}"]`);
                if (wordElement) { gap.appendChild(wordElement); checkGap(gap); }
            }
            function checkGap(gap) {
                const word = gap.querySelector('.word-bank-word');
                const isCorrect = word && word.dataset.word.toLowerCase() === gap.dataset.answer.toLowerCase();
                gap.classList.toggle('correct', isCorrect);
                gap.classList.toggle('incorrect', !isCorrect);
                if (isCorrect) { 
                    playCorrectSound();
                    updateScore(10); 
                    showFeedbackMessage(true); 
                    const rect = gap.getBoundingClientRect();
                    spawnRewardAnimation(rect.left + rect.width / 2, rect.top + rect.height / 2);
                } else { 
                    playIncorrectSound();
                    showFeedbackMessage(false); 
                }
                setTimeout(checkCompletionAndMark, 100);
            }
        }

        let vocabGameQuestions = [];

        let vocabGameScore = 0;
        const ROUND_TIME = 10000; 

        function startVocabGame() {
            vocabGameQuestions = [...lessonData.vocabulary].sort(() => 0.5 - Math.random());
            vocabGameCurrentIndex = 0;
            vocabGameScore = 0;
            document.getElementById('vocab-game-score').textContent = '0';
            nextVocabGameRound();
        }

        function nextVocabGameRound() {
            if (vocabGameCurrentIndex >= vocabGameQuestions.length) {
                endVocabGame();
                return;
            }
            
            const question = vocabGameQuestions[vocabGameCurrentIndex];
            document.getElementById('vocab-game-definition').textContent = question.def;
            
            const options = [question.word];
            const wrongAnswers = lessonData.vocabulary.filter(v => v.word !== question.word);
            while (options.length < 4 && wrongAnswers.length > 0) {
                const randomWrong = wrongAnswers.splice(Math.floor(Math.random() * wrongAnswers.length), 1)[0];
                options.push(randomWrong.word);
            }
            
            const optionsContainer = document.getElementById('vocab-game-options');
            optionsContainer.innerHTML = '';
            shuffleArray(options).forEach(opt => {
                const button = document.createElement('button');
                button.className = 'quiz-option p-4 rounded-xl text-left bg-slate-100 hover:bg-slate-200 border border-slate-200 font-medium text-slate-800 text-xl';
                button.textContent = opt;
                button.onclick = () => checkVocabGameAnswer(button, opt === question.word);
                optionsContainer.appendChild(button);
            });

            startRoundTimer();
        }
        
        function startRoundTimer() {
            clearTimeout(vocabGameTimer);
            const timerBar = document.getElementById('vocab-game-timer-bar');
            timerBar.style.transition = 'none';
            timerBar.style.width = '100%';
            
            setTimeout(() => {
                timerBar.style.transition = `width ${ROUND_TIME / 1000}s linear`;
                timerBar.style.width = '0%';
            }, 100);

            vocabGameTimer = setTimeout(() => {
                showFeedbackMessage(false);
                vocabGameCurrentIndex++;
                nextVocabGameRound();
            }, ROUND_TIME);
        }

        function checkVocabGameAnswer(button, isCorrect) {
            clearTimeout(vocabGameTimer);
            showFeedbackMessage(isCorrect);
            if (isCorrect) {
                playCorrectSound();
                vocabGameScore++;
                updateScore(5);
                document.getElementById('vocab-game-score').textContent = vocabGameScore;
                button.classList.remove('bg-slate-100', 'hover:bg-slate-200');
                button.classList.add('bg-green-500', 'text-white');
                const rect = button.getBoundingClientRect();
                spawnRewardAnimation(rect.left + rect.width / 2, rect.top + rect.height / 2);

                playIncorrectSound();
                button.classList.remove('bg-slate-100', 'hover:bg-slate-200');
                button.classList.add('bg-red-500', 'text-white', 'shake');
            }
            
            const optionsContainer = document.getElementById('vocab-game-options');
            optionsContainer.querySelectorAll('button').forEach(btn => btn.disabled = true);

            setTimeout(() => {

        function startConfetti() {
            const canvas = document.getElementById('completion-canvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            
            if (canvas.parentElement) {
                canvas.width = canvas.parentElement.offsetWidth;
                canvas.height = canvas.parentElement.offsetHeight;
            } else {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }

            let confetti = [];
            const colors = ['#fde047', '#f97316', '#38bdf8', '#22c55e', '#6366f1'];
            
            for (let i = 0; i < 100; i++) {
                confetti.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height, 
                    size: Math.random() * 10 + 5,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    speed: Math.random() * 3 + 2,
                    angle: Math.random() * 2 * Math.PI,
                    tilt: Math.random() * 10 - 5
                });
            }
            
            let animationFrameId;
            function drawConfetti() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                confetti.forEach((p, i) => {
                    p.y += p.speed;
                    p.x += Math.sin(p.angle);
                    p.angle += 0.05;
                    
                    if (p.y > canvas.height) {
                        confetti.splice(i, 1);
                    }
                    
                    ctx.save();
                    ctx.fillStyle = p.color;
                    ctx.translate(p.x + p.size / 2, p.y + p.size / 2);
                    ctx.rotate(p.angle);
                    ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
                    ctx.restore();
                });
                
                if (confetti.length > 0) {
                    animationFrameId = requestAnimationFrame(drawConfetti);
                } else {
                    ctx.clearRect(0, 0, canvas.width, canvas.height); 
                    cancelAnimationFrame(animationFrameId);
                }
            }
            drawConfetti();
        }

                bgParticles.forEach((p, i) => {
                    p.y -= p.speed;
                    // Horizontal drift
                    p.x += Math.sin(p.y * 0.01) * 0.5; 
                    if (p.y < -p.radius) bgParticles.splice(i, 1);
                    bgCtx.beginPath();
                    bgCtx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    bgCtx.fillStyle = p.color;
                    bgCtx.fill();
                });
                if (Math.random() > 0.95 && bgParticles.length < 50) {
                    bgParticles.push({ 
                        x: Math.random() * bgCanvas.width, 
                        y: bgCanvas.height + 20, 
                        radius: Math.random() * 8 + 2, 
                        speed: Math.random() * 1 + 0.5, 
                        color: `rgba(255, 255, 255, ${Math.random() * 0.2 + 0.1})`
                    });
                }
                requestAnimationFrame(animateBackground);
            }
            window.addEventListener('resize', () => { bgCanvas.width = window.innerWidth; bgCanvas.height = window.innerHeight; });
            animateBackground();
        });
    </script>
</body>
</html>
