                    <p>Choose five vocabulary words from Units 1–12 that you used meaningfully in the PBL. Write the word, the sentence you used it in, and why it was the right word for that idea.</p>
                    <p><em>Example: hazardous — “The asteroid’s hazardous composition…” — It precisely described the danger.</em></p>

                    <h3>D. My Final Reflection</h3>
                    <p>Answer in 4–6 sentences: “What does it mean to be human in the next 100 years?”</p>

                    <h2>SECTION 2 — PEER ASSESSMENT (GROUP PBL)</h2>
                    <h3>“How well did our team design the future?”</h3>
                    <p>Rate your group’s performance from 1 (Needs Work) to 5 (Excellent).</p>
                    <ul>
                        <li>We listened to each other and shared speaking time.</li>
                        <li>We used evidence from multiple units to support decisions.</li>
                        <li>We resolved disagreements respectfully and logically.</li>
                        <li>We integrated all subsystems into a coherent blueprint.</li>
                        <li>We used GenAI responsibly (refining, not replacing).</li>
                        <li>Our final presentation was clear, organized, and engaging.</li>
                    </ul>
                `
            }
        ];
    </script>

    <script>
        let currentChapterIndex = 0;
        let isPlaying = false;

        function renderNavigation() {
            const navContainer = document.getElementById('nav-links');
            navContainer.innerHTML = '';

            curriculumData.forEach((unit, index) => {
                const isActive = index === currentChapterIndex;
                const btn = document.createElement('button');
                
                btn.className = `w-full text-left px-5 py-4 rounded-xl transition-all flex items-center gap-4 text-sm sm:text-base ${
                    isActive 
                    ? 'bg-purple-50 text-purple-800 font-bold border border-purple-200 shadow-sm' 
                    : 'text-gray-600 font-medium hover:bg-gray-100 hover:text-gray-900 border border-transparent'
                }`;
                
                btn.innerHTML = `
                    <div class="w-2.5 h-2.5 rounded-full flex-shrink-0 ${isActive ? 'bg-purple-600 shadow-md' : 'bg-gray-300'}"></div>
                    <span class="truncate tracking-wide">${unit.title}</span>
                `;
                
                btn.onclick = () => {
                    currentChapterIndex = index;
                    updateApp();
                    closePanel();
                };
                navContainer.appendChild(btn);
            });

            // Update Progress Bar
            const progressPct = ((currentChapterIndex + 1) / curriculumData.length) * 100;
            document.getElementById('progress-bar').style.width = `${progressPct}%`;
            document.getElementById('progress-text').innerText = `${currentChapterIndex + 1} / ${curriculumData.length}`;
        }

        function renderContent() {
            const contentContainer = document.getElementById('content-area');
            const mainScroll = document.getElementById('main-scroll');
            const unit = curriculumData[currentChapterIndex];
            
            // Trigger fade animation
            contentContainer.classList.remove('fade-in');
            void contentContainer.offsetWidth; 
            contentContainer.classList.add('fade-in');

            // Inject the raw HTML directly without the bulky title box
            contentContainer.innerHTML = `<div class="content-body">${unit.content}</div>`;
            mainScroll.scrollTo(0, 0);
            
            // Update the title dynamically in the top header
            document.getElementById('header-title-text').innerText = unit.title;
            
            lucide.createIcons();
            
            if(isPlaying) stopTTS();
        }

        window.navigate = function(dir) {
                const newIndex = currentChapterIndex + dir;
                if (newIndex >= 0 && newIndex < curriculumData.length) {
                    currentChapterIndex = newIndex;
                    updateApp();
                }
            }

            function updateApp() {
                renderNavigation();
                renderContent();
                
                // Update header navigation buttons
                const prevBtn = document.getElementById('header-prev');
                const nextBtn = document.getElementById('header-next');
                
                if (prevBtn) prevBtn.disabled = currentChapterIndex === 0;
                if (nextBtn) nextBtn.disabled = currentChapterIndex === curriculumData.length - 1;
            }

            function openPanel() {
                document.getElementById('sidebar').classList.remove('-translate-x-full');
                document.getElementById('sidebar-overlay').classList.remove('hidden');
            }

            function closePanel() {
                document.getElementById('sidebar').classList.add('-translate-x-full');
                document.getElementById('sidebar-overlay').classList.add('hidden');
            }

            // --- TTS Logic ---
            let ttsQueue = [];
            let currentUtterance = null;

            window.toggleTTS = function() {
                if (isPlaying) {
                    stopTTS();
                } else {
                    startTTS();
                }
            }

            function startTTS() {
                if (!('speechSynthesis' in window)) {
                    alert("Text-to-speech is not supported in this browser.");
                    return;
                }

                stopTTS(); 
                isPlaying = true;

                // Extract pure text from the HTML content
                const tempDiv = document.createElement("div");
                tempDiv.innerHTML = curriculumData[currentChapterIndex].content;
                const fullText = tempDiv.textContent || tempDiv.innerText || "";

                // Chunk into sentences to prevent browser crash
                ttsQueue = fullText.match(/[^.!?]+[.!?]+/g) || [fullText];
                
                if (ttsQueue.length > 0) {
                    speakNextSentence();
                }
            }

            function speakNextSentence() {
                if (ttsQueue.length === 0 || !isPlaying) {
                    isPlaying = false;
                    return;
                }

                const sentence = ttsQueue.shift();
                currentUtterance = new SpeechSynthesisUtterance(sentence.trim());
                
                // Voice selection logic based on JSON array
                const voices = window.speechSynthesis.getVoices();
                const preferredVoiceName = curriculumData[currentChapterIndex].voice; 
                
                // Attempt to find the specific Microsoft Multilingual Online voice first
                const targetVoice = voices.find(v => v.name.includes(`Microsoft ${preferredVoiceName} Multilingual Online`)) ||
                                    voices.find(v => v.name.includes(preferredVoiceName)) ||
                                    voices.find(v => v.lang === 'en-US' || v.lang === 'en-GB') ||
                                    voices[0]; 

                if (targetVoice) {
                    currentUtterance.voice = targetVoice;
                }
                
                currentUtterance.rate = 1.0;
                currentUtterance.pitch = 1.0;

                currentUtterance.onend = () => {
                    if (isPlaying) speakNextSentence();
                };

                currentUtterance.onerror = (e) => {
                    console.error("TTS Error:", e);
                    isPlaying = false;
                };

                window.speechSynthesis.speak(currentUtterance);
            }

            function stopTTS() {
                isPlaying = false;
                window.speechSynthesis.cancel();
                ttsQueue = [];
                currentUtterance = null;
            }

            // Ensure voices are loaded before running (browser quirk workaround)
            if ('speechSynthesis' in window) {
                window.speechSynthesis.onvoiceschanged = () => {
                    // Voices are now ready
                };
            }

            // Initialize app
            updateApp();
    </script>
</body>
</html>
