<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>English Seasons & Clothes (Teacher Edition)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'display': ['"Fredoka One"', 'cursive'],
                        'body': ['"Nunito"', 'sans-serif'],
                    },
                    colors: {
                        spring: '#A7F3D0',
                        summer: '#FDE68A',
                        autumn: '#FDBA74',
                        winter: '#BFDBFE',
                    },
                    animation: {
                        'bounce-slow': 'bounce 3s infinite',
                        'wiggle': 'wiggle 1s ease-in-out infinite',
                        'pop': 'pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
                    },
                    keyframes: {
                        wiggle: {
                            '0%, 100%': { transform: 'rotate(-5deg)' },
                            '50%': { transform: 'rotate(5deg)' },
                        },
                        pop: {
                            '0%': { transform: 'scale(0.8)', opacity: '0' },
                            '100%': { transform: 'scale(1)', opacity: '1' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            overflow: hidden;
            touch-action: manipulation;
            user-select: none;
        }
        h1, h2, h3, .font-display {
            font-family: 'Fredoka One', cursive;
        }
        
        /* Dynamic Season Backgrounds */
        .bg-dynamic { transition: background-color 1s ease-in-out; }
        .theme-spring { background: linear-gradient(135deg, #A7F3D0, #6EE7B7); }
        .theme-summer { background: linear-gradient(135deg, #FDE68A, #FCD34D); }
        .theme-autumn { background: linear-gradient(135deg, #FDBA74, #FB923C); }
        .theme-winter { background: linear-gradient(135deg, #BFDBFE, #93C5FD); }
        .theme-default { background: linear-gradient(135deg, #E0E7FF, #C7D2FE); }

        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border: 4px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .btn-game {
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-bottom-width: 6px;
        }
        .btn-game:active {
            transform: translateY(4px);
            border-bottom-width: 2px;
        }

        .btn-game:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            border-bottom-width: 6px;
        }

        .emoji-xl { font-size: 6rem; line-height: 1; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.2)); }
        
        #particles {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0;
        }
        .particle { position: absolute; animation: fall linear forwards; }
        @keyframes fall {
            to { transform: translateY(100vh) rotate(360deg); }
        }

        .hidden-screen { display: none !important; }

        /* Chat bubbles for dialogues */
        .chat-bubble {
            position: relative;
            padding: 15px 20px;
            border-radius: 25px;
            max-width: 80%;
            font-size: 1.25rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.2s;
        }
        .chat-bubble:hover { transform: scale(1.02); }
        .chat-left {
            background: #E0E7FF; border-bottom-left-radius: 5px; color: #3730A3;
        }
        .chat-right {
            background: #FCE7F3; border-bottom-right-radius: 5px; color: #831843; margin-left: auto;
        }
        
        /* Teacher Control Bar */
        .teacher-controls {
            background: linear-gradient(to right, #4338ca, #6d28d9);
        }
    </style>
</head>
<body class="bg-dynamic theme-default h-screen w-screen flex flex-col relative overflow-hidden">
    
    <div id="particles"></div>

    <div id="screen-menu" class="absolute inset-0 flex items-center justify-center z-10 p-4">
        <div class="glass-panel w-full max-w-4xl rounded-3xl p-6 md:p-8 text-center relative flex flex-col items-center animate-pop max-h-[95vh] overflow-y-auto custom-scrollbar">
            
            <div class="flex items-center justify-center space-x-4 mb-2">
                <span class="text-4xl animate-bounce-slow">🌸</span>
                <span class="text-4xl animate-wiggle">☀️</span>
                <span class="text-4xl animate-bounce-slow">🍁</span>
                <span class="text-4xl animate-wiggle">❄️</span>
            </div>
            <h1 class="text-4xl md:text-5xl text-indigo-800 mb-1 drop-shadow-sm">English Learner</h1>
            <h2 class="text-xl md:text-2xl text-pink-500 mb-6 font-display uppercase tracking-widest">Teacher Edition</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 w-full">
                <!-- Modes -->
                <button onclick="startGame('vocab')" class="btn-game bg-blue-400 border-blue-600 text-white text-xl font-display py-4 px-4 rounded-2xl flex items-center justify-between">
                    <span>🖼️ Vocabulary Flashcards</span>
                    <i class="fas fa-play"></i>
                </button>
                <button onclick="startGame('sentence')" class="btn-game bg-teal-400 border-teal-600 text-white text-xl font-display py-4 px-4 rounded-2xl flex items-center justify-between">
                    <span>🧩 Sentence Builder</span>
                    <i class="fas fa-play"></i>
                </button>
                
                <!-- Grammar Section -->
                <div class="col-span-1 md:col-span-2 mt-4 mb-2">
                    <h3 class="text-xl text-indigo-900 font-bold border-b-2 border-indigo-200 pb-2">Grammar Practice</h3>
                </div>
                
                <button onclick="startGame('grammar-present')" class="btn-game bg-green-500 border-green-700 text-white text-xl font-display py-4 px-4 rounded-2xl flex items-center justify-between">
                    <span>🟢 Simple Present</span>
                    <i class="fas fa-play"></i>
                </button>
                <button onclick="startGame('grammar-continuous')" class="btn-game bg-emerald-500 border-emerald-700 text-white text-xl font-display py-4 px-4 rounded-2xl flex items-center justify-between">
                    <span>🏃‍♂️ Present Continuous</span>
                    <i class="fas fa-play"></i>
                </button>
                <button onclick="startGame('grammar-past')" class="btn-game bg-orange-400 border-orange-600 text-white text-xl font-display py-4 px-4 rounded-2xl flex items-center justify-between">
                    <span>⏪ Simple Past</span>
                    <i class="fas fa-play"></i>
                </button>
                
                <!-- Dialogues Section -->
                <button onclick="startGame('dialogues')" class="btn-game bg-purple-500 border-purple-700 text-white text-xl font-display py-4 px-4 rounded-2xl flex items-center justify-between md:col-span-2">
                    <span>💬 Dialogues (Roleplay)</span>
                    <i class="fas fa-play"></i>
                </button>

                <!-- Scoreboard -->
                <button onclick="showScreen('screen-awards')" class="btn-game bg-yellow-400 border-yellow-600 text-yellow-900 text-xl font-display py-4 px-4 rounded-2xl flex items-center justify-between md:col-span-2 mt-4">
                    <span>🏆 Student Scoreboard & Awards</span>
                    <i class="fas fa-star"></i>
                </button>
            </div>
        </div>
    </div>

    <div id="game-ui" class="hidden-screen w-full h-full flex flex-col z-10">
        
        <!-- Teacher Header Overlay -->
        <div class="w-full bg-white/95 shadow-md border-b-2 border-indigo-100 p-2 flex justify-between items-center z-50 gap-2 overflow-x-auto whitespace-nowrap">
            <!-- Navigation -->
            <div class="flex space-x-1 sm:space-x-2 shrink-0">
                <button onclick="returnToMenu()" class="btn-game bg-gray-500 border-gray-700 text-white px-3 py-2 rounded-lg flex items-center font-bold text-sm">
                    <i class="fas fa-home"></i><span class="hidden md:inline ml-2">Home</span>
                </button>
                <button onclick="navigateGame(-1)" id="btn-back" class="btn-game bg-indigo-400 border-indigo-600 text-white px-3 py-2 rounded-lg flex items-center font-bold text-sm disabled:opacity-50">
                    <i class="fas fa-chevron-left"></i>
                </button>
                <button onclick="navigateGame(1)" id="btn-next" class="btn-game bg-indigo-500 border-indigo-700 text-white px-3 py-2 rounded-lg flex items-center font-bold text-sm">
                    <i class="fas fa-chevron-right"></i>
                </button>
            </div>

            <!-- Grading Controls (Moved to Header) -->
            <div id="header-grading-group" class="flex space-x-1 sm:space-x-2 shrink-0">
                <button onclick="gradeAnswer(false)" class="btn-game bg-red-500 border-red-700 text-white px-3 py-2 rounded-lg font-bold text-sm flex items-center">
                    <i class="fas fa-times-circle mr-1 sm:mr-2"></i><span class="hidden sm:inline">Try Again</span>
                </button>
                <button onclick="playTTSPrompt()" class="btn-game bg-blue-500 border-blue-700 text-white px-3 py-2 rounded-lg font-bold text-sm flex items-center">
                    <i class="fas fa-volume-up mr-1 sm:mr-2"></i><span class="hidden sm:inline">Listen</span>
                </button>
                <button onclick="gradeAnswer(true)" class="btn-game bg-green-500 border-green-700 text-white px-4 py-2 rounded-lg font-bold text-sm flex items-center shadow-md">
                    <i class="fas fa-check-circle mr-1 sm:mr-2"></i>Correct <span class="hidden sm:inline ml-1">(+10)</span>
                </button>
            </div>
            
            <!-- Score & Timer Controls -->
            <div class="flex items-center space-x-2 shrink-0">
                <div class="bg-yellow-100 px-2 py-1.5 rounded-lg border border-yellow-300 flex items-center">
                    <i class="fas fa-star text-yellow-500 text-sm mr-1"></i>
                    <span id="score-display" class="font-display text-lg text-yellow-800">0</span>
                </div>
                
                <div class="bg-gray-100 px-2 py-1.5 rounded-lg border border-gray-300 flex items-center space-x-1">
                    <button onclick="toggleTimer()" id="btn-timer-toggle" class="text-gray-600 hover:text-indigo-600 w-6 h-6 flex items-center justify-center text-sm">
                        <i class="fas fa-pause"></i>
                    </button>
                    <span id="timer-display" class="font-display text-lg text-gray-800 w-6 text-center">20</span>
                    <button onclick="addTime(15)" class="text-xs bg-green-200 text-green-800 px-1.5 py-0.5 rounded font-bold hover:bg-green-300">
                        +15s
                    </button>
                </div>
            </div>
        </div>

        <!-- Active Game Container -->
        <div id="game-container" class="flex-grow flex flex-col items-center justify-center w-full max-w-5xl mx-auto p-4 relative">
            
            <!-- Mode: Vocab Flashcards -->
            <div id="mode-vocab" class="hidden-screen w-full flex flex-col items-center text-center animate-pop">
                <div class="bg-white/90 p-8 rounded-3xl shadow-xl border-4 border-white w-full max-w-lg flex flex-col items-center relative">
                    <h3 id="vocab-season-hint" class="font-display text-2xl text-gray-500 mb-2 uppercase tracking-widest">WINTER</h3>
                    <div id="vocab-emoji" class="emoji-xl my-6 animate-bounce-slow">🧥</div>
                    <p id="vocab-question" class="text-2xl text-indigo-900 font-bold mb-4">What is this?</p>
                    
                    <button id="vocab-reveal-btn" onclick="revealVocab()" class="mb-4 bg-indigo-100 text-indigo-800 px-6 py-2 rounded-full font-bold hover:bg-indigo-200 transition-colors">
                        👀 Show Answer
                    </button>
                    <p id="vocab-answer" class="hidden text-4xl font-display text-green-600 mb-4 capitalize"></p>
                </div>
            </div>

            <!-- Mode: Sentence Builder -->
            <div id="mode-sentence" class="hidden-screen w-full flex flex-col items-center text-center animate-pop">
                <div class="bg-white/90 p-6 md:p-10 rounded-3xl shadow-xl border-4 border-white w-full max-w-3xl flex flex-col items-center relative">
                    <div class="flex items-center justify-center space-x-4 mb-6">
                        <span id="sentence-emoji-season" class="text-5xl">☀️</span>
                        <span id="sentence-emoji-clothes" class="text-5xl">👕</span>
                    </div>
                    <div id="sentence-display" class="font-display text-2xl md:text-4xl text-indigo-900 leading-relaxed mb-8 flex flex-wrap justify-center gap-2 items-center min-h-[80px]">
                        <!-- Populated by JS -->
                    </div>
                    <div id="word-options" class="flex flex-wrap justify-center gap-4 w-full">
                        <!-- Populated by JS -->
                    </div>
                </div>
            </div>

            <!-- Mode: Grammar Practice -->
            <div id="mode-grammar" class="hidden-screen w-full flex flex-col items-center text-center animate-pop">
                <div class="bg-white/90 p-6 md:p-10 rounded-3xl shadow-xl border-4 border-white w-full max-w-3xl flex flex-col items-center relative">
                    <h3 id="grammar-title" class="font-display text-2xl text-purple-600 mb-4 uppercase tracking-widest bg-purple-100 px-4 py-1 rounded-full">Simple Present</h3>
                    
                    <div class="flex items-center justify-center mb-6">
                        <span id="grammar-emoji" class="text-6xl drop-shadow-md">🌧️</span>
                    </div>

                    <div id="grammar-sentence" class="text-3xl md:text-4xl font-bold text-gray-800 mb-10 leading-relaxed">
                        <!-- Example: Every winter, I [gap] a coat. -->
                    </div>

                    <div id="grammar-options" class="grid grid-cols-1 md:grid-cols-3 gap-4 w-full">
                        <!-- Populated by JS -->
                    </div>
                </div>
            </div>

            <!-- Mode: Dialogues -->
            <div id="mode-dialogues" class="hidden-screen w-full flex flex-col items-center animate-pop">
                <div class="bg-white/95 p-6 md:p-8 rounded-3xl shadow-xl border-4 border-white w-full max-w-4xl flex flex-col relative h-[60vh]">
                    <div class="text-center mb-4 border-b-2 border-gray-200 pb-2">
                        <h2 class="text-2xl font-display text-indigo-800">Roleplay Time!</h2>
                        <p class="text-gray-500">Teacher: Click on a chat bubble to hear the pronunciation.</p>
                    </div>
                    
                    <div id="dialogue-container" class="flex-grow overflow-y-auto p-4 space-y-6 custom-scrollbar flex flex-col">
                        <!-- Populated by JS -->
                    </div>
                </div>
            </div>

            <!-- Feedback Overlay (Correct/Wrong Animation) -->
            <div id="feedback-overlay" class="absolute inset-0 pointer-events-none flex items-center justify-center z-40 hidden-screen">
                <div id="feedback-content" class="text-6xl md:text-8xl font-display transform scale-0 transition-transform duration-300">
                    <!-- Dynamic -->
                </div>
            </div>
        </div>

    </div>

    <div id="screen-awards" class="hidden-screen absolute inset-0 flex items-center justify-center z-50 p-4 bg-black/50 backdrop-blur-sm">
        <div class="glass-panel w-full max-w-2xl h-[80vh] rounded-3xl p-8 relative flex flex-col animate-pop">
            <button onclick="showScreen('screen-menu')" class="absolute top-4 right-4 text-gray-500 hover:text-gray-800 text-3xl">
                <i class="fas fa-times-circle"></i>
            </button>
            <h2 class="text-4xl text-yellow-600 mb-6 font-display text-center">🏆 Student Awards</h2>
            
            <div class="flex-grow overflow-y-auto pr-2 custom-scrollbar">
                <div class="bg-indigo-50 rounded-2xl p-4 mb-6 text-center border-2 border-indigo-200">
                    <p class="text-xl text-indigo-800 font-bold">Total Score: <span id="total-score-display" class="text-3xl text-indigo-600 font-display">0</span></p>
                </div>

                <div class="grid grid-cols-2 gap-4" id="badges-container">
                    <!-- Populated by JS -->
                </div>
            </div>
        </div>
    </div>

            ],
            [
                { speaker: "Emma", text: "Look at the beautiful autumn leaves! It is getting foggy.", avatar: "👩" },
                { speaker: "Andrew", text: "Yes! I am glad I brought my warm sweater.", avatar: "👨" },
                { speaker: "Emma", text: "I am wearing a pair of trousers and my new boots too.", avatar: "👩" }
            ]
        ];

        const seasonsConfig = {
            spring: { themeClass: 'theme-spring', particles: '🌸', color: 'text-pink-500' },
            summer: { themeClass: 'theme-summer', particles: '☀️', color: 'text-yellow-500' },
            autumn: { themeClass: 'theme-autumn', particles: '🍁', color: 'text-orange-600' },
            winter: { themeClass: 'theme-winter', particles: '❄️', color: 'text-blue-500' }
        };

        const badges = [
            { id: 'b1', name: 'Vocab Master', threshold: 50, icon: '🌟', unlocked: false },
            { id: 'b2', name: 'Grammar Guru', threshold: 150, icon: '📚', unlocked: false },
            { id: 'b3', name: 'Roleplay Star', threshold: 250, icon: '🎭', unlocked: false },
            { id: 'b4', name: 'English Champion', threshold: 400, icon: '🏆', unlocked: false },
        ];

        // --- STREAMING_CHUNK:State Management... ---
        
        let state = {
            mode: null,
            score: parseInt(localStorage.getItem('teacherGameScore')) || 0,
            timer: 20,
            interval: null,
            timerPaused: false,
            
            // Navigation tracking
            currentArray: [],
            currentIndex: 0,
            
            // Sentence specific
            gapIndex: 0,
            
            voicesLoaded: false,
            voiceEmma: null,
            voiceAndrew: null
        };

        // --- STREAMING_CHUNK:Audio & TTS Setup... ---

        let synth, chime, errorBuzzer;
        
        async function initAudio() {
            if(synth) return; 
            await Tone.start();
            synth = new Tone.PolySynth(Tone.Synth).toDestination();
            synth.volume.value = -10;

            chime = new Tone.Synth({
                oscillator: { type: "sine" },
                envelope: { attack: 0.01, decay: 0.1, sustain: 0, release: 0.1 }
            }).toDestination();
            chime.volume.value = -5;

            errorBuzzer = new Tone.Synth({
                oscillator: { type: "sawtooth" },
                envelope: { attack: 0.05, decay: 0.2, sustain: 0, release: 0.1 }
            }).toDestination();
            errorBuzzer.volume.value = -10;
        }

        function playSound(type) {
            if(!Tone.context || Tone.context.state !== "running") return;
            const now = Tone.now();
            if (type === 'correct') {
                chime.triggerAttackRelease("C5", "8n", now);
                chime.triggerAttackRelease("E5", "8n", now + 0.1);
                chime.triggerAttackRelease("G5", "4n", now + 0.2);
            } else if (type === 'wrong') {
                errorBuzzer.triggerAttackRelease("C3", "8n", now);
                errorBuzzer.triggerAttackRelease("C3", "4n", now + 0.15);
            } else if (type === 'pop') {
                chime.triggerAttackRelease("G4", "16n", now);
            }
        }

        function initVoices() {
            const voices = window.speechSynthesis.getVoices();
            if(voices.length === 0) return;
            state.voicesLoaded = true;
            
            state.voiceEmma = voices.find(v => v.name.includes('Emma') || v.name.includes('Zira') || (v.lang.includes('en') && v.name.includes('Female'))) || voices.find(v => v.lang.includes('en'));
            state.voiceAndrew = voices.find(v => v.name.includes('Andrew') || v.name.includes('David') || (v.lang.includes('en') && v.name.includes('Male'))) || voices.find(v => v.lang.includes('en'));
        }
        window.speechSynthesis.onvoiceschanged = initVoices;

        function speakText(text, teacher = 'Emma') {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); 
                const utterance = new SpeechSynthesisUtterance(text);
                
                if (teacher === 'Emma' && state.voiceEmma) {
                    utterance.voice = state.voiceEmma; utterance.pitch = 1.2;
                } else if (teacher === 'Andrew' && state.voiceAndrew) {
                    utterance.voice = state.voiceAndrew; utterance.pitch = 0.9;
                }
                
                utterance.rate = 0.85; 
                window.speechSynthesis.speak(utterance);
            }
        }

        // --- STREAMING_CHUNK:Core UI Navigation & Timer... ---

        function showScreen(screenId) {
            document.querySelectorAll('body > div').forEach(el => {
                if(el.id && el.id !== 'particles' && el.id !== 'feedback-overlay') {
                    el.classList.add('hidden-screen');
                }
            });
            document.getElementById(screenId).classList.remove('hidden-screen');
            if(screenId === 'screen-awards') updateAwardsUI();
        }

        function returnToMenu() {
            clearInterval(state.interval);
            window.speechSynthesis.cancel();
            document.body.className = "bg-dynamic theme-default h-screen w-screen flex flex-col relative overflow-hidden";
            stopParticles();
            showScreen('screen-menu');
        }

        async function startGame(mode) {
            await initAudio(); 
            if(!state.voicesLoaded) initVoices(); 
            
            state.mode = mode;
            state.currentIndex = 0;
            
            // Set data array based on mode
            if(mode === 'vocab') state.currentArray = [...vocabData].sort(() => Math.random() - 0.5);
            else if(mode === 'sentence') state.currentArray = [...sentenceData].sort(() => Math.random() - 0.5);
            else if(mode.startsWith('grammar')) state.currentArray = [...grammarData[mode]].sort(() => Math.random() - 0.5);
            else if(mode === 'dialogues') state.currentArray = [...dialogueData];

            showScreen('game-ui');
            
            // Hide all sub-modes
            ['mode-vocab', 'mode-sentence', 'mode-grammar', 'mode-dialogues'].forEach(id => {
                document.getElementById(id).classList.add('hidden-screen');
            });
            
            // Show active container
            const containerId = mode.startsWith('grammar') ? 'mode-grammar' : `mode-${mode}`;
            document.getElementById(containerId).classList.remove('hidden-screen');
            
            // Teacher Grading bar visibility (hide for dialogues)
            if(mode === 'dialogues') {
                document.getElementById('header-grading-group').classList.add('hidden-screen');
            } else {
                document.getElementById('header-grading-group').classList.remove('hidden-screen');
            }

            updateScoreUI();
            loadCurrentQuestion();
        }

        function navigateGame(direction) {
            const newIndex = state.currentIndex + direction;
            if (newIndex >= 0 && newIndex < state.currentArray.length) {
                state.currentIndex = newIndex;
                loadCurrentQuestion();
            } else if (newIndex >= state.currentArray.length) {
                // End of array, re-shuffle and loop to keep play going
                state.currentArray.sort(() => Math.random() - 0.5);
                state.currentIndex = 0;
                loadCurrentQuestion();
            }
        }

        function loadCurrentQuestion() {
            // Update Back button state
            document.getElementById('btn-back').disabled = state.currentIndex === 0;
            window.speechSynthesis.cancel();
            
            const q = state.currentArray[state.currentIndex];

            if(state.mode === 'vocab') renderVocab(q);
            else if(state.mode === 'sentence') renderSentence(q);
            else if(state.mode.startsWith('grammar')) renderGrammar(q);
            else if(state.mode === 'dialogues') renderDialogue(q);

            // Timer reset per slide
            startTimer(30);
        }

        // --- STREAMING_CHUNK:Timer Controls... ---

        function startTimer(seconds) {
            clearInterval(state.interval);
            state.timer = seconds;
            state.timerPaused = false;
            updateTimerUI();
            
            state.interval = setInterval(() => {
                if(!state.timerPaused) {
                    state.timer--;
                    updateTimerUI();
                    
                    if (state.timer <= 0) {
                        state.timerPaused = true;
                        playSound('wrong'); // Soft alert
                        document.getElementById('timer-display').classList.add('text-red-600', 'animate-pulse');
                    }
                }
            }, 1000);
        }

        function toggleTimer() {
            state.timerPaused = !state.timerPaused;
            const icon = document.getElementById('btn-timer-toggle').querySelector('i');
            if(state.timerPaused) {
                icon.className = 'fas fa-play text-green-600';
            } else {
                icon.className = 'fas fa-pause';
            }
        }

        function addTime(secs) {
            state.timer += secs;
            if(state.timer > 0) {
                document.getElementById('timer-display').classList.remove('text-red-600', 'animate-pulse');
                if(state.timerPaused && state.timer > 0) toggleTimer(); // auto unpause
            }
            updateTimerUI();
            playSound('pop');
        }

        function updateTimerUI() {
            document.getElementById('timer-display').innerText = state.timer;
        }

        // --- STREAMING_CHUNK:Scoring & Feedback... ---

        function gradeAnswer(isCorrect) {
            if (isCorrect) {
                playSound('correct');
                addScore(10);
                showFeedback(true);
                const praises = ["Great job!", "Excellent!", "Perfect!", "Awesome!"];
                speakText(praises[Math.floor(Math.random() * praises.length)]);
                
                // Auto next slide after a short delay
                setTimeout(() => navigateGame(1), 2000);
            } else {
                playSound('wrong');
                showFeedback(false);
                speakText("Let's try that again. Take your time.");
            }
        }

        function addScore(points) {
            state.score += points;
            localStorage.setItem('teacherGameScore', state.score);
            updateScoreUI();
            
            const scoreDisplay = document.getElementById('score-display');
            scoreDisplay.classList.add('text-green-500', 'animate-bounce');
            setTimeout(() => scoreDisplay.classList.remove('text-green-500', 'animate-bounce'), 1000);
        }

        function updateScoreUI() {
            document.getElementById('score-display').innerText = state.score;
        }

        function showFeedback(isCorrect) {
            const overlay = document.getElementById('feedback-overlay');
            const content = document.getElementById('feedback-content');
            
            overlay.classList.remove('hidden-screen');
            if (isCorrect) {
                content.innerHTML = '✨🌟✨';
                content.className = 'text-8xl transform scale-0 transition-transform duration-300 drop-shadow-2xl';
                setTimeout(() => content.classList.replace('scale-0', 'scale-125'), 50);
            } else {
                content.innerHTML = '❌';
                content.className = 'text-8xl transform scale-0 transition-transform duration-300 drop-shadow-2xl text-red-500';
                setTimeout(() => content.classList.replace('scale-0', 'scale-100'), 50);
            }

            setTimeout(() => {
                content.classList.replace('scale-125', 'scale-0');
                content.classList.replace('scale-100', 'scale-0');
                setTimeout(() => overlay.classList.add('hidden-screen'), 300);
            }, 1500);
        }

        // Teacher TTS prompt trigger
        function playTTSPrompt() {
            const q = state.currentArray[state.currentIndex];
            if(state.mode === 'vocab') speakText(`${q.ttsQuestion} ${q.ttsAnswer}`);
            else if(state.mode === 'sentence') speakText("Read the sentence and fill in the gaps.");
            else if(state.mode.startsWith('grammar')) speakText("Which word fits in the sentence?");
        }

        // --- STREAMING_CHUNK:Mode Renderers... ---

        function setGameTheme(season) {
            const config = seasonsConfig[season] || seasonsConfig['spring'];
            document.body.className = `bg-dynamic ${config.themeClass} h-screen w-screen flex flex-col relative overflow-hidden`;
            startParticles(config.particles);
        }

        function renderVocab(q) {
            setGameTheme(q.season);
            document.getElementById('vocab-season-hint').innerText = q.season;
            document.getElementById('vocab-emoji').innerText = q.emoji;
            document.getElementById('vocab-answer').innerText = q.word;
            document.getElementById('vocab-answer').classList.add('hidden');
            document.getElementById('vocab-reveal-btn').classList.remove('hidden');

            const questionEl = document.getElementById('vocab-question');
            const weatherWords = ["sunny", "rainy", "snowy", "windy", "cloudy", "stormy", "hot", "cold", "foggy"];
            const pluralWords = ["pair", "leaves", "flowers"];
            
            let isWeather = weatherWords.includes(q.word);
            let isPlural = pluralWords.some(pw => q.word.includes(pw));

            if (isWeather) {
                questionEl.innerText = "What is the weather like?";
                q.ttsQuestion = "What is the weather like?";
                q.ttsAnswer = `It is ${q.word}.`;
            } else if (isPlural) {
                questionEl.innerText = "What are these?";
                q.ttsQuestion = "What are these?";
                q.ttsAnswer = `These are ${q.word}.`;
            } else {
                questionEl.innerText = "What is this?";
                q.ttsQuestion = "What is this?";
                let article = '';
                if (!q.word.startsWith('a ') && !q.word.startsWith('an ')) {
                    const firstLetter = q.word.charAt(0).toLowerCase();
                    article = ['a', 'e', 'i', 'o', 'u'].includes(firstLetter) ? 'an ' : 'a ';
                }
                q.ttsAnswer = `This is ${article}${q.word}.`;
            }
        }

        function revealVocab() {
            document.getElementById('vocab-answer').classList.remove('hidden');
            document.getElementById('vocab-reveal-btn').classList.add('hidden');
            const q = state.currentArray[state.currentIndex];
            speakText(q.ttsAnswer || q.word);
        }

        function renderSentence(q) {
            setGameTheme(q.season);
            state.gapIndex = 0;
            document.getElementById('sentence-emoji-season').innerText = seasonsConfig[q.season].particles;
            document.getElementById('sentence-emoji-clothes').innerText = q.gaps.find(g => g.emojiHint)?.emojiHint || "🧩";
            updateSentenceHTML(q);
        }

        function updateSentenceHTML(q) {
            const displayEl = document.getElementById('sentence-display');
            const optionsEl = document.getElementById('word-options');
            displayEl.innerHTML = ''; optionsEl.innerHTML = '';

            let templateParts = q.template.split('[gap]');
            
            templateParts.forEach((part, index) => {
                if(part) {
                    const span = document.createElement('span');
                    span.innerText = part;
                    displayEl.appendChild(span);
                }

                if (index < templateParts.length - 1) {
                    const gapSpan = document.createElement('span');
                    gapSpan.className = 'inline-block min-w-[80px] h-10 border-b-4 mx-2 text-center text-blue-600 font-bold px-2 cursor-pointer';
                    
                    if (index < state.gapIndex) {
                        gapSpan.innerText = q.gaps[index].answer;
                        gapSpan.classList.add('border-green-500', 'bg-green-100', 'rounded-lg');
                    } else if (index === state.gapIndex) {
                        gapSpan.classList.add('border-blue-500', 'animate-pulse', 'bg-gray-100', 'rounded-t-lg');
                    } else {
                        gapSpan.classList.add('border-gray-300');
                    }
                    displayEl.appendChild(gapSpan);
                }
            });

            if (state.gapIndex < q.gaps.length) {
                const currentGapData = q.gaps[state.gapIndex];
                const shuffledOptions = [...currentGapData.options].sort(() => Math.random() - 0.5);
                
                shuffledOptions.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = "btn-game bg-white border-gray-300 text-gray-800 text-xl font-bold py-3 px-6 rounded-2xl shadow-sm hover:bg-blue-50";
                    btn.innerText = opt;
                    btn.onclick = () => handleSentenceClick(opt, currentGapData.answer, q);
                    optionsEl.appendChild(btn);
                });
            } else {
                // Done with sentence
                optionsEl.innerHTML = `<p class="text-green-600 font-bold text-xl">Sentence Complete! Teacher, award points!</p>`;
            }
        }

        function handleSentenceClick(selectedWord, correctWord, q) {
            if(selectedWord === correctWord) {
                playSound('pop');
                state.gapIndex++;
                updateSentenceHTML(q);
                if(state.gapIndex >= q.gaps.length) {
                    let fullSentence = q.template;
                    q.gaps.forEach(g => fullSentence = fullSentence.replace('[gap]', g.answer));
                    speakText(fullSentence);
                }
            } else {
                playSound('wrong');
                speakText("Not quite.");
            }
        }

        function renderGrammar(q) {
            setGameTheme(q.season);
            
            let title = "Grammar";
            if(state.mode === 'grammar-present') title = "Simple Present";
            if(state.mode === 'grammar-continuous') title = "Present Continuous";
            if(state.mode === 'grammar-past') title = "Simple Past";
            document.getElementById('grammar-title').innerText = title;
            
            document.getElementById('grammar-emoji').innerText = q.emoji;
            
            // Render sentence with blank
            const sContainer = document.getElementById('grammar-sentence');
            sContainer.innerHTML = q.sentence.replace('[gap]', `<span id="grammar-gap" class="inline-block min-w-[100px] border-b-4 border-purple-500 mx-2 text-purple-600 px-4 pb-1 cursor-pointer transition-colors hover:bg-purple-50">___</span>`);

            // Render options
            const optionsEl = document.getElementById('grammar-options');
            optionsEl.innerHTML = '';
            
            const shuffledOptions = [...q.options].sort(() => Math.random() - 0.5);
            shuffledOptions.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "btn-game bg-white border-gray-300 text-gray-800 text-2xl font-bold py-4 px-6 rounded-2xl shadow-sm hover:bg-purple-50";
                btn.innerText = opt;
                btn.onclick = () => fillGrammarGap(opt, q.answer, q.sentence, btn);
                optionsEl.appendChild(btn);
            });
        }

        function fillGrammarGap(selectedOpt, correctOpt, template, btnEl) {
            const gap = document.getElementById('grammar-gap');
            gap.innerText = selectedOpt;
            
            if(selectedOpt === correctOpt) {
                playSound('pop');
                gap.classList.replace('border-purple-500', 'border-green-500');
                gap.classList.replace('text-purple-600', 'text-green-600');
                gap.classList.add('bg-green-100', 'rounded-lg');
                
                // Highlight correct button
                btnEl.classList.replace('bg-white', 'bg-green-100');
                btnEl.classList.replace('border-gray-300', 'border-green-400');
                
                speakText(template.replace('[gap]', correctOpt));
            } else {
                playSound('wrong');
                gap.classList.replace('border-purple-500', 'border-red-500');
                gap.classList.replace('text-purple-600', 'text-red-600');
                setTimeout(() => {
                    if(gap.innerText === selectedOpt) {
                        gap.innerText = '___';
                        gap.classList.replace('border-red-500', 'border-purple-500');
                        gap.classList.replace('text-red-600', 'text-purple-600');
                    }
                }, 1000);
            }
        }

        function renderDialogue(dialogueArray) {
            setGameTheme('default');
            const container = document.getElementById('dialogue-container');
            container.innerHTML = '';

            dialogueArray.forEach((line, index) => {
                const isEmma = line.speaker === "Emma";
                
                const wrapper = document.createElement('div');
                wrapper.className = `flex w-full ${isEmma ? 'justify-start' : 'justify-end'} opacity-0 translate-y-4 animate-pop`;
                wrapper.style.animationDelay = `${index * 0.2}s`;

                const bubble = document.createElement('div');
                bubble.className = `chat-bubble ${isEmma ? 'chat-left' : 'chat-right'} flex items-start space-x-3`;
                bubble.onclick = () => {
                    playSound('pop');
                    speakText(line.text, line.speaker);
                };

                const avatarHTML = `<span class="text-3xl">${line.avatar}</span>`;
                const textHTML = `<div><div class="text-xs font-bold opacity-70 mb-1">${line.speaker}</div><div>${line.text}</div></div>`;

                if(isEmma) {
                    bubble.innerHTML = avatarHTML + textHTML;
                } else {
                    bubble.innerHTML = textHTML + avatarHTML;
                }

                wrapper.appendChild(bubble);
                container.appendChild(wrapper);
            });
        }

        // --- STREAMING_CHUNK:Visual Effects & Awards... ---

        let particleInterval;
        function startParticles(emoji) {
            stopParticles();
            const container = document.getElementById('particles');
            particleInterval = setInterval(() => {
                const p = document.createElement('div');
                p.className = 'particle text-2xl md:text-4xl opacity-50';
                p.innerText = emoji;
                p.style.left = Math.random() * 100 + 'vw';
                p.style.animationDuration = (Math.random() * 3 + 5) + 's'; 
                container.appendChild(p);
                setTimeout(() => { if (p.parentNode) p.parentNode.removeChild(p); }, 8000);
            }, 800);
        }

        function stopParticles() {
            clearInterval(particleInterval);
            document.getElementById('particles').innerHTML = '';
        }

        function updateAwardsUI() {
            document.getElementById('total-score-display').innerText = state.score;
            const container = document.getElementById('badges-container');
            container.innerHTML = '';

            badges.forEach(badge => {
                if (state.score >= badge.threshold) badge.unlocked = true;
                
                const bDiv = document.createElement('div');
                if(badge.unlocked) {
                    bDiv.className = "bg-white p-4 rounded-2xl shadow-sm border-2 border-yellow-400 flex flex-col items-center justify-center transform hover:scale-105 transition-transform";
                    bDiv.innerHTML = `
                        <div class="text-4xl mb-2">${badge.icon}</div>
                        <div class="font-bold text-gray-800 text-center leading-tight">${badge.name}</div>
                        <div class="text-xs text-yellow-600 mt-1 font-bold">Unlocked!</div>
                    `;
                } else {
                     bDiv.className = "bg-gray-100 p-4 rounded-2xl border-2 border-gray-200 flex flex-col items-center justify-center opacity-70 grayscale";
                     bDiv.innerHTML = `
                        <div class="text-4xl mb-2">🔒</div>
                        <div class="font-bold text-gray-500 text-center leading-tight">${badge.name}</div>
                        <div class="text-xs text-gray-400 mt-1">Requires ${badge.threshold} pts</div>
                    `;
                }
                container.appendChild(bDiv);
            });
        }

        // Initialize Menu View
        window.onload = () => {
            showScreen('screen-menu');
            // Background default particles
            startParticles('✨');
        }

    </script>
</body>
</html>
