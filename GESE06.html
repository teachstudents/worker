    <style>
        /* Custom Animations */
        @keyframes floatUp {
            0% { transform: translateY(0px) scale(0.5); opacity: 0; }
            10% { opacity: 1; transform: translateY(-10px) scale(1.2); }
            100% { transform: translateY(-100px) scale(1); opacity: 0; }
        }
        .animate-float-up {
            animation: floatUp 2s ease-out forwards;
        }
        
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop {
            animation: popIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Custom Scrollbar for cleaner look */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #a5b4fc; /* Indigo-300 */
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #818cf8; /* Indigo-400 */
        }
    </style>

        const PhaseTimer = ({ timeLeft, timerActive, toggleTimer, resetTimer, formatTime }) => (
            <div className={`flex items-center gap-2 px-3 py-1 rounded-lg border ${timeLeft < 30 ? 'bg-red-100 border-red-500 text-red-700 animate-pulse' : 'bg-white border-gray-200 text-gray-700'}`}>

                <button onClick={toggleTimer} className="text-xs font-bold hover:text-indigo-600">{timerActive ? 'PAUSE' : 'START'}</button>
                <button onClick={resetTimer} className="text-xs font-bold hover:text-red-600">RESET</button>
            </div>
        );

        const GrammarChecklist = ({ onReward }) => {
            const [checkedItems, setCheckedItems] = useState({});

            const handleCheck = (key) => {
                if (!checkedItems[key]) {
                    onReward(5); 
                    setCheckedItems(prev => ({ ...prev, [key]: true }));
                } else {
                    setCheckedItems(prev => ({ ...prev, [key]: false }));
                }
            };

            const criteria = [
                { k: 'cond', label: 'Zero & 1st Cond. (If/When)' },
                { k: 'pres_cont', label: 'Pres. Cont. for Future (I am meeting...)' },
                { k: 'past_cont', label: 'Past Cont. (I was studying...)' },
                { k: 'modals', label: 'Modals (must, need to, might...)' },
                { k: 'purpose', label: 'Inf. of Purpose (to learn...)' },
                { k: 'opinion', label: 'Express Opinion/Impression' },
                { k: 'temporal', label: 'Temporal / Phrasal Verbs' },
                { k: 'question', label: 'Ask a Question' }
            ];

            return (
                <div className="bg-indigo-50 p-2 rounded-lg border border-indigo-200 flex-shrink-0 h-full overflow-y-auto shadow-inner">
                    <div className="text-xs font-bold text-indigo-800 uppercase mb-2 flex items-center gap-1"><CheckSquare size={14}/> GESE 6 Checklist (+5)</div>

            const playWinSound = useCallback(() => {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const ctx = new AudioContext();
                const t = ctx.currentTime;
                [440, 554, 659, 880].forEach((freq, i) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.value = freq;
                    gain.gain.setValueAtTime(0.1, t + i * 0.05);
                    gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.05 + 0.5);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(t + i * 0.05);
                    osc.stop(t + i * 0.05 + 0.5);
                });
            }, []);

                                <BookOpen size={14} /> Planner
                            </button>
                            <button onClick={() => setActiveTab('syllabus')} className={`flex items-center gap-1 px-3 py-1 rounded text-xs font-bold transition-all ${activeTab === 'syllabus' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-400 hover:bg-slate-700 hover:text-white'}`}>
                                <Info size={14} /> Syllabus Spec
                            </button>
                        </div>

                        <div className="flex items-center gap-3">
                            <div className="bg-slate-700 rounded px-2 py-1 flex items-center gap-2 border border-slate-600">
                                <span className="text-[10px] text-slate-300 font-bold uppercase">Score</span>
                                <span className="text-sm font-black text-yellow-400">{score}</span>
                            </div>
                            <button onClick={() => triggerReward(10)} className="bg-gradient-to-r from-yellow-500 to-orange-500 hover:from-yellow-400 hover:to-orange-400 text-white font-bold py-1 px-3 rounded shadow-lg active:scale-95 flex items-center gap-1 text-xs">
                                <Trophy size={14} className="text-yellow-100" /> Award
                            </button>
                        </div>
                    </header>

                    <main className="flex-grow p-4 h-full overflow-hidden relative flex flex-col z-10">
                        <div className="bg-white rounded-xl shadow-lg h-full overflow-hidden border border-indigo-100 flex-grow">
                            <div className="h-full p-4 bg-slate-50/50">
                                {activeTab === 'dashboard' && <TopicBuilder timerProps={timerProps} onReward={triggerReward} />}
                                {activeTab === 'conversation' && <ConversationTool timerProps={timerProps} />}
                                {activeTab === 'mock' && <MockExamTool timerProps={timerProps} onReward={triggerReward} />}
                                {activeTab === 'syllabus' && <SyllabusInfo />}
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
