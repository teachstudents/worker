    <style>
        /* Custom Animations */
        @keyframes floatUp {
            0% { transform: translateY(0px) scale(0.5); opacity: 0; }
            10% { opacity: 1; transform: translateY(-10px) scale(1.2); }
            100% { transform: translateY(-100px) scale(1); opacity: 0; }
        }
        .animate-float-up {
            animation: floatUp 2s ease-out forwards;
        }
        
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop {
            animation: popIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Custom Scrollbar for cleaner look */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #a5b4fc; /* Indigo-300 */
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #818cf8; /* Indigo-400 */
        }
    </style>

                                    <textarea 
                                        value={topicData.point3} 
                                        onChange={(e) => handleChange('point3', e.target.value)}
                                        placeholder="In my opinion..."
                                        className="w-full bg-white p-2 rounded-md text-sm font-medium resize-none flex-grow leading-relaxed border border-amber-100 focus:ring-2 focus:ring-amber-400 outline-none"
                                    ></textarea>
                                </div>
                                <div className="p-2 border border-pink-200 rounded-lg bg-pink-50 flex flex-col h-full shadow-sm">
                                    <label className="text-xs font-black text-pink-700 block px-1 mb-1 uppercase tracking-wide">4. Cond/Future (If... I will...)</label>
                                    <textarea 
                                        value={topicData.point4} 
                                        onChange={(e) => handleChange('point4', e.target.value)}
                                        placeholder="If I have time, I will..."
                                        className="w-full bg-white p-2 rounded-md text-sm font-medium resize-none flex-grow leading-relaxed border border-pink-100 focus:ring-2 focus:ring-pink-400 outline-none"
                                    ></textarea>
                                </div>
                            </div>

                            <div className="p-3 bg-red-50 border-t border-red-200 rounded-b-xl flex items-center gap-3 flex-shrink-0">
                                <AlertCircle className="text-red-500 w-6 h-6 flex-shrink-0" />
                                <div className="flex-grow">
                                    <label className="text-xs font-black text-red-700 block mb-1 uppercase tracking-wide">Question for Examiner:</label>
                                    <input 
                                        value={topicData.question} 
                                        onChange={(e) => handleChange('question', e.target.value)}
                                        placeholder="What is your opinion on...?"
                                        type="text" 
                                        className="w-full p-2 border border-red-200 rounded-lg text-sm font-bold bg-white focus:ring-2 focus:ring-red-400 outline-none shadow-sm" 
                                    />
                                </div>
                            </div>
                        </div>

                        <div className="hidden lg:flex gap-4 flex-shrink-0 h-full overflow-hidden">
                            <div className="w-64 h-full overflow-y-auto">
                                <GrammarChecklist onReward={onReward} />
                            </div>
                            <div className="w-72 bg-indigo-50 rounded-xl border border-indigo-100 p-3 overflow-y-auto h-full shadow-inner">
                                <div className="flex items-center gap-2 mb-2 text-indigo-800 font-bold border-b border-indigo-200 pb-2 text-sm">
                                    <BookOpen size={16} /> Required Vocabulary
                                </div>
                                {topicData.vocab.length > 0 ? (
                                    <ul className="flex flex-wrap gap-1.5">
                                        {topicData.vocab.map((word, i) => (
                                            <li key={i} className="bg-white px-2 py-1 rounded-md text-[13px] font-medium text-indigo-900 shadow-sm border border-indigo-200">
                                                {word}
                                            </li>
                                        ))}
                                    </ul>
                                ) : (
                                    <div className="text-sm text-indigo-400 text-center mt-6 font-medium">Load a sample to see suggested words...</div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('conversation'); 
            const [score, setScore] = useState(0);
            const [rewards, setRewards] = useState([]);
            
            const [timeLeft, setTimeLeft] = useState(300); // 5 minutes
            const [timerActive, setTimerActive] = useState(false);

            const playWinSound = useCallback(() => {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const ctx = new AudioContext();
                const t = ctx.currentTime;
                [440, 554, 659, 880].forEach((freq, i) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.value = freq;
                    gain.gain.setValueAtTime(0.1, t + i * 0.05);
                    gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.05 + 0.5);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(t + i * 0.05);
                    osc.stop(t + i * 0.05 + 0.5);
                });
            }, []);

            const triggerReward = useCallback((amount = 10) => {
                setScore(s => s + amount);
                playWinSound();
                const newRewards = Array.from({ length: 8 }).map(() => ({
                    id: Math.random().toString(36).substr(2, 9),
                    x: 30 + Math.random() * 40, 
                    y: 40 + Math.random() * 30,
                    emoji: ['🪙', '⭐', '✨', '🏆', '🎉'][Math.floor(Math.random() * 5)],
                    scale: 0.5 + Math.random()
                }));
                
                setRewards(prev => [...prev, ...newRewards]);
                
                setTimeout(() => {
                    const idsToRemove = newRewards.map(r => r.id);
                    setRewards(prev => prev.filter(r => !idsToRemove.includes(r.id)));
                }, 2000);
            }, [playWinSound]);

            useEffect(() => {
                let interval = null;
                if (timerActive && timeLeft > 0) {
                    interval = setInterval(() => {
                        setTimeLeft(t => t - 1);
                    }, 1000);
                } else if (timeLeft === 0) {
                    setTimerActive(false);
                }
                return () => clearInterval(interval);
            }, [timerActive, timeLeft]);

            const formatTime = (seconds) => {
                const m = Math.floor(seconds / 60);
                const s = seconds % 60;
                return `${m}:${s < 10 ? '0' : ''}${s}`;
            };

            const toggleTimer = () => setTimerActive(!timerActive);
            const resetTimer = () => { setTimerActive(false); setTimeLeft(300); };

            const timerProps = { timeLeft, timerActive, toggleTimer, resetTimer, formatTime };

            return (
                <div className="bg-slate-100 font-sans text-slate-900 h-screen flex flex-col overflow-hidden relative">
                    <div className="absolute inset-0 pointer-events-none z-50 overflow-hidden">
                        {rewards.map(r => (
                            <div 
                                key={r.id} 
                                className="animate-float-up absolute text-4xl" 
                                style={{ left: `${r.x}%`, top: `${r.y}%`, transform: `scale(${r.scale})` }}
                            >
                                {r.emoji}
                            </div>
                        ))}
                    </div>

                    <header className="bg-slate-900 text-white p-3 shadow-lg flex items-center justify-between shrink-0 h-14 z-20">
                        <div className="flex gap-3">
                            <button onClick={() => setActiveTab('conversation')} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm font-bold transition-all ${activeTab === 'conversation' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-500/30' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}>
                                <MessageSquare size={16} /> Conversation
                            </button>
                            <button onClick={() => setActiveTab('mock')} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm font-bold transition-all ${activeTab === 'mock' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-500/30' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}>
                                <Play size={16} /> Mock Exams
                            </button>
                            <button onClick={() => setActiveTab('dashboard')} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm font-bold transition-all ${activeTab === 'dashboard' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-500/30' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}>
                                <BookOpen size={16} /> Topic Planner
                            </button>
                            <button onClick={() => setActiveTab('syllabus')} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm font-bold transition-all ${activeTab === 'syllabus' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-500/30' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}>
                                <Info size={16} /> Syllabus Spec
                            </button>
                        </div>

                        <div className="flex items-center gap-4">
                            <div className="bg-slate-800 rounded-lg px-3 py-1.5 flex items-center gap-2 border border-slate-700 shadow-inner">
                                <span className="text-[10px] text-slate-400 font-black uppercase tracking-wider">Score</span>
                                <span className="text-base font-black text-yellow-400">{score}</span>
                            </div>
                            <button onClick={() => triggerReward(10)} className="bg-gradient-to-r from-amber-500 to-orange-500 hover:from-amber-400 hover:to-orange-400 text-white font-bold py-1.5 px-4 rounded-lg shadow-lg shadow-orange-500/20 active:scale-95 flex items-center gap-1.5 text-sm transition-all">
                                <Trophy size={16} className="text-yellow-100" /> Reward
                            </button>
                        </div>
                    </header>

                    <main className="flex-grow p-4 h-full overflow-hidden relative flex flex-col z-10">
                        <div className="bg-white rounded-2xl shadow-xl h-full overflow-hidden border border-slate-200 flex-grow">
                            <div className="h-full p-4 bg-slate-50/50">
                                {activeTab === 'dashboard' && <TopicBuilder timerProps={timerProps} onReward={triggerReward} />}
                                {activeTab === 'conversation' && <ConversationTool timerProps={timerProps} />}
                                {activeTab === 'mock' && <MockExamTool timerProps={timerProps} onReward={triggerReward} />}
                                {activeTab === 'syllabus' && <SyllabusInfo />}
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
