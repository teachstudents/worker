    <style>
        @keyframes floatUp {
            0% { transform: translateY(0px) scale(0.5); opacity: 0; }
            10% { opacity: 1; transform: translateY(-10px) scale(1.2); }
            100% { transform: translateY(-100px) scale(1); opacity: 0; }
        }
        .animate-float-up {
            animation: floatUp 2s ease-out forwards;
        }
        
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop {
            animation: popIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        const TTSContext = React.createContext();

        const TTSProvider = ({ children }) => {
            const [voices, setVoices] = useState([]);
            
            useEffect(() => {
                const loadVoices = () => setVoices(window.speechSynthesis.getVoices());
                loadVoices();
                if (window.speechSynthesis.onvoiceschanged !== undefined) {
                    window.speechSynthesis.onvoiceschanged = loadVoices;
                }
            }, []);

            const speak = useCallback((text) => {
                if (!text || !window.speechSynthesis) return;
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                
                // Target designated Microsoft Multilingual Online Voices
                const targetNames = ['Remy', 'Giuseppe', 'Vivienne', 'Florian', 'Seraphina', 'Emma', 'Brian', 'Ava', 'Andrew', 'William'];
                
                // Find matching target voices
                const availableTargetVoices = voices.filter(v => 
                    targetNames.some(name => v.name.toLowerCase().includes(name.toLowerCase())) && v.lang.startsWith('en')
                );
                
                // STRICT RULE: No fallback. Block unauthorized voices.
                if (availableTargetVoices.length === 0) {
                    console.warn("No authorized Microsoft Multilingual voices found. TTS disabled.");
                    return; 
                }

                // Pick a random designated voice for variety
                utterance.voice = availableTargetVoices[Math.floor(Math.random() * availableTargetVoices.length)];
                
                // Adjust speed/pitch slightly for better clarity
                utterance.rate = 0.95;
                utterance.pitch = 1.0;

                window.speechSynthesis.speak(utterance);
            }, [voices]);

            return <TTSContext.Provider value={{ speak }}>{children}</TTSContext.Provider>;
        };

        const FrameworksTool = ({ timerProps }) => {
            const [selectedTopic, setSelectedTopic] = useState(null);
            const [selectedFramework, setSelectedFramework] = useState('oreo');

            const data = selectedTopic ? frameworkData[selectedTopic] : null;

            return (
                <div className="flex flex-col h-full overflow-hidden">
                    <div className="flex justify-between items-center mb-4 flex-shrink-0 bg-white p-3 rounded-xl shadow-sm border border-slate-200">
                        <h2 className="text-xl font-black text-slate-800 flex items-center gap-2 tracking-tight">
                            <Layers className="w-6 h-6 text-emerald-500" />
                            Structure & Paraphrase (Level 6)
                        </h2>
                        <PhaseTimer {...timerProps} />
                    </div>

                    <div className="flex-shrink-0 flex gap-2 mb-4 overflow-x-auto pb-2 scrollbar-hide">
                        {Object.keys(frameworkData).map(key => (
                            <button
                                key={key}
                                onClick={() => setSelectedTopic(key)}
                                className={`px-4 py-2 rounded-full text-sm font-black transition-all whitespace-nowrap shadow-sm border ${
                                    selectedTopic === key 
                                    ? 'bg-emerald-500 text-white border-emerald-600 scale-105 transform' 
                                    : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-50'
                                }`}
                            >
                                {conversationData[key].title}
                            </button>
                        ))}
                    </div>

                    <div className="flex-grow flex gap-4 overflow-hidden">
                        {!selectedTopic ? (
                             <div className="w-full h-full text-center text-slate-400 flex flex-col items-center justify-center bg-white rounded-2xl border border-slate-200 shadow-sm">
                                <Layers className="w-16 h-16 mb-4 text-slate-300" />
                                <p className="font-medium text-lg">Select a topic to view paraphrasing frameworks.</p>
                             </div>
                        ) : (
                            <>
                        {/* Left Column: Prompt and Paraphrasing */}
                        <div className="w-1/3 flex flex-col gap-4 overflow-y-auto pr-2">
                            <div className="bg-slate-800 text-white p-5 rounded-2xl shadow-md border border-slate-700">
                                <div className="text-[10px] font-black uppercase tracking-wider text-emerald-400 mb-3">Examiner Prompt</div>
                                <TTSText text={data.prompt} className="bg-slate-700/50 border border-slate-600 shadow-sm hover:bg-slate-700" iconColor="text-emerald-400">
                                    <div className="text-xl font-semibold leading-tight text-white">"{data.prompt}"</div>
                                </TTSText>
                            </div>

                            <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 flex-grow flex flex-col">
                                <div className="flex items-center gap-3 mb-4 border-b border-slate-100 pb-3">
                                    <div className="bg-emerald-100 text-emerald-700 w-6 h-6 rounded-md flex items-center justify-center font-black text-sm">1</div>
                                    <h3 className="font-black text-slate-800 text-base">Paraphrase the Opening</h3>
                                </div>
                                <p className="text-xs text-slate-500 mb-4 font-medium">Never repeat the question exactly. Choose one of these advanced openings:</p>
                                
                                <div className="space-y-4 flex-grow overflow-y-auto">
                                    {data.paraphrases.map((para, idx) => (
                                        <TTSText key={idx} text={para} className="bg-emerald-50/50 border border-emerald-100 shadow-sm hover:border-emerald-300" iconColor="text-emerald-600">
                                            <div className="text-emerald-900 font-semibold text-sm leading-relaxed">
                                                "{para}"
                                            </div>
                                        </TTSText>
                                    ))}
                                </div>
                            </div>
                        </div>

                        {/* Right Column: Frameworks */}
                        <div className="w-2/3 flex flex-col gap-4 overflow-hidden">
                            <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 flex flex-col h-full">
                                <div className="flex justify-between items-center mb-4 border-b border-slate-100 pb-3 flex-shrink-0">
                                    <div className="flex items-center gap-3">
                                        <div className="bg-indigo-100 text-indigo-700 w-6 h-6 rounded-md flex items-center justify-center font-black text-sm">2</div>
                                        <h3 className="font-black text-slate-800 text-base">Structure the Answer</h3>
                                    </div>
                                    <div className="flex bg-slate-100 p-1 rounded-lg">
                                        {['oreo', 'peel', 'ppf'].map(fw => (
                                            <button 
                                                key={fw}
                                                onClick={() => setSelectedFramework(fw)}
                                                className={`px-4 py-1.5 rounded-md text-xs font-black uppercase tracking-wider transition-all ${
                                                    selectedFramework === fw ? 'bg-white text-indigo-700 shadow-sm' : 'text-slate-500 hover:text-slate-700'
                                                }`}
                                            >
                                                {fw}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div className="text-center mb-6 flex-shrink-0">
                                    <h4 className="font-black text-indigo-900 text-lg bg-indigo-50 inline-block px-4 py-1.5 rounded-lg border border-indigo-100">{data.frameworks[selectedFramework].title}</h4>
                                </div>

                                <div className="space-y-4 relative flex-grow overflow-y-auto pl-4 pb-4 mt-2">
                                    {/* Connecting Line */}
                                    <div className="absolute left-[31px] top-6 bottom-8 w-1 bg-indigo-100 rounded-full z-0"></div>

                                    {data.frameworks[selectedFramework].sentences.map((sent, idx) => (
                                        <div key={idx} className="flex gap-4 relative z-10 animate-in fade-in slide-in-from-right-4" style={{ animationDelay: `${idx * 100}ms` }}>
                                            <div className="w-10 h-10 rounded-xl bg-indigo-600 text-white font-black text-lg flex items-center justify-center flex-shrink-0 shadow-md border-2 border-white mt-3">
                                                {sent.label.charAt(0)}
                                            </div>
                                            <TTSText text={sent.text} className="bg-white border border-indigo-100 flex-grow shadow-sm hover:shadow-md">
                                                <div>
                                                    <div className="text-[10px] font-black uppercase tracking-widest text-indigo-400 mb-1.5">{sent.label}</div>
                                                    <div className="text-indigo-900 text-base font-semibold leading-relaxed">"{sent.text}"</div>
                                                </div>
                                            </TTSText>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                        </>
                        )}
                    </div>
                </div>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('conversation'); 
            const [score, setScore] = useState(0);
            const [rewards, setRewards] = useState([]);
            
            const [timeLeft, setTimeLeft] = useState(300);
            const [timerActive, setTimerActive] = useState(false);

            const playWinSound = useCallback(() => {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const ctx = new AudioContext();
                const t = ctx.currentTime;
                [440, 554, 659, 880].forEach((freq, i) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.value = freq;
                    gain.gain.setValueAtTime(0.1, t + i * 0.05);
                    gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.05 + 0.5);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(t + i * 0.05);
                    osc.stop(t + i * 0.05 + 0.5);
                });
            }, []);

            const triggerReward = useCallback((amount = 10) => {
                setScore(s => s + amount);
                playWinSound();
                const newRewards = Array.from({ length: 8 }).map(() => ({
                    id: Math.random().toString(36).substr(2, 9),
                    x: 30 + Math.random() * 40, 
                    y: 40 + Math.random() * 30,
                    emoji: ['🪙', '⭐', '✨', '🏆', '🎉'][Math.floor(Math.random() * 5)],
                    scale: 0.5 + Math.random()
                }));
                
                setRewards(prev => [...prev, ...newRewards]);
                
                setTimeout(() => {
                    const idsToRemove = newRewards.map(r => r.id);
                    setRewards(prev => prev.filter(r => !idsToRemove.includes(r.id)));
                }, 2000);
            }, [playWinSound]);

            useEffect(() => {
                let interval = null;
                if (timerActive && timeLeft > 0) {
                    interval = setInterval(() => setTimeLeft(t => t - 1), 1000);
                } else if (timeLeft === 0) setTimerActive(false);
                return () => clearInterval(interval);
            }, [timerActive, timeLeft]);

            const formatTime = (seconds) => {
                const m = Math.floor(seconds / 60);
                const s = seconds % 60;
                return `${m}:${s < 10 ? '0' : ''}${s}`;
            };

            const timerProps = { timeLeft, timerActive, toggleTimer: () => setTimerActive(!timerActive), resetTimer: () => { setTimerActive(false); setTimeLeft(300); }, formatTime };

            return (
                <TTSProvider>
                <div className="bg-slate-100 font-sans text-slate-900 h-screen flex flex-col overflow-hidden relative">
                    <div className="absolute inset-0 pointer-events-none z-50 overflow-hidden">
                        {rewards.map(r => (
                            <div key={r.id} className="animate-float-up absolute text-4xl drop-shadow-md" style={{ left: `${r.x}%`, top: `${r.y}%`, transform: `scale(${r.scale})` }}>
                                {r.emoji}
                            </div>
                        ))}
                    </div>

                    <header className="bg-slate-800 text-white px-4 py-2 shadow-lg flex items-center justify-between shrink-0 z-20 border-b border-slate-700">
                        <div className="flex items-center gap-4">
                            <div className="font-black text-lg tracking-tight text-white flex items-center gap-2">
                                <span className="bg-indigo-500 text-white px-2 py-0.5 rounded text-sm">GESE 6</span> Classroom
                            </div>
                            <div className="h-6 w-px bg-slate-600 mx-2"></div>
                            <div className="flex gap-1.5">
                                {[
                                    { id: 'conversation', icon: MessageSquare, label: 'Talk' },
                                    { id: 'frameworks', icon: Layers, label: 'Structure' },
                                    { id: 'dashboard', icon: BookOpen, label: 'Plan' },
                                    { id: 'examples', icon: Star, label: 'Models' },
                                    { id: 'mock', icon: Play, label: 'Mock' },
                                    { id: 'syllabus', icon: Info, label: 'Spec' }
                                ].map(tab => (
                                    <button 
                                        key={tab.id}
                                        onClick={() => setActiveTab(tab.id)} 
                                        className={`flex items-center gap-1.5 px-3 py-1.5 rounded-md text-xs font-bold transition-all duration-200 ${
                                            activeTab === tab.id 
                                            ? 'bg-indigo-500 text-white shadow-inner' 
                                            : 'text-slate-300 hover:bg-slate-700 hover:text-white'
                                        }`}
                                    >
                                        <tab.icon size={14} className={activeTab === tab.id ? 'opacity-100' : 'opacity-70'} /> 
                                        {tab.label}
                                    </button>
                                ))}
                            </div>
                        </div>

                        <div className="flex items-center gap-3">
                            <div className="bg-slate-900/50 border border-slate-700 rounded-lg px-3 py-1.5 flex items-center gap-2 shadow-inner">
                                <span className="text-[10px] text-slate-400 font-black uppercase tracking-widest">Score</span>
                                <span className="text-base font-black text-amber-400">{score}</span>
                            </div>
                            <button onClick={() => triggerReward(10)} className="bg-gradient-to-r from-amber-500 to-orange-500 hover:from-amber-400 hover:to-orange-400 text-white font-black py-1.5 px-4 rounded-lg shadow-lg active:scale-95 flex items-center gap-1.5 text-xs transition-all border border-orange-400">
                                <Trophy size={14} className="text-amber-100 drop-shadow-sm" /> Award
                            </button>
                        </div>
                    </header>

                    <main className="flex-grow p-4 md:p-6 h-full overflow-hidden relative flex flex-col z-10">
                        <div className="bg-white rounded-2xl shadow-xl h-full overflow-hidden border border-slate-200/60 flex-grow ring-1 ring-slate-900/5">
                            <div className="h-full p-4 md:p-6 bg-slate-50/30">
                                {activeTab === 'dashboard' && <TopicBuilder timerProps={timerProps} onReward={triggerReward} />}
                                {activeTab === 'conversation' && <ConversationTool timerProps={timerProps} />}
                                {activeTab === 'mock' && <MockExamTool timerProps={timerProps} onReward={triggerReward} />}
                                {activeTab === 'syllabus' && <SyllabusInfo />}
                                {activeTab === 'examples' && <ExamplesTool timerProps={timerProps} />}
                                {activeTab === 'frameworks' && <FrameworksTool timerProps={timerProps} />}
                            </div>
                        </div>
                    </main>
                </div>
                </TTSProvider>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
