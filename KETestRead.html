<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

        :root {
            --app-bg: #f8fafc;
            --panel-bg: #ffffff;
            --text-main: #0f172a;
            --primary: #3b82f6;
            --success: #10b981;
            --error: #ef4444;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--app-bg);
            color: var(--text-main);
            overflow: hidden;
            touch-action: manipulation;
            user-select: none;
        }

        #app-container {
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        /* Scaled up 25% */
        .dynamic-text {
            font-size: clamp(1.25rem, 2.75vh, 2.18rem);
            line-height: 1.8;
            color: #1e293b;
        }

        .test-title {
            font-size: clamp(1.56rem, 3.75vh, 3.12rem);
        }

        /* Interactive Blanks */
        .blank-slot {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 6em;
            height: 1.5em;
            margin: 0 0.25em;
            border-bottom: 2px solid #cbd5e1;
            background-color: #f1f5f9;
            border-radius: 0.25rem;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #2563eb; 
            font-weight: 600;
            vertical-align: bottom;
        }

        .blank-slot.focused {
            border-color: var(--primary);
            background-color: #dbeafe;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
            animation: pulseFocus 1.5s infinite;
        }

        .blank-slot.correct {
            border-color: var(--success);
            background-color: #d1fae5;
            color: #047857;
            pointer-events: none;
        }

        .blank-slot.incorrect {
            border-color: var(--error);
            background-color: #fee2e2;
            color: #b91c1c;
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }

        /* Option Bank Buttons - Scaled up */
        .option-btn {
            background-color: var(--panel-bg);
            border: 2px solid #cbd5e1;
            border-radius: 0.5rem;
            padding: 0.75rem 1.25rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            color: #334155;
            font-size: clamp(1.1rem, 2.25vh, 1.56rem);
        }

        .option-btn:hover {
            border-color: var(--primary);
            background-color: #f8fafc;
        }

        .option-btn:active {
            transform: scale(0.95);
        }

        /* Animations */
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        @keyframes pulseFocus {
            0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); }
            70% { box-shadow: 0 0 0 6px rgba(59, 130, 246, 0); }
            100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>

            text: "Next week, our class is going on a trip to learn about {Topic}. We are going to leave school {1} 9 o'clock in the morning. We will travel by bus, so we must be on {2}. The teacher said we should bring a packed lunch, like sandwiches and an apple. We are going to visit a special place {3} experts will talk to us. We will also have the {4} to ask questions. I want to ask them how they started doing their job. I am very excited, and I think it will be a {5} day out. We will get {6} to school before 3 o'clock.",
            options: [["at", "in", "on", "for"], ["time", "hour", "clock", "moment"], ["where", "which", "who", "what"], ["chance", "luck", "hope", "wish"], ["great", "tall", "big", "large"], ["back", "return", "arrive", "go"]],
            grammar: ["Preposition: Use 'at' for specific times on the clock.", "Phrase: 'on time' means not late.", "Relative pronoun: 'where' refers to a place.", "Noun: 'have the chance' means to have an opportunity.", "Adjective: A 'great day' means a very good day.", "Phrasal verb: 'get back' means to return."]
        },
        {
            text: "Many teenagers think about {Topic} a lot. Some students think it is very important, {1} others do not care about it at all. My friend Sarah thinks it is the {2} interesting thing in the world! Last week, we {3} a long conversation about it in the cafeteria. We both agreed that you should not spend all your free time doing it. It is better to {4} other hobbies too, like playing sports or reading. If you only focus {5} one thing, you might get bored. Next year, we {6} going to start a new project about it.",
            options: [["while", "because", "so", "if"], ["most", "more", "much", "very"], ["had", "made", "did", "took"], ["have", "make", "do", "take"], ["on", "in", "at", "to"], ["are", "is", "will", "be"]],
            grammar: ["Conjunction: 'while' shows a contrast between two ideas.", "Superlative: 'the most interesting' compares it to all others.", "Collocation: We 'have a conversation'.", "Verb: You 'have' hobbies.", "Verb + preposition: 'focus on' something.", "Future tense: 'we are going to' for plans."]
        }
    ];

    for(let i=11; i<=70; i++) {
        const topicName = topicsList[i - 11].toLowerCase();
        const arch = archetypes[(i - 11) % 4];
        
        let testOptions = JSON.parse(JSON.stringify(arch.options));
        let testAnswers = [0, 0, 0, 0, 0, 0];
        
        // Shuffle options dynamically so the correct answer (index 0) moves around
        for(let j=0; j<6; j++) {
            let opts = testOptions[j];
            let correctAnswerStr = opts[0];
            
            for(let k = opts.length - 1; k > 0; k--){
                const randIdx = Math.floor(Math.random() * (k + 1));
                [opts[k], opts[randIdx]] = [opts[randIdx], opts[k]];
            }
            testAnswers[j] = opts.indexOf(correctAnswerStr);
        }

        rawData.push({
            id: i, 
            title: `Test ${i}: ${topicName.charAt(0).toUpperCase() + topicName.slice(1)}`,
            text: arch.text.replace('{Topic}', topicName),
            options: testOptions,
            answers: testAnswers,
            grammar: arch.grammar
        });
    }

    // --- STATE ---
    let appState = {
        scores: JSON.parse(localStorage.getItem('a2_scores')) || {},
        currentTestId: null,
        activeBlankIndex: 0,
        currentAnswers: [],
        currentMistakes: [], 
        completedBlanks: 0,
        errorsThisSession: 0
    };

    let synthCorrect, synthWrong;
    let audioInitialized = false;

    async function initAudio() {
        if (audioInitialized) return;
        try {
            await Tone.start();
            synthCorrect = new Tone.PolySynth(Tone.Synth, {
                oscillator: { type: "sine" },
                envelope: { attack: 0.01, decay: 0.1, sustain: 0.1, release: 1 }
            }).toDestination();
            
            synthWrong = new Tone.Synth({
                oscillator: { type: "sawtooth" },
                envelope: { attack: 0.05, decay: 0.2, sustain: 0, release: 0.5 }
            }).toDestination();
            
            synthCorrect.volume.value = -10;
            synthWrong.volume.value = -12;
            audioInitialized = true;
        } catch (e) {
            console.log("Audio init failed", e);
        }
    }

    function playSound(type) {
        if (!audioInitialized) return;
        if (type === 'correct' && synthCorrect) {
            synthCorrect.triggerAttackRelease(["C5", "E5"], "16n");
        } else if (type === 'wrong' && synthWrong) {
            synthWrong.triggerAttackRelease("C3", "8n");
        }
    }

    function toggleStoryAudio() {
        if (!('speechSynthesis' in window)) {
            showModal("Text-to-Speech is not supported in your browser.");
            return;
        }
        
        const btnIcon = document.getElementById('tts-icon');

        if (speechSynthesis.speaking) {
            speechSynthesis.cancel();
            btnIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5 10v4a2 2 0 002 2h2l4 4V4L9 8H7a2 2 0 00-2 2z"></path>`;
            return;
        }

        const test = rawData.find(t => t.id === appState.currentTestId);
        
        let fullText = test.text;
        for (let i = 0; i < 6; i++) {
            const currentAnswer = appState.currentAnswers[i];
            const wordToRead = currentAnswer !== null ? currentAnswer : "blank";
            fullText = fullText.replace(`{${i+1}}`, wordToRead);
        }

        const utterance = new SpeechSynthesisUtterance(fullText);
        // Specifically tailored speed to 85% normal speech rate
        utterance.rate = 0.85;

        const targetVoices = ["Remy", "Giuseppe", "Vivienne", "Florian", "Seraphina", "Emma", "Brian", "Andrew"];
        const assignedVoiceName = targetVoices[(test.id - 1) % targetVoices.length];
        
        let voices = speechSynthesis.getVoices();
        let selectedVoice = voices.find(v => v.name.includes(assignedVoiceName)) || 
                            voices.find(v => v.name.includes("Microsoft") && v.lang.startsWith("en-")) ||
                            voices.find(v => v.lang.startsWith("en-")) || 
                            voices[0];
                            
        if (selectedVoice) {
            utterance.voice = selectedVoice;
        }

        utterance.onend = () => {
            btnIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5 10v4a2 2 0 002 2h2l4 4V4L9 8H7a2 2 0 00-2 2z"></path>`;
        };

        speechSynthesis.speak(utterance);
        
        btnIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 10a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z"></path>`;
    }

    if ('speechSynthesis' in window) {
        speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
    }

    function calculateTotalScore() {
        let total = 0;
        for (let key in appState.scores) {
            total += appState.scores[key];
        }
        document.getElementById('total-score-display').innerText = total;
    }

    function initMenu() {
        const grid = document.getElementById('test-grid');
        grid.innerHTML = '';
        rawData.forEach(test => {
            const score = appState.scores[test.id];
            const isCompleted = score !== undefined;
            const btn = document.createElement('button');
            
            btn.className = `p-3 rounded-xl text-left transition-all transform hover:-translate-y-1 hover:shadow-lg flex flex-col justify-between min-h-[5rem] relative overflow-hidden group border ${isCompleted ? 'bg-emerald-50 border-emerald-300' : 'bg-white border-gray-200 hover:border-blue-400'}`;
            
            btn.innerHTML = `
                <div class="font-bold ${isCompleted ? 'text-emerald-800' : 'text-gray-800'} z-10 relative text-sm sm:text-base w-full whitespace-normal leading-tight mb-2">${test.title.replace('Test ', 'T')}</div>
                <div class="mt-auto z-10 relative flex justify-end items-end w-full">
                    ${isCompleted ? `<span class="font-black text-emerald-600 text-base sm:text-lg">${score}/6</span>` : ''}
                </div>
                ${!isCompleted ? '<div class="absolute inset-0 bg-blue-50/0 group-hover:bg-blue-50 transition-colors z-0"></div>' : ''}
            `;
            
            btn.onclick = () => startTest(test.id);
            grid.appendChild(btn);
        });
        calculateTotalScore();
    }

    function startTest(id) {
        initAudio();
        
        appState.currentTestId = id;
        appState.currentAnswers = new Array(6).fill(null);
        appState.currentMistakes = [];
        appState.activeBlankIndex = 0;
        appState.completedBlanks = 0;
        appState.errorsThisSession = 0;

        const test = rawData.find(t => t.id === id);
        
        document.getElementById('menu-screen').classList.add('hidden');
        document.getElementById('review-screen').classList.add('hidden');
        document.getElementById('test-screen').classList.remove('hidden');
        
        document.getElementById('current-test-title').innerText = test.title;
        document.getElementById('current-test-errors').innerText = "0";
        document.getElementById('current-test-errors').className = "text-red-500 font-bold";

        renderTestContent(test);
    }

    function renderTestContent(test) {
        const textContainer = document.getElementById('test-text-content');
        const optionsBank = document.getElementById('options-grid');
        
        textContainer.innerHTML = '';
        optionsBank.innerHTML = '';
        
        let htmlParts = test.text.split(/\{(\d+)\}/g);
        
        htmlParts.forEach(part => {
            if (/^\d+$/.test(part)) {
                const blankIdx = parseInt(part) - 1; 
                const span = document.createElement('span');
                span.className = 'blank-slot';
                span.dataset.blankIndex = blankIdx;
                span.innerHTML = `(${part})`;
                span.onclick = () => {
                    if (appState.currentAnswers[blankIdx] === null) selectBlank(blankIdx);
                };
                textContainer.appendChild(span);
            } else {
                const span = document.createElement('span');
                span.innerText = part;
                textContainer.appendChild(span);
            }
        });

        selectBlank(0);
    }

    function selectBlank(blankIdx) {
        if (appState.currentAnswers[blankIdx] !== null) return;
        
        appState.activeBlankIndex = blankIdx;
        
        document.querySelectorAll('.blank-slot').forEach(s => s.classList.remove('focused'));
        const activeSlot = document.querySelector(`.blank-slot[data-blank-index="${blankIdx}"]`);
        if (activeSlot) {
            activeSlot.classList.add('focused');
            activeSlot.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
        
        renderOptionsBank(blankIdx);
    }

    function renderOptionsBank(blankIdx) {
        const test = rawData.find(t => t.id === appState.currentTestId);
        const optionsBank = document.getElementById('options-grid');
        optionsBank.innerHTML = '';
        
        const labelContainer = document.createElement('div');
        labelContainer.className = 'w-full flex justify-center mb-3 sm:mb-4';
        labelContainer.innerHTML = `<span class="bg-blue-100 text-blue-800 text-base sm:text-lg font-bold px-6 py-2 rounded-full border border-blue-200">Options for Blank (${blankIdx + 1})</span>`;
        optionsBank.appendChild(labelContainer);

        const options = test.options[blankIdx];
        const btnContainer = document.createElement('div');
        btnContainer.className = 'flex flex-wrap justify-center gap-3 sm:gap-5 w-full max-w-3xl mx-auto';
        
        options.forEach((word) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn flex-1 min-w-[140px] max-w-[220px] py-4';
            btn.innerText = word;
            btn.onclick = () => handleOptionTap(word, blankIdx);
            btnContainer.appendChild(btn);
        });
        
        optionsBank.appendChild(btnContainer);
    }

    function logMistake(blankIdx, userWord, correctWord, grammar) {
        const existing = appState.currentMistakes.find(m => m.blankIdx === blankIdx);
        if (!existing) {
            appState.currentMistakes.push({ blankIdx, userWord, correctWord, grammar });
        }
        appState.errorsThisSession++;
        document.getElementById('current-test-errors').innerText = appState.errorsThisSession;
    }

    function handleOptionTap(word, blankIdx) {
        const test = rawData.find(t => t.id === appState.currentTestId);
        const slot = document.querySelector(`.blank-slot[data-blank-index="${blankIdx}"]`);
        const correctIndex = test.answers[blankIdx];
        const correctWord = test.options[blankIdx][correctIndex];

        slot.classList.remove('incorrect');
        void slot.offsetWidth;

        if (word === correctWord) {
            playSound('correct');
            slot.innerHTML = word;
            slot.classList.remove('focused');
            slot.classList.add('correct');
            appState.currentAnswers[blankIdx] = word;
            appState.completedBlanks++;
            
            document.getElementById('options-grid').innerHTML = '';

            if (!checkTestComplete()) {
                const firstEmpty = appState.currentAnswers.findIndex(ans => ans === null);
                if (firstEmpty !== -1) selectBlank(firstEmpty);
            }
        } else {
            playSound('wrong');
            slot.innerHTML = word;
            slot.classList.add('incorrect');
            logMistake(blankIdx, word, correctWord, test.grammar[blankIdx]);
            
            setTimeout(() => {
                slot.classList.remove('incorrect');
                slot.innerHTML = `(${blankIdx + 1})`;
            }, 800);
        }
    }

    function checkTestComplete() {
        if (appState.completedBlanks === 6) {
            const optionsBank = document.getElementById('options-grid');
            optionsBank.innerHTML = `
                <div class="w-full flex flex-col items-center justify-center p-2 text-center animate-fade-in">
                    <p class="text-emerald-600 font-black text-xl sm:text-2xl mb-2">Story Complete! 🎉</p>
                    <p class="text-gray-600 font-medium text-sm sm:text-base mb-5">You can now read the full story or use the speaker icon above to listen.</p>
                    <button onclick="showReviewScreen()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-xl shadow-md transition-all active:scale-95 text-lg">
                        Review Results &rarr;
                    </button>
                </div>
            `;
            return true;
        }
        return false;
    }

    function showReviewScreen() {
        document.getElementById('test-screen').classList.add('hidden');
        document.getElementById('review-screen').classList.remove('hidden');

        const test = rawData.find(t => t.id === appState.currentTestId);
        const mistakesContainer = document.getElementById('mistakes-container');
        const list = document.getElementById('mistakes-list');
        const perfectContainer = document.getElementById('perfect-container');
        
        list.innerHTML = '';
        
        const finalScore = 6 - appState.currentMistakes.length;
        appState.scores[test.id] = Math.max(appState.scores[test.id] || 0, finalScore);
        localStorage.setItem('a2_scores', JSON.stringify(appState.scores));

        if (appState.currentMistakes.length === 0) {
            mistakesContainer.classList.add('hidden');
            perfectContainer.classList.remove('hidden');
        } else {
            perfectContainer.classList.add('hidden');
            mistakesContainer.classList.remove('hidden');
            
            appState.currentMistakes.sort((a,b) => a.blankIdx - b.blankIdx).forEach(m => {
                const div = document.createElement('div');
                div.className = 'p-5 bg-gray-50 border border-gray-200 rounded-xl';
                div.innerHTML = `
                    <div class="flex items-center gap-3 mb-3 text-base sm:text-lg">
                        <span class="font-bold text-gray-700">Blank (${m.blankIdx + 1}):</span>
                        <span class="line-through text-red-500">${m.userWord}</span>
                        <span class="text-gray-400">&rarr;</span>
                        <span class="font-black text-emerald-600">${m.correctWord}</span>
                    </div>
                    <p class="text-base sm:text-lg text-gray-700 font-medium bg-blue-50 border-l-4 border-blue-400 p-3 rounded">${m.grammar}</p>
                `;
                list.appendChild(div);
            });
        }
    }

    function returnToMenu() {
        if ('speechSynthesis' in window) speechSynthesis.cancel();
        document.getElementById('test-screen').classList.add('hidden');
        document.getElementById('review-screen').classList.add('hidden');
        document.getElementById('menu-screen').classList.remove('hidden');
        initMenu();
    }

    function showModal(message) {
        document.getElementById('modal-body').innerText = message;
        const modal = document.getElementById('message-modal');
        const content = document.getElementById('modal-content');
        modal.classList.remove('hidden');
        setTimeout(() => content.classList.replace('scale-95', 'scale-100'), 10);
    }

    function closeModal() {
        const modal = document.getElementById('message-modal');
        const content = document.getElementById('modal-content');
        content.classList.replace('scale-100', 'scale-95');
        setTimeout(() => modal.classList.add('hidden'), 200);
    }

    window.onload = () => {
        initMenu();
    };
</script>
</body>
</html>
