<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grade 8 English | Shenzhen 2026 Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --accent: #f59e0b;
            --success: #10b981;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --bg-input: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --border: #475569;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, #1e1b4b 100%);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Top Header Navigation */
        .header {
            background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-dark) 100%);
            padding: 10px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            border-bottom: 2px solid var(--primary);
            box-shadow: var(--shadow);
            height: 60px;
            gap: 5px;
        }

        .header-group {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .header-title {
            font-size: 1.05em;
            font-weight: 700;
            color: var(--text-primary);
            text-align: center;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .nav-btn {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 0.85em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav-btn.secondary {
            background: var(--bg-input);
            border: 1px solid var(--border);
        }

        .nav-btn:active { transform: scale(0.95); }
        .nav-btn:disabled { opacity: 0; pointer-events: none; }

        .xp-badge {
            background: var(--accent);
            color: var(--bg-dark);
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.85em;
            font-weight: 800;
            white-space: nowrap;
        }

        /* Main Container */
        .container {
            padding: 10px;
            padding-top: 70px; /* Account for header */
            height: 100vh;
            overflow-y: auto;
        }

        /* Unit Grid (Home) */
        .units-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            padding-bottom: 20px;
        }

        .unit-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 12px;
            border: 2px solid var(--border);
            cursor: pointer;
            text-align: center;
            transition: transform 0.2s;
        }
        .unit-card:active { transform: scale(0.95); }
        .unit-card.completed { border-color: var(--success); }
        .unit-emoji { font-size: 2em; margin-bottom: 5px; }
        .unit-title { font-size: 0.95em; font-weight: 700; color: var(--text-primary); margin-top: 5px; }
        .unit-subtitle { font-size: 0.75em; color: var(--text-secondary); margin-top: 5px; }

        /* Mode Selector - Scrollable Flex layout */
        .mode-selector {
            display: flex;
            gap: 6px;
            margin-bottom: 12px;
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 8px;
        }
        .mode-selector::-webkit-scrollbar { height: 4px; }
        .mode-selector::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .mode-btn {
            flex: 0 0 auto;
            background: var(--bg-input);
            color: var(--text-secondary);
            border: 2px solid var(--border);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 0.95em;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
        }
        .mode-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .section-title {
            font-size: 1.1em;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--primary);
        }

        /* TTS Clickable Areas */
        .tts-clickable {
            cursor: pointer;
            transition: transform 0.1s;
        }
        .tts-clickable:active { transform: scale(0.98); }
        .tts-active { border-color: var(--accent) !important; box-shadow: 0 0 8px var(--accent); }

        /* Emoji Wrapper */
        .emoji-wrapper {
            display: inline-block;
            font-family: "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", "Android Emoji", sans-serif;
            margin-right: 4px;
            vertical-align: middle;
        }

        /* General Boxes (Plan, Tasks, Grammar) */
        .grammar-box {
            background: var(--bg-card);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 12px;
            border: 2px solid var(--border);
        }
        .grammar-title { font-size: 1.05em; font-weight: 700; color: var(--primary); margin-bottom: 6px; }
        .grammar-rule, .grammar-example {
            background: var(--bg-input);
            border-radius: 6px;
            padding: 10px;
            margin: 4px 0;
            font-size: 0.95em;
            border-left: 3px solid var(--primary);
            color: var(--text-primary);
            line-height: 1.4;
        }
        
        .formatted-text {
            white-space: normal;
        }
        .formatted-text div {
            margin-bottom: 6px;
        }
        .task-header {
            font-size: 1.05em;
            margin-bottom: 8px !important;
            border-bottom: 1px solid var(--border);
            padding-bottom: 4px;
            color: var(--primary);
        }

        .grammar-exercise {
            background: var(--bg-dark);
            padding: 12px;
            border-radius: 8px;
            margin-top: 8px;
            border: 1px dashed var(--border);
        }
        .grammar-q { font-size: 1em; font-weight: 600; margin-bottom: 10px; }
        .grammar-opts { display: flex; gap: 8px; flex-wrap: wrap; }
        .grammar-opt {
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: white;
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 0.9em;
            font-weight: 600;
            cursor: pointer;
        }
        .grammar-opt.correct { background: var(--success); border-color: var(--success); }
        .grammar-opt.wrong { background: #ef4444; border-color: #ef4444; }

        /* Exhaustive Vocabulary Grid */
        .vocab-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
        }
        .vocab-card {
            background: var(--bg-card);
            border-radius: 8px;
            padding: 12px 4px;
            text-align: center;
            border: 2px solid var(--border);
            font-weight: 700;
            font-size: 0.95em;
            color: var(--text-primary);
            word-wrap: break-word;
        }

        /* Reading Box & Tiers */
        .reading-box {
            background: var(--bg-card);
            border-radius: 10px;
            padding: 15px;
            font-size: 1.05em;
            line-height: 1.6;
            border: 2px solid var(--border);
            color: var(--text-primary);
            margin-bottom: 15px;
        }
        .reading-tag {
            display: inline-block;
            background: var(--accent);
            color: var(--bg-dark);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.8em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        /* Tabs (Convo & Tiered Reading) */
        .convo-tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
        }
        .convo-tab {
            flex: 1;
            background: var(--bg-input);
            color: var(--text-secondary);
            border: 1px solid var(--border);
            padding: 8px;
            border-radius: 6px;
            font-size: 0.9em;
            font-weight: bold;
            cursor: pointer;
        }
        .convo-tab.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        /* Chat UI */
        .conversation-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 10px 0;
            min-height: 220px;
        }
        .message-bubble {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 1em;
            line-height: 1.4;
            opacity: 0;
            animation: popIn 0.3s forwards;
            cursor: pointer;
        }
        @keyframes popIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message-left {
            align-self: flex-start;
            background: var(--bg-input);
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border);
        }
        .message-right {
            align-self: flex-end;
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 4px;
        }

        /* Quiz & Spelling */
        .interactive-container {
            background: var(--bg-card);
            border-radius: 10px;
            padding: 15px;
            border: 2px solid var(--border);
            text-align: center;
        }
        .quiz-options {
            display: grid;
            grid-template-columns: 1fr;
            gap: 8px;
            margin-top: 15px;
        }
        .quiz-option {
            background: var(--bg-input);
            color: var(--text-primary);
            border: 2px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            font-size: 1em;
            font-weight: 600;
        }
        .quiz-option.correct { background: var(--success); border-color: var(--success); }
        .quiz-option.wrong { background: #ef4444; border-color: #ef4444; }

        .spelling-wrapper { position: relative; display: inline-block; width: 100%; margin: 10px 0; }
        .spelling-input {
            width: 100%;
            padding: 12px;
            font-size: 1.3em;
            border: 2px solid var(--border);
            border-radius: 8px;
            background: var(--bg-input);
            color: var(--text-primary);
            text-align: center;
        }
        .btn-full {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1em;
            cursor: pointer;
            margin-bottom: 5px;
        }
        .btn-repeat {
            background: var(--bg-input);
            color: var(--text-primary);
            border: 2px solid var(--border);
            margin-bottom: 10px;
        }

        /* Glitter Effect */
        .glitter {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #fbbf24;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1000;
            animation: sparkle 0.6s linear forwards;
            box-shadow: 0 0 5px #fcd34d;
        }
        @keyframes sparkle {
            0% { transform: scale(0) rotate(0deg); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(1.5) rotate(180deg); opacity: 0; }
        }

    </style>
</head>
<body>
    <!-- Top Header -->
    <div class="header">
        <div class="header-group">
            <button class="nav-btn secondary" id="homeBtn" onclick="showHome()">🏠 Home</button>
            <button class="nav-btn secondary" id="backBtn" onclick="navigateBack()" disabled>⬅ Back</button>
        </div>
        <div class="header-title" id="headerTitle">Grade 8 English</div>
        <div class="header-group">
            <div class="xp-badge">⭐ <span id="xpValue">0</span></div>
            <button class="nav-btn" id="nextBtn" onclick="navigateForward()" disabled>Next ➡</button>
        </div>
    </div>

    <!-- Main Container -->
    <div class="container">
        
        <!-- Home View -->
        <div id="homeView">
            <div class="section-title">Shenzhen 2026 Spring Edition</div>
            <div class="units-grid" id="mainGrid"></div>
        </div>

        <!-- Content View -->
        <div id="contentView" style="display: none;">
            <!-- Mode Selector -->
            <div class="mode-selector" id="modeSelector">
                <button class="mode-btn active" onclick="setMode('plan')">Plan</button>
                <button class="mode-btn" onclick="setMode('vocab')">Vocab</button>
                <button class="mode-btn" onclick="setMode('grammar')">Grammar</button>
                <button class="mode-btn" onclick="setMode('reading')">Reading</button>
                <button class="mode-btn" onclick="setMode('tasks')">Tasks</button>
                <button class="mode-btn" onclick="setMode('convo')">Convo</button>
                <button class="mode-btn" onclick="setMode('spell')">Spell</button>
                <button class="mode-btn" onclick="setMode('quiz')">Quiz</button>
            </div>
            
            <div id="contentArea"></div>
        </div>
    </div>

    <script>
        // Grade 8 Curriculum Data - Shenzhen 2026 Spring Edition (Complete Integration)
        const grade8Data = {
            units: [
                {
                    number: 1, 
                    title: "Helping those in need", 
                    emoji: "🤝",
                    theme: "Social Services & Responsibility",
                    plan: {
                        objectives: [
                            "Students will be able to use 10+ vocabulary words related to charity and volunteering.",
                            "Students will be able to correctly use Infinitives (to + verb) as subjects, objects, attributes, and to express purpose.",
                            "Students will be able to write an email applying for voluntary work using formal language."
                        ],
                        outcome: "A written volunteer application and a live 'Charity Pitch' presentation.",
                        intention: "<div><span class='emoji-wrapper'>🎯</span> We are learning to discuss social responsibility so that we can actively contribute to our community.</div><div>• I can use words like voluntary, organization, and courage.</div><div>• I can say 'I want to become a volunteer to help others'.</div>",
                        expectations: "<div><strong>What:</strong> Volunteering vocabulary and the Infinitive structure.</div><div><strong>How:</strong> 'Charity Fair' role-plays, community problem-solving, and email writing.</div><div><strong>Why:</strong> Fostering empathy, social responsibility, and real-world application of formal application writing.</div>",
                        themeText: "<div><strong>Topic:</strong> Social services, voluntary work, and charities.</div><div><strong>Cultural Awareness:</strong> Integrating the Chinese traditional virtue of '助人为乐' (finding pleasure in helping others) and discussing local Shenzhen volunteer organizations.</div>"
                    },
                    vocabulary: ["voluntary", "volunteer", "organization", "disease", "courage", "positive", "lonely", "friendship", "suffer from", "cheer up"],
                    grammar: [
                        { title: "Infinitives (to + verb)", rule: "Used as subjects, objects, attributes, or to express purpose.", examples: ["I hope to become a volunteer.", "We went to the hospital to cheer them up."] },
                        { title: "Infinitive as Subject", rule: "Often used to state a general fact or purpose. Sometimes replaced by 'It' as a dummy subject.", examples: ["To help others is a great virtue.", "It is wonderful to build friendships."] }
                    ],
                    grammarExercises: [
                        { q: "I decided ___ a volunteer at the local charity organization.", options: ["become", "to become", "becoming"], correct: 1 },
                        { q: "We raised money ___ the children who suffer from rare diseases.", options: ["help", "to help", "helping"], correct: 1 },
                        { q: "___ others makes me feel incredibly positive about life.", options: ["To help", "Helps", "Help"], correct: 0 }
                    ],
                    readingTexts: {
                        A2: "Many people need help in our city. Some children suffer from diseases. Some old people feel lonely. Our school has a voluntary organization. We want to become volunteers. We plan to visit the hospital to cheer up the sick children. It is important to have a positive attitude. We hope to bring them joy and friendship.",
                        B1: "Shenzhen is a city with a strong spirit of giving. Last month, I decided to join a local voluntary organization because I wanted to make a difference. We visited a nursing home where many elderly people feel lonely. Our goal was to cheer them up. We offered to sing songs and read books. Although some of them suffer from serious diseases, they showed great courage. To help others makes me feel incredibly positive about life. It is wonderful to build friendships across different generations.",
                        B2: "Cultivating social responsibility is a core aspect of personal development. Consequently, I registered to become an active volunteer with a prominent non-profit organization in Shenzhen. Our primary mission is to alleviate the isolation experienced by elderly citizens who frequently feel lonely or suffer from chronic diseases. Last weekend, we organized an event specifically designed to cheer them up. We spent hours listening to their life stories, which required us to show empathy and patience. Witnessing their resilience and courage was profoundly inspiring. Ultimately, to engage in voluntary work is not merely a charitable act; it is a powerful way to foster a positive community and forge meaningful, cross-generational friendships."
                    },
                    comprehension: [
                        "Gap-Fill: I hope _________ (become) a volunteer next year to help people in need.",
                        "True/False: The primary goal of the organization is to make money.",
                        "Multiple-Choice: What is the grammatical function of 'To help others' in the sentence: To help others makes me happy? A) Object B) Subject C) Purpose"
                    ],
                    tasks: {
                        pbl: `<div class="task-header"><span class="emoji-wrapper">🏷️</span> <strong>The Charity Fair Booth</strong></div><div><strong>Task:</strong> Groups invent a local charity (e.g., protecting Shenzhen's stray animals, helping kids with diseases). They design a promotional poster and pitch their charity to classmates to 'raise funds'.</div><div><strong>Language:</strong> Must use infinitives of purpose: 'We started this organization to protect animals.'</div>`,
                        prbl: `<div class="task-header"><span class="emoji-wrapper">🧩</span> <strong>The Lonely Neighbor Action Plan</strong></div><div><strong>Scenario:</strong> An elderly neighbor in your apartment building's WeChat group mentions they feel extremely lonely and cannot go out to buy groceries.</div><div><strong>Action:</strong> Students brainstorm a community action plan. They must write 3 action steps using infinitives (e.g., '1. We plan to visit him twice a week. 2. We decided to buy his groceries.')</div>`,
                        grasps: `<div class="task-header"><span class="emoji-wrapper">🎭</span> <strong>GRASPS Performance Task</strong></div><div><strong>Goal:</strong> Successfully apply for a highly sought-after volunteer position.</div><div><strong>Role:</strong> High School Student Applicant.</div><div><strong>Audience:</strong> The Director of the Shenzhen Volunteer Federation.</div><div><strong>Situation:</strong> A prestigious international event is coming to Shenzhen, and they need student volunteers. You must write an email explaining your skills and motivation.</div><div><strong>Product:</strong> A formal 80-word email.</div><div><strong>Standard:</strong> Must include 3 verbs followed by infinitives (e.g., I hope to..., I decided to...).</div>`
                    },
                    conversations: [
                        [
                            { speaker: "left", text: "We need an idea for the school Charity Fair." },
                            { speaker: "right", text: "We plan to start an organization to protect stray animals." },
                            { speaker: "left", text: "Great! We need to make posters to raise funds." }
                        ],
                        [
                            { speaker: "left", text: "Our elderly neighbor in the WeChat group said he feels very lonely." },
                            { speaker: "right", text: "We should do something to cheer him up." },
                            { speaker: "left", text: "I agree. I decided to visit him twice a week and offer to buy his groceries." }
                        ],
                        [
                            { speaker: "left", text: "Are you applying for the Shenzhen Volunteer Federation?" },
                            { speaker: "right", text: "Yes, I hope to help international visitors at the new exhibition." },
                            { speaker: "left", text: "You have great English skills. I'm sure they will want you to join." }

                    ],
                    quiz: [
                        { question: "[Author's Purpose] Why did the author write this passage?", options: ["To complain about hospital work", "To inform and persuade about the value of voluntary work", "To explain how to cure a disease"], correct: 1 },
                        { question: "[Grammar Check] What is the grammatical function of 'to engage' in the final sentence?", options: ["Object", "Subject", "Adjective"], correct: 1 },
                        { question: "[Detail Comprehension] What did the volunteers do last weekend?", options: ["Listened to life stories to cheer up the elderly", "Gave out free money", "Cleaned the local hospital"], correct: 0 },
                        { question: "[Vocabulary in Context] 'Alleviate' in the text most closely means:", options: ["Increase", "Reduce or ease", "Ignore completely"], correct: 1 }
                    ],
                    spelling: ["voluntary", "volunteer", "organization", "disease", "courage", "positive", "lonely", "friendship"]
                },
                {
                    number: 2, 
                    title: "Body language", 
                    emoji: "🗣️",
                    theme: "Communication & Culture",
                    plan: {
                        objectives: [
                            "Students will be able to identify and interpret 10+ vocabulary words related to non-verbal communication.",
                            "Students will be able to correctly use Present Participles (Verb-ing) as subjects and objects.",
                            "Students will be able to analyze and explain cross-cultural differences in body language."

                        outcome: "A written article analyzing body language and a 'Silent Movie' role-play.",
                        intention: "<div><span class='emoji-wrapper'>🎯</span> We are learning to interpret body language so that we can communicate effectively across different cultures.</div><div>• I can use words like gesture, expression, and signal.</div><div>• I can use V-ing as a subject (e.g., 'Smiling shows friendliness').</div>",
                        expectations: "<div><strong>What:</strong> Body language vocabulary, Present Participles as nouns (Gerunds).</div><div><strong>How:</strong> Silent acting games, cross-cultural inquiry, and analytical writing.</div><div><strong>Why:</strong> Non-verbal communication makes up a massive percentage of human interaction; understanding it is vital for international perspective.</div>",
                        themeText: "<div><strong>Topic:</strong> Gestures, expressions, and non-verbal signals.</div><div><strong>Cultural Awareness:</strong> Deep-dive into cross-cultural differences (e.g., pointing with a finger is rude in China, shaking head vs. nodding in India).</div>"
                    },
                    vocabulary: ["body language", "gesture", "expression", "communicate", "signal", "meaning", "avoid", "nod", "shake", "polite"],
                    grammar: [
                        { title: "Present Participles as Subjects (Gerunds)", rule: "V-ing forms act as nouns and can be the subject of a sentence.", examples: ["Smiling shows friendliness.", "Learning about cultures is important."] },
                        { title: "Present Participles as Objects", rule: "Used after certain verbs (e.g., enjoy, avoid, practice) or prepositions.", examples: ["You should avoid pointing at people.", "I enjoy studying gestures."] }
                    ],
                    grammarExercises: [
                        { q: "___ directly at someone is considered rude in many Asian countries.", options: ["Point", "To point", "Pointing"], correct: 2 },
                        { q: "I genuinely enjoy ___ about global etiquette and non-verbal signals.", options: ["learn", "learning", "to learn"], correct: 1 },
                        { q: "You must avoid ___ intense eye contact in some Eastern traditions.", options: ["to make", "making", "make"], correct: 1 }
                    ],
                    readingTexts: {
                        A2: "People do not only communicate with words. We also use body language. A smile is a good facial expression. Smiling shows you are friendly. A wave is a hand gesture. Waving means 'hello' or 'goodbye'. But be careful! The meaning of a gesture can change in different countries. In China, pointing at someone with your finger is not polite. Learning about body language is very important.",
                        B1: "Communicating effectively requires more than just speaking a language; it requires understanding body language. Our facial expressions and hand gestures send strong signals to other people. For example, nodding your head usually means agreement, while shaking it means disagreement. However, the meaning of these actions can be completely different depending on the culture. Pointing directly at someone is considered rude in many Asian countries. Therefore, I enjoy studying the customs of different nations to avoid making embarrassing mistakes.",
                        B2: "While verbal fluency is essential, mastering non-verbal signals is equally critical for cross-cultural competence. Body language—encompassing posture, facial expressions, and subtle hand gestures—often conveys more authentic emotion than words themselves. Interpreting these cues correctly is a complex skill. For instance, maintaining direct eye contact sends a signal of confidence in Western cultures, whereas avoiding intense eye contact is a sign of respect in various Eastern traditions. Consequently, understanding the nuanced meaning behind a simple gesture prevents severe cultural misunderstandings. I genuinely appreciate learning about global etiquette, as respecting diverse customs is the foundation of international diplomacy."
                    },
                    comprehension: [
                        "Gap-Fill: I enjoy _________ (learn) about different cultures. _________ (point) at people is rude.",
                        "True/False: Hand gestures have the exact same meaning all over the world.",
                        "Grammar Identification: In the sentence 'Understanding body language is vital', what is the function of the V-ing word? A) Verb B) Subject C) Object."

                    ],
                    tasks: {
                        pbl: `<div class="task-header"><span class="emoji-wrapper">🏷️</span> <strong>Space Station Survival Kit</strong></div><div><strong>Task:</strong> You are going on a 6-month mission to the space station. You can only bring 5 personal items from a list of 20.</div><div><strong>Action:</strong> Debate with your group to agree on the final 5 items. 'We ought to bring seeds so we can grow food.'</div>`,
                        prbl: `<div class="task-header"><span class="emoji-wrapper">🧩</span> <strong>The Mars Colony Crisis</strong></div><div><strong>Scenario:</strong> The year is 2050. A dust storm has covered the solar panels. Oxygen generators will fail in 2 hours.</div><div><strong>Action:</strong> Brainstorm a survival plan. Write 5 emergency commands using target modals (e.g., 'We had better turn off the heating immediately.').</div>`,
                        grasps: `<div class="task-header"><span class="emoji-wrapper">🎭</span> <strong>GRASPS Performance Task</strong></div><div><strong>Goal:</strong> Announce a groundbreaking new space mission to the public.</div><div><strong>Role:</strong> Director of the China National Space Administration (CNSA).</div><div><strong>Audience:</strong> International journalists.</div><div><strong>Situation:</strong> China is launching a new manned mission to build a research base on the Moon. Explain the mission, dangers, and rules.</div><div><strong>Product:</strong> A formal 2-minute press conference presentation, using 'ought to' and 'had better'.</div>`
                    },
                    conversations: [
                        [
                            { speaker: "left", text: "Commander, an unexpected dust storm has covered the solar panels! Power is dropping." },
                            { speaker: "right", text: "We had better turn off the heating immediately to save energy." },
                            { speaker: "left", text: "What about the oxygen generators?" },
                            { speaker: "right", text: "The engineers ought to wear spacesuits and go outside to clean the panels right now." }
                        ],
                        [
                            { speaker: "left", text: "We can only bring 5 items to the space station." },
                            { speaker: "right", text: "We ought to bring seeds so we can grow food." },
                            { speaker: "left", text: "Can I bring my pet dog?" },
                            { speaker: "right", text: "You had better not bring the dog; it cannot survive in zero gravity!" }
                        ],
                        [
                            { speaker: "left", text: "As Director of the CNSA, I announce our new lunar research base mission." },
                            { speaker: "right", text: "What are the main dangers for the astronauts?" },
                            { speaker: "left", text: "The radiation is intense. They had better follow all safety rules." },
                            { speaker: "right", text: "Will we protect the moon's environment?" },
                            { speaker: "left", text: "Yes, we ought to preserve the cosmos as we explore it." }
                        ]
                    ],
                    quiz: [
                        { question: "[Main Idea] What is the primary focus of the reading passage?", options: ["How to build a rocket", "The achievements, risks, and ethics of space exploration", "Why gravity is important"], correct: 1 },
                        { question: "[Inference] What will happen if astronauts do not follow survival protocols?", options: ["They will get a lower grade", "Their lives will be in jeopardy", "They will return to Earth early"], correct: 1 },
                        { question: "[Vocabulary in Context] What does 'jeopardy' mean in the text?", options: ["A TV game show", "Danger or risk of loss", "A type of planet"], correct: 1 },
                        { question: "[Grammar Check] What is the primary function of 'ought to' in the text?", options: ["To express physical ability", "To express a moral duty or strong recommendation", "To talk about the past"], correct: 1 }
                    ],
                    spelling: ["astronaut", "universe", "rocket", "mission", "gravity", "survive", "planet", "explore"]
                }
            ]
        };

        // State variables
        let xp = 0;
        let completedUnits = [];
        let currentUnit = null;
        let currentMode = 'plan';
        let currentReadingTier = 'B2';
        let voices = [];
        const SPEECH_RATE = 0.85; 

        // Initialization
        function init() {
            loadVoices();
            renderMainMenu();
        }

        function loadVoices() {
            if ('speechSynthesis' in window) {
                voices = speechSynthesis.getVoices();
                if (voices.length === 0) setTimeout(loadVoices, 100);
            }
        }

        // TTS function attach to clickables
        function speak(text, voiceName = "Emma") {
            if (!('speechSynthesis' in window)) return;
            speechSynthesis.cancel();
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = SPEECH_RATE; 
            
            const voice = voices.find(v => v.name.includes(voiceName));
            if (voice) utterance.voice = voice;
            
            // Visual feedback on the clicked element
            document.querySelectorAll('.tts-active').forEach(el => el.classList.remove('tts-active'));
            
            // Capture the target safely
            let activeEl = null;
            if (typeof event !== 'undefined' && event && event.currentTarget && event.currentTarget.classList && event.currentTarget.classList.contains('tts-clickable')) {
                activeEl = event.currentTarget;
                activeEl.classList.add('tts-active');
            }

            utterance.onend = () => {
                if (activeEl) {
                    activeEl.classList.remove('tts-active');
                }
            };

            speechSynthesis.speak(utterance);
        }

        // Success Sound
        function playSuccessSound() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(523.25, ctx.currentTime); 
            osc.frequency.exponentialRampToValueAtTime(1046.50, ctx.currentTime + 0.1); 
            gain.gain.setValueAtTime(0.3, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
            osc.start();
            osc.stop(ctx.currentTime + 0.3);
        }

        // Error Sound
        function playErrorSound() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.type = 'square';
            osc.frequency.setValueAtTime(200, ctx.currentTime); 
            osc.frequency.exponentialRampToValueAtTime(150, ctx.currentTime + 0.2); 
            gain.gain.setValueAtTime(0.3, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
            osc.start();
            osc.stop(ctx.currentTime + 0.2);
        }

        // Glitter Animation
        function createGlitter(targetElement) {
            const rect = targetElement.getBoundingClientRect();
            for(let i=0; i<20; i++) {
                const glitter = document.createElement('div');
                glitter.className = 'glitter';
                glitter.style.left = (rect.left + rect.width/2) + 'px';
                glitter.style.top = (rect.top + rect.height/2) + 'px';
                
                // random outward translation
                const tx = (Math.random() * 140 - 70) + 'px';
                const ty = (Math.random() * 100 - 50) + 'px';
                glitter.style.setProperty('--tx', tx);
                glitter.style.setProperty('--ty', ty);
                
                document.body.appendChild(glitter);
                setTimeout(() => glitter.remove(), 600);
            }
        }

        function addXP(pts) {
            xp += pts;
            document.getElementById('xpValue').innerText = xp;
        }

        // Navigation & Display
        function renderMainMenu() {
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = '';
            
            document.getElementById('headerTitle').innerText = "Grade 8 English";
            document.getElementById('backBtn').disabled = true;
            document.getElementById('nextBtn').disabled = true;

            grade8Data.units.forEach(unit => {
                const card = document.createElement('div');
                card.className = `unit-card ${completedUnits.includes(unit.number) ? 'completed' : ''}`;
                card.innerHTML = `
                    <div class="unit-emoji">${unit.emoji}</div>
                    <div class="unit-title">Unit ${unit.number}:<br>${unit.title}</div>
                    <div class="unit-subtitle">${unit.theme || ''}</div>
                `;
                card.onclick = () => loadUnit(unit);
                grid.appendChild(card);
            });
        }

        function showHome() {
            speechSynthesis.cancel();
            isConvoPlaying = false;
            document.getElementById('homeView').style.display = 'block';
            document.getElementById('contentView').style.display = 'none';
            renderMainMenu();
        }

        function loadUnit(unit) {
            currentUnit = unit;
            currentMode = 'plan';
            currentReadingTier = 'B2';
            updateModeButtons();
            
            document.getElementById('homeView').style.display = 'none';
            document.getElementById('contentView').style.display = 'block';
            document.getElementById('headerTitle').innerText = `Unit ${unit.number}`;
            
            document.getElementById('backBtn').disabled = false;
            
            renderContent();
            addXP(5);
        }

        const ALL_MODES = ['plan', 'vocab', 'grammar', 'reading', 'tasks', 'convo', 'spell', 'quiz'];

        function navigateBack() {
            let idx = ALL_MODES.indexOf(currentMode);
            if (idx > 0) {
                setMode(ALL_MODES[idx - 1]);
            } else {
                showHome();
            }
        }

        function navigateForward() {
            let idx = ALL_MODES.indexOf(currentMode);
            if (idx < ALL_MODES.length - 1) {
                setMode(ALL_MODES[idx + 1]);
            }
        }

        function setMode(mode) {
            currentMode = mode;
            speechSynthesis.cancel();
            isConvoPlaying = false;
            updateModeButtons();
            renderContent();
        }

        function updateModeButtons() {
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            const idx = ALL_MODES.indexOf(currentMode);
            const buttons = document.querySelectorAll('.mode-btn');
            
            buttons.forEach(b => {
                if(b.innerText.toLowerCase().includes(currentMode)) {
                    b.classList.add('active');
                    b.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                }
            });
            
            document.getElementById('nextBtn').disabled = (idx === ALL_MODES.length - 1);
        }

        function renderContent() {
            const area = document.getElementById('contentArea');
            area.innerHTML = '';
            
            if (currentMode === 'plan') renderPlan(area);
            if (currentMode === 'vocab') renderVocabulary(area);
            if (currentMode === 'grammar') renderGrammar(area);
            if (currentMode === 'reading') renderReading(area);
            if (currentMode === 'tasks') renderTasks(area);
            if (currentMode === 'convo') renderConversation(area);
            if (currentMode === 'spell') renderSpelling(area);
            if (currentMode === 'quiz') renderQuiz(area);
        }

        // --- View Renderers ---

        function renderPlan(container) {
            if (!currentUnit.plan) return;
            
            let html = `<div class="section-title">Lesson Plan & Framework</div>`;
            
            html += `<div class="grammar-box">
                <div class="grammar-title">🎯 Learning Objectives</div>
                <ul style="margin-left: 20px; margin-bottom: 10px; font-size: 0.95em; color: var(--text-primary); line-height: 1.4;">
                    ${currentUnit.plan.objectives.map(o => `<li>${o}</li>`).join('')}
                </ul>
                <div class="grammar-title" style="margin-top: 15px;">🏆 Outcome</div>
                <div class="grammar-rule">${currentUnit.plan.outcome}</div>
            </div>`;

            html += `<div class="grammar-box">
                <div class="grammar-title">💡 Learning Intention & Success Criteria</div>
                <div class="grammar-rule formatted-text">${currentUnit.plan.intention}</div>
            </div>`;

            html += `<div class="grammar-box">
                <div class="grammar-title">📚 Instructional Expectations</div>
                <div class="grammar-rule formatted-text">${currentUnit.plan.expectations}</div>
            </div>`;

            html += `<div class="grammar-box">
                <div class="grammar-title">🌍 Topic & Theme</div>
                <div class="grammar-rule formatted-text">${currentUnit.plan.themeText}</div>
            </div>`;

            container.innerHTML = html;
        }

        function renderVocabulary(container) {
            const grid = document.createElement('div');
            grid.className = 'vocab-grid';
            currentUnit.vocabulary.forEach((word, i) => {
                const card = document.createElement('div');
                card.className = 'vocab-card tts-clickable';
                card.onclick = (e) => { speak(word, i%2===0?'Emma':'Brian'); addXP(1); };
                card.innerHTML = `${word}`;
                grid.appendChild(card);
            });
            container.appendChild(grid);
        }

        function renderGrammar(container) {
            // Rules
            currentUnit.grammar.forEach(item => {
                const box = document.createElement('div');
                box.className = 'grammar-box';
                let html = `<div class="grammar-title">${item.title}</div>`;
                html += `<div class="grammar-rule tts-clickable" onclick="speak('${item.rule.replace(/'/g,"\\'")}'); addXP(1);">${item.rule}</div>`;
                item.examples.forEach(ex => {
                    html += `<div class="grammar-example tts-clickable" onclick="speak('${ex.replace(/'/g,"\\'")}'); addXP(1);">${ex}</div>`;
                });
                box.innerHTML = html;
                container.appendChild(box);
            });

            // Interactive Grammar Games
            if(currentUnit.grammarExercises && currentUnit.grammarExercises.length > 0) {
                const exContainer = document.createElement('div');
                exContainer.innerHTML = `<div class="section-title" style="margin-top:20px;">Grammar Games</div>`;
                
                currentUnit.grammarExercises.forEach((ex, i) => {
                    const qBox = document.createElement('div');
                    qBox.className = 'grammar-exercise';
                    
                    let html = `<div class="grammar-q">${i+1}. ${ex.q}</div><div class="grammar-opts">`;
                    ex.options.forEach((opt, optIdx) => {
                        html += `<button class="grammar-opt" onclick="checkGrammar(this, ${optIdx}, ${ex.correct})">${opt}</button>`;
                    });
                    html += `</div>`;
                    qBox.innerHTML = html;
                    exContainer.appendChild(qBox);
                });
                container.appendChild(exContainer);
            }
        }

        window.checkGrammar = function(btn, selected, correct) {
            const parent = btn.parentElement;
            const buttons = parent.querySelectorAll('.grammar-opt');
            buttons.forEach(b => b.style.pointerEvents = 'none'); // disable all

            if(selected === correct) {
                btn.classList.add('correct');
                addXP(5);
                playSuccessSound();
            } else {
                btn.classList.add('wrong');
                buttons[correct].classList.add('correct');
                playErrorSound();
            }
        }

        function renderReading(container) {
            if(!currentUnit.readingTexts) return;

            let html = `<div class="convo-tabs" style="margin-bottom: 15px;">
                <button class="convo-tab ${currentReadingTier === 'A2' ? 'active' : ''}" onclick="switchTier('A2')">A2 (Basic)</button>
                <button class="convo-tab ${currentReadingTier === 'B1' ? 'active' : ''}" onclick="switchTier('B1')">B1 (Intermediate)</button>
                <button class="convo-tab ${currentReadingTier === 'B2' ? 'active' : ''}" onclick="switchTier('B2')">B2 (Advanced)</button>
            </div>`;

            const text = currentUnit.readingTexts[currentReadingTier];

            html += `<div class="reading-box tts-clickable" onclick="speak(this.innerText, 'Brian'); addXP(2);">${text}</div>`;

            if (currentUnit.comprehension) {
                html += `<div class="section-title" style="margin-top: 20px;">Comprehension Assessments</div>`;
                currentUnit.comprehension.forEach(comp => {
                    html += `<div class="grammar-box"><div class="grammar-rule">${comp}</div></div>`;
                });
            }

            container.innerHTML = html;
        }

        window.switchTier = function(tier) {
            currentReadingTier = tier;
            speechSynthesis.cancel();
            renderReading(document.getElementById('contentArea'));
        }

        function renderTasks(container) {
            if (!currentUnit.tasks) return;

            let html = `<div class="section-title">Interactive Tasks</div>`;

            html += `<div class="grammar-box">
                <div class="grammar-title">🛠️ Project/Task-Based Learning (TBL)</div>
                <div class="grammar-rule formatted-text">${currentUnit.tasks.pbl}</div>
            </div>`;

            html += `<div class="grammar-box">
                <div class="grammar-title">🧩 Problem-Based Learning (PrBL)</div>
                <div class="grammar-rule formatted-text">${currentUnit.tasks.prbl}</div>
            </div>`;

            html += `<div class="grammar-box">
                <div class="grammar-title">🎭 GRASPS Performance Task</div>
                <div class="grammar-rule formatted-text">${currentUnit.tasks.grasps}</div>
            </div>`;

            container.innerHTML = html;
        }

        // Conversation Logic (Text Message Style + 3 Tabs)
        let isConvoPlaying = false;
        let activeConvoIdx = 0;

        function renderConversation(container) {
            activeConvoIdx = 0;
            
            // Build tabs
            let html = `<div class="convo-tabs">`;
            currentUnit.conversations.forEach((_, i) => {
                html += `<button class="convo-tab ${i===0?'active':''}" onclick="switchConvo(${i}, this)">Convo ${i+1}</button>`;
            });
            html += `</div>`;
            html += `<div class="conversation-container" id="chatContainer"></div>`;
            html += `<button class="btn-full" style="margin-top:10px;" onclick="startConversation()">▶️ Play Audio</button>`;
            
            container.innerHTML = html;
            
            // Render first convo text statically first
            renderStaticChat();
        }

        window.switchConvo = function(idx, btnElement) {
            speechSynthesis.cancel();
            isConvoPlaying = false;
            activeConvoIdx = idx;
            document.querySelectorAll('.convo-tab').forEach(b => b.classList.remove('active'));
            btnElement.classList.add('active');
            renderStaticChat();
        };

        function renderStaticChat() {
            const chatBox = document.getElementById('chatContainer');
            chatBox.innerHTML = '';
            const convo = currentUnit.conversations[activeConvoIdx];
            convo.forEach((line) => {
                const msgBubble = document.createElement('div');
                msgBubble.className = `message-bubble message-${line.speaker} tts-clickable`;
                msgBubble.textContent = line.text;
                msgBubble.style.opacity = 1; // fully visible
                msgBubble.onclick = () => speak(line.text, line.speaker === "left" ? "Emma" : "Brian");
                chatBox.appendChild(msgBubble);
            });
        }

        function startConversation() {
            speechSynthesis.cancel();
            isConvoPlaying = true;
            document.getElementById('chatContainer').innerHTML = '';
            playConvoLine(0);
        }

        function playConvoLine(idx) {
            const convo = currentUnit.conversations[activeConvoIdx];
            if (!isConvoPlaying || idx >= convo.length) {
                isConvoPlaying = false;
                return;
            }

            const line = convo[idx];
            const chatBox = document.getElementById('chatContainer');
            
            const msgBubble = document.createElement('div');
            msgBubble.className = `message-bubble message-${line.speaker} tts-clickable`;
            msgBubble.textContent = line.text;
            msgBubble.onclick = () => speak(line.text, line.speaker === "left" ? "Emma" : "Brian");
            
            chatBox.appendChild(msgBubble);
            chatBox.scrollTop = chatBox.scrollHeight;

            const utterance = new SpeechSynthesisUtterance(line.text);
            utterance.rate = SPEECH_RATE;
            const voice = voices.find(v => v.name.includes(line.speaker === "left" ? "Emma" : "Brian"));
            if (voice) utterance.voice = voice;

            utterance.onend = () => {
                if(isConvoPlaying) {
                    setTimeout(() => playConvoLine(idx + 1), 400);
                }
            };
            
            speechSynthesis.speak(utterance);
        }

        // Spelling Game with Glitter & Sound
        let spellIndex = 0;
        function renderSpelling(container) {
            spellIndex = 0;
            container.innerHTML = `<div id="spellArea" class="interactive-container"></div>`;
            showSpellingWord();
        }

        function showSpellingWord() {
            const area = document.getElementById('spellArea');
            if(spellIndex >= currentUnit.spelling.length) {
                area.innerHTML = `<h3>🎉 Spelling Complete!</h3><button class="btn-full" style="margin-top:10px;" onclick="setMode('spell')">Try Again</button>`;
                addXP(10);
                if (!completedUnits.includes(currentUnit.number)) completedUnits.push(currentUnit.number);
                return;
            }
            
            const word = currentUnit.spelling[spellIndex];
            
            area.innerHTML = `
                <div style="font-size: 3em;">📝</div>
                <button class="btn-full btn-repeat" onclick="speak('${word}')">🔁 Repeat Audio</button>
                <div class="spelling-wrapper">
                    <input type="text" id="spellInput" class="spelling-input" placeholder="Type here..." autocomplete="off">
                </div>
                <button class="btn-full" onclick="checkSpelling('${word}')">Check</button>
            `;
            setTimeout(() => speak(word), 300);
        }

        window.checkSpelling = function(word) {
            const input = document.getElementById('spellInput');
            if(input.value.trim().toLowerCase() === word.toLowerCase()) {
                input.style.borderColor = 'var(--success)';
                input.style.color = 'var(--success)';
                addXP(5);
                playSuccessSound();
                createGlitter(input);
                
                setTimeout(() => {
                    spellIndex++;
                    showSpellingWord();
                }, 1200);
            } else {
                input.style.borderColor = '#ef4444';
                playErrorSound();
                setTimeout(() => {
                    input.style.borderColor = 'var(--border)';
                    input.value = '';
                }, 800);
            }
        };

        // Quiz
        let quizIdx = 0;
        function renderQuiz(container) {
            quizIdx = 0;
            container.innerHTML = `<div id="quizArea" class="interactive-container"></div>`;
            showQuizQuestion();
        }

        function showQuizQuestion() {
            const area = document.getElementById('quizArea');
            if(quizIdx >= currentUnit.quiz.length) {
                area.innerHTML = `<h3>🎉 Quiz Complete!</h3><button class="btn-full" style="margin-top:10px;" onclick="setMode('quiz')">Try Again</button>`;
                addXP(10);
                return;
            }
            
            const q = currentUnit.quiz[quizIdx];
            
            // Format question to highlight the bracketed skill tag
            let formattedQ = q.question;
            const tagMatch = formattedQ.match(/^\[(.*?)\](.*)/);
            if(tagMatch) {
                formattedQ = `<div class="reading-tag">${tagMatch[1]}</div><div>${tagMatch[2]}</div>`;
            }
            
            let html = `<div style="font-size: 1.1em; font-weight: bold; text-align: left;">${formattedQ}</div><div class="quiz-options">`;
            
            q.options.forEach((opt, i) => {
                html += `<button class="quiz-option" onclick="checkQuizAnswer(${i}, ${q.correct}, this)">${opt}</button>`;
            });
            html += `</div>`;
            area.innerHTML = html;
        }

        window.checkQuizAnswer = function(selected, correct, btn) {
            const buttons = document.querySelectorAll('.quiz-option');
            buttons.forEach(b => b.disabled = true);
            
            if(selected === correct) {
                btn.classList.add('correct');
                addXP(5);
                playSuccessSound();
            } else {
                btn.classList.add('wrong');
                buttons[correct].classList.add('correct');
                playErrorSound();
            }
            setTimeout(() => {
                quizIdx++;
                showQuizQuestion();
            }, 1200);
        };

        window.onload = init;
    </script>
</body>
</html>
