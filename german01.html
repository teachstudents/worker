                                    <p className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">In Practice</p>
                                    <p className="text-sm font-medium italic">"{step.sentence}"</p>
                                  </button>
                                </div>
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    )}

                    {activeGrammar === 'verbs' && (
                      <div>
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-6">
                          <h2 className="text-3xl font-extrabold text-slate-800 tracking-tight">Stage 2: Core Verbs (A1)</h2>
                          <p className="text-slate-600 mt-2 font-medium">Here are the essential A1 verbs you need to speak right away. Click any card to hear the conjugations and example sentences!</p>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                          {coreVerbsData.map((verb, idx) => (
                            <div key={idx} className="bg-white rounded-2xl border-2 border-slate-100 p-6 shadow-sm hover:border-amber-300 transition-all">
                              <div className="flex items-baseline justify-between mb-4 border-b border-slate-100 pb-3">
                                <h3 className="text-2xl font-black text-amber-600">{verb.infinitive}</h3>
                                <span className="text-sm font-bold text-slate-400 uppercase tracking-wider">{verb.translation}</span>
                              </div>
                              <div className="space-y-3">
                                <button onClick={() => playTTS(verb.infinitive + ". " + verb.conjugation)} className="w-full text-left p-4 bg-slate-50 rounded-xl hover:bg-amber-100 transition-colors active:scale-[0.98] group">
                                  <p className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Conjugation</p>
                                  <p className="text-slate-800 font-semibold leading-relaxed group-hover:text-amber-900">{verb.conjugation}</p>
                                </button>
                                <button onClick={() => playTTS(verb.sentence)} className="w-full text-left p-4 bg-slate-800 text-white rounded-xl hover:bg-slate-700 transition-colors active:scale-[0.98]">
                                  <p className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Example Sentence</p>
                                  <p className="text-sm font-medium italic">"{verb.sentence}"</p>
                                </button>
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    )}
                  </div>
                )}

              </main>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
