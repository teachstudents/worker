<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grade 7 English | Shenzhen 2026 Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --accent: #f59e0b;
            --success: #10b981;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --bg-input: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --border: #475569;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, #1e1b4b 100%);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Top Header Navigation */
        .header {
            background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-dark) 100%);
            padding: 10px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            border-bottom: 2px solid var(--primary);
            box-shadow: var(--shadow);
            height: 60px;
            gap: 5px;
        }

        .header-group {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .header-title {
            font-size: 1.05em;
            font-weight: 700;
            color: var(--text-primary);
            text-align: center;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .nav-btn {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 0.85em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav-btn.secondary {
            background: var(--bg-input);
            border: 1px solid var(--border);
        }

        .nav-btn:active { transform: scale(0.95); }
        .nav-btn:disabled { opacity: 0; pointer-events: none; }

        .xp-badge {
            background: var(--accent);
            color: var(--bg-dark);
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.85em;
            font-weight: 800;
            white-space: nowrap;
        }

        /* Main Container */
        .container {
            padding: 10px;
            padding-top: 70px; /* Account for header */
            height: 100vh;
            overflow-y: auto;
        }

        /* Unit Grid (Home) */
        .units-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            padding-bottom: 20px;
        }

        .unit-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 12px;
            border: 2px solid var(--border);
            cursor: pointer;
            text-align: center;
            transition: transform 0.2s;
        }
        .unit-card:active { transform: scale(0.95); }
        .unit-card.completed { border-color: var(--success); }
        .unit-emoji { font-size: 2em; margin-bottom: 5px; }
        .unit-title { font-size: 0.95em; font-weight: 700; color: var(--text-primary); margin-top: 5px; }
        .unit-subtitle { font-size: 0.75em; color: var(--text-secondary); margin-top: 5px; }

        /* Mode Selector - Scrollable Flex layout */
        .mode-selector {
            display: flex;
            gap: 6px;
            margin-bottom: 12px;
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 8px;
        }
        .mode-selector::-webkit-scrollbar { height: 4px; }
        .mode-selector::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .mode-btn {
            flex: 0 0 auto;
            background: var(--bg-input);
            color: var(--text-secondary);
            border: 2px solid var(--border);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 0.95em;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
        }
        .mode-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .section-title {
            font-size: 1.1em;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--primary);
        }

        /* TTS Clickable Areas */
        .tts-clickable {
            cursor: pointer;
            transition: transform 0.1s;
        }
        .tts-clickable:active { transform: scale(0.98); }
        .tts-active { border-color: var(--accent) !important; box-shadow: 0 0 8px var(--accent); }

        /* Emoji Wrapper */
        .emoji-wrapper {
            display: inline-block;
            font-family: "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", "Android Emoji", sans-serif;
            margin-right: 4px;
            vertical-align: middle;
        }

        /* General Boxes (Plan, Tasks, Grammar) */
        .grammar-box {
            background: var(--bg-card);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 12px;
            border: 2px solid var(--border);
        }
        .grammar-title { font-size: 1.05em; font-weight: 700; color: var(--primary); margin-bottom: 6px; }
        .grammar-rule, .grammar-example {
            background: var(--bg-input);
            border-radius: 6px;
            padding: 10px;
            margin: 4px 0;
            font-size: 0.95em;
            border-left: 3px solid var(--primary);
            color: var(--text-primary);
            line-height: 1.4;
        }
        
        .formatted-text {
            white-space: normal;
        }
        .formatted-text div {
            margin-bottom: 6px;
        }
        .task-header {
            font-size: 1.05em;
            margin-bottom: 8px !important;
            border-bottom: 1px solid var(--border);
            padding-bottom: 4px;
            color: var(--primary);
        }

        .grammar-exercise {
            background: var(--bg-dark);
            padding: 12px;
            border-radius: 8px;
            margin-top: 8px;
            border: 1px dashed var(--border);
        }
        .grammar-q { font-size: 1em; font-weight: 600; margin-bottom: 10px; }
        .grammar-opts { display: flex; gap: 8px; flex-wrap: wrap; }
        .grammar-opt {
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: white;
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 0.9em;
            font-weight: 600;
            cursor: pointer;
        }
        .grammar-opt.correct { background: var(--success); border-color: var(--success); }
        .grammar-opt.wrong { background: #ef4444; border-color: #ef4444; }

        /* Exhaustive Vocabulary Grid */
        .vocab-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
        }
        .vocab-card {
            background: var(--bg-card);
            border-radius: 8px;
            padding: 12px 4px;
            text-align: center;
            border: 2px solid var(--border);
            font-weight: 700;
            font-size: 0.95em;
            color: var(--text-primary);
            word-wrap: break-word;
        }

        /* Reading Box & Tiers */
        .reading-box {
            background: var(--bg-card);
            border-radius: 10px;
            padding: 15px;
            font-size: 1.05em;
            line-height: 1.6;
            border: 2px solid var(--border);
            color: var(--text-primary);
            margin-bottom: 15px;
        }
        .reading-tag {
            display: inline-block;
            background: var(--accent);
            color: var(--bg-dark);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.8em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        /* Tabs (Convo & Tiered Reading) */
        .convo-tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
        }
        .convo-tab {
            flex: 1;
            background: var(--bg-input);
            color: var(--text-secondary);
            border: 1px solid var(--border);
            padding: 8px;
            border-radius: 6px;
            font-size: 0.9em;
            font-weight: bold;
            cursor: pointer;
        }
        .convo-tab.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        /* Chat UI */
        .conversation-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 10px 0;
            min-height: 220px;
        }
        .message-bubble {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 1em;
            line-height: 1.4;
            opacity: 0;
            animation: popIn 0.3s forwards;
            cursor: pointer;
        }
        @keyframes popIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message-left {
            align-self: flex-start;
            background: var(--bg-input);
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border);
        }
        .message-right {
            align-self: flex-end;
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 4px;
        }

        /* Quiz & Spelling */
        .interactive-container {
            background: var(--bg-card);
            border-radius: 10px;
            padding: 15px;
            border: 2px solid var(--border);
            text-align: center;
        }
        .quiz-options {
            display: grid;
            grid-template-columns: 1fr;
            gap: 8px;
            margin-top: 15px;
        }
        .quiz-option {
            background: var(--bg-input);
            color: var(--text-primary);
            border: 2px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            font-size: 1em;
            font-weight: 600;
        }
        .quiz-option.correct { background: var(--success); border-color: var(--success); }
        .quiz-option.wrong { background: #ef4444; border-color: #ef4444; }

        .spelling-wrapper { position: relative; display: inline-block; width: 100%; margin: 10px 0; }
        .spelling-input {
            width: 100%;
            padding: 12px;
            font-size: 1.3em;
            border: 2px solid var(--border);
            border-radius: 8px;
            background: var(--bg-input);
            color: var(--text-primary);
            text-align: center;
        }
        .btn-full {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1em;
            cursor: pointer;
            margin-bottom: 5px;
        }
        .btn-repeat {
            background: var(--bg-input);
            color: var(--text-primary);
            border: 2px solid var(--border);
            margin-bottom: 10px;
        }

        /* Glitter Effect */
        .glitter {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #fbbf24;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1000;
            animation: sparkle 0.6s linear forwards;
            box-shadow: 0 0 5px #fcd34d;
        }
        @keyframes sparkle {
            0% { transform: scale(0) rotate(0deg); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(1.5) rotate(180deg); opacity: 0; }
        }

    </style>
</head>
<body>
    <!-- Top Header -->
    <div class="header">
        <div class="header-group">
            <button class="nav-btn secondary" id="homeBtn" onclick="showHome()">🏠 Home</button>

        <div class="header-title" id="headerTitle">Grade 7 English</div>
        <div class="header-group">

    <!-- Main Container -->
    <div class="container">
        
        <!-- Home View -->
        <div id="homeView">

            <div id="contentArea"></div>

                        { q: "She was a success because she ___ practiced every day.", options: ["had", "have", "is"], correct: 0 }
                    ],
                    readingTexts: {
                        A2: "Many people turn their hobby into a career. Bill liked computers. He developed his skill. He had practiced a lot before he got a job. Now he has a lot of success.",
                        B1: "Can a simple hobby become a lifelong career? Yes! Read the story of a famous photographer. She had already started taking photos of birds before she became a professional. She developed her skills over many years. Because she worked hard, she achieved great success. Finding a job you love is wonderful.",
                        B2: "The transition from an amateur hobby to a professional career requires dedication and the continuous need to develop one's skills. Consider the biography of a renowned software engineer. By the time he entered university, he had already programmed three different applications. He had recognized his passion long before it became a viable career path. This text structure clearly illustrates cause and effect: early, persistent practice inevitably paves the way for ultimate professional success."
                    },
                    comprehension: [
                        "Text Structure: Which happened first? A) He programmed three applications B) He entered university. (A)",
                        "Gap-Fill: She developed her _________ (skill) and achieved _________ (success)."
                    ],
                    tasks: {
                        pbl: `<div class="task-header"><span class="emoji-wrapper">🏷️</span> <strong>The Path to Success</strong></div><div><strong>Task:</strong> Research a famous person who turned a hobby into a career.</div><div><strong>Action:</strong> Map out their journey on a timeline to practice seeing which past events happened first (Past Perfect).</div>`,
                        prbl: `<div class="task-header"><span class="emoji-wrapper">🧩</span> <strong>Hobby Consultant</strong></div><div><strong>Scenario:</strong> A classmate loves playing video games but doesn't know how it can be a job.</div><div><strong>Action:</strong> Advise them on what skills they need to develop (e.g., coding, design) to make it a career.</div>`,
                        grasps: `<div class="task-header"><span class="emoji-wrapper">🎭</span> <strong>Future Interview</strong></div><div><strong>Goal:</strong> Describe your future success.</div><div><strong>Action:</strong> Pretend you are 30 years old. Tell a reporter what you 'had done' when you were young to get to where you are.</div>`
                    },
                    conversations: [
                        [
                            { speaker: "left", text: "I love playing the guitar. It's my favorite hobby." },
                            { speaker: "right", text: "You should develop that skill. It could become your career." },
                            { speaker: "left", text: "Do you think I can achieve success as a musician?" }
                        ],
                        [
                            { speaker: "left", text: "By the time she was twenty, she had already started her own company." },
                            { speaker: "right", text: "Wow. She had practiced her business skills for a long time." },
                            { speaker: "left", text: "Yes, turning a hobby into a profession takes hard work." }
                        ],
                        [
                            { speaker: "left", text: "What do you need for a good career?" },
                            { speaker: "right", text: "You need to find your passion and develop professional skills." }
                        ]
                    ],
                    quiz: [
                        { question: "[Text Structure] In the B2 text, which action happened FIRST?", options: ["He entered university", "He became a professional", "He programmed three applications"], correct: 2 },
                        { question: "[Grammar Check] The Past Perfect tense (had + past participle) is used to show:", options: ["Something happening right now", "Something that happened before another past event", "A future plan"], correct: 1 },
                        { question: "[Vocabulary in Context] What does 'develop a skill' mean?", options: ["To forget how to do something", "To improve and grow an ability", "To buy a tool"], correct: 1 }
                    ],
                    spelling: ["career", "hobby", "develop", "skill", "success", "achieve"]
                }
            ]
        };

        // State variables
        let xp = 0;
        let completedUnits = [];
        let currentUnit = null;
        let currentMode = 'plan';
        let currentReadingTier = 'B2';
        let voices = [];
        const SPEECH_RATE = 0.85; 

        // Initialization
        function init() {
            loadVoices();
            renderMainMenu();
        }

        function loadVoices() {
            if ('speechSynthesis' in window) {
                voices = speechSynthesis.getVoices();
                if (voices.length === 0) setTimeout(loadVoices, 100);
            }
        }

        // TTS function attach to clickables
        function speak(text, voiceName = "Emma") {
            if (!('speechSynthesis' in window)) return;
            speechSynthesis.cancel();
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = SPEECH_RATE; 
            
            const voice = voices.find(v => v.name.includes(voiceName));
            if (voice) utterance.voice = voice;
            
            // Visual feedback on the clicked element
            document.querySelectorAll('.tts-active').forEach(el => el.classList.remove('tts-active'));
            
            // Capture the target safely
            let activeEl = null;
            if (typeof event !== 'undefined' && event && event.currentTarget && event.currentTarget.classList && event.currentTarget.classList.contains('tts-clickable')) {
                activeEl = event.currentTarget;
                activeEl.classList.add('tts-active');
            }

            utterance.onend = () => {
                if (activeEl) {
                    activeEl.classList.remove('tts-active');
                }
            };

            speechSynthesis.speak(utterance);
        }

        // Success Sound
        function playSuccessSound() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(523.25, ctx.currentTime); 
            osc.frequency.exponentialRampToValueAtTime(1046.50, ctx.currentTime + 0.1); 
            gain.gain.setValueAtTime(0.3, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
            osc.start();
            osc.stop(ctx.currentTime + 0.3);
        }

        // Error Sound
        function playErrorSound() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.type = 'square';
            osc.frequency.setValueAtTime(200, ctx.currentTime); 
            osc.frequency.exponentialRampToValueAtTime(150, ctx.currentTime + 0.2); 
            gain.gain.setValueAtTime(0.3, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
            osc.start();
            osc.stop(ctx.currentTime + 0.2);
        }

        // Glitter Animation
        function createGlitter(targetElement) {
            const rect = targetElement.getBoundingClientRect();
            for(let i=0; i<20; i++) {
                const glitter = document.createElement('div');
                glitter.className = 'glitter';
                glitter.style.left = (rect.left + rect.width/2) + 'px';
                glitter.style.top = (rect.top + rect.height/2) + 'px';
                
                // random outward translation
                const tx = (Math.random() * 140 - 70) + 'px';
                const ty = (Math.random() * 100 - 50) + 'px';
                glitter.style.setProperty('--tx', tx);
                glitter.style.setProperty('--ty', ty);
                
                document.body.appendChild(glitter);
                setTimeout(() => glitter.remove(), 600);
            }
        }

        function addXP(pts) {
            xp += pts;
            document.getElementById('xpValue').innerText = xp;
        }

        // Navigation & Display
        function renderMainMenu() {
            const sem1 = document.getElementById('sem1Grid');
            const sem2 = document.getElementById('sem2Grid');
            sem1.innerHTML = ''; sem2.innerHTML = '';
            
            document.getElementById('headerTitle').innerText = "Grade 7 English";
            document.getElementById('backBtn').disabled = true;
            document.getElementById('nextBtn').disabled = true;

            grade7Data.units.forEach(unit => {
                const card = document.createElement('div');
                card.className = `unit-card ${completedUnits.includes(unit.number) ? 'completed' : ''}`;
                card.innerHTML = `
                    <div class="unit-emoji">${unit.emoji}</div>
                    <div class="unit-title">Unit ${unit.number}:<br>${unit.title}</div>
                    <div class="unit-subtitle">${unit.theme || ''}</div>
                `;
                card.onclick = () => loadUnit(unit);
                if (unit.semester === 1) {
                    sem1.appendChild(card);
                } else {
                    sem2.appendChild(card);
                }
            });
        }

        function showHome() {
            speechSynthesis.cancel();
            isConvoPlaying = false;
            document.getElementById('homeView').style.display = 'block';
            document.getElementById('contentView').style.display = 'none';
            renderMainMenu();
        }

        function loadUnit(unit) {
            currentUnit = unit;
            currentMode = 'plan';
            currentReadingTier = 'B2';
            updateModeButtons();
            
            document.getElementById('homeView').style.display = 'none';
            document.getElementById('contentView').style.display = 'block';
            document.getElementById('headerTitle').innerText = `Unit ${unit.number}`;
            
            document.getElementById('backBtn').disabled = false;
            
            renderContent();
            addXP(5);
        }

        const ALL_MODES = ['plan', 'vocab', 'grammar', 'reading', 'tasks', 'convo', 'spell', 'quiz'];

        function navigateBack() {
            let idx = ALL_MODES.indexOf(currentMode);
            if (idx > 0) {
                setMode(ALL_MODES[idx - 1]);
            } else {
                showHome();
            }
        }

        function navigateForward() {
            let idx = ALL_MODES.indexOf(currentMode);
            if (idx < ALL_MODES.length - 1) {
                setMode(ALL_MODES[idx + 1]);
            }
        }

        function setMode(mode) {
            currentMode = mode;
            speechSynthesis.cancel();
            isConvoPlaying = false;
            updateModeButtons();
            renderContent();
        }

        function updateModeButtons() {
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            const idx = ALL_MODES.indexOf(currentMode);
            const buttons = document.querySelectorAll('.mode-btn');
            
            buttons.forEach(b => {
                if(b.innerText.toLowerCase().includes(currentMode)) {
                    b.classList.add('active');
                    b.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                }
            });
            
            document.getElementById('nextBtn').disabled = (idx === ALL_MODES.length - 1);
        }

        function renderContent() {
            const area = document.getElementById('contentArea');
            area.innerHTML = '';
            
            if (currentMode === 'plan') renderPlan(area);
            if (currentMode === 'vocab') renderVocabulary(area);
            if (currentMode === 'grammar') renderGrammar(area);
            if (currentMode === 'reading') renderReading(area);
            if (currentMode === 'tasks') renderTasks(area);
            if (currentMode === 'convo') renderConversation(area);
            if (currentMode === 'spell') renderSpelling(area);
            if (currentMode === 'quiz') renderQuiz(area);
        }

        // --- View Renderers ---

        function renderPlan(container) {
            if (!currentUnit.plan) return;
            
            let html = `<div class="section-title">Lesson Plan & Framework</div>`;
            
            html += `<div class="grammar-box">
                <div class="grammar-title">🎯 Learning Objectives</div>
                <ul style="margin-left: 20px; margin-bottom: 10px; font-size: 0.95em; color: var(--text-primary); line-height: 1.4;">
                    ${currentUnit.plan.objectives.map(o => `<li>${o}</li>`).join('')}
                </ul>
                <div class="grammar-title" style="margin-top: 15px;">🏆 Outcome</div>
                <div class="grammar-rule">${currentUnit.plan.outcome}</div>
            </div>`;

            html += `<div class="grammar-box">
                <div class="grammar-title">💡 Learning Intention & Success Criteria</div>
                <div class="grammar-rule formatted-text">${currentUnit.plan.intention}</div>
            </div>`;

            html += `<div class="grammar-box">
                <div class="grammar-title">📚 Instructional Expectations</div>
                <div class="grammar-rule formatted-text">${currentUnit.plan.expectations}</div>
            </div>`;

            html += `<div class="grammar-box">
                <div class="grammar-title">🌍 Topic & Theme</div>
                <div class="grammar-rule formatted-text">${currentUnit.plan.themeText}</div>
            </div>`;

            container.innerHTML = html;
        }

        function renderVocabulary(container) {
            const grid = document.createElement('div');
            grid.className = 'vocab-grid';
            currentUnit.vocabulary.forEach((word, i) => {
                const card = document.createElement('div');
                card.className = 'vocab-card tts-clickable';
                card.onclick = (e) => { speak(word, i%2===0?'Emma':'Brian'); addXP(1); };
                card.innerHTML = `${word}`;
                grid.appendChild(card);
            });
            container.appendChild(grid);
        }

        function renderGrammar(container) {
            // Rules
            currentUnit.grammar.forEach(item => {
                const box = document.createElement('div');
                box.className = 'grammar-box';
                let html = `<div class="grammar-title">${item.title}</div>`;
                html += `<div class="grammar-rule tts-clickable" onclick="speak('${item.rule.replace(/'/g,"\\'")}'); addXP(1);">${item.rule}</div>`;
                item.examples.forEach(ex => {
                    html += `<div class="grammar-example tts-clickable" onclick="speak('${ex.replace(/'/g,"\\'")}'); addXP(1);">${ex}</div>`;
                });
                box.innerHTML = html;
                container.appendChild(box);
            });

            // Interactive Grammar Games
            if(currentUnit.grammarExercises && currentUnit.grammarExercises.length > 0) {
                const exContainer = document.createElement('div');
                exContainer.innerHTML = `<div class="section-title" style="margin-top:20px;">Grammar Games</div>`;
                
                currentUnit.grammarExercises.forEach((ex, i) => {
                    const qBox = document.createElement('div');
                    qBox.className = 'grammar-exercise';
                    
                    let html = `<div class="grammar-q">${i+1}. ${ex.q}</div><div class="grammar-opts">`;
                    ex.options.forEach((opt, optIdx) => {
                        html += `<button class="grammar-opt" onclick="checkGrammar(this, ${optIdx}, ${ex.correct})">${opt}</button>`;
                    });
                    html += `</div>`;
                    qBox.innerHTML = html;
                    exContainer.appendChild(qBox);
                });
                container.appendChild(exContainer);
            }
        }

        window.checkGrammar = function(btn, selected, correct) {
            const parent = btn.parentElement;
            const buttons = parent.querySelectorAll('.grammar-opt');
            buttons.forEach(b => b.style.pointerEvents = 'none'); // disable all

            if(selected === correct) {
                btn.classList.add('correct');
                addXP(5);
                playSuccessSound();
            } else {
                btn.classList.add('wrong');
                buttons[correct].classList.add('correct');
                playErrorSound();
            }
        }

        function renderReading(container) {
            if(!currentUnit.readingTexts) return;

            let html = `<div class="convo-tabs" style="margin-bottom: 15px;">
                <button class="convo-tab ${currentReadingTier === 'A2' ? 'active' : ''}" onclick="switchTier('A2')">A2 (Basic)</button>
                <button class="convo-tab ${currentReadingTier === 'B1' ? 'active' : ''}" onclick="switchTier('B1')">B1 (Intermediate)</button>
                <button class="convo-tab ${currentReadingTier === 'B2' ? 'active' : ''}" onclick="switchTier('B2')">B2 (Advanced)</button>
            </div>`;

            const text = currentUnit.readingTexts[currentReadingTier];

            html += `<div class="reading-box tts-clickable" onclick="speak(this.innerText, 'Brian'); addXP(2);">${text}</div>`;

            if (currentUnit.comprehension) {
                html += `<div class="section-title" style="margin-top: 20px;">Comprehension Assessments</div>`;
                currentUnit.comprehension.forEach(comp => {
                    html += `<div class="grammar-box"><div class="grammar-rule">${comp}</div></div>`;
                });
            }

            container.innerHTML = html;
        }

        window.switchTier = function(tier) {
            currentReadingTier = tier;
            speechSynthesis.cancel();
            renderReading(document.getElementById('contentArea'));
        }

        function renderTasks(container) {
            if (!currentUnit.tasks) return;

            let html = `<div class="section-title">Interactive Tasks</div>`;

            html += `<div class="grammar-box">
                <div class="grammar-title">🛠️ Project/Task-Based Learning (TBL)</div>
                <div class="grammar-rule formatted-text">${currentUnit.tasks.pbl}</div>
            </div>`;

            html += `<div class="grammar-box">
                <div class="grammar-title">🧩 Problem-Based Learning (PrBL)</div>
                <div class="grammar-rule formatted-text">${currentUnit.tasks.prbl}</div>
            </div>`;

            html += `<div class="grammar-box">
                <div class="grammar-title">🎭 GRASPS Performance Task</div>
                <div class="grammar-rule formatted-text">${currentUnit.tasks.grasps}</div>
            </div>`;

            container.innerHTML = html;
        }

        // Conversation Logic (Text Message Style + 3 Tabs)
        let isConvoPlaying = false;
        let activeConvoIdx = 0;

        function renderConversation(container) {
            activeConvoIdx = 0;
            
            // Build tabs
            let html = `<div class="convo-tabs">`;
            currentUnit.conversations.forEach((_, i) => {
                html += `<button class="convo-tab ${i===0?'active':''}" onclick="switchConvo(${i}, this)">Convo ${i+1}</button>`;
            });
            html += `</div>`;
            html += `<div class="conversation-container" id="chatContainer"></div>`;
            html += `<button class="btn-full" style="margin-top:10px;" onclick="startConversation()">▶️ Play Audio</button>`;
            
            container.innerHTML = html;
            
            // Render first convo text statically first
            renderStaticChat();
        }

        window.switchConvo = function(idx, btnElement) {
            speechSynthesis.cancel();
            isConvoPlaying = false;
            activeConvoIdx = idx;
            document.querySelectorAll('.convo-tab').forEach(b => b.classList.remove('active'));
            btnElement.classList.add('active');
            renderStaticChat();
        };

        function renderStaticChat() {
            const chatBox = document.getElementById('chatContainer');
            chatBox.innerHTML = '';
            const convo = currentUnit.conversations[activeConvoIdx];
            convo.forEach((line) => {
                const msgBubble = document.createElement('div');
                msgBubble.className = `message-bubble message-${line.speaker} tts-clickable`;
                msgBubble.textContent = line.text;
                msgBubble.style.opacity = 1; // fully visible
                msgBubble.onclick = () => speak(line.text, line.speaker === "left" ? "Emma" : "Brian");
                chatBox.appendChild(msgBubble);
            });
        }

        function startConversation() {
            speechSynthesis.cancel();
            isConvoPlaying = true;
            document.getElementById('chatContainer').innerHTML = '';
            playConvoLine(0);
        }

        function playConvoLine(idx) {
            const convo = currentUnit.conversations[activeConvoIdx];
            if (!isConvoPlaying || idx >= convo.length) {
                isConvoPlaying = false;
                return;
            }

            const line = convo[idx];
            const chatBox = document.getElementById('chatContainer');
            
            const msgBubble = document.createElement('div');
            msgBubble.className = `message-bubble message-${line.speaker} tts-clickable`;
            msgBubble.textContent = line.text;
            msgBubble.onclick = () => speak(line.text, line.speaker === "left" ? "Emma" : "Brian");
            
            chatBox.appendChild(msgBubble);
            chatBox.scrollTop = chatBox.scrollHeight;

            const utterance = new SpeechSynthesisUtterance(line.text);
            utterance.rate = SPEECH_RATE;
            const voice = voices.find(v => v.name.includes(line.speaker === "left" ? "Emma" : "Brian"));
            if (voice) utterance.voice = voice;

            utterance.onend = () => {
                if(isConvoPlaying) {
                    setTimeout(() => playConvoLine(idx + 1), 400);
                }
            };
            
            speechSynthesis.speak(utterance);
        }

        // Spelling Game with Glitter & Sound
        let spellIndex = 0;
        function renderSpelling(container) {
            spellIndex = 0;
            container.innerHTML = `<div id="spellArea" class="interactive-container"></div>`;
            showSpellingWord();
        }

        function showSpellingWord() {
            const area = document.getElementById('spellArea');
            if(spellIndex >= currentUnit.spelling.length) {
                area.innerHTML = `<h3>🎉 Spelling Complete!</h3><button class="btn-full" style="margin-top:10px;" onclick="setMode('spell')">Try Again</button>`;
                addXP(10);
                if (!completedUnits.includes(currentUnit.number)) completedUnits.push(currentUnit.number);
                return;
            }
            
            const word = currentUnit.spelling[spellIndex];
            
            area.innerHTML = `
                <div style="font-size: 3em;">📝</div>
                <button class="btn-full btn-repeat" onclick="speak('${word}')">🔁 Repeat Audio</button>
                <div class="spelling-wrapper">
                    <input type="text" id="spellInput" class="spelling-input" placeholder="Type here..." autocomplete="off">
                </div>
                <button class="btn-full" onclick="checkSpelling('${word}')">Check</button>
            `;
            setTimeout(() => speak(word), 300);
        }

        window.checkSpelling = function(word) {
            const input = document.getElementById('spellInput');
            if(input.value.trim().toLowerCase() === word.toLowerCase()) {
                input.style.borderColor = 'var(--success)';
                input.style.color = 'var(--success)';
                addXP(5);
                playSuccessSound();
                createGlitter(input);
                
                setTimeout(() => {
                    spellIndex++;
                    showSpellingWord();
                }, 1200);
            } else {
                input.style.borderColor = '#ef4444';
                playErrorSound();
                setTimeout(() => {
                    input.style.borderColor = 'var(--border)';
                    input.value = '';
                }, 800);
            }
        };

        // Quiz
        let quizIdx = 0;
        function renderQuiz(container) {
            quizIdx = 0;
            container.innerHTML = `<div id="quizArea" class="interactive-container"></div>`;
            showQuizQuestion();
        }

        function showQuizQuestion() {
            const area = document.getElementById('quizArea');
            if(quizIdx >= currentUnit.quiz.length) {
                area.innerHTML = `<h3>🎉 Quiz Complete!</h3><button class="btn-full" style="margin-top:10px;" onclick="setMode('quiz')">Try Again</button>`;
                addXP(10);
                return;
            }
            
            const q = currentUnit.quiz[quizIdx];
            
            // Format question to highlight the bracketed skill tag
            let formattedQ = q.question;
            const tagMatch = formattedQ.match(/^\[(.*?)\](.*)/);
            if(tagMatch) {
                formattedQ = `<div class="reading-tag">${tagMatch[1]}</div><div>${tagMatch[2]}</div>`;
            }
            
            let html = `<div style="font-size: 1.1em; font-weight: bold; text-align: left;">${formattedQ}</div><div class="quiz-options">`;
            
            q.options.forEach((opt, i) => {
                html += `<button class="quiz-option" onclick="checkQuizAnswer(${i}, ${q.correct}, this)">${opt}</button>`;
            });
            html += `</div>`;
            area.innerHTML = html;
        }

        window.checkQuizAnswer = function(selected, correct, btn) {
            const buttons = document.querySelectorAll('.quiz-option');
            buttons.forEach(b => b.disabled = true);
            
            if(selected === correct) {
                btn.classList.add('correct');
                addXP(5);
                playSuccessSound();
            } else {
                btn.classList.add('wrong');
                buttons[correct].classList.add('correct');
                playErrorSound();
            }
            setTimeout(() => {
                quizIdx++;
                showQuizQuestion();
            }, 1200);
        };

        window.onload = init;
    </script>
</body>
</html>
