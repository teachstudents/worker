<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Produce Market: Master Edition (A1-B2)</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #4CAF50;
            --secondary: #FF9800;
            --bg: #f4f7f6;
            --text: #333;
            --panel-bg: #ffffff;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        
        #datetime-header {
            background-color: #2c3e50;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            display: inline-block;
            font-size: 1.2em;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .season-badge { background-color: #FFC107; color: #333; padding: 5px 10px; border-radius: 5px; font-weight: bold; margin-left: 10px; }
        .level-badge { background-color: #E91E63; color: white; padding: 5px 10px; border-radius: 5px; font-weight: bold; margin-left: 10px; }

        h1 { color: #2c3e50; font-size: 2.2em; margin-top: 0; }
        
        /* Menu Styles */
        #main-menu { display: flex; flex-direction: column; align-items: center; gap: 20px; margin-top: 30px; }
        .input-group { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        input[type="text"] { font-size: 1.5em; padding: 10px; border-radius: 10px; border: 2px solid #ccc; text-align: center; width: 300px; max-width: 90%; }
        
        .level-selector { display: flex; gap: 10px; justify-content: center; margin-top: 15px; flex-wrap: wrap; }
        .level-btn { font-size: 1.2em; padding: 10px 20px; border: 3px solid #ccc; border-radius: 10px; background: white; cursor: pointer; transition: 0.2s; font-weight: bold; }
        .level-btn.selected { border-color: #4CAF50; background: #E8F5E9; color: #2E7D32; transform: scale(1.05); }

        .btn-group { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
        .menu-btn { font-size: 1.3em; padding: 15px 25px; border: none; border-radius: 15px; cursor: pointer; transition: transform 0.2s; color: white; font-weight: bold; flex: 1; min-width: 250px;}
        .menu-btn:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        #btn-fruit { background-color: #E91E63; border-bottom: 4px solid #C2185B; }
        #btn-veg { background-color: #4CAF50; border-bottom: 4px solid #388E3C; }
        #btn-model { background-color: #9C27B0; border-bottom: 4px solid #7B1FA2; }
        #btn-quiz { background-color: #00BCD4; border-bottom: 4px solid #0097A7; }
        #btn-grammar { background-color: #FF5722; border-bottom: 4px solid #E64A19; }

        /* Game Area Styles */
        #game-area, #selection-area, #model-menu-area, #quiz-area, #grammar-area { display: none; max-width: 1000px; margin: 0 auto; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        .back-btn { padding: 10px 20px; background: #607D8B; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        /* Selection Grid */
        .produce-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; margin-top: 20px; }
        .produce-card { cursor: pointer; padding: 20px 10px; border-radius: 15px; background: #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.05); font-size: 1.2em; transition: 0.2s; border: 2px solid transparent; }
        .produce-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .produce-card .emoji { font-size: 3.5em; display: block; margin-bottom: 10px; }
        
        #quantity-selection { display: none; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-top: 20px; }
        .quant-btn { background: #E3F2FD; color: #1565C0; font-size: 1.2em; padding: 12px 20px; border: 2px solid #90CAF9; border-radius: 10px; cursor: pointer; margin: 5px; font-weight: bold; transition: 0.2s; }
        .quant-btn:hover { background: #2196F3; color: white; transform: scale(1.05); }

        /* Conversation Board */
        .conversation-board { display: flex; flex-direction: column; gap: 15px; background: var(--panel-bg); padding: 20px 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 20px; max-height: 500px; overflow-y: auto; border: 3px solid #E0F7FA; }
        .chat-message { display: flex; align-items: flex-end; gap: 15px; width: 100%; margin-bottom: 10px; }
        .seller-message { justify-content: flex-start; margin-right: 30%; padding-right: 0; }
        .buyer-message { justify-content: flex-end; margin-left: 30%; padding-left: 0; }
        .chat-avatar { font-size: 3em; background: #f0f0f0; border-radius: 50%; padding: 5px; flex-shrink: 0; }
        .chat-bubble { padding: 15px 25px; background: #e0f7fa; border-radius: 15px; font-size: 1.25em; text-align: left; box-shadow: 0 4px 6px rgba(0,0,0,0.05); max-width: 100%; line-height: 1.5; border: 1px solid #B2EBF2; }
        .buyer-message .chat-bubble { background: #fff9c4; border: 1px solid #FFF59D; text-align: right; }
        
        /* Produce Display */
        .produce-display { font-size: 4em; margin: 20px 0; padding: 15px; background: #fff; border-radius: 15px; min-height: 70px; display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; border: 2px dashed #ccc; }

        /* Controls */
        .controls { display: flex; justify-content: center; gap: 15px; margin-top: 20px; flex-wrap: wrap; }
        .action-btn { font-size: 1.2em; padding: 15px 25px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; color: white; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .action-btn:hover { opacity: 0.9; transform: translateY(-2px); }
        .btn-agree { background-color: #4CAF50; border-bottom: 4px solid #388E3C; }
        .btn-complain { background-color: #F44336; border-bottom: 4px solid #D32F2F; }
        .btn-ask { background-color: #2196F3; border-bottom: 4px solid #1976D2; }
        .btn-leave { background-color: #607D8B; border-bottom: 4px solid #455A64; }
        .btn-pay { background-color: #FF9800; border-bottom: 4px solid #F57C00; }
        .btn-next { background-color: #9C27B0; border-bottom: 4px solid #7B1FA2; }

        /* Lists and Quizzes */
        .scenario-list, #quiz-options, .grammar-options { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        .scenario-btn, .quiz-option-btn, .grammar-btn { background: white; padding: 15px 20px; border-radius: 10px; border: 2px solid #ccc; font-size: 1.2em; cursor: pointer; transition: 0.2s; font-weight: bold; text-align: left; }
        .scenario-btn:hover, .quiz-option-btn:hover:not(:disabled), .grammar-btn:hover:not(:disabled) { background: #E3F2FD; border-color: #2196F3; transform: translateX(5px); }
        .grammar-options { flex-direction: row; justify-content: center; flex-wrap: wrap; }
        .grammar-btn { text-align: center; min-width: 150px; flex: 1; }
        
        .grammar-rule-box { display: none; background: #FFF9C4; color: #F57F17; padding: 20px; border-radius: 15px; margin-top: 20px; font-size: 1.2em; font-weight: bold; border: 2px dashed #FBC02D; }

        /* Praise Animation */
        #praise-text { font-size: 4em; font-weight: bold; color: #FFEB3B; text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); z-index: 1000; pointer-events: none; opacity: 0; }
        @keyframes popIn { 0% { transform: translate(-50%, -50%) scale(0); opacity: 0; } 15% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; } 80% { transform: translate(-50%, -50%) scale(1); opacity: 1; } 100% { transform: translate(-50%, -50%) scale(0); opacity: 0; } }
        .animate-praise { animation: popIn 2.5s forwards; }
    </style>
</head>
<body>

    <div id="datetime-header">
        <span id="current-date">Loading...</span> | <span id="current-time">Loading...</span>
        <span class="season-badge" id="current-season">Season</span>
        <span class="level-badge" id="current-level-display">Level: A1</span>
    </div>

    <h1 id="main-title">Global Produce Market</h1>

    <!-- MAIN MENU -->
    <div id="main-menu">
        <div class="input-group">
            <label for="player-name" style="font-size: 1.5em; display: block; margin-bottom: 10px;">Who is shopping today?</label>
            <input type="text" id="player-name" placeholder="Type your name..." value="Student" />
            
            <h3 style="margin-top: 20px; margin-bottom: 5px;">Select CEFR Level:</h3>
            <div class="level-selector">
                <button class="level-btn selected" onclick="setLevel('A1', this)">A1 (Beginner)</button>
                <button class="level-btn" onclick="setLevel('A2', this)">A2 (Elementary)</button>
                <button class="level-btn" onclick="setLevel('B1', this)">B1 (Intermediate)</button>
                <button class="level-btn" onclick="setLevel('B2', this)">B2 (Upper Int.)</button>
            </div>
        </div>

        <div class="btn-group">
            <button class="menu-btn" id="btn-fruit" onclick="startGame('fruit')">🍎 Shop for Fruit</button>
            <button class="menu-btn" id="btn-veg" onclick="startGame('veg')">🥕 Shop for Veggies</button>
            <button class="menu-btn" id="btn-model" onclick="showModelMenu()">🗣️ Listen & Learn</button>
            <button class="menu-btn" id="btn-quiz" onclick="startQuiz()">📝 Market Quiz</button>
            <button class="menu-btn" id="btn-grammar" onclick="startGrammarGame()">🧩 Grammar Game</button>
        </div>
    </div>

    <div id="selection-area">
        <div class="top-bar">
            <button class="back-btn" onclick="showMenu()">← Main Menu</button>
            <h2>Choose Your <span id="selection-type-title"></span></h2>
        </div>
        <div id="produce-grid" class="produce-grid"></div>
        <div id="quantity-selection">
            <h2 id="quantity-item-name"></h2>
            <div class="produce-display" id="quantity-item-emoji" style="margin: 10px 0; font-size: 3em; border: none;"></div>
            <p style="font-size: 1.3em;">How much do you want?</p>
            <div id="quantity-buttons" style="display: flex; flex-wrap: wrap; justify-content: center; gap: 10px;"></div>
            <button class="back-btn" style="margin-top: 20px; background: #F44336;" onclick="renderSelection()">Cancel</button>
        </div>
    </div>

    <div id="model-menu-area">
        <div class="top-bar">
            <button class="back-btn" onclick="showMenu()">← Main Menu</button>
            <h2>Listen & Learn</h2>
        </div>
        <div class="scenario-list" id="scenario-list"></div>
    </div>

    <div id="game-area">
        <div class="top-bar">
            <button class="back-btn" id="game-back-btn" onclick="returnToSelection()">← Back</button>
            <h2 id="market-title">Market</h2>
        </div>
        <div class="produce-display" id="emoji-display"></div>
        <div class="conversation-board" id="chat-log"></div>
        <div class="controls" id="control-panel"></div>
    </div>

    <div id="quiz-area">
        <div class="top-bar">
            <button class="back-btn" onclick="showMenu()">← Menu</button>
            <h2>Market Quiz</h2>
            <div style="font-weight: bold; background: white; padding: 5px 15px; border-radius: 10px;">Score: <span id="quiz-score" style="color: #4CAF50;">0</span></div>
        </div>
        <div style="background: white; padding: 30px; border-radius: 20px; text-align: left;">
            <h2 id="quiz-question-text" style="margin-top: 0; color: #1976D2;">Loading...</h2>
            <div id="quiz-options"></div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 20px;">
                <span id="quiz-feedback-text" style="font-size: 1.3em; font-weight: bold;"></span>
                <button id="btn-next-question" class="action-btn btn-next" style="display: none; padding: 10px 20px;" onclick="nextQuestion()">Next ➡️</button>
            </div>
        </div>
    </div>

    <div id="grammar-area">
        <div class="top-bar">
            <button class="back-btn" onclick="showMenu()">← Menu</button>
            <h2>Grammar Challenge</h2>
            <div style="font-weight: bold; background: white; padding: 5px 15px; border-radius: 10px;">Score: <span id="grammar-score" style="color: #FF5722;">0</span></div>
        </div>
        <div style="background: white; padding: 30px; border-radius: 20px;">
            <h2 id="grammar-question-text" style="margin-top: 0;">Loading...</h2>
            <div class="grammar-options" id="grammar-options"></div>
            <div class="grammar-rule-box" id="grammar-rule-box"></div>
            <button id="btn-grammar-next" class="action-btn btn-next" style="display: none; margin: 20px auto 0 auto;" onclick="nextGrammarQuestion()">Next ➡️</button>
        </div>
    </div>

    <div id="praise-text"></div>

    <script>
        let currentLevel = 'A1';
        let currentMode = 'fruit';
        let playerName = 'Student';
        let state = {};
        let currentSeasonStr = "Summer";

        function setLevel(lvl, btnElement) {
            currentLevel = lvl;
            document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('selected'));
            btnElement.classList.add('selected');
            document.getElementById('current-level-display').innerText = `Level: ${lvl}`;
        }

        function updateDateTime() {
            const now = new Date();
            const optionsDate = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const optionsTime = { hour: '2-digit', minute: '2-digit', second: '2-digit' };
            document.getElementById('current-date').innerText = now.toLocaleDateString('en-US', optionsDate);
            document.getElementById('current-time').innerText = now.toLocaleTimeString('en-US', optionsTime);

            const month = now.getMonth();
            if (month >= 2 && month <= 4) currentSeasonStr = "Spring";
            else if (month >= 5 && month <= 7) currentSeasonStr = "Summer";
            else if (month >= 8 && month <= 10) currentSeasonStr = "Fall";
            else currentSeasonStr = "Winter";

            document.getElementById('current-season').innerText = currentSeasonStr;
        }
        setInterval(updateDateTime, 1000);
        updateDateTime();

        const fruits = [
            { emoji: '🍎', name: 'apple', plur: 'apples', type: 'countable', season: 'Fall', basePriceLb: 1.50 },
            { emoji: '🍌', name: 'banana', plur: 'bananas', type: 'countable', season: 'Summer', basePriceLb: 0.50 },
            { emoji: '🍍', name: 'pineapple', plur: 'pineapples', type: 'countable', season: 'Spring', basePriceLb: 3.00 },
            { emoji: '🥭', name: 'mango', plur: 'mangoes', type: 'countable', season: 'Summer', basePriceLb: 2.00 },
            { emoji: '🍉', name: 'watermelon', plur: 'watermelons', type: 'countable', season: 'Summer', basePriceLb: 4.00 },
            { emoji: '🍊', name: 'orange', plur: 'oranges', type: 'countable', season: 'Winter', basePriceLb: 1.00 },
            { emoji: '🍓', name: 'strawberry', plur: 'strawberries', type: 'countable', season: 'Spring', basePriceLb: 2.50 },
            { emoji: '🍇', name: 'grapes', plur: 'grapes', type: 'uncountable', season: 'Summer', basePriceLb: 3.00 },
            { emoji: '🍒', name: 'cherries', plur: 'cherries', type: 'uncountable', season: 'Summer', basePriceLb: 4.00 }
        ];

        const vegetables = [
            { emoji: '🍅', name: 'tomato', plur: 'tomatoes', type: 'countable', season: 'Summer', basePriceLb: 1.00 },
            { emoji: '🧅', name: 'onion', plur: 'onions', type: 'countable', season: 'Fall', basePriceLb: 1.00 },
            { emoji: '🥒', name: 'cucumber', plur: 'cucumbers', type: 'countable', season: 'Summer', basePriceLb: 1.00 },
            { emoji: '🥔', name: 'potato', plur: 'potatoes', type: 'uncountable', season: 'Fall', basePriceLb: 1.50 },
            { emoji: '🥦', name: 'broccoli', plur: 'broccoli', type: 'uncountable', season: 'Winter', basePriceLb: 2.50 },
            { emoji: '🥬', name: 'spinach', plur: 'spinach', type: 'uncountable', season: 'Spring', basePriceLb: 2.00 },
            { emoji: '🧄', name: 'garlic', plur: 'garlic', type: 'uncountable', season: 'Spring', basePriceLb: 3.00 },
            { emoji: '🥕', name: 'carrot', plur: 'carrots', type: 'countable', season: 'Spring', basePriceLb: 1.00 }
        ];

        const currencies = [
            { symbol: '$', name: 'dollars', rate: 1.0 },
            { symbol: '€', name: 'euros', rate: 1.0 }, // Keep 1.0 for simplicity across lower levels
            { symbol: '£', name: 'pounds', rate: 1.0 }
        ];

        const targetVoiceNames = ["Remy", "Giuseppe", "Vivienne", "Florian", "Seraphina", "Emma", "Brian", "Ava", "Andrew", "William"];
        const explicitMale = ["Remy", "Giuseppe", "Florian", "Brian", "Andrew", "William", "Guy", "David"];
        const explicitFemale = ["Vivienne", "Seraphina", "Emma", "Ava", "Jenny", "Aria", "Zira", "Girl"];
        let sellerVoice = null;
        let buyerVoice = null;

        function assignVoices() {
            const voices = window.speechSynthesis.getVoices();
            if(voices.length === 0) return;

            // Strictly filter for the assigned names and ensure they operate in English
            let premiumVoices = voices.filter(v => 
                v.lang.startsWith('en') && 
                targetVoiceNames.some(name => v.name.includes(name))
            );
            
            // Absolute fallback only if the specific target voices are totally unavailable on the device
            if(premiumVoices.length < 2) premiumVoices = voices.filter(v => v.lang.startsWith('en'));

            let maleVoices = premiumVoices.filter(v => explicitMale.some(m => v.name.includes(m)));
            let femaleVoices = premiumVoices.filter(v => explicitFemale.some(f => v.name.includes(f)));
            if(maleVoices.length === 0) maleVoices = premiumVoices;
            if(femaleVoices.length === 0) femaleVoices = premiumVoices;

            let mVoice = maleVoices[Math.floor(Math.random() * maleVoices.length)];
            let fVoice = femaleVoices[Math.floor(Math.random() * femaleVoices.length)];

            // GUARANTEE TWO DIFFERENT VOICES: If they match, force an alternative from the pool.
            if (mVoice && fVoice && mVoice.name === fVoice.name) {
                let alternative = premiumVoices.find(v => v.name !== mVoice.name);
                if (alternative) fVoice = alternative;
            }

            if (Math.random() > 0.5) { sellerVoice = mVoice; buyerVoice = fVoice; } 
            else { sellerVoice = fVoice; buyerVoice = mVoice; }
        }
        if ('speechSynthesis' in window) { window.speechSynthesis.onvoiceschanged = assignVoices; assignVoices(); }

        function playConversation(dialogueArray, append = false, onCompleteCallback = null) {
            window.speechSynthesis.cancel();
            const chatLog = document.getElementById('chat-log');
            if (!append) chatLog.innerHTML = '';
            
            let i = 0;
            function speakNext() {
                if (i >= dialogueArray.length) {
                    if (onCompleteCallback) onCompleteCallback();
                    return;
                }
                const line = dialogueArray[i];
                let speakText = line.text.replace(/_+/g, "blank"); 
                const cleanText = speakText.replace(/<[^>]*>?/gm, ''); 
                
                const utterance = new SpeechSynthesisUtterance(cleanText);
                utterance.voice = line.isSeller ? sellerVoice : buyerVoice;
                utterance.lang = 'en-US'; // Force English pronunciation for numbers and currency
                utterance.rate = 0.85;

                utterance.onstart = () => {
                    const msgDiv = document.createElement('div');
                    msgDiv.className = `chat-message ${line.isSeller ? 'seller-message' : 'buyer-message'}`;
                    const avatar = document.createElement('div');
                    avatar.className = 'chat-avatar';
                    avatar.innerText = line.isSeller ? '🧑‍🌾' : '🙋🏽';
                    const bubble = document.createElement('div');
                    bubble.className = 'chat-bubble';
                    bubble.innerHTML = `<strong>${line.isSeller ? 'Seller' : playerName}:</strong> ${line.text}`;

                    if (line.isSeller) { msgDiv.appendChild(avatar); msgDiv.appendChild(bubble); } 
                    else { msgDiv.appendChild(bubble); msgDiv.appendChild(avatar); }

                    chatLog.appendChild(msgDiv);
                    chatLog.scrollTop = chatLog.scrollHeight;
                };

                utterance.onend = () => { i++; speakNext(); };
                utterance.onerror = () => { i++; speakNext(); };
                window.speechSynthesis.speak(utterance);
            }
            speakNext();
        }

        function getLevelContent() {
            // This function returns the arrays of questions/scenarios based on the current level
            if (currentLevel === 'A1') {
                return {
                    quizzes: [
                        { q: "What color is a banana 🍌?", options: ["Blue", "Yellow", "Red", "Green"], ans: 1 },
                        { q: "Which one is a fruit?", options: ["Potato", "Onion", "Apple", "Carrot"], ans: 2 },
                        { q: "Seller: 'Hello!' \nBuyer: '__________'", options: ["Goodbye!", "Hello!", "One dollar.", "Red."], ans: 1 },
                        { q: "Buyer: 'How much is it?' \nSeller: 'It is __________'", options: ["Red.", "An apple.", "One dollar.", "Yes."], ans: 2 },
                        { q: "Buyer: 'Do you have apples?' \nSeller: 'Yes, I __________'", options: ["do.", "am.", "is.", "have."], ans: 0 },
                        { q: "Count: One, Two, Three, __________", options: ["Five", "Six", "Four", "Ten"], ans: 2 },
                        { q: "What is 🥔?", options: ["Tomato", "Potato", "Apple", "Orange"], ans: 1 },
                        { q: "One apple. Two __________.", options: ["Apple", "Apples", "Appless", "Aple"], ans: 1 },
                        { q: "Buyer: 'Thank you.' \nSeller: 'You are __________'", options: ["good.", "welcome.", "hello.", "happy."], ans: 1 },
                        { q: "Seller: 'Do you want a bag?' \nBuyer: 'Yes, __________'", options: ["thank you.", "please.", "no.", "goodbye."], ans: 1 }
                    ],
                    grammar: [
                        { q: "One apple. Two __________.", options: ["apples", "apple"], ans: 0, rule: "Rule: Add 's' for two or more. (Apples)" },
                        { q: "I want __________ apple.", options: ["a", "an"], ans: 1, rule: "Rule: Use 'an' before A, E, I, O, U." },
                        { q: "I want __________ banana.", options: ["a", "an"], ans: 0, rule: "Rule: Use 'a' before consonants." },
                        { q: "The apple __________ red.", options: ["is", "are"], ans: 0, rule: "Rule: Use 'is' for one thing." },
                        { q: "The apples __________ red.", options: ["is", "are"], ans: 1, rule: "Rule: Use 'are' for plural things." }
                    ],
                    scenarios: [
                        { title: "Hello & Buy", emoji: "🍎", dialogue: [{isSeller: true, text: "Hello!"}, {isSeller: false, text: "Hello. I want a sweet apple."}, {isSeller: true, text: "Here is one fresh apple."}] },
                        { title: "How Much?", emoji: "🍌", dialogue: [{isSeller: false, text: "How much is the big, yellow banana?"}, {isSeller: true, text: "It is one dollar. It is very good."}] },
                        { title: "Colors", emoji: "🍓", dialogue: [{isSeller: false, text: "Do you have red fruit?"}, {isSeller: true, text: "Yes, I have fresh, red strawberries."}] }
                    ]
                };

        function renderSelection() {
            document.getElementById('quantity-selection').style.display = 'none';
            const grid = document.getElementById('produce-grid');
            grid.style.display = 'grid';
            grid.innerHTML = '';
            
            const db = currentMode === 'fruit' ? fruits : vegetables;

        function showQuantitySelection(index) {
            document.getElementById('produce-grid').style.display = 'none';
            document.getElementById('quantity-selection').style.display = 'block';
            
            const db = currentMode === 'fruit' ? fruits : vegetables;
            state.item = db[index];
            state.currency = currencies[Math.floor(Math.random() * currencies.length)];
            
            document.getElementById('quantity-item-name').innerText = `Select quantity for ${state.item.plur}`;
            document.getElementById('quantity-item-emoji').innerText = state.item.emoji.repeat(3);
            
            const btnContainer = document.getElementById('quantity-buttons');
            btnContainer.innerHTML = '';
            
            // Dynamic Options based on CEFR Level
            let options = [];
            if (currentLevel === 'A1' || currentLevel === 'A2') {
                if (state.item.type === 'countable') {
                    options = [ { l: "1", v: 1, txt: "one", c: 1 }, { l: "2", v: 2, txt: "two", c: 2 }, { l: "3", v: 3, txt: "three", c: 3 }, { l: "5", v: 5, txt: "five", c: 5 }, { l: "10", v: 10, txt: "ten", c: 10 } ];
                } else {
                    options = [ { l: "1 Kilo", v: 1, u: "kilo", txt: "one kilo", c: 2 }, { l: "2 Kilos", v: 2, u: "kilos", txt: "two kilos", c: 4 }, { l: "3 Kilos", v: 3, u: "kilos", txt: "three kilos", c: 6 } ];
                }
            } else { // B1 / B2
                if (state.item.type === 'countable') {
                    options = [ { l: "Half a dozen (6)", v: 6, txt: "half a dozen", c: 6 }, { l: "A dozen (12)", v: 12, txt: "a dozen", c: 12 }, { l: "5 items", v: 5, txt: "five", c: 5 } ];
                } else {
                    options = [ { l: "Quarter Pound", v: 0.25, u: "pound", txt: "a quarter pound", c: 1 }, { l: "Half a Pound", v: 0.5, u: "pound", txt: "half a pound", c: 2 }, { l: "1 Pound", v: 1, u: "pound", txt: "one pound", c: 3 }, { l: "Half a Kilo", v: 0.5, u: "kilo", txt: "half a kilo", c: 2 } ];
                }
            }

            options.forEach(opt => {
                const b = document.createElement('button');
                b.className = 'quant-btn';
                b.innerText = opt.l;
                let uName = state.item.type === 'countable' ? 'each' : (opt.u === 'kilo' ? 'per kilo' : 'per pound');
                b.onclick = () => startShopping(opt.v, opt.txt, uName, opt.c);
                btnContainer.appendChild(b);
            });

        function startShopping(amountValue, amountLabel, unitName, displayCount) {
            document.getElementById('selection-area').style.display = 'none';
            document.getElementById('game-area').style.display = 'block';
            document.getElementById('market-title').innerText = currentMode === 'fruit' ? '🍎 Fruit Market' : '🥕 Veggie Market';
            
            state.amountValue = amountValue; state.amountLabel = amountLabel; state.unitName = unitName; state.displayCount = displayCount;

            // Math
            let priceBase = state.item.basePriceLb;
            state.isInSeason = (state.item.season === currentSeasonStr);
            if (!state.isInSeason) priceBase = priceBase * 1.3;
            if (state.item.type === 'uncountable' && unitName.includes('kilo')) priceBase = priceBase * 2.204;
            
            // Round simple for A1/A2, exact for B1/B2
            if (currentLevel === 'A1') priceBase = Math.ceil(priceBase);

            state.unitPrice = priceBase * state.currency.rate; 
            state.totalPrice = state.unitPrice * state.amountValue;
            state.discountPrice = currentLevel === 'A1' ? Math.max(1, state.totalPrice - 1) : state.totalPrice * 0.8;

            document.getElementById('emoji-display').innerText = state.item.emoji.repeat(Math.min(10, state.displayCount)); // Cap visually at 10

            let itemTextBuyer = (state.item.type === 'countable' && !amountLabel.includes("dozen")) ? `${amountLabel} ${state.item.plur}` : `${amountLabel} of ${state.item.name}`;
            
            let sellerGreeting, buyerStart;
            if (currentLevel === 'A1') {
                sellerGreeting = `Hello, ${playerName}! The fresh ${state.item.plur} are ${state.currency.symbol}${state.unitPrice.toFixed(0)} ${state.unitName}. Total is ${state.currency.symbol}${state.totalPrice.toFixed(0)}.`;
                buyerStart = `Hello! I want ${itemTextBuyer}, please. They look sweet!`;
            } else if (currentLevel === 'A2') {
                sellerGreeting = `Welcome! Today, our delicious ${state.item.plur} are ${state.currency.symbol}${state.unitPrice.toFixed(2)} ${state.unitName}. That will be ${state.currency.symbol}${state.totalPrice.toFixed(2)} total.`;
                buyerStart = `I would like to buy ${itemTextBuyer}. Let me check the price for these tasty items...`;
            } else if (currentLevel === 'B1') {
                let seasonDialogue = state.isInSeason ? `They are perfectly in season.` : `They are currently out of season.`;
                sellerGreeting = `Good day, ${playerName}. ${seasonDialogue} Our crisp, locally-sourced ${state.item.plur} are ${state.currency.symbol}${state.unitPrice.toFixed(2)} ${state.unitName}. The total amounts to ${state.currency.symbol}${state.totalPrice.toFixed(2)}.`;
                buyerStart = `I require ${itemTextBuyer}. Let us discuss the pricing for this organic produce.`;
            } else {
                let seasonDialogue = state.isInSeason ? `This is our peak seasonal harvest.` : `These are imported due to the off-season.`;
                sellerGreeting = `Greetings, ${playerName}. ${seasonDialogue} These immaculate ${state.item.plur} are trading at ${state.currency.symbol}${state.unitPrice.toFixed(2)} ${state.unitName}. The total valuation is ${state.currency.symbol}${state.totalPrice.toFixed(2)}.`;
                buyerStart = `I am interested in procuring ${itemTextBuyer}. Let's review the final quote for such exquisite goods.`;
            }

            playConversation([
                { text: sellerGreeting, isSeller: true },
                { text: buyerStart, isSeller: false }
            ], false, () => {
                const p = currentLevel === 'A1' ? '0' : '2';
                setButtons([
                    { text: "👍 Agree to Price", class: "btn-agree", action: () => branchShopping('agree', p) },
                    { text: "👎 Too Expensive", class: "btn-complain", action: () => branchShopping('expensive', p) }
                ]);
            });
        }

        function branchShopping(choice, p) {
            document.getElementById('control-panel').innerHTML = '';
            let d = [];
            
            if (choice === 'agree') {
                if(currentLevel === 'A1') d = [{isSeller:false, text:`Okay. Here is ${state.currency.symbol}${state.totalPrice.toFixed(p)}.`}, {isSeller:true, text:`Thank you! Here is your fresh food.`}];
                else if(currentLevel === 'A2') d = [{isSeller:false, text:`I agree. I will pay ${state.currency.symbol}${state.totalPrice.toFixed(p)} for this ripe produce.`}, {isSeller:true, text:`Thank you very much! Enjoy!`}];
                else if(currentLevel === 'B1') d = [{isSeller:false, text:`I accept that price. Here is the payment of ${state.currency.symbol}${state.totalPrice.toFixed(p)}.`}, {isSeller:true, text:`Excellent choice. I guarantee their flavorful quality.`}];
                else d = [{isSeller:false, text:`That seems like a fair market value for impeccable quality. I accept the total of ${state.currency.symbol}${state.totalPrice.toFixed(p)}.`}, {isSeller:true, text:`A pleasure doing business with you.`}];
                
                playConversation(d, true, () => completeGame());
            } 
            else if (choice === 'expensive') {
                if(currentLevel === 'A1') d = [{isSeller:false, text:`Oh no. That is too much money!`}, {isSeller:true, text:`Okay. Special cheap price. ${state.currency.symbol}${state.discountPrice.toFixed(p)}.`}];
                else if(currentLevel === 'A2') d = [{isSeller:false, text:`That is a bit expensive. Can you make it cheaper?`}, {isSeller:true, text:`I will give you a good discount. You can pay ${state.currency.symbol}${state.discountPrice.toFixed(p)}.`}];
                else if(currentLevel === 'B1') d = [{isSeller:false, text:`That's beyond my budget for standard produce. Could we negotiate a discount for this batch?`}, {isSeller:true, text:`You're a tough negotiator. I can drop the price to ${state.currency.symbol}${state.discountPrice.toFixed(p)}.`}];
                else d = [{isSeller:false, text:`Given current market rates, that premium is excessively steep.`}, {isSeller:true, text:`I understand your position. Let's adjust the margin. I can offer it at ${state.currency.symbol}${state.discountPrice.toFixed(p)}.`}];

                playConversation(d, true, () => {
                    setButtons([
                        { text: "🤝 Accept Discount", class: "btn-pay", action: () => { state.totalPrice = state.discountPrice; branchShopping('agree', p); } },
                        { text: "🚶‍♂️ Walk Away", class: "btn-leave", action: () => branchShopping('leave', p) }
                    ]);
                });
            }
            else if (choice === 'leave') {
                d = [{isSeller:false, text:`No thank you. Goodbye.`}, {isSeller:true, text:`Have a good day.`}];
                playConversation(d, true, () => setButtons([{ text: "Shop Again 🛒", class: "btn-next", action: () => renderSelection() }]));
            }
        }

        function completeGame() {
            setButtons([{ text: "Shop Again 🛒", class: "btn-next", action: () => renderSelection() }]);
            triggerFireworks();
            const el = document.getElementById('praise-text');
            el.innerText = currentLevel === 'A1' ? "Good Job!" : "Excellent!";
            el.classList.remove('animate-praise'); void el.offsetWidth; el.classList.add('animate-praise');
        }

        let activeQuestions = [], currentQIndex = 0, currentScore = 0;

        function startQuiz() {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('quiz-area').style.display = 'block';
            activeQuestions = getLevelContent().quizzes.sort(() => 0.5 - Math.random()).slice(0, 10);
            currentQIndex = 0; currentScore = 0;
            document.getElementById('quiz-score').innerText = currentScore;
            loadQuiz();
        }

        function loadQuiz() {
            const q = activeQuestions[currentQIndex];
            document.getElementById('quiz-question-text').innerText = `Q${currentQIndex + 1}: ${q.q}`;
            const opts = document.getElementById('quiz-options'); opts.innerHTML = '';
            document.getElementById('quiz-feedback-text').innerText = '';
            document.getElementById('btn-next-question').style.display = 'none';

            q.options.forEach((o, i) => {
                const b = document.createElement('button'); b.className = 'quiz-option-btn'; b.innerText = o;
                b.onclick = () => {
                    window.speechSynthesis.cancel();
                    opts.querySelectorAll('button').forEach(btn => btn.disabled = true);
                    if(i === q.ans) { b.style.background = '#4CAF50'; b.style.color = 'white'; document.getElementById('quiz-feedback-text').innerText = '✅ Correct!'; currentScore++; document.getElementById('quiz-score').innerText = currentScore; }
                    else { b.style.background = '#F44336'; b.style.color = 'white'; document.getElementById('quiz-feedback-text').innerText = '❌ Incorrect.'; opts.children[q.ans].style.background = '#4CAF50'; opts.children[q.ans].style.color = 'white'; }
                    document.getElementById('btn-next-question').style.display = 'block';
                };
                opts.appendChild(b);
            });
            if ('speechSynthesis' in window) { 
                let u = new SpeechSynthesisUtterance(q.q.replace(/_+/g, "blank")); 
                u.lang = 'en-US'; // Force English pronunciation
                u.rate = 0.85; 
                window.speechSynthesis.speak(u); 
            }
        }

        function nextQuestion() {
            window.speechSynthesis.cancel();
            currentQIndex++;
            if(currentQIndex < activeQuestions.length) loadQuiz();
            else {
                document.getElementById('quiz-question-text').innerText = `Quiz Complete! Score: ${currentScore}/${activeQuestions.length}`;
                document.getElementById('quiz-options').innerHTML = ''; document.getElementById('quiz-feedback-text').innerText = ''; document.getElementById('btn-next-question').style.display = 'none';
                triggerFireworks(); setTimeout(() => { const b = document.createElement('button'); b.className = 'action-btn btn-next'; b.innerText = 'Play Again'; b.onclick = startQuiz; document.getElementById('quiz-options').appendChild(b); }, 1000);
            }
        }

        function loadGrammar() {
            const q = activeQuestions[currentQIndex];
            document.getElementById('grammar-question-text').innerText = q.q;
            document.getElementById('grammar-rule-box').style.display = 'none';
            document.getElementById('btn-grammar-next').style.display = 'none';
            const opts = document.getElementById('grammar-options'); opts.innerHTML = '';
            
            q.options.forEach((o, i) => {
                const b = document.createElement('button'); b.className = 'grammar-btn'; b.innerText = o;
                b.onclick = () => {
                    window.speechSynthesis.cancel();
                    opts.querySelectorAll('button').forEach(btn => btn.disabled = true);
                    const ruleBox = document.getElementById('grammar-rule-box'); ruleBox.innerText = q.rule; ruleBox.style.display = 'block';
                    if(i === q.ans) { b.style.background = '#4CAF50'; b.style.color = 'white'; currentScore += 10; document.getElementById('grammar-score').innerText = currentScore; ruleBox.style.background = '#E8F5E9'; ruleBox.style.color = '#2E7D32'; }
                    else { b.style.background = '#F44336'; b.style.color = 'white'; opts.children[q.ans].style.background = '#4CAF50'; opts.children[q.ans].style.color = 'white'; ruleBox.style.background = '#FFEBEE'; ruleBox.style.color = '#C62828'; }
                    document.getElementById('btn-grammar-next').style.display = 'block';
                };
                opts.appendChild(b);
            });
            if ('speechSynthesis' in window) { 
                let u = new SpeechSynthesisUtterance(q.q.replace(/_+/g, "blank")); 
                u.lang = 'en-US'; // Force English pronunciation
                u.rate = 0.85; 
                window.speechSynthesis.speak(u); 
            }
        }

        function nextGrammarQuestion() {
            window.speechSynthesis.cancel();
            currentQIndex++;
            if(currentQIndex < activeQuestions.length) loadGrammar();
            else {
                document.getElementById('grammar-question-text').innerText = `Challenge Complete! Score: ${currentScore}`;
                document.getElementById('grammar-options').innerHTML = ''; document.getElementById('grammar-rule-box').style.display = 'none'; document.getElementById('btn-grammar-next').style.display = 'none';
                triggerFireworks(); setTimeout(() => { const b = document.createElement('button'); b.className = 'action-btn btn-next'; b.innerText = 'Play Again'; b.onclick = startGrammarGame; document.getElementById('grammar-options').appendChild(b); }, 1000);
            }
        }

        function returnToSelection() { document.getElementById('game-area').style.display = 'none'; document.getElementById('selection-area').style.display = 'block'; window.speechSynthesis.cancel(); renderSelection(); }
        function triggerFireworks() { confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } }); }
    </script>
</body>
</html>
