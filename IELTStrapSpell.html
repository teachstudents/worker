<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IELTS Listening Arcade - Trap Master (Spelling Mode)</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Canvas Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.css"></script>
    <!-- Tone.js for Sound Effects -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f1f5f9; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        .bg-pattern { background-image: radial-gradient(#1e293b 1px, transparent 1px); background-size: 24px 24px; }
        
        .btn-hover { transition: all 0.2s ease; }
        .btn-hover:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.4); }
        
        /* Compact Trap Card Styling */
        .trap-card { border: 1px solid #334155; transition: all 0.3s ease; }
        .trap-card:hover { border-color: #38bdf8; transform: translateY(-5px); box-shadow: 0 10px 20px rgba(56, 189, 248, 0.15); cursor: pointer; }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-5px); }
            40% { transform: translateX(5px); }
            60% { transform: translateX(-5px); }
            80% { transform: translateX(5px); }
        }
        
        .shake-correct {
            animation: shake 0.4s ease-in-out;
            background-color: #16a34a !important;
            border-color: #4ade80 !important;
            color: white !important;
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.5);
        }
        
        .input-wrong { 
            background-color: #dc2626 !important; 
            color: white !important; 
            border-color: #f87171 !important; 
            animation: shake 0.3s ease-in-out;
        }
        
        .mode-btn { padding: 0.75rem 1rem; border-radius: 8px; font-weight: 600; cursor: pointer; border: 2px solid #cbd5e1; background: white; color: #64748b; flex: 1; transition: all 0.2s; }
        .mode-btn.selected { border-color: #e11d48; background: #ffe4e6; color: #be123c; }
        
        .fade-in { animation: fadeIn 0.3s ease-out; will-change: opacity; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .audio-playing { animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        
        /* Spelling input styling */
        .spelling-input {
            font-family: 'Courier New', monospace;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            text-align: center;
        }
    </style>
</head>
<body class="bg-pattern min-h-screen flex flex-col pb-24">

    <!-- Main Navigation Bar -->
    <nav id="main-nav" class="fixed top-0 left-0 w-full bg-slate-900/95 backdrop-blur-sm border-b border-slate-700 z-40 hidden shadow-md">
        <div class="max-w-[95%] xl:max-w-7xl mx-auto px-4 py-1.5 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i class="fas fa-crosshairs text-sky-400 text-lg"></i>
                <span class="font-bold text-white text-base">Trap Master</span>
            </div>
            <div class="flex items-center gap-3">
                <!-- Persistent Header Score -->
                <div class="bg-slate-800 border border-slate-600 px-3 py-1 rounded-md flex items-center gap-1.5 shadow-inner">
                    <i class="fas fa-star text-yellow-400 text-xs"></i>
                    <span class="text-slate-300 text-xs font-semibold">Total Points:</span>
                    <span id="header-total-score" class="text-sky-400 font-bold text-base transition-transform duration-200">0</span>
                </div>
                <button onclick="showMenu()" class="px-3 py-1 bg-slate-700 hover:bg-slate-600 rounded-md text-xs font-semibold transition flex items-center">
                    <i class="fas fa-home mr-1.5"></i>Menu
                </button>
            </div>
        </div>
    </nav>

    <!-- Startup Config Overlay -->
    <div id="start-overlay" class="fixed inset-0 bg-slate-900/95 flex flex-col items-center justify-center z-50 overflow-y-auto py-10">
      <div class="bg-white p-8 rounded-3xl text-center w-[90%] max-w-lg shadow-2xl">
        <div class="inline-block mb-4 text-sky-500 text-5xl"><i class="fas fa-users-cog"></i></div>
        <h1 class="text-3xl font-extrabold text-slate-800 mb-6 tracking-tight">Player Configuration</h1>
        
        <div class="flex gap-2 mb-6">
          <button type="button" id="btn-1p" class="mode-btn selected">1 Student</button>
          <button type="button" id="btn-2p" class="mode-btn">2 Students</button>
          <button type="button" id="btn-roster" class="mode-btn">Class Roster</button>
        </div>
        
        <input type="text" id="p1-name-input" class="w-full p-3 mb-4 text-lg border-2 border-slate-200 rounded-xl text-slate-800 focus:outline-none focus:border-sky-500 transition-colors" placeholder="Student 1 Name" value="">
        <input type="text" id="p2-name-input" class="hidden w-full p-3 mb-4 text-lg border-2 border-slate-200 rounded-xl text-slate-800 focus:outline-none focus:border-sky-500 transition-colors" placeholder="Student 2 Name" value="">
        <textarea id="roster-input" class="hidden w-full p-3 mb-4 text-lg border-2 border-slate-200 rounded-xl text-slate-800 focus:outline-none focus:border-sky-500 resize-y transition-colors" placeholder="Paste class list here (comma separated or new lines)&#10;e.g. John, Sarah, Mike, Lisa" rows="4"></textarea>

        <button id="start-game-btn" class="w-full py-4 mt-2 bg-sky-500 hover:bg-sky-400 text-white font-bold text-xl rounded-xl shadow-lg transition-all transform hover:-translate-y-1">Start Training <i class="fas fa-rocket ml-2"></i></button>
      </div>
    </div>

    <!-- Main Content -->
    <main class="flex-1 w-full max-w-[95%] xl:max-w-7xl mx-auto p-2 md:p-4 relative mt-12">
        
        <!-- Dashboard / 18 Trap Buttons (COMPACT DESIGN) -->
        <div id="dashboard-view" class="hidden pb-6">
            <div class="text-center mb-6 mt-4">
                <p class="text-slate-400 text-sm md:text-base max-w-2xl mx-auto">Select a trap category. <span id="active-players-label" class="font-bold text-white bg-slate-800 px-2 py-1 rounded ml-1 text-xs"></span></p>
            </div>
            
            <!-- Grid is configured to be dense so it fits on screen -->
            <div id="trap-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-3">
                <!-- Trap buttons injected via JS -->
            </div>
        </div>

        <!-- Exercise View -->
        <div id="exercise-view" class="hidden w-full mx-auto mt-0">
            <div class="bg-slate-800 border border-slate-700 rounded-2xl p-4 md:p-5 shadow-2xl relative overflow-hidden flex flex-col min-h-[50vh]">
                <div class="absolute top-0 right-0 w-48 h-48 bg-sky-500/10 rounded-bl-full -z-10"></div>
                
                <div class="flex flex-col md:flex-row justify-between items-center gap-2 mb-3 border-b border-slate-700 pb-3 shrink-0">
                    <div class="flex items-center gap-2">
                        <span id="ex-trap-id" class="bg-indigo-500 text-white text-[10px] md:text-xs font-bold px-2 py-0.5 rounded uppercase tracking-widest shadow-md">Trap 1</span>
                        <span id="ex-progress" class="text-slate-400 font-bold text-xs bg-slate-900/50 px-2 py-0.5 rounded"></span>
                    </div>

                    <div class="flex justify-center items-center gap-2 md:gap-3">
                        <button id="play-audio-btn" class="w-10 h-10 rounded-full bg-sky-500 hover:bg-sky-400 flex items-center justify-center transition text-white shadow-[0_0_10px_rgba(56,189,248,0.5)] transform hover:scale-105" title="Play Audio">
                            <i class="fas fa-play text-lg ml-0.5"></i>
                        </button>
                        <button id="prev-ex-btn" class="w-8 h-8 rounded-full bg-slate-700 hover:bg-slate-600 flex items-center justify-center transition text-slate-300 hover:text-white disabled:opacity-30 disabled:cursor-not-allowed shadow-md" title="Previous Question">
                            <i class="fas fa-step-backward text-sm"></i>
                        </button>
                        <button id="next-ex-btn" class="w-8 h-8 rounded-full bg-slate-700 hover:bg-slate-600 flex items-center justify-center transition text-slate-300 hover:text-white disabled:opacity-30 disabled:cursor-not-allowed shadow-md" title="Next Question">
                            <i class="fas fa-step-forward text-sm"></i>
                        </button>
                    </div>
                </div>

                <h4 id="ex-question" class="text-xl md:text-3xl font-extrabold text-white mb-4 text-center leading-tight tracking-tight shrink-0 drop-shadow-md"></h4>

                <!-- Spelling input container -->
                <div id="spelling-container" class="w-full flex-1 flex flex-col justify-center items-center gap-4">
                    <input type="text" id="spelling-input" class="spelling-input w-full max-w-md p-4 bg-slate-700 border-2 border-slate-500 rounded-xl text-white focus:outline-none focus:border-sky-400 transition-colors" placeholder="TYPE YOUR ANSWER..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
                    <button id="submit-answer-btn" class="px-8 py-3 bg-sky-600 hover:bg-sky-500 text-white font-bold rounded-xl transition-all btn-hover shadow-lg">SUBMIT</button>
                    <p class="text-slate-400 text-sm text-center max-w-md">Press <kbd class="bg-slate-700 px-2 py-1 rounded text-xs">Enter</kbd> to submit</p>
                </div>

                <div id="ex-feedback-area" class="hidden mt-4 p-3 rounded-lg text-center font-bold text-lg border shrink-0 transition-all"></div>
            </div>
        </div>

    </main>

    <!-- Trap Rule & Transcript Footer (50/50 Split) -->
    <div id="trap-rule-footer" class="fixed bottom-0 left-0 w-full z-50 hidden">
        <div class="max-w-[95%] xl:max-w-7xl mx-auto flex gap-2 items-end">
            <!-- Left Half: Trap Rule -->
            <div class="w-1/2 bg-slate-900 border-t-2 border-l-2 border-r border-sky-500/50 rounded-tl-xl shadow-[0_-15px_40px_rgba(0,0,0,0.6)] overflow-hidden transition-all duration-300 flex flex-col justify-end">
                <button onclick="toggleTrapRule()" class="w-full py-2 px-4 text-sky-400 hover:text-sky-300 font-bold flex justify-between items-center hover:bg-slate-800 transition text-xs md:text-sm tracking-wide">
                    <span class="flex items-center gap-2"><i class="fas fa-lightbulb text-yellow-400"></i> Trap Rule</span>
                    <i id="trap-rule-icon" class="fas fa-chevron-up"></i>
                </button>
                <div id="trap-rule-content" class="hidden px-4 md:px-6 pb-4 pt-2 text-slate-300 text-xs md:text-sm leading-relaxed border-t border-slate-700/50 bg-slate-800/50 max-h-[40vh] overflow-y-auto">
                    <p id="ex-trap-desc"></p>
                </div>
            </div>
            
            <!-- Right Half: Transcript -->
            <div class="w-1/2 bg-slate-900 border-t-2 border-r-2 border-l border-indigo-500/50 rounded-tr-xl shadow-[0_-15px_40px_rgba(0,0,0,0.6)] overflow-hidden transition-all duration-300 flex flex-col justify-end">
                <button onclick="toggleTranscript()" class="w-full py-2 px-4 text-indigo-400 hover:text-indigo-300 font-bold flex justify-between items-center hover:bg-slate-800 transition text-xs md:text-sm tracking-wide">
                    <span class="flex items-center gap-2"><i class="fas fa-file-audio"></i> Transcript</span>
                    <i id="transcript-icon" class="fas fa-chevron-up"></i>
                </button>
                <div id="transcript-content" class="hidden px-4 md:px-6 pb-4 pt-2 text-slate-300 text-xs md:text-sm leading-relaxed border-t border-slate-700/50 bg-slate-800/50 max-h-[40vh] overflow-y-auto font-mono">
                    <p id="ex-transcript-text"></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // TRAP DATABASE: 18 Categories × 15 Exercises
        // ============================================
        const trapLibrary = [
            { 
                id: 1, name: "Double-Letter Spelling", desc: "The speaker uses 'double' instead of repeating a letter (e.g., 'double N' means N-N).",
                exercises: [
                    { audio: "My surname is Bennett. Put it down as B, E, double N, E, double T.", question: "How do you spell the student's surname?", correctAnswer: "BENNETT" },
                    { audio: "The field trip is to the Woodlock Museum. That's W, double O, D, L, O, C, K.", question: "How do you spell the museum's name?", correctAnswer: "WOODLOCK" },
                    { audio: "The new principal is Mr. Harrison. H, A, double R, I, S, O, N.", question: "How do you spell the principal's name?", correctAnswer: "HARRISON" },
                    { audio: "Our librarian is Mrs. Carroll. C, A, double R, O, double L.", question: "How do you spell the librarian's name?", correctAnswer: "CARROLL" },
                    { audio: "The science award goes to Jamie Farrell. F, A, double R, E, double L.", question: "How do you spell the student's name?", correctAnswer: "FARRELL" },
                    { audio: "Send your forms to Mr. Bassett. B, A, double S, E, double T.", question: "How do you spell the teacher's name?", correctAnswer: "BASSETT" },
                    { audio: "The guest speaker is Dr. Abbott. A, double B, O, double T.", question: "How do you spell the guest speaker's name?", correctAnswer: "ABBOTT" },
                    { audio: "You need to find the Maxwell building. M, A, X, W, E, double L.", question: "How do you spell the building's name?", correctAnswer: "MAXWELL" },
                    { audio: "The coach is Mr. Russell. R, U, double S, E, double L.", question: "How do you spell the coach's name?", correctAnswer: "RUSSELL" },
                    { audio: "The scholarship goes to David Llewellyn. Double L, E, W, E, double L, Y, N.", question: "How do you spell the student's surname?", correctAnswer: "LLEWELLYN" },
                    { audio: "The applicant's surname is McCormack—C, double C, O, R, M, A, C, K. Wait, actually, it's McCormick with an I, not an A.", question: "What is the correct spelling?", correctAnswer: "MCCORMICK" },
                    { audio: "Please note the spelling: F, I, T, Z, G, E, R, A, L, D. That's Fitzgerald with a G, not a J.", question: "How is the name spelled?", correctAnswer: "FITZGERALD" },
                    { audio: "The research was conducted by Dr. Pettigrew—P, E, double T, I, G, R, E, W. No, sorry, it's Pettigrove with an O, not a U.", question: "What is the correct spelling?", correctAnswer: "PETTIGROVE" },
                    { audio: "The conference venue is the Grand Ballroom at the Marriott Hotel. M, A, double R, I, O, double T. Actually, it's Marriot with one R, not two.", question: "How is the hotel name spelled?", correctAnswer: "MARRIOT" },
                    { audio: "The keynote speaker is Professor Wainwright. W, A, I, N, W, R, I, G, H, T. Wait, let me confirm: it's Wainright with an I, not a G.", question: "What is the correct spelling?", correctAnswer: "WAINRIGHT" }
                ]
            },
            { 
                id: 2, name: "Self-Correction", desc: "The speaker gives incorrect information first, then corrects themselves using a pivot phrase.",
                exercises: [
                    { audio: "The assembly starts at 8:15... oh, wait a minute, looking at the new timetable, it actually starts at 8:45.", question: "What time does the assembly start?", correctAnswer: "8:45" },
                    { audio: "Please go to room 203 for the biology exam. Sorry, my mistake, they moved it to room 302.", question: "Which room is the exam in?", correctAnswer: "302" },
                    { audio: "The club fee is 20 dollars. Oh, hold on, it was reduced this year to 15 dollars.", question: "How much is the club fee?", correctAnswer: "15" },
                    { audio: "Your homework is chapter 4. Let me rephrase that, just read chapter 5.", question: "Which chapter is the homework?", correctAnswer: "5" },
                    { audio: "The sports day is on Thursday. Wait, rain is forecast, so we pushed it to Friday.", question: "When is sports day?", correctAnswer: "FRIDAY" },
                    { audio: "You need 50 credits to graduate. Actually, the new policy states you need 55 credits.", question: "How many credits are needed?", correctAnswer: "55" },
                    { audio: "The bus leaves from the East gate. My apologies, the East gate is closed. It leaves from the West gate.", question: "Where does the bus leave from?", correctAnswer: "WEST GATE" },
                    { audio: "Bring a pencil to the exam. Actually, you must use a blue pen only.", question: "What should you bring to the exam?", correctAnswer: "BLUE PEN" },
                    { audio: "The library closes at 4 PM today. Oh, correction, today is Friday so it closes at 5 PM.", question: "What time does the library close?", correctAnswer: "5 PM" },
                    { audio: "Contact Mr. Smith for permission. Sorry, Mr. Smith is away, so email Mrs. Jones instead.", question: "Who should you contact?", correctAnswer: "MRS. JONES" },
                    { audio: "The deadline is next Friday... actually, let me check the syllabus... no, it's the Friday after that, so two weeks from now.", question: "When is the deadline?", correctAnswer: "TWO WEEKS FROM NOW" },
                    { audio: "The meeting is in Conference Room B... wait, I just got an email... it's actually in the Innovation Hub, not Conference Room B.", question: "Where is the meeting?", correctAnswer: "INNOVATION HUB" },
                    { audio: "The exam covers chapters 1-5... actually, Professor Davis just announced it also includes chapter 6, so chapters 1 through 6.", question: "Which chapters are on the exam?", correctAnswer: "1-6" },
                    { audio: "You need to submit the form online... actually, the system is down, so you must submit a hard copy to the office by 3 PM.", question: "How should the form be submitted?", correctAnswer: "HARD COPY TO OFFICE" },
                    { audio: "The workshop is free for students... actually, there's a 10 dollar materials fee, so it's not completely free, just discounted.", question: "What is the cost of the workshop?", correctAnswer: "10 DOLLARS" }
                ]
            },
            { 
                id: 3, name: "Unfulfilled Wish", desc: "An initial desire or plan is mentioned, but it is contrasted with reality.",
                exercises: [
                    { audio: "I originally wanted to take Art for my elective, but it was completely full, so I'll have to take Drama instead.", question: "Which elective is the student taking?", correctAnswer: "DRAMA" },
                    { audio: "We hoped to launch the student newspaper in May, but due to funding issues, we won't print the first issue until July.", question: "When will the newspaper launch?", correctAnswer: "JULY" },
                    { audio: "I really wanted to do my presentation on volcanoes, but Sarah took it first. So I'm doing earthquakes.", question: "What is the student's presentation topic?", correctAnswer: "EARTHQUAKES" },
                    { audio: "The school wanted to build a swimming pool, but they didn't get the permit, so they built a tennis court.", question: "What did the school build?", correctAnswer: "TENNIS COURT" },
                    { audio: "I was hoping to buy the hardcover textbook, but it was too expensive. I settled for the digital version.", question: "Which version of the textbook did they buy?", correctAnswer: "DIGITAL" },
                    { audio: "We aimed to raise 500 dollars for charity. We fell short and only managed to collect 350 dollars.", question: "How much did they raise?", correctAnswer: "350" },
                    { audio: "I planned to study abroad in Spain, but my visa was delayed, so I'm staying here this semester.", question: "Where is the student studying this semester?", correctAnswer: "HERE" },
                    { audio: "We wanted the school dance to be a Masquerade theme, but the voting results chose a Hawaiian theme.", question: "What is the theme of the school dance?", correctAnswer: "HAWAIIAN" },
                    { audio: "I wished to get the morning lab schedule, but only the afternoon slots were left when I registered.", question: "When is the student's lab?", correctAnswer: "AFTERNOON" },
                    { audio: "The headmaster wanted to invite the mayor to speak, but he was busy, so a local author is coming instead.", question: "Who is the guest speaker?", correctAnswer: "LOCAL AUTHOR" },
                    { audio: "I had hoped to complete my thesis by December, but the data collection took longer than expected, so the new submission date is March.", question: "When will the thesis be submitted?", correctAnswer: "MARCH" },
                    { audio: "We intended to hold the conference in person, but travel restrictions forced us to make it a virtual event instead.", question: "How will the conference be held?", correctAnswer: "VIRTUAL" },
                    { audio: "I wanted to major in Psychology, but the program is at capacity, so I'm pursuing Sociology as my primary focus.", question: "What is the student's major?", correctAnswer: "SOCIOLOGY" },
                    { audio: "The team planned to travel by train, but the strike canceled all services, so we're taking the bus instead.", question: "How will the team travel?", correctAnswer: "BUS" },
                    { audio: "I aimed to score above 90% on the exam, but I made several careless errors, so my final grade was 78%.", question: "What was the student's final grade?", correctAnswer: "78%" }
                ]
            },
            { 
                id: 4, name: "Red Herring", desc: "Multiple numbers or options are dropped to distract from the actual, final answer.",
                exercises: [
                    { audio: "The school trip costs £40 total. However, the student council subsidizes £15, meaning we only need to pay £25 out of pocket.", question: "How much does the student need to pay?", correctAnswer: "25" },
                    { audio: "We need 50 chairs for the graduation. The supplier has 40 in blue and 60 in black. We'll take the 60 black ones just to be safe.", question: "How many chairs are they ordering?", correctAnswer: "60" },

                    { audio: "The stadium holds 500 people. Last year we had 300 attend, but this year we expect exactly 450 guests.", question: "How many guests are expected this year?", correctAnswer: "450" },
                    { audio: "To pass, you need a score of 60. John got 55 last time, but today he finally achieved a 75.", question: "What score did John achieve today?", correctAnswer: "75" },
                    { audio: "The library has 10 computers on the first floor and 5 on the second, but the new lab has exactly 20 computers available.", question: "How many computers are in the new lab?", correctAnswer: "20" },
                    { audio: "My essay was supposed to be 1000 words. I originally wrote 800, but the final draft I submitted was 1200 words.", question: "How many words was the submitted draft?", correctAnswer: "1200" },
                    { audio: "The biology field trip takes 4 teachers, 2 parents, and exactly 35 students.", question: "How many students are going on the trip?", correctAnswer: "35" },
                    { audio: "There are 12 lockers in the hallway. I asked for locker 8, but I was assigned locker 15.", question: "Which locker was the student assigned?", correctAnswer: "15" },
                    { audio: "The fundraiser requires us to sell 20 tickets. I sold 15 yesterday and 10 today, making a total of 25 tickets sold.", question: "How many tickets were sold in total?", correctAnswer: "25" },
                    { audio: "The conference registration is 150 dollars for early bird, 200 dollars for regular, but as a student with a valid ID, you only pay 75 dollars.", question: "How much does a student pay?", correctAnswer: "75" },
                    { audio: "The project timeline was originally 6 weeks, then extended to 8 weeks, but due to additional requirements, the final deadline is 10 weeks from start.", question: "What is the final project timeline?", correctAnswer: "10 WEEKS" },
                    { audio: "The scholarship offers 5000 dollars for first year, 7500 for second year, but the full four-year package totals 35000 dollars.", question: "What is the total four-year scholarship value?", correctAnswer: "35000" },
                    { audio: "The bus departs at 9:00, arrives at the first stop at 9:30, but the final destination arrival time is 11:15.", question: "When does the bus reach the final destination?", correctAnswer: "11:15" },
                    { audio: "The exam has 50 questions total: 20 multiple choice, 15 short answer, and 15 essay questions.", question: "How many essay questions are on the exam?", correctAnswer: "15" }
                ]
            },
            { 
                id: 5, name: "Negative Rejection", desc: "A tempting option is baited, but the speaker explicitly rejects it.",
                exercises: [
                    { audio: "We could buy new laptops for the lab. Actually, we don't need those yet. But we really do need a new projector.", question: "What will they buy for the lab?", correctAnswer: "PROJECTOR" },
                    { audio: "You can add a lunch package for the trip. No thanks, I'll bring sandwiches. But I'll definitely take the guided tour ticket.", question: "What is the student purchasing?", correctAnswer: "GUIDED TOUR TICKET" },
                    { audio: "Should we rent a bus for the team? No, it's too expensive. We'll just have parents drive the players.", question: "How will the team travel?", correctAnswer: "PARENTS DRIVE" },
                    { audio: "I thought about joining the choir. I can't sing, though. I'll join the stage crew instead.", question: "Which group will the student join?", correctAnswer: "STAGE CREW" },
                    { audio: "We could use the textbook for research. No, the data is outdated. Let's use academic journals online.", question: "What will they use for research?", correctAnswer: "ACADEMIC JOURNALS" },
                    { audio: "Do you want to study in the library? No, it's too crowded right now. Let's head to the empty classroom.", question: "Where will they study?", correctAnswer: "EMPTY CLASSROOM" },

        // ============================================

        let synth; // Tone.js synthesizer
        let preferredVoices = [];
        const maleVoices = [];
        const femaleVoices = [];
        const audioRate = 0.9; 
        
        // Voice rotation indices
        let maleVoiceIndex = 0;
        let femaleVoiceIndex = 0;

        // Initialize Tone.js for UI Feedback Sounds
        async function initAudio() {
            if (!synth) {
                await Tone.start();
                synth = new Tone.PolySynth(Tone.Synth).toDestination();
                synth.volume.value = -10;
            }
        }

        function playFeedbackSound(isCorrect) {
            if (!synth) return;
            if (isCorrect) {
                synth.triggerAttackRelease(["C5", "E5", "G5"], "8n");
            } else {
                synth.triggerAttackRelease(["D3", "F3"], "8n");
            }
        }

        // ============================================
        // MICROSOFT EDGE STRICT VOICE SYSTEM
        // ============================================
        function initSpeechSynthesis() {
            const loadVoices = () => {
                let voices = window.speechSynthesis.getVoices();
                if (!voices || voices.length === 0) return;

                // Strict list for Edge Online multilingual voices
                const maleNames = ["remy", "giuseppe", "brian", "andrew", "william", "florian"];
                const femaleNames = ["vivienne", "emma", "seraphina"]; 
                const allowedNames = [...maleNames, ...femaleNames];

                maleVoices.length = 0;
                femaleVoices.length = 0;
                preferredVoices = [];

                voices.forEach(v => {
                    const n = v.name.toLowerCase();
                    if (allowedNames.some(allowed => n.includes(allowed))) {
                        preferredVoices.push(v);
                        if (maleNames.some(m => n.includes(m))) maleVoices.push(v);
                        else if (femaleNames.some(f => n.includes(f))) femaleVoices.push(v);
                    }
                });
            };
            
            if ('speechSynthesis' in window) {
                loadVoices();
                window.speechSynthesis.onvoiceschanged = loadVoices;
            }
        }

        async function playTTS(text) {
            window.speechSynthesis.cancel();
            
            if (!('speechSynthesis' in window)) {
                console.error('Speech synthesis not supported in this browser.');
                return;
            }

            // Safety check: sometimes voices load late in Chrome/Edge
            if (preferredVoices.length === 0) {
                await new Promise(resolve => setTimeout(resolve, 150));
            }

            const parts = text.split(/(Male:|Female:)/gi).filter(p => p.trim() !== '');
            let currentGender = 'any';

            for (const part of parts) {
                if (part.toLowerCase() === 'male:') { currentGender = 'male'; continue; }
                if (part.toLowerCase() === 'female:') { currentGender = 'female'; continue; }

                await new Promise(resolve => {
                    let voice = null;
                    
                    // Rotate voices based on gender constraint
                    if (currentGender === 'male' && maleVoices.length > 0) {
                        voice = maleVoices[maleVoiceIndex % maleVoices.length];
                        maleVoiceIndex++;
                    } else if (currentGender === 'female' && femaleVoices.length > 0) {
                        voice = femaleVoices[femaleVoiceIndex % femaleVoices.length];
                        femaleVoiceIndex++;
                    } else if (preferredVoices.length > 0) {
                        voice = preferredVoices[generalVoiceIndex % preferredVoices.length];
                        generalVoiceIndex++;
                    }
                    
                    const utterance = new SpeechSynthesisUtterance(part.trim());
                    if (voice) {
                        utterance.voice = voice; 
                    } else {
                        console.warn("Strict Edge voices not found, using default system voice.");
                    }
                    
                    utterance.rate = audioRate; // Hardcoded at 0.9 (90% speed)
                    utterance.volume = 1.0;
                    
                    if (navigator.userAgent.includes('Edge')) utterance.pitch = 1.0;
                    
                    utterance.onend = resolve;
                    utterance.onerror = (e) => {
                        console.error("TTS Error:", e);
                        resolve(); // Resolve anyway so it doesn't hang the loop
                    };
                    
                    window.speechSynthesis.speak(utterance);
                });
            }
        }

        function rotateRoster() {
            if (gameMode !== 'roster') return;
            rosterQueue.push(rosterQueue.shift());
            rosterQueue.push(rosterQueue.shift());
            activePlayers = [
                { name: rosterQueue[0], score: 0 },

            if (gameMode === 'roster') {

        // ============================================
        // SPELLING INPUT RENDERER
        // ============================================
        function renderExercise() {
            isAnswered = false;
            const trap = trapLibrary.find(t => t.id === currentTrapId);
            const exercise = trap.exercises[currentExerciseIndex];
            
            document.getElementById('ex-trap-id').textContent = `Trap ${trap.id}`;
            document.getElementById('ex-progress').textContent = `${currentExerciseIndex + 1} / ${trap.exercises.length}`;
            
            const footerTrapName = document.getElementById('footer-trap-name');
            if (footerTrapName) footerTrapName.textContent = trap.name;

            document.getElementById('ex-trap-desc').textContent = trap.desc;
            document.getElementById('ex-question').textContent = exercise.question;
            
            document.getElementById('ex-transcript-text').innerHTML = exercise.audio.replace(/(Male:|Female:)/gi, '<br><strong class="text-sky-300">$1</strong>').replace(/^<br>/, '');
            document.getElementById('transcript-content').classList.add('hidden');
            document.getElementById('transcript-icon').classList.replace('fa-chevron-down', 'fa-chevron-up');
            
            const feedbackArea = document.getElementById('ex-feedback-area');

            const audioBtn = document.getElementById('play-audio-btn');
            audioBtn.onclick = () => {
                audioBtn.classList.add('audio-playing');
                playTTS(exercise.audio).then(() => {
                    audioBtn.classList.remove('audio-playing');
                });
            };

            // SETUP SPELLING INPUT UI
            const spellingContainer = document.getElementById('spelling-container');
            const input = document.getElementById('spelling-input');
            const submitBtn = document.getElementById('submit-answer-btn');
            
            // Reset input state
            input.value = '';
            input.disabled = false;
            input.classList.remove('input-wrong', 'shake-correct');
            input.placeholder = gameMode !== '1p' ? `TYPE YOUR ANSWER... (${activePlayers[currentTurn].name}'s turn)` : 'TYPE YOUR ANSWER...';
            
            // Re-focus input field on new question (delayed slightly for rendering)
            setTimeout(() => input.focus(), 50);
            
            submitBtn.disabled = false;
            submitBtn.onclick = () => checkAnswer(exercise.correctAnswer);
            
            // Enter key support
            input.onkeydown = (e) => {
                if (e.key === 'Enter' && !isAnswered) {
                    e.preventDefault();
                    checkAnswer(exercise.correctAnswer);
                }
            };

            // Show player turn indicator for 2-player mode
            if (gameMode !== '1p') {
                const turnIndicator = document.createElement('div');
                turnIndicator.id = 'turn-indicator';
                turnIndicator.className = "text-center text-lg font-bold text-sky-400";
                turnIndicator.textContent = `${activePlayers[currentTurn].name}'s Turn`;
                
                // Remove existing indicator if present
                const existing = document.getElementById('turn-indicator');
                if (existing) existing.remove();
                
                spellingContainer.insertBefore(turnIndicator, input);
            }

            // Navigation buttons
            const prevBtn = document.getElementById('prev-ex-btn');
            const nextBtn = document.getElementById('next-ex-btn');
            
            prevBtn.disabled = currentExerciseIndex === 0;
            prevBtn.onclick = () => { 
                window.speechSynthesis.cancel();
                currentExerciseIndex--; 
                renderExercise(); 
            };

            nextBtn.disabled = true;
            nextBtn.onclick = null;
        }

        // ============================================
        // ANSWER CHECKING LOGIC
        // ============================================
        function checkAnswer(correctAnswer) {
            if (isAnswered) return;
            isAnswered = true;

            const input = document.getElementById('spelling-input');
            const submitBtn = document.getElementById('submit-answer-btn');
            const feedbackArea = document.getElementById('ex-feedback-area');
            const nextBtn = document.getElementById('next-ex-btn');
            
            // Get and normalize user input
            const userInput = input.value.trim().toUpperCase();
            const normalizedCorrect = correctAnswer.trim().toUpperCase();
            
            // Disable input and submit
            input.disabled = true;
            submitBtn.disabled = true;

            // Trigger audio feedback
            const isCorrect = userInput === normalizedCorrect;
            playFeedbackSound(isCorrect);

            const trap = trapLibrary.find(t => t.id === currentTrapId);
            
            // Setup next button
            if (currentExerciseIndex < trap.exercises.length - 1) {
                nextBtn.disabled = false;
                nextBtn.onclick = () => { 
                    window.speechSynthesis.cancel();
                    if (gameMode !== '1p') {
                        // Rotate turn for next question
                        currentTurn = currentTurn === 0 ? 1 : 0;
                    }
                    currentExerciseIndex++; 
                    renderExercise(); 
                };
            } else {
                nextBtn.disabled = false;
                nextBtn.onclick = showMenu;
            }

            // Determine which player to score
            const playerIndex = gameMode === '1p' ? 0 : currentTurn;
            const pName = activePlayers[playerIndex].name;
            
            if (isCorrect) {
                activePlayers[playerIndex].score++;
                input.classList.add('shake-correct');
                fireConfetti();
                
                feedbackArea.className = "mt-6 p-4 rounded-xl text-center font-bold text-xl border shrink-0 transition-all bg-green-900/40 border-green-500/50 text-green-400";
                feedbackArea.innerHTML = `<i class="fas fa-bolt mr-3"></i> Correct! Point for ${pName}!`;
            } else {
                input.classList.add('input-wrong');
                
                if (gameMode !== '1p') {
                    // In 2-player mode, wrong answer gives point to opponent
                    const otherPlayerIdx = playerIndex === 0 ? 1 : 0;
                    activePlayers[otherPlayerIdx].score++;
                    feedbackArea.className = "mt-6 p-4 rounded-xl text-center font-bold text-xl border shrink-0 transition-all bg-red-900/40 border-red-500/50 text-red-400";
                    feedbackArea.innerHTML = `<i class="fas fa-times-circle mr-3"></i> Incorrect! Point goes to ${activePlayers[otherPlayerIdx].name}.<br><span class="text-sm font-normal block mt-1">Correct: ${correctAnswer}</span>`;
                } else {
                    feedbackArea.className = "mt-6 p-4 rounded-xl text-center font-bold text-xl border shrink-0 transition-all bg-red-900/40 border-red-500/50 text-red-400";
                    feedbackArea.innerHTML = `<i class="fas fa-times-circle mr-3"></i> Incorrect!<br><span class="text-sm font-normal block mt-1">Correct: ${correctAnswer}</span>`;
                }
            }
            
            updateHeaderScore();
            
            // Auto focus the next button so the user can just press Enter again to proceed
            setTimeout(() => nextBtn.focus(), 100);
        }

        // Prevent form submission on Enter in input
        document.getElementById('spelling-input')?.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') e.preventDefault();
        });

        // Initialize voices on load
        document.addEventListener('DOMContentLoaded', () => {
            initSpeechSynthesis();
            if ('speechSynthesis' in window) {
                // Kickstart voice loading
                window.speechSynthesis.getVoices();
            }
        });
    </script>
</body>
</html>
