<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listening Practice</title>
    <style>
        :root { 
            --primary: #2c3e50; 
            --accent: #3498db; 
            --success: #27ae60; 
            --error: #c0392b; 
            --light: #ecf0f1; 
            --dark: #2c3e50; 
            --highlight: #fff3cd;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            line-height: 1.6; 
            margin: 0; 
            padding: 0; 
            background: #f4f4f4; 
            color: #333; 
        }
        /* Increased container width for better reading experience */
        .container { max-width: 1300px; margin: 0 auto; padding: 20px; }
        
        /* Main Menu Styles */
        #main-menu { text-align: center; background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .student-input-group { margin-bottom: 30px; }
        .student-input-group label { display: block; margin-bottom: 10px; font-weight: bold; font-size: 18px; }
        .student-input-group input { padding: 10px; font-size: 16px; width: 300px; border: 2px solid var(--primary); border-radius: 5px; }
        
        /* 4-Column Grid Layout */
        .test-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 20px; }
        @media (max-width: 900px) { .test-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px) { .test-grid { grid-template-columns: 1fr; } }
        
        .test-btn { 
            background: var(--primary); color: white; border: none; padding: 20px; 
            border-radius: 8px; cursor: pointer; font-size: 16px; transition: 0.3s; display: block;
        }
        .test-btn:hover { background: var(--accent); transform: translateY(-2px); }

        /* Test View Styles */
        #test-view { display: none; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        .test-header-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--dark);
            color: white;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            position: sticky;
            top: 10px;
            z-index: 100;
        }
        .header-info-text { font-size: 16px; font-weight: bold; }
        .header-info-text span { color: #f1c40f; }
        .header-controls-group { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        
        #tts-status { font-weight: bold; font-size: 14px; min-width: 80px; text-align: center; color: #bdc3c7;}
        
        /* Action Buttons */
        .action-btn { padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; color: white; font-size: 14px; transition: 0.2s; font-weight: bold;}
        .btn-play { background: var(--accent); }
        .btn-repeat { background: #f39c12; }
        .btn-transcript { background: #e67e22; } 
        .btn-answers { background: #8e44ad; } 
        .btn-back { background: #7f8c8d; } 
        .btn-check { background: var(--success); font-size: 18px; padding: 15px 30px; margin-top: 20px; display: block; width: 100%;}
        .action-btn:hover { opacity: 0.9; transform: scale(1.02); }

        /* Question Styles */
        .question-block { margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .question-label { font-weight: bold; display: block; margin-bottom: 8px; color: var(--dark); font-size: 16px; }
        
        /* IELTS MCQ Options Styling */
        .mcq-options { font-weight: normal; font-size: 15px; display: block; margin-top: 5px; margin-bottom: 10px; color: #444; line-height: 1.8; background: #f9f9f9; padding: 10px; border-radius: 5px; border-left: 3px solid var(--accent);}
        .matching-legend { font-weight: bold; color: var(--primary); margin-bottom: 5px; display: block;}

        .answer-input { padding: 10px; border: 2px solid #ccc; border-radius: 4px; width: 250px; font-size: 16px; outline: none; transition: 0.2s;}
        .answer-input:focus { border-color: var(--accent); }
        .answer-input.correct { border-color: var(--success); background-color: #e8f8f5; }
        .answer-input.incorrect { border-color: var(--error); background-color: #fdedec; }
        
        .content-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; align-items: start;}
        @media (max-width: 900px) { .content-grid { grid-template-columns: 1fr; } }

        .hidden-section { 
            display: none; margin-top: 20px; padding: 0; background: var(--light); 
            border-radius: 5px; border: 1px solid #ccc; overflow: hidden;
        }
        .panel-content { padding: 15px; max-height: 500px; overflow-y: auto; background: white; }
        .transcript-text { white-space: pre-wrap; font-family: monospace; font-size: 15px; line-height: 1.8;}
        .ts-line { padding: 4px 8px; border-radius: 4px; transition: all 0.2s; border-left: 4px solid transparent;}
        .ts-line.active { background-color: var(--highlight); font-weight: bold; border-left-color: var(--accent); }
        
        .answer-key-item { margin: 5px 0; font-size: 15px; border-bottom: 1px dashed #eee; padding-bottom: 2px; }
        .answer-key-item span { font-weight: bold; color: var(--success); }
    </style>
</head>
<body>
<div class="container">
    <!-- Main Menu -->
    <div id="main-menu">
        <h1>Listening Practice</h1>
        <div class="student-input-group">
            <label for="student-name">Enter Student Name:</label>
            <input type="text" id="student-name" placeholder="e.g. John Doe">
        </div>
        <div class="test-grid" id="test-grid"></div>
    </div>

    <!-- Test View -->
    <div id="test-view">
        
        <!-- Unified Top Header Bar -->
        <div class="test-header-row">
            <div class="header-info-text">
                Student: <span id="display-student">Unknown</span> | 
                Test: <span id="display-title">Test Title</span> | 
                Score: <span id="display-score">0/0</span>
            </div>
            <div class="header-controls-group">
                <button class="action-btn btn-back" onclick="showMenu()">← Back to Menu</button>
                <button class="action-btn btn-play" id="btn-play-tts" onclick="toggleTTS()">▶ Play Audio</button>
                <button class="action-btn btn-repeat" onclick="repeatTTS()">↺ Repeat</button>
                <span id="tts-status">Ready</span>
                <button class="action-btn btn-transcript" id="btn-transcript" onclick="toggleSection('transcript-box', 'btn-transcript')">▶ Show Transcript</button>
                <button class="action-btn btn-answers" id="btn-answers" onclick="toggleSection('answer-key-box', 'btn-answers')">▶ Show Answer Key</button>
            </div>
        </div>

        <div class="content-grid">
            <!-- Left Side: Questions -->
            <div>
                <div id="questions-container"></div>
                <button class="action-btn btn-check" onclick="checkAnswers()">Submit Answers</button>
            </div>

            <!-- Right Side: Transcripts and Keys -->
            <div>
                <div id="transcript-box" class="hidden-section">
                    <div class="panel-content">
                        <h3>Transcript (Highlights automatically)</h3>
                        <div class="transcript-text" id="transcript-content"></div>
                    </div>
                </div>

                <div id="answer-key-box" class="hidden-section">
                    <div class="panel-content">
                        <h3>Answer Key</h3>
                        <div id="answer-key-content"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

        id: 6, title: "6. Riverside Market",
        transcript: `MANAGER: Good morning, Riverside Market Office. \nWOMAN: Hello. I was calling because I wanted to volunteer to help with the set-up this weekend... oh, wait a minute, sorry, I'm looking at the wrong notes! I actually need to ask about renting a stall to sell my crafts. \nMANAGER: No problem, I can help you with that. Are you planning to sell hot food? \nWOMAN: No, just some homemade jams and perhaps some baked goods. \nMANAGER: Alright. Well, if you were selling meat, you'd need to use our special fridges. But for baked goods, that's not necessary. You will, however, be strictly required to show us a valid hygiene certificate before you can open. \nWOMAN: I have one of those from my cafe. Just for your records, I know you advertise a lot in the local newspaper... \nMANAGER: Yes, most people see our ads there. \nWOMAN: Normally you'd expect me to say that's where I saw it, but I actually saw a poster up at my local gym. \nMANAGER: Great. Now, for the day itself, we do provide the main wooden tables for everyone. \nWOMAN: Oh, that's helpful. Should I bring a rubbish bag? \nMANAGER: We actually collect the rubbish for you. But we don't have enough seating, so bringing a folding chair is absolutely essential if you want to sit down. \nWOMAN: Got it. Now, can you tell me about the different types of stalls? \nMANAGER: Certainly. We have three tiers. The first is the Standard Stall. It costs £25. \nWOMAN: And where is that located? Is it in the community hall? \nMANAGER: It used to be, but the hall is under repair. So now it is located inside the tent. \nWOMAN: Okay. And does the £25 include a table cover? \nMANAGER: I'm afraid not. You must provide your own cloth to protect the wood. \nWOMAN: Fine. What is the next tier? \nMANAGER: That's the Produce stall. That's P-R-O-D-U-C-E. \nWOMAN: And where are those? \nMANAGER: They are positioned right near the main entrance, so they get a lot of foot traffic. They cost £35. \nWOMAN: That sounds good. Do they have any extras? \nMANAGER: Yes, because they are outside, the price includes a protective canopy in case it rains. \nWOMAN: A canopy, excellent. And the last option? \nMANAGER: The Premium Stall. Those are situated next to the stage where the live music plays. \nWOMAN: Sounds noisy, but fun. How much is that one? \nMANAGER: Well, normally a premium spot would be £50, but because we are trying to encourage more local artists this month, it's currently £40. \nWOMAN: £40. And I see on your website it says I get access to electricity? \nMANAGER: Yes, that's correct.`,

        id: 7, title: "7. Summer Arts Festival",
        transcript: `COORDINATOR: Good morning, everyone, and welcome to the Summer Arts Festival volunteer orientation. My name is Greg, and I am the volunteer coordinator. Before we assign you to your stations, I need to go over a few important details. \nFirst, let's talk about the format of the event. In the past, we've always held the festival over a single weekend. We initially planned to expand it to a full week this year. However, due to funding cuts, we've actually decided to keep it to three days, but move it entirely indoors to the civic centre, so we don't have to worry about the rain. \nRegarding your uniform. Normally, at festivals like this, you'd expect to be given a souvenir festival t-shirt to wear, but our supplier let us down at the last minute. You don't need to wear formal suits, of course, but it is strictly required that you wear a high-visibility yellow vest at all times while on duty, which we will provide at the desk. \nYou'll also want to know your shifts. We used to just pin a master list on the noticeboard in the staff room. We thought about emailing the times to you every morning, but we found that emails often get missed or sent to the spam folder. So instead, you'll need to pick up a printed card from my desk when you arrive each day, which will have your exact hours on it. \nNow, health and safety. If there is a medical emergency with a visitor, please don't call an ambulance yourself, as having multiple people call can cause confusion for the hospital. And while your first instinct might be to find a police officer, you must actually contact the site manager on your two-way radio first, and they will coordinate the official medical team. \nFinally, I want to thank you all for giving up your time. Many people volunteer just to get free concert tickets. While that's a nice perk, the primary advantage of doing this work is that it helps you build your confidence when communicating with the public, which is something that looks fantastic on any CV. \nAlright, now let's look at where you will all be stationed today. \nSusan, your group is up first. Normally you look after the Children's Area, but unfortunately, that's closed for repairs this year. So instead, we've moved you to the Food Court to help clear tables and assist the vendors. \nNext is Mark's group. I know you requested to be at the Main Stage. Unfortunately, that's fully staffed by professionals. However, we really need your help directing vehicles, so please head over to the Car Park. \nFor the local scout troop, we usually put them in the Car Park, but they are so great at answering public questions that this year they will be stationed at the Information Tent. \nNow, the university students. Because they are studying medicine, it would make sense to put them in the First Aid Tent, right? Well, actually, the festival director specifically requested them to handle the guest lists and cater to the artists in the VIP Lounge. \nFinally, the drama club members. They originally wanted to perform, but they'll be helping out at the Main Stage setting up the microphones and helping the bands.`,

        id: 8, title: "8. Riverside Centre Reopening",
        transcript: `MANAGER: Good morning, everyone, and welcome to the grand reopening of the Riverside Community Arts Centre. We are absolutely thrilled to welcome the public back through our doors. \nBefore you explore, I want to give you a bit of background and run through some basic information. You know we've been closed for the last six months. We originally planned the closure because we desperately wanted to increase the overall size of the building by adding an extension. However, the town planners denied our building permit. So instead, the real driving force behind the six-month closure was the urgent need to upgrade the heating and lighting systems, which were completely outdated. Luckily, while the electricians were working, we also managed to repair some old storm damage to the roof. \nYou might be wondering how we keep this beautiful place running. We used to rely entirely on your annual membership fees to cover our costs. But as expenses rose, we had to look elsewhere. Normally, places like ours receive annual grants from the local council, but unfortunately, they cut our budget to zero last year. So now, the only way we keep our doors open is actually through generous private donations from the public. We are incredibly grateful for that support. \nNow, let's talk about the facilities. The computer room is open on the first floor. In the past, sessions were limited to one hour to ensure everyone got a turn, but we've purchased ten more machines, so that rule has been abolished. You might expect that you need to book a computer a day in advance now, but actually, it's just a simple drop-in system. We do, however, have one strict condition: because of previous accidents ruining the keyboards, food and drink are completely forbidden in that room. \nRegarding your membership cards, please keep them safe. However, if you do lose your card, don't panic. You don't need to go to the police and report it. And while some libraries charge a £5 replacement fee, we've decided to waive that cost. All you actually need to do is bring a photo ID to the reception desk, and we'll print you a new one on the spot. \nFinally, getting here can be tricky. We do have a car park, but there are massive roadworks on the High Street right now, so I'd avoid driving if you can. We've found that the local bus service is very unreliable on weekends. So, if you've got a bicycle, that's best. We have plenty of secure racks right outside the front door. \nRight, let's look at the schedule of upcoming events. \nFirst is the Photography Workshop. We had originally planned to run this on Tuesday evenings. But unfortunately, the tutor had a sudden scheduling clash, so it has been moved to Thursday evenings instead. \nNext is Children's Storytime. This is always incredibly popular. We were hoping to hold it in the main hall as usual, but because the weather is so beautiful this week, we've decided it will be held in the outdoor pavilion to give the kids some fresh air. \nYou might be interested in the Local History Talk. I know several of you were asking about this. Sadly, the guest speaker has caught a very bad flu, so I'm afraid that event has been completely cancelled for this month. \nWe also have the new Yoga Class. Just a quick note on this one: normally we provide all the mats, but our supplier hasn't delivered them yet. So for the first three weeks, it requires you to bring your own extra equipment. \nFinally, the Pottery Course. Many people think this is only for advanced levels, but beginners are completely welcome. However, if you haven't put your name down yet, I'm afraid it's too late. There are absolutely no spots left.`,

        id: 9, title: "9. Furniture Rental",
        transcript: `AGENT: Good morning, City Relocations. How can I help you? \nSHELLY: Hi, this is Shelly Meyer. I'm renting your house on Archwood Avenue for 12 months. \nAGENT: Ah yes, Shelly. Is your surname spelt M-E-Y-E-R? \nSHELLY: Yes, that's right. \nAGENT: Great. And just to confirm the property, that was 14 Archwood Avenue? \nSHELLY: Correct. That's spelt A-R-C-H-W-O-O-D. \nAGENT: Thank you. How can I help you today? \nSHELLY: Well, when I viewed the house I told you I'll most probably need to rent some furniture. I'm not bringing much with me. \nAGENT: Yes, of course. Well, the biggest company is called Peak Rentals. Oh, and their brochure says that there's a special offer at the moment. If you rent living room furniture, I believe that's a set of chairs and a TV table, you'll also get a lamp at no extra cost. \nSHELLY: Okay, but you know that price range you gave me earlier is more than I was hoping to pay. \nAGENT: Then you could try Aaron and Oliver. \nSHELLY: Sorry, what? And Oliver? \nAGENT: Aaron. A-R-O-N. \nSHELLY: Okay. Are they... er... \nAGENT: I'd say they're a mid-price company, but if you chose them, you need to be aware that they charge an extra 12% every month in case of damage. \nSHELLY: Oh, I see. I'd have to do the math carefully then, right? \nAGENT: But one helpful thing is that they also do cleaning for customers. For the house. \nSHELLY: Oh, I see. I probably won't need that. \nAGENT: There's another company called Larch Furniture. It's quite new and it has the lowest prices in town. \nSHELLY: Well, that would be good. I won't have much time to go shopping after I start my job. \nAGENT: There are two things you need to know about Larch Furniture. First of all, you have to take out insurance on the furniture and you need to organize that yourself. \nSHELLY: That wouldn't be too hard. \nAGENT: Also, you can't take out a contract for less than 6 months. \nSHELLY: I figure that might not be a problem for me. I'm renting the house for 12 months after all. \nAGENT: Yes. Okay. Well, sorry to interrupt. I just thought of another furniture rental company. It's called Space Rentals, and it's located very near to the house. \nSHELLY: Okay. \nAGENT: I don't have any information about their charges. So, it's best to use their app to find out what it would cost you to use them.`,

        id: 10, title: "10. Elite Catering",
        transcript: `MALE: Good morning, Elite Catering. Mark speaking. How can I help you? \nFEMALE: Oh, hello Mark. I'm calling to enquire about the temporary jobs you advertised. \nMALE: Fantastic. We are always looking for new staff. I can take your details right now. What is your full name, please? \nFEMALE: It's Sarah Woodhouse. \nMALE: Is that spelt W-O-D-H-O-U-S-E? \nFEMALE: Actually, it's W-O, double O, D-H-O-U-S-E. \nMALE: Thank you. And your address? \nFEMALE: I live at 42 Brampton Road. \nMALE: Got it. And could I have a contact phone number? \nFEMALE: Sure. It's 077 452 998... oh, wait a minute, I just got a new mobile plan yesterday. Sorry, it's 077 452 995. \nMALE: 077 452 995. Excellent. Now, we have a few different vacancies. We are looking for cooks, and we also need waiters. \nFEMALE: Well, I've never cooked professionally before, so I'll apply for the waiter position, if that's okay. \nMALE: That's absolutely fine. Now, let's talk about the pay. Normally, we pay £9.00 an hour for staff who work on the weekends. However, for this beginner role, the starting rate is £8.50 an hour. \nFEMALE: £8.50 is fine with me. Do I need to buy a uniform? \nMALE: You need to wear black trousers. We will provide you with a company apron, but you must bring your own white shirt. \nFEMALE: I have one of those in my wardrobe. Are there any specific days I need to be available? \nMALE: We ideally need people for Thursdays and Fridays. \nFEMALE: Oh, I have college classes on Thursdays, so I couldn't do that. \nMALE: That's a pity, but Fridays are our absolute busiest day, so as long as you can do Fridays, we can still take you on. \nFEMALE: Perfect. \nMALE: Let's arrange an interview. Can you come into the office on the 14th of October? \nFEMALE: I'm actually away visiting my parents on the 14th. How about the 16th? \nMALE: Let me check the diary... yes, the 16th works well. I'll put you down for 10:00 AM. \nFEMALE: Great. Is there anything I need to bring? \nMALE: Yes. Some people just bring their driving licence, but our head office strictly needs a copy of your passport for our records. \nFEMALE: No problem, I'll make a copy tonight. Is there parking at your office? \nMALE: There is, but it's very expensive. And I wouldn't take the bus as the roadworks cause huge delays. If you've got a bicycle, that's best. We have secure racks outside. \nFEMALE: I'll do that. Oh, by the way, I know you asked earlier about where I saw the advert. I didn't actually see it online; it was a friend who told me about the job.`,

        id: 11, title: "11. Research Project",
        transcript: `MALE: Right. Anyway, let's think about our assignment. Last time I had problems with the final stage where we had to describe and justify how successful we thought we'd been. I struggled a bit with the action plan, too. \nFEMALE: I was okay with the planning, but I got marked down for the self-assessment as well. And I had big problems with the statistical stuff. That's where I really lost marks. \nMALE: Right... So shall we plan what we have to do for this assignment? \nFEMALE: Okay. First we have to decide on our research question. So how about: 'is there a relationship between hours of sleep and number of dreams'? \nMALE: Okay, then we need to think about who we'll do the study on. About 12 people, right? And shall we use other psychology students? \nFEMALE: Let's use people from a different department. What about history? \nMALE: Yes, they might have interesting dreams. Or literature students? \nFEMALE: I don't really know any. \nMALE: Okay, forget that idea. Then we have to think about our methodology. So, we could use observation, but that doesn't seem appropriate. \nFEMALE: No, it needs to be self-reporting, I think. And we could ask them to answer questions online. \nMALE: But in this case, paper might be better as they'll be doing it straight after they wake up. In fact, while they're still half asleep, right? \nFEMALE: Yes, exactly. And we'll have to check the ethical guidelines for this sort of research because our experiment involves humans, so there are special regulations. \nMALE: Yes, I had a look at those for another assignment I did. There's a whole section on risk assessment and another section on making sure they aren't put under any unnecessary stress. \nFEMALE: Right. So, for the paper diary itself, what do they need to record? Obviously, the time they went to bed and the time they woke up. \nMALE: Yes. And they should write down a brief description of the dream. But we also need to know if they consumed any caffeine before bed, as that definitely affects sleep. \nFEMALE: Good point. We should also ask about the temperature of their room, as being too hot or cold can cause nightmares. \nMALE: I think that's getting too complicated. Let's stick to their diet. What about alcohol? \nFEMALE: No, let's keep it simple. Caffeine is enough. Then, after we collect the diaries in two weeks, we'll need to analyze the data. \nMALE: I'm a bit worried about the software we have to use for that. I've never used it before. \nFEMALE: Don't worry, the university provides a free tutorial online. I'll send you the link. \nMALE: Thanks. Once we have the results, we have to prepare the presentation. We need to create some visual aids. I can make some charts to show the correlation. \nFEMALE: That would be great. And we must remember to include a section on the limitations of our study. The tutor is always very strict about acknowledging what we couldn't control. \nMALE: Yes, like the fact that self-reporting isn't one hundred percent reliable. Finally, we need to submit the written report by the 25th. \nFEMALE: Wait, I originally thought the deadline was the 25th, but the syllabus says it has been extended to the 28th because of the library closure. \nMALE: Oh, what a relief! We should still aim to finish the first draft early so we have time to proofread it. \nFEMALE: Agreed. Oh, one last thing: we have to attach the completed consent forms to the back of the report, otherwise they won't mark it.`,

        id: 12, title: "12. Self-Access Centre",
        transcript: `JUDY: Hi Alan, have you managed to collate the results from our research into the Self-Access Centre? \nALAN: Yes, I have. Before we look at the data, we need to write the introduction. We should state why we chose the centre as our topic. I originally thought about choosing it just because our course tutor recommended it, but actually, the main reason we went with it is that it is highly relevant to our own studies. \nJUDY: Right, I'll write that down. Now, for the methodology. We need to explain why we didn't use a questionnaire. \nALAN: Well, we thought about it, but designing one just takes too much time. \nJUDY: No, that wasn't the main issue, remember? We realized that students just throw them away, so we were worried about a low response rate. \nALAN: Ah, yes, exactly. So instead, we conducted face-to-face interviews with the students. And we also needed the staff's perspective. \nJUDY: I originally tried to speak to the university librarian, but she was away at a conference, so I managed to get a 30-minute interview with the centre manager instead. That gave us some great insights. \nALAN: Excellent. Now, looking at the student feedback, what did they want changed about the opening times? I know some students wanted it to stay open later in the evenings. \nJUDY: Yes, but looking at the charts, the biggest request by far was for weekend opening hours. At the moment it's closed on Saturday and Sunday, which is really frustrating for people doing assignments. \nALAN: That seems like a valid point. So, how are we going to present all this to the class? A formal written report? \nJUDY: I think a written report is a bit boring. Why don't we do a PowerPoint presentation? \nALAN: We could, but the projector in our classroom is currently broken. I've decided we should create a poster display. It's much more visual and people can walk around and look at our charts. \nJUDY: Okay, a poster it is. Let's list our recommendations for the resources. First, the CD collection. It's a complete mess. \nALAN: It really is. It's impossible to find anything. We should just get rid of them. \nJUDY: I don't think we can throw them away. They just need re-organising completely so students can actually browse them properly. \nALAN: Fine. What about the reference books? \nJUDY: Well, the encyclopedias are in good condition, but the dictionaries are absolutely ancient. We need to replace them with brand new editions. \nALAN: Agreed. And the headphones in the listening lab? I checked them yesterday. \nJUDY: Do we need to buy new ones? \nALAN: No, they're very high quality, but half of them don't work because of loose wires. They definitely need repairing. \nJUDY: I'll note that down. The newspapers are also very popular, but there are never enough copies for everyone in the morning. \nALAN: So our recommendation is clearly to buy more copies of the daily news. \nJUDY: Finally, the seating. Those old wooden study chairs... \nALAN: Oh, they are terrible. Uncomfortable and squeaky. We should definitely just get rid of them. The modern plastic ones are much better.`,
        answers: {21:"A", 22:"B", 23:"C", 24:"B", 25:"C", 26:"E", 27:"D", 28:"C", 29:"A", 30:"F"},

        id: 13, title: "13. Inclusive Design",
        transcript: `LECTURER: Good morning. Today we are looking at the fascinating field of Inclusive Design. It's only relatively recently that designers have become aware of the need to truly be inclusive. What does this mean? Well, it simply means designing products that span economic, social, and cultural barriers. It means making sure products are completely accessible to everyone right out of the box, without any type of adaptation having to be made. \nUnfortunately, historically, design has heavily favoured one demographic. For decades, everything from tools to office spaces was designed around the dimensions of an average male. A classic example is the automotive industry. For years, cars were crash-tested using a dummy based on males, which had severe safety implications for all women. \nLet's look at the modern workplace. In construction and manufacturing, workers require personal protective equipment, or PPE. But a recent study found that most PPE is designed to fit men. Giving women protective gear that is simply scaled down from male proportions is not just uncomfortable; it can actively put women at risk. In fact, in a recent survey, many female workers stated that their PPE often hampered their work, making it difficult to operate heavy machinery safely. \nThis bias isn't just found in physical labor. Think about your typical office. Have you ever wondered why offices always feel so cold to some people? Well, standard air conditioning systems are calibrated using a formula devised in the 1960s, setting the ideal temperature of 21 degrees. But this calculation was based on the resting metabolic rate of a 40-year-old man. It completely ignores the fact that women have different metabolic rates, meaning they typically require a slightly warmer environment. \nSo, how do we fix this? The first step is for designers to collect far more comprehensive data before they even begin the sketching phase. If we only study a narrow segment of society, our products will only serve that segment. Furthermore, corporations must stop making blind assumptions about their target audience. True inclusive design means acknowledging the vast diversity of the human population from the very beginning of the creative process.`,

const menuDiv = document.getElementById('test-grid');
const testView = document.getElementById('test-view');
const menuView = document.getElementById('main-menu');
const studentNameInput = document.getElementById('student-name');

// Header display elements
const displayStudent = document.getElementById('display-student');
const displayTitle = document.getElementById('display-title');
const displayScore = document.getElementById('display-score');

let currentTestGlobal = null;

function init() {
    testsData.forEach((test, index) => {
        const btn = document.createElement('button');
        btn.className = 'test-btn';
        btn.innerText = test.title;
        btn.onclick = () => loadTest(index);
        menuDiv.appendChild(btn);
    });
    
    // Warm up TTS Voices
    if (window.speechSynthesis) {
        window.speechSynthesis.getVoices();
        window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    }
}

function showMenu() {
    testView.style.display = 'none';
    menuView.style.display = 'block';
    stopTTS(); 
}

function loadTest(index) {
    currentTestGlobal = testsData[index];
    menuView.style.display = 'none';
    testView.style.display = 'block';
    
    // Update Header Text
    const stuName = studentNameInput.value.trim() || "Jol"; // Default to Jol as requested if empty
    displayStudent.innerText = stuName;
    displayTitle.innerText = currentTestGlobal.title;
    displayScore.innerText = `0/${currentTestGlobal.questions.length}`;
    
    // Reset panels
    document.getElementById('transcript-box').style.display = 'none';
    document.getElementById('answer-key-box').style.display = 'none';
    document.getElementById('btn-transcript').innerText = '▶ Show Transcript';
    document.getElementById('btn-answers').innerText = '▶ Show Answer Key';

    stopTTS();

    // Render Questions
    const qContainer = document.getElementById('questions-container');
    qContainer.innerHTML = '';
    currentTestGlobal.questions.forEach(q => {
        const div = document.createElement('div');
        div.className = 'question-block';
        div.innerHTML = `
            <label class="question-label">${q.label}</label>
            <input type="text" class="answer-input" data-id="${q.id}" placeholder="Your answer...">
        `;
        qContainer.appendChild(div);
    });

    // Render Transcript
    const tsContainer = document.getElementById('transcript-content');
    tsContainer.innerHTML = '';
    const tsLines = currentTestGlobal.transcript.split('\n');
    tsLines.forEach((line, idx) => {
        if(line.trim().length === 0) return;
        const el = document.createElement('div');
        el.className = 'ts-line';
        el.id = 'ts-line-' + idx;
        el.innerText = line.trim();
        tsContainer.appendChild(el);
    });

    // Render Answer Key
    const keyContainer = document.getElementById('answer-key-content');
    keyContainer.innerHTML = '';
    for (const [key, value] of Object.entries(currentTestGlobal.answers)) {
        const item = document.createElement('div');
        item.className = 'answer-key-item';
        item.innerHTML = `Question ${key}: <span>${value}</span>`;
        keyContainer.appendChild(item);
    }
}

function toggleSection(sectionId, btnId) {
    const section = document.getElementById(sectionId);
    const btn = document.getElementById(btnId);
    
    if (section.style.display === 'none' || section.style.display === '') {
        section.style.display = 'block';
        if(btnId === 'btn-transcript') btn.innerText = '▼ Hide Transcript';
        if(btnId === 'btn-answers') btn.innerText = '▼ Hide Answer Key';
    } else {
        section.style.display = 'none';
        if(btnId === 'btn-transcript') btn.innerText = '▶ Show Transcript';
        if(btnId === 'btn-answers') btn.innerText = '▶ Show Answer Key';
    }
}

function checkAnswers() {
    const inputs = document.querySelectorAll('.answer-input');
    let score = 0;
    let total = inputs.length;

    inputs.forEach(input => {
        const qId = input.getAttribute('data-id');
        const userAnswer = input.value.trim().toLowerCase();
        const correctAnswer = currentTestGlobal.answers[qId] ? currentTestGlobal.answers[qId].toLowerCase() : "";

        if (userAnswer === correctAnswer) {
            input.classList.remove('incorrect');
            input.classList.add('correct');
            score++;
        } else {
            input.classList.remove('correct');
            input.classList.add('incorrect');
        }
    });

    // Update the live score in the header
    displayScore.innerText = `${score}/${total}`;
    
    if(score === total) {
        displayScore.style.color = 'var(--success)';
    } else {
        displayScore.style.color = '#e74c3c';
    }

    window.scrollTo({ top: 0, behavior: 'smooth' });
}

let ttsState = {
    lines: [], currentIndex: 0, isPlaying: false, isPaused: false, utterance: null
};

function toggleTTS() {
    if (!window.speechSynthesis) { alert("TTS not supported."); return; }

    if (ttsState.isPlaying) {
        window.speechSynthesis.pause();
        ttsState.isPlaying = false; ttsState.isPaused = true;
        document.getElementById('btn-play-tts').innerText = '▶ Resume';
        document.getElementById('tts-status').innerText = 'Paused';
    } else if (ttsState.isPaused) {
        window.speechSynthesis.resume();
        ttsState.isPlaying = true; ttsState.isPaused = false;
        document.getElementById('btn-play-tts').innerText = '⏸ Pause';
        document.getElementById('tts-status').innerText = 'Playing...';
    } else {
        startTTS();
    }
}

function repeatTTS() {
    stopTTS();
    setTimeout(() => startTTS(), 100);
}

function stopTTS() {
    window.speechSynthesis.cancel();
    ttsState.isPlaying = false; ttsState.isPaused = false; ttsState.currentIndex = 0;
    document.getElementById('btn-play-tts').innerText = '▶ Play Audio';
    document.getElementById('tts-status').innerText = 'Ready';
    document.querySelectorAll('.ts-line').forEach(el => el.classList.remove('active'));
}

function startTTS() {
    if(!currentTestGlobal) return;
    window.speechSynthesis.cancel();
    
    ttsState.lines = currentTestGlobal.transcript.split('\n').filter(l => l.trim().length > 0);
    ttsState.currentIndex = 0;
    ttsState.isPlaying = true; ttsState.isPaused = false;
    
    document.getElementById('btn-play-tts').innerText = '⏸ Pause';
    document.getElementById('tts-status').innerText = 'Playing...';
    speakNextLine();
}

function getBestVoice(speakerTag) {
    let voices = window.speechSynthesis.getVoices();
    let keywords = VOICE_MAP[speakerTag] || ["Male"];
    for (let kw of keywords) {
        let match = voices.find(v => v.name.toLowerCase().includes(kw.toLowerCase()));
        if (match) return match;
    }
    return voices[0]; 
}

function speakNextLine() {
    if (!ttsState.isPlaying) return;
    if (ttsState.currentIndex >= ttsState.lines.length) { stopTTS(); return; }

    let line = ttsState.lines[ttsState.currentIndex].trim();
    let speaker = "NARRATOR";
    let textToSpeak = line;

    if (line.includes(":")) {
        let parts = line.split(":");
        speaker = parts[0].trim();
        textToSpeak = parts.slice(1).join(":").trim(); 
    }

    // SMART REGEX: Format phone numbers starting with '0' to be read digit-by-digit
    // e.g. "078 432 219" becomes "0 7 8 4 3 2 2 1 9"
    textToSpeak = textToSpeak.replace(/\b0\d[\d\s]*\d\b/g, (match) => {
        return match.replace(/\s+/g, '').split('').join(' ');
    });

    ttsState.utterance = new SpeechSynthesisUtterance(textToSpeak);
    ttsState.utterance.voice = getBestVoice(speaker);
    ttsState.utterance.rate = 0.95; 

    document.querySelectorAll('.ts-line').forEach(el => el.classList.remove('active'));
    let activeLineEl = document.getElementById('ts-line-' + ttsState.currentIndex);
    if(activeLineEl) {
        activeLineEl.classList.add('active');
        activeLineEl.scrollIntoView({ behavior: "smooth", block: "center" });
    }

    ttsState.utterance.onend = () => {
        ttsState.currentIndex++;
        if (ttsState.isPlaying && !ttsState.isPaused) {
            setTimeout(() => { speakNextLine(); }, 400);
        }
    };

    window.speechSynthesis.speak(ttsState.utterance);
}

window.onload = init;
</script>
</body>
</html>
