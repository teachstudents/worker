<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IELTS Academic Task 1: Line Graph Blueprint</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            overflow: hidden; /* Strict no-scroll */
            user-select: none;
            touch-action: manipulation;
        }
        .slide-enter {
            animation: fadeInScale 0.4s ease-out forwards;
        }
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.98) translateY(5px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        ::-webkit-scrollbar { display: none; }
        * { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Interactive pulse for clickable areas */
        .clickable-area {
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .clickable-area:active {
            transform: scale(0.99);
        }
    </style>
</head>

<body class="h-screen w-screen flex flex-col justify-between text-slate-800">

    <header class="bg-slate-900 text-white shadow-md p-2 md:p-4 flex justify-between items-center z-10 shrink-0 h-16 md:h-20">
        <div class="flex items-center gap-3 md:gap-4">
            <i class="fas fa-chart-line text-2xl md:text-4xl text-emerald-400"></i>
            <h1 class="text-xl md:text-3xl font-bold tracking-wide truncate">IELTS Masterclass</h1>
        </div>
        <div class="flex items-center gap-4 md:gap-6">
            <span id="slide-counter" class="text-slate-400 font-semibold text-sm md:text-xl uppercase tracking-wider"></span>
            <button id="stop-audio-btn" class="hidden bg-rose-500 hover:bg-rose-600 text-white px-4 py-2 md:px-6 rounded-full font-bold transition-colors flex items-center gap-2 text-sm md:text-xl shadow-md" onclick="stopAudio(event)">
                <i class="fas fa-stop"></i> Stop Audio
            </button>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center p-1 md:p-2 relative bg-slate-200 h-[calc(100vh-8rem)] md:h-[calc(100vh-10rem)]">
        
        <!-- Entire card is clickable to trigger speech. Removed middle arrows. Maximized width for 2x fonts -->
        <div class="w-full max-w-[98vw] h-full bg-white rounded-2xl shadow-2xl overflow-hidden flex flex-col relative clickable-area ring-4 ring-transparent hover:ring-indigo-300 group" onclick="readCurrentSlide()">
            <!-- Dynamic Content Container -->
            <div id="slide-container" class="p-2 md:p-4 flex-grow flex flex-col slide-enter h-full overflow-hidden">
                <!-- Content injected via JS -->
            </div>
        </div>

    </main>

    <footer class="bg-white border-t border-slate-200 p-3 shrink-0 h-16 md:h-20 flex items-center justify-center overflow-hidden">
        <div class="w-full max-w-[95vw] mx-auto flex justify-between items-center gap-1 md:gap-2 px-2" id="progress-dots">
            <!-- Dots injected via JS -->
        </div>
    </footer>

    <script>
        let currentChart = null;
        let pieChart1 = null;
        let pieChart2 = null;

        // Increased font sizes in Chart.js configs to match 2x requirement
        const chartsData = {
            elderly: {
                type: 'line',
                data: {
                    labels: ['1940', '1960', '1980', '2000', '2020', '2040'],
                    datasets: [
                        { label: 'Japan', data: [5, 5, 4, 18, 25, 27], borderColor: '#ef4444', tension: 0.3, borderWidth: 3, pointRadius: 2 },
                        { label: 'USA', data: [9, 10, 15, 16, 17, 23], borderColor: '#3b82f6', tension: 0.3, borderWidth: 3, pointRadius: 2 },
                        { label: 'UK', data: [7, 9, 14, 15, 17, 22], borderColor: '#10b981', tension: 0.3, borderWidth: 3, pointRadius: 2 }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { boxWidth: 16, font: {size: 16, family: 'Inter'} } } }, scales: { y: { title: { display: true, text: '% Pop', font: {size: 16, family: 'Inter'} }, ticks: {font: {size: 14, family: 'Inter'}} }, x: { ticks: {font: {size: 14, family: 'Inter'}} } } }
            },
            housingBar: {
                type: 'bar',
                data: {
                    labels: ['1990', '2000', '2010'],
                    datasets: [
                        { label: 'Housing', data: [450, 600, 800], backgroundColor: '#3b82f6' },
                        { label: 'Food', data: [300, 320, 330], backgroundColor: '#10b981' },
                        { label: 'Leisure', data: [200, 250, 350], backgroundColor: '#f59e0b' }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { boxWidth: 16, font: {size: 16, family: 'Inter'} } } }, scales: { y: { title: { display: true, text: 'Cost (£)', font: {size: 16, family: 'Inter'} }, ticks: {font: {size: 14, family: 'Inter'}} }, x: { ticks: {font: {size: 14, family: 'Inter'}} } } }
            },
            energyPie1985: {
                type: 'pie',
                data: {
                    labels: ['Oil', 'Coal', 'Gas', 'Nuclear', 'Other'],
                    datasets: [{ data: [52, 22, 13, 8, 5], backgroundColor: ['#3b82f6', '#1e293b', '#f59e0b', '#ef4444', '#10b981'] }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { boxWidth: 12, font: {size: 14, family: 'Inter'} } }, title: { display: true, text: '1985', font: {size: 18, family: 'Inter'} } } }
            },
            energyPie2003: {
                type: 'pie',
                data: {
                    labels: ['Oil', 'Coal', 'Gas', 'Nuclear', 'Other'],
                    datasets: [{ data: [39, 13, 23, 17, 8], backgroundColor: ['#3b82f6', '#1e293b', '#f59e0b', '#ef4444', '#10b981'] }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, title: { display: true, text: '2003', font: {size: 18, family: 'Inter'} } } }

        };

        const slides = [
            {
                type: "intro",
                title: "Advanced IELTS Task 1",
                subtitle: "Mastering Visuals, Tenses, and Structure",
                icon: "fa-graduation-cap",
                content: `
                    <p class="text-xl md:text-3xl text-slate-600 mb-6 text-center max-w-4xl leading-snug">
                        To take your line graph skills to an advanced level, you need to move beyond basic descriptions and master visual planning, tense control, and structural variety. 
                    </p>
                    <div class="bg-indigo-50 border-l-8 border-indigo-500 p-6 rounded-r-2xl text-lg md:text-2xl text-indigo-900 shadow-sm max-w-4xl mx-auto leading-tight">
                        <strong>The Goal:</strong> A deeper tutorial on the techniques examiners look for in a Band 7.0+ response.
                    </div>
                `,
                spokenText: "To take your line graph skills to an advanced level, you need to move beyond basic descriptions and master visual planning, tense control, and structural variety. Here is a deeper tutorial on the techniques examiners look for in a Band 7.0 or higher response."
            },
            {
                type: "step-dense",
                title: "1. Visual Planning Strategies",
                intro: "Before you write a single word, you should spend a minute physically marking up the test paper.",
                sections: [
                    { label: "Draw Arrows & Circles", text: "Look at the overall info. Use your pencil to draw arrows highlighting main upward/downward movements. Circle highest, lowest, start, and end points." },
                    { label: "Identify Extremes", text: "How many lines trend upward? Downward? Is any line consistently higher/lower? This forms your Overview paragraph." },
                    { label: "3-Section Time Split", text: "Divide long graphs into past, present, and future. This visual trigger reminds you to change grammatical tenses." }
                ],
                spokenText: "1. Visual Planning Strategies. Before you write a single word, spend a minute marking up the paper. Draw Arrows and Circles: highlight main upward or downward movements. Circle highest and lowest points. Identify the Extremes: How many lines show an upward trend? This helps form your Overview. The 3-Section Time Split: Divide graphs covering the future into past, present, and future sections as a trigger to change tenses."
            },
            {
                type: "step-dense",
                title: "2. Mastering Tenses",
                intro: "Using the wrong tense is a common trap that lowers Grammar scores.",
                sections: [
                    { label: "The Past Simple", text: "Use for any data set completely in the past. Ex: 'In 1990, exports dropped dramatically'." },
                    { label: "The Present Perfect", text: "Use to describe a trend that started in the past and continues into the present. Ex: 'Since 1950, the population has grown'." },
                    { label: "Future Predictive", text: "Shift grammar for future projections. Ex: 'Sales will probably decrease' or 'Temperatures are predicted to rise'." }
                ],
                spokenText: "2. Mastering Tenses. The Past Simple: Use this for any data set completely in the past. The Present Perfect: Use this to describe a trend that started in the past and continues into the present. The Future Simple and Passive Predictive: Shift your grammar for future projections, like 'sales will probably decrease'."
            },
            {
                type: "step-dense",
                title: "3. Sentence Structure Variety",
                intro: "You must alternate between two primary descriptive patterns.",
                sections: [
                    { label: "Pattern A (Verb + Adverb)", text: "Subject + Verb + Adverb. Ex: 'The number of researchers rose dramatically to a high of 242'." },
                    { label: "Pattern B (There was + Adj + Noun)", text: "There was + Adjective + Noun. Ex: 'There was a dramatic rise in the number of researchers'." },
                    { label: "The Conversion Rule", text: "Convert verbs to nouns. 'Rose' becomes 'a rise', 'dropped' becomes 'a drop'." }
                ],
                spokenText: "3. Sentence Structure Variety. Pattern A is Verb plus Adverb. For example: The number of researchers rose dramatically. Pattern B is There was plus Adjective plus Noun. For example: There was a dramatic rise. Practice converting verbs into nouns to create these structures."
            },
            {
                type: "step-dense",
                title: "4. Advanced Band 8 Vocabulary",
                intro: "Examiners reward precise, less common lexical items.",
                sections: [
                    { label: "Extreme Changes", text: "Increases: skyrocket, surge, boom (positive only). Decreases: plummet, plunge, dive." },
                    { label: "Flat Lines & Fluctuation", text: "Flat: reach a plateau, level off. Never write 'fluctuating trend'. Write: 'showed some fluctuation'." },
                    { label: "Upgrading Adjectives", text: "Small: marginally, modestly, slightly. Big: markedly, noticeably, considerably, significantly." }
                ],
                spokenText: "4. Advanced Band 8 Vocabulary. For extreme increases, use verbs like skyrocket, surge, or boom. For extreme decreases, use plummet or plunge. For flat lines, use plateau or level off. Never write a fluctuating trend, as fluctuation means no clear trend. Upgrade your adjectives to words like markedly or considerably."
            },
            {
                type: "comparison-table",
                title: "Band 6 vs Band 7+ Criteria",
                tableData: [
                    { feature: "Sentence Variety", b6: "Mix of simple & complex", b7: "Wide variety of complex structures" },
                    { feature: "Vocabulary", b6: "Adequate, some repetition", b7: "Sufficient, less common items" },
                    { feature: "Grammar Accuracy", b6: "Frequent error-free sentences", b7: "Frequent error-free sentences" },
                    { feature: "Cohesion", b6: "Effective linking devices", b7: "Range of cohesive devices" },
                    { feature: "Paraphrasing", b6: "Some attempt", b7: "Consistent & accurate" }
                ],
                spokenText: "Band 6 versus Band 7 Criteria. Band 6 uses a mix of simple and complex structures, while Band 7 requires a wide variety of complex structures. Band 6 vocabulary is adequate with repetition, whereas Band 7 uses sufficient, less common items. Both require frequent error-free sentences. Band 7 uses a wider range of cohesive devices and consistent paraphrasing."
            },
            {
                type: "comparison-split",
                title: "1. Introduction (Paraphrasing)",
                b6Text: "The line graph shows the percentage of elderly people in three countries from 1940 to 2040.",
                b7Text: "The line graph illustrates changes in the proportion of the population aged 65 and over in three nations over a century-long period from 1940 to 2040, including projections.",
                b6Notes: "Basic verbs ('shows'), copies 'percentage', simple time phrase.",
                b7Notes: "Advanced verbs ('illustrates'), sophisticated time phrase ('century-long period', 'projections').",
                spokenText: "Introduction Paraphrasing. Band 6: The line graph shows the percentage of elderly people in three countries from 1940 to 2040. Band 7: The line graph illustrates changes in the proportion of the population aged 65 and over in three nations over a century-long period from 1940 to 2040, including projections."
            },
            {
                type: "comparison-split",
                title: "2. Overview (Main Trends - NO Data)",
                b6Text: "Overall, all three countries showed an increase in elderly population. Japan had the biggest change.",
                b7Text: "Overall, while all three nations exhibit an upward trajectory in their elderly populations, Japan is anticipated to undergo the most pronounced demographic shift, transforming from the country with the smallest proportion to the highest.",
                b6Notes: "Basic vocabulary ('increase', 'biggest change'). Simple sentences.",
                b7Notes: "Complex grammar ('while...'), advanced phrasing ('upward trajectory', 'demographic shift').",
                spokenText: "Overview Structures. Band 6: Overall, all three countries showed an increase in elderly population. Japan had the biggest change. Band 7: Overall, while all three nations exhibit an upward trajectory in their elderly populations, Japan is anticipated to undergo the most pronounced demographic shift, transforming from the country with the smallest proportion in 1940 to the highest by 2040."
            },
            {
                type: "comparison-chart",
                title: "3A. Body: Describing Trends (Lines)",
                chartConfig: chartsData.elderly,
                b6Text: "In 1940, USA had 9%. UK had 7% and Japan 5%. USA and UK increased until 2000 to about 14-15%. Japan stayed low until 1980, then went up fast. By 2040, Japan will have 27%.",
                b7Text: "In 1940, the US led with approx 9%, compared to 7% in the UK and 5% in Japan. Both Western nations experienced steady growth until the millennium, plateauing at approx 14-15%. Japan maintained a flat profile until 1980, after which its elderly population began to surge exponentially to a remarkable 27% by 2040.",
                spokenText: "Body Paragraphs for Line Graphs. Band 6 lists data: The USA and UK increased until 2000. Japan stayed low until 1980, then went up fast. Band 7 connects ideas: Both Western nations experienced steady growth until the millennium, plateauing at approximately 14 to 15%. Japan maintained a flat profile until 1980, after which its elderly population began to surge exponentially."
            },
            {
                type: "comparison-chart",
                title: "3B. Body: Making Comparisons (Bars)",
                chartConfig: chartsData.housingBar,
                b6Text: "Housing was highest at £450. Food was £300 and leisure £200. Housing went up to £800 in 2010. This was a big increase. Food stayed about the same at £330.",
                b7Text: "In 1990, housing accounted for the largest share of budgets at approx £450/month, compared to £300 on food and £200 on leisure. By 2010, housing expenditure had surged to nearly £800—a 78% increase—making it the dominant expense, whereas food costs remained comparatively stable.",
                spokenText: "Making Comparisons. Band 6: Housing was the highest at 450 pounds. Housing went up to 800 pounds in 2010. Band 7: In 1990, housing accounted for the largest share of budgets at approximately 450 pounds per month. By 2010, housing expenditure had surged to nearly 800 pounds—a 78% increase—making it the dominant expense."
            },
            {
                type: "comparison-pie",
                title: "3C. Body: Describing Proportions (Pies)",
                b6Text: "Oil was biggest at 52% in 1985. It went down to 39% in 2003. Coal was 22% but fell to 13%. Natural gas went up from 13% to 23%.",
                b7Text: "In 1985, oil constituted the primary energy source at 52%, though this declined to 39% by 2003. Conversely, natural gas experienced significant growth, nearly doubling from 13% to 23%, thereby replacing coal (which halved to 13%) as the second most relied-upon fuel.",
                spokenText: "Describing Proportions. Band 6: Oil was biggest at 52% in 1985. It went down to 39% in 2003. Band 7: In 1985, oil constituted the primary energy source at 52%, though this figure declined to 39% by 2003. Conversely, natural gas experienced significant growth, nearly doubling to 23%, replacing coal as the second most relied-upon fuel."
            },
            {
                type: "comparison-split",
                title: "3D. Body: Describing Changes (Maps)",
                b6Text: "In 1980, the town was small with 50 houses. In 2020, the town was bigger. More houses were built. The farmland was gone. The harbor became a marina.",
                b7Text: "In 1980, the town comprised a small village with approx 50 houses clustered near the harbor. By 2020, substantial changes were evident: the residential zone had expanded southward, replacing much of the former farmland, while the harbor was converted into a marina.",
                b6Notes: "Simple sentences. 'Was bigger', 'was gone'.",
                b7Notes: "Complex sentences. Passive voice ('was converted'). Precise vocab ('clustered', 'residential zone').",
                spokenText: "Describing Changes in Maps. Band 6: The town was bigger. More houses were built. The farmland was gone. The harbor became a marina. Band 7: Substantial changes were evident: the residential zone had expanded considerably southward, replacing much of the former farmland, while the harbor was converted into a marina."
            },
            {
                type: "comparison-split",
                title: "3E. Body: Describing Processes",
                b6Text: "First, they collect the materials. Then they put them in a truck. After that, the truck takes them to the factory. In the factory, a machine washes them.",
                b7Text: "The process commences with the collection of raw materials, which are subsequently loaded onto a truck for transportation. Upon arrival at the processing facility, the materials undergo a thorough washing stage via an automated machine.",
                b6Notes: "Active voice ('they collect'). Basic sequence ('First, then').",
                b7Notes: "Passive voice heavily used ('are loaded'). Formal sequence ('commences with', 'subsequently').",
                spokenText: "Describing Processes. Band 6 uses active voice: First, they collect the materials. Then they put them in a truck. Band 7 uses formal vocabulary and passive voice: The process commences with the collection of raw materials, which are subsequently loaded onto a truck for transportation. Upon arrival, the materials undergo a thorough washing stage."
            },
            {
                type: "comparison-split",
                title: "4. Comparison Language",
                b6Text: "USA was higher than UK.\nJapan was low, then high.\nHousing was most expensive.\nFood stayed the same.",
                b7Text: "The USA consistently exceeded the UK by a considerable margin.\nJapan transformed from the lowest to the highest proportion.\nHousing accounted for the largest share of expenditure.\nFood costs remained comparatively stable.",
                b6Notes: "Basic comparatives and superlatives.",
                b7Notes: "Advanced comparative structures.",
                spokenText: "Comparison Language. Instead of 'USA was higher than UK', use 'The USA consistently exceeded the UK by a considerable margin'. Instead of 'Japan was low, then high', use 'Japan transformed from the lowest to the highest proportion'. Change 'Housing was most expensive' to 'Housing accounted for the largest share of expenditure'."
            },
            {
                type: "comparison-split",
                title: "5. Trend Vocabulary",
                b6Text: "Large: went up a lot / went down a lot\n\nMedium: went up somewhat / went down somewhat\n\nSmall: went up a little / went down a little",
                b7Text: "Large: increased dramatically / plummeted dramatically\n\nMedium: rose steadily / declined gradually\n\nSmall: grew marginally / dipped slightly",
                b6Notes: "Repetitive use of 'went up' / 'went down'.",
                b7Notes: "Variety of Adverb + Verb combinations.",
                spokenText: "Trend Vocabulary. Stop using 'went up' and 'went down'. For large changes, use 'increased dramatically' or 'plummeted dramatically'. For medium changes, use 'rose steadily' or 'declined gradually'. For small changes, use 'grew marginally' or 'dipped slightly'."
            },
            {
                type: "step-dense",
                title: "Topic 1: Demographics & Health",
                intro: "These topics often require tracking long-term shifts spanning decades or centuries.",
                sections: [
                    { label: "Ageing Populations", text: "Tracking the proportion of the population aged 65+ in countries like Japan, Sweden, and the USA from 1940 to 2040." },
                    { label: "Life Expectancy", text: "Predicting life expectancy across Asian regions, tracking data from 1950 to a projection for 2300." },
                    { label: "Prison Populations", text: "Comparing the total number of male versus female prisoners over a specific period." }
                ],
                spokenText: "Topic 1: Demographics and Health. These track long-term shifts. You might see ageing populations tracking the 65 and over demographic in Japan, Sweden, and the USA. Or life expectancy predictions tracking data from 1950 to 2300. Other topics include comparing male versus female prison populations."
            },
            {
                type: "step-dense",
                title: "Topic 2: Economics & Work",
                intro: "These graphs focus on financial metrics, requiring vocabulary for volatility and growth.",
                sections: [
                    { label: "Unemployment Rates", text: "Comparing fluctuating unemployment rates between the US and Japan between 1993 and 1999." },
                    { label: "Retail Vitality", text: "Tracking the health of the retail sector by showing new shops opening versus closing." },
                    { label: "Household Income", text: "Showing the distribution of average income across categories like food, transport, and savings." }
                ],
                spokenText: "Topic 2: Economics and Work. These focus on financial metrics. Common tasks include comparing fluctuating unemployment rates between the US and Japan, tracking retail vitality through shop openings and closures, or showing household income distribution across categories like food and savings."
            },
            {
                type: "step-dense",
                title: "Topic 3: Environment & Energy",
                intro: "Expect to compare physical resources, emissions, or temperature variations.",
                sections: [
                    { label: "Global Water Use", text: "Showing the dramatic increase in worldwide water consumption, categorized by agriculture, industry, and domestic use." },
                    { label: "Freight & Transport", text: "Illustrating the amount of goods transported via road, water, rail, and pipeline." },
                    { label: "Temperature Variations", text: "Line graphs showing average monthly high and low temperatures for specific locations across the year." }
                ],
                spokenText: "Topic 3: Environment and Energy. Examples include global water use categorized by agriculture, industry, and domestic use. You might also see freight transport illustrating goods moved via road, water, rail, and pipeline, or average monthly temperature variations for specific locations."
            },
            {
                type: "step-dense",
                title: "Topic 4: Lifestyle & Leisure",
                intro: "These charts illustrate societal habits, often covering shorter time spans.",
                sections: [
                    { label: "Tourism & Travel", text: "Tracking the number of visitor arrivals to a country versus resident departures in monthly intervals." },
                    { label: "Children's TV Viewing", text: "Tracking average daily hours children spent watching television over a 60-year period." },
                    { label: "Museum Visitors", text: "Comparing the average number of local residents versus international tourists visiting institutions." }
                ],
                spokenText: "Topic 4: Lifestyle and Leisure. These illustrate societal habits. You might analyze tourism tracking visitor arrivals versus resident departures, children's television viewing hours over a 60-year period, or comparing local residents versus international tourists visiting museums."
            },
            {
                type: "step-dense",
                title: "🎯 Key Takeaway",
                intro: "Band 6 = Communicates clearly. Band 7 = Demonstrates flexibility and precision.",
                sections: [
                    { label: "Vary Sentence Structures", text: "Do not use all simple sentences. Mix complex and compound structures accurately." },
                    { label: "Use Precise Vocabulary", text: "Do not repeat 'went up'. Use 'surged', 'climbed', 'peaked', 'plateaued'." },
                    { label: "Make Comparisons", text: "Make meaningful comparisons, don't just list data point by point." }
                ],
                spokenText: "Key Takeaway: A Band 6 communicates clearly, while a Band 7 demonstrates flexibility, precision, and sophistication. Focus on: varying sentence structures, using precise vocabulary, making meaningful comparisons rather than just listing data, writing complex sentences accurately, and paraphrasing consistently. Good luck!"
            }
        ];

        let currentSlideIndex = 0;
        const synth = window.speechSynthesis;
        let availableVoices = [];
        
        const allowedVoiceNames = ["Remy", "Giuseppe", "Vivienne", "Florian", "Seraphina", "Emma", "Brian", "Ava", "Andrew", "William"];

        function loadVoices() {
            availableVoices = synth.getVoices();
        }

        loadVoices();
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = loadVoices;
        }

        function getVoiceForSlide(index) {
            if (availableVoices.length === 0) loadVoices();
            if (availableVoices.length === 0) return null;

            // Strictly filter voices by the allowed names list
            let matchedVoices = availableVoices.filter(v => 
                allowedVoiceNames.some(allowed => v.name.toLowerCase().includes(allowed.toLowerCase()))
            );

            if (matchedVoices.length > 0) {
                return matchedVoices[index % matchedVoices.length];
            }

            // Fallback to any english voice if the strict list is not installed on OS
            const enVoices = availableVoices.filter(v => v.lang.startsWith('en'));
            return enVoices.length > 0 ? enVoices[index % enVoices.length] : availableVoices[0];
        }

        function readCurrentSlide() {
            stopAudio();

            const slide = slides[currentSlideIndex];
            const textToRead = slide.spokenText;

            if (textToRead && textToRead !== '') {
                const utterThis = new SpeechSynthesisUtterance(textToRead);
                const selectedVoice = getVoiceForSlide(currentSlideIndex);
                if (selectedVoice) utterThis.voice = selectedVoice;
                
                // Force English reading rules regardless of native voice accent (e.g. Florian, Giuseppe)
                utterThis.lang = 'en-US'; 
                utterThis.rate = 0.95; 
                utterThis.pitch = 1;

                utterThis.onstart = () => { document.getElementById('stop-audio-btn').classList.remove('hidden'); };
                utterThis.onend = () => { document.getElementById('stop-audio-btn').classList.add('hidden'); };
                utterThis.onerror = () => { document.getElementById('stop-audio-btn').classList.add('hidden'); }

                synth.speak(utterThis);
            }
        }

        function stopAudio(event) {
            if (event) event.stopPropagation();
            if (synth.speaking) {
                synth.cancel();
                document.getElementById('stop-audio-btn').classList.add('hidden');
            }
        }

        const container = document.getElementById('slide-container');
        const slideCounter = document.getElementById('slide-counter');
        const progressDots = document.getElementById('progress-dots');

        function renderSlide() {
            stopAudio();
            
            if (currentChart) { currentChart.destroy(); currentChart = null; }
            if (pieChart1) { pieChart1.destroy(); pieChart1 = null; }
            if (pieChart2) { pieChart2.destroy(); pieChart2 = null; }

            const slide = slides[currentSlideIndex];
            
            container.classList.remove('slide-enter');
            void container.offsetWidth; 
            container.classList.add('slide-enter');

            let html = '';

            // Using drastically larger text classes and tight spacing to prevent scrolling
            if (slide.type === 'intro') {
                html = `
                    <div class="flex-grow flex flex-col items-center justify-center pointer-events-none h-full text-center p-2">
                        <i class="fas ${slide.icon} text-6xl md:text-8xl text-indigo-500 mb-6 bg-indigo-50 p-8 rounded-full shadow-inner"></i>
                        <h2 class="text-4xl md:text-6xl font-extrabold text-slate-800 mb-4 tracking-tight">${slide.title}</h2>
                        <h3 class="text-2xl md:text-4xl text-indigo-500 font-bold uppercase tracking-widest mb-10">${slide.subtitle}</h3>
                        ${slide.content}
                    </div>
                `;
            } 
            else if (slide.type === 'step-dense') {
                let sectionsHtml = slide.sections.map(sec => `
                    <div class="bg-slate-50 border-2 border-slate-200 p-4 md:p-6 rounded-2xl flex gap-4 items-start h-full overflow-hidden">
                        <div class="mt-1 flex-shrink-0 bg-white p-2 rounded-lg shadow-sm text-indigo-500">
                            <i class="fas fa-check-circle text-2xl md:text-3xl"></i>
                        </div>
                        <div class="flex flex-col h-full min-h-0">
                            <h4 class="font-bold text-2xl md:text-3xl text-slate-800 mb-2 shrink-0">${sec.label}</h4>
                            <p class="text-slate-600 text-lg md:text-2xl leading-tight overflow-hidden">${sec.text}</p>
                        </div>
                    </div>
                `).join('');

                html = `
                    <div class="flex flex-col h-full pointer-events-none overflow-hidden">
                        <div class="mb-4 shrink-0">
                            <h2 class="text-3xl md:text-5xl font-extrabold text-slate-800 mb-2 tracking-tight">${slide.title}</h2>
                            <p class="text-xl md:text-3xl text-slate-600 border-l-8 border-indigo-500 pl-4 italic bg-slate-50 p-3 rounded-r-xl">${slide.intro}</p>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 flex-grow min-h-0">
                            ${sectionsHtml}
                        </div>
                    </div>
                `;
            } 
            else if (slide.type === 'comparison-table') {
                html = `
                    <div class="flex flex-col h-full pointer-events-none overflow-hidden">
                        <div class="mb-4 shrink-0">
                            <h2 class="text-3xl md:text-5xl font-extrabold text-slate-800 mb-2">${slide.title}</h2>
                        </div>
                        <div class="flex-grow border-2 border-slate-200 rounded-2xl shadow-sm overflow-hidden flex flex-col min-h-0">
                            <table class="w-full text-left border-collapse table-fixed flex flex-col h-full">
                                <thead class="bg-indigo-800 text-white shrink-0 block w-full">
                                    <tr class="flex w-full">
                                        <th class="p-4 text-xl md:text-3xl font-bold w-1/4">Feature</th>
                                        <th class="p-4 text-xl md:text-3xl font-bold w-3/8 border-l-2 border-indigo-700"><span class="bg-white text-indigo-800 px-2 rounded mr-2">B6</span> Adequate</th>
                                        <th class="p-4 text-xl md:text-3xl font-bold w-3/8 border-l-2 border-indigo-700"><span class="bg-emerald-400 text-slate-900 px-2 rounded mr-2">B7+</span> Sophisticated</th>
                                    </tr>
                                </thead>
                                <tbody class="block w-full flex-grow overflow-hidden flex flex-col">
                                    ${slide.tableData.map((row, i) => `
                                        <tr class="flex w-full border-b-2 border-slate-200 flex-1 items-center ${i%2===0?'bg-white':'bg-slate-50'}">
                                            <td class="p-4 text-lg md:text-2xl font-bold text-slate-700 w-1/4 truncate">${row.feature}</td>
                                            <td class="p-4 text-lg md:text-2xl text-slate-600 w-3/8 border-l-2 border-slate-200 overflow-hidden leading-tight">${row.b6}</td>
                                            <td class="p-4 text-lg md:text-2xl text-emerald-800 font-bold w-3/8 border-l-2 border-slate-200 bg-emerald-50/50 overflow-hidden leading-tight">${row.b7}</td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
            }
            else if (slide.type === 'comparison-split') {
                html = `
                    <div class="flex flex-col h-full pointer-events-none overflow-hidden">
                        <h2 class="text-3xl md:text-5xl font-extrabold text-slate-800 mb-6 shrink-0">${slide.title}</h2>
                        
                        <div class="flex flex-col md:flex-row gap-6 flex-grow min-h-0">
                            <!-- Band 6 Side -->
                            <div class="w-full md:w-1/2 flex flex-col bg-slate-50 border-4 border-slate-200 border-dashed rounded-2xl p-6 relative min-h-0">
                                <span class="absolute -top-4 left-6 bg-slate-200 text-slate-700 text-lg md:text-2xl font-bold px-4 py-1 rounded-lg shadow-sm">Band 6 (Basic)</span>
                                <div class="flex-grow overflow-hidden flex flex-col justify-center mt-4">
                                    <p class="text-xl md:text-3xl text-slate-600 leading-tight whitespace-pre-line">${slide.b6Text}</p>
                                </div>
                                ${slide.b6Notes ? `<div class="mt-4 pt-4 border-t-2 border-slate-200 text-lg md:text-xl text-rose-600 italic shrink-0 font-medium"><i class="fas fa-exclamation-triangle mr-2"></i>${slide.b6Notes}</div>` : ''}
                            </div>
                            
                            <!-- Band 7 Side -->
                            <div class="w-full md:w-1/2 flex flex-col bg-emerald-50 border-4 border-emerald-400 rounded-2xl p-6 relative min-h-0">
                                <span class="absolute -top-4 left-6 bg-emerald-300 text-emerald-900 text-lg md:text-2xl font-bold px-4 py-1 rounded-lg shadow-sm">Band 7 (Advanced)</span>
                                <div class="flex-grow overflow-hidden flex flex-col justify-center mt-4">
                                    <p class="text-xl md:text-3xl text-emerald-900 font-bold leading-tight whitespace-pre-line">${slide.b7Text}</p>
                                </div>
                                ${slide.b7Notes ? `<div class="mt-4 pt-4 border-t-2 border-emerald-300 text-lg md:text-xl text-emerald-800 italic shrink-0 font-medium"><i class="fas fa-check-circle mr-2"></i>${slide.b7Notes}</div>` : ''}
                            </div>
                        </div>
                    </div>
                `;
            }
            else if (slide.type === 'comparison-chart') {
                html = `
                    <div class="flex flex-col h-full pointer-events-none overflow-hidden">
                        <h2 class="text-3xl md:text-5xl font-extrabold text-slate-800 mb-4 shrink-0">${slide.title}</h2>
                        
                        <div class="flex flex-col md:flex-row gap-4 flex-grow min-h-0">
                            <!-- Left: Chart -->
                            <div class="w-full md:w-1/2 h-full bg-slate-50 border-2 border-slate-200 rounded-2xl p-2 relative shrink-0">
                                <div class="w-full h-full relative">
                                    <canvas id="chartCanvas"></canvas>
                                </div>
                            </div>
                            
                            <!-- Right: Comparisons -->
                            <div class="flex flex-col gap-4 w-full md:w-1/2 h-full min-h-0">
                                <div class="flex-1 flex flex-col bg-white border-4 border-slate-200 border-dashed rounded-2xl p-4 md:p-6 relative overflow-hidden">
                                    <span class="absolute -top-3 left-4 bg-slate-200 text-slate-800 text-sm md:text-lg font-bold px-3 py-1 rounded-lg">Band 6</span>
                                    <p class="text-lg md:text-2xl text-slate-600 mt-4 leading-tight overflow-hidden">${slide.b6Text}</p>
                                </div>
                                <div class="flex-1 flex flex-col bg-emerald-50 border-4 border-emerald-400 rounded-2xl p-4 md:p-6 relative overflow-hidden">
                                    <span class="absolute -top-3 left-4 bg-emerald-300 text-emerald-900 text-sm md:text-lg font-bold px-3 py-1 rounded-lg">Band 7</span>
                                    <p class="text-lg md:text-2xl text-emerald-900 font-bold mt-4 leading-tight overflow-hidden">${slide.b7Text}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }
            else if (slide.type === 'comparison-pie') {
                html = `
                    <div class="flex flex-col h-full pointer-events-none overflow-hidden">
                        <h2 class="text-3xl md:text-5xl font-extrabold text-slate-800 mb-4 shrink-0">${slide.title}</h2>
                        
                        <div class="flex flex-col md:flex-row gap-4 flex-grow min-h-0">
                            <!-- Left: Pies -->
                            <div class="w-full md:w-1/2 h-full bg-slate-50 border-2 border-slate-200 rounded-2xl p-2 relative flex flex-row shrink-0">
                                <div class="w-1/2 h-full relative border-r-2 border-slate-200"><canvas id="pie1"></canvas></div>
                                <div class="w-1/2 h-full relative"><canvas id="pie2"></canvas></div>
                            </div>
                            
                            <!-- Right: Comparisons -->
                            <div class="flex flex-col gap-4 w-full md:w-1/2 h-full min-h-0">
                                <div class="flex-1 flex flex-col bg-white border-4 border-slate-200 border-dashed rounded-2xl p-4 md:p-6 relative overflow-hidden">
                                    <span class="absolute -top-3 left-4 bg-slate-200 text-slate-800 text-sm md:text-lg font-bold px-3 py-1 rounded-lg">Band 6</span>
                                    <p class="text-lg md:text-2xl text-slate-600 mt-4 leading-tight overflow-hidden">${slide.b6Text}</p>
                                </div>
                                <div class="flex-1 flex flex-col bg-emerald-50 border-4 border-emerald-400 rounded-2xl p-4 md:p-6 relative overflow-hidden">
                                    <span class="absolute -top-3 left-4 bg-emerald-300 text-emerald-900 text-sm md:text-lg font-bold px-3 py-1 rounded-lg">Band 7</span>
                                    <p class="text-lg md:text-2xl text-emerald-900 font-bold mt-4 leading-tight overflow-hidden">${slide.b7Text}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }

            container.innerHTML = html;
            updateControls();

            // Initialize Charts after DOM update
            if (slide.type === 'comparison-chart' && slide.chartConfig) {
                requestAnimationFrame(() => {
                    const ctx = document.getElementById('chartCanvas');
                    if (ctx) currentChart = new Chart(ctx, slide.chartConfig);
                });
            } else if (slide.type === 'comparison-pie') {
                requestAnimationFrame(() => {
                    const ctx1 = document.getElementById('pie1');
                    const ctx2 = document.getElementById('pie2');
                    if (ctx1) pieChart1 = new Chart(ctx1, chartsData.energyPie1985);
                    if (ctx2) pieChart2 = new Chart(ctx2, chartsData.energyPie2003);
                });
            }
        }

        function updateControls() {
            slideCounter.innerText = `Slide ${currentSlideIndex + 1} of ${slides.length}`;

            let finalDots = '';
            for(let i=0; i<slides.length; i++){
                const isActive = i === currentSlideIndex;
                const isPassed = i < currentSlideIndex;
                let dotClass = isActive ? 'bg-indigo-600 scale-[2.0] ring-4 ring-indigo-200' : (isPassed ? 'bg-indigo-400' : 'bg-slate-300');
                
                // Increased dot sizes
                finalDots += `<button onclick="goToSlide(${i}, event)" class="h-3 w-3 md:h-4 md:w-4 rounded-full transition-all duration-300 ${dotClass} hover:bg-indigo-500 relative z-10 shrink-0 mx-1 md:mx-2 cursor-pointer pointer-events-auto"></button>`;
                
                if(i < slides.length - 1) {
                    let lineClass = isPassed ? 'bg-indigo-400' : 'bg-slate-200';
                    finalDots += `<div class="h-1 md:h-1.5 flex-grow ${lineClass} transition-colors duration-300 -mx-[4px]"></div>`;
                }
            }
            progressDots.innerHTML = finalDots;
        }

        function nextSlide(event) {
            if (event) event.stopPropagation();
            if (currentSlideIndex < slides.length - 1) {
                currentSlideIndex++;
                renderSlide();
            }
        }

        function prevSlide(event) {
            if (event) event.stopPropagation();
            if (currentSlideIndex > 0) {
                currentSlideIndex--;
                renderSlide();
            }
        }

        function goToSlide(index, event) {
            if (event) event.stopPropagation();
            if (index >= 0 && index < slides.length) {
                currentSlideIndex = index;
                renderSlide();
            }
        }

        // Keyboard bindings still active for navigation since UI buttons are removed
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') {
                nextSlide();
            } else if (e.key === 'ArrowLeft') {
                prevSlide();
            } else if (e.key === ' ') {
                e.preventDefault();
                readCurrentSlide();
            }
        });

        // Initialize on load
        window.onload = renderSlide;

    </script>
</body>
</html>
