            const [showPhrases, setShowPhrases] = React.useState(false);

            return (
                <div className={`flex flex-col h-full w-[28%] ${bgColor} border-t-4 ${borderColor} p-3 rounded-xl shadow-lg relative`}>
                    <h2 className={`text-2xl font-bold ${textColor} text-center mb-1`}>{title}</h2>
                    
                    {/* Assigned Students Top Display */}
                    <div className="flex flex-wrap gap-2 justify-center mb-2 min-h-[32px]">
                        {students.map(s => (
                            <span key={s.id} className="bg-slate-800 text-white px-3 py-1 text-sm rounded-full shadow border border-slate-600">
                                {s.name}
                            </span>
                        ))}
                        {students.length === 0 && <span className="text-slate-500 italic text-xs mt-1">No assigned debaters</span>}
                    </div>

                    {/* Action Buttons side-by-side (Tight Margin) */}
                    <div className="flex space-x-2 mb-0">
                        <button onClick={() => setShowArg(true)} className="flex-1 bg-slate-700 hover:bg-slate-600 text-white py-1.5 rounded shadow text-xs font-bold transition">
                            Show Argument (显示论点)
                        </button>
                        <button onClick={() => setShowPhrases(true)} className={`flex-1 ${isAgree ? 'bg-blue-700 hover:bg-blue-600' : 'bg-rose-700 hover:bg-rose-600'} text-white py-1.5 rounded shadow text-xs font-bold transition`}>
                            {isAgree ? "Agree Phrases (短语)" : "Disagree Phrases (短语)"}
                        </button>
                    </div>

                    {/* Enlarged Vocab section pushed higher */}
                    <div className="flex-1 overflow-y-auto mt-0 pr-1 custom-scrollbar">
                        <div className="flex flex-col space-y-1.5 pt-2">
                            {vocabList.map((v, i) => (
                                <div key={i} className="flex justify-between items-center bg-slate-800/80 p-2 rounded border border-slate-700/50">
                                    <span className="text-lg font-bold text-slate-100">{v.en}</span>
                                    {/* Chinese text updated to text-white for clarity */}
                                    <span className="text-lg text-white ml-2 text-right">{v.zh}</span>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Modals */}
                    {showArg && (
                        <div className="absolute inset-0 z-20 bg-slate-900/95 p-5 rounded-xl flex flex-col border-2 border-slate-600 shadow-2xl">
                            <h3 className={`text-xl font-bold mb-3 ${textColor}`}>Your Argument Strategy</h3>
                            <p className="text-2xl leading-relaxed text-slate-200 flex-1 overflow-y-auto custom-scrollbar">{argument}</p>
                            <button onClick={() => setShowArg(false)} className="mt-3 bg-red-600 hover:bg-red-500 text-white py-2 rounded font-bold shadow-lg">Close</button>
                        </div>
                    )}

                    {showPhrases && (
                        <div className="absolute inset-0 z-20 bg-slate-900/95 p-5 rounded-xl flex flex-col border-2 border-slate-600 shadow-2xl">
                            <h3 className={`text-xl font-bold mb-3 ${textColor}`}>Debate Phrase Bank</h3>
                            <div className="flex-1 overflow-y-auto custom-scrollbar flex flex-col space-y-2">
                                {phrases.map((p, i) => (
                                    <div key={i} className="bg-slate-800 p-3 rounded border border-slate-700">
                                        <div className="text-slate-100 font-semibold text-lg">{p.en}</div>
                                        <div className="text-white text-base mt-1">{p.zh}</div>
                                    </div>
                                ))}
                            </div>
                            <button onClick={() => setShowPhrases(false)} className="mt-3 bg-red-600 hover:bg-red-500 text-white py-2 rounded font-bold shadow-lg">Close</button>
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [topicIndex, setTopicIndex] = React.useState(0);
            const [timeLeft, setTimeLeft] = React.useState(600); 
            const [timerTotal, setTimerTotal] = React.useState(600);
            const [timerActive, setTimerActive] = React.useState(false);
            const [students, setStudents] = React.useState([]);
            const [newStudentName, setNewStudentName] = React.useState('');

            const topic = topicsData[topicIndex];

            React.useEffect(() => {
                let interval = null;
                if (timerActive && timeLeft > 0) {
                    interval = setInterval(() => setTimeLeft(t => t - 1), 1000);
                } else if (timeLeft === 0) {
                    setTimerActive(false);
                }
                return () => clearInterval(interval);
            }, [timerActive, timeLeft]);

            const formatTime = (seconds) => {
                const m = Math.floor(seconds / 60);
                const s = seconds % 60;
                return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            };

            const setTimer = (seconds) => {
                setTimeLeft(seconds);
                setTimerTotal(seconds);
                setTimerActive(false);
            };

            const handleAddStudent = () => {
                if (newStudentName.trim() === '') return;
                setStudents([...students, { id: Date.now(), name: newStudentName.trim(), team: null }]);
                setNewStudentName('');
            };

            const assignLastStudent = (team) => {
                const unassigned = students.filter(s => s.team === null);
                if (unassigned.length > 0) {
                    const studentToAssign = unassigned[unassigned.length - 1];
                    setStudents(students.map(s => s.id === studentToAssign.id ? { ...s, team } : s));
                } else if (students.length > 0) {
                    const lastStudent = students[students.length - 1];
                    setStudents(students.map(s => s.id === lastStudent.id ? { ...s, team } : s));
                }
            };

            const removeStudent = (id) => {
                setStudents(students.filter(s => s.id !== id));
            };

            const timePercentage = timerTotal > 0 ? timeLeft / timerTotal : 0;
            const redValue = Math.floor(60 * (1 - timePercentage)); 
            const bgStyle = {
                backgroundColor: `rgb(${15 + redValue}, 23, 42)`,
                transition: 'background-color 1s linear'
            };

            return (
                <div style={bgStyle} className="h-full w-full p-4 flex flex-col font-sans">
                    
                    {/* Fixed Height Header for Prompt (Keeps Layout Stable) */}
                    <div className="h-[26%] bg-slate-800/80 rounded-xl p-4 shadow-xl border border-slate-700 mb-3 flex flex-col justify-center flex-shrink-0 relative overflow-y-auto custom-scrollbar">
                        <div className="text-center w-full">
                            <h1 className="text-3xl font-extrabold text-white leading-tight mb-2 drop-shadow-md">
                                {topic.promptEn}
                            </h1>
                            <h2 className="text-2xl font-semibold text-amber-400 drop-shadow">
                                {topic.promptZh}
                            </h2>
                        </div>
                    </div>

                    {/* Main Layout: 3 Columns */}
                    <div className="flex flex-row flex-1 overflow-hidden space-x-3">
                        
                        {/* LEFT: Agree Team */}
                        <TeamColumn 
                            side="agree" 
                            topic={topic} 
                            students={students.filter(s => s.team === 'agree')} 
                        />

                        {/* CENTER: Timer & Controls */}
                        <div className="flex flex-col flex-1 h-full max-w-[40%]">
                            
                            {/* Topic Navigation */}
                            <div className="flex justify-between items-center mb-2 bg-slate-800/50 p-1.5 rounded-lg border border-slate-700">
                                <button onClick={() => setTopicIndex(i => (i > 0 ? i - 1 : topicsData.length - 1))} className="bg-slate-700 px-3 py-1 rounded text-xs font-bold hover:bg-slate-600 transition">Prev</button>
                                <div className="text-slate-300 text-sm font-semibold tracking-wider">TOPIC {topicIndex + 1} OF {topicsData.length}</div>
                                <button onClick={() => setTopicIndex(i => (i < topicsData.length - 1 ? i + 1 : 0))} className="bg-slate-700 px-3 py-1 rounded text-xs font-bold hover:bg-slate-600 transition">Next</button>
                            </div>

                            {/* Timer Component */}
                            <div className="bg-slate-800 rounded-xl p-3 flex flex-col items-center justify-center border-2 border-slate-700 shadow-[0_0_20px_rgba(0,0,0,0.5)] relative overflow-hidden flex-shrink-0">
                                <div className="absolute top-0 left-0 h-1.5 bg-emerald-500 transition-all duration-1000" style={{ width: `${timePercentage * 100}%` }}></div>
                                <div className="text-6xl font-extrabold font-mono tracking-widest mb-2 z-10 text-white drop-shadow-lg">
                                    {formatTime(timeLeft)}
                                </div>
                                <div className="flex space-x-2 z-10 mb-2">
                                    <button onClick={() => setTimer(300)} className="bg-slate-700 hover:bg-slate-600 px-3 py-1 text-xs font-bold rounded transition">5m</button>
                                    <button onClick={() => setTimer(600)} className="bg-slate-700 hover:bg-slate-600 px-3 py-1 text-xs font-bold rounded transition">10m</button>
                                    <button onClick={() => setTimer(900)} className="bg-slate-700 hover:bg-slate-600 px-3 py-1 text-xs font-bold rounded transition">15m</button>
                                </div>
                                <div className="flex space-x-2 z-10 w-full px-4">
                                    <button onClick={() => setTimerActive(!timerActive)} className={`flex-1 py-1.5 text-xs font-bold rounded uppercase tracking-wider transition ${timerActive ? 'bg-amber-500 hover:bg-amber-600 text-slate-900' : 'bg-emerald-600 hover:bg-emerald-500 text-white shadow-lg'}`}>
                                        {timerActive ? 'Pause' : 'Start Timer'}
                                    </button>
                                    <button onClick={() => setTimer(timerTotal)} className="bg-rose-600 hover:bg-rose-700 text-white px-4 py-1.5 text-xs font-bold rounded transition">Reset</button>
                                </div>
                            </div>

                            {/* Add Student Input */}
                            <div className="mt-3 flex flex-shrink-0 shadow-lg">
                                <input 
                                    type="text" 
                                    value={newStudentName}
                                    onChange={e => setNewStudentName(e.target.value)}
                                    onKeyPress={e => e.key === 'Enter' && handleAddStudent()}
                                    placeholder="Enter Debater Name..."
                                    className="flex-1 bg-slate-800 text-white p-2 rounded-l text-sm border-y border-l border-slate-600 focus:outline-none focus:border-blue-500"
                                />
                                <button onClick={handleAddStudent} className="bg-blue-600 hover:bg-blue-500 px-4 py-2 text-sm font-bold rounded-r border-y border-r border-blue-600 transition">Add</button>
                            </div>
                            
                            {/* Assign Last Student Buttons */}
                            <div className="flex space-x-2 mt-2 flex-shrink-0">
                                <button onClick={() => assignLastStudent('agree')} className="flex-1 bg-blue-600/80 hover:bg-blue-500 py-1.5 text-xs font-bold rounded shadow transition">Assign to Agree 👈</button>
                                <button onClick={() => assignLastStudent('disagree')} className="flex-1 bg-rose-600/80 hover:bg-rose-500 py-1.5 text-xs font-bold rounded shadow transition">👉 Assign to Disagree</button>
                            </div>

                            {/* Split Scoreboard Roster in the Middle */}
                            <div className="flex flex-1 mt-3 border-2 border-slate-700 rounded-lg overflow-hidden bg-slate-900/50 shadow-inner">
                                <div className="w-1/2 p-2 flex flex-col border-r-2 border-slate-700/50 bg-blue-900/10">
                                    <h4 className="text-center text-blue-400 font-bold mb-2 text-xs uppercase tracking-wider border-b border-blue-500/30 pb-1">Agree Roster</h4>
                                    <div className="flex-1 overflow-y-auto custom-scrollbar flex flex-col gap-1.5 pr-1">
                                        {students.filter(s => s.team === 'agree').map(s => (
                                            <div key={s.id} onClick={() => removeStudent(s.id)} title="Click to remove" className="text-white text-center bg-blue-600/20 hover:bg-red-600/40 py-1.5 text-sm rounded cursor-pointer transition border border-blue-500/20">
                                                {s.name}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div className="w-1/2 p-2 flex flex-col bg-rose-900/10">
                                    <h4 className="text-center text-rose-400 font-bold mb-2 text-xs uppercase tracking-wider border-b border-rose-500/30 pb-1">Disagree Roster</h4>
                                    <div className="flex-1 overflow-y-auto custom-scrollbar flex flex-col gap-1.5 pr-1">
                                        {students.filter(s => s.team === 'disagree').map(s => (
                                            <div key={s.id} onClick={() => removeStudent(s.id)} title="Click to remove" className="text-white text-center bg-rose-600/20 hover:bg-red-600/40 py-1.5 text-sm rounded cursor-pointer transition border border-rose-500/20">
                                                {s.name}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>

                        </div>

                        {/* RIGHT: Disagree Team */}
                        <TeamColumn 
                            side="disagree" 
                            topic={topic} 
                            students={students.filter(s => s.team === 'disagree')} 
                        />
                    </div>
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
