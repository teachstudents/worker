<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji Flashcard Champions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Fredoka', sans-serif;
            /* Animated gradient background with orange, black, and blue */
            background: linear-gradient(-45deg, #000000, #ea580c, #1e3a8a, #000000, #3b82f6, #ea580c);
            background-size: 400% 400%;
            animation: gradientBG 20s ease infinite;
            color: white;
            overflow-x: hidden;
            touch-action: manipulation;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .btn-game {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        
        .btn-game:active {
            transform: scale(0.95);
        }

        /* Animations */
        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            80% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop-in { animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }
        .animate-shake { animation: shake 0.4s ease-in-out; }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 15px rgba(255, 215, 0, 0.5); }
            50% { box-shadow: 0 0 30px rgba(255, 215, 0, 1); }
        }
        .animate-glow { animation: pulse-glow 2s infinite; }

        @keyframes progress {
            from { width: 100%; }
            to { width: 0%; }
        }
        .animate-progress { animation: progress linear forwards; }

        .emoji-shadow {
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.3));
        }

        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
        }
    </style>
</head>

        function getLabel(card) {
            // Arrays are 0-indexed, so level 1 is index 0
            return card.levels[appState.difficulty - 1];
        }

        function initAudio() {
            if (!appState.audioCtx) {
                appState.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (appState.audioCtx.state === 'suspended') {
                appState.audioCtx.resume();
            }
        }

        function playTone(freq, type, duration, vol=0.1) {
            if (!appState.audioCtx) return;
            const osc = appState.audioCtx.createOscillator();
            const gain = appState.audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, appState.audioCtx.currentTime);
            
            gain.gain.setValueAtTime(vol, appState.audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, appState.audioCtx.currentTime + duration);
            
            osc.connect(gain);
            gain.connect(appState.audioCtx.destination);
            osc.start();
            osc.stop(appState.audioCtx.currentTime + duration);
        }

        function playWinSound() {
            initAudio();
            setTimeout(() => playTone(523.25, 'sine', 0.2), 0);   // C5
            setTimeout(() => playTone(659.25, 'sine', 0.2), 100); // E5
            setTimeout(() => playTone(783.99, 'sine', 0.2), 200); // G5
            setTimeout(() => playTone(1046.50, 'sine', 0.4), 300); // C6
        }

        function playWrongSound() {
            initAudio();
            playTone(150, 'sawtooth', 0.3, 0.2);
            setTimeout(() => playTone(100, 'sawtooth', 0.4, 0.2), 150);
        }

        function playTickSound() {
            initAudio();
            playTone(800, 'triangle', 0.1, 0.05);

        const TARGET_VOICES = ["Remy", "Giuseppe", "Vivienne", "Florian", "Seraphina", "Emma", "Brian", "Andrew"];

        function loadVoices() {
            let voices = window.speechSynthesis.getVoices();
            if(voices.length > 0) {
                let foundVoices = [];
                // Look for specifically requested voices
                TARGET_VOICES.forEach(name => {
                    let match = voices.find(vo => vo.name.includes(name) && vo.lang.startsWith('en'));
                    if(match) foundVoices.push(match);
                });
                
                // Set the pool of available voices
                if(foundVoices.length > 0) {
                    appState.availableVoices = foundVoices;
                } else {
                    appState.availableVoices = voices.filter(vo => vo.lang.startsWith('en'));
                    if(appState.availableVoices.length === 0) appState.availableVoices = [voices[0]];
                }
                
                // Initialize current voice
                appState.currentVoice = appState.availableVoices[0];
            }
        }
        window.speechSynthesis.onvoiceschanged = loadVoices;

        function speak(text) {
            window.speechSynthesis.cancel(); // Stop current speech
            const utterance = new SpeechSynthesisUtterance(text);
            if (appState.currentVoice) utterance.voice = appState.currentVoice;
            utterance.rate = 0.9; // Slightly slower for ESL
            utterance.pitch = 1.1; // Friendly pitch
            window.speechSynthesis.speak(utterance);
        }

        function speakWithCallback(text, callback) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            if (appState.currentVoice) utterance.voice = appState.currentVoice;
            utterance.rate = 0.9;
            utterance.pitch = 1.1;

            let callbackFired = false;
            const fireCallback = () => {
                if(!callbackFired) {
                    callbackFired = true;
                    if(callback) callback();
                }
            };

            // Trigger callback when speaking completes
            utterance.onend = fireCallback;
            utterance.onerror = fireCallback;
            window.speechSynthesis.speak(utterance);

            // Safety fallback in case onend fails (common browser bug)
            const estimatedTime = (text.split(' ').length * 300) + 1500;
            setTimeout(fireCallback, estimatedTime);
        }

        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function createParticles(x, y, color) {
            const colors = ['#f43f5e', '#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', color || '#ffffff'];
            for (let i = 0; i < 40; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 20,
                    vy: (Math.random() - 0.5) * 20 - 5, // Upward bias
                    size: Math.random() * 10 + 5,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    life: 1,
                    decay: Math.random() * 0.02 + 0.015
                });
            }
        }

        function animateConfetti() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.5; // Gravity
                p.life -= p.decay;
                
                ctx.globalAlpha = Math.max(0, p.life);
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();

                if (p.life <= 0) particles.splice(i, 1);
            }
            requestAnimationFrame(animateConfetti);
        }
        animateConfetti();

        function triggerConfetti(e) {
            let x = window.innerWidth / 2;
            let y = window.innerHeight / 2;
            if(e && e.clientX) {
                x = e.clientX;
                y = e.clientY;
            } else if (e && e.target) {
                const rect = e.target.getBoundingClientRect();
                x = rect.left + rect.width / 2;
                y = rect.top + rect.height / 2;
            }
            createParticles(x, y);
        }

        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

                </div>
            `;
            
            // Set initial difficulty visual state
            appState.difficulty = 1;
        }

        function setDifficulty(level, btnElement) {
            playTickSound();
            appState.difficulty = level;
            
            // Reset styles for all diff buttons
            document.querySelectorAll('.diff-btn').forEach(btn => {
                btn.className = "diff-btn flex-1 bg-white/20 hover:bg-white/30 text-white border-2 border-white/30 font-bold py-2 px-3 rounded-xl transition text-sm md:text-base";
            });

            // Apply active styles
            btnElement.className = "diff-btn flex-1 bg-yellow-400 text-slate-900 border-2 border-yellow-500 font-bold py-2 px-3 rounded-xl transition shadow-md text-sm md:text-base";
        }

        function startGame(playersPerRound) {
            initAudio(); // Required user interaction to start Audio context
            playWinSound();
            
            appState.numPlayersPerRound = playersPerRound;
            appState.roster = [];
            
            let rosterInput = document.getElementById('roster-input').value.trim();
            // Split by newline OR comma
            let names = rosterInput.split(/[\n,]+/).map(n => n.trim()).filter(n => n);
            
            if (names.length === 0) {
                // Generate default names if empty
                for(let i=0; i<Math.max(playersPerRound, 5); i++) {
                    names.push(`student ${i+1}`);
                }
            }

            // Create global roster
            names.forEach((name, i) => {
                appState.roster.push({ id: i, name: name, score: 0 });
            });
            
            // Initial queue contains everyone
            appState.rosterQueue = [...appState.roster];

            // Shuffle the order of the themed decks to randomize the rounds
            appState.deck = shuffle([...THEMED_DECKS]);
            appState.currentRound = 0;
            
            startRound();
        }

        function startRound() {
            if (appState.currentRound >= TOTAL_ROUNDS) {
                renderChampion();
                return;
            }

            // Rotate the speaker voice for this round
            if (appState.availableVoices.length > 0) {
                appState.currentVoice = appState.availableVoices[appState.currentRound % appState.availableVoices.length];
            }

            appState.players = [];
            let N = appState.numPlayersPerRound;
            N = Math.min(N, appState.roster.length); // Cap at max roster size

            if (appState.rosterQueue.length >= N) {
                // Enough unplayed students in the queue
                appState.players = appState.rosterQueue.splice(0, N);
            } else {
                // Odd number left: Take remainder, fill rest with top scorers
                let remainder = appState.rosterQueue.splice(0, appState.rosterQueue.length);
                appState.players.push(...remainder);
                
                let numNeeded = N - appState.players.length;
                let eligibleFillers = [...appState.roster].filter(s => !appState.players.includes(s));
                
                // Sort by score descending to give top scorers the extra spot
                eligibleFillers.sort((a, b) => b.score - a.score);
                appState.players.push(...eligibleFillers.slice(0, numNeeded));
                
                // Refill the queue for next round, excluding current players
                appState.rosterQueue = [...appState.roster].filter(s => !appState.players.includes(s));
                appState.rosterQueue = shuffle(appState.rosterQueue);
            }

            // Assign active colors
            const activeColors = ['#3b82f6', '#10b981', '#ec4899'];
            appState.players.forEach((p, idx) => {
                p.color = activeColors[idx % activeColors.length];
            });

            // Extract the 10 cards for this specific themed round
            appState.roundCards = shuffle([...appState.deck[appState.currentRound]]);
            
            appState.currentCardIndex = 0;
            renderRoundIntro();
        }

        function renderRoundIntro() {
            let roundNum = appState.currentRound + 1;
            speak(`Round ${roundNum}! Let's learn 10 new words!`);
            
            app.innerHTML = `
                <div class="glass-panel p-12 rounded-3xl text-center animate-pop-in">
                    <h2 class="text-6xl font-bold text-yellow-300 mb-4 drop-shadow-lg">Round ${roundNum}</h2>
                    <p class="text-3xl font-bold text-white mb-8">Learn ${CARDS_PER_ROUND} New Words!</p>
                    <div class="text-[100px] animate-bounce">😃</div>
                </div>
            `;

            setTimeout(() => {
                showTeachCard();
            }, 3000);
        }

        function showTeachCard() {
            if (appState.currentCardIndex >= CARDS_PER_ROUND) {
                // Done teaching, start quiz
                prepQuizPhase();
                return;
            }

            const card = appState.roundCards[appState.currentCardIndex];
            const currentLabel = getLabel(card);
            
            app.innerHTML = `
                <div class="glass-panel w-full max-w-[59rem] h-[84vh] flex flex-col items-center justify-center p-8 rounded-3xl animate-pop-in relative overflow-hidden">
                    <div class="flex-1 flex items-center justify-center">
                        <div class="text-[172px] md:text-[260px] lg:text-[318px] leading-none emoji-shadow">${card.icon}</div>
                    </div>
                    <div class="flex-none mb-10 text-6xl md:text-8xl font-bold text-white tracking-wide bg-black/20 px-8 py-4 rounded-3xl shadow-inner text-center lowercase max-w-full truncate">
                        ${currentLabel}
                    </div>
                    
                    <!-- Progress Bar -->
                    <div class="absolute bottom-0 left-0 h-4 bg-yellow-400 animate-progress" style="animation-duration: ${TEACH_TIME_MS}ms;"></div>
                    
                    <div class="absolute top-4 right-6 text-2xl font-bold text-white/50">
                        ${appState.currentCardIndex + 1} / ${CARDS_PER_ROUND}
                    </div>
                </div>
            `;

            speak(currentLabel);

            appState.quizTimeout = setTimeout(() => {
                appState.currentCardIndex++;
                showTeachCard();
            }, TEACH_TIME_MS);
        }

        function prepQuizPhase() {
            clearTimeout(appState.quizTimeout);
            
            let names = appState.players.map(p => p.name).join(' and ');
            let promptText = `Come to the board, ${names}!`;
            speak(`Time to play! ${promptText}`);

            app.innerHTML = `
                <div class="glass-panel p-6 md:p-12 rounded-3xl text-center max-w-3xl w-full mx-auto animate-pop-in max-h-full overflow-y-auto">
                    <div class="text-6xl md:text-8xl mb-4">🏃‍♂️🏃‍♀️</div>
                    <h2 class="text-4xl md:text-5xl font-bold text-yellow-300 mb-6 drop-shadow-lg leading-tight">To the Board!</h2>
                    <p class="text-2xl md:text-3xl text-white font-bold mb-8 md:mb-10 leading-snug">${promptText}</p>
                    <button onclick="startQuiz()" class="btn-game bg-green-500 hover:bg-green-400 text-white font-bold py-4 md:py-6 px-10 md:px-12 rounded-full text-3xl md:text-4xl shadow-xl border-b-8 border-green-700 animate-pulse">
                        READY!
                    </button>
                </div>
            `;
        }

        function startQuiz() {
            playTickSound();
            // Generate 10 questions for this round based on roundCards
            appState.quizQuestions = [];
            let shuffledRound = shuffle([...appState.roundCards]);
            
            shuffledRound.forEach(target => {
                // Pick 2 wrong answers from the CURRENT round to reinforce learning
                let others = appState.roundCards.filter(c => c.id !== target.id);
                others = shuffle(others);
                
                // Options will be shuffled individually per player
                let options = [target, others[0], others[1]];
                
                appState.quizQuestions.push({
                    target: target,
                    options: options
                });
            });

            appState.currentCardIndex = 0;
            renderQuizScreen();
        }

        function handleTimeout() {
            document.querySelectorAll('button').forEach(b => b.disabled = true);
            playWrongSound();
            
            app.classList.add('animate-shake');
            setTimeout(() => app.classList.remove('animate-shake'), 1000);

            speakWithCallback("time is up!", () => {
                // Advance after speech is done
                setTimeout(() => {
                    appState.currentCardIndex++;
                    renderQuizScreen();
                }, 1000);
            });
        }

        function renderQuizScreen() {
            if (appState.currentCardIndex >= CARDS_PER_ROUND) {
                endRound();
                return;
            }

            clearTimeout(appState.quizRoundTimeout);

            const q = appState.quizQuestions[appState.currentCardIndex];
            
            // Build Player Zones
            let zonesHtml = '';
            let gridCols = appState.players.length === 1 ? 'grid-cols-1' : appState.players.length === 2 ? 'grid-cols-2' : 'grid-cols-3';
            
            appState.players.forEach((player, pIdx) => {
                let btnsHtml = '';
                
                // Shuffle options specifically for this player so ABC order differs per person
                let playerOptions = shuffle([...q.options]);
                
                playerOptions.forEach((opt, oIdx) => {
                    btnsHtml += `
                        <button onclick="handleAnswer(${pIdx}, '${opt.id}', '${q.target.id}', event, this)" 
                                class="player-btn-${pIdx} w-full flex-1 flex items-center justify-center text-center py-2 md:py-3 px-1 mb-2 bg-white text-slate-800 font-bold text-3xl md:text-4xl lg:text-5xl rounded-2xl shadow-md border-b-4 border-slate-300 hover:bg-slate-50 transition-all active:scale-95 leading-tight lowercase h-full min-h-[50px] overflow-hidden break-words">
                            ${getLabel(opt)}
                        </button>
                    `;
                });

                zonesHtml += `
                    <div class="flex flex-col items-center p-2 lg:p-4 rounded-3xl h-full" style="background: rgba(0,0,0,0.2);">
                        <div class="text-xl md:text-2xl lg:text-3xl font-bold mb-2 py-1 px-3 md:px-4 rounded-full shadow-inner whitespace-nowrap overflow-hidden text-ellipsis max-w-full transition-all" style="background: ${player.color}; color: white;">
                            ${player.name}: <span id="score-${pIdx}" class="transition-all inline-block">${player.score}</span>
                        </div>
                        <div class="w-full flex-grow flex flex-col justify-between gap-1 h-full">
                            ${btnsHtml}
                        </div>
                    </div>
                `;
            });

            app.innerHTML = `
                <div class="w-full h-full flex flex-col relative animate-pop-in overflow-hidden">
                    <!-- 15 Second Timer Bar -->
                    <div class="absolute top-0 left-0 w-full h-2 lg:h-3 bg-black/30 rounded-full overflow-hidden z-20">
                        <div id="quiz-timer-bar" class="h-full bg-red-500 animate-progress origin-left" style="animation-duration: 15000ms;"></div>
                    </div>

                    <!-- Progress -->
                    <div class="absolute top-4 right-4 text-xl md:text-2xl lg:text-3xl font-bold bg-black/30 px-4 md:px-6 py-2 rounded-full z-20 text-white">
                        ${appState.currentCardIndex + 1} / 10
                    </div>

                    <!-- Top: Target Emoji -->
                    <div class="flex-1 min-h-0 flex items-start justify-center p-2 mt-8 md:mt-6 lg:mt-4">
                        <div class="bg-white/10 rounded-full aspect-square w-[188px] h-[188px] md:w-[231px] md:h-[231px] lg:w-[278px] lg:h-[278px] flex items-center justify-center shadow-2xl backdrop-blur-sm border-4 border-white/20">
                            <span class="text-[103px] md:text-[131px] lg:text-[160px] leading-none emoji-shadow block animate-glow">${q.target.icon}</span>
                        </div>
                    </div>
                    
                    <!-- Bottom: Player Zones -->
                    <div class="flex-none grid ${gridCols} gap-2 lg:gap-4 w-full max-w-7xl mx-auto h-[55%] lg:h-[50%] pb-2 px-2">
                        ${zonesHtml}
                    </div>
                </div>
            `;
            
            // Start the 15 second countdown
            appState.quizRoundTimeout = setTimeout(() => {
                handleTimeout();
            }, 15000);
        }

        function handleAnswer(pIdx, selectedId, targetId, event, btnElement) {
            if(btnElement.disabled) return; // Prevent double clicks
            
            const isCorrect = selectedId === targetId;
            const player = appState.players[pIdx];

            if (isCorrect) {
                // Pause Timer visually and clear timeout
                const timerBar = document.getElementById('quiz-timer-bar');
                if(timerBar) timerBar.style.animationPlayState = 'paused';
                clearTimeout(appState.quizRoundTimeout);

                // Disable all buttons immediately
                document.querySelectorAll('button').forEach(b => b.disabled = true);
                
                // Visual feedback on button
                btnElement.classList.remove('bg-white', 'text-slate-800', 'border-slate-300');
                btnElement.classList.add('bg-green-400', 'text-white', 'border-green-600', 'animate-pulse');
                
                // Add Score
                player.score += 10;
                document.getElementById(`score-${pIdx}`).innerText = player.score;

                // Praise and Sound
                const praises = ["great job", "awesome", "excellent", "fantastic", "spot on"];
                let praise = praises[Math.floor(Math.random() * praises.length)];
                
                let targetObj = appState.quizQuestions[appState.currentCardIndex].target;
                
                playWinSound();
                triggerConfetti(event);

                // Sync UI transition AFTER speech + 3 seconds delay
                speakWithCallback(`${praise}, ${player.name}! it is the ${getLabel(targetObj)}.`, () => {
                    setTimeout(() => {
                        appState.currentCardIndex++;
                        renderQuizScreen();
                    }, 3000); // Wait 3 seconds AFTER speaking is finished
                });

            } else {
                playWrongSound();

                // Disable all buttons for this player so they don't get a second chance
                document.querySelectorAll(`.player-btn-${pIdx}`).forEach(btn => {
                    btn.disabled = true;
                    if (btn !== btnElement) {
                        btn.classList.add('opacity-50');
                        btn.classList.remove('hover:bg-slate-50', 'active:scale-95');
                    }
                });

                btnElement.classList.add('animate-shake', 'bg-red-300', 'text-red-900', 'border-red-500');
                btnElement.classList.remove('bg-white');
                
                // Reward other players with points for the mistake
                appState.players.forEach((otherPlayer, otherIdx) => {
                    if (otherIdx !== pIdx) {
                        otherPlayer.score += 10;
                        let scoreEl = document.getElementById(`score-${otherIdx}`);
                        if(scoreEl) {
                            scoreEl.innerText = otherPlayer.score;
                            scoreEl.classList.add('text-green-300', 'scale-150');
                            setTimeout(() => scoreEl.classList.remove('text-green-300', 'scale-150'), 400);
                        }
                    }
                });
                
                setTimeout(() => {
                    btnElement.classList.remove('animate-shake');
                }, 400);
            }
        }

        function endRound() {
            playWinSound();
            speak(`round complete! great effort everyone!`);
            
            // Show the standings of ALL students in the roster
            let standings = [...appState.roster].sort((a,b) => b.score - a.score);
            let leaderHtml = standings.slice(0, 5).map((p, i) => `
                <div class="flex justify-between items-center text-lg md:text-2xl font-bold bg-white/10 px-4 md:px-8 py-2 md:py-3 rounded-2xl mb-2">
                    <span class="truncate pr-4">${i+1}. ${p.name}</span>
                    <span class="text-yellow-300 shrink-0">${p.score} pts</span>
                </div>
            `).join('');

            app.innerHTML = `
                <div class="glass-panel p-6 md:p-12 rounded-3xl text-center max-w-2xl w-full mx-auto animate-pop-in max-h-full overflow-y-auto">
                    <div class="text-5xl md:text-7xl mb-4">🏆</div>
                    <h2 class="text-2xl md:text-4xl font-bold text-white mb-6">Round ${appState.currentRound + 1} Complete!</h2>
                    <h3 class="text-xl text-yellow-300 font-bold mb-4">Class Leaderboard (Top 5)</h3>
                    <div class="mb-6 w-full text-left">
                        ${leaderHtml}
                    </div>
                    <button onclick="nextRound()" class="btn-game bg-blue-500 hover:bg-blue-400 text-white font-bold py-3 md:py-5 px-8 md:px-10 rounded-2xl text-xl md:text-3xl shadow-lg border-b-4 border-blue-700 w-full">
                        NEXT ROUND ➡️
                    </button>
                </div>
            `;
            
            triggerConfetti();
        }

        function nextRound() {
            playTickSound();
            appState.currentRound++;
            startRound();
        }

        function renderChampion() {
            let standings = [...appState.roster].sort((a,b) => b.score - a.score);
            let winner = standings[0];
            
            // Generate huge confetti
            let confInterval = setInterval(() => {
                createParticles(Math.random() * window.innerWidth, window.innerHeight);
            }, 300);

            setTimeout(() => clearInterval(confInterval), 5000);
            
            playWinSound();
            setTimeout(() => playWinSound(), 500);
            setTimeout(() => playWinSound(), 1000);
            
            speak(`game over! the champion is ${winner.name} with ${winner.score} points! congratulations!`);

            let standingsHtml = standings.map((p, i) => `
                <div class="flex justify-between items-center text-lg md:text-2xl font-bold ${i===0 ? 'bg-yellow-400/20 border-2 border-yellow-400' : 'bg-white/10'} px-4 md:px-6 py-2 md:py-3 rounded-2xl mb-2">
                    <span class="truncate pr-4">${i+1}. ${p.name}</span>
                    <span class="shrink-0">${p.score} pts</span>
                </div>
            `).join('');

            app.innerHTML = `
                <div class="glass-panel p-6 md:p-8 rounded-3xl text-center max-w-3xl w-full mx-auto animate-pop-in max-h-full flex flex-col mt-4">
                    <div class="text-[60px] md:text-[90px] mb-2 animate-bounce leading-none shrink-0">👑</div>
                    <h1 class="text-3xl md:text-5xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-yellow-200 to-yellow-500 mb-2 shrink-0">
                        CHAMPION!
                    </h1>
                    <h2 class="text-2xl md:text-4xl font-bold text-white mb-6 shrink-0">${winner.name}</h2>
                    
                    <div class="w-full mb-6 text-left flex-1 overflow-y-auto pr-2">
                        ${standingsHtml}
                    </div>

                    <button onclick="location.reload()" class="shrink-0 btn-game bg-pink-500 hover:bg-pink-400 text-white font-bold py-3 md:py-5 px-8 md:px-12 rounded-3xl text-xl md:text-2xl shadow-xl border-b-8 border-pink-700">
                        PLAY AGAIN 🔄
                    </button>
                </div>
            `;
        }

        // Run setup
        window.onload = () => {
            renderMenu();
            loadVoices();
        };

    </script>
</body>
</html>
