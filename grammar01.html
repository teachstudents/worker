<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joel Mitchell's English Grammar (A2-C1)</title>
    <style>
        /* CSS Variables & Global Settings */
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --bg-color: #F8FAFC;
            --sidebar-bg: #FFFFFF;
            --text-main: #1E293B;
            --text-muted: #64748B;
            --border-color: #E2E8F0;
            --success: #10B981;
            --error: #EF4444;
            --card-bg: #FFFFFF;
            --radius: 12px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --lvl-a1: #10B981;
            --lvl-a2: #3B82F6;
            --lvl-b1: #8B5CF6;
            --lvl-b2: #EC4899;
            --lvl-c1: #F43F5E;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* 20/80 Layout */
        #app-container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* 20% Sidebar: Grammar Curriculum Hierarchy */
        aside {
            width: 22%;
            min-width: 280px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            z-index: 50;
            transition: transform 0.3s ease;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            background: var(--sidebar-bg);
            flex-shrink: 0;
        }

        .sidebar-header h1 {
            font-size: 1.25rem;
            color: var(--primary);
            font-weight: 800;
        }

        #syllabus-list {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 20px;
        }

        /* Hierarchical Menu Styles */
        .domain-header {
            padding: 16px 20px;
            font-size: 0.9rem;
            text-transform: uppercase;
            font-weight: 800;
            color: var(--text-main);
            border-bottom: 1px solid #F1F5F9;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--sidebar-bg);
            position: sticky;
            top: 0;
            z-index: 5;
            transition: background 0.2s;
        }
        .domain-header:hover { background: #F8FAFC; color: var(--primary); }
        .domain-header.active { background: #EEF2FF; color: var(--primary); border-left: 4px solid var(--primary); padding-left: 16px; }

        .sub-rules-container { display: none; background: #F8FAFC; }
        .sub-rules-container.open { display: block; }

        .rule-btn {
            width: 100%;
            text-align: left;
            padding: 10px 20px 10px 40px;
            background: none;
            border: none;
            border-bottom: 1px solid #F1F5F9;
            font-size: 0.95rem;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .rule-btn:hover { color: var(--primary); background: #F1F5F9; }
        .rule-btn.active { color: var(--primary); font-weight: 700; background: #E0E7FF; }
        .mastery-indicator { color: var(--success); font-weight: bold; display: none; font-size: 1.1rem; }
        .rule-btn.is-mastered .mastery-indicator { display: block; }

        /* 80% Main Content Area */
        main {
            width: 78%;
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            background-color: var(--bg-color);
        }

        /* Top Bar with Navigation */
        .top-bar {
            padding: 15px 24px;
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .top-bar-left { display: flex; align-items: center; gap: 15px; }
        .mobile-menu-btn {
            display: none; background: none; border: none;
            font-size: 1.5rem; cursor: pointer; color: var(--text-main);
        }

        .nav-controls {
            display: flex;
            gap: 10px;
        }

        .nav-btn {
            background: #F1F5F9;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .nav-btn:hover:not(:disabled) { background: #E2E8F0; color: var(--primary); }
        .nav-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .nav-btn.home-btn { background: var(--primary); color: white; border-color: var(--primary); }
        .nav-btn.home-btn:hover { background: var(--primary-hover); }

        .content-area {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }
        .inner-content { max-width: 850px; margin: 0 auto; }

        /* Logical Color Coding Keywords */
        .keyword { font-weight: 800; background-color: #FCE7F3; color: #BE185D; padding: 2px 6px; border-radius: 4px; }
        .blue { color: #2563EB; font-weight: bold; }   /* Subjects / Nouns */
        .green { color: #16A34A; font-weight: bold; }  /* Verbs / Actions */
        .orange { color: #EA580C; font-weight: bold; } /* Objects / Adjectives / Adverbs */
        .purple { color: #8B5CF6; font-weight: bold; } /* Prepositions / Conjunctions / Connectors */
        .red { color: #DC2626; font-weight: bold; }    /* Negatives / Warnings / Exceptions */

        /* Rule Card */
        .rule-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 30px;
            box-shadow: var(--shadow);
            margin-bottom: 30px;
            border-top: 6px solid var(--primary);
        }
        .rule-card h3 { font-size: 2rem; color: var(--text-main); margin-bottom: 20px; font-weight: 800; }
        
        /* Font size increased 50% from 1.25rem to 1.875rem */
        .rule-card p { font-size: 1.875rem; line-height: 1.7; color: #334155; margin-bottom: 20px; }
        
        /* Font size increased 50% to 1.875rem and italics removed */
        .rule-card .example {
            background: #F8FAFC; padding: 20px; border-radius: 8px;
            border-left: 4px solid #CBD5E1; font-style: normal; font-size: 1.875rem;
            display: flex; align-items: center; justify-content: space-between;
        }
        
        .practice-btn {
            background: var(--primary); color: white; border: none;
            padding: 12px 28px; font-size: 1.1rem; font-weight: 700;
            border-radius: 8px; cursor: pointer; margin-top: 10px;
            transition: background 0.2s; box-shadow: 0 2px 4px rgba(79, 70, 229, 0.3);
        }
        .practice-btn:hover { background: var(--primary-hover); }

        .speak-btn {
            background: #DBEAFE; color: #1D4ED8; border: none; cursor: pointer;
            border-radius: 50%; width: 50px; height: 50px; display: flex;
            align-items: center; justify-content: center; font-size: 1.5rem;
            transition: all 0.2s; flex-shrink: 0; margin-left: 15px;
        }
        .speak-btn:hover { transform: scale(1.1); background: #BFDBFE; }

        /* Practice Panel */
        .practice-panel {
            display: none; background: white; padding: 30px;
            border-radius: var(--radius); box-shadow: var(--shadow);
            margin-top: 20px; border: 2px solid #E2E8F0;
            animation: fadeIn 0.3s ease;
        }
        .practice-panel.visible { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .practice-item { margin-bottom: 30px; padding-bottom: 30px; border-bottom: 1px dashed var(--border-color); }
        .practice-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .practice-prompt { font-weight: 700; margin-bottom: 16px; color: var(--text-main); font-size: 1.15rem; }

        /* Interactions */
        .reveal-btn, .check-btn {
            background: var(--text-main); color: white; border: none;
            padding: 10px 20px; border-radius: 6px; cursor: pointer;
            font-weight: 600; font-size: 1rem;
        }
        .reveal-btn:hover, .check-btn:hover { background: #334155; }
        .reveal-answer {
            display: none; margin-top: 15px; padding: 15px; background: #D1FAE5;
            color: #065F46; border-radius: 8px; font-weight: 700; font-size: 1.1rem;
            border-left: 4px solid var(--success); position: relative;
        }
        .reveal-answer.visible { display: block; }

        .text-input {
            padding: 10px 15px; border: 2px solid var(--border-color);
            border-radius: 6px; font-size: 1.1rem; width: 250px;
            outline: none; margin-right: 10px;
        }
        .text-input:focus { border-color: var(--primary); }
        .feedback-msg { margin-top: 10px; font-weight: 700; font-size: 1.05rem; position: relative; display: inline-block;}

        /* Drag & Drop Tap-To-Place */
        .dd-sentence { line-height: 2.5; font-size: 1.15rem; margin-bottom: 15px; }
        .drop-zone {
            display: inline-block; min-width: 100px; height: 38px;
            border: 2px dashed #94A3B8; border-radius: 6px; margin: 0 8px;
            vertical-align: middle; text-align: center; line-height: 34px;
            cursor: pointer; background: #F8FAFC; font-weight: bold;
            color: var(--primary); transition: all 0.2s; position: relative;
        }
        .drop-zone.filled { border-style: solid; background: #EEF2FF; border-color: var(--primary); }
        .drop-zone.correct { border-color: var(--success); background: #D1FAE5; color: #065F46; }
        .drop-zone.incorrect { border-color: var(--error); background: #FEE2E2; color: #B91C1C; }
        
        .tokens-area {
            display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px;
            padding: 15px; background: #F1F5F9; border-radius: 8px;
        }
        .draggable-token {
            padding: 8px 16px; background: white; border: 2px solid var(--border-color);
            border-radius: 20px; cursor: pointer; user-select: none;
            font-weight: 600; font-size: 1rem; transition: all 0.2s;
        }
        .draggable-token.selected { background: var(--primary); color: white; border-color: var(--primary); transform: scale(1.05); }

        /* MCQ & New Practice Types CSS */
        .mcq-btn {
            background: #F8FAFC; border: 2px solid var(--border-color);
            padding: 12px 20px; border-radius: 8px; text-align: left;
            font-size: 1.1rem; cursor: pointer; transition: all 0.2s;
            color: var(--text-main); font-weight: 600; width: 100%;
        }
        .mcq-btn:hover:not(:disabled) { border-color: var(--primary); background: #EEF2FF; }
        .mcq-btn.correct { background: #D1FAE5; border-color: var(--success); color: #065F46; }
        .mcq-btn.incorrect { background: #FEE2E2; border-color: var(--error); color: #B91C1C; }
        .mcq-btn:disabled { cursor: not-allowed; opacity: 0.9; }

        /* Sparkle Effects */
        .sparkle-particle {
            position: absolute;
            width: 8px; height: 8px;
            background-color: #FBBF24;
            border-radius: 50%;
            box-shadow: 0 0 10px #FBBF24, 0 0 20px #F59E0B;
            pointer-events: none;
            z-index: 100;
            animation: pop 0.8s ease-out forwards;
        }
        @keyframes pop {
            0% { transform: scale(0) translateY(0); opacity: 1; }
            100% { transform: scale(1.5) translateY(-40px); opacity: 0; }
        }

        @media (max-width: 1024px) {
            aside { position: absolute; height: 100%; width: 320px; transform: translateX(-100%); box-shadow: 4px 0 15px rgba(0,0,0,0.1); }
            aside.open { transform: translateX(0); }
            main { width: 100%; }
            .mobile-menu-btn { display: block; }
            .nav-controls { flex-wrap: wrap; }
            .nav-btn { padding: 6px 10px; font-size: 0.85rem; }
        }
    </style>
</head>
<body>

<div id="app-container">
    <aside id="sidebar">
        <div class="sidebar-header">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h1>Grammar Curriculum</h1>
                <button id="close-sidebar" class="mobile-menu-btn" style="margin:0;">&times;</button>
            </div>
        </div>
        <div id="syllabus-list"></div>
    </aside>

    <main>
        <div class="top-bar">
            <div class="top-bar-left">
                <button id="open-sidebar" class="mobile-menu-btn">&#9776;</button>
                <div class="nav-controls">
                    <button id="btn-home" class="nav-btn home-btn">🏠 Home</button>
                    <button id="btn-prev" class="nav-btn">◀ Back</button>
                    <button id="btn-next" class="nav-btn">Next ▶</button>
                </div>
            </div>
            <h2 style="font-size: 1.1rem; font-weight: 600; color: var(--text-muted); display: none;" id="top-bar-title">Dashboard</h2>
        </div>
        
        <div class="content-area">
            <div class="inner-content" id="content-area">
                <!-- Content Injected Here -->
            </div>
        </div>
    </main>
</div>

<script>
const HIERARCHY = [
    { domain: "Sentence Structure", rules: ["S–V–O word order", "Adjective position", "Adverb position", "Coordination", "Subordination", "Fronting", "Complex sentences", "Cleft structures", "Inversion", "Participle clause compression"] },
    { domain: "Nouns & Noun Phrases", rules: ["Countable nouns", "Uncountable nouns", "Regular plurals", "Irregular plurals", "Determiners", "Quantifiers", "Possessives", "Partitives", "Complex noun phrases", "Nominalization", "Generic reference"] },
    { domain: "Articles", rules: ["Indefinite article", "Definite article", "Zero article", "First vs. subsequent mention", "Geographical article rules", "Institutional zero article", "Abstract noun article rules"] },
    { domain: "Verbs: Tense & Aspect", rules: ["Present simple", "Present continuous", "Past simple", "Past continuous", "Present perfect simple", "Present perfect continuous", "Past perfect", "Future forms", "Aspect distinctions"] },
    { domain: "Voice", rules: ["Basic passive", "Passive with modals", "Passive with perfect aspect", "Passive reporting structures", "Complex passive chains", "Causatives"] },
    { domain: "Modals", rules: ["Ability", "Permission", "Obligation", "Advice", "Possibility", "Deduction", "Modal perfects", "Register-sensitive modals"] },
    { domain: "Non-Finite Verb Forms", rules: ["To-infinitive", "Bare infinitive", "Gerunds", "Verb patterns", "Perfect infinitive", "Passive infinitive", "Reduced clauses"] },
    { domain: "Adjectives & Adverbs", rules: ["Comparative forms", "Superlative forms", "Adjective order", "Adverb frequency rules", "Intensifiers", "Adjective complementation", "Adverb fronting", "Stance adverbs", "Adjective phrase expansion"] },
    { domain: "Clauses", rules: ["Noun Clauses", "Relative Clauses", "Adverbial Clauses", "Conditionals"] },
    { domain: "Reported Speech", rules: ["Reported statements", "Reported questions", "Backshifting", "Reporting verbs", "Reporting modals", "Complex reporting structures"] },
    { domain: "Prepositions", rules: ["Time", "Place", "Movement", "Prepositions after adjectives", "Prepositions after verbs", "Multi-word prepositions", "Abstract prepositional phrases"] },
    { domain: "Punctuation & Cohesion", rules: ["Full stops", "Commas in lists", "Commas with clauses", "Semi-colons", "Colons", "Dashes", "Cohesive devices", "Paragraph connectors"] },
    { domain: "Adverb Placement Exceptions", rules: ["Adverbs cannot split verb + object", "Adverb particles CAN split phrasal verbs + object", "Frequency adverbs follow first auxiliary"] },
    { domain: "Some/Any Exceptions", rules: ["Use SOME in questions making offers", "ANY in if-clauses regardless of meaning", "SOME in questions expecting 'yes'"] },
    { domain: "Question Formation Exceptions", rules: ["Negative questions imply expected agreement", "Tag question: I am → aren't I", "No inversion in embedded questions", "Subject questions need no auxiliary"] },
    { domain: "Modal/Aspect Exceptions", rules: ["Would cannot express past states"] },
    { domain: "Modal Exceptions", rules: ["Needn't have vs. didn't need to", "Mustn't vs. don't have to"] }
];

const pDrag = (prompt, text, answer, tokens) => ({ type: "drag-drop", prompt, items: [{ text, answer }], tokens });
const pReveal = (prompt, sentence, answer) => ({ type: "reveal", prompt, sentence, answer });
const pInput = (prompt, sentence, answer) => ({ type: "input", prompt, sentence, answer });
const pMCQ = (prompt, question, options, correctIndex, explanation) => ({ type: "mcq", prompt, question, options, correctIndex, explanation });
const pErrorCorrect = (prompt, wrongSentence, correctSentence, explanation) => ({ type: "error-correct", prompt, wrongSentence, correctSentence, explanation });
const pTransform = (prompt, original, hint, correct) => ({ type: "transform", prompt, original, hint, answer: correct });

/**
 * 2. COMPREHENSIVE GRAMMAR RULES DATABASE (92 ITEMS)
 * Color Coding Standard: 
 * BLUE: Subjects/Nouns | GREEN: Verbs/Actions | ORANGE: Objects/Modifiers
 * PURPLE: Connectors/Prepositions | RED: Negatives/Exceptions
 */
const GRAMMAR_RULES = [
    // === SENTENCE STRUCTURE (10 RULES) ===
    { 
        id: "svo-word", 
        domain: "Sentence Structure", 
        rule: "S–V–O word order", 
        level: "A2", 
        simplifiedRule: "<span class='keyword'>Always</span> put the <span class='blue'>Subject</span> first, then the <span class='green'>Verb</span>, then the <span class='orange'>Object</span> → Who does what to whom.", 
        example: "<span class='blue'>Giuseppe</span> <span class='green'>finished</span> his <span class='orange'>math homework</span>.", 
        practice: [
            pDrag("Reorder the words to form an S-V-O sentence.", "___ ___ ___", "Remy likes biology", ["biology", "likes", "Remy"]),
            pInput("Type the correct subject for this sentence.", "___ studies every evening.", "Emma"),
            pReveal("Reveal the correct object.", "Vivienne bought (a new / new a) backpack.", "a new")
        ],
        level: "A2"
    },
    { 
        id: "adj-pos", 
        domain: "Sentence Structure", 
        rule: "Adjective position", 
        level: "A2", 
        simplifiedRule: "<span class='keyword'>Place</span> <span class='orange'>adjectives</span> before <span class='blue'>nouns</span> or after the <span class='green'>verb</span> 'to be' → to describe things.", 
        example: "<span class='blue'>Emma</span> <span class='green'>drew</span> a <span class='orange'>beautiful</span> <span class='blue'>comic</span>. The <span class='blue'>comic</span> <span class='green'>is</span> <span class='orange'>beautiful</span>.", 
        practice: [
            pInput("Type the correct adjective placement.", "William is wearing a (blue shirt / shirt blue).", "blue shirt"),
            pDrag("Select the correct position.", "She has ___ hair.", "long brown", ["brown long", "long brown", "brownly long"]),
            pReveal("Reveal the correct post-noun adjective.", "The movie was (amazing / amazingly).", "amazing")
        ],
        level: "A2"
    },
    { 
        id: "adv-pos", 
        domain: "Sentence Structure", 
        rule: "Adverb position", 
        level: "B1", 
        simplifiedRule: "<span class='keyword'>Place</span> <span class='orange'>adverbs of frequency</span> before <span class='green'>main verbs</span> but after the <span class='green'>verb</span> 'to be'.", 
        example: "<span class='blue'>Remy</span> <span class='orange'>always</span> <span class='green'>studies</span>, but <span class='blue'>Giuseppe</span> <span class='green'>is</span> <span class='orange'>rarely</span> on time.", 
        practice: [
            pReveal("Reveal the correct adverb placement.", "Brian (forgets always / always forgets) his calculator.", "always forgets"),
            pInput("Type 'often' in the correct position.", "She ___ arrives early.", "often"),
            pDrag("Select the correct placement.", "They are ___ late.", "sometimes", ["sometimes", "some times", "time some"])
        ],
        level: "B1"
    },
    { 
        id: "coord", 
        domain: "Sentence Structure", 
        rule: "Coordination", 
        level: "B1", 
        simplifiedRule: "Link equal clauses using <span class='purple'>conjunctions (and, but, or, so, yet)</span>.", 
        example: "<span class='blue'>Vivienne</span> <span class='green'>studied</span> hard, <span class='purple'>so</span> she <span class='green'>passed</span> the geography exam.", 
        practice: [
            pDrag("Choose the correct coordinator.", "Emma loves art, ___ she dislikes math.", "but", ["so", "but", "or"]),
            pInput("Type the coordinator showing result.", "It rained, ___ we stayed inside.", "so"),
            pReveal("Reveal the contrast coordinator.", "He wanted to go, (and / but) he was tired.", "but")
        ],
        level: "B1"
    },
    { 
        id: "subord", 
        domain: "Sentence Structure", 
        rule: "Subordination", 
        level: "B1", 
        simplifiedRule: "Connect a dependent clause using a <span class='purple'>subordinator (because, although, when)</span>.", 
        example: "<span class='purple'>Although</span> <span class='blue'>Giuseppe</span> <span class='green'>was</span> tired, he <span class='green'>finished</span> his science project.", 
        practice: [
            pInput("Type the correct subordinator (because/although).", "Remy stayed after school ___ she had a club meeting.", "because"),
            pDrag("Select the time subordinator.", "___ the bell rang, we left.", "When", ["Because", "When", "Although"]),
            pReveal("Reveal the contrast subordinator.", "(Although / Because) it was cold, they played outside.", "Although")
        ],
        level: "B1"
    },
    { 
        id: "fronting", 
        domain: "Sentence Structure", 
        rule: "Fronting", 
        level: "B2", 
        simplifiedRule: "<span class='keyword'>Move</span> <span class='orange'>time or place phrases</span> to the front of the sentence for emphasis.", 
        example: "<span class='orange'>In the middle of the exam</span>, the fire alarm <span class='green'>rang</span>.", 
        practice: [
            pReveal("Tap to see the fronted phrase.", "What emphasizes the time? (On Monday, we have a test / We have a test on Monday).", "On Monday, we have a test"),
            pInput("Front the place phrase.", "___, we found the lost keys.", "Under the desk"),
            pDrag("Select the fronted element.", "___ did she realize her mistake.", "Only then", ["She only then", "Only then", "Then only"])
        ],
        level: "B2"
    },
    { 
        id: "complex", 
        domain: "Sentence Structure", 
        rule: "Complex sentences", 
        level: "B2", 
        simplifiedRule: "Combine an independent clause with dependent clauses using <span class='purple'>connectors</span> for advanced writing.", 
        example: "<span class='blue'>Remy</span>, <span class='purple'>who</span> <span class='green'>loves</span> acting, <span class='green'>joined</span> the drama club <span class='purple'>because</span> it's fun.", 
        practice: [
            pDrag("Complete the complex sentence.", "Vivienne failed the quiz ___ she didn't study.", "because", ["because", "so", "and"]),
            pInput("Add a relative clause.", "The teacher ___ teaches math is strict.", "who"),
            pReveal("Reveal the subordinate clause marker.", "She succeeded (because / so) she practiced daily.", "because")
        ],
        level: "B2"
    },
    { 
        id: "cleft", 
        domain: "Sentence Structure", 
        rule: "Cleft structures", 
        level: "C1", 
        simplifiedRule: "Use <span class='purple'>It is/was... who/that</span> to focus deeply on a specific piece of information.", 
        example: "<span class='purple'>It was</span> <span class='blue'>Mr. Lee</span> <span class='purple'>who</span> <span class='green'>gave</span> us the extra homework.", 
        practice: [
            pInput("Complete the cleft sentence.", "It ___ Emma who won the art competition.", "was"),
            pDrag("Select the cleft marker.", "___ was the principal who announced the change.", "It", ["That", "It", "This"]),
            pReveal("Reveal the focused element.", "It was (yesterday / the exam) that mattered most.", "the exam")
        ],
        level: "C1"
    },
    { 
        id: "inversion", 
        domain: "Sentence Structure",

const ALL_RULES = [...GRAMMAR_RULES, ...EXCEPTION_RULES];

    setTimeout(() => {

let currentIndex = -1;
let masteredRules = []; 

const DOM = {
    sidebarList: document.getElementById('syllabus-list'),
    contentArea: document.getElementById('content-area'),
    topBarTitle: document.getElementById('top-bar-title'),
    sidebar: document.getElementById('sidebar'),
    openSidebarBtn: document.getElementById('open-sidebar'),
    closeSidebarBtn: document.getElementById('close-sidebar'),
    btnHome: document.getElementById('btn-home'),
    btnPrev: document.getElementById('btn-prev'),
    btnNext: document.getElementById('btn-next')
};

DOM.openSidebarBtn.addEventListener('click', () => DOM.sidebar.classList.add('open'));
DOM.closeSidebarBtn.addEventListener('click', () => DOM.sidebar.classList.remove('open'));
DOM.btnHome.addEventListener('click', showHome);
DOM.btnPrev.addEventListener('click', goPrev);
DOM.btnNext.addEventListener('click', goNext);

function initApp() {
    renderSidebar();
    updateNavButtons();
    showHome();
}

function showHome() {
    currentIndex = -1;
    document.querySelectorAll('.rule-btn').forEach(b => b.classList.remove('active'));
    
    // Removed the text as requested
    DOM.contentArea.innerHTML = `
        <div style="text-align: center; margin-top: 15vh; color: var(--text-muted);">
            <h2 style="color: var(--primary); font-size: 2.5rem; margin-bottom: 15px;">Joel Mitchell's English Grammar</h2>
        </div>
    `;
    updateNavButtons();
}

function goNext() {
    if (currentIndex < ALL_RULES.length - 1) {
        currentIndex++;
        renderRuleContent(ALL_RULES[currentIndex]);
    }
}

function goPrev() {
    if (currentIndex > 0) {
        currentIndex--;
        renderRuleContent(ALL_RULES[currentIndex]);
    } else if (currentIndex === 0) {
        showHome();
    }
}

function updateNavButtons() {
    DOM.btnPrev.disabled = currentIndex === -1;
    DOM.btnNext.disabled = currentIndex === ALL_RULES.length - 1;
}

function toggleMastery(ruleId) {
    const idx = masteredRules.indexOf(ruleId);
    if (idx > -1) masteredRules.splice(idx, 1);
    else masteredRules.push(ruleId);
    
    renderSidebar(); 
    if(currentIndex >= 0 && ALL_RULES[currentIndex].id === ruleId) {
        renderRuleContent(ALL_RULES[currentIndex]); 
    }
}

function renderSidebar() {
    DOM.sidebarList.innerHTML = '';
    
    HIERARCHY.forEach((domainObj, domainIndex) => {
        const header = document.createElement('div');
        header.className = 'domain-header';
        header.innerHTML = `<span>${domainObj.domain}</span> <span>+</span>`;
        
        const subContainer = document.createElement('div');
        subContainer.className = 'sub-rules-container';
        subContainer.id = `domain-${domainIndex}`;

        header.onclick = () => {
            const isOpen = subContainer.classList.contains('open');
            document.querySelectorAll('.sub-rules-container').forEach(c => c.classList.remove('open'));
            document.querySelectorAll('.domain-header').forEach(h => {
                h.classList.remove('active');
                h.querySelector('span:last-child').textContent = '+';
            });
            
            if (!isOpen) {
                subContainer.classList.add('open');
                header.classList.add('active');
                header.querySelector('span:last-child').textContent = '−';
            }
        };

        domainObj.rules.forEach(ruleName => {
            const ruleIndex = ALL_RULES.findIndex(r => r.domain === domainObj.domain && r.rule === ruleName);
            
            if (ruleIndex !== -1) {
                const ruleData = ALL_RULES[ruleIndex];
                const btn = document.createElement('button');
                const isMastered = masteredRules.includes(ruleData.id);
                const isActive = currentIndex === ruleIndex;
                
                btn.className = `rule-btn ${isActive ? 'active' : ''} ${isMastered ? 'is-mastered' : ''}`;
                btn.innerHTML = `
                    <span>${ruleName} <span style="font-size:0.75rem; color:#9CA3AF; margin-left:4px;">(${ruleData.level})</span></span>
                    <span class="mastery-indicator">✓</span>
                `;
                
                btn.onclick = () => {
                    currentIndex = ruleIndex;
                    renderSidebar(); 
                    renderRuleContent(ruleData);
                    if(window.innerWidth <= 1024) DOM.sidebar.classList.remove('open');
                };
                subContainer.appendChild(btn);
            }
        });

        DOM.sidebarList.appendChild(header);
        DOM.sidebarList.appendChild(subContainer);
        
        if (currentIndex >= 0 && ALL_RULES[currentIndex].domain === domainObj.domain) {
            subContainer.classList.add('open');
            header.classList.add('active');
            header.querySelector('span:last-child').textContent = '−';
        }
    });
}

function renderRuleContent(data) {
    updateNavButtons();
    DOM.topBarTitle.style.display = "block";

    const cleanExample = data.example.replace(/<[^>]*>?/gm, '');
    const isMastered = masteredRules.includes(data.id);

    const html = `
        <div class="rule-card">
            <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:15px;">
                <div>
                    <span class="keyword" style="background:var(--lvl-${data.level.toLowerCase()}); color:white; padding:4px 8px; font-size:0.85rem;">CEFR ${data.level}</span>
                    <span style="color:var(--text-muted); font-weight:600; margin-left:10px;">${data.domain}</span>
                </div>
                <button class="nav-btn ${isMastered ? 'home-btn' : ''}" style="margin:0;" onclick="toggleMastery('${data.id}')">
                    ${isMastered ? '✓ Mastered' : 'Mark Mastered'}
                </button>
            </div>
            
            <h3>${data.rule}</h3>
            <p>${data.simplifiedRule}</p>
            <div class="example">
                <span>Example: "${data.example}"</span>
                <button class="speak-btn" onclick="speakText('${cleanExample.replace(/'/g, "\\'")}')" title="Listen (85% Speed)">
                    🔊
                </button>
            </div>
            <button class="practice-btn" id="btn-practice-${data.id}">Practice</button>
        </div>
        <div class="practice-panel" id="panel-practice-${data.id}">
            <h3 style="margin-bottom: 20px; color: var(--primary); border-bottom:2px solid #E2E8F0; padding-bottom:10px;">Practice Mode</h3>
            <div id="practice-content-${data.id}"></div>
        </div>
    `;

    DOM.contentArea.innerHTML = html;

    const pBtn = document.getElementById(`btn-practice-${data.id}`);
    const pPanel = document.getElementById(`panel-practice-${data.id}`);
    const pContent = document.getElementById(`practice-content-${data.id}`);

    pBtn.onclick = () => {
        const isHidden = pPanel.style.display === '' || pPanel.style.display === 'none';
        pPanel.style.display = isHidden ? 'block' : 'none';
        
        if (isHidden && pContent.innerHTML === '') {
            buildPracticeItems(pContent, data.practice);
        }
    };
    
    renderSidebar(); 
}

function showSparkles(element) {
    const rect = element.getBoundingClientRect();
    for(let i=0; i<12; i++) {
        const sparkle = document.createElement('div');
        sparkle.className = 'sparkle-particle';
        sparkle.style.left = (Math.random() * rect.width) + 'px';
        sparkle.style.top = (Math.random() * rect.height) + 'px';
        sparkle.style.animationDelay = (Math.random() * 0.2) + 's';
        element.appendChild(sparkle);
        setTimeout(() => sparkle.remove(), 1000);
    }
}

function buildPracticeItems(container, practiceArray) {
    practiceArray.forEach(prac => {
        const pItem = document.createElement('div');
        pItem.className = 'practice-item';
        pItem.innerHTML = prac.prompt ? `<div class="practice-prompt">${prac.prompt}</div>` : '';
        
        if (prac.type === 'reveal') buildReveal(pItem, prac);
        if (prac.type === 'input') buildInput(pItem, prac);
        if (prac.type === 'drag-drop') buildDragDrop(pItem, prac);
        if (prac.type === 'mcq') buildMCQ(pItem, prac);
        if (prac.type === 'error-correct') buildErrorCorrect(pItem, prac);
        if (prac.type === 'transform') buildTransform(pItem, prac);

        container.appendChild(pItem);
    });
}

function buildMCQ(container, data) {
    const wrapper = document.createElement('div');
    
    const qText = document.createElement('div');
    qText.style.fontSize = '1.1rem';
    qText.style.marginBottom = '15px';
    qText.textContent = data.question;
    wrapper.appendChild(qText);

    const optionsContainer = document.createElement('div');
    optionsContainer.style.display = 'flex';
    optionsContainer.style.flexDirection = 'column';
    optionsContainer.style.gap = '10px';

    const explanationDiv = document.createElement('div');
    explanationDiv.style.display = 'none';
    explanationDiv.style.marginTop = '15px';
    explanationDiv.style.padding = '15px';
    explanationDiv.style.borderRadius = '8px';
    explanationDiv.style.backgroundColor = '#EFF6FF';
    explanationDiv.style.color = '#1E3A8A';
    explanationDiv.style.fontWeight = '600';
    explanationDiv.textContent = `💡 ${data.explanation}`;

    data.options.forEach((opt, idx) => {
        const btn = document.createElement('button');
        btn.className = 'mcq-btn';
        btn.textContent = opt;
        btn.onclick = () => {
            Array.from(optionsContainer.children).forEach(b => b.disabled = true);
            if (idx === data.correctIndex) {
                btn.classList.add('correct');
                showSparkles(btn);
                speakText("Correct!", true);
            } else {
                btn.classList.add('incorrect');
                optionsContainer.children[data.correctIndex].classList.add('correct');
            }
            explanationDiv.style.display = 'block';
        };
        optionsContainer.appendChild(btn);
    });

    wrapper.appendChild(optionsContainer);
    wrapper.appendChild(explanationDiv);
    container.appendChild(wrapper);
}

function buildErrorCorrect(container, data) {
    const wrapper = document.createElement('div');
    
    const wrongText = document.createElement('div');
    wrongText.style.fontSize = '1.1rem';
    wrongText.style.marginBottom = '10px';
    wrongText.innerHTML = `Fix this sentence: <span style="text-decoration: line-through; color: var(--error);">${data.wrongSentence}</span>`;
    wrapper.appendChild(wrongText);

    const inputGroup = document.createElement('div');
    inputGroup.style.display = "flex";
    inputGroup.style.marginTop = "10px";
    
    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'text-input';
    input.style.width = '100%';
    input.placeholder = 'Type the correct sentence...';
    
    const btn = document.createElement('button');
    btn.className = 'check-btn';
    btn.textContent = 'Check';
    
    const feedback = document.createElement('div');
    feedback.className = 'feedback-msg';

    const explanationDiv = document.createElement('div');
    explanationDiv.style.display = 'none';
    explanationDiv.style.marginTop = '15px';
    explanationDiv.style.padding = '15px';
    explanationDiv.style.borderRadius = '8px';
    explanationDiv.style.backgroundColor = '#EFF6FF';
    explanationDiv.style.color = '#1E3A8A';
    explanationDiv.style.fontWeight = '600';
    explanationDiv.textContent = `💡 ${data.explanation}`;

    btn.onclick = () => {
        const normalize = s => s.toLowerCase().replace(/[^a-z0-9\s]/g, '').trim();
        if (normalize(input.value) === normalize(data.correctSentence)) {
            feedback.textContent = 'Correct! 🎉';
            feedback.style.color = 'var(--success)';
            input.style.borderColor = 'var(--success)';
            explanationDiv.style.display = 'block';
            showSparkles(feedback);
            speakText("Correct!", true);
        } else {
            feedback.textContent = 'Keep trying!';
            feedback.style.color = 'var(--error)';
            input.style.borderColor = 'var(--error)';
        }
    };

    inputGroup.appendChild(input);
    inputGroup.appendChild(btn);
    wrapper.appendChild(inputGroup);
    wrapper.appendChild(feedback);
    wrapper.appendChild(explanationDiv);
    container.appendChild(wrapper);
}

function buildTransform(container, data) {
    const wrapper = document.createElement('div');
    
    const origText = document.createElement('div');
    origText.style.fontSize = '1.1rem';
    origText.style.marginBottom = '5px';
    origText.innerHTML = `Original: <em>${data.original}</em>`;
    wrapper.appendChild(origText);

    const hintText = document.createElement('div');
    hintText.style.fontSize = '0.95rem';
    hintText.style.color = 'var(--text-muted)';
    hintText.style.marginBottom = '10px';
    hintText.textContent = `Hint: ${data.hint}`;
    wrapper.appendChild(hintText);

    const inputGroup = document.createElement('div');
    inputGroup.style.display = "flex";
    
    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'text-input';
    input.style.width = '100%';
    input.placeholder = 'Type transformed sentence...';
    
    const btn = document.createElement('button');
    btn.className = 'check-btn';
    btn.textContent = 'Check';
    
    const feedback = document.createElement('div');
    feedback.className = 'feedback-msg';

    btn.onclick = () => {
        const normalize = s => s.toLowerCase().replace(/[^a-z0-9\s]/g, '').trim();
        if (normalize(input.value) === normalize(data.answer)) {
            feedback.textContent = 'Correct! 🎉';
            feedback.style.color = 'var(--success)';
            input.style.borderColor = 'var(--success)';
            showSparkles(feedback);
            speakText("Correct!", true);
        } else {
            feedback.textContent = 'Keep trying!';
            feedback.style.color = 'var(--error)';
            input.style.borderColor = 'var(--error)';
        }
    };

    inputGroup.appendChild(input);
    inputGroup.appendChild(btn);
    wrapper.appendChild(inputGroup);
    wrapper.appendChild(feedback);
    container.appendChild(wrapper);
}

function buildReveal(container, data) {
    const sentenceDiv = document.createElement('div');
    sentenceDiv.style.fontSize = "1.1rem";
    sentenceDiv.style.marginBottom = "15px";
    sentenceDiv.textContent = data.sentence;
    
    const btn = document.createElement('button');
    btn.className = 'reveal-btn';
    btn.textContent = 'Reveal Answer';
    
    const answerDiv = document.createElement('div');
    answerDiv.className = 'reveal-answer';
    answerDiv.textContent = `Correct: ${data.answer}`;

    btn.onclick = () => {
        const isVisible = answerDiv.classList.contains('visible');
        answerDiv.classList.toggle('visible');
        btn.textContent = isVisible ? 'Reveal Answer' : 'Hide Answer';
        
        if (!isVisible) {
            showSparkles(answerDiv);
            speakText("Correct!", true);
        }
    };

    container.appendChild(sentenceDiv);
    container.appendChild(btn);
    container.appendChild(answerDiv);
}

function buildInput(container, data) {
    const parts = data.sentence.split('___');
    const wrapper = document.createElement('div');
    wrapper.style.lineHeight = '2.2';
    wrapper.style.fontSize = '1.1rem';
    
    if (parts.length === 1) wrapper.textContent = data.sentence + " ";
    else wrapper.appendChild(document.createTextNode(parts[0]));

    const inputGroup = document.createElement('div');
    inputGroup.style.display = "flex";
    inputGroup.style.marginTop = "10px";
    
    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'text-input';
    input.placeholder = 'Type here...';
    
    const btn = document.createElement('button');
    btn.className = 'check-btn';
    btn.textContent = 'Check Answer';
    
    const feedback = document.createElement('div');
    feedback.className = 'feedback-msg';

    btn.onclick = () => {
        if (input.value.trim().toLowerCase() === data.answer.toLowerCase()) {
            feedback.textContent = 'Correct! 🎉';
            feedback.style.color = 'var(--success)';
            input.style.borderColor = 'var(--success)';
            showSparkles(feedback);
            speakText("Correct!", true);
        } else {
            feedback.textContent = `Keep trying! (Hint: starts with '${data.answer.charAt(0)}')`;
            feedback.style.color = 'var(--error)';
            input.style.borderColor = 'var(--error)';
        }
    };

    inputGroup.appendChild(input);
    inputGroup.appendChild(btn);
    container.appendChild(wrapper);
    container.appendChild(inputGroup);
    container.appendChild(feedback);
    
    if (parts.length > 1) {
         const endText = document.createElement('div');
         endText.style.marginTop = '10px';
         endText.textContent = parts[1];
         container.appendChild(endText);
    }
}

function buildDragDrop(container, data) {
    const state = { selectedDiv: null, selectedVal: null };
    
    const sentencesArea = document.createElement('div');
    data.items.forEach(item => {
        const parts = item.text.split('___');
        const sentenceDiv = document.createElement('div');
        sentenceDiv.className = 'dd-sentence';
        sentenceDiv.appendChild(document.createTextNode(parts[0]));
        
        const dropZone = document.createElement('span');
        dropZone.className = 'drop-zone';
        dropZone.textContent = " ";
        
        dropZone.onclick = () => {
            if (state.selectedDiv) {
                dropZone.textContent = state.selectedVal;
                dropZone.classList.add('filled');
                if (state.selectedVal === item.answer) {
                    dropZone.className = 'drop-zone filled correct';
                    showSparkles(dropZone);
                    speakText("Correct!", true);
                } else {
                    dropZone.className = 'drop-zone filled incorrect';
                }
                state.selectedDiv.classList.remove('selected');
                state.selectedDiv = null;
                state.selectedVal = null;
            } else if (dropZone.classList.contains('filled')) {
                dropZone.textContent = " ";
                dropZone.className = 'drop-zone';
            }
        };

        sentenceDiv.appendChild(dropZone);
        if (parts.length > 1) sentenceDiv.appendChild(document.createTextNode(parts[1]));
        sentencesArea.appendChild(sentenceDiv);
    });

    const tokensArea = document.createElement('div');
    tokensArea.className = 'tokens-area';
    
    const shuffledTokens = [...data.tokens].sort(() => Math.random() - 0.5);
    shuffledTokens.forEach(tokenStr => {
        const token = document.createElement('div');
        token.className = 'draggable-token';
        token.textContent = tokenStr;
        
        token.onclick = () => {
            if (state.selectedDiv) state.selectedDiv.classList.remove('selected');
            if (state.selectedDiv === token) {
                state.selectedDiv = null;
                state.selectedVal = null;
            } else {
                token.classList.add('selected');
                state.selectedDiv = token;
                state.selectedVal = tokenStr;
            }
        };
        tokensArea.appendChild(token);
    });

    container.appendChild(sentencesArea);
    container.appendChild(tokensArea);
}

let availableVoices = [];
window.speechSynthesis.onvoiceschanged = () => { availableVoices = window.speechSynthesis.getVoices(); };

window.speakText = function(text, isFeedback = false) {
    if (!('speechSynthesis' in window)) {
        if(!isFeedback) showNotification("Text-to-speech is not supported by your browser.", true);
        return;
    }
    window.speechSynthesis.cancel();
    
    if (availableVoices.length === 0) availableVoices = window.speechSynthesis.getVoices();
    
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.rate = 0.85; 

    // Target the specific requested characters
    const targetNames = ["Giuseppe", "Remy", "Vivienne", "Emma", "Brian", "Ava", "Andrew", "William"];
    
    // Strictly filter for Microsoft Multilingual/Online voices matching the specific names. NO OTHERS.
    const premiumVoices = availableVoices.filter(v => 
        v.name.includes("Microsoft") && 
        (v.name.toLowerCase().includes("online") || v.name.toLowerCase().includes("multilingual")) &&
        targetNames.some(name => v.name.includes(name))
    );
    
    if (premiumVoices.length > 0) {
        // Pick randomly from the strictly allowed list
        utterance.voice = premiumVoices[Math.floor(Math.random() * premiumVoices.length)];
    } else {
        // Safety Fallback: Only triggers if the student's browser/OS does not have the Microsoft voices installed.
        const englishVoices = availableVoices.filter(v => v.lang.startsWith('en'));
        if (englishVoices.length > 0) {
            utterance.voice = englishVoices[Math.floor(Math.random() * englishVoices.length)];
        }
    }
    
    window.speechSynthesis.speak(utterance);
};

    // 3. New renderer function for the requested MCQ string answer type
    function buildNewMCQ(container, data) {
        const wrapper = document.createElement('div');
        wrapper.className = 'new-mcq-wrapper';
        
        const qText = document.createElement('div');
        qText.style.fontSize = '1.1rem';
        qText.style.marginBottom = '15px';
        qText.textContent = data.question;
        wrapper.appendChild(qText);

        const optionsContainer = document.createElement('div');
        
        const feedbackDiv = document.createElement('div');
        feedbackDiv.style.display = 'none';
        feedbackDiv.style.marginTop = '10px';
        feedbackDiv.style.fontWeight = '700';
        feedbackDiv.style.fontSize = '1.05rem';
        feedbackDiv.style.position = 'relative';

        data.options.forEach((opt) => {
            const btn = document.createElement('button');
            btn.className = 'new-mcq-option';
            btn.textContent = opt;
            
            // 4. Event-handling logic checking correctness
            btn.onclick = () => {
                Array.from(optionsContainer.children).forEach(b => b.disabled = true);
                
                if (opt === data.answer) {
                    btn.classList.add('correct');
                    feedbackDiv.textContent = 'Correct! 🎉';
                    feedbackDiv.style.color = 'var(--success)';
                    feedbackDiv.style.display = 'inline-block';
                    if (typeof showSparkles === 'function') showSparkles(feedbackDiv);
                    if (typeof speakText === 'function') speakText("Correct!", true);
                } else {
                    btn.classList.add('incorrect');
                    // Highlight the correct answer option automatically
                    Array.from(optionsContainer.children).forEach(b => {
                        if(b.textContent === data.answer) b.classList.add('correct');
                    });
                    feedbackDiv.textContent = 'Keep trying!';
                    feedbackDiv.style.color = 'var(--error)';
                    feedbackDiv.style.display = 'inline-block';
                }
            };
            optionsContainer.appendChild(btn);
        });

        wrapper.appendChild(optionsContainer);
        wrapper.appendChild(feedbackDiv);
        container.appendChild(wrapper);
    }

    // Safely hook into the existing render architecture without modifying original code
    const originalBuildMCQFunc = buildMCQ;
    buildMCQ = function(container, data) {
        // Intercept logic: Distinguish the strictly requested string-answer MCQ format from the original indexed MCQ format
        if (data.answer !== undefined) {
            buildNewMCQ(container, data);
        } else {
            originalBuildMCQFunc(container, data);
        }
    };

    // 1 & 2. Safely clear placeholders from earlier and prep for the new rigorous additions
    ALL_RULES.forEach(rule => {
        rule.practice = rule.practice.filter(p => !(p.type === 'mcq' && p.options && p.options[0] === "Option A"));

    // 2. Safely remove any previously injected generic MCQs from the ALL_RULES array.
    ALL_RULES.forEach(rule => {
        rule.practice = rule.practice.filter(p => !(p.type === 'mcq' && p.options && p.options[0] === "Option A"));
    });

    // 3. Inject the highly-tailored "row-tap" questions into the practice arrays.
    ALL_RULES.forEach((ruleObj) => {
        const customQsStr = EXTRA_MCQS_DATA[ruleObj.id];
        
        if (customQsStr) {
            const qsArray = customQsStr.split('^');
            qsArray.forEach(qString => {
                const parts = qString.split('|');
                const sentence = parts[0];
                const correct = parts[1];
                const wrong1 = parts[2];
                const wrong2 = parts[3];
                
                // Shuffle the options so the correct answer isn't always in the same spot
                const shuffledOptions = [correct, wrong1, wrong2].sort(() => Math.random() - 0.5);
                
                ruleObj.practice.push({
                    type: "row-tap",
                    prompt: "",
                    question: sentence,
                    options: shuffledOptions,
                    answer: correct
                });
            });
        }
    });

    // 4. Define the Renderer for the "ABC Row Drag Drop / Touch Tap" format
    function buildRowTapMCQ(container, data) {
        const wrapper = document.createElement('div');
        wrapper.className = 'row-tap-wrapper';

        // Process the sentence to insert the blank (dropzone)
        const sentenceParts = data.question.split('___');
        const sentenceEl = document.createElement('div');
        sentenceEl.className = 'row-tap-sentence';

        sentenceEl.appendChild(document.createTextNode(sentenceParts[0]));

        const dropZone = document.createElement('span');
        dropZone.className = 'row-tap-blank';
        dropZone.textContent = ' ? ';
        sentenceEl.appendChild(dropZone);

        if (sentenceParts[1]) {
            sentenceEl.appendChild(document.createTextNode(sentenceParts[1]));
        }
        wrapper.appendChild(sentenceEl);

        const optionsContainer = document.createElement('div');
        optionsContainer.className = 'row-tap-btn-group';

        const labels = ['A', 'B', 'C'];

        data.options.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'row-tap-btn';
            
            const labelSpan = document.createElement('span');
            labelSpan.className = 'row-tap-label';
            labelSpan.textContent = labels[idx];
            
            const textSpan = document.createElement('span');
            textSpan.textContent = opt;

            btn.appendChild(labelSpan);
            btn.appendChild(textSpan);

            btn.onclick = () => {
                if (dropZone.classList.contains('locked')) return;

                Array.from(optionsContainer.children).forEach(b => b.disabled = true);

                if (opt === data.answer) {
                    dropZone.textContent = opt;
                    dropZone.className = 'row-tap-blank correct locked';
                    btn.classList.add('correct');
                    
                    if (typeof showSparkles === 'function') showSparkles(dropZone);
                    if (typeof speakText === 'function') speakText("Correct!", true);

                } else {
                    dropZone.textContent = opt;
                    dropZone.className = 'row-tap-blank incorrect';
                    btn.classList.add('incorrect');
                    
                    // Highlight the actual correct button automatically
                    Array.from(optionsContainer.children).forEach((b, bIdx) => {
                        if (data.options[bIdx] === data.answer) {
                            b.classList.add('correct');
                        }
                    });

                    // Shake reset after a second
                    setTimeout(() => {
                        if (!dropZone.classList.contains('locked')) {
                            dropZone.textContent = ' ? ';
                            dropZone.className = 'row-tap-blank';
                        }
                    }, 800);
                }
            };
            optionsContainer.appendChild(btn);
        });

        wrapper.appendChild(optionsContainer);
        container.appendChild(wrapper);
    }

    // 5. Intercept the original `buildPracticeItems` globally to inject our new renderer safely
    const originalBuildPracticeItemsAppended = buildPracticeItems;
    buildPracticeItems = function(container, practiceArray) {
        // Run the original builder (handles drag-drop, reveal, input, mcq, etc.)
        originalBuildPracticeItemsAppended(container, practiceArray);
        
        // Now find the newly created DOM elements and attach the 'row-tap' logic
        const items = container.querySelectorAll('.practice-item');
        
        practiceArray.forEach((prac, idx) => {
            // If the item is our new row-tap type, the original builder will have just created 
            // an empty div with a prompt. We hook in and build the interactive UI inside it.
            if (prac.type === 'row-tap') {
                if (items[idx]) {
                    buildRowTapMCQ(items[idx], prac);
                }
            }
        });
    };
