<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TBLT Master Curriculum Architect</title>
    <style>
        :root {
            --primary: #1e3a8a;
            --secondary: #3b82f6;
            --accent: #f59e0b;
            --background: #f3f4f6;
            --surface: #ffffff;
            --text-dark: #1f2937;
            --text-muted: #6b7280;
            --border: #e5e7eb;
            --success: #10b981;
            --purple: #6366f1;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--background);
            color: var(--text-dark);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        header h1 { margin: 0; font-size: 2.2rem; letter-spacing: 0.5px; }
        header p { margin: 10px 0 0 0; opacity: 0.9; font-size: 1.1rem; }

        .layout-container {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 2rem;
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        @media (max-width: 850px) {
            .layout-container {
                grid-template-columns: 1fr;
            }
        }

        .control-panel {
            background: var(--surface);
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            height: fit-content;
            position: sticky;
            top: 2rem;
            max-height: 90vh;
            overflow-y: auto;
        }

        .control-panel h2 {
            margin-top: 0;
            color: var(--primary);
            border-bottom: 2px solid var(--border);
            padding-bottom: 0.5rem;
            font-size: 1.05rem;
        }

        .form-group { margin-bottom: 1.2rem; }
        
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.4rem;
            color: var(--text-dark);
            font-size: 0.75rem;
        }

        .form-group input[type="text"], .form-group input[type="number"], .form-group select {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.75rem;
            transition: border-color 0.2s;
            background-color: #f9fafb;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--secondary);
            background-color: #fff;
        }
        
        optgroup { font-weight: bold; color: var(--primary); background: #f0fdf4; }

        .checkbox-group {
            display: flex;
            align-items: start;
            gap: 0.5rem;
            background: #eff6ff;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 1rem;
        }
        
        .checkbox-group label { margin: 0; font-size: 0.75rem; line-height: 1.3; font-weight: normal;}
        .checkbox-group input { margin-top: 2px; }

        .btn-generate {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--secondary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.4);
        }

        .btn-generate:hover { background-color: #2563eb; transform: translateY(-1px); }
        .btn-generate:active { transform: translateY(1px); }

        .btn-print {
            width: 100%;
            padding: 0.5rem;
            background-color: var(--text-muted);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.75rem;
            margin-top: 1rem;
            cursor: pointer;
            display: none;
        }
        .btn-print:hover { background-color: #4b5563; }

        .output-panel {
            background: var(--surface);
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            min-height: 600px;
        }

        .lesson-header {
            border-bottom: 3px solid var(--primary);
            padding-bottom: 1rem;
            margin-bottom: 2rem;
        }

        .lesson-header h2 { margin: 0 0 0.5rem 0; font-size: 2rem; color: var(--primary); }
        .lesson-meta { display: flex; gap: 1rem; flex-wrap: wrap; color: var(--text-muted); font-weight: 500; }
        .lesson-meta span { background: #eff6ff; color: var(--secondary); padding: 0.25rem 0.75rem; border-radius: 99px; font-size: 0.85rem; }

        .phase-card {
            border-left: 5px solid var(--secondary);
            background-color: #f8fafc;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border-radius: 0 8px 8px 0;
        }

        .phase-card h3 {
            margin-top: 0;
            color: var(--primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.1rem;
        }
        
        .phase-card.theory { border-left-color: var(--purple); background-color: #f5f3ff; }
        .phase-card.theory h3 { color: var(--purple); }

        .time-badge {
            background: var(--accent);
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 6px;
            font-size: 0.85rem;
        }

        .citation {
            font-size: 0.8rem;
            color: #059669;
            font-style: italic;
            display: block;
            margin-top: 0.4rem;
        }
        
        .task-execution-box {
            background: white;
            border: 1px solid var(--border);
            padding: 1rem;
            border-radius: 6px;
            margin: 0.5rem 0 1rem 0;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        .rubric-table { width: 100%; border-collapse: collapse; margin-top: 1rem; font-size: 0.85rem; }
        .rubric-table th, .rubric-table td { border: 1px solid var(--border); padding: 0.75rem; text-align: left; vertical-align: top;}
        .rubric-table th { background-color: #f8fafc; color: var(--primary); }
        .rubric-table tr:nth-child(even) { background-color: #fcfcfc; }
        
        .checklist-item { margin-bottom: 0.5rem; display: flex; gap: 0.5rem; }
        .checklist-item input { margin-top: 0.25rem; }

        .prompt-box {
            background: white;
            border: 1px dashed var(--secondary);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
        }
        
        .btn-tts {
            background: #e0e7ff;
            border: 1px solid #c7d2fe;
            color: var(--primary);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            float: right;
        }
        .btn-tts:hover { background: #c7d2fe; }

        @media print {
            .control-panel, header, .btn-print, .btn-tts { display: none !important; }
            .layout-container { grid-template-columns: 1fr; margin: 0; padding: 0; display: block; }
            body { background: white; }
            .output-panel { box-shadow: none; padding: 0; }
            .phase-card { page-break-inside: avoid; border: 1px solid #ccc; }
            .page-break { page-break-before: always; }
        }
    </style>
</head>
<body>

<div class="layout-container">
    <div class="control-panel">
        <h2>Module Parameters</h2>
        
        <div class="form-group">
            <label>Theme / Topic</label>
            <input type="text" id="theme" placeholder="e.g., School Rules, Community Issues..." value="Community Issues">
        </div>

        <div class="form-group">
            <label>Target Grammar / Form</label>
            <!-- Fully loaded 30 grammar targets -->
            <select id="grammar">
                <option value="Simple Present (Routines & Habits)">Simple Present (Routines & Habits)</option>
                <option value="Present Continuous (Ongoing Actions)">Present Continuous (Ongoing Actions)</option>
                <option value="Simple Past (Completed Actions)">Simple Past (Completed Actions)</option>
                <option value="Past Continuous (Interrupted Actions)">Past Continuous (Interrupted Actions)</option>
                <option value="Present Perfect (Experience/Recent Past)">Present Perfect (Experience/Recent Past)</option>
                <option value="Present Perfect Continuous (Unfinished Actions)">Present Perfect Continuous (Unfinished Actions)</option>
                <option value="Past Perfect (Before Another Past Action)">Past Perfect (Before Another Past Action)</option>
                <option value="Simple Future (Will/Going To)">Simple Future (Will/Going To)</option>
                <option value="Future Continuous (Actions in Progress)">Future Continuous (Actions in Progress)</option>
                <option value="Modals of Obligation (Must, Have to, Should)" selected>Modals of Obligation (Must, Have to, Should)</option>
                <option value="Modals of Possibility (Might, Could, Must be)">Modals of Possibility (Might, Could, Must be)</option>
                <option value="Modals of Ability (Can, Could, Be able to)">Modals of Ability (Can, Could, Be able to)</option>
                <option value="Zero Conditional (Facts/General Truths)">Zero Conditional (Facts/General Truths)</option>
                <option value="First Conditional (Real Future Possibilities)">First Conditional (Real Future Possibilities)</option>
                <option value="Second Conditional (Unreal/Hypothetical)">Second Conditional (Unreal/Hypothetical)</option>
                <option value="Third Conditional (Past Unreal Situations)">Third Conditional (Past Unreal Situations)</option>
                <option value="Passive Voice (Present & Past)">Passive Voice (Present & Past)</option>
                <option value="Passive Voice (Advanced/Modals)">Passive Voice (Advanced/Modals)</option>
                <option value="Reported Speech (Statements)">Reported Speech (Statements)</option>
                <option value="Reported Speech (Questions & Commands)">Reported Speech (Questions & Commands)</option>
                <option value="Defining Relative Clauses (Who, Which, That)">Defining Relative Clauses (Who, Which, That)</option>
                <option value="Non-Defining Relative Clauses">Non-Defining Relative Clauses</option>
                <option value="Gerunds vs. Infinitives">Gerunds vs. Infinitives</option>
                <option value="Comparatives and Superlatives">Comparatives and Superlatives</option>
                <option value="Tag Questions (Checking Information)">Tag Questions (Checking Information)</option>
                <option value="Countable vs. Uncountable Nouns (Quantifiers)">Countable vs. Uncountable Nouns (Quantifiers)</option>
                <option value="Articles (Definite vs. Indefinite)">Articles (Definite vs. Indefinite)</option>
                <option value="Prepositions of Time and Place">Prepositions of Time and Place</option>
                <option value="Causative Verbs (Have/Get something done)">Causative Verbs (Have/Get something done)</option>
                <option value="Embedded Questions (Indirect Questions)">Embedded Questions (Indirect Questions)</option>
            </select>
        </div>

        <div class="form-group">
            <label>Grade Level</label>
            <select id="grade">
                <option value="4">Primary 4 (Ages 9-10)</option>
                <option value="5">Primary 5 (Ages 10-11)</option>
                <option value="6">Primary 6 (Ages 11-12)</option>
                <option value="7">Junior 1 / Grade 7 (Ages 12-13)</option>
                <option value="8">Junior 2 / Grade 8 (Ages 13-14)</option>
                <option value="9">Junior 3 / Grade 9 (Ages 14-15)</option>
            </select>
        </div>

        <div class="form-group">
            <label>Curriculum Pathway</label>
            <select id="pathway">
                <option value="cnc">Shenzhen Local / CNC</option>
                <option value="hkc">Hong Kong Curriculum (HKC)</option>
                <option value="igcse">International / IGCSE</option>
            </select>
        </div>

        <div class="form-group">
            <label>Task Database Explorer</label>
            <select id="taskType">
                <optgroup label="1. Info-Gap & Descriptive (Fluency)">
                    <option value="Spot-the-Difference / Picture Dictation">Spot-the-Difference</option>
                    <option value="The 'Lost Item' Police Report">The 'Lost Item' Police Report</option>
                    <option value="Metro / Campus Navigation">Metro / Campus Navigation</option>
                </optgroup>
                <optgroup label="2. Reasoning-Gap (Form & Syntax)">
                    <option value="Grammar-Trapped Logic Puzzles">Grammar-Trapped Logic Puzzle</option>
                    <option value="Inductive Grammar Discovery">Inductive Grammar Discovery</option>
                    <option value="Collaborative L1-to-L2 Translation">Collaborative L1-to-L2 Translation</option>
                </optgroup>
                <optgroup label="3. Problem-Solving (Consensus)">
                    <option value="The Survival Consensus" selected>The Survival Consensus</option>
                    <option value="Budget & Itinerary Planning">Budget & Itinerary Planning</option>
                </optgroup>
                <optgroup label="4. Opinion-Exchange & Affective">
                    <option value="The 'Shark Tank' Product Pitch">The 'Shark Tank' Product Pitch</option>
                    <option value="Cultural Conflict Resolution">Cultural Conflict Resolution</option>
                    <option value="Interest-Driven Needs Analysis">Interest-Driven Needs Analysis</option>
                </optgroup>
                <optgroup label="5. Academic & Project-Based (EAP)">
                    <option value="The Academic Peer Consultation">The Academic Peer Consultation</option>
                    <option value="Model UN / Global Policy Roundtable">Model UN / Policy Roundtable</option>
                    <option value="Data Journalism / Infographic Synthesis">Data Journalism Synthesis</option>
                </optgroup>
                <optgroup label="6. Tech-Mediated (MMC-TBLT)">
                    <option value="The YouTube Jigsaw">The YouTube Jigsaw</option>
                    <option value="Digital Video Production">Digital Video Production</option>
                    <option value="Out-of-Class Audio Interviews">Out-of-Class Audio Interviews</option>
                    <option value="E-Learning Forum Buffer">E-Learning Forum Buffer</option>
                </optgroup>
                <optgroup label="7. Active Reading Tasks">
                    <option value="Text-to-Diagram Transfer">Text-to-Diagram Transfer</option>
                </optgroup>
            </select>
        </div>

        <div class="form-group">
            <label>Information Flow</label>
            <select id="infoFlow">
                <option value="two-way">Two-Way Jigsaw (Forced Mutual Exchange)</option>
                <option value="one-way">One-Way (Standard info transfer)</option>
            </select>
        </div>

        <!-- RESTORED: Cognitive Complexity Control -->
        <div class="form-group">
            <label>Cognitive Complexity (+/- Reasoning)</label>
            <select id="cogComplexity">
                <option value="high">High (Evaluate, Justify & Defend)</option>
                <option value="standard">Standard (Describe & Identify)</option>
            </select>
        </div>

        <!-- RESTORED: Grammar Correction Timing Control -->
        <div class="form-group">
            <label>Grammar Correction Timing</label>
            <select id="correctionTiming">
                <option value="delayed">Delayed Prompts (End-of-lesson board review)</option>
                <option value="recast">Immediate Recasts (Gentle inline correction)</option>
            </select>
        </div>

        <div class="form-group">
            <label>Total Duration (Mins)</label>
            <input type="number" id="duration" value="50" min="40" max="120" step="5">
        </div>

        <h2 style="margin-top: 1.5rem;">Teacher Resources</h2>
        
        <div class="checkbox-group">
            <input type="checkbox" id="incTheory" checked>
            <label for="incTheory">Include TBLT Theory & Efficiency Checklist</label>
        </div>
        
        <div class="checkbox-group">
            <input type="checkbox" id="incResearch" checked>
            <label for="incResearch">Include Action Research Protocol</label>
        </div>

        <button class="btn-generate" onclick="generateLesson()">Architect Module</button>
        <button class="btn-print" id="printBtn" onclick="printLesson()">Print / Save as PDF</button>
    </div>

    <div class="output-panel" id="outputPanel">
        <div style="text-align: center; color: var(--text-muted); margin-top: 20%;">
            <i>Select your parameters on the left and click "Architect Module" to build a research-backed instructional blueprint and Teacher PD Pack.</i>
        </div>
    </div>
</div>

<script>
    // System Note: TTS engine explicitly set to 0.85 rate for optimized secondary student/teacher comprehension
    function playTTS(text) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel(); 
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 0.85; // Hardcoded preference: Always slow down speech to 85%
            window.speechSynthesis.speak(utterance);
        } else {
            alert("Text-to-speech is not supported in this browser.");
        }
    }

    // --- PEDAGOGICAL DATABASE FOR GRAMMAR ---
    const grammarDatabase = {
        "Simple Present (Routines & Habits)": {
            launchers: `"Every day I...", "Our school usually...", "My typical schedule involves..."`,
            recast: `"If the student says 'He go to the cafeteria', gently recast: 'Oh, he GOES to the cafeteria? What does he buy?'"`,
            caf: `Consistent use of 3rd person singular '-s' and appropriate placement of frequency adverbs (always, never).`
        },
        "Present Continuous (Ongoing Actions)": {
            launchers: `"Right now, we are...", "Currently, the community is trying to..."`,
            recast: `"If they drop the 'be' verb ('They playing basketball'), recast: 'Yes, they ARE playing. Who ARE they playing with?'"`,
            caf: `Accurate conjugation of the 'to be' auxiliary verb + V-ing without reverting to simple present.`
        },
        "Simple Past (Completed Actions)": {
            launchers: `"Last year, our class...", "When the project finished, we..."`,
            recast: `"If they use an irregular verb incorrectly ('I buyed lunch'), recast: 'Ah, you BOUGHT lunch? What did you BUY?'"`,
            caf: `Mastery of irregular past tense verbs and correct pronunciation of -ed endings (/t/, /d/, /Id/).`
        },
        "Past Continuous (Interrupted Actions)": {
            launchers: `"I was studying when suddenly...", "While we were walking to school..."`,
            recast: `"If they use simple past for the background action, recast: 'So you WERE WALKING down the hall when the bell rang?'"`,
            caf: `Clear distinction between the background action (Past Continuous) and the interrupting event (Simple Past).`
        },
        "Present Perfect (Experience/Recent Past)": {
            launchers: `"I have never...", "Have you ever tried to...?", "Lately, our teachers have..."`,
            recast: `"If they say 'I didn't went to Beijing', recast: 'Oh, you HAVE NEVER BEEN to Beijing? Would you like to go?'"`,
            caf: `Correct pairing of 'have/has' + past participle without confusing it with a specific finished time in the past.`
        },
        "Present Perfect Continuous (Unfinished Actions)": {
            launchers: `"I have been preparing for the Zhongkao for...", "Lately, the student council has been trying..."`,
            recast: `"If they say 'I am studying here since Grade 7', recast: 'Wow, you HAVE BEEN STUDYING here since Grade 7?'"`,
            caf: `Emphasis on the duration of an ongoing action using 'have/has been + V-ing' with 'since' or 'for'.`
        },
        "Past Perfect (Before Another Past Action)": {
            launchers: `"By the time the bell rang, we had already...", "Before the teacher arrived, they had..."`,
            recast: `"If they use simple past for both, recast: 'So by the time you got to class, the exam HAD ALREADY started?'"`,
            caf: `Chronological clarity: Accurate use of 'had + V3' to explicitly signal the older of two past events.`
        },
        "Simple Future (Will/Going To)": {
            launchers: `"I think the school will...", "Look at the schedule, we are going to..."`,
            recast: `"If they use 'will' for a strict plan ('I will take my high school entrance exam tomorrow'), recast: 'Oh, you ARE GOING TO take it tomorrow!'"`,
            caf: `Distinguishing between spontaneous decisions/predictions (will) and prior plans/evidence (going to).`
        },
        "Future Continuous (Actions in Progress)": {
            launchers: `"This time next week, I will be taking my exams...", "Don't call at 8, I'll be doing homework..."`,
            recast: `"If they say 'Tomorrow at 5, I will study', recast: 'So, at 5 PM exactly, you WILL BE STUDYING?'"`,
            caf: `Accurate use of 'will be + V-ing' to project oneself into the middle of a future action.`
        },
        "Modals of Obligation (Must, Have to, Should)": {
            launchers: `"Students really must...", "If we want to fix this, we have to...", "The community should..."`,
            recast: `"If they add 'to' after must ('We must to go'), gently recast: 'Yes, we MUST GO immediately. Why must we go?'"`,
            caf: `Nuanced choice between internal obligation (must), external rules (have to), and strong advice (should).`
        },
        "Modals of Possibility (Might, Could, Must be)": {
            launchers: `"It might be because...", "That could mean...", "The principal must be..."`,
            recast: `"If they express certainty when guessing ('It is definitely a bad idea'), recast: 'It MIGHT be a bad idea. Or it COULD work, right?'"`,
            caf: `Appropriate expression of deduction and uncertainty instead of stating guesses as absolute facts.`
        },
        "Modals of Ability (Can, Could, Be able to)": {
            launchers: `"When I was in primary school, I couldn't...", "Hopefully, we will be able to..."`,
            recast: `"If they say 'Next year I will can join the club', recast: 'Ah, you WILL BE ABLE TO join next year?'"`,
            caf: `Navigating the lack of a future/infinitive form for 'can' by substituting 'be able to' smoothly.`
        },
        "Zero Conditional (Facts/General Truths)": {
            launchers: `"If you mix...", "When students skip breakfast, they..."`,
            recast: `"If they say 'If I heat ice, it will melt', recast: 'It's a scientific fact, right? So if you heat ice, it MELTS.'"`,
            caf: `Consistent use of present simple in both clauses for scientific facts or absolute truths.`
        },
        "First Conditional (Real Future Possibilities)": {
            launchers: `"If we finish the project early, we will...", "Unless she studies, she won't..."`,
            recast: `"If they say 'If it will rain, we cancel the sports meet', recast: 'Ah, if it RAINS, we WILL cancel it.'"`,
            caf: `Accurate pairing of Present Simple in the 'if' clause and Future (will/won't) in the result clause.`
        },
        "Second Conditional (Unreal/Hypothetical)": {
            launchers: `"If I were the principal, I would...", "If we had more time in exams, we could..."`,
            recast: `"If they use present tense ('If I am the mayor, I build a park'), recast: 'But you aren't the mayor right now. So, if you WERE the mayor, you WOULD build it?'"`,
            caf: `Strict adherence to 'If + Past, ...would + Verb' to indicate hypothetical distance from reality.`
        },
        "Third Conditional (Past Unreal Situations)": {
            launchers: `"If I had known about the pop quiz, I would have...", "We wouldn't have lost the match if..."`,
            recast: `"If they say 'If I studied yesterday, I would pass', recast: 'If you HAD STUDIED, you WOULD HAVE passed!'"`,
            caf: `Mastery of 'had + V3' and 'would have + V3' to express regret or impossible past scenarios.`
        },
        "Passive Voice (Present & Past)": {
            launchers: `"The school rules were created by...", "This environmental issue is caused by..."`,
            recast: `"If they use active voice awkwardly for a process ('People make smartphones in Shenzhen'), recast: 'Yes, smartphones ARE MADE in Shenzhen.'`,
            caf: `Focusing the sentence subject on the receiver of the action (Object + Be + Past Participle) rather than the actor.`
        },
        "Passive Voice (Advanced/Modals)": {
            launchers: `"The homework must be completed...", "The new policies should have been..."`,
            recast: `"If they say 'The essay must write by Friday', recast: 'The essay must BE WRITTEN by Friday. Who will write it?'"`,
            caf: `Accurate combination of modals with 'be + past participle' (e.g., can be done, must be seen).`
        },
        "Reported Speech (Statements)": {
            launchers: `"The teacher stated that we had to...", "The news article claimed that..."`,
            recast: `"If they forget to backshift ('She said she is tired'), recast: 'Right, she said she WAS tired. Is she still tired?'"`,
            caf: `Accurate backshifting of tenses and adjustment of pronouns/time markers when reporting secondary sources.`
        },
        "Reported Speech (Questions & Commands)": {
            launchers: `"The monitor asked if we...", "My parents told me to..."`,
            recast: `"If they say 'He asked me where do I live', recast: 'He asked where you LIVED?'"`,
            caf: `Dropping auxiliary 'do/does' in reported questions and using 'to + verb' for commands.`
        },
        "Defining Relative Clauses (Who, Which, That)": {
            launchers: `"The student who...", "A community policy that..."`,
            recast: `"If they use two subjects ('The boy he is tall is my classmate'), recast: 'The boy WHO is tall is your classmate, yes.'`,
            caf: `Seamlessly embedding the clause without duplicating subjects or objects (e.g., avoiding "the book which I read it").`
        },
        "Non-Defining Relative Clauses": {
            launchers: `"My school, which is in Futian, ...", "Mr. Chen, who teaches math, ..."`,
            recast: `"If they use 'that' ('My dad, that is 40...'), recast: 'Your dad, WHO is 40...'"`,
            caf: `Proper intonation (pauses/commas) and restricting the use of 'that' for extra information clauses.`
        },
        "Gerunds vs. Infinitives": {
            launchers: `"I really enjoy playing...", "We decided to organize..."`,

                    <button class="btn-tts" onclick="playTTS('${safeTTSString}')" title="Listen at 85% speed">🔊 Listen (0.85x)</button>
                    <strong>Task: ${taskObj.title}</strong>
                    <ul style="margin: 0.5rem 0 0 0; padding-left: 1.2rem;">
                        <li><strong>Pedagogical Action:</strong> ${taskObj.description}</li>
                        <li><strong>Why it Works:</strong> ${taskObj.whyItWorks} <span class="citation" style="display:inline;">(${taskObj.citation})</span></li>
                    </ul>
                </div>

                <ul>
                    <li>${infoFlowLogic}</li>
                    <li>${cogLogic}</li>
                    <li>${teacherRoleLogic}</li>
                    <li><strong>Planning for Report:</strong> Provide groups with 3-5 mins of unguided planning time to draft how they will report findings. Non-presenting students are assigned peer-assessment roles to maintain discipline. <span class="citation">(Lu, 2022)</span></li>
                </ul>
            </div>

            <div class="phase-card" style="border-left-color: #f59e0b;">
                <h3>Phase 3: Language Focus & Post-Task <span class="time-badge">${postTime} Mins</span></h3>
                <p><strong>Objective:</strong> Transition back to teacher-led instruction, analyze interlanguage gaps, and consolidate accuracy.</p>
                <ul>
                    <li><strong>The Report:</strong> Select 2-3 groups to present outcomes. The class listens and compares solutions.</li>
                    <li><strong>Formative Debrief & Recasts:</strong> Highlight specific grammatical errors noted during the cycle. <em>Teacher Script: ${gData.recast}</em></li>
                    <li><strong>Traditional Consolidation:</strong> Students engage in consciousness-raising to inductively correct forms. ${postFormTimingLogic} Follow up with traditional exam-style controlled practice (e.g., gap-fills/translations) to satisfy high-stakes testing demands. <span class="citation">(Lu, 2022)</span></li>
                </ul>
            </div>

            ${promptsHtml}
            ${rubricHtml}
            ${theoryHtml}
            ${researchHtml}
        `;

        document.getElementById('outputPanel').innerHTML = outputHtml;
        document.getElementById('printBtn').style.display = 'block';
    }

    function printLesson() {
        window.print();
    }
</script>

</body>
</html>
