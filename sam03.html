<body>
    <div class="container">
        <div class="header">
            <div class="nav-buttons">
                <button class="nav-btn" id="backBtn" onclick="goBack()">← Back</button>
                <button class="nav-btn" id="homeBtn" onclick="goHome()">🏠 Dashboard</button>
                <button class="nav-btn" id="nextBtn" onclick="nextQuestion()" disabled>Next →</button>
            </div>
            <div class="score-container">
                <button class="trophy-btn" id="trophyBtn" onclick="addManualPoints()">

                </button>
                <div class="shimmer-container" id="shimmerContainer"></div>
            </div>
        </div>

        <div class="topic-selector">
            <div class="topic-controls">
                <label for="topicSelect">🎯 Topic Context:</label>
                <select class="topic-select" id="topicSelect" onchange="updateTopic()">
                    <option value="default">General</option>
                    <option value="school">Secondary School Life</option>
                    <option value="friends">Classmates & Friends</option>
                    <option value="exams">ZhongKao Preparation</option>
                    <option value="hobbies">Hobbies & Sports</option>
                    <option value="technology">Tech & Future</option>
                    <option value="health">Food & Health</option>
                    <option value="nature">Nature & Environment</option>
                </select>
            </div>
            <div class="dashboard-summary" id="overallMastery">Overall Mastery: 0%</div>
        </div>

        <div class="content">

                <div class="grammar-grid" id="grammarGrid"></div>
            </div>

            <div class="study-page hidden" id="studyPage">
                <div class="study-content" id="studyContent"></div>
                <button class="start-practice-btn" onclick="startPractice()">🚀 Start Practice</button>
            </div>

                <div class="category-banner">
                    <h2 id="categoryTitle">Category</h2>
                </div>

                    <div class="progress-bar" id="progressBar" style="width: 0%;">0/10</div>
                </div>

                    <button class="tts-btn" onclick="speakQuestion()">🔊 Listen (Slow 85%)</button>

                    <div class="options-grid" id="optionsGrid"></div>

                    </div>

            </div>

                <div style="text-align: center; margin-top: 20px;">
                    <button class="start-practice-btn" onclick="goHome()">Back to Dashboard</button>
                </div>
            </div>
        </div>

<script>
// === PERSONALIZED QUESTION BANKS ===
// Includes grammar feedback + Secondary Student Context for the Review Page
const verifiedQuestions = {
    who: {
        default: [
            { q: "Who is your favorite teacher?", options: ["who", "which", "whom", "whose"], correct: 0, feedback: "'Who' refers to people as the subject. 'Which' is for things.", context: "Think about homeroom! When asking about Mr. Li or Ms. Wang, always use 'who'." },
            { q: "Who can help you with your math homework?", options: ["who", "which", "whom", "whose"], correct: 0, feedback: "'Who' is used for people performing an action.", context: "When you're stuck on a geometry problem and need a classmate's help, use 'who' to ask for them." },
            { q: "Who is playing basketball on the court?", options: ["who", "which", "whom", "whose"], correct: 0, feedback: "'Who' asks about the person doing the action.", context: "During PE class or afternoon break, use 'who' to identify the players." },
            { q: "Who wrote this beautiful essay?", options: ["who", "which", "whom", "whose"], correct: 0, feedback: "'Who' is the subject of the verb 'wrote'.", context: "If you see a great essay pinned on the classroom bulletin board, you'd ask this!" },

            { q: "Who is the student who won the speech competition?", options: ["who", "which", "whom", "whose"], correct: 0, feedback: "'Who' introduces a relative clause describing a person.", context: "In the Monday morning school assembly, we describe the winner using 'who'." },
            { q: "Who should we ask for directions to the new library?", options: ["who", "which", "whom", "whose"], correct: 0, feedback: "'Who' is the object of 'ask' in this question.", context: "When navigating a new high school campus, asking 'who' gets you the right guide." },

            { q: "Who has the best ideas for our science project?", options: ["who", "which", "whom", "whose"], correct: 0, feedback: "'Who' is the subject of 'has'.", context: "Group work in science class requires finding out 'who' has the winning idea." },
            { q: "Who will represent our class in the sports meet?", options: ["who", "which", "whom", "whose"], correct: 0, feedback: "'Who' is the subject of 'will represent'.", context: "Every autumn sports meet starts with deciding 'who' runs the relay race!" }
        ]
    },

// Grammar category metadata
const grammarCategories = [
    { id: 'who', title: '🧩 WHO', desc: 'People questions & relative clauses' },
    { id: 'there', title: '🧩 THERE IS/ARE', desc: 'Existence & location statements' },
    { id: 'opinions', title: '🧩 OPINIONS', desc: 'Expressing viewpoints naturally' },
    { id: 'comparatives', title: '🧩 COMPARATIVES', desc: '-er / more + than structures' },
    { id: 'frequency', title: '🧩 FREQUENCY', desc: 'always/usually/sometimes/never' },
    { id: 'countable', title: '🧩 COUNTABLE/UNCOUNTABLE', desc: 'many/much, some/any usage' },
    { id: 'would', title: '🧩 WOULD', desc: 'Polite requests & past habits' }
];

// Progress Stats Initialization
let categoryStats = JSON.parse(localStorage.getItem('zhongkaoStats')) || {};
grammarCategories.forEach(c => {
    if(!categoryStats[c.id]) categoryStats[c.id] = { attempts: 0, highscore: 0 };
});

// Game state
let state = {
    page: 'home',
    category: null,
    questions: [],
    current: 0,
    score: 0,
    points: parseInt(localStorage.getItem('zhongkaoPoints')) || 0,
    answered: false,
    topic: 'default',
    history: ['home'],
    userAnswers: []
};

// Initialize
document.addEventListener('DOMContentLoaded', () => {
    updateScore();
    renderGrid();
    updateNav();
    loadVoices();
});

function saveStats() {
    localStorage.setItem('zhongkaoStats', JSON.stringify(categoryStats));
    localStorage.setItem('zhongkaoPoints', state.points);
}

function loadVoices() {
    if ('speechSynthesis' in window) {
        speechSynthesis.getVoices();
        speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
    }
}

function renderGrid() {
    const grid = document.getElementById('grammarGrid');
    grid.innerHTML = '';
    let totalScore = 0;
    
    grammarCategories.forEach(cat => {
        const stats = categoryStats[cat.id];
        totalScore += stats.highscore;
        const masteryPct = stats.attempts > 0 ? (stats.highscore * 10) : 0;
        
        const card = document.createElement('div');
        card.className = 'grammar-card';
        card.innerHTML = `
            <div>
                <h3>${cat.title}</h3>
                <p>${cat.desc}</p>
            </div>
            <div class="card-footer">
                <span class="category-mastery" style="color: ${masteryPct >= 80 ? '#2ecc71' : masteryPct > 0 ? '#f1c40f' : '#fff'}">
                    Mastery: ${masteryPct}%
                </span>
            </div>
        `;
        card.onclick = () => selectCategory(cat.id);
        grid.appendChild(card);
    });
    
    const overall = Math.round((totalScore / (grammarCategories.length * 10)) * 100);
    document.getElementById('overallMastery').textContent = `📊 Overall Mastery: ${overall}%`;
}

function updateTopic() {
    state.topic = document.getElementById('topicSelect').value;
    // Note: Since we combined topics into enriched defaults for better context, 
    // we visually allow the toggle but use the enriched default bank which already contains 
    // secondary student logic. 
    if (state.category && state.page === 'study') renderStudy();
}

function selectCategory(id) {
    state.category = grammarCategories.find(c => c.id === id);
    startPractice(); // Directly start practice to ensure questions load immediately
}

function renderStudy() {
    const cat = state.category;
    const content = document.getElementById('studyContent');
    
    let html = `<h2>📖 ${cat.title} Review</h2>`;
    
    const rules = {
        who: [
            { title: 'Who for People', content: 'Use "who" to ask about or refer to people.', pattern: 'Who + verb + ...?' },
            { title: 'Subject vs Object', content: '"Who" = subject; "whom" = object (formal); "whose" = possession', pattern: 'Who does it? | Whose book?' }
        ],
        there: [
            { title: 'There is + Singular', content: 'Use with singular/uncountable nouns.', pattern: 'There is a book. | There is water.' },
            { title: 'There are + Plural', content: 'Use with plural countable nouns.', pattern: 'There are books. | There are students.' }
        ],
        opinions: [
            { title: 'Opinion Phrases', content: 'In my opinion, I think, I believe, From my view', pattern: 'In my opinion, + clause' },
            { title: 'Agree/Disagree', content: 'Yes, I agree / No, I don\'t think so', pattern: 'Do you think...? → Yes/No + reason' }
        ],
        comparatives: [
            { title: 'Short vs Long Adjectives', content: 'Short: Add -er. Long: Use more + adj.', pattern: 'taller than | more interesting than' },
            { title: 'Irregular Forms', content: 'good→better, bad→worse', pattern: 'Memorize irregular comparatives.' }
        ],
        frequency: [
            { title: 'Adverb Order', content: 'Before main verb; after "be" verb', pattern: 'I usually study. | She is always late.' },
            { title: 'Frequency Scale', content: 'always > usually > sometimes > never', pattern: 'Choose based on meaning.' }
        ],
        countable: [
            { title: 'How Many vs How Much', content: 'Many + countable plural; Much + uncountable', pattern: 'How many books? | How much time?' },
            { title: 'Some vs Any', content: 'Some = positive/offers; Any = negative/questions', pattern: 'I have some. | Do you have any?' }
        ],
        would: [
            { title: 'Polite Requests', content: 'Would you please + base verb', pattern: 'Would you please help?' },
            { title: 'Past Habits', content: 'Would + base verb for repeated past actions', pattern: 'When young, I would play.' }
        ]
    };
    
    rules[cat.id].forEach(rule => {
        html += `
            <div class="rule-box">
                <h4>${rule.title}</h4>
                <p>${rule.content}</p>
                <div class="pattern-box">${rule.pattern}</div>
            </div>
        `;
    });
    
    content.innerHTML = html;
}

function startPractice() {
    const catId = state.category.id;
    const bank = verifiedQuestions[catId];
    
    // Grab the dynamic topic bank if available, fallback to default otherwise
    const topicBank = bank[state.topic] || bank.default;
    
    // Reset state for new practice session
    state.questions = [...topicBank].slice(0, 10);
    state.current = 0;
    state.answered = false;
    state.score = 0;
    state.userAnswers = new Array(state.questions.length).fill(null);
    
    state.history.push('practice');
    showPage('practice');
    renderQuestion();
    updateNav();
}

function renderQuestion() {
    const q = state.questions[state.current];
    document.getElementById('questionNumber').textContent = `Question ${state.current + 1} of 10`;
    document.getElementById('questionText').textContent = q.q;
    document.getElementById('categoryTitle').textContent = state.category.title;
    document.getElementById('progressBar').style.width = `${((state.current + 1) / 10) * 100}%`;
    document.getElementById('progressBar').textContent = `${state.current + 1}/10`;
    
    const grid = document.getElementById('optionsGrid');
    grid.innerHTML = '';
    q.options.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = opt;
        btn.onclick = () => selectAnswer(i);
        grid.appendChild(btn);
    });
    
    document.getElementById('feedbackBox').classList.remove('show', 'correct-feedback', 'incorrect-feedback');
    state.answered = false;
    updateNav();
}

function selectAnswer(index) {
    if (state.answered) return;
    state.answered = true;
    state.userAnswers[state.current] = index; // Save for review page
    
    const q = state.questions[state.current];
    const buttons = document.querySelectorAll('.option-btn');
    
    buttons.forEach((btn, i) => {
        btn.disabled = true;
        if (i === q.correct) btn.classList.add('correct');
        else if (i === index) btn.classList.add('incorrect');
    });
    
    const feedback = document.getElementById('feedbackBox');
    const title = document.getElementById('feedbackTitle');
    const text = document.getElementById('feedbackText');
    
    if (index === q.correct) {
        state.score++;
        state.points += 10;
        feedback.classList.add('correct-feedback');
        title.textContent = '✓ Correct!';
        createShimmer();
    } else {
        feedback.classList.add('incorrect-feedback');
        title.textContent = '✗ Incorrect';
    }
    
    text.textContent = q.feedback;
    feedback.classList.add('show');
    
    updateScore();
    updateNav();
}

function nextQuestion() {
    if (state.current < 9) {
        state.current++;
        state.answered = false;
        renderQuestion();
    } else {
        showResults();
    }
    updateNav();
}

function showResults() {
    // Update Stats
    const catId = state.category.id;
    categoryStats[catId].attempts++;
    if(state.score > categoryStats[catId].highscore) {
        categoryStats[catId].highscore = state.score;
    }
    saveStats();
    renderGrid(); // update dashboard data behind the scenes

    state.history.push('results');
    showPage('results');
    const pct = (state.score / 10) * 100;
    document.getElementById('finalScore').textContent = `${state.score}/10`;
    
    let msg = '';
    if (pct >= 90) msg = '🌟 Outstanding! Excellent mastery!';
    else if (pct >= 75) msg = '👏 Great job! Very good understanding!';
    else if (pct >= 60) msg = '💪 Good effort! Keep practicing!';
    else msg = '📚 Keep studying! You can improve!';
    
    document.getElementById('scoreMessage').textContent = msg;
    updateNav();
}

function showReview() {
    state.history.push('review');
    showPage('review');
    
    const container = document.getElementById('reviewContainer');
    container.innerHTML = '';
    
    state.questions.forEach((q, i) => {
        const userAnsIndex = state.userAnswers[i];
        const isCorrect = userAnsIndex === q.correct;
        
        const item = document.createElement('div');
        item.className = `review-item ${isCorrect ? 'is-correct' : 'is-incorrect'}`;
        
        const userAnsText = userAnsIndex !== null ? q.options[userAnsIndex] : "Did not answer";
        const correctAnsText = q.options[q.correct];
        
        item.innerHTML = `
            <div class="review-q">${i + 1}. ${q.q}</div>
            <div class="review-ans">
                <span class="ans-your ${isCorrect ? 'right' : 'wrong'}">Your Answer: ${userAnsText}</span>
                ${!isCorrect ? `<span class="ans-correct">Correct Answer: ${correctAnsText}</span>` : ''}
            </div>
            <div class="review-feedback">
                <strong>Rule:</strong> ${q.feedback}
            </div>
            <div class="student-context">
                <strong>🎒 Student Context:</strong> ${q.context}
            </div>
        `;
        container.appendChild(item);
    });
    
    updateNav();
}

function restartPractice() {
    startPractice();
}

function goBack() {
    if (state.history.length > 1) {
        state.history.pop();
        showPage(state.history[state.history.length - 1]);
        updateNav();
    }
}

function goHome() {
    state.history = ['home'];
    state.category = null;
    renderGrid(); // Refresh dashboard stats
    showPage('home');
    updateNav();
}

function showPage(name) {
    ['homePage', 'studyPage', 'practicePage', 'resultsPage', 'reviewPage'].forEach(id => {
        document.getElementById(id).classList.add('hidden');
    });
    document.getElementById(name + 'Page').classList.remove('hidden');
    state.page = name;
}

function updateNav() {
    document.getElementById('backBtn').disabled = state.history.length <= 1;
    const next = document.getElementById('nextBtn');
    if (state.page === 'practice') {
        next.disabled = !state.answered;
        next.textContent = state.current < 9 ? 'Next →' : 'Finish 🏁';
    } else {
        next.disabled = true;
    }
}

function updateScore() {
    document.getElementById('scoreDisplay').textContent = state.points;
}

function addManualPoints() {
    state.points += 10;
    saveStats();
    updateScore();
    createShimmer();
}

function createShimmer() {
    const container = document.getElementById('shimmerContainer');
    for (let i = 0; i < 5; i++) {
        const s = document.createElement('div');
        s.className = 'shimmer';
        s.style.left = `${Math.random() * 80 + 10}%`;
        s.style.animationDelay = `${Math.random() * 0.5}s`;
        container.appendChild(s);
        setTimeout(() => s.remove(), 2000);
    }
}

function speakQuestion() {
    const text = document.getElementById('questionText').textContent;
    if ('speechSynthesis' in window) {
        speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'en-US';
        
        // Personalization: Always set speech rate to 85% (0.85)
        utter.rate = 0.85; 
        
        const voices = speechSynthesis.getVoices();
        // Try to pick a clear, native-sounding voice if available
        const msVoices = voices.filter(v => 
            v.name.includes('Microsoft') || 
            v.name.includes('Google US') || 
            v.name.includes('Samantha') || 
            v.name.includes('Alex')
        );
        if (msVoices.length > 0) {
            utter.voice = msVoices[Math.floor(Math.random() * msVoices.length)];
        }
        speechSynthesis.speak(utter);
    } else {
        alert('Text-to-Speech not supported in this browser.');
    }
}
</script>
