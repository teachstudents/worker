<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grade 9 English | Oxford Shenzhen Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --accent: #f59e0b;
            --success: #10b981;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --bg-input: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --border: #475569;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, #1e1b4b 100%);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Top Header Navigation */
        .header {
            background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-dark) 100%);
            padding: 10px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            border-bottom: 2px solid var(--primary);
            box-shadow: var(--shadow);
            height: 60px;
            gap: 5px;
        }

        .header-group {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .header-title {
            font-size: 1.05em;
            font-weight: 700;
            color: var(--text-primary);
            text-align: center;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .nav-btn {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 0.85em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav-btn.secondary {
            background: var(--bg-input);
            border: 1px solid var(--border);
        }

        .nav-btn:active { transform: scale(0.95); }
        .nav-btn:disabled { opacity: 0; pointer-events: none; }

        .xp-badge {
            background: var(--accent);
            color: var(--bg-dark);
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.85em;
            font-weight: 800;
            white-space: nowrap;
        }

        /* Main Container */
        .container {
            padding: 10px;
            padding-top: 70px; /* Account for header */
            height: 100vh;
            overflow-y: auto;
        }

        /* Unit Grid (Home) */
        .units-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            padding-bottom: 20px;
        }

        .unit-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 12px;
            border: 2px solid var(--border);
            cursor: pointer;
            text-align: center;
        }
        .unit-card.completed { border-color: var(--success); }
        .unit-emoji { font-size: 2em; margin-bottom: 5px; }
        .unit-title { font-size: 0.9em; font-weight: 700; color: var(--text-primary); }

        /* Mode Selector - Flex layout to fit screen and prevent scrolling */
        .mode-selector {
            display: flex;
            gap: 4px;
            margin-bottom: 12px;
            width: 100%;
            justify-content: space-between;
        }

        .mode-btn {
            flex: 1;
            background: var(--bg-input);
            color: var(--text-secondary);
            border: 2px solid var(--border);
            border-radius: 8px;
            padding: 8px 0;
            font-size: 1.05em; /* Increased font size for readability */
            font-weight: 700;
            cursor: pointer;
            text-align: center;
            letter-spacing: -0.3px; /* Ensure fit on small screens */
        }
        .mode-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .section-title {
            font-size: 1.1em;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--primary);
        }

        /* TTS Clickable Areas */
        .tts-clickable {
            cursor: pointer;
            transition: transform 0.1s;
        }
        .tts-clickable:active { transform: scale(0.98); }
        .tts-active { border-color: var(--accent) !important; box-shadow: 0 0 8px var(--accent); }

        /* Vocabulary Cards */
        .vocab-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }
        .vocab-card {
            background: var(--bg-card);
            border-radius: 10px;
            padding: 8px;
            text-align: center;
            border: 2px solid var(--border);
        }
        .vocab-emoji-bg {
            background: #f8fafc;
            border-radius: 8px;
            padding: 6px;
            margin-bottom: 6px;
            display: inline-block;
        }
        .vocab-emoji { font-size: 2em; line-height: 1; }
        .vocab-word { font-size: 1.05em; font-weight: 700; color: var(--text-primary); }
        .vocab-pronunciation { color: var(--text-secondary); font-size: 0.8em; }

        /* Grammar Box & Games */
        .grammar-box {
            background: var(--bg-card);
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 12px;
            border: 2px solid var(--border);
        }
        .grammar-title { font-size: 1.05em; font-weight: 700; color: var(--primary); margin-bottom: 6px; }
        .grammar-rule, .grammar-example {
            background: var(--bg-input);
            border-radius: 6px;
            padding: 10px;
            margin: 4px 0;
            font-size: 0.95em;
            border-left: 3px solid var(--primary);
            color: var(--text-primary);
        }
        .grammar-exercise {
            background: var(--bg-dark);
            padding: 12px;
            border-radius: 8px;
            margin-top: 8px;
            border: 1px dashed var(--border);
        }
        .grammar-q { font-size: 1em; font-weight: 600; margin-bottom: 10px; }
        .grammar-opts { display: flex; gap: 8px; flex-wrap: wrap; }
        .grammar-opt {
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: white;
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 0.9em;
            font-weight: 600;
            cursor: pointer;
        }
        .grammar-opt.correct { background: var(--success); border-color: var(--success); }
        .grammar-opt.wrong { background: #ef4444; border-color: #ef4444; }

        /* Reading Box */
        .reading-box {
            background: var(--bg-card);
            border-radius: 10px;
            padding: 15px;
            font-size: 1.05em;
            line-height: 1.6;
            border: 2px solid var(--border);
            color: var(--text-primary);
        }

        /* Conversations */
        .convo-tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
        }
        .convo-tab {
            flex: 1;
            background: var(--bg-input);
            color: var(--text-secondary);
            border: 1px solid var(--border);
            padding: 8px;
            border-radius: 6px;
            font-size: 0.9em;
            font-weight: bold;
            cursor: pointer;
        }
        .convo-tab.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        .conversation-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 10px 0;
            min-height: 220px;
        }
        .message-bubble {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 1em;
            line-height: 1.4;
            opacity: 0;
            animation: popIn 0.3s forwards;
            cursor: pointer;
        }
        @keyframes popIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message-left {
            align-self: flex-start;
            background: var(--bg-input);
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border);
        }
        .message-right {
            align-self: flex-end;
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 4px;
        }

        /* Flashcards */
        .flashcard-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            perspective: 1000px;
        }
        .flashcard {
            height: 130px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .flashcard.flipped { transform: rotateY(180deg); }
        .flashcard-front, .flashcard-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 8px;
            text-align: center;
            border: 2px solid var(--border);
        }
        .flashcard-front { background: var(--bg-card); }
        .flashcard-back { background: var(--primary); transform: rotateY(180deg); color: white; border-color: var(--primary); }

        /* Quiz & Spelling */
        .interactive-container {
            background: var(--bg-card);
            border-radius: 10px;
            padding: 15px;
            border: 2px solid var(--border);
            text-align: center;
        }
        .quiz-options {
            display: grid;
            grid-template-columns: 1fr;
            gap: 8px;
            margin-top: 15px;
        }
        .quiz-option {
            background: var(--bg-input);
            color: var(--text-primary);
            border: 2px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            font-size: 1em;
            font-weight: 600;
        }
        .quiz-option.correct { background: var(--success); border-color: var(--success); }
        .quiz-option.wrong { background: #ef4444; border-color: #ef4444; }

        .spelling-wrapper { position: relative; display: inline-block; width: 100%; margin: 10px 0; }
        .spelling-input {
            width: 100%;
            padding: 12px;
            font-size: 1.3em;
            border: 2px solid var(--border);
            border-radius: 8px;
            background: var(--bg-input);
            color: var(--text-primary);
            text-align: center;
        }
        .btn-full {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1em;
            cursor: pointer;
        }
        .btn-repeat {
            background: var(--bg-input);
            color: var(--text-primary);
            border: 2px solid var(--border);
            margin-bottom: 10px;
        }

        /* Glitter Effect */
        .glitter {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #fbbf24;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1000;
            animation: sparkle 0.6s linear forwards;
            box-shadow: 0 0 5px #fcd34d;
        }
        @keyframes sparkle {
            0% { transform: scale(0) rotate(0deg); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(1.5) rotate(180deg); opacity: 0; }
        }

    </style>
</head>
<body>
    <!-- Top Header -->
    <div class="header">
        <div class="header-group">

    <!-- Main Container -->
    <div class="container">

        <div id="homeView">

        <div id="contentView" style="display: none;">

            <div class="mode-selector" id="modeSelector">

                <button class="mode-btn" onclick="setMode('grammar')">Grammar</button>

                <button class="mode-btn" onclick="setMode('quiz')">Quiz</button>
                <button class="mode-btn" onclick="setMode('convo')">Convo</button>
                <button class="mode-btn" onclick="setMode('flashcards')">Cards</button>
                <button class="mode-btn" onclick="setMode('spell')">Spell</button>
            </div>
            
            <div id="contentArea"></div>
        </div>
    </div>

                        { title: "Integrated Review", rule: "Review of conditionals, passive voice, and relative clauses.", examples: ["If you exercise, you will be healthier."] },
                        { title: "Expressing Necessity", rule: "Use need to, have to, or must.", examples: ["Students need to balance study and rest."] }
                    ],
                    grammarExercises: [
                        { q: "If you want good mental health, you ___ to sleep 8 hours a night.", options: ["need", "must", "should"], correct: 0 },
                        { q: "A balanced diet ___ required for physical wellness.", options: ["is", "are", "be"], correct: 0 }
                    ],
                    reading: "Caring for your health is important for Zhongkao preparation. Students need both physical exercise and mental wellness. A healthy diet and regular training can help you stay strong and focused during exams. Remember, without health, you cannot achieve your dreams.",
                    conversations: [
                        [
                            { speaker: "left", text: "I feel so exhausted all the time." },
                            { speaker: "right", text: "You need to focus on your physical health. Do you exercise?" },
                            { speaker: "left", text: "Not really. I just study all day." },
                            { speaker: "right", text: "You must take breaks to maintain your mental wellness." }
                        ],
                        [
                            { speaker: "left", text: "What does a healthy diet look like?" },
                            { speaker: "right", text: "It includes lots of vegetables, fruit, and water." },
                            { speaker: "left", text: "I will stop eating so much fast food." }
                        ],
                        [
                            { speaker: "left", text: "We are almost done with middle school!" },
                            { speaker: "right", text: "Yes! If we stay healthy, we will do great on the exams." },
                            { speaker: "left", text: "Let's go play basketball to get some exercise." }
                        ]
                    ],
                    quiz: [
                        { question: "What two types of health are mentioned?", options: ["Physical and Mental", "Fast and Slow", "Good and Bad"], correct: 0 },
                        { question: "Which word shows a strong necessity?", options: ["Might", "Must", "Could"], correct: 1 }
                    ],
                    spelling: ["physical", "mental", "exercise", "wellness"]
                }
            ]
        };

        // State variables
        let xp = 0;
        let completedUnits = [];
        let currentUnit = null;
        let currentMode = 'vocab';
        let voices = [];
        const SPEECH_RATE = 0.85; 

        // Initialization
        function init() {
            loadVoices();
            renderMainMenu();
        }

        function loadVoices() {
            if ('speechSynthesis' in window) {
                voices = speechSynthesis.getVoices();
                if (voices.length === 0) setTimeout(loadVoices, 100);
            }
        }

        // TTS function attach to clickables
        function speak(text, voiceName = "Emma") {
            if (!('speechSynthesis' in window)) return;
            speechSynthesis.cancel();
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = SPEECH_RATE; 
            
            const voice = voices.find(v => v.name.includes(voiceName));
            if (voice) utterance.voice = voice;
            
            // Visual feedback on the clicked element
            document.querySelectorAll('.tts-active').forEach(el => el.classList.remove('tts-active'));
            
            // Capture the target safely
            let activeEl = null;
            if (typeof event !== 'undefined' && event && event.currentTarget && event.currentTarget.classList && event.currentTarget.classList.contains('tts-clickable')) {
                activeEl = event.currentTarget;
                activeEl.classList.add('tts-active');
            }

            utterance.onend = () => {
                if (activeEl) {
                    activeEl.classList.remove('tts-active');
                }
            };

            speechSynthesis.speak(utterance);
        }

        // Success Sound
        function playSuccessSound() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(523.25, ctx.currentTime); 
            osc.frequency.exponentialRampToValueAtTime(1046.50, ctx.currentTime + 0.1); 
            gain.gain.setValueAtTime(0.3, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
            osc.start();
            osc.stop(ctx.currentTime + 0.3);
        }

        // Glitter Animation
        function createGlitter(targetElement) {
            const rect = targetElement.getBoundingClientRect();
            for(let i=0; i<20; i++) {
                const glitter = document.createElement('div');
                glitter.className = 'glitter';
                glitter.style.left = (rect.left + rect.width/2) + 'px';
                glitter.style.top = (rect.top + rect.height/2) + 'px';
                
                // random outward translation
                const tx = (Math.random() * 140 - 70) + 'px';
                const ty = (Math.random() * 100 - 50) + 'px';
                glitter.style.setProperty('--tx', tx);
                glitter.style.setProperty('--ty', ty);
                
                document.body.appendChild(glitter);
                setTimeout(() => glitter.remove(), 600);
            }
        }

        function addXP(pts) {
            xp += pts;
            document.getElementById('xpValue').innerText = xp;
        }

        // Navigation & Display
        function renderMainMenu() {
            const sem1 = document.getElementById('sem1Grid');
            const sem2 = document.getElementById('sem2Grid');
            sem1.innerHTML = ''; sem2.innerHTML = '';
            
            document.getElementById('headerTitle').innerText = "Grade 9 English";
            document.getElementById('backBtn').disabled = true;
            document.getElementById('nextBtn').disabled = true;

            grade9Data.units.forEach(unit => {
                const card = document.createElement('div');
                card.className = `unit-card ${completedUnits.includes(unit.number) ? 'completed' : ''}`;
                card.innerHTML = `
                    <div class="unit-emoji">${unit.emoji}</div>
                    <div class="unit-title">U${unit.number}: ${unit.title}</div>
                `;
                card.onclick = () => loadUnit(unit);
                if(unit.semester === 1) sem1.appendChild(card);
                else sem2.appendChild(card);
            });
        }

        function showHome() {
            speechSynthesis.cancel();
            isConvoPlaying = false;
            document.getElementById('homeView').style.display = 'block';
            document.getElementById('contentView').style.display = 'none';
            renderMainMenu();
        }

        function loadUnit(unit) {
            currentUnit = unit;
            currentMode = 'vocab';
            updateModeButtons();
            
            document.getElementById('homeView').style.display = 'none';
            document.getElementById('contentView').style.display = 'block';
            document.getElementById('headerTitle').innerText = `U${unit.number} (Sem ${unit.semester})`;
            
            document.getElementById('backBtn').disabled = false;
            
            renderContent();
            addXP(5);
        }

        const ALL_MODES = ['vocab', 'grammar', 'reading', 'quiz', 'convo', 'flashcards', 'spell'];

        function navigateBack() {
            let idx = ALL_MODES.indexOf(currentMode);
            if (idx > 0) {
                setMode(ALL_MODES[idx - 1]);
            } else {
                showHome();
            }
        }

        function navigateForward() {
            let idx = ALL_MODES.indexOf(currentMode);
            if (idx < ALL_MODES.length - 1) {
                setMode(ALL_MODES[idx + 1]);
            }
        }

        function setMode(mode) {
            currentMode = mode;
            speechSynthesis.cancel();
            isConvoPlaying = false;
            updateModeButtons();
            renderContent();
        }

        function updateModeButtons() {
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            const idx = ALL_MODES.indexOf(currentMode);
            const buttons = document.querySelectorAll('.mode-btn');
            
            buttons.forEach(b => {
                if(b.innerText.toLowerCase().includes(modeShortName(currentMode))) {
                    b.classList.add('active');
                }
            });
            
            document.getElementById('nextBtn').disabled = (idx === ALL_MODES.length - 1);
        }

        function modeShortName(mode) {
            if(mode==='flashcards') return 'cards';
            return mode;
        }

        function renderContent() {
            const area = document.getElementById('contentArea');
            area.innerHTML = '';
            
            if (currentMode === 'vocab') renderVocabulary(area);
            if (currentMode === 'grammar') renderGrammar(area);
            if (currentMode === 'reading') renderReading(area);
            if (currentMode === 'convo') renderConversation(area);
            if (currentMode === 'flashcards') renderFlashcards(area);
            if (currentMode === 'spell') renderSpelling(area);
            if (currentMode === 'quiz') renderQuiz(area);
        }

        // --- View Renderers ---

        function renderVocabulary(container) {
            const grid = document.createElement('div');
            grid.className = 'vocab-grid';
            currentUnit.vocabulary.forEach((item, i) => {
                const card = document.createElement('div');
                card.className = 'vocab-card tts-clickable';
                card.onclick = (e) => { speak(item.word, i%2===0?'Emma':'Brian'); addXP(1); };
                card.innerHTML = `
                    <div class="vocab-emoji-bg"><div class="vocab-emoji">${item.emoji}</div></div>
                    <div class="vocab-word">${item.word}</div>
                    <div class="vocab-pronunciation">${item.pronunciation}</div>
                `;
                grid.appendChild(card);
            });
            container.appendChild(grid);
        }

        function renderGrammar(container) {
            // Rules
            currentUnit.grammar.forEach(item => {
                const box = document.createElement('div');
                box.className = 'grammar-box';
                let html = `<div class="grammar-title">${item.title}</div>`;
                html += `<div class="grammar-rule tts-clickable" onclick="speak('${item.rule.replace(/'/g,"\\'")}'); addXP(1);">${item.rule}</div>`;
                item.examples.forEach(ex => {
                    html += `<div class="grammar-example tts-clickable" onclick="speak('${ex.replace(/'/g,"\\'")}'); addXP(1);">${ex}</div>`;
                });
                box.innerHTML = html;
                container.appendChild(box);
            });

            // Interactive Grammar Games
            if(currentUnit.grammarExercises && currentUnit.grammarExercises.length > 0) {
                const exContainer = document.createElement('div');
                exContainer.innerHTML = `<div class="section-title" style="margin-top:20px;">Grammar Games</div>`;
                
                currentUnit.grammarExercises.forEach((ex, i) => {
                    const qBox = document.createElement('div');
                    qBox.className = 'grammar-exercise';
                    
                    let html = `<div class="grammar-q">${i+1}. ${ex.q}</div><div class="grammar-opts">`;
                    ex.options.forEach((opt, optIdx) => {
                        html += `<button class="grammar-opt" onclick="checkGrammar(this, ${optIdx}, ${ex.correct})">${opt}</button>`;
                    });
                    html += `</div>`;
                    qBox.innerHTML = html;
                    exContainer.appendChild(qBox);
                });
                container.appendChild(exContainer);
            }
        }

        window.checkGrammar = function(btn, selected, correct) {
            const parent = btn.parentElement;
            const buttons = parent.querySelectorAll('.grammar-opt');
            buttons.forEach(b => b.style.pointerEvents = 'none'); // disable all

            if(selected === correct) {
                btn.classList.add('correct');
                addXP(5);
                playSuccessSound();
            } else {
                btn.classList.add('wrong');
                buttons[correct].classList.add('correct');
            }
        }

        function renderReading(container) {
            const box = document.createElement('div');
            box.className = 'reading-box tts-clickable';
            box.innerText = currentUnit.reading;
            box.onclick = () => { speak(currentUnit.reading, 'Brian'); addXP(2); };
            container.appendChild(box);
        }

        // Conversation Logic (Text Message Style + 3 Tabs)
        let isConvoPlaying = false;
        let activeConvoIdx = 0;

        function renderConversation(container) {
            activeConvoIdx = 0;
            
            // Build tabs
            let html = `<div class="convo-tabs">`;
            currentUnit.conversations.forEach((_, i) => {
                html += `<button class="convo-tab ${i===0?'active':''}" onclick="switchConvo(${i}, this)">Convo ${i+1}</button>`;
            });
            html += `</div>`;
            html += `<div class="conversation-container" id="chatContainer"></div>`;
            html += `<button class="btn-full" style="margin-top:10px;" onclick="startConversation()">▶️ Play Audio</button>`;
            
            container.innerHTML = html;
            
            // Render first convo text statically first
            renderStaticChat();
        }

        window.switchConvo = function(idx, btnElement) {
            speechSynthesis.cancel();
            isConvoPlaying = false;
            activeConvoIdx = idx;
            document.querySelectorAll('.convo-tab').forEach(b => b.classList.remove('active'));
            btnElement.classList.add('active');
            renderStaticChat();
        };

        function renderStaticChat() {
            const chatBox = document.getElementById('chatContainer');
            chatBox.innerHTML = '';
            const convo = currentUnit.conversations[activeConvoIdx];
            convo.forEach((line) => {
                const msgBubble = document.createElement('div');
                msgBubble.className = `message-bubble message-${line.speaker} tts-clickable`;
                msgBubble.textContent = line.text;
                msgBubble.style.opacity = 1; // fully visible
                msgBubble.onclick = () => speak(line.text, line.speaker === "left" ? "Emma" : "Brian");
                chatBox.appendChild(msgBubble);
            });
        }

        function startConversation() {
            speechSynthesis.cancel();
            isConvoPlaying = true;
            document.getElementById('chatContainer').innerHTML = '';
            playConvoLine(0);
        }

        function playConvoLine(idx) {
            const convo = currentUnit.conversations[activeConvoIdx];
            if (!isConvoPlaying || idx >= convo.length) {
                isConvoPlaying = false;
                return;
            }

            const line = convo[idx];
            const chatBox = document.getElementById('chatContainer');
            
            const msgBubble = document.createElement('div');
            msgBubble.className = `message-bubble message-${line.speaker} tts-clickable`;
            msgBubble.textContent = line.text;
            msgBubble.onclick = () => speak(line.text, line.speaker === "left" ? "Emma" : "Brian");
            
            chatBox.appendChild(msgBubble);
            chatBox.scrollTop = chatBox.scrollHeight;

            const utterance = new SpeechSynthesisUtterance(line.text);
            utterance.rate = SPEECH_RATE;
            const voice = voices.find(v => v.name.includes(line.speaker === "left" ? "Emma" : "Brian"));
            if (voice) utterance.voice = voice;

            utterance.onend = () => {
                if(isConvoPlaying) {
                    setTimeout(() => playConvoLine(idx + 1), 400);
                }
            };
            
            speechSynthesis.speak(utterance);
        }

        // Flashcards
        function renderFlashcards(container) {
            const grid = document.createElement('div');
            grid.className = 'flashcard-container';
            
            currentUnit.vocabulary.forEach(item => {
                const card = document.createElement('div');
                card.className = 'flashcard tts-clickable';
                card.innerHTML = `
                    <div class="flashcard-front">
                        <div style="font-size:2.5em;">${item.emoji}</div>
                    </div>
                    <div class="flashcard-back">
                        <div style="font-size:1.05em; font-weight:bold;">${item.word}</div>
                    </div>
                `;
                card.onclick = (e) => {
                    card.classList.toggle('flipped');
                    if(card.classList.contains('flipped')) {
                        speak(item.word);
                        addXP(1);
                    }
                };
                grid.appendChild(card);
            });
            container.appendChild(grid);
        }

        // Spelling Game with Glitter & Sound
        let spellIndex = 0;
        function renderSpelling(container) {
            spellIndex = 0;
            container.innerHTML = `<div id="spellArea" class="interactive-container"></div>`;
            showSpellingWord();
        }

        function showSpellingWord() {
            const area = document.getElementById('spellArea');
            if(spellIndex >= currentUnit.spelling.length) {
                area.innerHTML = `<h3>🎉 Spelling Complete!</h3><button class="btn-full" style="margin-top:10px;" onclick="setMode('spell')">Try Again</button>`;
                addXP(10);
                return;
            }
            
            const word = currentUnit.spelling[spellIndex];
            const emoji = currentUnit.vocabulary.find(v => v.word === word)?.emoji || '📝';
            
            area.innerHTML = `
                <div style="font-size: 3em;">${emoji}</div>
                <button class="btn-full btn-repeat" onclick="speak('${word}')">🔁 Repeat Audio</button>
                <div class="spelling-wrapper">
                    <input type="text" id="spellInput" class="spelling-input" placeholder="Type here..." autocomplete="off">
                </div>
                <button class="btn-full" onclick="checkSpelling('${word}')">Check</button>
            `;
            setTimeout(() => speak(word), 300);
        }

        window.checkSpelling = function(word) {
            const input = document.getElementById('spellInput');
            if(input.value.trim().toLowerCase() === word.toLowerCase()) {
                input.style.borderColor = 'var(--success)';
                input.style.color = 'var(--success)';
                addXP(5);
                playSuccessSound();
                createGlitter(input);
                
                setTimeout(() => {
                    spellIndex++;
                    showSpellingWord();
                }, 1200);
            } else {
                input.style.borderColor = '#ef4444';
                setTimeout(() => {
                    input.style.borderColor = 'var(--border)';
                    input.value = '';
                }, 800);
            }
        };

        // Quiz
        let quizIdx = 0;
        function renderQuiz(container) {
            quizIdx = 0;
            container.innerHTML = `<div id="quizArea" class="interactive-container"></div>`;
            showQuizQuestion();
        }

        function showQuizQuestion() {
            const area = document.getElementById('quizArea');
            if(quizIdx >= currentUnit.quiz.length) {
                area.innerHTML = `<h3>🎉 Quiz Complete!</h3><button class="btn-full" style="margin-top:10px;" onclick="setMode('quiz')">Try Again</button>`;
                addXP(10);
                return;
            }
            
            const q = currentUnit.quiz[quizIdx];
            let html = `<div style="font-size: 1.1em; font-weight: bold;">${q.question}</div><div class="quiz-options">`;
            
            q.options.forEach((opt, i) => {
                html += `<button class="quiz-option" onclick="checkQuizAnswer(${i}, ${q.correct}, this)">${opt}</button>`;
            });
            html += `</div>`;
            area.innerHTML = html;
        }

        window.checkQuizAnswer = function(selected, correct, btn) {
            const buttons = document.querySelectorAll('.quiz-option');
            buttons.forEach(b => b.disabled = true);
            
            if(selected === correct) {
                btn.classList.add('correct');
                addXP(5);
                playSuccessSound();
            } else {
                btn.classList.add('wrong');
                buttons[correct].classList.add('correct');
            }
            setTimeout(() => {
                quizIdx++;
                showQuizQuestion();
            }, 1200);
        };

        window.onload = init;
    </script>
</body>
</html>
