<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beijing ZhongKao English Grammar Practice</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        /* Header Styles */
        .header {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }

        .nav-buttons {
            display: flex;
            gap: 15px;
        }

        .nav-btn {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .nav-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.3);
        }

        .nav-btn:disabled {
            background: #95a5a6;
            cursor: not-allowed;
            transform: none;
        }

        .score-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .trophy-btn {
            background: linear-gradient(135deg, #f39c12, #e74c3c);
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 18px;
            font-weight: 700;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(243, 156, 18, 0.4);
            transition: all 0.3s ease;
        }

        .trophy-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(243, 156, 18, 0.6);
        }

        .trophy-icon {
            font-size: 24px;
            margin-right: 10px;
        }

        /* Shimmer Animation */
        .shimmer {
            position: absolute;
            width: 10px;
            height: 10px;
            background: radial-gradient(circle, #fff, transparent);
            border-radius: 50%;
            animation: shimmerFloat 2s ease-in-out infinite;
            opacity: 0;
        }

        @keyframes shimmerFloat {
            0% { transform: translateY(0) scale(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-100px) scale(1.5); opacity: 0; }
        }

        .shimmer-container {
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 150px;
            pointer-events: none;
        }

        /* Main Content */
        .content {
            padding: 40px;
        }

        .welcome-title {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 40px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .grammar-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .grammar-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
        }

        .grammar-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.3);
        }

        .grammar-card h3 {
            font-size: 1.3em;
            margin-bottom: 10px;
        }

        .grammar-card p {
            font-size: 0.9em;
            opacity: 0.9;
            line-height: 1.5;
        }

        .grammar-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: rotate 10s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .study-content {
            background: #f8f9fa;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
        }

        .study-content h2 {
            color: #2c3e50;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
        }

        .rule-box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin: 15px 0;
            border-left: 5px solid #667eea;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .rule-box h4 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .example-box {
            background: #e8f4f8;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
            border: 2px dashed #3498db;
        }

        .example-box.correct {
            background: #d4edda;
            border-color: #28a745;
        }

        .example-box.incorrect {
            background: #f8d7da;
            border-color: #dc3545;
        }

        .start-practice-btn {
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            display: block;
            margin: 30px auto;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(40, 167, 69, 0.4);
        }

        .start-practice-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(40, 167, 69, 0.6);
        }

        .question-container {
            background: #f8f9fa;
            padding: 20px 30px 30px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .question-text {
            font-size: 1.4em;
            color: #2c3e50;
            margin-bottom: 25px;
            line-height: 1.6;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .option-btn {
            background: white;
            border: 3px solid #667eea;
            padding: 20px;
            border-radius: 12px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }

        .option-btn:hover:not(:disabled) {
            background: #667eea;
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(102, 126, 234, 0.4);
        }

        .option-btn.correct {
            background: #28a745 !important;
            border-color: #28a745 !important;
            color: white !important;
            animation: pulse 0.5s ease;
        }

        .option-btn.incorrect {
            background: #dc3545 !important;
            border-color: #dc3545 !important;
            color: white !important;
            animation: shake 0.5s ease;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        .feedback-box {
            background: #fff3cd;
            border: 2px solid #ffc107;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
            animation: slideIn 0.5s ease;
        }

        .feedback-box.show {
            display: block;
        }

        .feedback-box.correct-feedback {
            background: #d4edda;
            border-color: #28a745;
        }

        .feedback-box.incorrect-feedback {
            background: #f8d7da;
            border-color: #dc3545;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .feedback-title {
            font-weight: 700;
            margin-bottom: 10px;
            font-size: 1.2em;
        }

        .feedback-text {
            line-height: 1.6;
        }

        /* Progress Bar */
        .progress-container {
            background: #e9ecef;
            border-radius: 10px;
            padding: 5px;
            margin-bottom: 20px;
        }

        .progress-bar {
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 20px;
            border-radius: 8px;
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 10px;
            color: white;
            font-weight: 700;
            font-size: 12px;
            min-width: 30px;
        }

        /* Results Page */
        .results-page {
            text-align: center;
        }

        .results-content {
            background: #f8f9fa;
            padding: 40px;
            border-radius: 15px;
            margin: 30px auto;
            max-width: 600px;
        }

        .final-score {
            font-size: 4em;
            color: #667eea;
            font-weight: 700;
            margin: 20px 0;
        }

        .score-message {
            font-size: 1.5em;
            color: #2c3e50;
            margin-bottom: 30px;
        }

        .restart-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s ease;
        }

        .restart-btn:hover {
            transform: scale(1.05);
        }

        /* Mistakes Review Styles */
        .mistakes-list {
            margin-top: 30px;
            text-align: left;
            max-height: 400px;
            overflow-y: auto;
            padding: 15px;
            background: white;
            border-radius: 10px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
        }

        .mistake-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid #dc3545;
        }

        .mistake-q {
            font-weight: 700;
            margin-bottom: 10px;
            color: #2c3e50;
        }

        .mistake-wrong {
            color: #dc3545;
            text-decoration: line-through;
            margin-bottom: 5px;
        }

        .mistake-right {
            color: #28a745;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .mistake-feedback {
            font-size: 0.9em;
            color: #666;
            background: #e9ecef;
            padding: 10px;
            border-radius: 5px;
        }

        /* Custom Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transform: translateY(-20px);
            transition: transform 0.3s ease;
        }

        .modal-overlay.show .modal-content {
            transform: translateY(0);
        }

        .modal-title {
            color: #2c3e50;
            margin-bottom: 15px;
            font-size: 1.5em;
        }

        .modal-btn {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
        }

        .modal-btn:hover {
            transform: scale(1.05);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .options-grid { grid-template-columns: 1fr; }
            .header { flex-direction: column; gap: 15px; }
            .nav-buttons { flex-wrap: wrap; justify-content: center; }
            .content { padding: 20px; }
            .welcome-title { font-size: 1.8em; }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="nav-buttons">
                <button class="nav-btn" id="backBtn" onclick="goBack()">← Back</button>
                <button class="nav-btn" id="homeBtn" onclick="goHome()">🏠 Home</button>
                <button class="nav-btn" id="nextBtn" onclick="nextQuestion()" disabled>Next →</button>
            </div>
            <div class="score-container">
                <button class="trophy-btn" id="trophyBtn" onclick="addManualPoints()">
                    <span class="trophy-icon">🏆</span>
                    <span id="scoreDisplay">0</span> pts
                </button>
                <div class="shimmer-container" id="shimmerContainer"></div>
            </div>
        </div>

        <!-- Content -->
        <div class="content">
            <!-- Home Page -->
            <div class="home-page" id="homePage">
                <h1 class="welcome-title">📚 Beijing ZhongKao Grammar Drills</h1>
                <p style="text-align: center; color: #7f8c8d; margin-bottom: 30px; font-size: 1.1em;">
                    Master all grammar topics with targeted rule drilling • <strong>50 questions per category</strong>
                </p>
                <div class="grammar-grid" id="grammarGrid"></div>
            </div>

            <!-- Study Page -->
            <div class="study-page hidden" id="studyPage">
                <div class="study-content" id="studyContent"></div>
                <button class="start-practice-btn" onclick="startPractice()">
                    🚀 Start Rule Drill (50 Questions)
                </button>
            </div>

            <!-- Practice Page -->
            <div class="practice-page hidden" id="practicePage">
                <div class="progress-container">
                    <div class="progress-bar" id="progressBar" style="width: 0%;">0/50</div>
                </div>
                <div class="question-container">
                    <div class="question-text" id="questionText">Loading question...</div>
                    <div class="options-grid" id="optionsGrid"></div>
                    <div class="feedback-box" id="feedbackBox">
                        <div class="feedback-title" id="feedbackTitle"></div>
                        <div class="feedback-text" id="feedbackText"></div>
                    </div>
                </div>
            </div>

            <!-- Results Page -->
            <div class="results-page hidden" id="resultsPage">
                <div class="results-content">
                    <h2 style="color: #2c3e50; margin-bottom: 20px;">🎉 Drill Complete!</h2>
                    <div class="final-score" id="finalScore">0/50</div>
                    <div class="score-message" id="scoreMessage">Great effort!</div>
                    <button class="restart-btn" onclick="restartPractice()">🔄 Drill Again</button>
                    <button class="restart-btn" id="reviewBtn" onclick="toggleMistakes()" style="display: none;">👀 Review Mistakes</button>
                    <button class="restart-btn" onclick="goHome()">🏠 Back to Menu</button>
                    
                    <div id="mistakesList" class="mistakes-list hidden"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Custom Modal -->
    <div class="modal-overlay" id="customModal">
        <div class="modal-content">
            <h3 class="modal-title">Notice</h3>
            <p id="modalText">Text-to-Speech is not supported in your browser.</p>
            <button class="modal-btn" onclick="hideModal()">OK</button>
        </div>
    </div>

    <script>
        // Game State Variables
        let currentState = {
            page: 'home',
            category: null,
            questions: [],
            currentQuestion: 0,
            score: 0,
            totalPoints: 0,
            answered: false,
            mistakes: [],
            currentCorrectIndex: 0,
            currentShuffledOptions: []
        };

        let navHistory = ['home'];

        function showModal(message) {
            document.getElementById('modalText').textContent = message;
            document.getElementById('customModal').classList.add('show');
        }

        function hideModal() {
            document.getElementById('customModal').classList.remove('show');
        }

        // --- Core Drill Building Engine (Compact & DRY) ---
        // Converts compact group arrays into full question objects
        function buildDrills(groups) {
            let qs = [];
            groups.forEach(g => {
                g.items.forEach(i => {
                    qs.push({
                        question: i[0],
                        options: i.length === 3 ? i[1] : g.options,
                        correct: i.length === 3 ? i[2] : i[1],
                        feedback: g.feedback
                    });
                });
            });
            return qs;
        }

        // --- Question Generators (5 blocks x 10 Qs = 50 Qs per topic) ---
        function generateVerbQuestions() {
            return buildDrills([
                { // Group 1: Simple Present
                    feedback: "Rule Drill: Simple Present Tense. Use verb+s/es for third-person singular (he/she/the student). Perfect for describing school routines!",
                    options: ["study", "studies", "studying", "studied"],
                    items: [
                        ["The dedicated student _____ English vocabulary every morning.", 1],
                        ["I _____ physics after school in the library.", 0],
                        ["My deskmate always _____ hard for the ZhongKao.", 1],
                        ["We _____ literature together on Fridays.", 0],
                        ["The principal _____ the rules carefully during assembly.", ["explain", "explains", "explaining", "explained"], 1],
                        ["Our homeroom teacher _____ our homework every day.", ["check", "checks", "checking", "checked"], 1],
                        ["They _____ basketball during the PE break.", ["play", "plays", "playing", "played"], 0],
                        ["She _____ to the reading club on Wednesdays.", ["go", "goes", "going", "went"], 1],
                        ["You _____ history very well.", 0],
                        ["The monitor _____ the whiteboard before class starts.", ["clean", "cleans", "cleaning", "cleaned"], 1]
                    ]
                },
                { // Group 2: Past Continuous
                    feedback: "Rule Drill: Past Continuous. Use was/were + verb-ing to describe an action that was in progress in the past, often interrupted by another event.",
                    options: ["read", "reads", "has read", "was reading"],
                    items: [
                        ["The student _____ the textbook when the fire alarm rang.", 3],
                        ["He _____ his essay when the lights went out.", ["wrote", "writes", "was writing", "is writing"], 2],
                        ["She _____ for her math test while her brother played games.", ["study", "studies", "has studied", "was studying"], 3],
                        ["The teacher _____ the lesson when a bird flew into the classroom.", ["explain", "explains", "was explaining", "explained"], 2],
                        ["My classmate _____ quietly when the bell suddenly rang.", 3],
                        ["I _____ my lunch when the principal walked in.", ["eat", "eats", "was eating", "ate"], 2],
                        ["She _____ notes while the teacher was talking.", ["take", "takes", "was taking", "took"], 2],
                        ["The class monitor _____ the attendance when I arrived late.", ["check", "checks", "was checking", "checked"], 2],
                        ["He _____ a difficult physics problem when time ran out.", ["solve", "solves", "was solving", "solved"], 2],
                        ["The student _____ a novel under the desk during history class.", 3]
                    ]
                },
                { // Group 3: Present Perfect
                    feedback: "Rule Drill: Present Perfect. Use has/have + past participle for actions that started in the past and continue to the present (often with 'since' or 'for').",
                    options: ["finish", "finished", "has finished", "is finishing"],
                    items: [
                        ["The senior student _____ her homework already.", 2],
                        ["He _____ English for three years at this middle school.", ["study", "studied", "has studied", "studying"], 2],
                        ["She _____ all the mock exams assigned to her.", ["complete", "completed", "has completed", "completes"], 2],
                        ["Our class _____ the science project.", 2],
                        ["The new teacher _____ at our school since 2022.", ["work", "worked", "has worked", "works"], 2],
                        ["My friend _____ the entrance exam preparation.", ["start", "started", "has started", "starts"], 2],
                        ["The principal _____ the new rules for the term.", ["announce", "announced", "has announced", "announcing"], 2],
                        ["She _____ that history book three times.", ["read", "reads", "has read", "reading"], 2],
                        ["He _____ his locker key and can't find it.", ["lose", "loses", "has lost", "lost"], 2],
                        ["The student _____ the extra credit assignment.", 2]
                    ]
                },
                { // Group 4: Passive Voice
                    feedback: "Rule Drill: Passive Voice (Past). Use was/were + past participle when the subject *receives* the action. Great for formal writing!",
                    options: ["write", "writes", "wrote", "was written"],
                    items: [
                        ["The famous textbook _____ by an expert educator.", 3],
                        ["The final exam _____ carefully by the teachers.", ["check", "checks", "checked", "was checked"], 3],
                        ["The classroom _____ by the students yesterday.", ["clean", "cleans", "cleaned", "was cleaned"], 3],
                        ["The difficult essay _____ by my smart deskmate.", 3],
                        ["The school gate _____ locked early last night.", ["is", "are", "was", "were"], 2],
                        ["The sports equipment _____ broken during PE class.", ["break", "breaks", "was broken", "broke"], 2],
                        ["The mock tests _____ distributed by the monitor.", ["were", "was", "are", "is"], 0],
                        ["The graduation ceremony _____ held in the gym.", ["hold", "holds", "was held", "held"], 2],
                        ["The winner of the spelling bee _____ announced.", ["announce", "announced", "was announced", "announces"], 2],
                        ["The excellent poem _____ by a student in Grade 9.", 3]
                    ]
                },
                { // Group 5: Gerunds after specific verbs
                    feedback: "Rule Drill: Gerunds. Verbs like 'enjoy', 'avoid', 'suggest', 'finish', and 'practice' MUST be followed by a verb + ing.",
                    options: ["read", "to read", "reading", "reads"],
                    items: [
                        ["The secondary student enjoys _____ English novels in her free time.", 2],
                        ["He avoids _____ mistakes on his math tests.", ["make", "to make", "making", "makes"], 2],
                        ["The teacher suggested _____ chapter four again.", ["review", "to review", "reviewing", "reviewed"], 2],
                        ["Have you finished _____ the chemistry report?", ["write", "to write", "writing", "writes"], 2],
                        ["We practice _____ English every morning.", ["speak", "to speak", "speaking", "speaks"], 2],
                        ["She keeps _____ her vocabulary words before the test.", ["memorize", "to memorize", "memorizing", "memorizes"], 2],
                        ["The students mind _____ late to school.", ["be", "to be", "being", "been"], 2],
                        ["I can't help _____ nervous about the ZhongKao.", ["feel", "to feel", "feeling", "feels"], 2],
                        ["He considers _____ to a specialized high school.", ["go", "to go", "going", "goes"], 2],
                        ["My classmate enjoys _____ classic literature.", 2]
                    ]
                }
            ]);
        }

        function generatePronounQuestions() {
            return buildDrills([
                { // Group 1: Subject Pronouns
                    feedback: "Rule Drill: Subject Pronouns. Use I, you, he, she, it, we, they as the subject performing the action.",
                    options: ["Him", "He", "His", "Himself"],
                    items: [
                        ["_____ is the smartest student in our math class.", 1],
                        ["_____ gave a great presentation in history.", ["Her", "She", "Hers", "Herself"], 1],
                        ["_____ always finish our group projects on time.", ["Us", "We", "Our", "Ourselves"], 1],
                        ["_____ am preparing for the high school entrance exam.", ["Me", "I", "My", "Mine"], 1],
                        ["_____ scored highest on the biology mock test.", 1],
                        ["_____ are the best basketball players in the school.", ["Them", "They", "Their", "Themselves"], 1],
                        ["_____ is a very difficult physics textbook.", ["It", "Its", "Itself", "This"], 0],
                        ["_____ wants to join the English drama club.", 1],
                        ["_____ must review your notes before Friday.", ["You", "Your", "Yours", "Yourself"], 0],

                        ["I still remember the day _____ I first came to this school.", 1],
                        ["The library is a quiet place _____ students can study.", 0],
                        ["July is the month _____ summer vacation begins.", 1],
                        ["This is the classroom _____ I took the mock exam.", 0],
                        ["1990 was the year _____ our school was founded.", 1],
                        ["The laboratory is the room _____ we do science experiments.", 0],
                        ["Friday is the day _____ we wear our casual clothes.", 1],
                        ["The cafeteria is the place _____ we eat lunch.", 0],
                        ["8:00 AM is the time _____ the first period starts.", 1]
                    ]
                }
            ]);
        }

        function generateAdverbialClauseQuestions() {
            return buildDrills([
                { // Group 1: Time Clauses
                    feedback: "Rule Drill: Adverbial Clauses of Time. Use 'when', 'while', 'as soon as'. Remember: If the main clause is future tense, the time clause uses PRESENT tense!",
                    options: ["when", "while", "until", "since"],
                    items: [
                        ["I will call my mother _____ I finish the exam.", 0],
                        ["The students were reading _____ the teacher was grading papers.", 1],
                        ["I waited in the rain _____ the school bus arrived.", 2],
                        ["He has been top of the class _____ he started middle school.", 3],
                        ["I will return the library book _____ I finish reading it.", ["as soon as", "while", "until", "since"], 0],
                        ["Please don't talk _____ you are taking the test.", 1],
                        ["_____ the bell rang, the students rushed out of the classroom.", ["When", "While", "Until", "Since"], 0],
                        ["He didn't start his homework _____ his favorite TV show ended.", 2],
                        ["She has worn glasses _____ she was in Grade 3.", 3],
                        ["I was memorizing vocabulary _____ waiting for the bus.", 1]
                    ]
                },
                { // Group 2: Condition Clauses (First Conditional)
                    feedback: "Rule Drill: Adverbial Clauses of Condition. Use 'if' or 'unless' (if not). Remember: If + Present tense, Main Clause + Will/Future.",
                    options: ["If", "Unless", "Although", "Because"],
                    items: [
                        ["_____ you study hard, you will pass the entrance exam.", 0],
                        ["You will fail the math test _____ you start practicing.", ["if", "unless", "although", "because"], 1],
                        ["_____ it rains tomorrow, we will have PE indoors.", 0],
                        ["_____ you hurry up, you will be late for school.", 1],
                        ["I will help you with your essay _____ you want me to.", ["if", "unless", "although", "because"], 0],
                        ["The plants in the lab will die _____ we water them.", ["if", "unless", "although", "because"], 1],
                        ["_____ she reviews her notes, she won't forget the grammar rules.", 0],
                        ["I won't tell anyone your test score _____ you give me permission.", ["if", "unless", "although", "because"], 1],
                        ["_____ we work together, we can finish the project faster.", 0],
                        ["You cannot leave the classroom _____ the bell rings.", ["if", "unless", "although", "because"], 1]
                    ]
                },
                { // Group 3: Reason Clauses
                    feedback: "Rule Drill: Adverbial Clauses of Reason. Use 'because', 'since', or 'as' to explain why something happens. Do NOT use 'so' in the same sentence!",
                    options: ["Because", "Although", "If", "When"],
                    items: [
                        ["_____ he woke up late, he missed the morning reading session.", 0],
                        ["She stayed after school _____ she needed help with physics.", ["because", "although", "so", "but"], 0],
                        ["_____ the weather was terrible, the sports meet was postponed.", ["Since", "Although", "But", "Unless"], 0],
                        ["He got a perfect score _____ he prepared very well.", ["as", "though", "unless", "so"], 0],
                        ["_____ I forgot my textbook, I had to share with my deskmate.", 0],
                        ["The teacher praised her _____ her essay was excellent.", ["because", "although", "so", "but"], 0],
                        ["_____ everyone is here, let's start the class meeting.", ["Since", "Although", "But", "Unless"], 0],
                        ["I like math _____ it challenges me to think logically.", ["because", "although", "so", "but"], 0],
                        ["_____ there is no school tomorrow, we can sleep late.", ["As", "Though", "Unless", "So"], 0],
                        ["He went to the nurse's office _____ he felt sick.", ["because", "although", "so", "but"], 0]
                    ]
                },
                { // Group 4: Concession Clauses
                    feedback: "Rule Drill: Adverbial Clauses of Concession. Use 'although', 'even though', or 'though' to show unexpected results. NEVER use 'but' in the same sentence!",
                    options: ["Although", "Because", "If", "So"],
                    items: [
                        ["_____ the test was very difficult, most students passed.", 0],
                        ["He didn't do well _____ he studied for hours.", ["although", "because", "so", "and"], 0],
                        ["_____ it was raining, they still played soccer in PE.", 0],
                        ["She smiled _____ she was feeling very nervous about the exam.", ["even though", "because", "so", "and"], 0],
                        ["_____ I was tired, I finished writing my English essay.", 0],
                        ["He is the best player on the team _____ he is the shortest.", ["although", "because", "so", "and"], 0],
                        ["_____ she is a new student, she already has many friends.", 0],
                        ["I understood the lesson _____ the teacher spoke very fast.", ["even though", "because", "so", "and"], 0],
                        ["_____ the school building is old, the classrooms are very modern inside.", 0],
                        ["They lost the basketball game _____ they tried their absolute best.", ["although", "because", "so", "and"], 0]
                    ]
                },
                { // Group 5: Purpose & Result Clauses
                    feedback: "Rule Drill: Adverbial Clauses of Purpose & Result. Use 'so that' for purpose (why). Use 'so + adj/adv + that' or 'such + noun + that' for extreme results.",
                    options: ["so that", "so", "such", "that"],
                    items: [
                        ["I sat in the front row _____ I could see the blackboard clearly.", 0],
                        ["The mock exam was _____ difficult that many students cried.", 1],
                        ["It was _____ a beautiful day that we had class outside.", 2],
                        ["He spoke very loudly _____ everyone in the hall could hear.", 0],
                        ["She ran _____ fast that she broke the school record.", 1],
                        ["They are _____ good students that the teacher is very proud.", 2],
                        ["I set three alarms _____ I wouldn't be late for the ZhongKao.", 0],
                        ["The homework was _____ boring that I fell asleep.", 1],
                        ["It was _____ an interesting book that I read it twice.", 2],
                        ["Please write clearly _____ the teacher can grade your essay easily.", 0]
                    ]
                }
            ]);
        }

        // Grammar Categories Data
        const grammarCategories = [
            { id: 'verbs', title: 'Verbs (Tenses & Voice)', description: 'Master the 8 core tenses, passive voice, and gerunds.', questions: generateVerbQuestions() },
            { id: 'pronouns', title: 'Pronouns', description: 'Subject, object, possessive, reflexive, and indefinite pronouns.', questions: generatePronounQuestions() },
            { id: 'adjectives', title: 'Adjectives', description: 'Comparatives, superlatives, and -ed/-ing endings.', questions: generateAdjectiveQuestions() },
            { id: 'prepositions', title: 'Prepositions', description: 'Time, place, movement, and essential collocations.', questions: generatePrepositionQuestions() },
            { id: 'conjunctions', title: 'Conjunctions', description: 'Coordinating, subordinating, and correlative pairs.', questions: generateConjunctionQuestions() },
            { id: 'nouns', title: 'Nouns', description: 'Plurals, uncountables, and possessive cases.', questions: generateNounQuestions() },
            { id: 'articles', title: 'Articles', description: 'Master a, an, the, and zero article rules.', questions: generateArticleQuestions() },
            { id: 'numbers', title: 'Numbers', description: 'Cardinals, ordinals, dates, times, and fractions.', questions: generateNumberQuestions() },
            { id: 'adverbs', title: 'Adverbs', description: 'Formation, frequency, and comparative/superlative forms.', questions: generateAdverbQuestions() },
            { id: 'object-clauses', title: 'Object Clauses', description: 'Word order, tense sequence, and connecting words.', questions: generateObjectClauseQuestions() },
            { id: 'relative-clauses', title: 'Relative Clauses', description: 'Who, whom, whose, which, that, where, and when.', questions: generateRelativeClauseQuestions() },
            { id: 'adverbial-clauses', title: 'Adverbial Clauses', description: 'Time, condition, reason, concession, and result.', questions: generateAdverbialClauseQuestions() }
        ];

        // Render Grammar Grid
        function renderGrammarGrid() {
            const grid = document.getElementById('grammarGrid');
            grid.innerHTML = '';
            grammarCategories.forEach((category, index) => {
                const card = document.createElement('div');
                card.className = 'grammar-card';
                card.innerHTML = `<h3>${category.title}</h3><p>${category.description}</p>`;
                card.onclick = () => selectCategory(index);
                grid.appendChild(card);
            });
        }

        function selectCategory(index) {
            currentState.category = grammarCategories[index];
            navHistory.push('study');
            showPage('study');
            
            const content = document.getElementById('studyContent');
            content.innerHTML = `<h2>📖 ${currentState.category.title}</h2>
                                 <p style="font-size: 1.1em; line-height: 1.6; color: #34495e;">
                                 You are about to start a <strong>50-question rule drill</strong>.<br><br>
                                 The questions are grouped by specific grammar rules. You will answer 10 questions in a row targeting the <em>exact same rule</em> before moving to the next rule. This repetitive drilling is proven to help you internalize the grammar patterns for the ZhongKao!<br><br>
                                 Read the feedback after each question carefully.</p>`;
            updateNavButtons();
        }

        function startPractice() {
            // NO SHUFFLING - Maintain the grouped drill sequence
            currentState.questions = [...currentState.category.questions];
            currentState.currentQuestion = 0;
            currentState.answered = false;
            currentState.score = 0;
            currentState.mistakes = [];
            navHistory.push('practice');
            showPage('practice');
            renderQuestion();
            updateNavButtons();
        }

        function renderQuestion() {
            const q = currentState.questions[currentState.currentQuestion];
            document.getElementById('questionText').textContent = q.question;
            document.getElementById('progressBar').style.width = `${((currentState.currentQuestion + 1) / currentState.questions.length) * 100}%`;
            document.getElementById('progressBar').textContent = `${currentState.currentQuestion + 1}/${currentState.questions.length}`;
            
            // Dynamically shuffle options so the correct answer isn't always in the same spot
            const originalCorrectText = q.options[q.correct];
            let shuffledOptions = [...q.options];
            for (let i = shuffledOptions.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffledOptions[i], shuffledOptions[j]] = [shuffledOptions[j], shuffledOptions[i]];
            }
            
            currentState.currentCorrectIndex = shuffledOptions.indexOf(originalCorrectText);
            currentState.currentShuffledOptions = shuffledOptions;

            const optionsGrid = document.getElementById('optionsGrid');
            optionsGrid.innerHTML = '';
            shuffledOptions.forEach((option, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = option;
                btn.onclick = () => selectAnswer(index);
                optionsGrid.appendChild(btn);
            });
            
            document.getElementById('feedbackBox').classList.remove('show', 'correct-feedback', 'incorrect-feedback');
            currentState.answered = false;
            updateNavButtons();
        }

        function selectAnswer(index) {
            if (currentState.answered) return;
            currentState.answered = true;
            
            const q = currentState.questions[currentState.currentQuestion];
            const correctIndex = currentState.currentCorrectIndex;
            const buttons = document.querySelectorAll('.option-btn');
            
            buttons.forEach((btn, i) => {
                btn.disabled = true;
                if (i === correctIndex) {
                    btn.classList.add('correct');
                } else if (i === index) {
                    btn.classList.add('incorrect');
                }
            });
            
            const feedbackBox = document.getElementById('feedbackBox');
            const feedbackTitle = document.getElementById('feedbackTitle');
            const feedbackText = document.getElementById('feedbackText');
            
            if (index === correctIndex) {
                currentState.score++;
                currentState.totalPoints += 4;
                feedbackBox.className = 'feedback-box correct-feedback show';
                feedbackTitle.textContent = '✓ Correct!';
                createShimmerEffect();
            } else {
                feedbackBox.className = 'feedback-box incorrect-feedback show';
                feedbackTitle.textContent = '✗ Incorrect';
                currentState.mistakes.push({
                    question: q.question,
                    wrongAnswer: currentState.currentShuffledOptions[index],
                    correctAnswer: currentState.currentShuffledOptions[correctIndex],
                    feedback: q.feedback
                });
            }
            
            feedbackText.textContent = q.feedback;
            updateScoreDisplay();
            updateNavButtons();
        }

        function nextQuestion() {
            if (currentState.currentQuestion < currentState.questions.length - 1) {
                currentState.currentQuestion++;
                currentState.answered = false;
                renderQuestion();
            } else {
                showResults();
            }
            updateNavButtons();
        }

        function showResults() {
            navHistory.push('results');
            showPage('results');
            const percentage = (currentState.score / currentState.questions.length) * 100;
            document.getElementById('finalScore').textContent = `${currentState.score}/${currentState.questions.length}`;
            
            let message = '';
            if (percentage >= 90) message = '🌟 Outstanding! You have mastered these rules!';
            else if (percentage >= 75) message = '👏 Great job! Very good understanding!';
            else if (percentage >= 60) message = '💪 Good effort! Keep drilling these concepts!';
            else message = '📚 Keep studying! Try the drill again to build muscle memory!';
            
            document.getElementById('scoreMessage').textContent = message;

            const reviewBtn = document.getElementById('reviewBtn');
            const mistakesList = document.getElementById('mistakesList');
            
            if (currentState.mistakes.length > 0) {
                reviewBtn.style.display = 'inline-block';
                mistakesList.innerHTML = '<h3 style="color: #2c3e50; margin-bottom: 15px;">Your Mistakes:</h3>';
                currentState.mistakes.forEach((m, i) => {
                    mistakesList.innerHTML += `
                        <div class="mistake-item">
                            <div class="mistake-q">${i + 1}. ${m.question}</div>
                            <div class="mistake-wrong">✗ You answered: ${m.wrongAnswer}</div>
                            <div class="mistake-right">✓ Correct answer: ${m.correctAnswer}</div>
                            <div class="mistake-feedback">💡 ${m.feedback}</div>
                        </div>
                    `;
                });
            } else {
                reviewBtn.style.display = 'none';
                mistakesList.innerHTML = '';
            }
            mistakesList.classList.add('hidden');
            reviewBtn.textContent = '👀 Review Mistakes';

            updateNavButtons();
        }

        function toggleMistakes() {
            const list = document.getElementById('mistakesList');
            const btn = document.getElementById('reviewBtn');
            if (list.classList.contains('hidden')) {
                list.classList.remove('hidden');
                btn.textContent = '🙈 Hide Mistakes';
            } else {
                list.classList.add('hidden');
                btn.textContent = '👀 Review Mistakes';
            }
        }

        function restartPractice() {
            startPractice();
        }

        function goBack() {
            if (navHistory.length > 1) {
                navHistory.pop();
                const prevPage = navHistory[navHistory.length - 1];
                showPage(prevPage);
                updateNavButtons();
            }
        }

        function goHome() {
            navHistory = ['home'];
            currentState.category = null;
            showPage('home');
            updateNavButtons();
        }

        function showPage(pageName) {
            ['home', 'study', 'practice', 'results'].forEach(p => {
                document.getElementById(`${p}Page`).classList.add('hidden');
            });
            document.getElementById(`${pageName}Page`).classList.remove('hidden');
            currentState.page = pageName;
        }

        function updateNavButtons() {
            const backBtn = document.getElementById('backBtn');
            const nextBtn = document.getElementById('nextBtn');
            
            backBtn.disabled = navHistory.length <= 1;
            
            if (currentState.page === 'practice') {
                nextBtn.disabled = !currentState.answered;
                nextBtn.textContent = currentState.currentQuestion < currentState.questions.length - 1 ? 'Next →' : 'Finish 🏁';
            } else {
                nextBtn.disabled = true;
            }
        }

        function updateScoreDisplay() {
            document.getElementById('scoreDisplay').textContent = currentState.totalPoints;
        }

        function addManualPoints() {
            currentState.totalPoints += 1;
            updateScoreDisplay();
            createShimmerEffect();
        }

        function createShimmerEffect() {
            const container = document.getElementById('shimmerContainer');
            for (let i = 0; i < 5; i++) {
                const shimmer = document.createElement('div');
                shimmer.className = 'shimmer';
                shimmer.style.left = `${Math.random() * 80 + 10}%`;
                shimmer.style.animationDelay = `${Math.random() * 0.5}s`;
                container.appendChild(shimmer);
                setTimeout(() => shimmer.remove(), 2000);
            }
        }

        function initApp() {
            renderGrammarGrid();
            updateNavButtons();
            showPage('home');
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initApp);
        } else {
            initApp();
        }
    </script>
</body>
</html>
